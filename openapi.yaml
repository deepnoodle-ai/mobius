        retention_policy:
          $ref: '#/components/schemas/EnvironmentRetentionPolicy'
        lease_expires_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        last_reconciled_at:
          type: string
          format: date-time
        last_error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        destroyed_at:
          type: string
          format: date-time
    EnvironmentLease:
