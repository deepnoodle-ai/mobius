openapi: 3.0.3
info:
  title: mobius API
  version: 0.1.0
  description: Mobius is a work coordination platform for mixed teams of humans, systems,
    and AI agents
servers:
- url: https://api.mobiusops.ai
  description: Production
- url: http://localhost:8080
  description: Local development
security:
- BearerAuth: []
tags:
- name: channels
  x-displayName: Channels
  description: 'Project channels: container records, membership, archive state.'
- name: messages
  x-displayName: Messages
  description: 'Channel messages: send, list, get, update, and mark-read.'
- name: audit-logs
  x-displayName: Audit Logs
  description: Immutable audit records for security-sensitive project and organization activity.
- name: workflows
  x-displayName: Workflows
  description: Versioned workflow definitions and their executable specifications.
- name: runs
  x-displayName: Runs
  description: Workflow run lifecycle, events, signals, jobs, and runtime inspection.
- name: actions
  x-displayName: Actions
  description: Project and catalog actions invoked by workflow steps.
- name: jobs
  x-displayName: Jobs
  description: Worker protocol endpoints for claiming, heartbeating, completing, and instrumenting
    step jobs.
- name: triggers
  x-displayName: Triggers
  description: Automated workflow starts from schedules, inbound webhooks, and platform events.
- name: worker-sessions
  x-displayName: Worker Sessions
  description: Recently seen worker sessions and their advertised capabilities.
- name: projects
  x-displayName: Projects
  description: Project records, membership, defaults, and project-scoped configuration.
- name: generate
  x-displayName: Generate
  description: Generate API operations.
- name: webhooks
  x-displayName: Webhooks
  description: Outgoing webhook subscriptions, tests, and delivery history.
- name: metrics
  x-displayName: Metrics
  description: Project operational metrics for workflow and worker activity.
- name: interactions
  x-displayName: Interactions
  description: Human-in-the-loop requests, responses, and group routing.
- name: groups
  x-displayName: Groups
  description: Project groups, membership, and group interaction routing policy.
- name: agents
  x-displayName: Agents
  description: Agent identities, sessions, presence, and lifecycle administration.
- name: spans
  x-displayName: Spans
  description: Spans API operations.
- name: tools
  x-displayName: Tools
  description: Published workflow tools and tool invocation results.
paths:
  /v1/projects/{project}/channels:
    post:
      operationId: createChannel
      tags:
      - channels
      summary: Create a channel
      description: Creates a new channel or DM thread. The channel `name` must be URL-safe
        and unique within the project — it is immutable after creation. The creator is automatically
        added as an admin member. Supply `member_ids` to seed initial membership atomically.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      operationId: listChannels
      tags:
      - channels
      summary: List channels
      description: Returns channels in the project, optionally filtered by kind or visibility.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: kind
        in: query
        schema:
          type: string
          enum:
          - dm
          - channel
        description: Filter by channel kind.
      - name: private
        in: query
        schema:
          type: boolean
        description: Filter by private flag.
      - $ref: '#/components/parameters/TagFilterParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/projects/{project}/channels/{id}:
    get:
      operationId: getChannel
      tags:
      - channels
      summary: Get a channel
      description: Returns channel metadata for the given ID. Membership and messages are
        exposed through their own endpoints so callers can fetch only the detail they need.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateChannel
      tags:
      - channels
      summary: Update a channel
      description: Updates `display_name`, `topic`, `private`, or `archived_at`. The `name`
        (handle) is immutable and cannot be changed after creation.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteChannel
      tags:
      - channels
      summary: Delete a channel
      description: Hard-deletes the channel and its message history.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/members:
    get:
      operationId: listChannelMembers
      tags:
      - channels
      summary: List channel members
      description: Returns the current live membership of the channel.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMemberListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: addChannelMember
      tags:
      - channels
      summary: Add a member to a channel
      description: Adds a user or agent to the channel. Returns 409 if already a member.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddChannelMemberRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMember'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/channels/{id}/members/{member_id}:
    delete:
      operationId: removeChannelMember
      tags:
      - channels
      summary: Remove a member from a channel
      description: Removes a user or agent from the channel's live membership. Existing messages
        remain attributed to the removed member, and removing a member does not revoke project-level
        access outside this channel.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/member_id'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/messages:
    get:
      operationId: listMessages
      tags:
      - messages
      summary: List messages in a channel
      description: |-
        Returns messages in reverse chronological order (newest first). Use `reply_to` to fetch a thread. Use `cursor` for pagination.

        Agent loop helpers (PRD 048 §6):
        - `since=<msg-id>` returns messages strictly newer than the given id
        in chronological order (oldest first), so an agent can stream them
        forward through its turn handler.
        - `unread=true` is shorthand for `since=<my last_read_message_id>`.
        Mutually exclusive with `since`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: sender_id
        in: query
        schema:
          type: string
        description: Filter by sender principal ID — a user ID (for `sender_type=member`),
          agent ID (for `sender_type=agent`), or service account ID (for `sender_type=service_account`).
      - name: reply_to
        in: query
        schema:
          type: string
        description: Return only replies to this message ID (thread view).
      - name: pinned
        in: query
        schema:
          type: boolean
        description: Filter by pinned status.
      - name: since
        in: query
        schema:
          type: string
        description: |-
          Return messages strictly newer than this cursor, in chronological
          order. Accepts either:
          - a message ID — strictly newer than that message in
          `(created_at, id)` order, or
          - an RFC3339 timestamp — strictly newer than that instant.
          Useful for agent loops that have already processed everything up
          to and including the cursor.
      - name: unread
        in: query
        schema:
          type: boolean
        description: 'When `true`, equivalent to passing `since=<my last_read_message_id>`.
          Mutually exclusive with `since`. Requires a member-bound credential: callers without
          a user identity get 400, and authenticated non-members get 403.'
      - name: entity_type
        in: query
        schema:
          $ref: '#/components/schemas/EntityReferenceType'
        description: Return only messages that reference this entity type.
      - name: entity_id
        in: query
        schema:
          type: string
        description: Return only messages that reference this entity ID.
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessageListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: sendMessage
      tags:
      - messages
      summary: Send a message to a channel
      description: |-
        Posts a message to the channel. Sender identity is determined entirely by the authenticated credential — there is no field to override it.

        - When the credential is an API key whose service account backs an
        agent (1:1 invariant), the message is attributed to that agent.
        - When the credential is an API key whose service account backs no
        agent, the message is attributed to that service account.
        - When the credential is a user credential, the message is attributed
        to that user.

        Content is Markdown. Use `reply_to` for threading.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendChannelMessageRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/references:
    post:
      operationId: shareChannelEntity
      tags:
      - channels
      summary: Share an entity in a channel
      description: Posts a channel card for a canonical Mobius entity. The message stores
        a typed reference edge so humans and agents can discover the channel activity around
        a run, interaction, job, group, or other entity without scraping Markdown.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareChannelEntityRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/interactions/{interaction_id}/claim:
    post:
      operationId: claimChannelInteraction
      tags:
      - channels
      summary: Claim an interaction from a channel
      description: Claims a pending first-responder group interaction from the chat surface
        and appends a channel activity message that references the interaction.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: interaction_id
        in: path
        required: true
        schema:
          type: string
        description: Interaction to claim.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelInteractionActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/interactions/{interaction_id}/release:
    post:
      operationId: releaseChannelInteraction
      tags:
      - channels
      summary: Release an interaction claim from a channel
      description: Releases the authenticated member's first-responder interaction claim from
        the chat surface and appends channel-visible activity.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: interaction_id
        in: path
        required: true
        schema:
          type: string
        description: Interaction whose claim should be released.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelInteractionActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/interactions/{interaction_id}/respond:
    post:
      operationId: respondToChannelInteraction
      tags:
      - channels
      summary: Respond to an interaction from a channel
      description: Submits a canonical interaction response from the chat surface and appends
        a channel-visible activity message so human and agent channel participants can see
        that the interaction advanced.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: interaction_id
        in: path
        required: true
        schema:
          type: string
        description: Interaction to answer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelInteractionRespondRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelInteractionActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/channels/{id}/messages/{message_id}:
    get:
      operationId: getMessage
      tags:
      - messages
      summary: Get a channel message
      description: Returns a single message by ID, including threading, pin, edit, and sender
        attribution metadata. Use the list endpoint to page through a channel or thread.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/message_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateMessage
      tags:
      - messages
      summary: Update a channel message
      description: Updates content, metadata, or pinned state of a message. Sets `edited_at`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/message_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelMessageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/read:
    post:
      operationId: markMessagesRead
      tags:
      - messages
      summary: Mark messages in a channel as read
      description: |-
        Advances the caller's `last_read_message_id` for this channel. Used by agent loops to record progress: stream a batch with `?unread=true`, process each message, then call this endpoint with the latest id to acknowledge (PRD 048 §6).

        - When `up_to_message_id` is set, the read cursor advances to that
        id (the message must belong to this channel).
        - When the body is empty or `up_to_message_id` is omitted, the read
        cursor advances to the channel's latest message at call time.

        The caller must be a member of the channel. Non-members get 403.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkChannelMessagesReadRequest'
      responses:
        '204':
          description: Read cursor updated.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/audit-logs:
    get:
      operationId: listAuditLogs
      tags:
      - audit-logs
      summary: List audit log entries
      description: |-
        Returns an immutable, append-only log of create/update/delete/archive/restore actions performed against org resources. Entries record both the durable actor identity (service account or user) and the credential used, enabling attribution even when keys are later revoked.

        Combine `actor_id` + `resource_type` to audit a specific identity's writes to a resource class. Use `created_after` / `created_before` for time-bounded compliance exports.
      parameters:
      - name: resource_type
        in: query
        schema:
          type: string
        description: Filter by resource type
      - name: project_id
        in: query
        schema:
          type: string
        description: Filter by project ID
      - name: resource_id
        in: query
        schema:
          type: string
        description: Filter by resource ID
      - name: user_id
        in: query
        schema:
          type: string
        description: Filter by user ID
      - name: actor_type
        in: query
        schema:
          type: string
        description: Filter by actor type
      - name: actor_id
        in: query
        schema:
          type: string
        description: Filter by actor ID
      - name: action
        in: query
        schema:
          type: string
        description: Filter by action (create, update, delete, archive, restore)
      - name: created_after
        in: query
        schema:
          type: string
          format: date-time
        description: Filter to entries created after this timestamp
      - name: created_before
        in: query
        schema:
          type: string
          format: date-time
        description: Filter to entries created before this timestamp
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/projects/{project}/workflows:
    get:
      operationId: listWorkflows
      tags:
      - workflows
      summary: List workflow definitions
      description: Returns workflow definition summaries, newest-first. List responses omit
        the executable `spec`; use `getWorkflow` to fetch the full definition with its current
        spec.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/TagFilterParam'
      - name: cursor
        in: query
        description: Opaque pagination cursor returned from the previous response.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of results to return per page.
        schema:
          type: integer
          minimum: 1
          maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createWorkflow
      tags:
      - workflows
      summary: Create a workflow definition
      description: Creates a workflow definition with an initial version (version 1). The
        `handle` is auto-derived from `name` if omitted and must be unique within the project.
        Every call to `updateWorkflow` with a new `spec` creates a new version; version numbers
        are monotonically increasing.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRequest'
            example:
              name: document-review
              handle: document-review
              description: Summarize a document and request approval before publishing.
              published_as_tool: true
              spec:
                name: document-review
                inputs:
                - name: document_id
                  type: string
                  description: Document to review.
                steps:
                - name: summarize
                  action: summarize-document
                  parameters:
                    document_id: ${inputs.document_id}
                  store: summary
                  next:
                  - step: approve
                - name: approve
                  interaction:
                    type: approval
                    message: Approve publishing this summary?
                    timeout: 24h
                    target:
                      type: group
                      id: approvers
                    spec:
                      mode: confirm
                      default_confirmed: false
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/workflows/{id}:
    get:
      operationId: getWorkflow
      tags:
      - workflows
      summary: Get a workflow definition
      description: Returns a workflow definition with its latest executable spec. Use the
        version endpoints when you need a historical spec instead of the current latest version.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinition'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateWorkflow
      tags:
      - workflows
      summary: Update a workflow definition
      description: Updating `spec` atomically creates a new immutable version (version N+1)
        and advances `latest_version`. Runs always execute the version they were started with;
        updating the definition does not affect running instances. Updating `name`, `description`,
        or `published_as_tool` without a `spec` does not create a new version.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkflowRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
