      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSessionDataResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /agents/sessions/{sessionId}/heartbeat:
    post:
      operationId: heartbeatAgentSession
      tags:
      - agents
      summary: Heartbeat an agent session
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSessionDataResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /agents/sessions/{sessionId}/disconnect:
    post:
      operationId: disconnectAgentSession
      tags:
      - agents
      summary: Disconnect an agent session
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSessionDataResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /tools:
    get:
      operationId: listTools
      tags:
      - tools
      summary: List tool-published workflows
      description: 'Returns all workflow definitions that have been published as tools

        for the authenticated org. Each entry includes the tool name,

        description, and JSON Schema for the input — compatible with the

        Anthropic and OpenAI tool use APIs.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolDefinitionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /namespaces/{ns}/tools/{slug}/runs:
    post:
      operationId: runTool
      tags:
      - tools
      summary: Invoke a workflow tool
      description: 'Starts a workflow run for the named tool (workflow slug) and waits

        for it to complete up to `timeout_seconds` (default 30s, max 120s).

        Returns the run output directly when the workflow completes within

        the timeout. On timeout the response includes the run ID and

        `status: pending` so the caller can switch to polling via

        `GET /namespaces/{ns}/tools/{slug}/runs/{run_id}`.

        '
      parameters:
      - $ref: '#/components/parameters/NamespaceSlugParam'
      - name: slug
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - data
              properties:
                data:
                  $ref: '#/components/schemas/ToolRunRequest'
      responses:
        '200':
          description: OK — run completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolRunDataResponse'
        '202':
          description: Accepted — run is pending; poll for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolRunDataResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /namespaces/{ns}/tools/{slug}/runs/{runId}:
    get:
      operationId: getToolRun
      tags:
      - tools
      summary: Poll for the result of an async tool run
      parameters:
      - $ref: '#/components/parameters/NamespaceSlugParam'
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - name: runId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolRunDataResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key passed as Bearer token
  parameters:
    NamespaceSlugParam:
      name: ns
      in: path
      required: true
      schema:
        type: string
      description: Namespace slug (unique per organization)
    IDParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    ActionNameParam:
      name: actionName
      in: path
      required: true
      schema:
        type: string
    CursorParam:
      name: cursor
      in: query
      description: Cursor for pagination (opaque string from previous response)
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    GroupIDParam:
      name: groupId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NoContent:
      description: No Content
  schemas:
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
    HealthResponse:
      type: object
      required:
      - status
      properties:
        status:
          type: string
    Metadata:
      type: object
      additionalProperties: true
    Channel:
      type: object
      required:
      - id
      - name
      - display_name
      - kind
      - private
      - created_by
      - created_at
      - updated_at
      properties:
        id:
          type: string
        name:
          type: string
          description: Channel slug (unique within org)
        display_name:
          type: string
          description: Human-facing display name
        topic:
          type: string
          description: Channel topic or description
        kind:
          type: string
          enum:
          - dm
          - channel
          description: Channel type
        private:
          type: boolean
          description: Whether the channel is private
        created_by:
          type: string
          description: ID of the user who created the channel
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the channel was archived
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ChannelDataResponse:
      type: object
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/Channel'
    ChannelListResponse:
      type: object
      required:
      - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Channel'
        has_more:
          type: boolean
        next_cursor:
          type: string
    ChannelMember:
      type: object
      required:
      - id
      - channel_id
      - user_id
      - role
      - joined_at
      properties:
        id:
          type: string
        channel_id:
          type: string
        user_id:
          type: string
        role:
          type: string
          enum:
          - member
          - admin
          description: Member's role in the channel
        last_read_message_id:
          type: string
          nullable: true
          description: Last message read by this member
        muted:
          type: boolean
          description: Whether notifications are muted
        starred:
          type: boolean
          description: Whether the member has starred this channel
        joined_at:
          type: string
          format: date-time
    ChannelMemberDataResponse:
      type: object
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/ChannelMember'
    ChannelMemberListResponse:
      type: object
      required:
      - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ChannelMember'
        has_more:
          type: boolean
        next_cursor:
          type: string
    ChannelMessage:
      type: object
      required:
      - id
      - channel_id
      - sender_id
      - type
      - content
      - created_at
      properties:
        id:
          type: string
        channel_id:
          type: string
        sender_id:
          type: string
          description: ID of the message sender (user or agent)
        display:
          type: string
          enum:
          - message
          - notice
          - card
          description: Rendering layout mode
        type:
          type: string
          description: Dot-namespaced message type (e.g. user.message, ai.response)
        content:
          type: string
          description: Message content (markdown)
        reply_to:
          type: string
          nullable: true
          description: ID of the message this is a reply to (threading)
        metadata:
          $ref: '#/components/schemas/Metadata'
        pinned:
          type: boolean
          description: Whether this message is pinned
        pinned_by:
          type: string
          nullable: true
          description: ID of user who pinned this message
        edited_at:
          type: string
          format: date-time
          nullable: true
          description: When the message was last edited
        created_at:
          type: string
          format: date-time
    ChannelMessageDataResponse:
      type: object
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/ChannelMessage'
    ChannelMessageListResponse:
      type: object
      required:
      - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ChannelMessage'
        has_more:
          type: boolean
        next_cursor:
          type: string
    CreateChannelRequest:
      type: object
      required:
      - name
      - display_name
      - kind
      properties:
        name:
          type: string
          description: Channel slug (unique, immutable)
        display_name:
          type: string
          description: Human-facing display name
        topic:
          type: string
          description: Channel topic or description
        kind:
          type: string
          enum:
          - dm
          - channel
          description: Channel type
        private:
          type: boolean
          default: false
          description: Whether the channel is private (invite-only)
        member_ids:
          type: array
          items:
            type: string
          description: Initial member IDs to add to the channel
    UpdateChannelRequest:
      type: object
      properties:
        display_name:
          type: string
        topic:
          type: string
        private:
          type: boolean
    AddChannelMemberRequest:
      type: object
      required:
      - user_id
      properties:
        user_id:
          type: string
          description: User or agent ID to add
        role:
          type: string
          enum:
          - member
          - admin
          default: member
    SendChannelMessageRequest:
      type: object
      required:
      - content
      properties:
        content:
          type: string
          description: Message content (markdown)
        display:
          type: string
          enum:
          - message
          - notice
          - card
          default: message
          description: Rendering layout mode
        type:
          type: string
          default: user.message
          description: Dot-namespaced message type
        reply_to:
          type: string
          description: Parent message ID for threading
        metadata:
          $ref: '#/components/schemas/Metadata'
    UpdateChannelMessageRequest:
      type: object
      properties:
        content:
          type: string
          description: Updated message content (markdown)
        metadata:
          $ref: '#/components/schemas/Metadata'
        pinned:
          type: boolean
          description: Whether this message is pinned
    AuditLogEntry:
      type: object
      required:
      - id
      - action
      - resource_type
      - resource_id
      - created_at
      properties:
        id:
          type: string
          description: Unique audit log entry ID
        user_id:
          type: string
          description: ID of the user who performed the action, when a human user
            is attributable
        actor_type:
          type: string
          description: Durable actor type that performed the action
        actor_id:
          type: string
          description: Durable actor ID that performed the action
        credential_id:
          type: string
          description: Credential ID used for the request, when applicable
        action:
          type: string
          enum:
          - create
          - update
          - delete
          description: Type of action performed
        resource_type:
          type: string
          description: Type of resource affected (e.g., task, channel, document)
        resource_id:
          type: string
          description: ID of the affected resource
        resource_name:
          type: string
          description: Human-readable name of the affected resource
        changes:
          type: object
          additionalProperties: true
          description: Object containing before/after changes for update actions
        ip_address:
          type: string
          description: IP address of the request
        user_agent:
          type: string
          description: User agent of the request
        created_at:
          type: string
          format: date-time
          description: Timestamp when the action was performed
    AuditLogListResponse:
      type: object
      required:
      - data
      - has_more
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        next_cursor:
          type: string
          description: Cursor for fetching next page of results
        has_more:
          type: boolean
          description: Whether more results are available
    APIKey:
      type: object
      required:
      - id
      - name
      - key_prefix
      - scope
      - created_at
      - updated_at
      properties:
        id:
          type: string
        name:
          type: string
        key_prefix:
          type: string
          description: First 8 characters of the key for identification
        scope:
          type: string
          enum:
          - org
          - system
        permissions:
          type: array
          items:
            type: string
        service_account_id:
          type: string
        expires_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    APIKeyDataResponse:
      type: object
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/APIKey'
    APIKeyCreateResult:
      type: object
      required:
      - id
      - name
      - key_prefix
      - scope
      - created_at
      - updated_at
      - key
      properties:
        id:
          type: string
        name:
          type: string
        key_prefix:
          type: string
          description: First 8 characters of the key for identification
        scope:
          type: string
          enum:
          - org
          - system
        permissions:
          type: array
          items:
            type: string
        service_account_id:
          type: string
        expires_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        key:
          type: string
          description: The raw API key (shown only once)
    APIKeyCreateResultDataResponse:
      type: object
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/APIKeyCreateResult'
    APIKeyListResponse:
      type: object
      required:
      - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/APIKey'
    CreateAPIKeyRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        scope:
          type: string
          enum:
          - org
          - system
          default: org
        permissions:
          type: array
          items:
            type: string
        service_account_id:
          type: string
        expires_at:
          type: string
          format: date-time
    ConfirmDeviceCodeRequest:
      type: object
      required:
      - user_code
      properties:
        user_code:
          type: string
        label:
          type: string
    ConfirmDeviceCodeResult:
      type: object
      required:
      - confirmed
      properties:
        confirmed:
          type: boolean
    CLICredentialStatus:
      type: string
      enum:
      - active
      - revoked
    CLICredential:
      type: object
      required:
      - id
      - org_id
      - user_id
      - label
      - token_prefix
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
        org_id:
          type: string
        user_id:
          type: string
        label:
          type: string
        token_prefix:
          type: string
        status:
          $ref: '#/components/schemas/CLICredentialStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    CLICredentialListResponse:
      type: object
      required:
      - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CLICredential'
    WorkflowSpec:
      type: object
      required:
      - name
      - steps
      description: 'Workflow definition shaped like `workflow.Options`.


        Authoring rule: `action` is the canonical field for executable steps.

        When `action_kind` is omitted, `action` uses worker/job semantics.

        Use `action_kind: "server"` for Mobius-managed server actions such as

        platform integrations or custom HTTP-backed actions.

        '
      additionalProperties: false
      properties:
        name:
          type: string
          description: Workflow name.
        description:
          type: string
        start_at:
          type: string
          description: Step name to start execution from. Defaults to the first step.
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowInput'
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowOutput'
        state:
          type: object
          additionalProperties: true
          description: Initial workflow state.
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStep'
    WorkflowInput:
      type: object
      required:
      - name
      - type
      additionalProperties: false
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
        default:
          description: Optional default value.
    WorkflowOutput:
      type: object
      required:
      - name
      - variable
      additionalProperties: false
      properties:
        name:
          type: string
        variable:
          type: string
        branch:
          type: string
          description: Defaults to `main` when omitted.
        description:
          type: string
    WorkflowStep:
      description: 'A workflow step. Exactly one step shape should be used.

        '
      oneOf:
      - $ref: '#/components/schemas/WorkflowExecutableStep'
      - $ref: '#/components/schemas/WorkflowJoinStep'
      - $ref: '#/components/schemas/WorkflowWaitSignalStep'
      - $ref: '#/components/schemas/WorkflowSleepStep'
      - $ref: '#/components/schemas/WorkflowPauseStep'
      - $ref: '#/components/schemas/WorkflowInteractionStep'
    WorkflowStepBase:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        description:
          type: string
        next:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
        each:
          $ref: '#/components/schemas/WorkflowEach'
    WorkflowExecutableStep:
      allOf:
      - $ref: '#/components/schemas/WorkflowStepBase'
      - type: object
        required:
        - action
        properties:
          action:
            type: string
            description: 'Canonical executable-step field.

              When `action_kind` is omitted, the engine treats this as a worker action.

              Use `action_kind: server` for Mobius-managed server actions.

              '
          action_kind:
            $ref: '#/components/schemas/WorkflowActionKind'
          store:
            type: string
          parameters:
            type: object
            additionalProperties: true
          retry:
            type: array
            items:
              $ref: '#/components/schemas/WorkflowRetry'
          catch:
            type: array
            items:
              $ref: '#/components/schemas/WorkflowCatch'
      example:
        name: summarize
        action: summarize-document
        parameters:
          doc_id: ${inputs.doc_id}
    WorkflowJoinStep:
      allOf:
      - $ref: '#/components/schemas/WorkflowStepBase'
      - type: object
        required:
        - join
        properties:
          join:
            $ref: '#/components/schemas/WorkflowJoinConfig'
    WorkflowWaitSignalStep:
      allOf:
      - $ref: '#/components/schemas/WorkflowStepBase'
      - type: object
        required:
        - wait_signal
        properties:
          wait_signal:
            $ref: '#/components/schemas/WorkflowWaitSignalConfig'
    WorkflowSleepStep:
      allOf:
      - $ref: '#/components/schemas/WorkflowStepBase'
      - type: object
        required:
        - sleep
        properties:
          sleep:
            $ref: '#/components/schemas/WorkflowSleepConfig'
    WorkflowPauseStep:
      allOf:
      - $ref: '#/components/schemas/WorkflowStepBase'
      - type: object
        required:
        - pause
        properties:
          pause:
            $ref: '#/components/schemas/WorkflowPauseConfig'
    WorkflowInteractionStep:
      allOf:
      - $ref: '#/components/schemas/WorkflowStepBase'
      - type: object
        required:
        - interaction
        properties:
          interaction:
            $ref: '#/components/schemas/WorkflowInteractionConfig'
    WorkflowActionKind:
      type: string
      enum:
      - worker
      - server
      description: 'Execution mode for `action` steps.

        Omit for the current default of `worker`.

        '
    WorkflowEdgeMatchingStrategy:
      type: string
      enum:
      - all
      - first
    WorkflowEdge:
      type: object
      required:
      - step
      additionalProperties: false
      properties:
        step:
          type: string
        condition:
          type: string
        branch:
          type: string
    WorkflowEach:
      type: object
      required:
      - items
      additionalProperties: false
      properties:
        items:
          description: Expression or literal collection to iterate over.
        as:
          type: string
    WorkflowRetry:
      type: object
      additionalProperties: false
      properties:
        error_equals:
          type: array
          items:
            type: string
        max_retries:
          type: integer
          minimum: 0
        base_delay:
          type: string
          description: Go duration string.
        max_delay:
          type: string
          description: Go duration string.
        backoff_rate:
          type: number
        jitter_strategy:
          type: string
          enum:
          - NONE
          - FULL
        timeout:
          type: string
          description: Go duration string.
    WorkflowCatch:
      type: object
      required:
      - error_equals
      - next
      additionalProperties: false
      properties:
        error_equals:
          type: array
          items:
            type: string
        next:
          type: string
        store:
          type: string
    WorkflowJoinConfig:
      type: object
      properties:
        branches:
          type: array
          items:
            type: string
        count:
          type: integer
          minimum: 0
        branch_mappings:
          type: object
          additionalProperties:
            type: string
    WorkflowWaitSignalConfig:
      type: object
      required:
      - topic
      - timeout
      additionalProperties: false
      properties:
        topic:
          type: string
        timeout:
          type: string
          description: Go duration string.
        store:
          type: string
        on_timeout:
          type: string
    WorkflowSleepConfig:
      type: object
      required:
      - duration
      additionalProperties: false
      properties:
        duration:
          type: string
          description: Go duration string.
    WorkflowPauseConfig:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
    WorkflowInteractionConfig:
      type: object
      required:
      - type
      - message
      - target
      - timeout
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
          - approval
          - review
          - input
        message:
          type: string
        context:
          type: object
          additionalProperties: true
        spec:
