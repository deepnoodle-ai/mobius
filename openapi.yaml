  /v1/triggers/http/{http_handle}:
    post:
      operationId: deliverHTTPTrigger
      tags:
      - loops
      summary: Deliver trigger
      description: Public endpoint for delivering an HTTP-trigger event. It resolves `http_handle`,
        commits a durable source-event row, and starts the run asynchronously. Reusing the
        same idempotency key returns the same `source_event_id`.
      security: []
      parameters:
      - name: http_handle
        in: path
        required: true
        description: Globally unique identifier for the trigger. The endpoint carries no project
          context, so the handle is resolved on its own; it defaults to the trigger's globally
          unique id and is treated as an unguessable delivery token.
        schema:
          type: string
      - name: idempotency_key
        in: query
        required: false
        schema:
          type: string
        description: Optional idempotency key (also accepted via the X-Idempotency-Key header).
      - name: X-Idempotency-Key
        in: header
        required: false
        schema:
          type: string
        description: Alternative to the `idempotency_key` query parameter. When both are present
          the query parameter wins. Repeats with the same key return the same `source_event_id`
          (resolve the run via `source_event_id`) without enqueuing a duplicate.
      - name: X-Mobius-Signature
        in: header
        required: false
        schema:
          type: string
        description: HMAC-SHA256 signature of the raw request body under the trigger's signing
          secret, formatted as `sha256=<hex>`. Required only when the HTTP trigger has a signing
          secret configured; unsigned deliveries are accepted for triggers without one.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HTTPTriggerDeliveryRequest'
            example:
              customer_id: cus_123
              event_type: invoice.paid
              amount_cents: 4200
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPTriggerDeliveryResult'
              example:
                source_event_id: sevt_01HHTTPTRIGGER
                status: accepted
                deduped: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: invalid_signature
                  message: missing or invalid request signature
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: payload_too_large
                  message: request body exceeds the maximum allowed size
  /v1/projects/{project_handle}/loops/{resource_id}/runs:
    post:
      operationId: startRun
      tags:
      - runs
      summary: Start run
      description: Resolves `{resource_id}` to the current runnable loop definition and starts
        a run. Returns the created run when accepted, or the existing run when the request
        carries an `idempotency_key` that matches a still-active prior run. Reusing the key
        after the prior run is terminal returns `409 Conflict`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartLoopRunRequest'
            example:
              inputs:
                issue_id: '42'
              source:
                type: api
                id: review-service
                label: review-service
              idempotency_key: review-service:issue-42
              credit_budget: 1000
      responses:
        '202':
          description: Accepted. Returns the run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoopRun'
              example:
                id: run_8q5m2x9v7p3n4r6t
                loop_id: loop_9q2m7x5v3p8n4r6t
                loop_name: Daily security check
                loop_version_id: lver_4v9n2q7m5x8p3r6t
                loop_version: 3
                status: queued
                inputs:
                  issue_id: '42'
                  repository: deepnoodle-ai/mobius-cloud
                source:
                  type: api
                  id: review-service
                  label: review-service
                created_at: '2026-06-15T14:00:00Z'
                updated_at: '2026-06-15T14:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
