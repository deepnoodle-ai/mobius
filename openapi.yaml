    CreateAPIKeyRequest:
      type: object
      required:
      - name
      - principal_id
      additionalProperties: false
      description: Request shape for creating a project API key bound to a machine principal.
        The key authenticates as that principal; permissions are managed by assigning roles
        to the principal, not by granting permissions to the key.
      properties:
        name:
          type: string
          description: Human-readable label, unique within the project.
        principal_id:
          type: string
          description: Principal this key authenticates as.
        scope_role_id:
          type: string
          description: Optional role whose permissions cap this key below its principal's
            full grants.
        allow_unassigned_principal:
          type: boolean
          default: false
          description: Allow minting a key for a principal with no project role assignments.
            The resulting key cannot access project resources until a role is assigned. Omit
            this for normal onboarding so a missing assignment fails with `principal_has_no_roles`.
        expires_at:
          type: string
          format: date-time
          description: Optional hard expiry. Omit for a non-expiring key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Labels to apply to the new API key.
      example:
        name: CI worker
        principal_id: svc_7q2v9x6m3n8p5r4t
        tags:
          owner: product
    CreateOrgAPIKeyRequest:
      type: object
      required:
      - name
      additionalProperties: false
      description: Request shape for creating an organization-level API key. The key authenticates
        as the organization's system principal and acts with the chosen `role` applied org-wide
        across every project.
      properties:
        name:
          type: string
          description: Human-readable label, unique among organization API keys.
        role:
          type: string
          enum:
          - Owner
          - Admin
          - Editor
          - Operator
          - Viewer
          default: Admin
          description: System role the key acts as, applied org-wide across every project.
            Defaults to `Admin`. `Owner` grants full control (including billing and org deletion);
            `Admin` covers org and project administration without billing; lower roles narrow
            to build/run, run-only, or read-only.
        expires_at:
          type: string
          format: date-time
          description: Optional hard expiry. Omit for a non-expiring key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Labels to apply to the new API key.
      example:
        name: Org automation
        role: Admin
        tags:
          owner: platform
    ActionAnnotationsRequest:
      type: object
      additionalProperties: false
      description: Request hints that describe the safe-use properties of the action. Used
        by the engine and tooling to decide retry behavior, dry-run eligibility, etc. Unknown
        request properties are rejected.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    ActionAnnotations:
      type: object
      additionalProperties: true
      description: Response hints that describe the safe-use properties of the action. Response
        annotations are forward-compatible so the server can add response-only hints without
        breaking strict clients.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    ActionEndpointKind:
      type: string
      enum:
      - http
      - worker
      description: Backing kind for a project-owned custom action. `http` actions POST to
        a registered endpoint. `worker` actions dispatch jobs to connected workers that advertise
        the registered action name.
    ActionInvocationFormat:
      type: string
      enum:
      - legacy
      - signed_context_v1
      description: Outbound request-body contract for an HTTP action. `legacy` sends the unversioned
        `{run_id, step_key, parameters}` body. `signed_context_v1` sends a versioned envelope
        whose project, action, actor, and origin claims are derived by Mobius and covered
        by the existing HMAC signature. Worker-backed actions must use `legacy`.
    CreateActionRequest:
      type: object
      additionalProperties: false
      description: Registers a project-owned custom action callable from loops and agents.
      required:
      - name
      properties:
        name:
          type: string
          description: Identifier used in loop step definitions. Lowercase alphanumeric +
            hyphens, e.g. "send-email". Must be unique within the project. Cannot start with
            "mobius." (reserved prefix).
        title:
          type: string
          description: Human-readable display name shown in the UI and catalog.
        description:
          type: string
          description: Markdown-safe description of what the action does.
        endpoint_kind:
          type: string
          allOf:
          - $ref: '#/components/schemas/ActionEndpointKind'
          default: http
          description: Backing kind for the action. `http` actions POST to `endpoint_url`
            with a Mobius signature. `worker` actions are dispatched through jobs to connected
            workers that advertise this registered name.
        invocation_format:
          allOf:
          - $ref: '#/components/schemas/ActionInvocationFormat'
          default: legacy
          description: 'Request-body contract for HTTP invocations. Omit to preserve the legacy
            body. `signed_context_v1` is valid only with `endpoint_kind: http`.'
        endpoint_url:
          type: string
          format: uri
          description: Required when endpoint_kind is `http`; omitted for worker actions.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsRequest'
          description: Safe-use hints used by execution and authoring tools.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Free-form labels used for filtering, ownership, or lifecycle policy.
      example:
        name: review-pr
        title: Review PR
        description: Review a pull request and return findings.
        endpoint_kind: http
        invocation_format: signed_context_v1
        endpoint_url: https://hooks.example.com/mobius/review-pr
        input_schema:
          type: object
          required:
          - pull_request_url
          properties:
            pull_request_url:
              type: string
        output_schema:
          type: object
          properties:
            findings:
              type: array
              items:
                type: string
        annotations:
          idempotent: true
          destructive: false
          read_only: true
        tags:
          owner: product
    UpdateActionRequest:
      type: object
      additionalProperties: false
      description: Updates action metadata, endpoint, schemas, or safe-use hints.
      properties:
        title:
          type: string
          description: Replacement display title.
        description:
          type: string
          description: Replacement Markdown description.
        endpoint_url:
          type: string
          format: uri
          description: Replacement endpoint URL. Valid for HTTP actions only.
        invocation_format:
          allOf:
          - $ref: '#/components/schemas/ActionInvocationFormat'
          description: Replacement HTTP request-body contract. `signed_context_v1` is valid
            only for HTTP-backed actions.
        input_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for inputs. Replaces the existing schema.
        output_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for outputs. Replaces the existing schema.
        annotations:
          type: object
          allOf:
          - $ref: '#/components/schemas/ActionAnnotationsRequest'
          nullable: true
          description: Pass null to clear all annotation flags.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Replacement labels; send an empty object to clear all tags.
    Action:
      type: object
      additionalProperties: false
      description: Project-owned custom action definition callable by loops and agents.
      required:
      - id
      - name
      - endpoint_kind
      - invocation_format
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this action.
        name:
          type: string
          description: Stable identifier used in loop definitions.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          allOf:
          - $ref: '#/components/schemas/ActionEndpointKind'
          description: Backing kind of this project-owned action. `http` actions POST to an
            endpoint URL. `worker` actions are dispatched through jobs to connected workers
            that advertise this registered name.
        invocation_format:
          $ref: '#/components/schemas/ActionInvocationFormat'
          description: Resolved outbound request-body contract for this action.
        endpoint_url:
          type: string
          format: uri
          description: 'HTTP/HTTPS URL Mobius POSTs to when invoking this action. Populated
            for endpoint_kind: http only.'
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotations'
          description: Safe-use hints returned for this action.
