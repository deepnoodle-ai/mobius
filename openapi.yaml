openapi: 3.0.3
info:
  title: Mobius API
  version: 0.1.0
  contact:
    name: Mobius
    url: https://mobiusops.ai
  description: |-
    Mobius is an agent loop platform for mixed teams of humans, systems, and AI agents. This is the HTTP API behind the `mobius` CLI and the official client SDKs.

    **Base URL.** Production is `https://api.mobiusops.ai`. Every route is prefixed with the stable major version `/v1`; breaking changes ship under a new prefix, not in place. The `version` field above tracks revisions of this specification, independent of the `/v1` URL version.

    **Authentication.** Send a credential in the `Authorization: Bearer <credential>` header. Project **API keys** (prefix `mbx_`) authenticate as a machine principal in one project and are issued from the Mobius app or the API-key endpoints; **CLI credentials** (prefix `mbc_`) are issued by the device-authorization flow on behalf of a user. See the `BearerAuth` security scheme for details.

    **Conventions.** Collections return a cursor-paginated envelope (`items` / `has_more` / `next_cursor`); single resources return the bare object. Errors use a shared envelope with a stable machine-readable `error.code`. Timestamps are ISO-8601 UTC.
servers:
- url: https://api.mobiusops.ai
  description: Production
- url: http://localhost:8080
  description: Local development
security:
- BearerAuth: []
tags:
- name: api-keys
  x-displayName: API Keys
  description: Organization and project API keys used for programmatic authentication.
- name: actions
  x-displayName: Actions
  description: Project and catalog actions invoked by agents and loop steps.
- name: catalog
  x-displayName: Catalog
  description: Catalog API operations.
- name: environments
  x-displayName: Environments
  description: Provider-backed isolated workspaces allocated to agents and loop runs.
- name: jobs
  x-displayName: Jobs
  description: The worker WebSocket protocol used by customer-side workers to claim, run,
    and report jobs.
- name: projects
  x-displayName: Projects
  description: Project records, membership, defaults, and configuration.
- name: webhooks
  x-displayName: Webhooks
  description: Outgoing webhook subscriptions, tests, and delivery history.
- name: agents
  x-displayName: Agents
  description: Agent identities, sessions, presence, and lifecycle administration.
- name: loops
  x-displayName: Loops
  description: Loop definitions, versions, publication, and the triggers that start runs.
- name: runs
  x-displayName: Runs
  description: Durable loop run executions with their steps and event streams.
- name: toolkits
  x-displayName: Toolkits
  description: Project-local and system toolkit templates that grant agents access to action
    selectors.
- name: skills
  x-displayName: Skills
  description: Project-local and system skill templates used to shape agent behavior and requested
    tools.
- name: tables
  x-displayName: Tables
  description: Agent-readable and -writable project tables.
- name: artifacts
  x-displayName: Artifacts
  description: Files produced by agents during loop runs and stored for later inspection.
paths:
  /v1/projects/{project_handle}/api-keys:
    post:
      operationId: createAPIKey
      tags:
      - api-keys
      summary: Create API key
      description: Creates an API key bound to a machine principal in this project. The key
        authenticates as that principal; associated permissions come from that principal's
        role assignments. The raw key value is returned in `key` and is never retrievable
        again after this response.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
            example:
              name: CI worker
              principal_id: svc_7q2v9x6m3n8p5r4t
              expires_at: '2026-09-15T14:30:00Z'
              tags:
                owner: product
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyCreateResult'
              example:
                id: cred_1jz8q2m7xp9vn4kt
                name: CI worker
                key_prefix: mbx_7q2v
                principal_id: svc_7q2v9x6m3n8p5r4t
                expires_at: '2026-09-15T14:30:00Z'
                tags:
                  owner: product
                created_at: '2026-06-15T14:30:00Z'
                updated_at: '2026-06-15T14:30:00Z'
                key: mbx_7q2v9k1m_redacted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    get:
      operationId: listAPIKeys
      tags:
      - api-keys
      summary: List API keys
      description: Returns API keys for this project, including pagination metadata.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project_handle}/api-keys/{resource_id}:
    get:
      operationId: getAPIKey
      tags:
      - api-keys
      summary: Get API key
      description: Returns metadata for a single API key without exposing the raw secret.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAPIKey
      tags:
      - api-keys
      summary: Delete API key
      description: Permanently deletes the key. In-flight requests using this key will immediately
        start receiving 401.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/actions:
    post:
      operationId: createAction
      tags:
      - actions
      summary: Create action
      description: Registers a project-owned custom action definition. HTTP actions require
        `endpoint_url` and receive a signing secret. Worker-backed actions omit `endpoint_url`;
        compatible workers make the registered action ready by advertising its name when connected.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActionRequest'
            example:
              name: review-pr
              title: Review PR
              description: Review a pull request and return findings.
              endpoint_kind: http
              endpoint_url: https://hooks.example.com/mobius/review-pr
              input_schema:
                type: object
                required:
                - pull_request_url
                properties:
                  pull_request_url:
                    type: string
              annotations:
                idempotent: true
                read_only: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
              example:
                id: act_8m4x9q2v7p5n3r6t
                name: review-pr
                title: Review PR
                description: Review a pull request and return findings.
                endpoint_kind: http
                endpoint_url: https://hooks.example.com/mobius/review-pr
                input_schema:
                  type: object
                  required:
                  - pull_request_url
                  properties:
                    pull_request_url:
                      type: string
                annotations:
                  idempotent: true
                  destructive: false
                  read_only: true
                tags:
                  owner: product
                secret_ref: mobius/action/act_8m4x9q2v7p5n3r6t
                secret_version: 1
                created_at: '2026-06-15T14:30:00Z'
                updated_at: '2026-06-15T14:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/actions/{action_name}:
    patch:
      operationId: updateAction
      tags:
      - actions
      summary: Update action
      description: Updates action metadata, schemas, annotations, tags, or the HTTP endpoint
        URL. Worker-backed actions cannot set an endpoint URL.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ActionNameParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActionRequest'
            example:
              title: Review PR
              description: Review a pull request and return prioritized findings.
              tags:
                owner: product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: deleteAction
      tags:
      - actions
      summary: Delete action
      description: Deletes a project-owned custom action definition. Loops that still reference
        the action block deletion until the reference is removed.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ActionNameParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/actions/{action_name}/secret/rotate:
    post:
      operationId: rotateActionSecret
      tags:
      - actions
      summary: Rotate signing secret
      description: Rotates the signing secret for an HTTP-backed custom action. Worker actions
        do not have signing secrets and return a validation error.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ActionNameParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateSecretResult'
              example:
                secret_ref: mobius/action/deploy_preview
                secret_version: 2
                signing_secret: redacted_base64_signing_secret
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/action-invocations:
    get:
      operationId: listActionInvocations
      tags:
      - actions
      summary: List invocations
      description: Lists recent action invocation audit records from loops, agents, direct
        invocations, and job-backed execution.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - name: run_id
        in: query
        description: Filter to invocations from a specific loop run.
        schema:
          type: string
      - name: job_id
        in: query
        description: Filter to invocations from a specific job.
        schema:
          type: string
      - name: action_name
        in: query
        description: Filter to invocations of a specific action.
        schema:
          type: string
      - name: status
        in: query
        description: Filter by terminal status (e.g. "success", "failed").
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionInvocationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/projects/{project_handle}/actions/{action_name}/invoke:
    post:
      operationId: invokeAction
      tags:
      - actions
      summary: Invoke action
      description: Invokes a catalog action through the same job-backed execution surface
        used by loops. HTTP and managed platform actions are dispatched to Mobius server workers;
        worker-backed custom actions are dispatched to compatible customer workers.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ActionNameParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvokeActionRequest'
            example:
              input:
                channel: '#product'
                text: Deployment finished.
              timeout_seconds: 30
              dry_run: false
      responses:
        '200':
          description: OK — invocation completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionInvocationResult'
              example:
                status: completed
                job_id: job_2m7x9q5v8p3n4r6t
                output:
                  message_ts: '1718461800.000100'
        '202':
          description: Accepted — asynchronous invocation is still active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionInvocationResult'
              example:
                status: active
                job_id: job_2m7x9q5v8p3n4r6t
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/catalog/events:
    get:
      operationId: listCatalogEvents
      tags:
      - catalog
      summary: List events
      description: Returns triggerable event sources for this project, including built-in
        platform sources and connected integration providers. Each source lists its active
        event types, readiness, and any reserved matcher prefixes the authoring UI should
        recognize.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCatalogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/projects/{project_handle}/catalog/actions:
    get:
      operationId: listCatalogActions
      tags:
      - catalog
      summary: List actions
      description: 'Returns the full catalog of actions available to this project: project-owned
        HTTP actions and platform-provided integration actions (Slack, GitHub, etc.). The
        `available` flag indicates whether the action can currently be invoked. Custom HTTP
        actions are created and managed on the `/actions` resource.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionCatalogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/projects/{project_handle}/catalog/actions/{action_name}:
    get:
      operationId: getCatalogAction
      tags:
      - catalog
      summary: Get action
      description: Returns availability status, schemas, and metadata for a single catalog
        entry.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ActionNameParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionCatalogEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project_handle}/catalog/models:
    get:
      operationId: listCatalogModels
      tags:
      - catalog
      summary: List models
      description: Returns assignable agent models grouped by provider. Providers appear only
        when the project has usable credentials, either from BYOK integration state or platform-managed
        configuration.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelCatalogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project_handle}/environments:
    get:
      operationId: listEnvironments
      tags:
      - environments
      summary: List environments
      description: Returns project environments visible to the caller, newest-first. Filters
        let clients narrow by lifecycle status, run, and recently destroyed tombstones.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - name: status
        in: query
        description: Filter by environment lifecycle status.
        schema:
          $ref: '#/components/schemas/EnvironmentStatus'
      - name: run_id
        in: query
        description: Filter to environments created for the given run.
        schema:
          type: string
      - name: include_destroyed
        in: query
        description: Include destroyed environments in the result. By default destroyed rows
          are excluded; set this to true (or pass status=destroyed) to see them.
        schema:
          type: boolean
          default: false
      - name: destroyed_since
        in: query
        description: Narrow destroyed rows to those torn down at or after this timestamp.
          Composes with `status=destroyed` to fetch a "recently destroyed" tombstone window
          (e.g. last hour). Non-destroyed rows are unaffected when this is combined with the
          default (no-status) view.
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createEnvironment
      tags:
      - environments
      summary: Create environment
      description: Creates a durable execution environment record and provisions it with the
        selected provider. The server resolves scope and ownership before enforcing uniqueness
        for the environment name.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEnvironmentRequest'
            example:
              name: review-workspace
              provider: sprites
              template_id: coding-default
              tags:
                owner: product
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
              example:
                id: env_8q5m2x9v7p3n4r6t
                name: review-workspace
                provider: sprites
                status: provisioning
                lifetime: explicit
                tags:
                  owner: product
                cleanup_status: none
                retention_policy: manual
                created_at: '2026-06-15T14:30:00Z'
                updated_at: '2026-06-15T14:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/environments/{environment_id}:
    get:
      operationId: getEnvironment
      tags:
      - environments
      summary: Get environment
      description: Returns the current environment record, including provider status, lease
        metadata, ownership, binding, and retention settings.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/EnvironmentIDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateEnvironment
      tags:
      - environments
      summary: Update environment
      description: Only scope, owned_by, and tags are mutable from the public API.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/EnvironmentIDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEnvironmentRequest'
            example:
              tags:
                owner: product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: destroyEnvironment
      tags:
      - environments
      summary: Destroy environment
      description: Requests provider teardown for the environment and records the destroyed
        state in Mobius. The response includes the final environment snapshot after the destroy
        request is accepted.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/EnvironmentIDParam'
      responses:
        '200':
          description: Destroyed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/workers/socket:
    get:
      operationId: openWorkerSocket
      tags:
      - jobs
      summary: Open worker WebSocket
      description: Upgrades to the worker WebSocket protocol. Workers authenticate with normal
        project credentials, send `worker.register`, then exchange typed JSON frames for claim,
        heartbeat, report, cancellation, and generation streaming.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '101':
          description: WebSocket upgrade accepted.
        '200':
          description: Placeholder response for OpenAPI tooling; successful clients receive
            a 101 upgrade.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerSocketFrame'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects:
    get:
      operationId: listProjects
      tags:
      - projects
      summary: List projects
      description: Returns up to 100 projects. Use `search` for prefix-match filtering by
        name or handle. Deleted projects are omitted from normal list responses.
      parameters:
      - name: search
        in: query
        description: Prefix-match filter applied to project name and handle.
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createProject
      tags:
      - projects
      summary: Create project
      description: Creates a project within the authenticated org. If `handle` is omitted
        it is auto-derived from `name` (lowercased, spaces replaced with hyphens). Returns
        409 if the handle already exists in the org.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
            example:
              name: Product Ops
              handle: product-ops
              description: Product operations workflows
              access_mode: restricted
              tags:
                owner: product
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
