      summary: Fetch artifact bytes
      description: 'By default returns a 302 redirect to a fresh presigned GET URL. When `inline=true`
        and the artifact''s mime is on the safe-preview allowlist (image/png, image/jpeg,
        image/webp, image/gif, application/json, text/plain), bytes stream directly with `X-Content-Type-Options:
