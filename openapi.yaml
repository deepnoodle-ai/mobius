          description: 'Verdict document for `check`-kind steps: `verdict`, `on_fail`, `checks`
            (per-assertion results — name, kind, pass, expr or judge reason, judge identity,
            evidence refs), `failed` (red assertion names), and `overridden_by` / `gate` records
            when an approval gate resolved the verdict.'
        started_at:
