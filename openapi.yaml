          description: Canonical action name the selector resolved to, when the grant matched
            a real catalog entry that the service account is not permitted to invoke.
        reason:
          type: string
          description: Why the grant is currently blocked (e.g. missing permission, archived
            action).
        permission_id:
          type: string
          description: ID of the missing permission, when the block was caused by an authorization
            gap.
    ResolvedActionGroup:
      type: object
      additionalProperties: false
      required:
      - name
      - members
      properties:
        name:
          type: string
          description: Canonical group name (e.g. `mobius.table.read`).
        members:
          type: array
          description: Action names the group expanded to during this resolution.
          items:
            type: string
    AgentToolManifest:
      type: object
      additionalProperties: false
      required:
      - agent_id
      - project_id
      - policy_hash
      - toolkit_ids
      - tools
      - skills
      - warnings
      - blocked_grants
      description: 'The flat, resolved tool set visible to one agent. Replaces the prior Capability/Action
        split: every entry in `tools` is an action catalog entry the agent can invoke as its
        own named tool.'
      properties:
        agent_id:
          type: string
          description: Agent this manifest was resolved for.
        project_id:
          type: string
          description: Project the manifest is scoped to.
        policy_hash:
          type: string
          description: Stable hash over the resolved tool + skill set; bumps when grants or
            permissions change.
        toolkit_ids:
          type: array
          description: Toolkit IDs that contributed to the resolved manifest.
          items:
            type: string
        tools:
          type: array
          description: Catalog entries the agent can invoke. Each entry surfaces to the LLM
            as its own named tool. Built-in, integration, automation, and custom-HTTP actions
            are intermingled here.
          items:
            $ref: '#/components/schemas/ActionCatalogEntry'
        groups_resolved:
          type: array
          description: Audit trail of group selectors that contributed to the resolved tool
            set. Operators see groups; the LLM only sees the flat `tools` list.
          items:
            $ref: '#/components/schemas/ResolvedActionGroup'
        skills:
          type: array
          description: Skills active for this agent in the resolved manifest.
          items:
            $ref: '#/components/schemas/SkillManifestEntry'
        warnings:
          type: array
          description: Non-fatal issues encountered while resolving the manifest.
          items:
            $ref: '#/components/schemas/AgentManifestWarning'
        blocked_grants:
          type: array
          description: Grants that resolved to a catalog entry the agent cannot currently
            invoke.
          items:
            $ref: '#/components/schemas/AgentBlockedGrant'
    CreateAgentRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        service_account_id:
          type: string
          description: Service account that backs this agent. Must be active, belong to the
            same project, and currently back zero other agents. If omitted, a new service
            account is auto-created with the same name as the agent.
        role_ids:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: Roles to assign to the auto-created service account. Mutually exclusive
            with `service_account_id` (the existing SA already carries its own role assignments
            — change them via the service-accounts endpoints). When omitted, the SA inherits
            the project's `default_agent_role_id`, falling through to the system `Agent` role
            floor when unset.
        name:
          type: string
          description: Project-scoped unique name for this agent. Free-form human-readable
            label, 1-63 characters.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform classification (e.g. "llm", "rpa", "integration").
        color:
          type: string
          description: Display color for this agent (Mantine palette key, e.g. `indigo`).
            Optional; empty falls back to a hash-derived color.
          maxLength: 24
        capabilities:
          type: object
          additionalProperties: true
          description: Arbitrary capability map used by orchestrators to select suitable agents.
        model:
          type: string
          description: Anthropic model identifier for platform agents (e.g. `claude-sonnet-4-6`).
            Empty falls back to the platform default.
        system_prompt:
          type: string
          description: Custom system prompt for platform agents. Empty uses the generated
            default.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateAgentRequest:
      type: object
      additionalProperties: false
      description: 'Mutable agent fields. `service_account_id` is intentionally absent: the
        SA↔Agent binding is immutable per the 1:1 invariant. Reassigning identity is delete-and-recreate.'
      properties:
        name:
          type: string
          description: Free-form human-readable label, 1-63 characters; must be unique within
            the project.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Replacement description.
          maxLength: 500
        kind:
          type: string
          description: Replacement freeform agent classification (e.g. `llm`, `rpa`).
        color:
          type: string
          description: Replacement display color (Mantine palette key, e.g. `indigo`). Pass
            empty string to clear and fall back to a hash-derived color.
          maxLength: 24
        capabilities:
          type: object
          additionalProperties: true
          description: Replacement capability map.
        model:
          type: string
          description: Replacement Anthropic model identifier for platform agents.
        system_prompt:
          type: string
          description: Replacement system prompt for platform agents.
        status:
          type: string
          enum:
          - active
          - inactive
          description: 'Replacement agent status: `active` or `inactive`. Use DELETE to soft-delete.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the agent. System tags
            (`mobius:*`) are preserved.
    Automation:
      type: object
      additionalProperties: false
      description: An automation. The `triggers` array reports the currently materialized
        runnable triggers. Desired triggers are authored in `AutomationSpec.triggers` and
        reconciled when a version is published.
      required:
      - id
      - org_id
      - project_id
      - handle
      - name
      - status
      - latest_version
      - triggers
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable automation identifier.
        org_id:
          type: string
          description: Organization that owns this automation.
        project_id:
          type: string
          description: Project that owns this automation.
        handle:
          type: string
          description: Stable per-project automation handle. Immutable after creation.
        name:
          type: string
          description: Human-readable display name.
        description:
          type: string
          description: Markdown description of the automation's purpose.
        status:
          $ref: '#/components/schemas/AutomationStatus'
        owner_user_id:
          type: string
          description: User who created or currently owns this automation.
        default_agent_id:
          type: string
          description: Agent used by `agent` steps that do not pin an agent explicitly.
        latest_version:
          type: integer
          description: Newest stored AutomationVersion number, regardless of publication status.
        published_version:
          type: integer
          description: Currently runnable version. Absent until a version is published.
        default_inputs:
          type: object
          additionalProperties: true
          description: Default values merged into `inputs` when a run is started without overrides.
        settings:
          type: object
          additionalProperties: true
          description: Free-form automation-level settings consumed by the engine.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Free-form label map used to organise automations in listings and search.
        triggers:
          type: array
          description: Triggers that can start runs of this automation.
          items:
            $ref: '#/components/schemas/AutomationTrigger'
        last_run_at:
          type: string
          format: date-time
          description: Timestamp of the most recent run start, if any.
        archived_at:
          type: string
          format: date-time
          description: Soft-archive timestamp; absent on active automations.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
    AutomationStatus:
      type: string
      enum:
      - draft
      - active
      - paused
      - archived
      description: Lifecycle status of an automation.
    AutomationListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Automation'
        next_cursor:
          type: string
          description: Opaque cursor for the next page; absent when no more results.
        has_more:
          type: boolean
          description: True when more items exist after this page.
    CreateAutomationRequest:
      type: object
      additionalProperties: false
      required:
      - handle
      - name
      properties:
        handle:
          type: string
          description: Stable per-project automation handle. Immutable after creation.
        name:
          type: string
          description: Human-readable display name.
        description:
          type: string
          description: Markdown description of the automation's purpose.
        default_agent_id:
          type: string
          description: Agent used by `agent` steps that do not pin an agent explicitly.
        default_inputs:
          type: object
          additionalProperties: true
          description: Default values merged into `inputs` when a run is started without overrides.
        settings:
          type: object
          additionalProperties: true
          description: Free-form automation-level settings consumed by the engine.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Free-form label map used to organise automations in listings and search.
    UpdateAutomationRequest:
      type: object
      additionalProperties: false
      description: Partial update of automation metadata. Desired triggers live in `AutomationSpec.triggers`
        and are materialized when a version is published.
      properties:
        name:
          type: string
          description: Human-readable display name.
        description:
          type: string
          description: Markdown description of the automation's purpose.
        status:
          $ref: '#/components/schemas/AutomationStatus'
        default_agent_id:
          type: string
          description: Agent used by `agent` steps that do not pin an agent explicitly.
        default_inputs:
          type: object
          additionalProperties: true
          description: Default values merged into `inputs` when a run is started without overrides.
        settings:
          type: object
          additionalProperties: true
          description: Free-form automation-level settings consumed by the engine.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Free-form label map used to organise automations in listings and search.
    AutomationVersion:
      type: object
      additionalProperties: false
      required:
      - id
      - org_id
      - project_id
      - automation_id
      - version
      - status
      - created_at
      properties:
        id:
          type: string
          description: Stable identifier for this AutomationVersion record.
        org_id:
          type: string
          description: Organization that owns this version.
        project_id:
          type: string
          description: Project that owns this version.
        automation_id:
          type: string
          description: Automation this version belongs to.
        version:
          type: integer
          description: Monotonic version number, unique per automation.
        status:
          type: string
          enum:
          - draft
          - published
          - superseded
          description: Publication state. `draft` is editable but not runnable; `published`
            is the currently runnable version; `superseded` is a prior published version retained
            for historical runs.
        spec:
          $ref: '#/components/schemas/AutomationSpec'
        compiled_plan:
          type: object
          additionalProperties: true
          description: Internal compiled execution plan derived from `spec`. Not part of the
            public contract.
        validation:
          type: object
          additionalProperties: true
          description: Validation result for `spec` produced at version-creation time.
        created_by:
          type: string
          description: User who authored this version.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
    AutomationSpec:
      type: object
      additionalProperties: false
      description: Authoring representation of an automation.
      required:
      - steps
      properties:
        schema_version:
          type: string
          enum:
          - '1'
          default: '1'
          description: Automation spec schema version. Current value is `1`.
        name:
          type: string
          description: Optional spec-local display name.
        description:
          type: string
          description: Optional spec-local Markdown description.
        inputs:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AutomationSpecInput'
        concurrency:
          type: string
          enum:
          - allow
          - queue
          - skip
          - replace
          description: Behavior when a run starts while another run of the same automation
            is active.
        triggers:
          type: array
          description: Desired triggers materialized when a version is published.
          items:
            $ref: '#/components/schemas/AutomationSpecTrigger'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/AutomationStep'
        cleanup:
          type: array
          items:
            type: object
            additionalProperties: true
        defaults:
          $ref: '#/components/schemas/AutomationSpecDefaults'
    AutomationSpecInput:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
        description:
          type: string
        required:
          type: boolean
        default:
          nullable: true
    AutomationSpecTrigger:
      type: object
      additionalProperties: false
      required:
      - kind
      properties:
        key:
          type: string
          description: Stable user-authored trigger key within the spec.
        name:
          type: string
          description: Human-readable trigger name.
        kind:
          type: string
          enum:
          - webhook
          - schedule
          - event
        enabled:
          type: boolean
        config:
          type: object
          additionalProperties: true
          description: Kind-specific trigger configuration.
        concurrency_policy:
          type: string
          enum:
          - allow
          - queue
          - skip
          - replace
        max_concurrent_runs:
          type: integer
          minimum: 1
    AutomationStep:
      type: object
      additionalProperties: false
      required:
      - key
      - kind
      - config
      properties:
        key:
          type: string
          description: Stable step key within the spec.
        name:
          type: string
          description: Human-readable step name.
        kind:
          type: string
          enum:
          - agent
          - action
          - sleep
          - wait_for_event
          - interaction
        config:
          oneOf:
          - $ref: '#/components/schemas/AutomationAgentStep'
          - $ref: '#/components/schemas/AutomationActionStep'
          - $ref: '#/components/schemas/AutomationSleepStep'
          - $ref: '#/components/schemas/AutomationWaitForEventStep'
          - $ref: '#/components/schemas/AutomationInteractionStep'
          description: Kind-specific step configuration.
        input:
          type: object
          additionalProperties: true
          description: Step-local input object resolved when the step starts. String leaves
            may contain `{{ inputs.* }}` or `{{ context.* }}` templates.
        retry:
          $ref: '#/components/schemas/AutomationRetryPolicy'
        timeout:
          $ref: '#/components/schemas/AutomationTimeoutPolicy'
        save_as:
          type: string
          description: Context key used to store this step's output. Defaults to `key`.
    AutomationSpecDefaults:
      type: object
      additionalProperties: false
      description: Run-level defaults inside the automation spec. Lives at `spec.defaults`
        in the JSON the engine compiles.
      properties:
        wall_clock_timeout:
          type: string
          description: Run wall-clock budget as a Go duration string (e.g. `30m`, `2h`, `90s`).
            When set, the engine stamps `wall_clock_deadline_at = run.started_at + wall_clock_timeout`
            and the reaper fails the run after that instant even if a step executor is still
            grinding. Omit or set to `0` to disable the guard.
        environment:
          $ref: '#/components/schemas/AutomationEnvironmentPolicy'
    AutomationEnvironmentPolicy:
      type: object
      additionalProperties: false
      description: 'Automatic managed-environment policy for automation execution. Omit to
        use the product default: each agent gets a persistent agent-bound environment, while
        direct environment actions get a run-bound environment. Set `disabled: true` to opt
        out.'
      properties:
        disabled:
          type: boolean
          description: Disable automatic environment allocation.
        mode:
          $ref: '#/components/schemas/EnvironmentMode'
        environment_id:
          type: string
          description: Existing dedicated environment to use for this automation.
        template_id:
          type: string
          description: Environment template to use when Mobius creates one.
        provider:
          $ref: '#/components/schemas/EnvironmentProvider'
        runtime_version:
          type: string
          description: Mobius worker runtime version to install when starting the worker.
        auto_start_worker:
          type: boolean
          description: Whether Mobius should start the managed worker automatically.
        retention_policy:
          $ref: '#/components/schemas/EnvironmentRetentionPolicy'
    AutomationAgentStep:
      type: object
      additionalProperties: false
      description: Agent step configuration recognised inside `AutomationSpec.steps[].config`.
      required:
      - agent_id
      - instructions
      properties:
        agent_id:
          type: string
        instructions:
          type: string
        tool_names:
          type: array
          items:
            type: string
        output_schema:
          type: object
          additionalProperties: true
        max_turns:
          type: integer
          minimum: 1
        model_route:
          $ref: '#/components/schemas/AutomationModelRoute'
        memory_tables:
          type: array
          items:
            $ref: '#/components/schemas/AutomationAgentMemoryTableRef'
    AutomationModelRoute:
      type: object
      additionalProperties: false
      required:
      - mode
      properties:
        mode:
          type: string
          enum:
          - managed
          - byo_provider
          - worker
        environment_id:
          type: string
          description: Managed environment to route worker-backed model calls to.
        provider:
          type: string
        model:
          type: string
        queue:
          type: string
        required_capabilities:
          type: array
          items:
            type: string
    AutomationAgentMemoryTableRef:
      type: object
      additionalProperties: false
      required:
      - table_id
      - access_mode
      properties:
        table_id:
          type: string
        access_mode:
          type: string
          enum:
          - read
          - append
          - write
        instructions:
          type: string
    AutomationActionStep:
      type: object
      additionalProperties: false
      description: Action step configuration recognised inside `AutomationSpec.steps[].config`.
      required:
      - action_name
      properties:
        action_name:
          type: string
        execution_location:
          type: string
          enum:
          - managed
          - worker
          - environment
        environment_id:
          type: string
          description: 'Managed environment to route this worker-backed action to. When omitted
            for `execution_location: environment`, Mobius resolves one from `spec.defaults.environment`.'
        parameters:
          type: object
          additionalProperties: true
    AutomationSleepStep:
      type: object
      additionalProperties: false
      description: Sleep step configuration recognised inside `AutomationSpec.steps[].config`.
      properties:
        duration:
          type: string
          description: Go duration string such as `30s`, `5m`, or `2h`.
        until:
          type: string
          format: date-time
    AutomationWaitForEventStep:
      type: object
      additionalProperties: false
      description: Wait-for-event step configuration recognised inside `AutomationSpec.steps[].config`.
      required:
      - event_type
      properties:
        event_type:
          type: string
        source_id:
          type: string
        match:
          type: object
          additionalProperties: true
    AutomationInteractionStep:
      type: object
      additionalProperties: false
      description: Human interaction step configuration recognised inside `AutomationSpec.steps[].config`.
      required:
      - protocol
      - targets
      properties:
        protocol:
          type: string
          enum:
          - request_information
          - request_approval
          - request_review
        targets:
          type: array
          items:
            type: string
        prompt:
          type: string
        resolution_policy:
          type: string
        spec:
          type: object
          additionalProperties: true
    AutomationRetryPolicy:
      type: object
      additionalProperties: false
      properties:
        max_attempts:
          type: integer
          minimum: 1
        delay:
          type: string
          description: Go duration string such as `30s`, `5m`, or `2h`.
    AutomationTimeoutPolicy:
      type: object
      additionalProperties: false
      properties:
        duration:
          type: string
          description: Go duration string such as `30s`, `5m`, or `2h`.
        on_timeout:
          type: string
          enum:
          - fail
    AutomationVersionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: AutomationVersions returned for this automation, newest version first.
          items:
            $ref: '#/components/schemas/AutomationVersion'
    CreateAutomationVersionRequest:
      type: object
      additionalProperties: false
      required:
      - spec
      properties:
        spec:
          $ref: '#/components/schemas/AutomationSpec'
        compiled_plan:
          type: object
          additionalProperties: true
          description: Optional precompiled execution plan. The engine will recompile from
            `spec` if omitted.
    AutomationTrigger:
      type: object
      additionalProperties: false
      required:
      - id
      - org_id
      - project_id
      - automation_id
      - name
      - kind
      - enabled
      - concurrency_policy
      - max_concurrent_runs
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable trigger identifier.
        org_id:
          type: string
          description: Organization that owns this trigger.
        project_id:
          type: string
          description: Project that owns this trigger.
        automation_id:
          type: string
          description: Automation this trigger belongs to.
        name:
          type: string
          description: Human-readable trigger name.
        kind:
          type: string
          description: 'One of: webhook, schedule, event.'
        enabled:
          type: boolean
          description: Whether the trigger is currently allowed to start runs.
        config:
          type: object
          additionalProperties: true
          description: Kind-specific configuration (schedule cron, event matcher, webhook
            options).
        concurrency_policy:
          type: string
          enum:
          - allow
          - queue
          - skip
          - replace
          description: Behavior when a fire arrives while prior runs of this automation are
            still active.
        max_concurrent_runs:
          type: integer
          minimum: 1
          description: Cap on concurrent runs allowed from this trigger.
        webhook_handle:
          type: string
          description: Public, project-scoped handle exposed in the webhook delivery URL.
            Set only for webhook-kind triggers.
        signing_secret:
          type: string
          description: HMAC secret used to verify inbound webhook signatures. Set only for
            webhook-kind triggers.
        event_type:
          type: string
          description: Source-event type this trigger subscribes to. Set only for event-kind
            triggers.
        source_id:
          type: string
          description: Optional source identifier used to scope event matching.
        last_fire_at:
          type: string
          format: date-time
          description: Timestamp of the most recent fire.
        next_fire_at:
          type: string
          format: date-time
          description: Next scheduled fire time. Set only for schedule-kind triggers.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
    WebhookDeliveryResponse:
      type: object
      additionalProperties: false
      required:
      - fire_id
      - status
      description: Synchronous receipt for an inbound webhook delivery. The trigger dispatch
        and run start happen asynchronously after this response — the `fire_id` is the durable
        `source_event_id` that clients can poll via `GET /v1/projects/{project}/runs?source_event_id=<fire_id>`
        to discover the run once the source-event processor reserves it.
      properties:
        fire_id:
          type: string
          description: Durable source-event id (also the `dedup_key` seed). Stable across
            retries with the same `Idempotency-Key`.
        status:
          type: string
          enum:
          - accepted
          - skipped
          - failed
          description: |-
            Acceptance status of the source-event row:
            * `accepted` — the row is durable; processing happens asynchronously.
            * `skipped` — the trigger is disabled or has no live subscribers.
            * `failed` — the row could not be enqueued (synchronous validation error).
        deduped:
          type: boolean
          description: True when an existing source-event row was returned for the same idempotency
            key.
    StartAutomationRunRequest:
      type: object
      additionalProperties: false
      description: Body for `POST /v1/projects/{project}/automations/{handle}/runs`. All fields
        are optional; an empty body starts a run with no inputs and no attribution.
      properties:
        inputs:
          type: object
          additionalProperties: true
          description: Free-form input map passed to the run. Available to steps via `{{ inputs.<key>
            }}` templates.
        source:
          $ref: '#/components/schemas/AutomationRunSource'
        external_id:
          type: string
          description: Caller-supplied idempotency key, scoped to (org, project). Repeat calls
            with the same `external_id` while the prior run is still non-terminal return the
            existing run (same `id`). A repeat after the prior run terminated returns `409
            Conflict` with code `external_id_conflict` and details containing the existing
            run id and its terminal status.
      example:
        inputs:
          issue_id: '42'
        source:
          type: api
          id: review-service
          label: review-service
        external_id: review-service:issue-42
    CancelAutomationRunRequest:
      type: object
      additionalProperties: false
      description: Body for the cancellation endpoint. All fields optional.
      properties:
        reason:
          type: string
          description: Human-readable cancellation reason recorded on the run.
      example:
        reason: superseded by manual remediation
    SignalAutomationRunRequest:
      type: object
      additionalProperties: false
      description: Body for delivering a signal to a suspended run.
      required:
      - step_key
      properties:
        step_key:
          type: string
          description: Step key currently in `suspended` state that should resume. Must match
            a step declared in the run's automation version spec.
        result:
          type: object
          additionalProperties: true
          description: Free-form payload saved as the resumed step's output.
      example:
        step_key: wait_for_approval
        result:
          approved: true
          approver_id: usr_2f9s3k4m5n6p7q8r9s0t1u2v3w
    AutomationRunSource:
      type: object
      additionalProperties: false
      description: Optional attribution for the call that started this run. Triggers and webhooks
        populate `trigger_id` and `trigger_fire_id`; API callers usually only set `type` and
        `id`.
      properties:
        type:
          type: string
          description: One of `api`, `trigger`, `manual`, `interaction`, `signal`.
        id:
          type: string
          description: Identifier within the source type's namespace.
        label:
          type: string
          description: Display label.
        trigger_id:
          type: string
          description: Trigger that fired this run, if any.
        trigger_fire_id:
          type: string
          description: Idempotency key for trigger retries. When set, Engine.Start returns
            the existing run for this fire instead of creating a duplicate.
    AutomationRun:
      type: object
      additionalProperties: false
      description: One automation run record.
      required:
      - id
      - org_id
      - project_id
      - automation_id
      - automation_version_id
      - automation_version
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable run identifier.
        org_id:
          type: string
          description: Organization that owns this run.
        project_id:
          type: string
          description: Project that owns this run.
        automation_id:
          type: string
          description: Automation this run belongs to.
        automation_version_id:
          type: string
          description: AutomationVersion record this run is executing.
        automation_version:
          type: integer
          description: Version number of the AutomationVersion this run is executing.
        status:
          $ref: '#/components/schemas/AutomationRunStatus'
        inputs:
          type: object
          additionalProperties: true
          description: Input map supplied when the run started, merged over the automation's
            `default_inputs`.
        result:
          type: object
          additionalProperties: true
          description: Final result payload returned by the automation. Absent until the run
            terminates successfully.
        source:
          $ref: '#/components/schemas/AutomationRunSource'
        error_message:
          type: string
          description: Human-readable failure summary; populated on `failed` runs.
        error_type:
          type: string
          description: Machine-readable failure classification when available.
        wake_at:
          type: string
          format: date-time
          description: Scheduled wake time for a suspended run.
        started_at:
          type: string
          format: date-time
          description: Time the engine moved the run to `running`.
        completed_at:
          type: string
          format: date-time
          description: Time the run reached a terminal status.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
    AutomationRunStatus:
      type: string
      enum:
      - queued
      - running
      - suspended
      - completed
      - failed
      - cancelled
      description: Lifecycle state of an automation run.
    AutomationRunListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/AutomationRun'
        next_cursor:
          type: string
          description: Opaque cursor for the next page; absent when no more results.
        has_more:
          type: boolean
          description: True when more items exist after this page.
    AutomationRunStepKind:
      type: string
      enum:
      - agent
      - action
      - sleep
      - wait_for_event
      - interaction
      - cleanup
      description: The step type. `cleanup` is system-materialized — it appears in run step
        listings for terminal cleanup work but cannot be authored in an `AutomationSpec`.
    AutomationRunStepStatus:
      type: string
      enum:
      - pending
      - running
      - suspended
      - completed
      - failed
      - skipped
      - cancelled
      description: Lifecycle state of an automation run step.
    AutomationRunStep:
      type: object
      additionalProperties: false
      required:
      - id
      - org_id
      - project_id
      - run_id
      - step_key
      - kind
      - status
      - seq
      - attempt
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable step identifier.
        org_id:
          type: string
          description: Organization that owns the parent run.
        project_id:
          type: string
          description: Project that owns the parent run.
        run_id:
          type: string
          description: Run this step belongs to.
        step_key:
          type: string
          description: Stable key for this step within its automation version.
        step_name:
          type: string
          description: Display name from the authored spec, when present.
        kind:
          $ref: '#/components/schemas/AutomationRunStepKind'
        status:
          $ref: '#/components/schemas/AutomationRunStepStatus'
        seq:
          type: integer
          format: int64
          description: Zero-indexed ordinal of this step within its run.
        attempt:
          type: integer
          description: Number of times this step has been attempted.
        inputs:
          type: object
          additionalProperties: true
          description: Resolved inputs passed into the step, after template rendering.
        parameters:
          type: object
          additionalProperties: true
          description: Authored step parameters, before template rendering.
        result:
          description: Step output (shape varies by kind); absent until completion.
        job_id:
          type: string
          nullable: true
          description: Worker job that executed this step, when applicable.
        wait_id:
          type: string
          nullable: true
          description: Wait record this step is suspended on, when applicable.
        error_type:
          type: string
          description: Machine-readable error code populated on failure.
        error_message:
          type: string
          description: Human-readable error message populated on failure.
        started_at:
          type: string
          format: date-time
          nullable: true
          description: Time the step entered `running`.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Time the step reached a terminal status.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
    AutomationRunStepListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Steps for this run in `seq` order.
          items:
            $ref: '#/components/schemas/AutomationRunStep'
    AutomationRunEvent:
      type: object
      additionalProperties: false
      required:
      - id
      - org_id
      - project_id
      - run_id
      - sequence
      - event_type
      - created_at
      properties:
        id:
          type: string
          description: Stable event identifier.
        org_id:
          type: string
          description: Organization that owns the parent run.
        project_id:
          type: string
          description: Project that owns the parent run.
        run_id:
          type: string
          description: Run this event belongs to.
        sequence:
          type: integer
          format: int64
          description: Monotonic per-run sequence number used for ordering and resume.
        event_type:
          type: string
          description: Event type from the run-stream taxonomy (e.g. `run.started`, `step.completed`,
            `wait.opened`, `interaction.requested`, `action.completed`, `artifact.created`,
            `limit.reached`, `usage.recorded`).
        step_id:
          type: string
          nullable: true
          description: ID of the step this event belongs to, when applicable.
        step_key:
          type: string
          nullable: true
          description: Automation step key this event belongs to, when applicable.
        payload:
          type: object
          additionalProperties: true
          description: Event-type-specific payload. See the run-event taxonomy for shapes.
        created_at:
          type: string
          format: date-time
          description: Server timestamp when the event was recorded.
    AutomationRunEventListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Run events in this page, ordered by `sequence` ascending.
          items:
            $ref: '#/components/schemas/AutomationRunEvent'
        next_sequence:
          type: integer
          format: int64
          description: Sequence number of the most recent event in `items`; clients can pass
            this back as `since_sequence` on the next poll.
        has_more:
          type: boolean
          description: True when more events exist after the returned page.
    ServiceAccountStatus:
      type: string
      enum:
      - active
      - disabled
      description: '`active` allows authentication and job claims; `disabled` blocks them
        but preserves the record and its assignments.'
    ServiceAccountPurpose:
      type: string
      enum:
      - api_client
      - agent
      - runtime_worker
      - system
      description: Why this service account exists. `api_client` is the normal user-facing
        machine identity. `agent` and `runtime_worker` are internal backing identities for
        agent and environment execution.
    ServiceAccount:
      type: object
      additionalProperties: false
      description: Non-human identity used by automation, agents, and API keys. Service accounts
        make ownership, permissions, and credential rotation explicit without tying machine
        access to a human user.
      required:
      - id
      - name
      - purpose
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this service account.
        name:
          type: string
          description: Human-readable name for this service account. Immutable after creation.
        purpose:
          $ref: '#/components/schemas/ServiceAccountPurpose'
          description: Product purpose for this service account.
        description:
          type: string
          description: Optional human-readable description.
        status:
          $ref: '#/components/schemas/ServiceAccountStatus'
          description: 'Current service account status: `active` or `disabled`.'
        owner_id:
          type: string
          description: Optional org member responsible for this service account.
        user_id:
          type: string
          description: 'Linked User record. For agent-backed service accounts this is the
            agent''s User (kind: agent); for standalone service accounts this is a dedicated
            User (kind: service_account). Immutable once set.'
        role_ids:
          type: array
          items:
            type: string
          uniqueItems: true
          description: Role IDs currently assigned to this service account in the project.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key-value metadata. Subject to size and nesting depth limits.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: 'Resource tags applied to this service account. Distinct from `metadata`:
            `tags` is the uniform string-to-string field used for filtering and reporting;
            `metadata` is a free-form caller-defined blob.'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this service account was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this service account was last updated.
    ServiceAccountListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ServiceAccount'
    CreateServiceAccountRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable name for this service account. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        purpose:
          $ref: '#/components/schemas/ServiceAccountPurpose'
          description: Purpose for this service account. Omit for a normal user-facing API
            client. Runtime workers and agent backing accounts are normally created by Mobius
            internals.
        owner_id:
          type: string
          description: Org member responsible for this service account.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary metadata to attach to the service account.
        role_ids:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: One or more role IDs to assign at creation time. All assignments are
            created atomically with the service account. Requires `mobius.access.manage`.
            Each role must belong to this project or be system-defined.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateServiceAccountRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          description: Replacement description.
        status:
          $ref: '#/components/schemas/ServiceAccountStatus'
          description: 'Replacement service account status: `active` or `disabled`.'
        owner_id:
          type: string
          description: ID of the org member responsible for this service account.
        metadata:
          type: object
          additionalProperties: true
          description: Replacement metadata.
        role_ids:
          type: array
          items:
            type: string
          uniqueItems: true
          description: Replacement role IDs for this service account in the project. Send
            an empty array to remove all project role assignments. Requires `mobius.access.manage`.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the service account. System
            tags (`mobius:*`) are preserved.
    ColumnType:
      type: string
      enum:
      - string
      - number
      - boolean
      - date
      - object
      - array
      - any
    ColumnDef:
      type: object
      additionalProperties: false
      required:
      - name
      - type
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/ColumnType'
        required:
          type: boolean
          default: false
        unique:
          type: boolean
          default: false
        indexed:
          type: boolean
          default: false
          description: Marks the column as an expected filter/sort field so backends can maintain
            efficient indexes.
        default:
          description: Default value applied when column is absent on insert
        description:
          type: string
        deprecated:
          type: boolean
          default: false
    IndexDef:
      type: object
      additionalProperties: false
      required:
      - name
      - columns
      properties:
        name:
          type: string
        columns:
          type: array
          items:
            type: string
        unique:
          type: boolean
          default: false
    TableSchema:
      type: object
      required:
      - columns
      additionalProperties: false
      properties:
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnDef'
          minItems: 1
          maxItems: 200
        indexes:
          type: array
          items:
            $ref: '#/components/schemas/IndexDef'
          maxItems: 20
    TableAccessMode:
      type: string
      enum:
      - project
      - private
      description: Controls read/write access to the table. "project" allows anyone with project
        table permissions (default for unowned tables). "private" restricts access to the
        owner only (default when an owner is set).
    Table:
      type: object
      additionalProperties: false
      required:
      - id
      - org_id
      - project_id
      - name
      - schema
      - access_mode
      - created_at
      - updated_at
      properties:
        id:
          type: string
        org_id:
          type: string
        project_id:
          type: string
        name:
          type: string
        scope:
          $ref: '#/components/schemas/ResourceScope'
        description:
          type: string
        schema:
          $ref: '#/components/schemas/TableSchema'
        tags:
          type: object
          additionalProperties:
            type: string
        owned_by:
          type: string
          description: Canonical user owner ID. AI-agent owners use their backing user ID.
        access_mode:
          allOf:
          - $ref: '#/components/schemas/TableAccessMode'
          description: Controls read/write access. When access_mode is "private", owned_by
            MUST be present; the server enforces this invariant. If access_mode is omitted
            on create, the server defaults to "private" when an owner is set and "project"
            when no owner is provided.
        created_by:
          type: string
          description: User ID of the principal who created this table.
        updated_by:
          type: string
          description: User ID of the principal who last updated this table.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TableListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Table'
        has_more:
          type: boolean
        next_cursor:
          type: string
    TableStats:
      type: object
      required:
      - table_id
      - row_count
      - approx_data_bytes
      - approx_index_bytes
      - indexed_column_count
      - declared_index_count
      - search_index_present
      - generated_at
      additionalProperties: false
      properties:
        table_id:
          type: string
        row_count:
          type: integer
          format: int64
        approx_data_bytes:
          type: integer
          format: int64
        approx_index_bytes:
          type: integer
          format: int64
        indexed_column_count:
          type: integer
        declared_index_count:
          type: integer
        search_index_present:
          type: boolean
        generated_at:
          type: string
          format: date-time
        oldest_row_created_at:
          type: string
          format: date-time
        newest_row_updated_at:
          type: string
          format: date-time
    CreateTableRequest:
      type: object
      required:
      - name
      - schema
      additionalProperties: false
      properties:
        name:
          type: string
          pattern: ^[a-z][a-z0-9_]*$
          maxLength: 64
        description:
          type: string
          maxLength: 1000
        schema:
          $ref: '#/components/schemas/TableSchema'
        scope:
          $ref: '#/components/schemas/ResourceScope'
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`; defaults
            to the authenticated user for owned table creates.
        access_mode:
          $ref: '#/components/schemas/TableAccessMode'
    UpdateTableRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          maxLength: 1000
        schema:
          $ref: '#/components/schemas/TableSchema'
        scope:
          type: string
          allOf:
          - $ref: '#/components/schemas/ResourceScope'
          nullable: true
          description: Set to `owner` for owner-scoped names, or null to return to the project/default
            scope.
        owned_by:
          type: string
          nullable: true
          description: Canonical user owner ID. Send null to clear ownership.
        access_mode:
          $ref: '#/components/schemas/TableAccessMode'
    TableRow:
      type: object
      additionalProperties: false
      required:
      - id
      - table_id
      - data
      - version
      - created_at
      - updated_at
      properties:
        id:
          type: string
        table_id:
          type: string
        data:
          type: object
          additionalProperties: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InsertRowRequest:
      type: object
      required:
      - data
      additionalProperties: false
      properties:
        data:
          type: object
          additionalProperties: true
    UpdateRowRequest:
      type: object
      required:
      - data
      additionalProperties: false
      properties:
        data:
          type: object
          additionalProperties: true
        version:
          type: integer
          minimum: 0
          description: Expected version for optimistic locking. Omit or 0 to skip the check.
    QueryRowsRequest:
      type: object
      additionalProperties: false
      properties:
        filter:
          type: object
          additionalProperties: true
          description: Column equality or operator filter
        sort:
          type: array
          maxItems: 10
          items:
            type: object
            required:
            - field
            additionalProperties: false
            properties:
              field:
                type: string
              order:
                type: string
                enum:
                - asc
                - desc
                default: asc
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        cursor:
          type: string
          description: Opaque cursor from a prior response.
    QueryRowsResponse:
      type: object
      additionalProperties: false
      required:
      - rows
      - has_more
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/TableRow'
        has_more:
          type: boolean
        limit:
          type: integer
        next_cursor:
          type: string
    SearchRowsRequest:
      type: object
      required:
      - query
      additionalProperties: false
      properties:
        query:
          type: string
          minLength: 1
          description: Keyword search query.
        filter:
          type: object
          additionalProperties: true
          description: Optional column equality or operator filter applied before text search.
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        cursor:
          type: string
          description: Opaque cursor from a prior search response.
    SearchRowsResponse:
      type: object
      additionalProperties: false
      required:
      - rows
      - has_more
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/TableRow'
        has_more:
          type: boolean
        limit:
          type: integer
        next_cursor:
          type: string
    BulkInsertRowsRequest:
      type: object
      required:
      - rows
      additionalProperties: false
      properties:
        rows:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            type: object
            additionalProperties: true
    BulkInsertRowsResponse:
      type: object
      additionalProperties: false
      required:
      - inserted
      - rows
      properties:
        inserted:
          type: integer
        rows:
          type: array
          items:
            $ref: '#/components/schemas/TableRow'
    UpsertRowRequest:
      type: object
      required:
      - key_columns
      - data
      additionalProperties: false
      properties:
        key_columns:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 10
          description: Column names used to match an existing row.
        data:
          type: object
          additionalProperties: true
          description: Full row data. Must include values for all key_columns.
    UpsertRowResponse:
      type: object
      additionalProperties: false
      required:
      - row
      - created
      properties:
        row:
          $ref: '#/components/schemas/TableRow'
        created:
          type: boolean
          description: True when a new row was inserted; false when an existing row was updated.
    ArtifactState:
      type: string
      enum:
      - pending_upload
      - available
      - expired
      - deleted
      - failed
    ArtifactStorageBackend:
      type: string
      enum:
      - mobius
      - s3
    ArtifactVisibility:
      type: string
      enum:
      - private
      - shared
      description: Private artifacts are visible only to their owner user. Shared artifacts
        are visible to the project.
    Artifact:
      type: object
      required:
      - id
      - org_id
      - project_id
      - owner_id
      - visibility
      - name
      - mime_type
      - size_bytes
      - storage
      - state
      - created_at
      additionalProperties: false
      properties:
        id:
          type: string
        org_id:
          type: string
        project_id:
          type: string
        owner_id:
          type: string
          description: User-keyed private artifact-space owner. Empty for project-shared artifacts.
        visibility:
          $ref: '#/components/schemas/ArtifactVisibility'
        run_id:
          type: string
        step_id:
          type: string
        job_id:
          type: string
        attempt:
          type: integer
        name:
          type: string
          description: Display name or relative virtual path. Forward slash may be used to
            organize artifacts inside private or shared project space.
        mime_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        sha256:
          type: string
        storage:
          $ref: '#/components/schemas/ArtifactStorageBackend'
        storage_uri:
          type: string
        integration_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        tags:
          type: object
          additionalProperties:
            type: string
        state:
          $ref: '#/components/schemas/ArtifactState'
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          description: users.id of the principal who created this artifact. Empty for system-initiated
            writes.
        updated_at:
          type: string
          format: date-time
        updated_by:
          type: string
          description: users.id of the principal who last updated this artifact. Empty for
            system-initiated writes.
        committed_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        pinned:
          type: boolean
        deleted_at:
          type: string
          format: date-time
    ArtifactListResponse:
      type: object
      required:
      - items
      - has_more
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
        has_more:
          type: boolean
        next_cursor:
          type: string
    CreateArtifactRequest:
      type: object
      required:
      - file
      - name
      additionalProperties: false
      properties:
        file:
          type: string
          format: binary
          description: File bytes to upload into artifact storage. Multipart parts may be
            sent in any order; Mobius reads metadata fields and temporarily spools the file
            part when needed before streaming bytes to artifact storage.
        name:
          type: string
          maxLength: 256
          description: Display name or relative virtual path. Forward slash may be used to
            organize artifacts inside private or shared project space.
        mime:
          type: string
          description: Optional MIME type override. Defaults to the uploaded file part content
            type, then `application/octet-stream`.
        size_bytes:
          type: integer
          format: int64
          minimum: 0
          description: Optional declared file size. When supplied, Mobius verifies the streamed
            byte count exactly matches this value.
        run_id:
          type: string
        step_id:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
        retain_for_seconds:
          type: integer
          format: int64
          minimum: 0
          description: Override the project default TTL for this artifact only.
        retain_until:
          type: string
          format: date-time
        pinned:
          type: boolean
          default: false
        visibility:
          $ref: '#/components/schemas/ArtifactVisibility'
    UpdateArtifactContentRequest:
      type: object
      required:
      - content
      additionalProperties: false
      properties:
        content:
          type: string
          description: Replacement artifact content. Interpreted as UTF-8 text unless `encoding`
            is `base64`.
        encoding:
          type: string
          enum:
          - text
          - base64
          default: text
        mime_type:
          type: string
          description: Optional MIME type override. Defaults to the artifact's current MIME
            type.
    ArtifactSignedUrl:
      type: object
      required:
      - url
      - method
      - expires_at
      additionalProperties: false
      properties:
        url:
          type: string
        method:
          type: string
          enum:
          - GET
        expires_at:
          type: string
          format: date-time
    ArtifactStorageSettings:
      type: object
      additionalProperties: false
      properties:
        backend:
          $ref: '#/components/schemas/ArtifactStorageBackend'
        integration_id:
          type: string
        default_ttl:
          type: string
          description: Default artifact retention duration as a Go duration string.
          example: 720h
        max_artifact_size:
          type: integer
          format: int64
          minimum: 0
        inline_threshold:
          type: integer
          format: int64
          minimum: 0
        pending_upload_cap:
          type: integer
          minimum: 0
    ArtifactStorageSettingsUpdate:
      $ref: '#/components/schemas/ArtifactStorageSettings'
    ArtifactQuotaUsage:
      type: object
      required:
      - org_id
      - used_bytes
      - limit_bytes
      - artifact_count
      - pending_count
      - generated_at
      additionalProperties: false
      properties:
        org_id:
          type: string
        used_bytes:
          type: integer
          format: int64
        limit_bytes:
          type: integer
          format: int64
        artifact_count:
          type: integer
          format: int64
        pending_count:
          type: integer
          format: int64
        generated_at:
          type: string
          format: date-time
