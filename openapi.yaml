        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    CreateInteractionRequest:
      description: Creates an interaction directly. Use the standalone variant with no workflow
        side effect, or the run-backed variant that requires both `run_id` and `signal_name`
        so completion can resume the run. For worker/job usage, prefer the job-scoped route
        so the server can derive the owning run from the claimed job context.
      oneOf:
      - $ref: '#/components/schemas/CreateStandaloneInteractionRequest'
      - $ref: '#/components/schemas/CreateRunBackedInteractionRequest'
    CreateStandaloneInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - kind
      - title
      description: Creates a standalone interaction. Completion records the response but does
        not deliver a workflow signal.
      properties:
        target_user_ids:
          type: array
          items:
            type: string
          description: Resolved user IDs to target directly. Agents use their backing user
            IDs.
        target_group_id:
          type: string
          description: Optional group ID to expand into target users.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind. Renamed from `type` in the PRD 077 v-bump.
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the responder.
        description:
          type: string
          description: Optional longer responder-facing detail or instructions.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the title
            and description.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial interaction tag set used by list filtering and reporting.
        properties:
          type: object
          additionalProperties: true
          description: Free-form structured metadata to attach to the interaction.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When true, all target users must respond before the interaction is
            considered complete. Defaults to false when omitted. Mutually exclusive with `resolution_policy`;
            prefer the policy form for new code.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Declarative resolution rule. When supplied the policy evaluator drives
            completion.
        submission_review_policy:
          $ref: '#/components/schemas/ReviewPolicy'
          description: Template review policy applied to submissions of this interaction (PRD
            077 §3.5). Currently meaningful only for handoff-kind interactions.
        consumer:
          $ref: '#/components/schemas/Consumer'
          description: Polymorphic identifier of what is waiting on this interaction's resolution
            (PRD 077 §3.7). When omitted on a run-backed create request, the server derives
            a `kind=run` consumer from `run_id` and `signal_name`.
        delivery:
          $ref: '#/components/schemas/Delivery'
          description: Optional per-interaction delivery override (PRD 077 §3.8).
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded to.
    CreateRunBackedInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - run_id
      - signal_name
      - kind
      - title
      description: Creates a run-backed interaction. **Deprecated as a resume mechanism.**
        Under RFC 064 a workflow run only resumes from an interaction response when its materializer
        registered a `run_subscription` with `Subject{kind:interaction, interaction_id:...}`.
        That registration only happens for interactions created from within a workflow step
        (declarative `interaction` step or job-scoped `POST /v1/projects/{project}/jobs/{id}/interactions`).
        Direct run-backed creates through this endpoint produce a pending interaction record
        linked to `run_id` for audit, but completion will not wake the run. Use the job-scoped
        route for resume semantics. `signal_name` is retained on the request shape for backwards
        compatibility and audit; routing no longer depends on it.
      properties:
        run_id:
          type: string
          description: ID of the workflow run to resume when this interaction is completed.
        signal_name:
          type: string
          description: Signal name the interaction will complete against when run-backed.
        target_user_ids:
          type: array
          items:
            type: string
          description: Resolved user IDs to target directly. Agents use their backing user
            IDs.
        target_group_id:
          type: string
          description: Optional group ID to expand into target users.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind. Renamed from `type` in the PRD 077 v-bump.
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the responder.
        description:
          type: string
          description: Optional longer responder-facing detail or instructions.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the title
            and description.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial interaction tag set used by list filtering and reporting.
        properties:
          type: object
          additionalProperties: true
          description: Free-form structured metadata to attach to the interaction.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When true, all target users must respond before the interaction is
            considered complete. Defaults to false when omitted. Mutually exclusive with `resolution_policy`;
            prefer the policy form for new code.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Declarative resolution rule. When supplied the policy evaluator drives
            completion.
        submission_review_policy:
          $ref: '#/components/schemas/ReviewPolicy'
          description: Template review policy applied to submissions of this interaction (PRD
            077 §3.5). Currently meaningful only for handoff-kind interactions.
        consumer:
          $ref: '#/components/schemas/Consumer'
          description: Polymorphic identifier of what is waiting on this interaction's resolution
            (PRD 077 §3.7). When omitted on a run-backed create request, the server derives
            a `kind=run` consumer from `run_id` and `signal_name`.
        delivery:
          $ref: '#/components/schemas/Delivery'
          description: Optional per-interaction delivery override (PRD 077 §3.8).
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded to.
    RespondToInteractionRequest:
      type: object
      additionalProperties: false
      properties:
        action:
          type: string
          enum:
          - submit
          - accept
          - send_back
          - withdraw
          - close
          description: Operation to perform through the canonical response endpoint. `submit`
            answers ordinary interactions, records vote choices, and submits handoff evidence.
            `accept` and `send_back` review the current handoff response. `withdraw` withdraws
            the caller's active vote response. `close` manually closes a vote.
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by the responder. Required for `submit`. For vote
            interactions this is either a single option value or an array of option values
            stored as an `interaction_responses` row with `response_kind=vote`.
        comment:
          type: string
          description: Optional free-text comment accompanying the action. Available on every
            interaction kind and never gated by the spec; the responder may always attach
            reasoning, caveats, or follow-up notes alongside `value`.
    CancelInteractionRequest:
      type: object
      additionalProperties: false
      description: Optional payload accompanying a cancel request. The reason is recorded
        on the interaction and forwarded in the cancellation signal so workflows can route
        to a fallback.
      properties:
        reason:
          type: string
          description: Free-text reason recorded on the interaction.
    Group:
      type: object
