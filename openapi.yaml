      - jobs
      summary: Get a workflow job by ID
      description: Returns the current state of a single workflow job, regardless of whether
        it is pending, claimed, or terminal. Useful for UIs and operators inspecting a specific
        step without enumerating the run.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/jobs/claim:
    post:
      operationId: claimJob
      tags:
      - jobs
      summary: Long-poll for the next claimable workflow job
      description: |-
        Atomically claims the next pending workflow job whose queue name is in the worker's `queues` subscription, whose action is in the worker's `actions` filter (when provided), and — for code jobs — whose handler id is in the worker's `handlers` filter (when provided). If no job is immediately available and `wait_seconds > 0`, the server holds the request open for up to `wait_seconds` (capped at 30). Returns 204 when the poll window closes empty.

        Each successful call also registers or refreshes the caller's worker session (used by `GET /v1/projects/{project}/worker-sessions`), so no separate registration step is needed.

        The returned `JobClaim` carries an opaque `lease_token` the worker echoes on subsequent heartbeat / report calls, plus a `heartbeat_interval_seconds` cadence. The body's `spec` field is a discriminated union: `{kind: "action", ...}` for spec-step worker jobs, `{kind: "code", ...}` for code workflows.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobClaimRequest'
            example:
              worker_instance_id: inv-abc123
              worker_session_token: <worker-session-token>
              concurrency_limit: 8
              worker_name: invoice-processor
              worker_version: 2026.04.27
              queues:
              - default
              actions:
              - summarize-document
              handlers:
              - onboard-customer
              wait_seconds: 20
      responses:
        '200':
          description: Job claimed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobClaim'
              examples:
                action:
                  summary: Action-spec claim
                  value:
                    job_id: job_01hw1n2p3q4r5s6t7u8v9w0x1y
                    run_id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                    workflow_name: document-review
                    step_name: summarize
                    spec:
                      kind: action
                      name: summarize-document
                      parameters:
                        document_id: doc_01hw1m9z8y7x6w5v4u3t2s1r0q
                    lease_token: bGVhc2UtdG9rZW4tb3BhcXVl
                    attempt_number: 1
                    queue: default
                    heartbeat_interval_seconds: 30
                code:
                  summary: Code-spec claim
                  value:
                    job_id: job_01hw1n2p3q4r5s6t7u8v9w0x1y
                    run_id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                    workflow_name: onboard-customer
                    step_name: run
                    spec:
                      kind: code
                      handler: onboard-customer
                      runtime: typescript
                      inputs:
                        customer_id: cust_42
                      history_cursor: ''
                      history: []
                    lease_token: bGVhc2UtdG9rZW4tb3BhcXVl
                    attempt_number: 1
                    queue: default
                    heartbeat_interval_seconds: 30
        '204':
          description: No jobs available within the poll window
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: '`worker_instance_conflict` — another live process has already registered
            with this `worker_instance_id` in the project under a different `worker_session_token`
            and the incumbent is still within the takeover window. Resolve by configuring
            distinct instance IDs or letting the SDK auto-detect them.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project}/jobs/{id}/heartbeat:
    post:
      operationId: heartbeatJob
      tags:
      - jobs
      summary: Refresh the lease on a claimed workflow job
      description: |-
        Extends the worker's lease on the job and returns server directives. Must include the `lease_token` returned in the original `JobClaim` — a stale token (e.g., from a previous attempt or from a process that has since been taken over) is rejected with 409.

        Returns a small JSON envelope rather than 204 so the server can attach directives (e.g., `should_cancel`) without an additional round trip. Workers should call this at the interval specified in `JobClaim.heartbeat_interval_seconds` (recommended: 30s).

        When `directives.should_cancel` is true, the run has received a cancellation request; the worker must stop processing and post a `fail` outcome via `POST /v1/projects/{project}/jobs/{id}/report`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobFenceRequest'
            example:
              worker_instance_id: inv-abc123
              lease_token: bGVhc2UtdG9rZW4tb3BhcXVl
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobHeartbeat'
              example:
                ok: true
                directives:
                  should_cancel: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/jobs/{id}/report:
    post:
      operationId: reportJob
      tags:
      - jobs
      summary: Report the outcome of a workflow job attempt
      description: |-
        The single terminal endpoint for a workflow job attempt. The body carries the active `lease_token` plus an ordered `outcomes` list:

        * Zero or more durable progress outcomes (`step_done`,
        `wait_observed`) — only valid for `kind: "code"` jobs.
        * Exactly one terminator outcome (`complete`, `fail`, or
        `suspend`) at the end.

        The server validates the sequence (terminator exists, terminator is last, durable kinds match the spec kind, code-only outcomes rejected on action jobs), persists the durable rows, and acts on the terminator:

        * `complete` — job is marked completed; for action jobs the
        `result_b64` becomes the step output and the workflow engine
        advances. For code jobs the `result_b64` is persisted as the
        run output and the run completes.
        * `fail` — job is marked failed. For action jobs this triggers
        the workflow engine's retry logic if `attempt < max_attempts`;
        for code jobs it terminally fails the run.
        * `suspend` — code jobs only. The run is parked on the supplied
        wait. On wake the server emits a fresh code-invoke job whose
        history is reachable via the history endpoint.

        Lease fencing: the `lease_token` must match the value the server returned for the active claim attempt. Mismatch returns 409 lease-lost. A duplicate report (same lease_token + same terminator) returns 204 idempotently.

        Validation errors (missing terminator, terminator not last, unsupported outcome kind for the job spec, malformed wait descriptor) return 400 with a precise error type.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobReportRequest'
            examples:
              actionCompleted:
                summary: Action job — successful completion
                value:
                  worker_instance_id: inv-abc123
                  lease_token: bGVhc2UtdG9rZW4tb3BhcXVl
                  outcomes:
                  - kind: complete
                    result_b64: eyJzdW1tYXJ5IjoiUmVhZHkifQ==
              actionFailed:
                summary: Action job — terminal failure
                value:
                  worker_instance_id: inv-abc123
                  lease_token: bGVhc2UtdG9rZW4tb3BhcXVl
                  outcomes:
                  - kind: fail
                    error_type: TimeoutError
                    error_message: The upstream summarizer timed out.
              codeYielded:
                summary: Code job — yielded on a wait_signal
                value:
                  worker_instance_id: inv-abc123
                  lease_token: bGVhc2UtdG9rZW4tb3BhcXVl
                  outcomes:
                  - kind: step_done
                    step_id: fetch
                    status: completed
                    result:
                      ok: true
                  - kind: suspend
                    step_id: wait-approval
                    wait:
                      kind: wait_signal
                      wait_signal:
                        topic: approval-requested
                        timeout: 24h
              codeCompleted:
                summary: Code job — handler returned
                value:
                  worker_instance_id: inv-abc123
                  lease_token: bGVhc2UtdG9rZW4tb3BhcXVl
                  outcomes:
                  - kind: step_done
                    step_id: finalize
                    status: completed
                    result:
                      receipt: rcpt_42
                  - kind: complete
                    result_b64: eyJvayI6dHJ1ZX0=
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/jobs/{id}/history:
    get:
      operationId: getJobHistory
      tags:
      - jobs
      summary: Fetch durable replay history for a code-spec job
      description: |-
        Returns the durable child-step ledger for a code-spec job in commit order. The SDK uses this to fast-forward through cached `step.run` / `step.waitFor*` results on resume after a yield.

        The ledger is paginated by an opaque `after` cursor; the server decides the page size up to `limit` (default 1000, max 5000). A response carrying a non-empty `next_cursor` indicates more pages are available.

        Action-spec jobs have no replay history; calling this for an action job returns 200 with an empty `entries` list.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: after
        in: query
        description: Opaque cursor returned by a prior page (or `JobClaim.spec.code.history_cursor`).
          Omit to fetch from the beginning.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of entries to return per page.
        schema:
          type: integer
          minimum: 1
          maximum: 5000
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/jobs/{id}/events:
    post:
      operationId: emitJobEvents
      tags:
      - jobs
      summary: Emit one or more custom events from a claimed workflow job
      description: |-
        Publishes a batch of custom run events on behalf of the worker holding the job's current lease. Events are appended to the durable run event store (so they replay via `?since=<seq>`) and fanned out to any live SSE subscribers on the run.

        Authorization requires `mobius.work.execute`. Each event must present the active `lease_token`; stale tokens are rejected with 409.

        `type` is a caller-chosen identifier. The `mobius.` prefix is reserved for future server-emitted well-known kinds and is rejected with 400.

        Validation is atomic: if any event in the batch is invalid, the whole request is rejected and nothing is published. Successful batches return 204.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobEventsRequest'
            example:
              worker_instance_id: inv-abc123
              lease_token: bGVhc2UtdG9rZW4tb3BhcXVl
              events:
              - type: progress
                payload:
                  percent: 50
                  message: Parsed 10 of 20 pages.
      responses:
        '204':
          description: Events accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          description: Payload Too Large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project}/jobs/{id}/interactions:
    post:
      operationId: createJobInteraction
      tags:
      - jobs
      summary: Create a human-in-the-loop interaction from a claimed workflow job
      description: Job-scoped form of interaction creation for the step-claim runtime. The
        server derives the owning run and project scope from the job, so workers do not need
        to pass `run_id` explicitly. Prefer this route over `POST /v1/projects/{project}/interactions`
        from within a job context. The optional `signal_name` field overrides the server-derived
        signal name; when omitted the server derives the signal name from `step_name` or uses
        a default interaction signal.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobInteractionRequest'
      responses:
        '201':
          description: Interaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/jobs/{id}/actions/{action_name}:
    post:
      operationId: runJobAction
      tags:
      - jobs
      summary: Execute one server-side action for a claimed workflow job
      description: Executes a named action in the context of the currently claimed job. The
        action must be registered in the project or catalog. The `dry_run` flag invokes the
        action without side effects when the action supports it. Results are returned synchronously;
        for long- running actions use `timeout_seconds` to extend the deadline.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/ActionNameParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunActionRequest'
      responses:
        '200':
          description: Action executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunActionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/triggers:
    get:
      operationId: listTriggers
      tags:
      - triggers
      summary: List triggers
      description: Returns all triggers for the project, optionally filtered by kind or enabled
        state.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: kind
        in: query
        description: Filter by trigger kind.
        schema:
          $ref: '#/components/schemas/TriggerKind'
      - name: enabled
        in: query
        description: Filter to enabled or disabled triggers.
        schema:
          type: boolean
      - $ref: '#/components/parameters/TagFilterParam'
      - name: cursor
        in: query
        description: Opaque pagination cursor returned from the previous response.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of results to return per page.
        schema:
          type: integer
          minimum: 1
          maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createTrigger
      tags:
      - triggers
      summary: Create a trigger
      description: 'Creates a trigger. `source_config` must match `kind`: a `ScheduleSourceConfig`
        for schedule, a `WebhookSourceConfig` for webhook, an `EventSourceConfig` for event.
        For webhook triggers, `source_config.handle` is auto-derived from `name` when omitted
        and must be unique within the project; the `receive_url` for posting events is returned
        on the response''s `source_config`.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTriggerRequest'
            examples:
              webhook:
                summary: Webhook trigger
                value:
                  name: Billing report webhook
                  kind: webhook
                  source_config:
                    handle: billing-report
                    signing_secret: whsec_0123456789abcdef
                  targets:
                  - workflow_id: wf_01hw1p4a5b6c7d8e9f0g1h2j3k
                    condition: event.type == 'billing.report.ready'
                    input_mapping:
                      report_id: ${event.report_id}
                      account_id: ${event.account_id}
                    enabled: true
                  concurrency_policy: forbid
                  enabled: true
              schedule:
                summary: Schedule trigger
                value:
                  name: Weekday billing sweep
                  kind: schedule
                  source_config:
                    cron: 0 9 * * 1-5
                  targets:
                  - workflow_id: wf_01hw1p4a5b6c7d8e9f0g1h2j3k
                  concurrency_policy: forbid
                  enabled: true
              event:
                summary: Platform event trigger
                value:
                  name: Run completion audit
                  kind: event
                  source_config:
                    event_type: run.completed
                  targets:
                  - workflow_id: wf_01hw1p4a5b6c7d8e9f0g1h2j3k
                    input_mapping:
                      run_id: ${event.run_id}
                  enabled: true
      responses:
