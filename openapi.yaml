            type: string
        action_names:
          type: array
          items:
            type: string
        concurrency:
          type: integer
          minimum: 1
        command:
          type: array
          items:
            type: string
        dir:
          type: string
    EnvironmentStartWorkerResult:
      type: object
      additionalProperties: false
      required:
      - environment
      - api_key_id
      - key_expires_at
      - managed_runtime
      - runtime_version
      - worker_log_path
      - stdout
      - stderr
      - exit_code
      properties:
        environment:
          $ref: '#/components/schemas/Environment'
        api_key_id:
          type: string
        key_expires_at:
          type: string
          format: date-time
        managed_runtime:
          type: boolean
        runtime_version:
          type: string
        runtime_installed_at:
          type: string
          format: date-time
        worker_log_path:
          type: string
        worker_session_id:
