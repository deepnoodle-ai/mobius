      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactStorageSettings'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/projects/{project}/settings/artifact-storage/quota:
    get:
      operationId: getArtifactStorageQuota
      tags:
      - artifacts
      summary: Get per-org Mobius-managed artifact storage quota usage
      description: Returns Mobius-managed artifact quota usage for the current org.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactQuotaUsage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |-
        Bearer credential supplied via the `Authorization: Bearer <credential>` header. Two credential types are accepted:

        - **API keys** — prefix `mbx_`. Issued from the Mobius app or via the
        API key endpoints. API keys authenticate as a service account in one
        project. Send the raw `mbx_...` secret for normal requests. A
        trailing `.<project_handle>` suffix is accepted for compatibility and
        is validated when present.
        - **CLI credentials** — prefix `mbc_`. Issued by the device-auth
        flow on behalf of a user. Unpinned CLI credentials are org-scoped and
        sent as the raw token. Project-pinned CLI credentials may include a
        trailing `.<project_handle>` suffix; the suffix is validated when
        present.
    XApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key supplied through the `x-api-key` header. This is primarily used
        by Anthropic-compatible clients targeting `/v1/messages`; project service-account
        keys are required for that endpoint.
  parameters:
    ProjectHandleParam:
      name: project
      in: path
      required: true
      schema:
        type: string
      description: Project handle (unique per organization)
    IDParam:
      name: id
      in: path
      required: true
      description: Resource ID.
      schema:
        type: string
    ActionNameParam:
      name: action_name
      in: path
      required: true
      description: Project-scoped action name used in automation step definitions.
      schema:
        type: string
    user_id:
      name: user_id
      in: path
      required: true
      description: User ID.
      schema:
        type: string
    presence_id:
      name: presence_id
      in: path
      required: true
      description: ID of the agent presence record.
      schema:
        type: string
    CursorParam:
      name: cursor
      in: query
      description: Cursor for pagination (opaque string from previous response)
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    TagFilterParam:
      name: tag
      in: query
      description: |-
        Filter results by tag. Repeatable; multiple values combine with AND. Format: `Key:Value`, `Key:*` for any value, `Key:a,b,c` for IN.

        Tag values containing `:` or `,` cannot be filtered with this grammar — the parser splits on those literally. Constrain values to plain identifiers when you intend to filter on them.

        Some high-cardinality resources may ignore ad-hoc tag filtering.
      explode: true
      schema:
        type: array
        items:
          type: string
    AdminOrgIDParam:
      name: org_id
      in: path
      required: true
      schema:
        type: string
      description: ID of the target organization for the admin operation.
    EnvironmentIDParam:
      name: environment_id
      in: path
      required: true
      schema:
        type: string
    SecretParam:
      name: secret
      in: path
      required: true
      schema:
        type: string
      description: Secret ID or project-scoped secret name.
    SecretVersionParam:
      name: version
      in: path
      required: true
      schema:
        type: string
      description: Secret version number or `latest`.
    ReferenceTypeParam:
      name: reference_type
      in: path
      required: true
      description: Reference type name, such as `slack.channel` or `table.table`.
      schema:
        type: string
    TableNameParam:
      name: table_name
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-z][a-z0-9_]*$
        maxLength: 64
      description: Table name, lowercase alphanumeric and underscores. Names are unique within
        the resolved scope. Omitted scope means the project/default scope; use `scope=owner`
        together with `owned_by` or `owned_by_me=true` for per-user memory tables. With `scope=owner`,
        the same table_name may exist under different owner scopes, so consumers must consider
        scope plus name when resolving uniqueness.
    TableScopeParam:
      name: scope
      in: query
      schema:
        $ref: '#/components/schemas/ResourceScope'
      description: Scope used to resolve `table_name`. Omit for the project/default scope;
        use `owner` with `owned_by` or `owned_by_me=true` for per-user memory tables. For
        list filters, scope is orthogonal and does not affect ownership-filter precedence.
    TableOwnedByParam:
      name: owned_by
      in: query
      schema:
        type: string
      description: Canonical user owner ID. Used with `scope=owner` for lookups; for list
        filters, narrows to tables owned by this user. Ignored when `owned_by_me=true` is
        present.
    TableOwnedByMeParam:
      name: owned_by_me
      in: query
      schema:
        type: boolean
      description: Resolve `table_name` in the authenticated user's owner scope, or filter
        lists to tables owned by the authenticated user.
    ArtifactIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^art_[A-Za-z0-9]+$
      description: TypeID of the artifact (`art_...`)
    RunIdParam:
      name: run_id
      in: path
      required: true
      schema:
        type: string
      description: Automation run ID
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded. Retry after the delay indicated in the `Retry-After`
        header.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Limit of the tightest active rate-limit bucket.
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Requests remaining in the tightest bucket's current window.
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp (seconds) when the tightest bucket resets.
        X-RateLimit-Scope:
          schema:
            type: string
            enum:
            - key
            - org
          description: Scope of the tightest bucket.
        X-RateLimit-Policy:
          schema:
            type: string
          description: All active windows for the selected scope, in `limit;w=seconds` form.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NoContent:
      description: No Content
    ProviderError:
      description: LLM provider error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      description: Standard error envelope returned by API endpoints.
      required:
      - error
      properties:
        error:
          type: object
          additionalProperties: false
          description: Error detail.
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              additionalProperties: true
              description: Optional structured details specific to a `code`. Endpoints that
                set this document the per-code shape inline. Absent for codes whose `code`
                + `message` are sufficient.
    ProjectID:
      type: string
      description: Project ID.
    ResourceScope:
      type: string
      enum:
      - owner
      description: Optional namespace for named runtime resources. Omitted/null means the
        project/default scope; `owner` means names are unique within `(project, owned_by)`.
    TagMap:
      type: object
      description: Key/value tag map. Keys 1–128 chars, values 0–256 chars. Keys with the
        `mobius:` prefix are system-managed and cannot be set by callers. Maximum 8 tags per
        resource. Use tags to organize resources by environment, team, cost-center, or any
        other dimension meaningful to your organization; tags can be filtered on most list
        endpoints.
      additionalProperties:
        type: string
        maxLength: 256
      maxProperties: 8
      example:
        Environment: Production
        Department: Finance
        Owner: team@example.com
    InteractionMode:
      type: string
      enum:
      - confirm
      - select
      - multi_select
      - input
      description: Declarative UI/input primitive for collecting the response. This is a portable
        rendering contract, not executable code. Values are `confirm`, `select`, `multi_select`,
        and `input`.
    InteractionOption:
      type: object
      required:
      - value
      - label
      additionalProperties: false
      description: Selectable option for `select` and `multi_select` modes.
      properties:
        value:
          type: string
          description: Machine-readable value submitted when this option is chosen.
        label:
          type: string
          description: Human-readable label displayed for this option.
        description:
          type: string
          description: Optional additional context shown beneath the label.
    InteractionSpec:
      type: object
      required:
      - mode
      additionalProperties: false
      description: |-
        Declarative dialog contract for rendering and validating an interaction. Used at both authoring time (inside an automation definition) and runtime (persisted on an interaction). PRD 077 decouples protocol kind from input shape: each kind declares which spec modes are *allowed*, not which is *implied*. An approval may now legitimately use `select` mode (approve/deny/defer), for example.

        Allowed combinations:
        * `approval` → `confirm`, `select`
        * `review` → `select`, `input`
        * `request` → `select`, `multi_select`, `input`
      properties:
        mode:
          $ref: '#/components/schemas/InteractionMode'
          description: UI/input mode used to render and validate the response.
        options:
          type: array
          maxItems: 100
          description: Required for `select` and `multi_select` modes.
          items:
            $ref: '#/components/schemas/InteractionOption'
        default_value:
          type: string
          description: Default selected option for `select` mode.
        default_values:
          type: array
          maxItems: 100
          description: Default selected options for `multi_select` mode.
          items:
            type: string
        default_text:
          type: string
          description: Initial text value for `input` mode.
        default_confirmed:
          type: boolean
          description: Initial yes/no value for `confirm` mode.
        placeholder:
          type: string
          description: Hint text shown for `input` mode.
        multiline:
          type: boolean
          description: When true, render `input` mode as a multiline text area.
    FeatureKey:
      type: string
      description: Server-defined product feature key. The launch product currently has no
        public/developer feature gates; this string type remains for internal operator override
        plumbing.
    FeatureOverrideScope:
      type: string
      enum:
      - org
      - project
      description: Scope for a feature override. Org overrides apply across the organization;
        project overrides apply only to the specified project and take precedence over org
        overrides.
    User:
      type: object
      additionalProperties: false
      description: Human identity known to the organization. User records are useful for membership
        lists, role assignment UIs, attribution, and displaying profile information next to
        actions.
      required:
      - id
      - email
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Clerk user ID. Stable and globally unique across all orgs.
        email:
          type: string
          description: Primary email address from Clerk.
        display_name:
          type: string
          description: Authoritative single-line label for this user, regardless of kind.
            Humans get "First Last"; agents get the agent name; service accounts get the SA
            name. Renderers should prefer this over first_name/last_name.
        color:
          type: string
          description: Optional Mantine palette key (e.g. "indigo") used by avatar surfaces
            when no avatar_url is set. Populated for agent-kind users; empty otherwise.
        first_name:
          type: string
          description: User's first name from their Clerk profile.
        last_name:
          type: string
          description: User's last name from their Clerk profile.
        avatar_url:
          type: string
          description: Profile avatar URL from Clerk (may be a Gravatar or uploaded image).
        created_at:
          type: string
          format: date-time
          description: When the user record was first mirrored into Mobius.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this user record was last synced from Clerk.
    ProjectAccessMode:
      type: string
      enum:
      - org_open
      - restricted
      description: '`org_open`: every org member can see and use the project, subject to role
        assignments. `restricted`: only listed project members (and org owners/admins) can
        see or use the project.'
    Project:
      type: object
      additionalProperties: false
      description: Workspace boundary for automations, actions, credentials, agents, and runtime
        activity. Most operational APIs are project-scoped, so this object tells clients which
        handle to use and who can see the project.
      required:
      - id
      - name
      - handle
      - access_mode
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this project.
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug used as a path segment in all project-scoped API routes.
            Unique within the org. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Current project access policy: `org_open` or `restricted`.'
        created_by:
          type: string
          description: User ID of the org member who created this project.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this project was archived. `null` for active projects.
            Archived projects are read-only and excluded from the default project listing.
        default_agent_role_id:
          type: string
          nullable: true
          description: Role assigned to the auto-created service account of any new agent
            in this project, when no per-call `role_ids` are supplied on `createAgent`. `null`
            falls through to the system `Agent` role floor.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this project.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this project was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this project was last updated.
    ProjectListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Project'
    AgentStatus:
      type: string
      enum:
      - active
      - inactive
      description: Administrative status. Inactive agents cannot claim new jobs. Soft-deleted
        agents are represented by `deleted_at` and excluded from normal reads.
    Agent:
      type: object
      additionalProperties: false
      description: Project-scoped AI actor identity backed by a service account. Agents are
        useful when automations need a named actor with instructions, capabilities, configuration,
        and session presence.
      required:
      - id
      - service_account_id
      - name
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this agent.
        service_account_id:
          type: string
          description: The service account whose credentials this agent uses to authenticate.
            Each service account backs at most one agent; this binding is immutable after
            creation.
        user_id:
          type: string
          description: Canonical user (users.id) backing this agent. Used as the `owned_by`
            value when filtering or claiming resources owned by this agent's backing user.
        name:
          type: string
          description: Mutable unique name within the project. Free-form human-readable label;
            use `id` for stable references and job targeting.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform agent classification for tooling and filtering (e.g. "llm",
            "rpa").
        color:
          type: string
          description: Display color for this agent in UI surfaces. One of the Mantine color
            palette keys (e.g. `indigo`, `teal`, `grape`); empty string falls back to a hash-derived
            color.
          maxLength: 24
        capabilities:
          type: object
          additionalProperties: true
          description: Arbitrary capability map used by orchestrators to select suitable agents.
        model:
          type: string
          description: Anthropic model identifier for platform agents (e.g. `claude-sonnet-4-6`).
            Empty string falls back to the platform default.
        system_prompt:
          type: string
          description: Custom system prompt for platform agents. Empty string uses the generated
            default based on the agent name.
        status:
          $ref: '#/components/schemas/AgentStatus'
          description: 'Current agent status: `active` or `inactive`.'
        email_address:
          type: string
          description: Inbox address provisioned via POST /v1/projects/{project}/agents/{id}/inbox
            (opt-in; not created automatically at agent creation). The field is populated
            only after a successful provisioning call. Use this address to add the agent as
            a member on external platforms (Linear, GitHub, Slack, etc.) so the platform can
            deliver notifications to the agent.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this agent.
        created_by:
          type: string
          description: User ID of the principal who created this agent.
        updated_by:
          type: string
          description: User ID of the principal who last updated this agent.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this agent was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this agent was last updated.
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the agent has been soft-deleted. Soft-deleted agents are excluded
            from normal listing and lookups but their records are retained so historical chat
            messages can resolve the sender name.
    AgentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Agent'
    AuditLogEntry:
      type: object
      additionalProperties: false
      description: Immutable record of a security- or configuration-relevant change. Use audit
        log entries to answer who changed a resource, when it happened, and which project
        or credential was involved.
      required:
      - id
      - action
      - resource_type
      - resource_id
      - created_at
      properties:
        id:
          type: string
          description: Unique audit log entry ID
        user_id:
          type: string
          description: ID of the user who performed the action
        project_id:
          type: string
          description: Project ID when the audited resource is project-scoped
        actor_name:
          type: string
          description: Display name of the user at the time the entry was written (snapshotted)
        credential_id:
          type: string
          description: Credential ID used for the request, when applicable
        credential_name:
          type: string
          description: Human-readable credential name or session label captured when the audit
            entry was written
        action:
          type: string
          enum:
          - create
          - update
          - delete
          - archive
          - restore
          description: 'Type of action performed: `create`, `update`, `delete`, `archive`,
            or `restore`.'
        resource_type:
          type: string
          description: Type of resource affected (e.g., automation, job, artifact)
        resource_id:
          type: string
          description: ID of the affected resource
        resource_name:
          type: string
          description: Human-readable name of the affected resource
        changes:
          type: object
          additionalProperties: true
          description: Object containing before/after changes for update actions
        ip_address:
          type: string
          description: IP address of the request
        user_agent:
          type: string
          description: User agent of the request
        created_at:
          type: string
          format: date-time
          description: Timestamp when the action was performed
    AuditLogListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        next_cursor:
          type: string
          description: Cursor for fetching next page of results
        has_more:
          type: boolean
          description: Whether more results are available
    APIKey:
      type: object
      additionalProperties: false
      description: Stored API credential metadata for automation and service access. The raw
        secret is never returned here; use this object to list, audit, expire, or identify
        keys by prefix without exposing tokens.
      required:
      - id
      - name
      - key_prefix
      - project_id
      - service_account_id
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this API key.
        name:
          type: string
          description: Human-readable label, unique within the project.
        key_prefix:
          type: string
          description: First 8 characters of the key, used to identify it without exposing
            the secret.
        project_id:
          $ref: '#/components/schemas/ProjectID'
          description: Project that owns the service account this key authenticates as.
        service_account_id:
          type: string
          description: Service account this key authenticates as.
        expires_at:
          type: string
          format: date-time
          description: Hard expiry timestamp. Requests using an expired key receive 401.
        last_used_at:
          type: string
          format: date-time
          description: Timestamp of the most recent authenticated request using this key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this API key.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this key was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this key was last updated.
    APIKeyCreateResult:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - key_prefix
      - project_id
      - service_account_id
      - created_at
      - updated_at
      - key
      description: Returned only on key creation. Contains the raw `key` value which is not
        retrievable after this response.
      properties:
        id:
          type: string
          description: Unique identifier for the created API key.
        name:
          type: string
          description: Human-readable name for the key.
        key_prefix:
          type: string
          description: First 8 characters of the key for identification.
        project_id:
          $ref: '#/components/schemas/ProjectID'
          description: Project that owns the service account this key authenticates as.
        service_account_id:
          type: string
          description: Service account this key authenticates as.
        expires_at:
          type: string
          format: date-time
          description: Timestamp when this key expires. Omitted if it does not expire.
        last_used_at:
          type: string
          format: date-time
          description: Timestamp of the most recent authenticated request using this key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this API key.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this key was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this key was last updated.
        key:
          type: string
          description: The raw API key. Returned only once at creation — store it securely
            immediately.
    APIKeyListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/APIKey'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateAPIKeyRequest:
      type: object
      required:
      - name
      - service_account_id
      additionalProperties: false
      description: Request shape for creating a project API key for a service account. The
        key authenticates as that service account; permissions are managed by assigning roles
        to the service account, not by granting permissions to the key.
      properties:
        name:
          type: string
          description: Human-readable label, unique within the project.
        service_account_id:
          type: string
          description: Service account this key authenticates as.
        expires_at:
          type: string
          format: date-time
          description: Optional hard expiry. Omit for a non-expiring key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    ActionAnnotationsRequest:
      type: object
      additionalProperties: false
      description: Request hints that describe the safe-use properties of the action. Used
        by the engine and tooling to decide retry behavior, dry-run eligibility, etc. Unknown
        request properties are rejected.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    ActionAnnotationsResponse:
      type: object
      additionalProperties: true
      description: Response hints that describe the safe-use properties of the action. Response
        annotations are forward-compatible so the server can add response-only hints without
        breaking strict clients.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    CreateActionRequest:
      type: object
      additionalProperties: false
      description: Registers a project-owned HTTP action endpoint callable from automations.
      required:
      - name
      - endpoint_url
      properties:
        name:
          type: string
          description: Project-scoped identifier used in automation step definitions. Lowercase
            alphanumeric + hyphens, e.g. "send-email". Must be unique within the project.
            Cannot start with "mobius." (reserved prefix).
        title:
          type: string
          description: Human-readable display name shown in the UI and catalog.
        description:
          type: string
          description: Markdown-safe description of what the action does.
        endpoint_url:
          type: string
          format: uri
          description: HTTP/HTTPS URL Mobius will POST to when invoking the action.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsRequest'
          description: Safe-use hints used by execution and authoring tools.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key-value string tags for filtering and organization.
    UpdateActionRequest:
      type: object
      additionalProperties: false
      description: Updates action metadata, endpoint, schemas, or safe-use hints.
      properties:
        title:
          type: string
          description: Replacement display title.
        description:
          type: string
          description: Replacement Markdown description.
        endpoint_url:
          type: string
          format: uri
          description: Replacement endpoint URL.
        input_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for inputs. Replaces the existing schema.
        output_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for outputs. Replaces the existing schema.
        annotations:
          type: object
          allOf:
          - $ref: '#/components/schemas/ActionAnnotationsRequest'
          nullable: true
          description: Pass null to clear all annotation flags.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Replacement tag map. Replaces the existing tags entirely.
    Action:
      type: object
      additionalProperties: false
      description: Project-owned HTTP action endpoint callable by automations.
      required:
      - id
      - name
      - endpoint_kind
      - endpoint_url
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this action.
        name:
          type: string
          description: Project-scoped stable identifier used in automation definitions.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          enum:
          - http
          - builtin
          description: Backing kind of this action. `http` actions are project-owned HTTP
            endpoints invoked via POST. `builtin` actions are Mobius platform actions registered
            in Go.
        endpoint_url:
          type: string
          format: uri
          description: 'HTTP/HTTPS URL Mobius POSTs to when invoking this action. Populated
            for endpoint_kind: http only.'
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsResponse'
          description: Safe-use hints returned for this action.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key-value string tags.
        secret_ref:
          type: string
          description: Project secret reference that stores this action's signing key. Present
            for HTTP-backed actions.
        secret_version:
          type: integer
          format: int64
          description: Version of `secret_ref` created by this response. Only populated on
            create and rotate responses.
        signing_secret:
          type: string
          description: Base64-encoded 32-byte HMAC-SHA256 signing key. Only populated on create
            and rotate responses; null on all other reads. Store this value securely on first
            receipt — it cannot be retrieved again.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this action was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this action was last updated.
    RotateSecretResult:
      type: object
      additionalProperties: false
      description: New signing key material returned after rotating a signing secret.
      required:
      - secret_ref
      - secret_version
      - signing_secret
      properties:
        secret_ref:
          type: string
          description: Project secret reference that now stores the rotated signing key.
        secret_version:
          type: integer
          format: int64
          description: New project-secret version number.
        signing_secret:
          type: string
          description: Base64-encoded 32-byte signing key. Store it immediately — this is
            the only time it is returned.
    ActionCatalogEntry:
      type: object
      additionalProperties: false
      description: One built-in, integration, or custom-backed action available to agents
        and automation authors.
      required:
      - name
      - source
      - available
      - endpoint_kind
      - risk
      - annotations
      properties:
        name:
          type: string
          description: Canonical dotted action name (e.g. `slack.post_message`). Translated
            to the provider-safe form (`slack_post_message`) only at the LLM boundary.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          enum:
          - builtin
          - http
          description: Backing kind. "builtin" for Mobius platform actions implemented in
            Go (no DB row), "http" for project-owned or integration HTTP endpoints.
        integration:
          type: string
          description: Integration slug this action belongs to (e.g. "slack"), if platform-provided.
        source:
          type: string
          enum:
          - platform
          - custom
          description: 'Origin of this action: "platform" for built-in or integration-backed
            actions provided by Mobius, "custom" for project-owned HTTP endpoints registered
            as actions. The `integration` field carries the provider slug for integration-backed
            platform actions.'
        available:
          type: boolean
          description: Whether this action can currently be invoked. False if the required
            integration is not connected, the action is a placeholder for a not-yet-implemented
            capability, or the caller lacks permission.
        risk:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
          description: Author-declared risk classification. Used by toolkit-author UIs to
            surface warnings and by audit views to prioritize attention.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsResponse'
          description: Safe-use hints returned for this catalog action. Always present; flags
            default to false.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        endpoint_url:
          type: string
          format: uri
          description: 'Endpoint URL (populated for endpoint_kind: http actions only).'
        execution:
          $ref: '#/components/schemas/ActionExecutionMetadata'
          description: Execution locations and worker requirements available to automation
            authors.
    ActionExecutionMetadata:
      type: object
      additionalProperties: false
      required:
      - supported_locations
      - default_location
      properties:
        supported_locations:
          type: array
          items:
            type: string
            enum:
            - managed
            - worker
            - environment
          description: Execution locations supported by this action.
        default_location:
          type: string
          enum:
          - managed
          - worker
          - environment
          description: Location selected by default in authoring UIs.
        required_worker_capabilities:
          type: array
          items:
            type: string
          description: Worker capability labels required when running this action on a customer
            worker.
        queue:
          type: string
          description: Queue to use when dispatching this action to workers.
    ActionCatalogListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated project action catalog. This endpoint returns the complete
        set of available project and platform actions so clients can build pickers without
        paging across a small catalog.
      properties:
        items:
          type: array
          description: The full list of catalog entries.
          items:
            $ref: '#/components/schemas/ActionCatalogEntry'
    InvokeActionRequest:
      type: object
      additionalProperties: false
      description: Request body for user-driven action invocation.
      properties:
        input:
          type: object
          description: Input values matching the action's input_schema.
          additionalProperties: true
        timeout_seconds:
          type: integer
          description: How long (in seconds) to wait for synchronous completion. Default 30,
            max 120. HTTP-backed actions complete inline.
          minimum: 1
          maximum: 120
        dry_run:
          type: boolean
          description: When true, validates the input but does not execute. Applies to read-only
            actions only.
    ActionInvocationResult:
      type: object
      additionalProperties: false
      description: Unified invocation result for any action kind. HTTP-backed actions produce
        status "completed".
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - active
          - completed
          - failed
          description: Terminal or in-progress status of the invocation.
        run_id:
          type: string
          description: Automation run ID. Present when an asynchronous run was created.
        output:
          type: object
          additionalProperties: true
          description: Action output. Present when status is "completed".
        error:
          type: string
          description: Error message. Present when status is "failed".
    ActionInvocationEntry:
      type: object
      additionalProperties: false
      description: Per-invocation telemetry record for one action execution.
      required:
      - id
      - action_name
      - source
      - status
      - retry_count
      - started_at
      - finished_at
      properties:
        id:
          type: string
          description: Unique identifier for this invocation record.
        run_id:
          type: string
          description: Automation run that triggered this invocation, if run-backed.
        job_id:
          type: string
          description: Job that triggered this invocation, if job-backed.
        step_name:
          type: string
          description: Automation step name that triggered this invocation.
        action_name:
          type: string
          description: Name of the action that was invoked.
        source:
          type: string
          description: Invocation source ("automation", "direct", etc.).
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters passed to the action.
        output_summary:
          type: object
          additionalProperties: true
          description: Truncated or summarized action output for audit purposes.
        status:
          type: string
          description: Terminal invocation status ("success", "failed", etc.).
        retry_count:
          type: integer
          description: Number of retry attempts before this terminal status was reached.
        started_at:
          type: string
          format: date-time
          description: Timestamp when this invocation started.
        finished_at:
          type: string
          format: date-time
          description: Timestamp when this invocation completed.
        error_type:
          type: string
          description: Machine-readable error classification when status is "failed".
        error_message:
          type: string
          description: Human-readable error detail when status is "failed".
    ActionInvocationListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of action invocation telemetry records.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ActionInvocationEntry'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    EnvironmentProvider:
      type: string
      enum:
      - sprites
      - cloudflare_containers
    EnvironmentStatus:
      type: string
      enum:
      - provisioning
      - ready
      - running
      - retained
      - destroying
      - destroyed
      - failed
      - orphaned
    EnvironmentLifetime:
      type: string
      enum:
      - run
      - lease
      - explicit
      description: Lifecycle owner for automatic cleanup. `run` environments are destroyed
        during their owning run's Finalize phase; `lease` environments are reaped after lease
        expiry; `explicit` environments require an explicit destroy call.
    EnvironmentPurpose:
      type: string
      enum:
      - implementation
      - review
      - verification
      - preview
      - debug
      - worker
      - custom
    EnvironmentMode:
      type: string
      enum:
      - manual
      - run
      - agent
      - automation
      description: High-level ownership policy for how Mobius plans to use the environment.
        `run` is one-shot and auto-cleaned with a run; `agent` and `automation` are persistent
        environment policies; `manual` is operator controlled.
    EnvironmentBoundToType:
      type: string
      enum:
      - none
      - run
      - worker_session
      - service
      - agent
      - automation
      - manual
      description: Execution or lifecycle object this environment is bound to. Ownership remains
        in `owned_by`.
    EnvironmentRetentionPolicy:
      type: string
      enum:
      - manual
      - destroy_on_success
      - retain_on_failure
      - retain_always
    EnvironmentCleanupStatus:
      type: string
      enum:
      - none
      - pending
      - succeeded
      - failed
      - skipped
    EnvironmentLeaseStatus:
      type: string
      enum:
      - active
      - released
      - expired
      - revoked
    Environment:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - provider
      - status
      - environment_mode
      - lifetime
      - capabilities
      - spec_version
      - runtime
      - contains_secrets
      - cleanup_status
      - retention_policy
      - created_at
      - updated_at
      properties:
        id:
          type: string
        name:
          type: string
        scope:
          $ref: '#/components/schemas/ResourceScope'
        provider:
          $ref: '#/components/schemas/EnvironmentProvider'
        provider_resource_id:
          type: string
        provider_resource_name:
          type: string
        status:
          $ref: '#/components/schemas/EnvironmentStatus'
        environment_mode:
          $ref: '#/components/schemas/EnvironmentMode'
        lifetime:
          $ref: '#/components/schemas/EnvironmentLifetime'
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        owned_by:
          type: string
          description: Canonical user owner ID. For agent-started work, this is the agent's
            backing user ID.
        bound_to_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        bound_to_id:
          type: string
          description: ID of the run, worker session, service, or manual association named
            by `bound_to_type`.
        created_by:
          type: string
          description: User ID of the principal who created this environment.
        updated_by:
          type: string
          description: User ID of the principal who last updated this environment.
        run_id:
          type: string
        job_id:
          type: string
        current_worker_session_id:
          type: string
        agent_id:
          type: string
        template_id:
          type: string
          enum:
          - coding-default
        capabilities:
          type: array
          maxItems: 50
          items:
            type: string
        spec_version:
          type: integer
          minimum: 1
        spec:
          type: object
          additionalProperties: true
        runtime:
          type: object
          additionalProperties: true
          description: Provider-observed runtime data. URLs live under runtime.urls, with
            runtime.urls.primary as the primary URL when present.
        tags:
          $ref: '#/components/schemas/TagMap'
        contains_secrets:
          type: boolean
        cleanup_status:
          $ref: '#/components/schemas/EnvironmentCleanupStatus'
        retention_policy:
          $ref: '#/components/schemas/EnvironmentRetentionPolicy'
        lease_expires_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        last_reconciled_at:
          type: string
          format: date-time
        last_error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        destroyed_at:
          type: string
          format: date-time
    EnvironmentLease:
      type: object
      additionalProperties: false
      required:
      - id
      - environment_id
      - status
      - acquired_at
      properties:
        id:
          type: string
        environment_id:
          type: string
        holder_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        holder_id:
          type: string
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        status:
          $ref: '#/components/schemas/EnvironmentLeaseStatus'
        acquired_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        released_at:
          type: string
          format: date-time
    EnvironmentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Environment'
        has_more:
          type: boolean
        next_cursor:
          type: string
    CreateEnvironmentRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        scope:
          $ref: '#/components/schemas/ResourceScope'
        provider:
          $ref: '#/components/schemas/EnvironmentProvider'
        environment_mode:
          $ref: '#/components/schemas/EnvironmentMode'
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        owned_by:
          type: string
          description: Canonical user owner ID. Defaults to the authenticated user.
        bound_to_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        bound_to_id:
          type: string
        lifetime:
          $ref: '#/components/schemas/EnvironmentLifetime'
        template_id:
          type: string
          enum:
          - coding-default
          description: V1 supports only coding-default.
        spec:
          type: object
          additionalProperties: true
        tags:
          $ref: '#/components/schemas/TagMap'
        retention_policy:
          $ref: '#/components/schemas/EnvironmentRetentionPolicy'
    UpdateEnvironmentRequest:
      type: object
      additionalProperties: false
      properties:
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        retention_policy:
          $ref: '#/components/schemas/EnvironmentRetentionPolicy'
        scope:
          type: string
          allOf:
          - $ref: '#/components/schemas/ResourceScope'
          nullable: true
        owned_by:
          type: string
          nullable: true
        bound_to_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        bound_to_id:
          type: string
          nullable: true
        tags:
          $ref: '#/components/schemas/TagMap'
    AcquireEnvironmentRequest:
      type: object
      additionalProperties: false
      properties:
        environment_id:
          type: string
        template_id:
          type: string
          enum:
          - coding-default
          description: V1 supports only coding-default.
        name:
          type: string
        scope:
          $ref: '#/components/schemas/ResourceScope'
        provider:
          $ref: '#/components/schemas/EnvironmentProvider'
        environment_mode:
          $ref: '#/components/schemas/EnvironmentMode'
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        holder_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        holder_id:
          type: string
        owned_by:
          type: string
          description: Canonical user owner ID. Defaults to the authenticated user.
        bound_to_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        bound_to_id:
          type: string
        lifetime:
          $ref: '#/components/schemas/EnvironmentLifetime'
        spec:
          type: object
          additionalProperties: true
        tags:
          $ref: '#/components/schemas/TagMap'
        lease_ttl:
          type: string
          description: Go duration string, for example 30m or 2h.
    EnvironmentAcquireResult:
      type: object
      additionalProperties: false
      required:
      - environment
