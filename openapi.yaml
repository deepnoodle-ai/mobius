    InteractionListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Interaction'
    CreateInteractionRequest:
      type: object
      required:
      - type
      - target_actor
      - message
      description: 'Creates an interaction directly. When `run_id` is provided,

        `signal_name` is also required and the interaction is linked to that

        run. When both are omitted, the interaction is standalone and

        completes with no workflow resume side effect. For worker/job usage,

        prefer the job-scoped route so the server can derive the owning run

        from the claimed job context.

        '
      properties:
        run_id:
          type: string
          nullable: true
          description: ID of the workflow run to resume when this interaction is completed.
        signal_name:
          type: string
          nullable: true
          description: Signal name the interaction will complete against when run-backed.
        target_actor:
          $ref: '#/components/schemas/ActorRef'
        type:
          $ref: '#/components/schemas/InteractionType'
        message:
          type: string
          description: Message shown to the responder describing what response is
            needed.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the
            message.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
        require_all:
          type: boolean
          default: false
          description: 'When target_actor.type is "group", setting require_all=true

            means all snapshotted group members must respond before the

            interaction is considered complete. Ignored for non-group targets.

            '
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded
            to.
    RespondToInteractionRequest:
      type: object
      properties:
        value:
          $ref: '#/components/schemas/InteractionValue'
        comment:
          type: string
          description: Optional free-text comment accompanying the response.
    SlackInstall:
      type: object
      required:
      - authorize_url
      properties:
        authorize_url:
          type: string
          description: The Slack OAuth authorize URL to redirect the user to.
    Group:
      type: object
      required:
      - id
      - handle
      - name
      - routing_policy
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this group.
        handle:
          type: string
          description: URL-safe identifier, unique within the project. Immutable after
            creation.
        name:
          type: string
          description: Human-readable display name.
        description:
          type: string
          description: Optional human-readable description.
        routing_policy:
          type: string
          enum:
          - first_responder
          - all_members
          description: 'How interactions targeting this group collect responses.

            `first_responder`: first member to claim or respond wins.

            `all_members`: every snapshotted member must respond.

            '
        created_at:
          type: string
          format: date-time
          description: Timestamp when this group was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this group was last updated.
    GroupListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Group'
    GroupWithCount:
      allOf:
      - $ref: '#/components/schemas/Group'
      - type: object
        required:
        - member_count
        properties:
          member_count:
            type: integer
            description: Current live member count. May differ from interaction membership
              snapshots.
    GroupWithCountListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/GroupWithCount'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent
            when `has_more` is false.
    GroupMember:
      type: object
      required:
      - id
      - group_id
      - user_id
      - added_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        group_id:
          type: string
          description: ID of the group this membership belongs to.
        user_id:
          type: string
          description: ID of the user who is a member.
        added_by:
          type: string
          nullable: true
          description: User ID of the org member who added this person to the group.
        added_at:
          type: string
          format: date-time
          description: Timestamp when this member was added to the group.
    GroupMemberListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/GroupMember'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent
            when `has_more` is false.
    CreateGroupRequest:
      type: object
      required:
      - name
      properties:
        handle:
          type: string
          description: URL-safe handle, unique within the project. Auto-derived from
            name if omitted.
        name:
          type: string
          description: Display name (1–64 chars).
        description:
          type: string
          description: Optional human-readable description.
        routing_policy:
          type: string
          enum:
          - first_responder
          - all_members
          default: first_responder
          description: How responses are collected from group members. Defaults to
            `first_responder`.
    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        description:
          type: string
          description: Replacement description.
        routing_policy:
          type: string
          enum:
          - first_responder
          - all_members
          description: Affects future interactions only; in-flight interactions retain
            the snapshotted policy.
    AddGroupMemberRequest:
      type: object
      required:
      - user_id
      properties:
        user_id:
          type: string
          description: Org member user ID to add. Must be a current org member.
    AgentStatus:
      type: string
      enum:
      - active
      - inactive
      description: Administrative status. Inactive agents cannot claim new jobs.
    AgentPresence:
      type: string
      enum:
      - online
      - offline
      - stale
      description: 'Computed from the most recent 20 sessions. `online` means a connected

        session with a fresh heartbeat; `stale` means heartbeats are overdue;

        `offline` means no connected sessions.

        '
    AgentSessionStatus:
      type: string
      enum:
      - connected
      - disconnected
      - stale
    Agent:
      type: object
      required:
      - id
      - service_account_id
      - name
      - status
      - presence
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this agent.
        service_account_id:
          type: string
          description: The service account whose credentials this agent uses to authenticate.
            Can be changed via PATCH.
        name:
          type: string
          description: Mutable unique name within the project. Use `id` for stable
            references and job targeting.
          pattern: ^[a-z0-9]([a-z0-9_-]{0,61}[a-z0-9])?$
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
        kind:
          type: string
          description: Freeform agent classification for tooling and filtering (e.g.
            "llm", "rpa").
        capabilities:
          type: object
          additionalProperties: true
          description: Arbitrary capability map used by orchestrators to select suitable
            agents.
        config:
          type: object
          additionalProperties: true
          description: Agent-specific configuration blob stored and returned opaquely.
        status:
          $ref: '#/components/schemas/AgentStatus'
        presence:
          $ref: '#/components/schemas/AgentPresence'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this agent was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this agent was last updated.
    AgentSession:
      type: object
      required:
      - id
      - agent_id
      - status
      - transport
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this session.
        agent_id:
          type: string
          description: ID of the agent this session belongs to.
        status:
          $ref: '#/components/schemas/AgentSessionStatus'
        transport:
          type: string
          description: Connection mechanism identifier (e.g. "sse", "polling").
        metadata:
          type: object
          additionalProperties: true
          description: Caller-supplied metadata (e.g. hostname, version, region).
        connected_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this session was established.
        last_seen_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent heartbeat.
        disconnected_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this session was closed. Null while connected.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this session record was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this session was last updated.
    AgentListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Agent'
    AgentSessionListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/AgentSession'
    CreateAgentRequest:
      type: object
      required:
      - service_account_id
      - name
      properties:
        service_account_id:
          type: string
          description: Service account that backs this agent. Must be active and belong
            to the same project.
        name:
          type: string
          description: Project-scoped unique name for this agent. Must match pattern
            and be 1-63 characters.
          pattern: ^[a-z0-9]([a-z0-9_-]{0,61}[a-z0-9])?$
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
        kind:
          type: string
          description: Freeform classification (e.g. "llm", "rpa", "integration").
        capabilities:
          type: object
          additionalProperties: true
          description: Arbitrary capability map used by orchestrators to select suitable
            agents.
        config:
          type: object
          additionalProperties: true
          description: Agent-specific configuration stored and returned opaquely.
    UpdateAgentRequest:
      type: object
      properties:
        service_account_id:
          type: string
          description: Replacement service account. Must be active and belong to the
            same project.
        name:
          type: string
          description: Replacement name. Must be unique within the project and match
            the agent name pattern.
          pattern: ^[a-z0-9]([a-z0-9_-]{0,61}[a-z0-9])?$
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Replacement description.
          maxLength: 500
        kind:
          type: string
          description: Replacement freeform agent classification (e.g. `llm`, `rpa`).
        capabilities:
          type: object
          additionalProperties: true
          description: Replacement capability map.
        config:
          type: object
          additionalProperties: true
          description: Replacement configuration blob.
        status:
          $ref: '#/components/schemas/AgentStatus'
    CreateAgentSessionRequest:
      type: object
      required:
      - transport
      properties:
        transport:
          type: string
          description: Connection mechanism identifier (e.g. "sse", "polling").
        metadata:
          type: object
          additionalProperties: true
          description: Optional metadata such as hostname, SDK version, or region.
    ServiceAccountStatus:
      type: string
      enum:
      - active
      - disabled
      description: '`disabled` blocks authentication and job claims but preserves
        the record and its assignments.'
    ServiceAccount:
      type: object
      required:
      - id
      - name
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this service account.
        name:
          type: string
          description: Human-readable name for this service account. Immutable after
            creation.
        description:
          type: string
          description: Optional human-readable description.
        status:
          $ref: '#/components/schemas/ServiceAccountStatus'
        owner_user_id:
          type: string
          description: Optional org member responsible for this service account.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key-value metadata. Subject to size and nesting depth
            limits.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this service account was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this service account was last updated.
    ServiceAccountListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ServiceAccount'
    CreateServiceAccountRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable name for this service account. Immutable after
            creation.
        description:
          type: string
          description: Optional human-readable description.
        owner_user_id:
          type: string
          description: Org member responsible for this service account.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary metadata to attach to the service account.
        role_ids:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: 'One or more role IDs to assign at creation time. All assignments
            are

            created atomically with the service account. Requires `mobius.permission.manage`.

            Each role must belong to this project or be org-scoped (project_id empty).

            '
    UpdateServiceAccountRequest:
      type: object
      properties:
        description:
          type: string
          description: Replacement description.
        status:
          $ref: '#/components/schemas/ServiceAccountStatus'
        owner_user_id:
          type: string
          description: ID of the org member responsible for this service account.
        metadata:
          type: object
          additionalProperties: true
          description: Replacement metadata.
    ToolDefinition:
      type: object
      required:
      - name
      - description
      - input_schema
      properties:
        name:
          type: string
          description: Tool name (workflow handle). Stable across publish/unpublish
            cycles.
        description:
          type: string
          description: Human-readable description of what the tool does.
        input_schema:
          type: object
          description: JSON Schema Draft 7 object describing the tool inputs.
          additionalProperties: true
    ToolDefinitionListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          description: The list of published workflow tools.
          items:
            $ref: '#/components/schemas/ToolDefinition'
    ToolRunRequest:
      type: object
      properties:
        input:
          type: object
          description: Input values matching the tool's input_schema.
          additionalProperties: true
        timeout_seconds:
          type: integer
          description: 'How long (in seconds) to wait for synchronous completion.

            Default 30, max 120. If the run does not complete within this

            window the response is 202 with status pending.

            '
          minimum: 1
          maximum: 120
    ToolRun:
      type: object
      required:
      - run_id
      - status
      properties:
        run_id:
          type: string
          description: Unique run identifier for polling.
        status:
          type: string
          description: Run status — "pending", "running", "completed", or "failed".
          enum:
          - pending
          - running
          - completed
          - failed
          - suspended
        output:
          type: object
          description: Run output. Present when status is "completed".
          additionalProperties: true
        error:
          type: string
          description: Error message. Present when status is "failed".
