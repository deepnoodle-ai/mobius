      properties:
        command:
          type: array
          minItems: 1
          items:
            type: string
        dir:
          type: string
        env:
          type: array
          items:
            type: string
        stdin:
          type: string
    EnvironmentExecResult:
      type: object
      additionalProperties: false
      required:
      - stdout
      - stderr
      - exit_code
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer
    WriteEnvironmentFileRequest:
      type: object
      additionalProperties: false
      required:
      - path
      - content
      properties:
        path:
          type: string
        content:
          type: string
    StartEnvironmentWorkerRequest:
