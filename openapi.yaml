          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: deleteProject
      tags:
      - projects
      summary: Delete project
      description: Deletes the project from active use. New trigger fires, scheduled runs,
        manual starts, and edits are blocked; in-flight runs are allowed to drain. The project
        is hidden from project listings, but historical runs remain readable while the retained
        record exists.
