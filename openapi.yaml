              signal_name: manager_approval
              target_user_ids:
              - user_2f9s3k4m5n6p7q8r9s0t1u2v3w
              kind: request_approval
              title: Approve publishing the April billing report?
              context:
                report_id: rpt_2026_04
                amount_usd: 12850
              spec:
                mode: confirm
                default_confirmed: false
              require_all: false
              expires_at: '2026-04-25T14:30:00Z'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interaction'
              example:
                id: int_01hw1r2s3t4u5v6w7x8y9z0a1b
                run_id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                signal_name: manager_approval
                kind: request_approval
                status: pending
                title: Approve publishing the April billing report?
                context:
                  report_id: rpt_2026_04
                  amount_usd: 12850
                spec:
                  mode: confirm
                  default_confirmed: false
                target_user_ids:
                - user_2f9s3k4m5n6p7q8r9s0t1u2v3w
                expires_at: '2026-04-25T14:30:00Z'
                created_at: '2026-04-24T14:30:00Z'
                updated_at: '2026-04-24T14:30:00Z'
                require_all: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      operationId: listInteractions
      tags:
      - interactions
      summary: List interactions
      description: Returns interactions newest-first, optionally filtered by kind, status,
        run, target, or the current caller's inbox. Inbox filtering includes direct targets.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: status
