        are either a direct equality match or an operator object: `{"$eq": v}`, `{"$ne": v}`,
        `{"$gt": v}`, `{"$gte": v}`, `{"$lt": v}`, `{"$lte": v}`, `{"$in": [v,...]}`, `{"$exists":
        bool}`.'
