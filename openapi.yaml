        org_id:
          type: string
        project_id:
          type: string
        run_id:
          type: string
        step_id:
          type: string
        trace_id:
          type: string
        span_id:
          type: string
        timestamp:
          type: string
          format: date-time
        observed_at:
          type: string
          format: date-time
        severity_text:
          type: string
        severity_number:
          type: integer
        body:
          type: string
        attributes:
          type: object
          additionalProperties: true
        service_name:
          type: string
        created_at:
          type: string
          format: date-time
    LogRecordListResponse:
