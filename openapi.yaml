        `failed`, `skipped`, or `cancelled`.'
    LoopRunStep:
      type: object
      additionalProperties: false
      description: One execution step inside a loop run.
      required:
      - id
      - run_id
      - step_key
      - kind
      - status
      - seq
      - attempt
      - created_at
      - updated_at
      properties:
