        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: addProjectMember
      tags:
      - projects
      summary: Add a project member
      description: Adds a user as a project member. The user must already be an org member.
        Add is idempotent — adding an existing member returns the existing row with `200 OK`,
        not `409`. New memberships are returned with `201 Created`.
      parameters:
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProjectMemberRequest'
      responses:
        '200':
          description: OK — member already existed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMember'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMember'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{id}/members/{user_id}:
    delete:
      operationId: removeProjectMember
