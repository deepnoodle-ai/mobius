        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteArtifact
      tags:
      - artifacts
      summary: Delete an artifact
      description: Soft-delete the row and (for Mobius-managed) delete the underlying object
        best-effort. Pinned artifacts are refused unless `force=true`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
