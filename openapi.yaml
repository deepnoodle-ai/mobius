      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSessionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/agents/{id}/sessions/{session_id}:
    get:
      operationId: getAgentSession
      tags:
      - agents
      summary: Get an agent session
      description: Returns one live or historical session for the agent. Use this to inspect
        transport details, heartbeat freshness, and disconnect state for a specific worker
        process.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/session_id'
