          description: Ordering position of this assignment in the agent's skill list.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
    ReplaceSkillsRequest:
      type: object
      additionalProperties: false
      required:
      - skill_ids
      properties:
        skill_ids:
          type: array
          description: Full replace-set of skill IDs to assign to the agent, in desired order.
          items:
            type: string
    SkillAssignmentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Skill assignments for this agent, in position order.
          items:
            $ref: '#/components/schemas/SkillAssignment'
    SkillManifestEntry:
      type: object
      additionalProperties: false
      description: Skill entry included in a resolved agent tool manifest.
      required:
      - id
      - name
      - instructions
      - active
      properties:
        id:
          type: string
          description: Skill ID this manifest entry resolved to.
        name:
          type: string
          description: Display name of the skill.
        instructions:
          type: string
          description: Markdown instructions loaded for this skill.
        active:
          type: boolean
          description: Whether this skill is currently active in the resolved manifest.
        missing_required:
          type: array
          description: Tool selectors the skill requires but that are not available to the
            agent.
          items:
            type: string
        missing_recommended:
          type: array
          description: Tool selectors the skill recommends but that are not available to the
            agent.
          items:
            type: string
    AgentManifestWarning:
      type: object
      additionalProperties: false
      description: Non-fatal warning produced while resolving an agent tool manifest.
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Machine-readable warning code.
        message:
          type: string
          description: Human-readable warning text.
        skill_id:
          type: string
          description: Skill the warning relates to, when applicable.
        toolkit_id:
          type: string
          description: Toolkit the warning relates to, when applicable.
        tool:
          type: string
          description: Tool selector the warning relates to, when applicable.
        action:
          type: string
          description: Action name the warning relates to, when applicable.
    ResolvedActionGroup:
      type: object
      additionalProperties: false
      description: Action group expanded during manifest resolution.
      required:
      - name
      - members
      properties:
        name:
          type: string
          description: Canonical group name (e.g. `mobius.table.read`).
        members:
          type: array
          description: Action names the group expanded to during this resolution.
          items:
            type: string
    AgentToolManifest:
      type: object
      additionalProperties: false
      required:
      - agent_id
      - policy_hash
      - toolkit_ids
      - tools
      - skills
      - warnings
      description: 'The flat, resolved tool set visible to one agent. Replaces the prior Capability/Action
        split: every entry in `tools` is an action catalog entry the agent can invoke as its
        own named tool.'
      properties:
        agent_id:
          type: string
          description: Agent this manifest was resolved for.
        policy_hash:
          type: string
          description: Stable hash over the resolved tool + skill set; bumps when assigned
            toolkits or skills change.
        toolkit_ids:
          type: array
          description: Toolkit IDs that contributed to the resolved manifest.
          items:
            type: string
        tools:
          type: array
          description: Catalog entries the agent can invoke. Each entry surfaces to the LLM
            as its own named tool. Built-in, integration, loop, and custom-HTTP actions are
            intermingled here.
          items:
            $ref: '#/components/schemas/ActionCatalogEntry'
        groups_resolved:
          type: array
          description: Audit trail of group selectors that contributed to the resolved tool
            set. Operators see groups; the LLM only sees the flat `tools` list.
          items:
            $ref: '#/components/schemas/ResolvedActionGroup'
        skills:
          type: array
          description: Skills active for this agent in the resolved manifest.
          items:
            $ref: '#/components/schemas/SkillManifestEntry'
        warnings:
          type: array
          description: Non-fatal issues encountered while resolving the manifest.
          items:
            $ref: '#/components/schemas/AgentManifestWarning'
    CreateAgentRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Unique name for this agent. Free-form human-readable label, 1-63 characters.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform classification (e.g. "llm", "rpa", "integration").
        color:
          type: string
          description: Display color for this agent (Mantine palette key, e.g. `indigo`).
            Optional; empty falls back to a hash-derived color.
          maxLength: 24
        model:
          type: string
          description: Model identifier for platform agents. Any id from `GET /v1/projects/{project_handle}/catalog/models`,
            optionally `provider/`-prefixed (e.g. `xai/grok-4`); bare known ids (e.g. `claude-sonnet-4-6`)
            are auto-detected. Empty falls back to the platform default.
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Default route for model calls made by this agent.
        tool_presentation:
          $ref: '#/components/schemas/AgentToolPresentation'
          description: Omit to use the create-time default, `flat`.
        system_prompt:
          type: string
          description: Custom system prompt for platform agents. Empty uses the generated
            default.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial labels used for filtering, ownership, or automation.
      example:
        name: PR reviewer
        description: Reviews pull requests for risky changes.
        kind: llm
        color: teal
        model: claude-sonnet-4-6
        tool_presentation: flat
        tags:
          owner: product
    UpdateAgentRequest:
      type: object
      additionalProperties: false
      description: 'Mutable agent fields. The agent''s backing identity (`principal_id`, the
        machine principal created atomically with the agent) is intentionally absent: it is
        immutable. Reassigning identity is delete-and-recreate.'
      properties:
        name:
          type: string
          description: Free-form human-readable label, 1-63 characters; must be unique within
            the project.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Replacement description.
          maxLength: 500
        kind:
          type: string
          description: Replacement freeform agent classification (e.g. `llm`, `rpa`).
        color:
          type: string
          description: Replacement display color (Mantine palette key, e.g. `indigo`). Pass
            empty string to clear and fall back to a hash-derived color.
          maxLength: 24
        model:
          type: string
          description: Replacement model identifier for platform agents (any id from `GET
            /v1/projects/{project_handle}/catalog/models`, optionally `provider/`-prefixed).
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Replacement default route for model calls made by this agent.
        tool_presentation:
          $ref: '#/components/schemas/AgentToolPresentation'
          description: Replacement tool presentation used by loop agent steps and channel
            replies.
        system_prompt:
          type: string
          description: Replacement system prompt for platform agents.
        status:
          type: string
          enum:
          - active
          - inactive
          description: 'Replacement agent status: `active` or `inactive`. Use DELETE to delete
            the agent.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Replacement labels; send an empty object to clear all tags.
    ToolkitAction:
      type: object
      additionalProperties: false
      required:
      - selector_type
      - selector
      description: Action selector included in a toolkit.
      properties:
        selector_type:
          type: string
          enum:
          - exact
          - group
          - platform
          - custom
          - wildcard
          description: 'Selector type: `exact`, `group`, `platform`, `custom`, or `wildcard`.'
        selector:
          type: string
          description: 'Selector value. Examples: `github.list_issues`, `github.*`, `platform.github.*`,
            `custom.*`, or `*`.'
      example:
        selector_type: exact
        selector: github.create_review_comment
    Toolkit:
      type: object
      additionalProperties: false
      description: Reusable bundle of action selectors assignable to agents.
      required:
      - id
      - name
      - source
      - actions
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Toolkit ID.
        name:
          type: string
          description: Human-readable toolkit name.
        description:
          type: string
          description: Markdown description of the toolkit's purpose.
        source:
          type: string
          enum:
          - system
          - project
          description: Provenance of this toolkit. `system` toolkits are built-in; `project`
            toolkits are user-authored.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Labels to apply to the toolkit.
        actions:
          type: array
          description: Action selectors provided by this toolkit. Each entry is matched against
