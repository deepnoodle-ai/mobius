    WorkflowInteractionStep:
      type: object
      description: Creates a human or agent interaction and resumes when the interaction completes.
      additionalProperties: false
      required:
      - name
      - interaction
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the interaction completes.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        interaction:
          $ref: '#/components/schemas/WorkflowInteractionConfig'
          description: Interaction prompt, recipient, response schema, and timeout behavior.
    WorkflowInteractionKindStep:
      type: object
      description: Canonical authored interaction step using `kind` and `with`.
      additionalProperties: false
      required:
      - name
      - kind
      - with
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        kind:
          type: string
          enum:
          - interaction
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after the interaction
            completes.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the interaction completes.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        with:
          $ref: '#/components/schemas/WorkflowInteractionConfig'
          description: Interaction prompt, recipient, response schema, and timeout behavior.
    WorkflowCodeSpec:
      type: object
      description: |-
        Configuration for a code workflow. Sibling shape to `WorkflowSpec.steps`: a workflow with `code` set delegates its control flow to a user-authored handler running on a worker (TypeScript today, with other runtimes to follow). The handler invokes step.run(), step.sleep(), step.waitForSignal() etc. via the SDK; each call is durably checkpointed against the run ledger so the handler replays deterministically across yield/resume cycles.

        Code workflows do not use `steps`; the handler's runtime control flow is the graph.
      additionalProperties: false
      required:
      - handler
      properties:
        handler:
          type: string
          minLength: 1
          description: Stable identifier the worker SDK registered the handler under (typically
            equal to the workflow definition name). The server emits jobs whose `spec.code.handler`
            equals this value; the worker dispatches the job to the matching handler.
        runtime:
          type: string
          description: Opaque hint identifying the language/runtime that owns this handler
            ("typescript", "python", etc.). Used by the UI for display only; the engine does
            not interpret it.
        queue:
          type: string
          description: Optional worker queue the code-invoke job is dispatched to. When empty,
            the run-level queue is used.
    WorkflowEdgeMatchingStrategy:
      type: string
      enum:
      - all
      - first
      description: 'Controls matching when multiple outbound edge conditions are true: `all`
        follows every matching edge in parallel, while `first` follows only the first matching
        edge in declaration order.'
    WorkflowEdge:
      type: object
      description: Directed transition from one workflow step to another.
      required:
      - step
      additionalProperties: false
      properties:
        step:
          type: string
          description: Name of the step to transition to.
        condition:
          type: string
          description: Expression that must evaluate to true for this edge to be followed.
        branch:
          type: string
          description: Branch name assigned to parallel execution started by this edge.
        layout:
          $ref: '#/components/schemas/WorkflowEdgeLayout'
          description: Optional visual-editor routing hint; ignored by the execution engine.
    WorkflowEdgeLayout:
      type: object
      additionalProperties: false
      description: Optional presentation hint for an edge in the visual editor. Lets the editor
        persist user-adjusted orthogonal routes. Ignored by the execution engine; when absent,
        the editor auto-routes the edge.
      properties:
        waypoints:
          type: array
          description: Ordered list of canvas-coordinate corner points the edge should pass
            through, between source and target handles.
          items:
            $ref: '#/components/schemas/WorkflowPoint'
    WorkflowPoint:
      type: object
      additionalProperties: false
      required:
      - x
      - y
      description: A point in workflow editor canvas coordinates.
      properties:
        x:
          type: number
        y:
          type: number
    WorkflowEach:
      type: object
      description: Fan-out configuration that repeats a step over a collection.
      required:
      - items
      additionalProperties: false
      properties:
        items:
          description: Expression or literal collection to iterate over.
        as:
          type: string
          description: Variable name bound to the current iteration element.
    WorkflowRetry:
      type: object
      description: Retry policy for a workflow step after a recoverable failure.
      additionalProperties: false
      properties:
        error_equals:
          type: array
          description: Error class names this policy applies to. Use `all` or `*` for a wildcard.
            Retries all errors when omitted.
          items:
            type: string
        max_retries:
          type: integer
          minimum: 0
          description: Maximum number of retry attempts. Zero disables retries.
        base_delay:
          type: string
          description: Go duration string.
        max_delay:
          type: string
          description: Go duration string.
        backoff_rate:
          type: number
          description: Exponential backoff multiplier applied to the delay after each attempt.
        jitter_strategy:
          type: string
          enum:
          - NONE
          - FULL
          description: 'Jitter strategy to apply to the computed delay: NONE or FULL.'
        timeout:
          type: string
          description: Go duration string.
    WorkflowCatch:
      type: object
      description: Error routing rule that transfers execution to another step.
      required:
      - error_equals
      - next
      additionalProperties: false
      properties:
        error_equals:
          type: array
          description: Error class names this catch clause handles. Use `all` or `*` for a
            wildcard.
          items:
            type: string
        next:
          type: string
          description: Step name to transition to when this clause is matched.
    WorkflowJoinConfig:
      type: object
      additionalProperties: false
      description: Waits for one or more parallel branches to complete before proceeding.
      properties:
        branches:
          type: array
          items:
            type: string
          description: Branch names to wait for. Defaults to all branches if omitted.
        count:
          type: integer
          minimum: 0
          description: Minimum number of branches that must complete. Defaults to all listed
            branches.
        result:
          type: object
          additionalProperties: true
          description: Explicit object this join produces. Expressions may read `branch.<branch>.<step>.result`.
    WorkflowSubject:
      type: object
      required:
      - kind
      additionalProperties: false
      description: 'Typed identity for a `wait` or `react` subscription. `kind` discriminates
        which `*_*` field is meaningful: signal → `signal_name`; event → `event_type` (+ optional
        `condition`, `payload_mapping`); observable → `observable_id`. `interaction` is synthesized
        internally by interaction steps and is not authored directly.'
      properties:
        kind:
          type: string
          enum:
          - signal
          - event
          - interaction
          - observable
          description: Subject family for this subscription.
        signal_name:
          type: string
          description: Signal name (kind=signal). May use `${...}` expression interpolation,
            evaluated at step entry.
        event_type:
          type: string
          pattern: ^[A-Za-z_][A-Za-z0-9_]*(\.[A-Za-z_][A-Za-z0-9_]*)*(\.\*)?$
          description: Event-type pattern (kind=event). Exact match unless suffixed with `.*`,
            which prefix-matches descendants.
        condition:
          type: string
          description: Optional bare-form `expr` predicate over `{ event, meta, inputs, steps,
            vars, each, run }` (event subjects) or `{ state, observable, inputs, steps, vars,
            each, run }` (observable subjects). The delivery resumes the step only when the
            predicate evaluates bool true.
        payload_mapping:
          type: object
          additionalProperties:
            type: string
          description: Optional projection for the matched event envelope (event subjects
            only). Keys become fields on the wait step result; values are bare `expr` or `${expr}`
            templates.
        interaction_id:
          type: string
          description: Filled by the interaction step's materializer (kind=interaction).
        observable_id:
          type: string
          description: Observable name or ID (kind=observable).
    WorkflowWaitConfig:
      type: object
      required:
      - subject
      - timeout
      additionalProperties: false
      description: Suspends the run on a one-shot Subject subscription. Resumes on the first
        matching delivery, or on a complete batch when `batch` is set. For a durable subscription
        that re-fires per delivery, use `WorkflowReactConfig`.
      properties:
        subject:
          $ref: '#/components/schemas/WorkflowSubject'
        timeout:
          type: string
          description: Maximum wait duration as a Go duration string (e.g. "24h", "30m").
        batch:
          $ref: '#/components/schemas/WorkflowWaitSignalBatchConfig'
          description: Optional batching behavior for a `wait` step after the first delivery
            arrives.
        on_timeout:
          type: string
          description: Step name to transition to if the timeout elapses without a delivery.
            Fails the run if omitted.
    WorkflowAgentInvokeConfig:
      type: object
      required:
      - prompt
      additionalProperties: false
      description: Configures one `agent.invoke` turn.
      properties:
        agent_id:
          type: string
          description: Agent ID or expression to invoke. Defaults to the run's `default_agent_id`
            when omitted.
        prompt:
          type: string
          description: Prompt passed to the `agent.invoke` job.
        instructions:
          type: string
          description: Optional turn instructions passed to `agent.invoke`.
        context:
          type: object
          additionalProperties: true
          description: Optional invocation context.
        toolkit_ids:
          type: array
          items:
            type: string
          description: Toolkit IDs made available to the agent turn.
        skill_name:
          type: string
          description: Optional skill name to run for the agent turn.
        allowed_tools:
          type: array
          items:
            type: string
          description: Optional action catalog names, wildcard selectors, or group references
            for the agent turn.
        tool_presentation:
          type: string
          enum:
          - flat
          - meta
          - dual
          description: Optional model-facing tool presentation for this turn. `flat` exposes
            one tool per granted action. `meta` compacts supported action families into CLI-style
            command tools such as `mobius_table`. `dual` exposes both shapes during migration.
        allowed_actions:
          type: array
          items:
            type: string
          deprecated: true
          x-deprecated-reason: Renamed to allowed_tools; kept for one release for compatibility.
          description: Legacy input alias for `allowed_tools`. Accepted for one release and
            normalized into `allowed_tools`; new responses omit it.
        output_schema:
          type: object
          additionalProperties: true
          description: Optional structured-output schema for the agent turn.
        timeout_sec:
          type: integer
          minimum: 0
          maximum: 3600
          description: Optional agent invocation timeout in seconds. 0 uses the system default.
        session_name:
          type: string
          description: Optional agent session name. Selecting a name creates-or-continues
            a named session within the configured `session_scope`. When no session_name, session_id,
            or session_fork_id is supplied and the invocation has a workflow run context,
            a default run-scoped session is created so every turn is captured.
        session_scope:
          type: string
          enum:
          - run
          - workflow
          - agent
          description: Optional agent session scope. One of `run`, `workflow`, or `agent`.
            Only meaningful together with `session_name`.
        session_id:
          type: string
          description: Optional existing session ID to continue.
        session_fork_id:
          type: string
          description: Optional source session ID; the new session is forked from it with
            full history.
        disable_session:
          type: boolean
          description: |-
            When true, no session is created for this invocation and no messages are persisted. Use to opt out of the default run-scoped session for one-off turns that should not contribute to memory.

            Mutually exclusive with the session selectors: a request that sets `disable_session=true` together with any of `session_name`, `session_id`, or `session_fork_id` is rejected with HTTP 400.
    WorkflowReactConfig:
      type: object
      required:
      - subject
      - timeout
      - prompt
      additionalProperties: false
      description: Configures a first-class `react` loop (RFC 064). The Subject decides what
        the reactor subscribes to; the remaining fields are evaluated and forwarded to `agent.invoke`
        only after at least one delivery arrives. For event subjects the runtime maintains
        a durable subscription that survives across agent turns so deliveries arriving while
        the agent is busy are delivered at the next loop iteration.
      properties:
        subject:
          $ref: '#/components/schemas/WorkflowSubject'
        timeout:
          type: string
          description: Maximum wait duration as a Go duration string (e.g. "24h", "30m").
        batch:
          $ref: '#/components/schemas/WorkflowWaitSignalBatchConfig'
          description: Optional batching behavior for a `react` step after the first delivery
            arrives.
        on_timeout:
          type: string
          description: Step name to transition to if the timeout elapses without a delivery.
            Fails the run if omitted.
        max_pending:
          type: integer
          minimum: 1
          maximum: 100000
          description: Optional per-subscription cap on pending (unconsumed) deliveries for
            event subjects. Defaults to 1000. On overflow, the newest delivery is dropped,
            the subscription's overflow counter is incremented, and a `runtime.subscription.overflow`
            event is emitted.
        agent_id:
          type: string
          description: Agent ID or expression to invoke. Defaults to the run's `default_agent_id`
            when omitted.
        prompt:
          type: string
          description: Prompt passed to the emitted `agent.invoke` job. May use `steps.<name>.result`
            from the delivery batch.
        instructions:
          type: string
          description: Optional turn instructions passed to `agent.invoke`.
        context:
          type: object
          additionalProperties: true
          description: Optional invocation context. The runtime fills missing `signal_name`,
            `event_type`, `payload`, `signals`, and `count` keys from the received delivery
            batch.
        toolkit_ids:
          type: array
          items:
            type: string
          description: Toolkit IDs made available to the agent turn.
        skill_name:
          type: string
          description: Optional skill name to run for the agent turn.
        allowed_tools:
          type: array
          items:
            type: string
          description: Optional action catalog names, wildcard selectors, or group references
            for the agent turn.
        tool_presentation:
          type: string
          enum:
          - flat
          - meta
          - dual
          description: Optional model-facing tool presentation for this turn. `flat` exposes
            one tool per granted action. `meta` compacts supported action families into CLI-style
            command tools such as `mobius_table`. `dual` exposes both shapes during migration.
        output_schema:
          type: object
          additionalProperties: true
          description: Optional structured-output schema for the agent turn.
        timeout_sec:
          type: integer
          minimum: 0
          maximum: 3600
          description: Optional agent invocation timeout in seconds. 0 uses the system default.
        session_name:
          type: string
          description: Optional agent session name. Selecting a name creates-or-continues
            a named session within the configured `session_scope`. When no session_name, session_id,
            or session_fork_id is supplied and the invocation has a workflow run context,
            a default run-scoped session is created so every turn is captured.
        session_scope:
          type: string
          enum:
          - run
          - workflow
          - agent
          description: Optional agent session scope. One of `run`, `workflow`, or `agent`.
            Only meaningful together with `session_name`.
        session_id:
          type: string
          description: Optional existing session ID to continue.
        session_fork_id:
          type: string
          description: Optional source session ID; the new session is forked from it with
            full history.
        disable_session:
          type: boolean
          description: |-
            When true, no session is created for this invocation and no messages are persisted. Use to opt out of the default run-scoped session for one-off turns that should not contribute to memory.

            Mutually exclusive with the session selectors: a request that sets `disable_session=true` together with any of `session_name`, `session_id`, or `session_fork_id` is rejected with HTTP 400.
    WorkflowWaitSignalBatchConfig:
      type: object
      additionalProperties: false
      description: Batch configuration used by `wait.batch` and `react.batch`. `max_events`
        limits how many queued deliveries are drained after the first arrival; `settle_for`
        gives fast bursts a short coalescing window before the batch is read.
      properties:
        max_events:
          type: integer
          minimum: 0
          maximum: 100
          description: Maximum number of queued deliveries to consume in one step completion.
            Defaults to 25 when omitted or set to 0.
        settle_for:
          type: string
          description: Short Go duration string to wait after the first delivery so fast bursts
            can coalesce. Maximum 30s.
    WorkflowWaitSignalConfig:
      type: object
      required:
      - topic
      - timeout
      additionalProperties: false
      description: 'Code-yield wire format for `step.waitForSignal()`. Customer SDKs send
        this shape; the server translates it to a `Subject{Kind: signal, SignalName: topic}`
        subscription internally. New authored workflows should use `wait` with a typed `subject`
        instead.'
      properties:
        topic:
          type: string
          description: Signal name the handler is yielding on.
        timeout:
          type: string
          description: Maximum wait duration as a Go duration string.
        batch:
          $ref: '#/components/schemas/WorkflowWaitSignalBatchConfig'
        on_timeout:
          type: string
          description: Step name to transition to if the timeout elapses without a signal.
    WorkflowWaitEventConfig:
      type: object
      required:
      - event_type
      - timeout
      additionalProperties: false
      description: 'Code-yield wire format for `step.waitForEvent()`. Customer SDKs send this
        shape; the server translates it to a `Subject{Kind: event, EventType: ..., Condition:
        ...}` subscription internally. New authored workflows should use `wait` with a typed
        `subject` instead.'
      properties:
        event_type:
          type: string
          pattern: ^[A-Za-z_][A-Za-z0-9_]*(\.[A-Za-z_][A-Za-z0-9_]*)*(\.\*)?$
          description: Event-type pattern the handler is yielding on.
        condition:
          type: string
          description: Optional bare-form `expr` predicate over the matched event.
        payload_mapping:
          type: object
          additionalProperties:
            type: string
          description: Optional projection from the matched event envelope into the synthetic
            result.
        timeout:
          type: string
          description: Maximum wait duration as a Go duration string.
        on_timeout:
          type: string
          description: Step name to transition to if the timeout elapses without a matching
            event.
    WorkflowWaitUntilConfig:
      type: object
      required:
      - condition
      - timeout
      additionalProperties: false
      description: Durable condition wait. Exactly one of `poll` or `observable` must be set.
        Poll waits evaluate direct checks; Observable waits read reusable project-scoped Observable
        state and suspend on change events.
      properties:
        poll:
          $ref: '#/components/schemas/WorkflowWaitUntilPollConfig'
        observable:
          type: string
          description: Identifier-safe Observable name or ID.
        condition:
          type: string
          description: Required bare-form `expr` predicate. Poll waits evaluate against `{
            result, inputs, steps, vars, each, run }`; Observable waits evaluate against `{
            state, observable, inputs, steps, vars, each, run }`. The expression must return
            bool true.
        timeout:
          type: string
          description: Maximum wait duration as a Go duration string (e.g. "10m", "1h").
        on_timeout:
          type: string
          description: Step name to transition to if the timeout elapses. Fails the run if
            omitted.
    WorkflowWaitUntilPollConfig:
      type: object
      required:
      - every
      - action
      additionalProperties: false
      properties:
        every:
          type: string
          description: Base poll interval as a Go duration string.
        action:
          type: string
          description: Mobius action invoked for each poll attempt.
        parameters:
          type: object
          additionalProperties: true
          description: Poll action parameters, evaluated once when the wait is entered.
        backoff:
          $ref: '#/components/schemas/WorkflowWaitUntilBackoffConfig'
    WorkflowWaitUntilBackoffConfig:
      type: object
      required:
      - multiplier
      - max_every
      additionalProperties: false
      properties:
        multiplier:
          type: number
          format: double
          description: Multiplier greater than 1 applied after each false/error attempt.
        max_every:
          type: string
          description: Maximum poll interval as a Go duration string.
        jitter:
          type: boolean
          description: Whether to jitter each computed interval.
    WorkflowSleepConfig:
      type: object
      description: Configuration for a sleep step.
      required:
      - duration
      additionalProperties: false
      properties:
        duration:
          type: string
          description: Go duration string.
    WorkflowPauseConfig:
      type: object
      description: Configuration for a manual pause step.
      additionalProperties: false
      properties:
        reason:
          type: string
          description: Optional human-readable reason displayed when the run is paused.
    WorkflowInteractionConfig:
      type: object
      description: Configuration for an interaction step that waits on a response.
      required:
      - kind
      - title
      - target
      - timeout
      additionalProperties: false
      properties:
        kind:
          type: string
          enum:
          - approval
          - review
          - input
          - request
          - vote
          - handoff
          description: Interaction protocol kind. `input` is a deprecated alias of `request`
            and is normalized on create; new workflow specs should use `request`. `vote` steps
            require `spec.vote_rules`.
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the interaction recipient.
        description:
          type: string
          description: Optional longer detail or instructions shown below the title.
        context:
          type: object
          additionalProperties: true
          description: Arbitrary key-value context passed alongside the interaction for rendering.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        timeout:
          type: string
          description: Go duration string.
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: Resolved users or group routing input for the interaction.
        require_all:
          type: boolean
          description: When true, all group members must respond before the interaction completes.
            Only meaningful when target.group_id is set.
        discussion:
          $ref: '#/components/schemas/WorkflowInteractionDiscussionConfig'
          description: Optional focused channel to create or reuse around this typed interaction.
    WorkflowInteractionDiscussionConfig:
      type: object
      additionalProperties: false
      required:
      - opening_message
      description: Creates or reuses a project channel for the surrounding discussion while
        the interaction remains the typed outcome that resumes the workflow.
      properties:
        channel_id:
          type: string
          description: Existing channel ID to reuse. If omitted, channel_name is used.
        channel_name:
          type: string
          description: Existing or new project channel name to use for the discussion.
        display_name:
          type: string
          description: Display name for a newly-created channel.
        topic:
          type: string
          description: Topic for a newly-created channel.
        member_ids:
          type: array
          items:
            type: string
          description: Additional `users.id` values to invite to the channel. Agent participants
            use their backing user IDs, not `agents.id`.
        opening_message:
          type: string
          minLength: 1
          description: Opening brief posted into the channel before the workflow suspends.
        completion_behavior:
          type: string
          enum:
          - none
          - mark_inactive
          - archive
          description: Behavior to apply when all purpose-linked interactions are terminal.
        private:
          type: boolean
          description: Whether a newly-created channel is private.
    WorkflowDefinitionSummary:
      type: object
      additionalProperties: true
      description: Workflow definition metadata without the executable `spec`. Returned by
        list endpoints; fetch a single definition via `getWorkflow` to get the full spec.
      required:
      - id
      - name
      - handle
      - latest_version
      - created_by
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this workflow definition.
        name:
          type: string
          description: Human-readable workflow name.
        handle:
          type: string
          description: URL-safe slug, unique within the resolved scope. Used to reference
            this workflow in triggers and tools.
        scope:
          $ref: '#/components/schemas/ResourceScope'
        description:
          type: string
          description: Optional description of the workflow's purpose.
        latest_version:
          type: integer
          description: The current highest version number. Starts at 1 and increments with
            each spec update.
        published_as_tool:
          type: boolean
          description: When true, expose this workflow through the action catalog for agent
            tool manifests.
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`.
        created_by:
          type: string
          description: User ID of the principal who created this workflow definition.
        updated_by:
          type: string
          description: User ID of the principal who last updated this workflow definition.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this workflow. Inherited by runs at start
            time; see `Run.tags`.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this workflow definition was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this workflow definition was last updated.
    WorkflowDefinition:
      description: Full workflow definition including the executable `spec`. Returned by `getWorkflow`,
        `createWorkflow`, and `updateWorkflow`.
      allOf:
      - $ref: '#/components/schemas/WorkflowDefinitionSummary'
      - type: object
        required:
        - spec
        properties:
          spec:
            $ref: '#/components/schemas/WorkflowSpec'
            description: Executable workflow spec for this definition.
    WorkflowDefinitionListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of workflow definition summaries.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/WorkflowDefinitionSummary'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateWorkflowRequest:
      type: object
      additionalProperties: false
      description: Creates a saved workflow definition and its first immutable version.
      required:
      - name
      - spec
      properties:
        name:
          type: string
          description: Human-readable workflow name, unique within the project.
        handle:
          type: string
          description: URL-safe handle for this workflow, unique within the resolved scope.
            Auto-derived from name if omitted.
        scope:
          $ref: '#/components/schemas/ResourceScope'
        description:
          type: string
          description: Optional description of the workflow's purpose.
        published_as_tool:
          type: boolean
          description: When true, expose this workflow through the action catalog for agent
            tool manifests.
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`; defaults
            to the creator when possible.
        spec:
          $ref: '#/components/schemas/WorkflowSpec'
          description: Executable workflow spec to persist as version 1.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateWorkflowRequest:
      type: object
      additionalProperties: false
      required:
      - expected_version
      description: 'Updates workflow metadata and optionally creates a new immutable version
        when `spec` changes. `expected_version` is an optimistic concurrency guard: the server
        returns `409 Conflict` when the workflow''s current `latest_version` no longer matches
        the version the caller edited.'
      properties:
        expected_version:
          type: integer
          minimum: 1
          description: Current `latest_version` observed by the caller before editing.
        name:
          type: string
          description: Replacement human-readable workflow name.
        scope:
          type: string
          allOf:
          - $ref: '#/components/schemas/ResourceScope'
          nullable: true
          description: Set to `owner` for owner-scoped handles, or null to return to the project/default
            scope.
        owned_by:
          type: string
          nullable: true
          description: Canonical user owner ID. Required when `scope` is `owner`.
        description:
          type: string
          description: Replacement description. Omit to leave unchanged.
        published_as_tool:
          type: boolean
          description: When true, expose this workflow through the action catalog for agent
            tool manifests.
        spec:
          $ref: '#/components/schemas/WorkflowSpec'
          description: Replacement executable workflow spec. Supplying this creates a new
            version.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the workflow's tag set. Omit to leave tags
            unchanged.
    WorkflowVersionSummary:
      type: object
      additionalProperties: true
      description: Workflow version metadata without the executable `spec`. Returned by `listWorkflowVersions`.
      required:
      - id
      - version
      - created_by
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this workflow version.
        version:
          type: integer
          description: Monotonically increasing version number. Starts at 1.
        created_by:
          type: string
          description: User ID of the org member who created this version.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this version was created.
    WorkflowVersion:
      description: Full workflow version including the executable `spec`.
      allOf:
      - $ref: '#/components/schemas/WorkflowVersionSummary'
      - type: object
        required:
        - spec
        properties:
          spec:
            $ref: '#/components/schemas/WorkflowSpec'
            description: Executable workflow spec captured for this immutable version.
    WorkflowVersionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated list of immutable versions for one workflow definition. Version
        histories are expected to stay small enough to return in one response; fetch an individual
        version to retrieve its executable spec.
      properties:
        items:
          type: array
          description: The list of workflow versions, newest first.
          items:
            $ref: '#/components/schemas/WorkflowVersionSummary'
    RunStatus:
      type: string
      enum:
      - active
      - finalizing
      - completed
      - failed
      description: Public run lifecycle. Path-level fields explain why an active run is working,
        waiting, sleeping, retrying, paused, or blocked at a join. `finalizing` means the
        main graph has quiesced and cleanup/finalize steps are still running.
    RunPathState:
      type: string
      enum:
      - working
      - waiting
      - completed
      - failed
      description: Current state of one execution path.
    Wake:
      type: string
      enum:
      - timer
      - subscription
      - poll
      - operator
      description: Wake family for a suspended path. `timer` covers sleep and fixed timeout
        deadlines; `subscription` means a typed Subject is matched through the subscription/delivery
        pipeline; `poll` is the `wait_until` polling variant; `operator` covers pause/join/retry
        waits that resume on operator or runtime action.
    SubjectSignal:
      type: object
      additionalProperties: false
      required:
      - kind
      - signal_name
      properties:
        kind:
          type: string
          enum:
          - signal
        signal_name:
          type: string
          description: Workflow signal name this path is waiting for.
    SubjectEvent:
      type: object
      additionalProperties: false
      required:
      - kind
      - event_type
      properties:
        kind:
          type: string
          enum:
          - event
        event_type:
          type: string
          description: Event type pattern. Exact match unless ending in `.*`, in which case
            it matches by prefix (e.g. `github.*`).
        condition:
          type: string
          description: Optional `expr` predicate the matching event must satisfy.
    SubjectInteraction:
      type: object
      additionalProperties: false
      required:
      - kind
      - interaction_id
      properties:
        kind:
          type: string
          enum:
          - interaction
        interaction_id:
          type: string
          description: Identifier of the pending interaction tied to this wait.
    SubjectObservable:
      type: object
      additionalProperties: false
      required:
      - kind
      - observable_id
      properties:
        kind:
          type: string
          enum:
          - observable
        observable_id:
          type: string
          description: Observable identifier this path is watching.
        condition:
          type: string
          description: Optional `expr` predicate evaluated against the observable's latest
            state.
    Subject:
      description: Typed descriptor for what a suspended path is waiting on. Replaces the
        legacy multi-place encoding (RunWaitKind, signal_name, topic, subscription_id, interaction_id,
        observable_id at top level).
      oneOf:
      - $ref: '#/components/schemas/SubjectSignal'
      - $ref: '#/components/schemas/SubjectEvent'
      - $ref: '#/components/schemas/SubjectInteraction'
      - $ref: '#/components/schemas/SubjectObservable'
      discriminator:
        propertyName: kind
        mapping:
          signal: '#/components/schemas/SubjectSignal'
          event: '#/components/schemas/SubjectEvent'
          interaction: '#/components/schemas/SubjectInteraction'
          observable: '#/components/schemas/SubjectObservable'
    SubscriptionBatch:
      type: object
      additionalProperties: false
      description: Batch settings carried by a subscription-wake wait.
      properties:
        max_events:
          type: integer
          description: Maximum events to accumulate before the path advances.
        settle_for:
          type: string
          description: Quiet window (Go duration string) after the first matching delivery
            before the batch finalizes.
    RunWaitPollState:
      type: object
      additionalProperties: false
      description: Public-visible poll state for a `wait_until` polling branch.
      properties:
        action:
          type: string
          description: Poll action name.
        parameters:
          type: object
          additionalProperties: true
          description: Frozen poll parameters.
        attempt_count:
          type: integer
          description: Number of poll attempts so far.
        current_interval:
          type: string
          description: Current poll interval (Go duration string).
        last_result:
          description: Latest poll result preview, when available.
        last_error_type:
          type: string
        last_error_message:
          type: string
    RunWait:
      type: object
      additionalProperties: false
      required:
      - wake
      description: 'Public projection of one suspended path. Carries the Wake family and,
        when `wake` is `subscription`, the typed Subject identifying what the path is waiting
        on. Other wake families surface their own fields: `timer` waits set `deadline_at`;
        `poll` waits set `poll_state`; `operator` waits set `pause_reason` or the join/retry
        rendering fields.'
      properties:
        wake:
          $ref: '#/components/schemas/Wake'
        subject:
          $ref: '#/components/schemas/Subject'
          description: Present when `wake` is `subscription`.
        deadline_at:
          type: string
          format: date-time
          description: Wake or timeout deadline. Set for `timer`, optional for `subscription`/`poll`.
        batch:
          $ref: '#/components/schemas/SubscriptionBatch'
          description: Subscription batch settings when present.
        poll_state:
          $ref: '#/components/schemas/RunWaitPollState'
          description: Present when `wake` is `poll`.
        pause_reason:
          type: string
          description: Operator pause reason when `wake` is `operator`.
        interaction:
          $ref: '#/components/schemas/InteractionTarget'
          description: Interaction target users or group input when the subject is an interaction.
        join_step:
          type: string
          description: Join step this path is waiting at, when the operator wait is a join.
        reason:
          type: string
          description: Human-readable wait reason (join, retry, pause).
        waiting_for_paths:
          type: array
          items:
            type: string
          description: Path IDs still required before a join can proceed.
        attempt:
          type: integer
          description: Retry attempt number for retry waits.
        max_attempts:
          type: integer
          description: Maximum attempts for retry waits.
    RunPath:
      type: object
      additionalProperties: false
      required:
      - path_id
      - state
      properties:
        path_id:
          type: string
          description: Stable execution path identifier, e.g. `main` or `main/each/0`.
        state:
          $ref: '#/components/schemas/RunPathState'
        waiting_on:
          $ref: '#/components/schemas/RunWait'
          description: Present when `state` is `waiting`.
        error_type:
          type: string
          description: Path-local failure type when state is `failed`.
        error_message:
          type: string
          description: Path-local failure message when state is `failed`.
    RunPathCounts:
      type: object
      additionalProperties: false
      required:
      - total
      - active
      - working
      - waiting
      - completed
      - failed
      description: 'Current path counts. Invariants: `total = working + waiting + completed
        + failed`; `active = working + waiting`.'
      properties:
        total:
          type: integer
        active:
          type: integer
        working:
          type: integer
        waiting:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
    RunWaitSummary:
      type: object
      additionalProperties: false
      required:
      - waiting_paths
      - wake_counts
      - subject_counts
      - next_wake_at
      description: Always-present aggregate of waiting paths.
      properties:
        waiting_paths:
          type: integer
        wake_counts:
          type: object
          additionalProperties:
            type: integer
          description: Count of waiting paths by `waiting_on.wake`.
        subject_counts:
          type: object
          additionalProperties:
            type: integer
          description: Count of subscription-wake paths by `waiting_on.subject.kind`. Empty
            when no paths are waiting on a subscription.
        next_wake_at:
          type: string
          format: date-time
          nullable: true
          description: Earliest wake time among waiting paths, or null.
    RunJobCounts:
      type: object
      additionalProperties: false
      required:
      - ready
      - scheduled
      - claimed
      description: Live work-pool summary for this run. Reflects the transient state of the
        worker job queue, not durable step progress — terminal jobs are swept on a TTL and
        stop contributing to these counts. Use `step_counts` for run-progress UI; use this
        field to answer "is anything claimable right now and is a worker holding it?". `ready`
        counts pending jobs whose `scheduled_at` has arrived and can be claimed now; `scheduled`
        counts pending jobs intentionally waiting for a future retry/backoff; `claimed` counts
        jobs currently held by workers.
      properties:
        ready:
          type: integer
        scheduled:
          type: integer
        claimed:
          type: integer
    RunStepCounts:
      type: object
      additionalProperties: false
      required:
      - pending
      - running
      - completed
      - failed
      - skipped
      - cancelled
      description: Aggregate count of run-step rows for this run grouped by status. Counts
        every attempt of every step (one row per step x attempt x path), so it reflects durable
        progress rather than the live worker pool. Use this for run-progress UI; use `job_counts`
        for live claimability.
      properties:
        pending:
          type: integer
        running:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        cancelled:
          type: integer
    RunError:
      type: object
      additionalProperties: false
      required:
      - error_type
      - error_message
      properties:
        path_id:
          type: string
        error_type:
          type: string
        error_message:
          type: string
    FinalizerWarning:
      type: object
      additionalProperties: false
      required:
      - step_id
      - message
      properties:
        step_id:
          type: string
          description: Finalize-phase run step that produced this warning.
        message:
          type: string
          description: Human-readable warning from a non-required finalizer.
    Run:
      type: object
      description: Runtime record for one workflow execution.
      additionalProperties: true
      required:
      - id
      - workflow_name
      - status
      - path_counts
      - job_counts
      - step_counts
      - wait_summary
      - errors
      - attempt
      - ephemeral
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this run.
        queue:
          type: string
          description: Queue this run was enqueued on.
        parent_run_id:
          type: string
          description: ID of the parent run, when this is a child run spawned by a fan-out
            step.
        definition_id:
          type: string
          description: ID of the workflow definition this run was started from. Present only
            when `ephemeral` is false; omitted for ephemeral runs started from an inline spec.
        definition_version:
          type: integer
          description: Version number of the workflow definition this run was started from.
            Present only when `ephemeral` is false.
        ephemeral:
          type: boolean
          description: True when the run was started from an inline spec rather than a saved
            workflow definition. Derived server-side; always present on the response. When
            true, `definition_id` and `definition_version` are omitted.
        workflow_name:
          type: string
          description: Name of the workflow as recorded at run creation time.
        status:
          $ref: '#/components/schemas/RunStatus'
          description: Public lifecycle for this run.
        path_counts:
          $ref: '#/components/schemas/RunPathCounts'
          description: Current path counts derived from the run projection.
        job_counts:
          $ref: '#/components/schemas/RunJobCounts'
          description: Live work-pool summary derived from the run projection. See `RunJobCounts`.
        step_counts:
          $ref: '#/components/schemas/RunStepCounts'
          description: Durable run-step counts grouped by status. See `RunStepCounts`.
        wait_summary:
          $ref: '#/components/schemas/RunWaitSummary'
          description: Always-present aggregate of waiting paths.
        errors:
          type: array
          description: Run-level errors that caused a failed lifecycle, plus internal progression
            failures or retries that require operator attention while a run is still active.
          items:
            $ref: '#/components/schemas/RunError'
        attempt:
          type: integer
          description: Retry attempt number (1-based). Increments each time the run is retried.
        inputs:
          type: object
          additionalProperties: true
          description: Input values provided when the run was started.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this run. Inherited from the parent workflow
            at start time, with caller-supplied overrides merged on top. System tags (`mobius:*`)
            are read-only.
        error_message:
          type: string
          description: Error message from the most recent failure. Present when status is
            failed.
        started_by_user_id:
          type: string
          description: User ID of the principal that started this run.
        started_by_credential_kind:
          type: string
          enum:
          - clerk
          - api_key
          - cli_token
          - internal
          - unknown
          description: Credential kind that started this run.
        started_by_source:
          type: string
          description: Source label for the start credential.
        owned_by:
          type: string
          nullable: true
          description: Canonical user owner ID for this run. Saved workflow runs inherit the
            workflow definition owner when present; otherwise runs use the starting user.
            May be omitted for legacy or unresolved system-started rows.
        default_agent_id:
          type: string
          description: Agent ID derived from the owner user when that user is backed by an
            AI agent. Used as the default `agent.invoke` target when a step omits `agent_id`.
        effective_user_id:
          type: string
          description: User ID whose context the run executes under.
        effective_credential_kind:
          type: string
          enum:
          - clerk
          - api_key
          - cli_token
          - internal
          - unknown
          description: Credential kind whose context the run executes under.
        effective_source:
          type: string
          description: Source label for the effective principal.
        source_type:
          type: string
          description: Type of source that requested this run (api, trigger, slack, fork,
            tool).
        source_id:
          type: string
          description: Identifier for the run source within its source type.
        source_label:
          type: string
          description: Human-readable label for the run source.
        external_id:
          type: string
          description: Caller-supplied logical correlation key for this run. Unique within
            the project; identifies a logical job across attempts. See the `external_id` description
            on `POST /runs` for the conflict semantics that govern duplicate values.
        cancel_requested_at:
          type: string
          format: date-time
          description: Timestamp when cancellation was requested.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this run was created.
        started_at:
          type: string
          format: date-time
          description: Timestamp when this run transitioned out of initial progression and
            began executing steps.
        completed_at:
          type: string
          format: date-time
          description: Timestamp when this run reached a terminal state.
        finalize_started_at:
          type: string
          format: date-time
          description: Timestamp when the run entered its Finalize phase.
        finalizer_warnings:
          type: array
          description: Non-required finalizer failures recorded after the run completes.
          items:
            $ref: '#/components/schemas/FinalizerWarning'
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this run was last updated.
        wall_clock_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will fail this run with `error_type=run_timeout`
            if it has not reached a terminal state. Present only when `resolved_config` contains
            a `key="runs.timeouts.execution"` entry whose value resolves to a finite duration.
            Anchored to `created_at`.
        error_type:
          type: string
          enum:
          - run_timeout
          - run_cancelled
          - step_failed
          - run_failed
          - output_extraction_failed
          - output_validation_failed
          description: 'Typed run-level failure cause: `run_timeout`, `run_cancelled`, `step_failed`,
            `run_failed`, `output_extraction_failed`, or `output_validation_failed`. Its own
            vocabulary, not a superset of the job-level `error_type`. Present when `status=failed`.'
        resolved_config:
          $ref: '#/components/schemas/ResolvedConfig'
          description: Run-level cascade config frozen when the run was started.
        default_step_config:
          $ref: '#/components/schemas/ResolvedConfig'
          description: Default step-level cascade config inherited by each run step unless
            the step's own spec overrides it.
        forked_from:
          $ref: '#/components/schemas/RunForkLineage'
          description: Source run and step this run was forked from.
    RunForkLineage:
      type: object
      additionalProperties: false
      required:
      - run_id
      - step_id
      - path_id
      - step_name
      properties:
        run_id:
          type: string
        step_id:
          type: string
        path_id:
          type: string
        step_name:
          type: string
    RunForkRequest:
      type: object
      additionalProperties: false
      required:
      - from_step_id
      - external_id
      description: 'Fork creation request. Tags are inherited from the source run and then
        overlaid with request tags using the same tag inheritance rules as run creation: request
        values replace matching source keys, and an empty string removes the inherited key.
        `definition_version_id` changes only the post-fork execution version; it does not
        affect inherited history. When omitted, the fork uses the source run''s definition
        version.'
      properties:
        from_step_id:
          type: string
          description: Run-step identifier to fork from. Use the `id` returned by `RunStep`.
        external_id:
          type: string
          description: Logical external identifier for the new forked run. It must be unique
            within the project, just like other workflow-run `external_id` values.
        definition_version_id:
          type: string
          description: Optional target workflow definition version for post-fork execution.
            It must belong to the same workflow definition as the source run. Omit it to use
            the source run's original definition version. Inherited history remains tied to
            the source run.
        tags:
          description: Tags to overlay on the inherited source-run tags. Empty string values
            remove inherited keys.
          allOf:
          - $ref: '#/components/schemas/TagMap'
    RunStepSource:
      type: string
      enum:
      - executed
      - inherited
    RunStepKind:
      type: string
      enum:
      - worker_action
      - server_action
      - control
      - run
      - sleep
      - wait
      - react
      - wait_signal
      - wait_event
      - interaction
      - pause
      description: Why this ledger row exists. `worker_action`, `server_action`, and `control`
        cover the executor/control surfaces; `wait` and `react` are the unified server-materialized
        wait shapes (RFC 064); `run`/`sleep`/`wait_signal`/`wait_event`/`interaction`/`pause`
        are code-workflow child step kinds emitted by the SDK yield handlers.
    RunStepStatus:
      type: string
      enum:
      - pending
      - running
      - suspended
      - completed
      - failed
      - skipped
      - cancelled
      description: Step lifecycle. `suspended` is set on the live `wait`/`react` ledger row
        while the path is parked on a subscription; the same row transitions through `running`/`completed`
        on resume.
    RunStepPhase:
      type: string
      enum:
      - main
      - finalize
    RunStep:
      type: object
      description: Durable execution-history row for one step attempt on one workflow path.
        RunStep is the canonical source for run history; linked Job rows are transient worker-claim
        records and may be TTL-swept after terminal retention.
      additionalProperties: false
      required:
      - id
      - run_id
      - path_id
      - step_name
      - action
      - attempt
      - transition_seq
      - phase
      - kind
      - source
      - status
      - parameters
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable run-step identifier. Use this value as `{step_id}` in `GET /runs/{id}/steps/{step_id}`
            and as `from_step_id` in `POST /runs/{id}/forks`.
        run_id:
          type: string
          description: Workflow run that owns this step row.
        path_id:
          type: string
          description: Workflow path identifier for branch/fanout execution.
        step_name:
          type: string
          description: Step name from the workflow definition.
        action:
          type: string
          description: Action identifier for executable steps; empty for control-only steps.
        attempt:
          type: integer
          description: Zero-based retry attempt for this step/path pair.
        transition_seq:
          type: integer
          format: int64
          description: Per-run monotonic transition order for projection and fork reconstruction.
        phase:
          allOf:
          - $ref: '#/components/schemas/RunStepPhase'
          description: Step phase. `finalize` steps run after the main graph settles.
        kind:
          allOf:
          - $ref: '#/components/schemas/RunStepKind'
        source:
          description: Whether this row was executed in this run or inherited from a source
            run during fork creation.
          allOf:
          - $ref: '#/components/schemas/RunStepSource'
        status:
          allOf:
          - $ref: '#/components/schemas/RunStepStatus'
        reason:
          type: string
          description: Optional suppression reason, most commonly set when status is `skipped`.
        parameters:
          type: object
          description: Resolved parameters/input for this step attempt.
          additionalProperties: true
        bindings:
          type: array
          description: Vars written by this step, with the source expression used for each
            binding.
          items:
            $ref: '#/components/schemas/RunStepBinding'
        job_id:
          type: string
          description: Linked live worker job when one exists. Terminal jobs may be reaped
            while the RunStep remains.
        result_b64:
          type: string
          description: Base64-encoded serialized step result, when present.
        run_state_after_b64:
          type: string
          description: Base64-encoded serialized run state immediately after this step completed.
            Omitted unless requested with `include=run_state_after`.
        error_type:
          type: string
        error_message:
          type: string
        step_execution_id:
          type: string
          description: Stable identifier for one visit of an authored step. All ledger writes
            for a single suspend/resume cycle of a `wait` or `react` step share this id, so
            clients can group rows by execution rather than reconstructing visits from `(path_id,
            step_name)`.
        visit_index:
          type: integer
          description: Zero-based visit counter for the authored step on its path. Increments
            each time the materializer enters the step.
        started_at:
          type: string
          format: date-time
          description: Timestamp when execution of this step attempt began.
        suspended_at:
          type: string
          format: date-time
          description: Timestamp the step entered the `suspended` status (subscription registered,
            path parked).
        resumed_at:
          type: string
          format: date-time
          description: Timestamp the materializer drained a delivery and resumed the step.
            Cleared if the step suspends again.
        dispatched_at:
          type: string
          format: date-time
          description: Timestamp a `react` step dispatched an `agent.invoke` child after a
            delivery. The same row may suspend again for the next event.
        completed_at:
          type: string
          format: date-time
        source_run_id:
          type: string
          description: Originating run ID when this row was inherited or derived from another
            run.
        source_step_id:
          type: string
          description: Originating step ID when this row was inherited or derived from another
            run.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RunStepBinding:
      type: object
      additionalProperties: false
      required:
      - var
      - source
      properties:
        var:
          type: string
          description: Bound top-level vars path, e.g. `vars.repo`.
        source:
          type: string
          description: Source expression or literal used to produce the bound value.
    RunStepListResponse:
      type: object
      description: Paginated durable run-step history. Use this response for historical run
        inspection because linked job rows are live worker state and may be TTL-swept.
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RunStep'
        has_more:
          type: boolean
        next_cursor:
          type: string
    RunListResponse:
      type: object
      description: Paginated list of workflow runs.
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Run'
        has_more:
          type: boolean
          description: True when more pages are available.
        next_cursor:
          type: string
          description: Opaque cursor for fetching the next page. Present only when has_more
            is true.
    RunDetail:
      description: Detailed workflow run including its spec snapshot, terminal result, and
        the first page of run steps.
      allOf:
      - $ref: '#/components/schemas/Run'
      - type: object
        required:
        - paths
        - steps
        properties:
          paths:
            type: array
            description: Current path-level execution projection for this run.
            items:
              $ref: '#/components/schemas/RunPath'
          spec:
            $ref: '#/components/schemas/WorkflowSpec'
            description: Spec snapshot used to execute this run.
          result_b64:
            type: string
            description: Base64-encoded terminal result blob
          steps:
            type: array
            description: First page of durable run-step history, ordered by `transition_seq`
              ascending. Use this canonical history for execution inspection and fork planning,
              including after terminal job rows have been TTL-swept.
            items:
              $ref: '#/components/schemas/RunStep'
          steps_next_cursor:
            type: string
            description: Cursor for the next page of durable run-step history.
    StartSavedRunRequest:
      type: object
      additionalProperties: false
      required:
      - mode
      - definition_id
      description: 'Run a previously-created workflow definition. Selected by `mode: saved`
        on `POST /v1/projects/{project}/runs`. The run inherits the workflow definition''s
        tags at start time; see the `tags` field below for the override rules.'
      properties:
        mode:
          type: string
          enum:
          - saved
          description: Discriminator value — must be `saved`.
        definition_id:
          type: string
          description: ID of an existing workflow definition to run.
        queue:
          type: string
          description: Queue name to enqueue the run on. Defaults to "default".
        inputs:
          type: object
          additionalProperties: true
          description: Input values to pass to the workflow. Must conform to the workflow's
            declared input schema.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run for filtering and
            display.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Tags applied on top of the workflow definition's inherited tags. Caller
            keys override on conflict; an entry whose value is the empty string opts the inherited
            key out entirely (so the run does not carry it). Setting a tag value to "" is
            therefore reserved as the opt-out signal — use a placeholder value if you actually
            want a stored empty value.
        external_id:
          type: string
          description: Caller-supplied logical correlation key for this run. Unique within
            the project. If the same external_id is reused while the prior run is still active,
            the existing run is returned idempotently. Once the prior run is terminal (completed
            or failed), a duplicate POST returns 409 with code `external_id_conflict` and
            the `existing_run_id` and `status` carried in `details`. To launch a fresh attempt
            for the same logical job after a terminal run, use a new external_id (e.g. suffix
            with an attempt counter).
        config:
          $ref: '#/components/schemas/ConfigEntries'
          description: Run-level cascade config overrides applied when starting the run.
    StartInlineRunRequest:
      type: object
      additionalProperties: false
      required:
      - mode
      - spec
      description: 'Run an ephemeral workflow from an inline spec. Selected by `mode: inline`
        on `POST /v1/projects/{project}/runs`. No `WorkflowDefinition` is persisted; the spec
        is snapshotted onto the returned run.'
      properties:
        mode:
          type: string
          enum:
          - inline
          description: Discriminator value — must be `inline`.
        spec:
          $ref: '#/components/schemas/WorkflowSpec'
          description: Inline executable spec to snapshot onto the ephemeral run.
        queue:
          type: string
          description: Queue name to enqueue the run on. Defaults to "default".
        inputs:
          type: object
          additionalProperties: true
          description: Input values to pass to the workflow. Must conform to the workflow's
            declared input schema.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run for filtering and
            display.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tags for this inline run. Inline runs have no parent workflow
            definition, so there is nothing to inherit from — every tag on the run comes from
            this map.
        external_id:
          type: string
          description: Caller-supplied logical correlation key for this run. Unique within
            the project. If the same external_id is reused while the prior run is still active,
            the existing run is returned idempotently. Once the prior run is terminal (completed
            or failed), a duplicate POST returns 409 with code `external_id_conflict` and
            the `existing_run_id` and `status` carried in `details`. To launch a fresh attempt
            for the same logical job after a terminal run, use a new external_id (e.g. suffix
            with an attempt counter).
        config:
          $ref: '#/components/schemas/ConfigEntries'
          description: Run-level cascade config overrides applied when starting the run.
    StartRunRequest:
      description: |-
        Request body for `POST /v1/projects/{project}/runs`. Discriminated by
        `mode`:
        - `saved` — body conforms to `StartSavedRunRequest`.
        - `inline` — body conforms to `StartInlineRunRequest`.
      oneOf:
      - $ref: '#/components/schemas/StartSavedRunRequest'
      - $ref: '#/components/schemas/StartInlineRunRequest'
      discriminator:
        propertyName: mode
        mapping:
          saved: '#/components/schemas/StartSavedRunRequest'
          inline: '#/components/schemas/StartInlineRunRequest'
    StartBoundRunRequest:
      type: object
      additionalProperties: false
      description: 'Request body for `POST /v1/projects/{project}/workflows/{id}/runs`. The
        definition to run is identified by the path parameter, so neither `mode` nor `definition_id`
        appear here. Inline specs are not allowed on this route — use `POST /v1/projects/{project}/runs`
        with `mode: inline` instead.'
      properties:
        queue:
          type: string
          description: Queue name to enqueue the run on. Defaults to "default".
        inputs:
          type: object
          additionalProperties: true
          description: Input values to pass to the workflow. Must conform to the workflow's
            declared input schema.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run for filtering and
            display.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Tags applied on top of the bound workflow definition's inherited tags.
            Caller keys override on conflict; an entry whose value is the empty string opts
            the inherited key out entirely (so the run does not carry it). Setting a tag value
            to "" is therefore reserved as the opt-out signal — use a placeholder value if
            you actually want a stored empty value.
        external_id:
          type: string
          description: Caller-supplied logical correlation key for this run. Unique within
            the project. If the same external_id is reused while the prior run is still active,
            the existing run is returned idempotently. Once the prior run is terminal (completed
            or failed), a duplicate POST returns 409 with code `external_id_conflict` and
            the `existing_run_id` and `status` carried in `details`. To launch a fresh attempt
            for the same logical job after a terminal run, use a new external_id (e.g. suffix
            with an attempt counter).
        config:
          $ref: '#/components/schemas/ConfigEntries'
          description: Run-level cascade config overrides applied when starting the bound
            workflow.
    ConfigEntry:
      type: object
      description: One config override entry.
      required:
      - key
      - value
      additionalProperties: false
      properties:
        key:
          type: string
          description: Registered config key, for example `jobs.timeouts.execution` or `runs.timeouts.execution`.
        value:
          type: string
          description: Raw string value interpreted by the key parser.
    ConfigEntries:
      type: array
      items:
        $ref: '#/components/schemas/ConfigEntry'
      description: 'Flat config input used outside authored workflow YAML. Each entry addresses
        one registered key. Unknown keys are rejected at write time. Phase 1 ships: `jobs.timeouts.claim`,
        `jobs.timeouts.execution`, `jobs.timeouts.heartbeat`, and `runs.timeouts.execution`.'
    ResolvedConfig:
      type: array
      items:
        $ref: '#/components/schemas/ResolvedConfigEntry'
      description: Frozen config resolution in flat entry form. Keys unset at every layer
        are omitted. See PRD 035.
    ResolvedConfigEntry:
      type: object
      description: One config value after layer resolution.
      required:
      - key
      - value
      - source
      additionalProperties: false
      properties:
        key:
          type: string
          description: Registered config key that was resolved.
        value:
          type: string
          description: Resolved raw string value.
        source:
          type: string
          enum:
          - service
          - project
          - workflow
          - run
          - step
          description: 'Cascade layer that supplied the winning value: service, project, workflow,
            run, or step.'
    JobStatus:
      type: string
      enum:
      - pending
      - claimed
      - completed
      - failed
      description: |-
        Job lifecycle state:
        - `pending`   — created, not yet claimed by a worker.
        - `claimed`   — held under an active worker lease.
        - `completed` — terminal success.
        - `failed`    — terminal failure; may follow retries.
    Job:
      type: object
      additionalProperties: false
      required:
      - id
      - run_id
      - step_name
      - action
      - queue
      - status
      - attempt
      - max_attempts
      - scheduled_at
      - created_at
      - updated_at
      description: A claimable unit of work derived from a single workflow step execution.
      properties:
        id:
          type: string
          description: Unique identifier for this job.
        run_id:
          type: string
          description: The workflow run this job belongs to.
        parent_job_id:
          type: string
          description: Set when this job is a child of a fan-out (each) step.
        path_id:
          type: string
          description: Opaque identifier for the execution path within the run (used for fan-out
            deduplication).
        step_name:
          type: string
          description: Workflow step name this job was created for.
        action:
          type: string
          description: Action name the worker must execute to complete this job.
        queue:
          type: string
          description: Queue the job was placed in. Workers subscribe to queues to receive
            jobs.
        parameters:
          type: object
          additionalProperties: true
          description: Resolved input parameters to pass to the action.
        status:
          $ref: '#/components/schemas/JobStatus'
          description: Current job lifecycle state.
        claimed_by:
          type: string
          description: Worker ID that claimed this job.
        agent_id:
          type: string
          description: Agent ID the claiming worker is acting on behalf of.
        agent_presence_id:
          type: string
          description: Agent presence ID provided during the claim.
        claimed_at:
          type: string
          format: date-time
          description: Timestamp when this job was claimed by a worker.
        heartbeat_at:
          type: string
          format: date-time
          description: Timestamp of the most recent heartbeat. Used to detect stale claims.
        attempt:
          type: integer
          description: Current attempt number (1-based). Increments on each retry.
        max_attempts:
          type: integer
          description: Maximum number of attempts before the job is permanently failed.
        scheduled_at:
          type: string
          format: date-time
          description: Earliest time at which this job may be claimed.
        error_message:
          type: string
          description: Error detail from the most recent failed attempt.
        claim_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will fail this job with `error_type=claim_timeout`
            if no worker has claimed it. Present only when `resolved_config` contains `key="jobs.timeouts.claim"`
            whose value resolves to a finite duration. Re-stamped whenever the job returns
            to `pending`.
        liveness_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will either reset (retries remain) or
            fail this job with `error_type=liveness_timeout` if the worker has not heartbeated
            in time. Present only when `resolved_config` contains `key="jobs.timeouts.heartbeat"`
            whose value resolves to a finite duration and the job is claimed.
        execution_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will fail this job with `error_type=execution_timeout`
            if it has not completed. Present only when `resolved_config` contains `key="jobs.timeouts.execution"`
            whose value resolves to a finite duration.
        error_type:
          type: string
          description: Failure cause. Server-produced timeout and cancellation failures use
            stable tokens such as `claim_timeout`, `liveness_timeout`, `execution_timeout`,
            `run_cancelled`, `run_timeout`, and `run_failed`; worker-reported failures may
            use caller-defined class names. Present when `status=failed`.
        resolved_config:
          $ref: '#/components/schemas/ResolvedConfig'
          description: Job-level cascade config resolved for this job.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this job was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this job was last updated.
    JobListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated list of jobs spawned by one workflow run. This is scoped to
        a single run for debugging and execution inspection rather than a project-wide search
        surface.
      properties:
        items:
          type: array
          description: The list of jobs for this run.
          items:
            $ref: '#/components/schemas/Job'
    SendRunSignalRequest:
      type: object
      description: Delivers an external signal to a workflow run.
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Signal name (e.g. "approval", "webhook").
        payload:
          type: object
          additionalProperties: true
          description: Arbitrary payload delivered to the waiting step when the signal is
            received.
    RunSignalAccepted:
      type: object
      description: Acknowledgement for a signal accepted by the run signal endpoint. The signal
        has been persisted as a public `source_event`; matching waits resume asynchronously
        through the subscription router.
      additionalProperties: false
      required:
      - source_event_id
      properties:
        source_event_id:
          type: string
          description: Identifier of the persisted `source_event` for this signal.
    InteractionTarget:
      type: object
      additionalProperties: false
      description: Identifies who should receive an interaction request. Humans and agents
        are both users; agent targets use the agent's backing user ID. `group_id` is a routing
        input that is expanded to target user rows at creation time.
      properties:
        user_ids:
          type: array
          items:
            type: string
          description: Resolved user IDs to target directly.
        group_id:
          type: string
          description: Optional group ID to expand into user targets.
    IntegrationEventSource:
      type: string
      enum:
      - webhook
      - sync
      - synthetic
    IntegrationEventSourceEventStatus:
      type: object
      additionalProperties: false
      required:
      - status
      properties:
        id:
          type: string
        status:
          type: string
          enum:
          - pending
          - processing
          - succeeded
          - retrying
          - failed
          - dead
          - missing
        attempts:
          type: integer
        last_error:
          type: string
        processed_at:
          type: string
          format: date-time
    IntegrationEventReceipt:
      type: object
      additionalProperties: false
      required:
      - id
      - provider
      - integration_id
      - event_type
      - schema_version
      - source
      - dedup_key
      - received_at
      properties:
        id:
          type: string
        provider:
          type: string
        integration_id:
          type: string
        event_type:
          type: string
        schema_version:
          type: integer
        source:
          $ref: '#/components/schemas/IntegrationEventSource'
        dedup_key:
          type: string
        occurred_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
        payload_summary:
          type: object
          additionalProperties: true
        payload:
          type: object
          additionalProperties: true
        raw_payload_truncated:
          type: boolean
        source_event:
          $ref: '#/components/schemas/IntegrationEventSourceEventStatus'
    IntegrationEventListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationEventReceipt'
        next_cursor:
          type: string
    IntegrationEventDetail:
      allOf:
      - $ref: '#/components/schemas/IntegrationEventReceipt'
      - type: object
        required:
        - payload
        properties:
          payload:
            type: object
            additionalProperties: true
    IntegrationEventSample:
      type: object
      additionalProperties: false
      required:
      - id
      - provider
      - event_type
      - name
      - payload
      properties:
        id:
          type: string
          description: Stable sample identifier, unique across providers.
        provider:
          type: string
          description: Provider name, e.g. `github`.
        event_type:
          type: string
          description: Dotted integration event type this sample fires.
        name:
          type: string
          description: Human-readable sample name.
        description:
          type: string
          description: What the sample is useful for testing.
        payload:
          type: object
          additionalProperties: true
          description: Canonical Mobius integration-event payload.
        meta:
          type: object
          additionalProperties: true
          description: Optional extra metadata merged into test-fire requests.
    IntegrationEventSamplesResponse:
      type: object
      additionalProperties: false
      required:
      - samples
      properties:
        samples:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationEventSample'
    IntegrationEventFireMode:
      type: string
      enum:
      - preview
      - deliver
      description: '`preview` evaluates matches without persistence; `deliver` persists a
        synthetic integration event and publishes it through normal delivery.'
    IntegrationEventFireRequest:
      type: object
      additionalProperties: false
      properties:
        mode:
          $ref: '#/components/schemas/IntegrationEventFireMode'
        sample_id:
          type: string
          description: Optional sample id to prefill provider, event_type, payload, and meta.
        provider:
          type: string
          description: Provider name. Defaults to the sample provider or the event_type prefix.
        event_type:
          type: string
          description: Dotted integration event type to fire. Required when sample_id is omitted.
        integration_id:
          type: string
          description: Optional integration id metadata. Preview mode defaults to `synthetic:<provider>`.
            Deliver mode defaults to the project's active provider integration; pass an explicit
            value when no matching integration is connected.
        dedup_key:
          type: string
          description: Optional dedup key for deliver mode. Defaults to the generated synthetic
            event id.
        payload:
          type: object
          additionalProperties: true
          description: Canonical event payload. When sample_id is set, this replaces the sample
            payload.
        meta:
          type: object
          additionalProperties: true
          description: Optional metadata overrides. Reserved event metadata is controlled
            by the top-level request fields.
    IntegrationEventFireEvent:
      type: object
      additionalProperties: false
      required:
      - provider
      - event_type
      - source
      - payload
      properties:
        id:
          type: string
          description: Persisted event id. Present in deliver mode.
        provider:
          type: string
        event_type:
          type: string
        integration_id:
          type: string
        source:
          type: string
          enum:
          - synthetic
        dedup_key:
          type: string
        payload:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
    IntegrationEventFireTriggerMatch:
      type: object
      additionalProperties: false
      required:
      - trigger_id
      - name
      - target_count
      properties:
        trigger_id:
          type: string
        name:
          type: string
        target_count:
          type: integer
        targets:
          type: array
          items:
            $ref: '#/components/schemas/TestFireTargetResult'
    IntegrationEventFireWaiterMatch:
      type: object
      additionalProperties: false
      required:
      - run_id
      - step_name
      - matches
      properties:
        run_id:
          type: string
        path_id:
          type: string
        step_name:
          type: string
        event_type:
          type: string
        condition:
          type: string
        matches:
          type: boolean
        reason:
          type: string
    IntegrationEventFireResponse:
      type: object
      additionalProperties: false
      required:
      - mode
      - event
      - triggers
      - waiters
      - delivered
      properties:
        mode:
          $ref: '#/components/schemas/IntegrationEventFireMode'
        sample_id:
          type: string
        event:
          $ref: '#/components/schemas/IntegrationEventFireEvent'
        triggers:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationEventFireTriggerMatch'
        waiters:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationEventFireWaiterMatch'
        delivered:
          type: boolean
          description: True when the event was persisted and published.
        deduped:
          type: boolean
          description: True when deliver mode reused an existing event row by dedup key.
    TestFireTargetStatus:
      type: string
      enum:
      - success
      - failed
      - skipped
      description: Per-target outcome of a test-fire dispatch. Distinct from `TriggerFireStatus`,
        which carries aggregate values like `partial_failure` that are only meaningful at
        the trigger level.
    TestFireTargetResult:
      type: object
      additionalProperties: false
      required:
      - target_id
      - kind
      - status
      - would_launch
      description: Per-target outcome of a test-fire. Mirrors TriggerFireTargetResult but
        exposes the resolved input mapping and would-launch decision so trigger authors can
        debug each layer in isolation.
      properties:
        target_id:
          type: string
          description: ID of the trigger target this result is for.
        kind:
          type: string
          enum:
          - launch_run
          - signal_run
          description: 'Effect kind of this target. Discriminates which resolved field is
            populated: `launch_run` populates `input_mapping_resolved`; `signal_run` populates
            `signal_payload_resolved`.'
        workflow_id:
          type: string
          description: Workflow definition the target points at. Present only for `launch_run`
            targets.
        enabled:
          type: boolean
          description: Whether the target is enabled. Disabled targets are skipped without
            resolution.
        status:
          $ref: '#/components/schemas/TestFireTargetStatus'
        input_mapping_resolved:
          type: object
          additionalProperties: true
          description: (launch_run only) Resolved input map handed to the workflow.
        signal_payload_resolved:
          type: object
          additionalProperties: true
          description: (signal_run only) Resolved signal payload that would be delivered to
            the matched run's `wait` step (subject of kind `signal`).
        input_resolution_error:
          type: string
          description: Error encountered resolving the target's `input_mapping` for a `launch_run`
            target. `signal_run` targets report `signal_payload_mapping` failures via `signal_payload_resolution_error`
            instead, so clients can distinguish which resolution step failed without parsing
            the error string. Errors rendering the run-selector template (`run_selector.external_id_template`
            for `signal_run`, or the `external_id_template` for `launch_run`) surface in `launch_error`.
        signal_payload_resolution_error:
          type: string
          description: (signal_run only) Error encountered resolving `signal_payload_mapping`
            — the payload that would be delivered to the matched run's `wait` step with `subject.kind
            == "signal"` (and exposed under `signal_payload_resolved`). Reported separately
            from `input_resolution_error` so clients don't reuse launch-run-specific fields
            for signal failures.
        external_id_resolved:
          type: string
          description: Rendered value of `external_id_template` (launch_run) or `run_selector.external_id_template`
            (signal_run). Lets authors verify the two templates produce matching strings.
            Absent when the target has no template or rendering failed.
        would_launch:
          type: boolean
          description: True when the target would launch a run (`launch_run`) or signal an
            existing run (`signal_run`). False for disabled targets and targets whose condition
            evaluated to false.
        run_id:
          type: string
          description: ID of the launched (`launch_run`) or signaled (`signal_run`) run. Only
            set in execute mode.
        reason:
          type: string
          description: Why the target was skipped, when status is `skipped`. Empty for `success`
            and `failed` results.
        launch_error:
          type: string
          description: Error from the launcher (`launch_run`) or signal sender (`signal_run`)
            when execute mode failed to act on the target.
    ActionAnnotationsRequest:
      type: object
      additionalProperties: false
      description: Request hints that describe the safe-use properties of the action. Used
        by the engine and tooling to decide retry behavior, dry-run eligibility, etc. Unknown
        request properties are rejected.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    ActionAnnotationsResponse:
      type: object
      additionalProperties: true
      description: Response hints that describe the safe-use properties of the action. Response
        annotations are forward-compatible so the server can add response-only hints without
        breaking strict clients.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    CreateActionRequest:
      type: object
      additionalProperties: false
      description: Registers a project-owned HTTP action endpoint callable from workflow steps.
      required:
      - name
      - endpoint_url
      properties:
        name:
          type: string
          description: Project-scoped identifier used in workflow step definitions. Lowercase
            alphanumeric + hyphens, e.g. "send-email". Must be unique within the project.
            Cannot start with "mobius." (reserved prefix).
        title:
          type: string
          description: Human-readable display name shown in the UI and catalog.
        description:
          type: string
          description: Markdown-safe description of what the action does.
        endpoint_url:
          type: string
          format: uri
          description: HTTP/HTTPS URL Mobius will POST to when invoking the action.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsRequest'
          description: Safe-use hints used by execution and authoring tools.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key-value string tags for filtering and organization.
    UpdateActionRequest:
      type: object
      additionalProperties: false
      description: Updates action metadata, endpoint, schemas, or safe-use hints.
      properties:
        title:
          type: string
          description: Replacement display title.
        description:
          type: string
          description: Replacement Markdown description.
        endpoint_url:
          type: string
          format: uri
          description: Replacement endpoint URL.
        input_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for inputs. Replaces the existing schema.
        output_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for outputs. Replaces the existing schema.
        annotations:
          type: object
          allOf:
          - $ref: '#/components/schemas/ActionAnnotationsRequest'
          nullable: true
          description: Pass null to clear all annotation flags.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Replacement tag map. Replaces the existing tags entirely.
    Action:
      type: object
      additionalProperties: false
      description: Project-owned HTTP action endpoint callable by workflow steps.
      required:
      - id
      - name
      - endpoint_kind
      - endpoint_url
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this action.
        name:
          type: string
          description: Project-scoped stable identifier used in workflow step definitions.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          enum:
          - http
          - workflow
          description: Backing kind of this action. "http" for project-owned HTTP endpoints
            (the only kind creatable via POST /actions). "workflow" entries are read-only
            and mutated through the workflow surface.
        endpoint_url:
          type: string
          format: uri
          description: 'HTTP/HTTPS URL Mobius POSTs to when invoking this action. Populated
            for endpoint_kind: http only.'
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsResponse'
          description: Safe-use hints returned for this action.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key-value string tags.
        signing_secret:
          type: string
          description: Raw HMAC-SHA256 signing secret. Only populated on create and rotate
            responses; null on all other reads. Store this value securely on first receipt
            — it cannot be retrieved again.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this action was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this action was last updated.
    RotateSecretResult:
      type: object
      additionalProperties: false
      description: New signing secret returned after rotating an action secret.
      required:
      - signing_secret
      properties:
        signing_secret:
          type: string
          description: The new raw signing secret. Store it immediately — this is the only
            time it is returned.
    ActionCatalogEntry:
      type: object
      additionalProperties: false
      description: One built-in, integration, workflow-, or custom-backed action available
        to agents and workflow authors.
      required:
      - name
      - source
      - available
      - endpoint_kind
      - risk
      - annotations
      properties:
        name:
          type: string
          description: Canonical dotted action name (e.g. `mobius.channel.send_message`).
            Translated to the provider-safe form (`mobius_channel_send_message`) only at the
            LLM boundary.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          enum:
          - builtin
          - http
          - workflow
          description: Backing kind. "builtin" for Mobius platform actions implemented in
            Go (no DB row), "http" for project-owned or integration HTTP endpoints, "workflow"
            for actions backed by a workflow definition published as a tool.
        workflow_handle:
          type: string
          description: Workflow handle for endpoint_kind=workflow entries. Absent otherwise.
        integration:
          type: string
          description: Integration slug this action belongs to (e.g. "slack"), if platform-provided.
        source:
          type: string
          enum:
          - platform
          - custom
          description: 'Origin of this action: "platform" for built-in or integration-backed
            actions provided by Mobius, "custom" for project-owned HTTP endpoints registered
            as actions. The `integration` field carries the provider slug for integration-backed
            platform actions.'
        available:
          type: boolean
          description: Whether this action can currently be invoked. False if the required
            integration is not connected, the action is a placeholder for a not-yet-implemented
            capability, or the caller lacks permission.
        risk:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
          description: Author-declared risk classification. Used by toolkit-author UIs to
            surface warnings and by audit views to prioritize attention.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsResponse'
          description: Safe-use hints returned for this catalog action. Always present; flags
            default to false.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        endpoint_url:
          type: string
          format: uri
          description: 'Endpoint URL (populated for endpoint_kind: http actions only).'
    ActionCatalogListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated project action catalog. This endpoint returns the complete
        set of available project, platform, and workflow-backed actions so clients can build
        pickers without paging across a small catalog.
      properties:
        items:
          type: array
          description: The full list of catalog entries.
          items:
            $ref: '#/components/schemas/ActionCatalogEntry'
    ActionInvocationRequest:
      type: object
      additionalProperties: false
      description: Request body for user-driven action invocation.
      properties:
        input:
          type: object
          description: Input values matching the action's input_schema.
          additionalProperties: true
        timeout_seconds:
          type: integer
          description: How long (in seconds) to wait for synchronous completion. Default 30,
            max 120. If the run does not complete within this window the response is 202 with
            status active (workflow-backed only; HTTP-backed actions always complete inline).
          minimum: 1
          maximum: 120
        dry_run:
          type: boolean
          description: When true, validates the input but does not execute. Applies to read-only
            actions only.
    ActionInvocationResult:
      type: object
      additionalProperties: false
      description: Unified invocation result for any action kind. HTTP-backed actions always
        produce status "completed". Workflow-backed actions may produce status "active" when
        the run did not complete within `timeout_seconds`.
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - active
          - completed
          - failed
          description: Terminal or in-progress status of the invocation.
        run_id:
          type: string
          description: Workflow run ID. Present when a run was created (always for workflow-backed,
            never for HTTP-backed).
        output:
          type: object
          additionalProperties: true
          description: Action output. Present when status is "completed".
        error:
          type: string
          description: Error message. Present when status is "failed".
    ActionInvocationEntry:
      type: object
      additionalProperties: false
      description: Per-invocation telemetry record for one action execution.
      required:
      - id
      - action_name
      - source
      - status
      - retry_count
      - started_at
      - finished_at
      properties:
        id:
          type: string
          description: Unique identifier for this invocation record.
        run_id:
          type: string
          description: Workflow run that triggered this invocation, if run-backed.
        job_id:
          type: string
          description: Job that triggered this invocation, if job-backed.
        step_name:
          type: string
          description: Workflow step name that triggered this invocation.
        action_name:
          type: string
          description: Name of the action that was invoked.
        source:
          type: string
          description: Invocation source ("workflow", "direct", etc.).
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters passed to the action.
        output_summary:
          type: object
          additionalProperties: true
          description: Truncated or summarized action output for audit purposes.
        status:
          type: string
          description: Terminal invocation status ("success", "failed", etc.).
        retry_count:
          type: integer
          description: Number of retry attempts before this terminal status was reached.
        started_at:
          type: string
          format: date-time
          description: Timestamp when this invocation started.
        finished_at:
          type: string
          format: date-time
          description: Timestamp when this invocation completed.
        error_type:
          type: string
          description: Machine-readable error classification when status is "failed".
        error_message:
          type: string
          description: Human-readable error detail when status is "failed".
    ActionInvocationListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of action invocation telemetry records.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ActionInvocationEntry'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    EnvironmentProvider:
      type: string
      enum:
      - sprites
      - cloudflare_containers
    EnvironmentStatus:
      type: string
      enum:
      - provisioning
      - ready
      - running
      - retained
      - destroying
      - destroyed
      - failed
      - orphaned
    EnvironmentLifetime:
      type: string
      enum:
      - run
      - lease
      - explicit
      description: Lifecycle owner for automatic cleanup. `run` environments are destroyed
        during their owning run's Finalize phase; `lease` environments are reaped after lease
        expiry; `explicit` environments require an explicit destroy call.
    EnvironmentPurpose:
      type: string
      enum:
      - implementation
      - review
      - verification
      - preview
      - debug
      - worker
      - custom
    EnvironmentBoundToType:
      type: string
      enum:
      - none
      - run
      - worker_session
      - service
      - manual
      description: Execution or lifecycle object this environment is bound to. Ownership remains
        in `owned_by`.
    EnvironmentRetentionPolicy:
      type: string
      enum:
      - manual
      - destroy_on_success
      - retain_on_failure
      - retain_always
    EnvironmentCleanupStatus:
      type: string
      enum:
      - none
      - pending
      - succeeded
      - failed
      - skipped
    EnvironmentLeaseStatus:
      type: string
      enum:
      - active
      - released
      - expired
      - revoked
    Environment:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - provider
      - status
      - lifetime
      - capabilities
      - spec_version
      - runtime
      - contains_secrets
      - cleanup_status
      - retention_policy
      - created_at
      - updated_at
      properties:
        id:
          type: string
        name:
          type: string
        scope:
          $ref: '#/components/schemas/ResourceScope'
        provider:
          $ref: '#/components/schemas/EnvironmentProvider'
        provider_resource_id:
          type: string
        provider_resource_name:
          type: string
        status:
          $ref: '#/components/schemas/EnvironmentStatus'
        lifetime:
          $ref: '#/components/schemas/EnvironmentLifetime'
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        owned_by:
          type: string
          description: Canonical user owner ID. For agent-started work, this is the agent's
            backing user ID.
        bound_to_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        bound_to_id:
          type: string
          description: ID of the run, worker session, service, or manual association named
            by `bound_to_type`.
        created_by:
          type: string
          description: User ID of the principal who created this environment.
        updated_by:
          type: string
          description: User ID of the principal who last updated this environment.
        run_id:
          type: string
        job_id:
          type: string
        current_worker_session_id:
          type: string
        agent_id:
          type: string
        template_id:
          type: string
          enum:
          - coding-default
        capabilities:
          type: array
          maxItems: 50
          items:
            type: string
        spec_version:
          type: integer
          minimum: 1
        spec:
          type: object
          additionalProperties: true
        runtime:
          type: object
          additionalProperties: true
          description: Provider-observed runtime data. URLs live under runtime.urls, with
