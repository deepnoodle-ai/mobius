          description: Declared event fields for this loop.
        config:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LoopSpecInput'
          description: Declared run config fields for this loop.
        concurrency:
          type: string
          enum:
          - allow
          - queue
          - skip
          - replace
          description: 'Concurrency behavior: `allow`, `queue`, `skip`, or `replace`.'
        triggers:
          type: array
          description: Authored trigger declarations for this loop.
          items:
            $ref: '#/components/schemas/LoopSpecTrigger'
        repositories:
          type: array
          description: Source repositories the loop targets.
          items:
            $ref: '#/components/schemas/LoopSpecRepository'
        steps:
          type: array
          description: Ordered user-authored steps to execute for each run. When present,
