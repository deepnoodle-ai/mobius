      summary: Fire a trigger with a synthetic payload
      description: |-
        Runs the dispatcher against a user-supplied event payload. In `preview` mode (default) returns the per-target resolved input mapping and would-launch decision without starting any runs; in `execute` mode actually launches runs (or signals existing runs once `signal_run` lands).

        Test-fires bypass the matcher entirely — the trigger does not need to match the synthetic event's `event_type` for the dispatcher to evaluate it.

        Used by the trigger detail page's Test Fire panel as the highest-leverage debugging affordance for trigger authoring.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestFireTriggerRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestFireTriggerResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/triggers/{id}/fires:
    get:
      operationId: listTriggerFires
      tags:
      - triggers
      summary: List fire history for a trigger
      description: Returns a paginated history of trigger fires newest-first. Each entry records
        whether the fire succeeded, was skipped (e.g. by `forbid` concurrency policy), or
        failed, along with per-target outcomes.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
