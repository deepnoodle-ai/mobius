          minimum: 1
        description: Requested signed URL TTL. The server caps this at the maximum supported
          artifact download TTL.
      responses:
        '200':
          description: Signed URL created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactSignedUrl'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/artifacts/{id}/pin:
    post:
      operationId: pinArtifact
      tags:
      - artifacts
      summary: Pin an artifact (skip TTL)
      description: Pins an artifact so the expiry sweeper does not delete it while it remains
        pinned.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: unpinArtifact
      tags:
      - artifacts
      summary: Remove the pinned flag
      description: Removes the pinned flag so the artifact is again eligible for its configured
        retention policy.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/settings/artifact-storage:
    get:
      operationId: getArtifactStorageSettings
      tags:
      - artifacts
      summary: Get project artifact-storage settings
      description: Returns the effective artifact storage settings for the project.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
