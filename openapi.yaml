        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/webhooks/{id}/ping:
    post:
      operationId: pingWebhook
      tags:
      - webhooks
      summary: Test a webhook URL
      description: 'Sends a live test POST request to the webhook''s saved URL, or to an override
        URL supplied in the request body, and returns the result. Because the webhook URL
        may be empty at creation time, the typical flow is: create the webhook without a URL,
        ping candidate URLs via the override until one succeeds, then persist the chosen URL
        with `PATCH`. The test payload has `type: "ping"` and is signed with the webhook''s
        secret if one is set.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PingWebhookRequest'
            example:
              url: https://hooks.example.test/mobius/run-status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingWebhookResult'
              example:
                success: true
                status_code: 204
                latency_ms: 83
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/webhooks/{id}/deliveries:
    get:
      operationId: listWebhookDeliveries
      tags:
      - webhooks
      summary: List webhook deliveries
      description: Lists the delivery history for a webhook, newest first. Each entry records
        the event type, current status, attempt count, and any last error message. Deliveries
        are retried up to 10 times (5xx, 408, 429 are retryable; other 4xx are not). A delivery
        transitions to `failed` only after exhausting all retry attempts.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: cursor
        in: query
        description: Opaque pagination cursor returned from the previous response.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of results to return per page.
        schema:
          type: integer
          minimum: 1
          maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveryListResponse'
              example:
                items:
                - id: whdel_01hw1u2v3w4x5y6z7a8b9c0d1e
                  webhook_id: wh_01hw1t2u3v4w5x6y7z8a9b0c1d
                  run_id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                  event_type: run.completed
                  status: delivered
                  attempts: 1
                  created_at: '2026-04-24T14:44:00Z'
                  delivered_at: '2026-04-24T14:44:01Z'
                has_more: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/integration-providers:
    get:
      operationId: listIntegrationProviders
      tags:
      - integration-providers
      summary: List available integration providers and their capabilities
      description: |-
        Returns the integration providers available to this project. Most provider metadata is registered at server or org scope, but the project-scoped path lets project-pinned credentials discover providers through the same authorization boundary they use for workflow and integration APIs.

        The response includes provider presentation metadata, project connection state, the dotted event types each provider can emit (with payload JSON Schema where reflectable), and the workflow actions that call back into the integration (with input/output JSON Schema).

        This response is the single source of truth that the integration page, provider detail pages, the new-trigger wizard's event-type picker, and public docs all read from. Workflow action pickers continue to use `/actions/catalog` because that catalog includes user-created and workflow-backed actions too.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationProvidersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/projects/{project}/metrics:
    get:
      operationId: getProjectMetrics
      tags:
      - metrics
      summary: Get operational metrics for a project
      description: |-
        Returns a snapshot of current execution health for the project. All rate and duration metrics are computed over a rolling window (default: 60 minutes). P95 step duration is computed from the 40 most recent completed jobs.

        The response is structured per resource type. The top-level flat fields (`runs_per_minute`, `failure_rate`, etc.) are deprecated mirrors of `runs.*` that will be removed before GA.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMetrics'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/interactions:
