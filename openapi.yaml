  /v1/projects/{project}/agents/{id}/sessions/{session_id}/heartbeat:
    post:
      operationId: heartbeatAgentSession
      tags:
      - agents
      summary: Refresh an agent session heartbeat
      description: Updates `last_seen_at` on the session and keeps the agent's computed presence
        as `online`. Workers should call this at a regular interval (typically every 30s).
        Sessions that miss heartbeats become `stale`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/session_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/agents/{id}/sessions/{session_id}/disconnect:
    post:
      operationId: disconnectAgentSession
      tags:
      - agents
      summary: Mark an agent session as disconnected
      description: Explicitly closes a session, setting status to `disconnected` and recording
