    post:
      operationId: cancelTurn
      tags:
      - sessions
      summary: Cancel a session turn
      description: |-
        Idempotently cancels one dispatcher-owned agent turn in the session. The first request that wins marks the turn terminal, retires its pending waits, interactions, nudges, and jobs, and emits `turn.cancelled` once. Later requests return the current terminal row without another lifecycle transition. Cancellation is cooperative: already-performed model, tool, and external effects are not rolled back. Committed transcript rows are retained, while live-only uncommitted preview content is discarded.

        A cancelled turn cannot be resumed. Reusing its invocation idempotency key returns the same cancelled turn; retrying the task requires a new invocation and may repeat external effects. Stream cursors resume observation only. A live loop-owned turn returns `409 turn_owned_by_run`; cancel its run instead. Requires the `mobius.agent.invoke` permission (or the agent's own backing principal).
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/SessionIdParam'
