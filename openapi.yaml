          description: Unique name within the org+project scope.
        description:
          type: string
          description: Optional human-readable description of what this role grants.
        permissions:
          type: array
          items:
            type: string
          description: Permission strings to include (e.g. "mobius.workflow.create").
    UpdateRoleRequest:
      type: object
