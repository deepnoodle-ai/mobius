        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      operationId: listInteractions
      tags:
      - interactions
      summary: List interactions
      description: Returns interactions newest-first, optionally filtered by kind, status,
        run, session, target, or the current caller's inbox. Inbox filtering includes direct
        targets.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: status
        in: query
        schema:
          type: string
          enum:
          - pending
          - completed
          - expired
          - cancelled
        description: Filter by status
      - name: kind
        in: query
        schema:
          $ref: '#/components/schemas/InteractionKind'
        description: Filter by interaction protocol kind
      - name: run_id
        in: query
        schema:
          type: string
        description: Filter by originating run ID
      - name: session_id
        in: query
        schema:
          type: string
        description: Filter to interactions raised by an agent tool call (`consumer.kind=agent_tool`)
          whose invocation is a turn of the given chat session. Lets a chat surface the pending
          `request_human_input` interactions its own turns are waiting on.
      - name: target_user_id
        in: query
        schema:
          type: string
        description: Filter by resolved target user ID.
      - name: inbox
        in: query
        schema:
          type: boolean
        description: When true, returns only interactions visible to the authenticated user.
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InteractionListResponse'
