        required: true
        description: Project-unique automation handle.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAutomationVersionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationVersion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/automations/{handle}/versions/{version}/publication:
    post:
      operationId: publishAutomationVersion
      tags:
      - automations
      summary: Publish a version
      description: Marks the supplied version `published` and updates the automation's `published_version`.
        Prior published versions become `superseded`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: handle
        in: path
        required: true
        description: Project-unique automation handle.
        schema:
          type: string
      - name: version
        in: path
        required: true
        description: Version number of the AutomationVersion to publish.
        schema:
          type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Automation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/triggers/webhook/{webhook_handle}:
    post:
      operationId: deliverWebhookTrigger
      tags:
      - automations
      summary: Deliver a webhook payload to a trigger
      description: Public, unauthenticated endpoint that resolves the `webhook_handle` to
        a configured webhook-kind trigger and dispatches the payload via the trigger dispatcher.
        Idempotent on the `idempotency_key` query parameter or the standard `X-Idempotency-Key`
        header — repeats with the same key return the original fire's run id without starting
        a new run.
      security: []
      parameters:
      - name: webhook_handle
        in: path
        required: true
        description: Public, project-scoped webhook handle configured on the trigger.
        schema:
          type: string
      - name: idempotency_key
        in: query
        required: false
        schema:
          type: string
        description: Optional idempotency key (also accepted via X-Idempotency-Key header).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Free-form payload forwarded to the run as inputs.
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
