      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/TableIDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRowsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchRowsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/tables/{table_id}/upsert:
    post:
      operationId: upsertTableRow
      tags:
      - tables
      summary: Upsert a row
      description: |-
        Insert or update a row identified by a set of key columns. If a row with matching key-column values exists it is updated (PATCH semantics — unspecified fields are preserved). If no matching row is found a new row is inserted.

        Returns 201 Created when a new row was inserted, 200 OK when an existing row was updated.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/TableIDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertRowRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertRowResponse'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertRowResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/tables/{table_id}/bulk:
    post:
      operationId: bulkInsertTableRows
      tags:
      - tables
      summary: Bulk insert rows
      description: Validate and insert up to 1,000 rows into the table.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/TableIDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkInsertRowsRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkInsertRowsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/tables/{table_id}/rows/{row_id}:
    get:
      operationId: getTableRow
      tags:
      - tables
      summary: Get a row by ID
      description: Get one table row by row ID.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/TableIDParam'
      - name: row_id
        in: path
        required: true
        description: Table row ID.
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableRow'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateTableRow
      tags:
      - tables
      summary: Update a row (PATCH — merges into existing data)
      description: Validate and merge fields into an existing row, optionally checking the
        current row version.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/TableIDParam'
      - name: row_id
        in: path
        required: true
        description: Table row ID.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRowRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableRow'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: deleteTableRow
      tags:
      - tables
      summary: Delete a row
      description: Delete one row from the table.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/TableIDParam'
      - name: row_id
        in: path
        required: true
        description: Table row ID.
        schema:
          type: string
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/artifacts:
    get:
      operationId: listArtifacts
      tags:
      - artifacts
      summary: List artifacts in a project
      description: Returns artifacts in the project, ordered (created_at desc, id desc). Optional
        filters narrow by run, step, state, or mime prefix. Deleted artifacts are excluded
        by default; pass `state=deleted` to inspect tombstones. Results are scoped to the
        authenticated principal's User-owned artifact space.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: run_id
        in: query
        required: false
        description: Filter to artifacts produced by this automation run.
        schema:
          type: string
      - name: step_id
        in: query
        required: false
        description: Filter to artifacts produced by this run step.
        schema:
          type: string
      - name: mime
        in: query
        required: false
        schema:
          type: string
        description: Mime prefix filter (e.g. `image/`)
      - name: state
        in: query
        required: false
        description: Filter by artifact lifecycle state.
        schema:
          $ref: '#/components/schemas/ArtifactState'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createArtifact
      tags:
      - artifacts
      summary: Publish a worker-produced artifact
      description: Accepts a multipart file upload from a worker that is currently executing
        a claimed job. The request must include `X-Mobius-Lease-Token`; Mobius resolves the
        active claim and derives run, step, job, worker session, attempt, and shared visibility
        from the lease. Caller-supplied lineage or visibility fields are rejected.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: X-Mobius-Lease-Token
        in: header
        required: true
        schema:
          type: string
        description: Active job lease token for worker-produced artifacts.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateArtifactRequest'
            encoding:
              tags:
                contentType: application/json
      responses:
        '201':
          description: Artifact uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/artifacts/{id}:
    get:
      operationId: getArtifact
      tags:
      - artifacts
      summary: Get an artifact
      description: Returns artifact metadata after enforcing the caller's project and owner-user
        artifact scope.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteArtifact
      tags:
      - artifacts
      summary: Delete an artifact
      description: Soft-delete the artifact row and delete the underlying Mobius-managed object
        before reporting success. The tombstone remains for audit and run-history views, while
        content and quota charging are removed.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/artifacts/{id}/content:
    get:
      operationId: getArtifactContent
      tags:
      - artifacts
      summary: Fetch artifact bytes
      description: 'Streams artifact bytes through the Mobius API after enforcing the caller''s
        artifact access scope. Safe preview mime types are returned inline; all other content
        is served as an attachment with `X-Content-Type-Options: nosniff`.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      responses:
        '200':
          description: Streamed artifact bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/artifacts/{id}/signed-url:
    post:
      operationId: createArtifactSignedUrl
      tags:
      - artifacts
      summary: Create a signed artifact URL
      description: Generates a fresh, time-boxed storage URL for the artifact after enforcing
        the caller's artifact access scope. Use `getArtifactContent` when bytes should flow
        through the Mobius API instead of directly from object storage.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      - name: ttl_seconds
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Requested signed URL TTL. The server caps this at the maximum supported
          artifact download TTL.
      responses:
        '200':
          description: Signed URL created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactSignedUrl'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/settings/artifact-storage/quota:
    get:
      operationId: getArtifactStorageQuota
      tags:
      - artifacts
      summary: Get per-org Mobius-managed artifact storage quota usage
      description: Returns Mobius-managed artifact quota usage for the current org.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactQuotaUsage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |-
        Bearer credential supplied via the `Authorization: Bearer <credential>` header. Two credential types are accepted:

        - **API keys** — prefix `mbx_`. Issued from the Mobius app or via the
        API key endpoints. API keys authenticate as a machine principal in one
        project. Send the raw `mbx_...` secret for normal requests. A
        trailing `.<project_handle>` suffix is accepted for compatibility and
        is validated when present.
        - **CLI credentials** — prefix `mbc_`. Issued by the device-auth
        flow on behalf of a user. Unpinned CLI credentials are org-scoped and
        sent as the raw token. Project-pinned CLI credentials may include a
        trailing `.<project_handle>` suffix; the suffix is validated when
        present.
    XApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key supplied through the `x-api-key` header. This is primarily used
        by Anthropic-compatible clients targeting `/v1/messages`; project API keys bound to
        machine principals are required for that endpoint.
  parameters:
    ProjectHandleParam:
      name: project
      in: path
      required: true
      schema:
        type: string
      description: Project handle (unique per organization)
    IDParam:
      name: id
      in: path
      required: true
      description: Resource ID.
      schema:
        type: string
    ActionNameParam:
      name: action_name
      in: path
      required: true
      description: Project-scoped action name used in automation step definitions.
      schema:
        type: string
    principal_id:
      name: principal_id
      in: path
      required: true
      description: Principal ID.
      schema:
        type: string
    presence_id:
      name: presence_id
      in: path
      required: true
      description: ID of the agent presence record.
      schema:
        type: string
    CursorParam:
      name: cursor
      in: query
      description: Cursor for pagination (opaque string from previous response)
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    TagFilterParam:
      name: tag
      in: query
      description: |-
        Filter results by tag. Repeatable; multiple values combine with AND. Format: `Key:Value`, `Key:*` for any value, `Key:a,b,c` for IN.

        Tag values containing `:` or `,` cannot be filtered with this grammar — the parser splits on those literally. Constrain values to plain identifiers when you intend to filter on them.

        Some high-cardinality resources may ignore ad-hoc tag filtering.
      explode: true
      schema:
        type: array
        items:
          type: string
    AdminOrgIDParam:
      name: org_id
      in: path
      required: true
      schema:
        type: string
      description: ID of the target organization for the admin operation.
    EnvironmentIDParam:
      name: environment_id
      in: path
      required: true
      description: Environment ID.
      schema:
        type: string
    SecretParam:
      name: secret
      in: path
      required: true
      schema:
        type: string
      description: Secret ID or project-scoped secret name.
    SecretVersionParam:
      name: version
      in: path
      required: true
      schema:
        type: string
      description: Secret version number or `latest`.
    ReferenceTypeParam:
      name: reference_type
      in: path
      required: true
      description: Reference type name, such as `slack.channel` or `table.table`.
      schema:
        type: string
    IntegrationIDParam:
      name: integration_id
      in: path
      required: true
      description: Integration record ID.
      schema:
        type: string
        pattern: ^intg_[A-Za-z0-9]+$
    IntegrationEventIDParam:
      name: event_id
      in: path
      required: true
      description: Integration event receipt ID.
      schema:
        type: string
        pattern: ^ievt_[A-Za-z0-9]+$
    TableIDParam:
      name: table_id
      in: path
      required: true
      description: Table ID.
      schema:
        type: string
        pattern: ^table_[A-Za-z0-9]+$
    TableNameQueryParam:
      name: name
      in: query
      schema:
        type: string
        pattern: ^[a-z][a-z0-9_]*$
        maxLength: 64
      description: Filter tables by name. Names are unique within a scope, but are not globally
        unique across owner-scoped tables; use this as a discovery filter and use the returned
        table `id` for follow-up operations.
    TableScopeParam:
      name: scope
      in: query
      schema:
        $ref: '#/components/schemas/ResourceScope'
      description: Filter tables by scope. Omit to include project/default and owner scopes;
        use `owner` with `owned_by` or `owned_by_me=true` for per-user memory tables.
    TableOwnedByParam:
      name: owned_by
      in: query
      schema:
        type: string
      description: Canonical user owner ID. Used with `scope=owner` for lookups; for list
        filters, narrows to tables owned by this user. Ignored when `owned_by_me=true` is
        present.
    TableOwnedByMeParam:
      name: owned_by_me
      in: query
      schema:
        type: boolean
      description: Filter lists to tables owned by the authenticated user.
    ArtifactIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^art_[A-Za-z0-9]+$
      description: TypeID of the artifact (`art_...`)
    RunIdParam:
      name: run_id
      in: path
      required: true
      schema:
        type: string
      description: Automation run ID
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded. Retry after the delay indicated in the `Retry-After`
        header.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Limit of the tightest active rate-limit bucket.
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Requests remaining in the tightest bucket's current window.
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp (seconds) when the tightest bucket resets.
        X-RateLimit-Scope:
          schema:
            type: string
            enum:
            - key
            - org
          description: Scope of the tightest bucket.
        X-RateLimit-Policy:
          schema:
            type: string
          description: All active windows for the selected scope, in `limit;w=seconds` form.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NoContent:
      description: No Content
    ProviderError:
      description: LLM provider error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      description: Standard error envelope returned by API endpoints.
      required:
      - error
      properties:
        error:
          type: object
          additionalProperties: false
          description: Error detail.
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              additionalProperties: true
              description: Optional structured details specific to a `code`. Endpoints that
                set this document the per-code shape inline. Absent for codes whose `code`
                + `message` are sufficient.
    ProjectID:
      type: string
      description: Project ID.
    ResourceScope:
      type: string
      enum:
      - owner
      description: Optional namespace for named runtime resources. Omitted/null means the
        project/default scope; `owner` means names are unique within `(project, owned_by)`.
    CapabilityReadiness:
      type: string
      enum:
      - ready
      - needs_setup
      description: Whether a catalog capability — an action, an event source, or an integration
        provider — is usable right now. `ready` means it can be used as-is; `needs_setup`
        means it is known and supported but blocked by configuration, credentials, permissions,
        provider runtime availability, or implementation status. This is catalog *readiness*,
        and is deliberately separate from a resource's lifecycle state (such as integration
        `status` or artifact lifecycle).
    CapabilityReadinessReason:
      type: string
      enum:
      - not_configured
      - inactive
      - expired
      - provider_unavailable
      - permission_missing
      - not_implemented
      description: Why a capability is `needs_setup`. Present only when readiness is `needs_setup`.
        `not_configured` — no integration or credential is connected yet. `inactive` — the
        backing integration is manually disabled. `expired` — the backing credential has expired.
        `provider_unavailable` — the provider runtime is not currently available. `permission_missing`
        — the caller lacks permission to use it. `not_implemented` — a placeholder for a capability
        that is not yet available.
    TagMap:
      type: object
      description: Key/value tag map. Keys 1–128 chars, values 0–256 chars. Keys with the
        `mobius:` prefix are system-managed and cannot be set by callers. Maximum 8 tags per
        resource. Use tags to organize resources by environment, team, cost-center, or any
        other dimension meaningful to your organization; tags can be filtered on most list
        endpoints.
      additionalProperties:
        type: string
        maxLength: 256
      maxProperties: 8
      example:
        Environment: Production
        Department: Finance
    User:
      type: object
      additionalProperties: false
      description: User or principal identity known to the organization. User records are
        useful for membership lists, role assignment UIs, attribution, and displaying profile
        information next to actions.
      required:
      - id
      - email
      - kind
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Clerk user ID. Stable and globally unique across all orgs.
        email:
          type: string
          description: Primary email address from Clerk.
        kind:
          type: string
          enum:
          - human
          - agent
          - service
          - system
          description: The principal type represented by this user record.
        display_name:
          type: string
          description: Authoritative single-line label for this user, regardless of kind.
            Humans get "First Last"; agents and other machine principals get their configured
            display name. Renderers should prefer this over first_name/last_name.
        color:
          type: string
          description: Optional Mantine palette key (e.g. "indigo") used by avatar surfaces
            when no avatar_url is set. Populated for agent-kind users; empty otherwise.
        first_name:
          type: string
          description: User's first name from their Clerk profile.
        last_name:
          type: string
          description: User's last name from their Clerk profile.
        avatar_url:
          type: string
          description: Profile avatar URL from Clerk (may be a Gravatar or uploaded image).
        created_at:
          type: string
          format: date-time
          description: When the user record was first mirrored into Mobius.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this user record was last synced from Clerk.
        deleted_at:
          type: string
          format: date-time
          description: When this user principal was soft-deleted, if applicable.
    AgentStatus:
      type: string
      enum:
      - active
      - inactive
      description: Administrative status. Inactive agents cannot claim new jobs. Soft-deleted
        agents are represented by `deleted_at` and excluded from normal reads.
    ProjectAccessMode:
      type: string
      enum:
      - org_open
      - restricted
      description: '`org_open`: every org member can see and use the project, subject to role
        assignments. `restricted`: only listed project members (and org owners/admins) can
        see or use the project.'
    Project:
      type: object
      additionalProperties: false
      description: Workspace boundary for automations, actions, credentials, agents, and runtime
        activity. Most operational APIs are project-scoped, so this object tells clients which
        handle to use and who can see the project.
      required:
      - id
      - name
      - handle
      - access_mode
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this project.
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug used as a path segment in all project-scoped API routes.
            Unique within the org. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Current project access policy: `org_open` or `restricted`.'
        created_by:
          type: string
          description: Principal ID of whoever created this project.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this project was archived. `null` for active projects.
            Archived projects are read-only and excluded from the default project listing.
        default_agent_role_id:
          type: string
          nullable: true
          description: Role assigned to the auto-created agent principal of any new agent
            in this project, when no per-call `role_ids` are supplied on `createAgent`. `null`
            falls through to the system `Agent` role floor.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this project.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this project was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this project was last updated.
    ProjectListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Project'
    AgentModelRouteMode:
      type: string
      enum:
      - managed
      - worker
      - byo_provider
      description: Where the agent's default model call should run.
    AgentModelRoute:
      type: object
      additionalProperties: false
      description: Default model route used by built-in messaging and by automation agent
        steps that do not override the route.
      required:
      - mode
      properties:
        mode:
          $ref: '#/components/schemas/AgentModelRouteMode'
        environment_id:
          type: string
          description: Environment to use for worker-backed model calls.
        provider:
          type: string
          description: Provider or worker route name.
        model:
          type: string
          description: Model identifier to use for this route.
        queue:
          type: string
          description: Worker queue for customer-worker model calls.
        required_capabilities:
          type: array
          items:
            type: string
          description: Worker capabilities required for this route.
    AgentToolPresentation:
      type: string
      enum:
      - flat
      - meta
      description: Controls how granted actions are surfaced to the model in Mobius-hosted
        agent turns. `flat` exposes one tool per action, while `meta` groups related actions
        behind compact command routers.
    Agent:
      type: object
      additionalProperties: false
      description: Project-scoped AI actor identity. An agent IS a principal (its permissions
        are role grants on that principal); agents are useful when automations need a named
        actor with instructions, capabilities, configuration, and session presence.
      required:
      - id
      - principal_id
      - name
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this agent.
        principal_id:
          type: string
          description: The machine principal (principals.id, kind `agent`) this agent IS.
            Created atomically with the agent and immutable. Used as the `owned_by` value
            when filtering or claiming resources owned by this agent.
        name:
          type: string
          description: Mutable unique name within the project. Free-form human-readable label;
            use `id` for stable references and job targeting.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform agent classification for tooling and filtering (e.g. "llm",
            "rpa").
        color:
          type: string
          description: Display color for this agent in UI surfaces. One of the Mantine color
            palette keys (e.g. `indigo`, `teal`, `grape`); empty string falls back to a hash-derived
            color.
          maxLength: 24
        capabilities:
          type: array
          items:
            type: string
          description: Capability names used by orchestrators to select suitable agents.
        model:
          type: string
          description: Model identifier for platform agents. Accepts any id returned by `GET
            /v1/projects/{project}/catalog/models`, optionally `provider/`-prefixed (e.g.
            `xai/grok-4`); bare known ids (e.g. `claude-sonnet-4-6`) are auto-detected to
            their provider. Empty string falls back to the platform default.
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
        tool_presentation:
          $ref: '#/components/schemas/AgentToolPresentation'
          description: Default tool presentation used by automation agent steps and built-in
            channel-message replies for this agent.
        system_prompt:
          type: string
          description: Custom system prompt for platform agents. Empty string uses the generated
            default based on the agent name.
        status:
          $ref: '#/components/schemas/AgentStatus'
          description: 'Current agent status: `active` or `inactive`.'
        email_address:
          type: string
          description: Inbox address provisioned via POST /v1/projects/{project}/agents/{id}/inbox
            (opt-in; not created automatically at agent creation). The field is populated
            only after a successful provisioning call. Use this address to add the agent as
            a member on external platforms (Linear, GitHub, Slack, etc.) so the platform can
            deliver notifications to the agent.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this agent.
        created_by:
          type: string
          description: User ID of the principal who created this agent.
        updated_by:
          type: string
          description: User ID of the principal who last updated this agent.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this agent was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this agent was last updated.
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the agent has been soft-deleted. Soft-deleted agents are excluded
            from normal listing and lookups but their records are retained so historical chat
            messages can resolve the sender name.
    AgentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Agent'
    APIKey:
      type: object
      additionalProperties: false
      description: Stored API credential metadata for automation and service access. The raw
        secret is never returned here; use this object to list, audit, expire, or identify
        keys by prefix without exposing tokens.
      required:
      - id
      - name
      - key_prefix
      - project_id
      - principal_id
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this API key.
        name:
          type: string
          description: Human-readable label, unique within the project.
        key_prefix:
          type: string
          description: First 8 characters of the key, used to identify it without exposing
            the secret.
        project_id:
          $ref: '#/components/schemas/ProjectID'
          description: Project that owns the principal this key authenticates as.
        principal_id:
          type: string
          description: Principal this key authenticates as.
        expires_at:
          type: string
          format: date-time
          description: Hard expiry timestamp. Requests using an expired key receive 401.
        last_used_at:
          type: string
          format: date-time
          description: Timestamp of the most recent authenticated request using this key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this API key.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this key was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this key was last updated.
    APIKeyCreateResult:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - key_prefix
      - project_id
      - principal_id
      - created_at
      - updated_at
      - key
      description: Returned only on key creation. Contains the raw `key` value which is not
        retrievable after this response.
      properties:
        id:
          type: string
          description: Unique identifier for the created API key.
        name:
          type: string
          description: Human-readable name for the key.
        key_prefix:
          type: string
          description: First 8 characters of the key for identification.
        project_id:
          $ref: '#/components/schemas/ProjectID'
          description: Project that owns the principal this key authenticates as.
        principal_id:
          type: string
          description: Principal this key authenticates as.
        expires_at:
          type: string
          format: date-time
          description: Timestamp when this key expires. Omitted if it does not expire.
        last_used_at:
          type: string
          format: date-time
          description: Timestamp of the most recent authenticated request using this key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this API key.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this key was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this key was last updated.
        key:
          type: string
          description: The raw API key. Returned only once at creation — store it securely
            immediately.
    APIKeyListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/APIKey'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateAPIKeyRequest:
      type: object
      required:
      - name
      - principal_id
      additionalProperties: false
      description: Request shape for creating a project API key bound to a machine principal.
        The key authenticates as that principal; permissions are managed by assigning roles
        to the principal, not by granting permissions to the key.
      properties:
        name:
          type: string
          description: Human-readable label, unique within the project.
        principal_id:
          type: string
          description: Principal this key authenticates as.
        expires_at:
          type: string
          format: date-time
          description: Optional hard expiry. Omit for a non-expiring key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    ActionAnnotationsRequest:
      type: object
      additionalProperties: false
      description: Request hints that describe the safe-use properties of the action. Used
        by the engine and tooling to decide retry behavior, dry-run eligibility, etc. Unknown
        request properties are rejected.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    ActionAnnotationsResponse:
      type: object
      additionalProperties: true
      description: Response hints that describe the safe-use properties of the action. Response
        annotations are forward-compatible so the server can add response-only hints without
        breaking strict clients.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    CreateActionRequest:
      type: object
      additionalProperties: false
      description: Registers a project-owned HTTP action endpoint callable from automations.
      required:
      - name
      - endpoint_url
      properties:
        name:
          type: string
          description: Project-scoped identifier used in automation step definitions. Lowercase
            alphanumeric + hyphens, e.g. "send-email". Must be unique within the project.
            Cannot start with "mobius." (reserved prefix).
        title:
          type: string
          description: Human-readable display name shown in the UI and catalog.
        description:
          type: string
          description: Markdown-safe description of what the action does.
        endpoint_url:
          type: string
          format: uri
          description: HTTP/HTTPS URL Mobius will POST to when invoking the action.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsRequest'
          description: Safe-use hints used by execution and authoring tools.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key-value string tags for filtering and organization.
    UpdateActionRequest:
      type: object
      additionalProperties: false
      description: Updates action metadata, endpoint, schemas, or safe-use hints.
      properties:
        title:
          type: string
          description: Replacement display title.
        description:
          type: string
          description: Replacement Markdown description.
        endpoint_url:
          type: string
          format: uri
          description: Replacement endpoint URL.
        input_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for inputs. Replaces the existing schema.
        output_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for outputs. Replaces the existing schema.
        annotations:
          type: object
          allOf:
          - $ref: '#/components/schemas/ActionAnnotationsRequest'
          nullable: true
          description: Pass null to clear all annotation flags.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Replacement tag map. Replaces the existing tags entirely.
    Action:
      type: object
      additionalProperties: false
      description: Project-owned HTTP action endpoint callable by automations.
      required:
      - id
      - name
      - endpoint_kind
      - endpoint_url
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this action.
        name:
          type: string
          description: Project-scoped stable identifier used in automation definitions.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          enum:
          - http
          - builtin
          description: Backing kind of this action. `http` actions are project-owned HTTP
            endpoints invoked via POST. `builtin` actions are Mobius platform actions registered
            in Go.
        endpoint_url:
          type: string
          format: uri
          description: 'HTTP/HTTPS URL Mobius POSTs to when invoking this action. Populated
            for endpoint_kind: http only.'
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsResponse'
          description: Safe-use hints returned for this action.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key-value string tags.
        secret_ref:
          type: string
          description: Project secret reference that stores this action's signing key. Present
            for HTTP-backed actions.
        secret_version:
          type: integer
          format: int64
          description: Version of `secret_ref` created by this response. Only populated on
            create and rotate responses.
        signing_secret:
          type: string
          description: Base64-encoded 32-byte HMAC-SHA256 signing key. Only populated on create
            and rotate responses; null on all other reads. Store this value securely on first
            receipt — it cannot be retrieved again.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this action was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this action was last updated.
    RotateSecretResult:
      type: object
      additionalProperties: false
      description: New signing key material returned after rotating a signing secret.
      required:
      - secret_ref
      - secret_version
      - signing_secret
      properties:
        secret_ref:
          type: string
          description: Project secret reference that now stores the action signing key.
        secret_version:
          type: integer
          format: int64
          description: New project-secret version number.
        signing_secret:
          type: string
          description: Base64-encoded 32-byte signing key. Store it immediately — this is
            the only time it is returned.
    ActionCatalogEntry:
      type: object
      additionalProperties: false
      description: One built-in, integration, or custom-backed action available to agents
        and automation authors.
      required:
      - name
      - source
      - readiness
      - endpoint_kind
      - risk
      - annotations
      properties:
        name:
          type: string
          description: Canonical dotted action name (e.g. `slack.post_message`). Translated
            to the provider-safe form (`slack_post_message`) only at the LLM boundary.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          enum:
          - builtin
          - http
          description: Backing kind. "builtin" for Mobius platform actions implemented in
            Go (no DB row), "http" for project-owned or integration HTTP endpoints.
        integration:
          type: string
          description: Integration slug this action belongs to (e.g. "slack"), if platform-provided.
        source:
          type: string
          enum:
          - platform
          - custom
          description: 'Origin of this action: "platform" for built-in or integration-backed
            actions provided by Mobius, "custom" for project-owned HTTP endpoints registered
            as actions. The `integration` field carries the provider slug for integration-backed
            platform actions.'
        readiness:
          $ref: '#/components/schemas/CapabilityReadiness'
          description: Whether this action can be called right now. `needs_setup` when the
            required integration is not connected, the caller lacks permission, or the action
            is a placeholder for a not-yet-implemented capability.
        readiness_reason:
          $ref: '#/components/schemas/CapabilityReadinessReason'
          description: Why the action is `needs_setup`. Omitted when `readiness` is `ready`.
        risk:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
          description: Author-declared risk classification. Used by toolkit-author UIs to
            surface warnings and by audit views to prioritize attention.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsResponse'
          description: Safe-use hints returned for this catalog action. Always present; flags
            default to false.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        endpoint_url:
          type: string
          format: uri
          description: 'Endpoint URL (populated for endpoint_kind: http actions only).'
        execution:
          $ref: '#/components/schemas/ActionExecutionMetadata'
          description: Execution locations and worker requirements available to automation
            authors.
    ActionExecutionMetadata:
      type: object
      additionalProperties: false
      required:
      - supported_locations
      - default_location
      properties:
        supported_locations:
          type: array
          items:
            type: string
            enum:
            - managed
            - worker
            - environment
          description: Execution locations supported by this action.
        default_location:
          type: string
          enum:
          - managed
          - worker
          - environment
          description: Location selected by default in authoring UIs.
        required_worker_capabilities:
          type: array
          items:
            type: string
          description: Worker capability labels required when running this action on a customer
            worker.
        queue:
          type: string
          description: Queue to use when dispatching this action to workers.
    ActionCatalogListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated project action catalog. This endpoint returns the complete
        set of available project and platform actions so clients can build pickers without
        paging across a small catalog.
      properties:
        items:
          type: array
          description: The full list of catalog entries.
          items:
            $ref: '#/components/schemas/ActionCatalogEntry'
    InvokeActionRequest:
      type: object
      additionalProperties: false
      description: Request body for user-driven action invocation.
      properties:
        input:
          type: object
          description: Input values matching the action's input_schema.
          additionalProperties: true
        timeout_seconds:
          type: integer
          description: How long (in seconds) to wait for synchronous completion. Default 30,
            max 120. HTTP-backed actions complete inline.
          minimum: 1
          maximum: 120
        dry_run:
          type: boolean
          description: When true, validates the input but does not execute. Applies to read-only
            actions only.
    ActionInvocationResult:
      type: object
      additionalProperties: false
      description: Unified invocation result for any action kind. HTTP-backed actions produce
        status "completed".
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - active
          - completed
          - failed
          description: Terminal or in-progress status of the invocation.
        run_id:
          type: string
          description: Automation run ID. Present when an asynchronous run was created.
        output:
          type: object
          additionalProperties: true
          description: Action output. Present when status is "completed".
        error:
          type: string
          description: Error message. Present when status is "failed".
    ActionInvocationEntry:
      type: object
      additionalProperties: false
      description: Per-invocation telemetry record for one action execution.
      required:
      - id
      - action_name
      - source
      - status
      - retry_count
      - started_at
      - finished_at
      properties:
        id:
          type: string
          description: Unique identifier for this invocation record.
        run_id:
          type: string
          description: Automation run that triggered this invocation, if run-backed.
        job_id:
          type: string
          description: Job that triggered this invocation, if job-backed.
        step_name:
          type: string
          description: Automation step name that triggered this invocation.
        action_name:
          type: string
          description: Name of the action that was invoked.
        source:
          type: string
          description: Invocation source ("automation", "direct", etc.).
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters passed to the action.
        output_summary:
          type: object
          additionalProperties: true
          description: Truncated or summarized action output for audit purposes.
        status:
          type: string
          description: Terminal invocation status ("success", "failed", etc.).
        retry_count:
          type: integer
          description: Number of retry attempts before this terminal status was reached.
        started_at:
          type: string
          format: date-time
          description: Timestamp when this invocation started.
        finished_at:
          type: string
          format: date-time
          description: Timestamp when this invocation completed.
        error_type:
          type: string
          description: Machine-readable error classification when status is "failed".
        error_message:
          type: string
          description: Human-readable error detail when status is "failed".
    ActionInvocationListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of action invocation telemetry records.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ActionInvocationEntry'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    EventCatalogResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - reserved_prefixes
      description: The triggerable event catalog available to a project.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventCatalogSource'
        reserved_prefixes:
          type: array
          description: Platform namespaces that are recognized but are not triggerable event
            sources. Authoring UIs use these to distinguish a recognized-but-unsupported matcher
            prefix from a wholly unknown one.
          items:
            $ref: '#/components/schemas/EventCatalogReservedPrefix'
    EventCatalogSource:
      type: object
      additionalProperties: false
      required:
      - prefix
      - kind
      - readiness
      - display_name
      - event_types
      description: One event source rooted at a top-level dotted prefix. Integration sources
        are open-set (any `<prefix>.<resource>.<event>` matches); `event_types` lists the
        currently-active, documented members.
      properties:
        prefix:
          type: string
          description: Top-level dotted segment that names the source (`table`, `github`).
        kind:
          type: string
          enum:
          - integration
          - capability
          description: '`integration` for provider event sources; `capability` for built-in
            Mobius platform event sources.'
        display_name:
          type: string
        description:
          type: string
        readiness:
          $ref: '#/components/schemas/CapabilityReadiness'
          description: Whether this source can start an automation now. `capability` sources
            are always `ready`. `integration` sources are `ready` only when the project has
            an active, usable connection for the provider.
        readiness_reason:
          $ref: '#/components/schemas/CapabilityReadinessReason'
          description: Why an `integration` source is `needs_setup`. Omitted when `readiness`
            is `ready` and for `capability` sources.
        event_types:
          type: array
          items:
            $ref: '#/components/schemas/EventCatalogEventType'
    EventCatalogEventType:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Dotted event-type identifier (`table.row.inserted`, `github.pull_request.opened`).
        description:
          type: string
    EventCatalogReservedPrefix:
      type: object
      additionalProperties: false
      required:
      - prefix
      - kind
      properties:
        prefix:
          type: string
        kind:
          type: string
          enum:
          - capability
          - utility
    ModelCatalogResponse:
      type: object
      additionalProperties: false
      description: Models a platform agent can be assigned in this project, grouped by available
        provider.
      required:
      - default_model
      - items
      properties:
        default_model:
          type: string
          description: Model id assigned when an agent specifies no model.
        items:
          type: array
          description: Available providers in display order. Providers with no configured
            credentials are omitted.
          items:
            $ref: '#/components/schemas/ModelProviderGroup'
    ModelProviderGroup:
      type: object
      additionalProperties: false
      required:
      - provider
      - display_name
      - source
      - models
      properties:
        provider:
          type: string
          description: Canonical provider id (`anthropic`, `openai`, `gemini`, `xai`).
        display_name:
          type: string
          description: Human-readable provider label.
        source:
          type: string
          enum:
          - byok
          - platform
          description: Where credentials come from — a project integration (`byok`) or a platform-managed
            key (`platform`).
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelOption'
    ModelOption:
      type: object
      additionalProperties: false
      required:
      - id
      - provider
      - label
      properties:
        id:
          type: string
          description: Bare model id assigned to an agent's `model` field.
        provider:
          type: string
          description: Canonical provider id this model belongs to.
        label:
          type: string
          description: Human-readable model label for UI.
        description:
          type: string
          description: Short guidance about when to use this model.
        recommended:
          type: boolean
          description: Whether this is the suggested default for its provider.
    EnvironmentProvider:
      type: string
      enum:
      - sprites
      - cloudflare_containers
      - worker
    ProvisionEnvironmentProvider:
      type: string
      description: 'Providers the control plane can provision on demand. Excludes `worker`:
        worker-provided environments are registered out-of-band via the attach endpoint and
        are never provisioned through create/acquire.'
      enum:
      - sprites
      - cloudflare_containers
    EnvironmentStatus:
      type: string
      description: Lifecycle status of an environment.
      enum:
      - provisioning
      - ready
      - running
      - retained
      - destroying
      - destroyed
      - failed
      - orphaned
    EnvironmentLifetime:
      type: string
      enum:
      - run
      - lease
      - explicit
      description: Lifecycle owner for automatic cleanup. `run` environments are destroyed
        during their owning run's Finalize phase; `lease` environments are reaped after lease
        expiry; `explicit` environments require an explicit destroy call.
    EnvironmentPurpose:
      type: string
      description: Declared purpose for an environment; used for routing and cleanup defaults.
      enum:
      - implementation
      - review
      - verification
      - preview
      - debug
      - worker
      - custom
    EnvironmentMode:
      type: string
      enum:
      - manual
      - run
      - agent
      - automation
      description: High-level ownership policy for how Mobius plans to use the environment.
        `run` is one-shot and auto-cleaned with a run; `agent` and `automation` are persistent
        environment policies; `manual` is operator controlled.
    EnvironmentBoundToType:
      type: string
      enum:
      - none
      - run
      - worker_session
      - service
      - agent
      - automation
      - manual
      description: Execution or lifecycle object this environment is bound to. Ownership remains
        in `owned_by`.
    EnvironmentRetentionPolicy:
      type: string
      description: Whether a finished environment is retained or destroyed, and under what
        outcome.
      enum:
      - manual
      - destroy_on_success
      - retain_on_failure
      - retain_always
    EnvironmentCleanupStatus:
      type: string
      enum:
      - none
      - pending
      - succeeded
      - failed
      - skipped
    EnvironmentLeaseStatus:
      type: string
      enum:
      - active
      - released
      - expired
      - revoked
    Environment:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - provider
      - status
      - environment_mode
      - lifetime
      - capabilities
      - spec_version
      - runtime
      - contains_secrets
      - cleanup_status
      - retention_policy
      - created_at
      - updated_at
      properties:
        id:
          type: string
        name:
          type: string
        scope:
          $ref: '#/components/schemas/ResourceScope'
        provider:
          $ref: '#/components/schemas/EnvironmentProvider'
        provider_resource_id:
          type: string
        provider_resource_name:
          type: string
        status:
          $ref: '#/components/schemas/EnvironmentStatus'
        environment_mode:
          $ref: '#/components/schemas/EnvironmentMode'
        lifetime:
          $ref: '#/components/schemas/EnvironmentLifetime'
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        owned_by:
          type: string
          description: Principal owner ID. For agent-started work, this is the agent's principal
            ID.
        bound_to_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        bound_to_id:
          type: string
          description: ID of the run, worker session, service, or manual association named
            by `bound_to_type`.
        created_by:
          type: string
          description: User ID of the principal who created this environment.
        updated_by:
          type: string
          description: User ID of the principal who last updated this environment.
        run_id:
          type: string
        job_id:
          type: string
        current_worker_session_id:
          type: string
        agent_id:
          type: string
        template_id:
          type: string
          enum:
          - coding-default
        capabilities:
          type: array
          maxItems: 50
          items:
            type: string
        spec_version:
          type: integer
          minimum: 1
        spec:
          type: object
          additionalProperties: true
        runtime:
          type: object
          additionalProperties: true
          description: Provider-observed runtime data. URLs live under runtime.urls, with
            runtime.urls.primary as the primary URL when present.
        tags:
          $ref: '#/components/schemas/TagMap'
        contains_secrets:
          type: boolean
        cleanup_status:
          $ref: '#/components/schemas/EnvironmentCleanupStatus'
        retention_policy:
          $ref: '#/components/schemas/EnvironmentRetentionPolicy'
        lease_expires_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        last_reconciled_at:
          type: string
          format: date-time
        last_error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        destroyed_at:
          type: string
          format: date-time
    EnvironmentLease:
      type: object
      additionalProperties: false
      required:
      - id
      - environment_id
      - status
      - acquired_at
      properties:
        id:
          type: string
        environment_id:
          type: string
        holder_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        holder_id:
          type: string
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        status:
          $ref: '#/components/schemas/EnvironmentLeaseStatus'
        acquired_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        released_at:
          type: string
          format: date-time
    EnvironmentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Environment'
        has_more:
          type: boolean
        next_cursor:
          type: string
    CreateEnvironmentRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Human-readable environment name.
        scope:
          $ref: '#/components/schemas/ResourceScope'
        provider:
          $ref: '#/components/schemas/ProvisionEnvironmentProvider'
        environment_mode:
          $ref: '#/components/schemas/EnvironmentMode'
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        owned_by:
          type: string
          description: Canonical user owner ID. Defaults to the authenticated user.
        bound_to_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        bound_to_id:
          type: string
          description: ID of the object the environment is bound to (paired with `bound_to_type`).
        lifetime:
          $ref: '#/components/schemas/EnvironmentLifetime'
        template_id:
          type: string
          enum:
          - coding-default
          description: V1 supports only coding-default.
        spec:
          type: object
          additionalProperties: true
        tags:
          $ref: '#/components/schemas/TagMap'
        retention_policy:
          $ref: '#/components/schemas/EnvironmentRetentionPolicy'
    AttachWorkerEnvironmentRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Stable per-workspace environment name; the idempotency key.
        environment_mode:
          $ref: '#/components/schemas/EnvironmentMode'
        bound_to_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        bound_to_id:
          type: string
          description: ID of the object the environment is bound to (paired with `bound_to_type`).
        workspace_path:
          type: string
          description: Worker-host path backing the environment (informational).
        tags:
          $ref: '#/components/schemas/TagMap'
    UpdateEnvironmentRequest:
      type: object
      additionalProperties: false
      properties:
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        retention_policy:
          $ref: '#/components/schemas/EnvironmentRetentionPolicy'
        scope:
          type: string
          allOf:
          - $ref: '#/components/schemas/ResourceScope'
          nullable: true
          description: Resource scope; send null to return to the project/default scope.
        owned_by:
          type: string
          nullable: true
          description: Canonical user owner ID. Send null to clear ownership.
        bound_to_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        bound_to_id:
          type: string
          nullable: true
          description: ID of the object the environment is bound to; send null to clear.
        tags:
          $ref: '#/components/schemas/TagMap'
    AcquireEnvironmentRequest:
      type: object
      additionalProperties: false
      properties:
        environment_id:
          type: string
          description: Existing environment ID to claim; omit to create a new environment.
        template_id:
          type: string
          enum:
          - coding-default
          description: V1 supports only coding-default.
        name:
          type: string
          description: Human-readable environment name (used when creating).
        scope:
          $ref: '#/components/schemas/ResourceScope'
        provider:
          $ref: '#/components/schemas/ProvisionEnvironmentProvider'
        environment_mode:
          $ref: '#/components/schemas/EnvironmentMode'
        purpose:
          $ref: '#/components/schemas/EnvironmentPurpose'
        holder_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        holder_id:
          type: string
          description: ID of the lease holder (paired with `holder_type`).
        owned_by:
          type: string
          description: Canonical user owner ID. Defaults to the authenticated user.
        bound_to_type:
          $ref: '#/components/schemas/EnvironmentBoundToType'
        bound_to_id:
          type: string
          description: ID of the object the environment is bound to (paired with `bound_to_type`).
        lifetime:
          $ref: '#/components/schemas/EnvironmentLifetime'
        spec:
          type: object
          additionalProperties: true
        tags:
          $ref: '#/components/schemas/TagMap'
        lease_ttl:
          type: string
          description: Go duration string, for example 30m or 2h.
    EnvironmentAcquireResult:
      type: object
      additionalProperties: false
      required:
      - environment
      - lease
      properties:
        environment:
          $ref: '#/components/schemas/Environment'
        lease:
          $ref: '#/components/schemas/EnvironmentLease'
    ExecEnvironmentRequest:
      type: object
      additionalProperties: false
      required:
      - command
      properties:
        command:
          type: array
          minItems: 1
          items:
            type: string
          description: Command and arguments to run, as an argv array.
        dir:
          type: string
          description: Working directory for the command (defaults to the workspace root).
        env:
          type: array
          items:
            type: string
          description: Extra environment variables as `KEY=VALUE` strings.
        stdin:
          type: string
          description: Standard input to pipe to the command.
    EnvironmentExecResult:
      type: object
      additionalProperties: false
      required:
      - stdout
      - stderr
      - exit_code
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer
    WriteEnvironmentFileRequest:
      type: object
      additionalProperties: false
      required:
      - path
      - content
      properties:
        path:
          type: string
          description: Destination file path inside the environment.
        content:
          type: string
          description: File content to write.
    StartEnvironmentWorkerRequest:
      type: object
      additionalProperties: false
      properties:
        api_url:
          type: string
        managed_runtime:
          type: boolean
          description: Install/refresh the managed Mobius runtime bundle before starting the
            worker. Defaults to true unless `command` is supplied.
        runtime_version:
          type: string
          description: Runtime bundle version to install. Defaults to the server-configured
            runtime version.
        worker_name:
          type: string
          description: Friendly worker session name. Defaults to the environment name.
        queues:
          type: array
          items:
            type: string
          description: Job queues the worker should claim from (defaults to all).
        action_names:
          type: array
          items:
            type: string
          description: Restrict the worker to these action names.
        concurrency:
          type: integer
          minimum: 1
          description: Maximum number of jobs to run concurrently.
        command:
          type: array
          items:
            type: string
          description: Override the worker command and arguments, as an argv array.
        dir:
          type: string
          description: Working directory for the worker process.
    EnvironmentStartWorkerResult:
      type: object
      additionalProperties: false
      required:
      - environment
      - api_key_id
      - key_expires_at
      - managed_runtime
      - runtime_version
      - worker_log_path
      - stdout
      - stderr
      - exit_code
      properties:
        environment:
          $ref: '#/components/schemas/Environment'
        api_key_id:
          type: string
        key_expires_at:
          type: string
          format: date-time
        managed_runtime:
          type: boolean
        runtime_version:
          type: string
        runtime_installed_at:
          type: string
          format: date-time
        worker_log_path:
          type: string
        worker_session_id:
          type: string
        stdout:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer
    EnvironmentWorkerLogsResponse:
      type: object
      additionalProperties: false
      required:
      - environment_id
      - log_name
      - log_path
      - tail
      - content
      - exit_code
      properties:
        environment_id:
          type: string
        log_name:
          type: string
        log_path:
          type: string
        tail:
          type: integer
        content:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer
    CreateEnvironmentGitCredentialRequest:
      type: object
      additionalProperties: false
      required:
      - repo_full_name
      properties:
        repo_full_name:
          type: string
          description: GitHub `owner/name` repository full name.
        operation:
          type: string
          enum:
          - clone
          - fetch
          - push
          default: clone
          description: Git operation the minted credential will authorize.
    EnvironmentGitCredentialResult:
      type: object
      additionalProperties: false
      required:
      - host
      - username
      - token
      - expires_at
      - repo_full_name
      properties:
        host:
          type: string
        username:
          type: string
        token:
          type: string
          description: One-time GitHub installation token. Do not log or persist.
        expires_at:
          type: string
          format: date-time
        repo_full_name:
          type: string
    WorkerSession:
      type: object
      additionalProperties: false
      description: Recently observed worker process for a project. Use sessions to see which
        machines, users, API clients, or agents are polling for work, what their configured
        concurrency is, and whether they appear stale.
      required:
      - id
      - worker_instance_id
      - concurrency_limit
      - instance_status
      - stale
      - busy_job_count
      - current_jobs
      properties:
        id:
          type: string
          description: Server-assigned session row ID (`wsess_…`). Generated by the control
            plane on first registration; opaque to workers and stable across refreshes for
            a given live row.
        worker_instance_id:
          type: string
          description: Caller-configured stable identifier for the worker process. The SDK
            auto-detects this from the runtime platform (Cloud Run revision, Kubernetes pod,
            Fly machine, Railway replica, Render instance) and falls back to a UUID. Unique
            within `(org_id, project_id)`.
        concurrency_limit:
          type: integer
          minimum: 1
          description: Configured maximum number of jobs this worker process will hold in
            flight simultaneously. Reported by the SDK on register; rendered as a saturation
            bar in the admin UI (`busy_job_count / concurrency_limit`).
        name:
          type: string
          description: Optional human-readable name supplied in the claim request.
        version:
          type: string
          description: Optional version string supplied in the claim request.
        last_seen_at:
          type: string
          format: date-time
          description: Timestamp of this session's most recent register, claim, or job heartbeat
            activity. Used to compute `stale`.
        last_activity_at:
          type: string
          format: date-time
          description: Most recent observed activity for this session, derived from `last_seen_at`,
            currently claimed job heartbeats, and the latest terminal job update.
        capabilities:
          type: array
          items:
            type: string
          description: Coarse capability labels advertised by the worker for routing and builder
            eligibility.
        queues:
          type: array
          items:
            type: string
          description: Queue names this worker can claim. Empty or absent means the default
            project queue set.
        action_names:
          type: array
          items:
            type: string
          description: Action names this worker can execute. Empty or absent means the worker
            has not advertised a narrowed action set.
        models:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSocketModelCapability'
          description: Provider/model pairs this worker can generate with.
        principal_id:
          type: string
          description: Principal this session authenticated as on register/heartbeat. A machine
            principal (kind `system`/`service`/`agent`) for deployed workers, or a human's
            principal when polling via the CLI. Inspect the embedded `principal.kind` to distinguish.
        principal:
          $ref: '#/components/schemas/User'
          description: Embedded profile for `principal_id` — the authenticating principal,
            human or machine. Absent only when the principal record is unavailable.
        api_key_id:
          type: string
          description: ID of the specific API key this session presented on its most recent
            register/heartbeat. Only set for API-key (machine principal) sessions; changes
            across credential rotations. Use together with `principal_id` to see rotation
            progress across a fleet.
        agent_id:
          type: string
          description: Agent this session represents, when the polling process declared itself
            as a registered agent (via `agent_id` on the claim request or via inference from
            its machine principal). Absent for ad-hoc worker processes that are not tied to
            a declared agent.
        environment_id:
          type: string
          description: Managed environment this worker is running inside, when Mobius started
            it in a Sprite or another managed execution environment.
        instance_status:
          type: string
          enum:
          - active
          - stale
          - draining
          description: |-
            High-level lifecycle indicator for the row.
            * `active` — recent heartbeat, healthy.
            * `stale` — no heartbeat within the staleness window; row
            retained for display until the 30-day delete floor.
            * `draining` — explicit graceful-shutdown signal from the
            SDK (reserved for future SDK releases).

            Conflicts (a different process tried to register this `worker_instance_id` within the takeover window and was rejected) are surfaced inline as a 409 from the worker protocol; the previous registration's row remains `active` and never appears as a separate "conflicting" entry.
        stale:
          type: boolean
          description: True when `last_seen_at` is older than 2 minutes or absent. Computed
            at read time, not stored. Equivalent to `instance_status == "stale"`; both are
            returned for backward compatibility while clients update.
        busy_job_count:
          type: integer
          minimum: 0
          description: Number of jobs this worker session is currently holding.
        current_jobs:
          type: array
          description: Currently claimed jobs held by this worker session.
          items:
            $ref: '#/components/schemas/WorkerSessionJobRef'
        last_job:
          $ref: '#/components/schemas/WorkerSessionJobRef'
          description: Most recent completed or failed job this worker session handled.
    WorkerSessionJobRef:
      type: object
      additionalProperties: false
      required:
      - id
      - run_id
      - step_name
      - action
      - status
      - updated_at
      properties:
        id:
          type: string
          description: Job ID.
        run_id:
          type: string
          description: Automation run that owns the job.
        step_name:
          type: string
          description: Automation step name.
        action:
          type: string
          description: Action executed by the worker.
        status:
          type: string
          enum:
          - pending
          - claimed
          - completed
          - failed
          - cancelled
          description: Current job lifecycle state.
        claimed_at:
          type: string
          format: date-time
          description: Timestamp when the worker claimed the job.
        heartbeat_at:
          type: string
          format: date-time
          description: Most recent heartbeat timestamp while the job is claimed.
        updated_at:
          type: string
          format: date-time
          description: Last job update timestamp.
    WorkerSessionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - totals
      properties:
        items:
          type: array
          description: The list of recently seen worker sessions.
          items:
            $ref: '#/components/schemas/WorkerSession'
        totals:
          $ref: '#/components/schemas/WorkerSessionTotals'
          description: Aggregate counts across `items`, computed by the server so UIs do not
            need to re-derive them on every render.
    WorkerSessionTotals:
      type: object
      additionalProperties: false
      required:
      - active_instances
      - slots
      - busy
      - stale
      description: Project-wide rollup of the rendered worker sessions. Useful for the page
        header — "3 active instances · 18 slots · 7 busy · 1 stale" — without iterating items
        client-side.
      properties:
        active_instances:
          type: integer
          minimum: 0
          description: Count of `instance_status == "active"` rows.
        slots:
          type: integer
          minimum: 0
          description: Sum of `concurrency_limit` across active rows.
        busy:
          type: integer
          minimum: 0
          description: Sum of `busy_job_count` across active rows.
        stale:
          type: integer
          minimum: 0
          description: Count of `instance_status == "stale"` rows.
    WorkerSocketModelCapability:
      type: object
      additionalProperties: false
      required:
      - provider
      - model
      properties:
        provider:
          type: string
          description: LLM provider identifier, such as `ollama`.
        model:
          type: string
          description: Provider-local model name.
    WorkerSocketFrame:
      oneOf:
      - $ref: '#/components/schemas/WorkerSocketRegisterFrame'
      - $ref: '#/components/schemas/WorkerSocketRegisteredFrame'
      - $ref: '#/components/schemas/WorkerSocketReadyFrame'
      - $ref: '#/components/schemas/WorkerSocketJobsClaimFrame'
      - $ref: '#/components/schemas/WorkerSocketJobsClaimedFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkAvailableFrame'
      - $ref: '#/components/schemas/WorkerSocketJobHeartbeatFrame'
      - $ref: '#/components/schemas/WorkerSocketJobHeartbeatAckFrame'
      - $ref: '#/components/schemas/WorkerSocketJobReportFrame'
      - $ref: '#/components/schemas/WorkerSocketJobReportAckFrame'
      - $ref: '#/components/schemas/WorkerSocketGenerationDeltaFrame'
      - $ref: '#/components/schemas/WorkerSocketGenerationDeltaAckFrame'
      - $ref: '#/components/schemas/WorkerSocketJobCancelFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkerDrainingFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkerDrainingAckFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkerDrainFrame'
      - $ref: '#/components/schemas/WorkerSocketKeepaliveFrame'
      - $ref: '#/components/schemas/WorkerSocketErrorFrame'
      description: Typed JSON frame exchanged over `/workers/socket`. WebSocket traffic is
        not ordinary request/response HTTP, but the frame schemas are included in the public
        OpenAPI contract so SDKs can share a wire format.
    WorkerSocketMessageID:
      type: string
      description: Client-supplied correlation and short-window deduplication key. When present
        on a client frame, the server echoes it on the response frame.
    WorkerSocketLeaseConfig:
      type: object
      additionalProperties: false
      required:
      - lease_duration_seconds
      - heartbeat_cadence_seconds
      properties:
        lease_duration_seconds:
          type: integer
          minimum: 1
          description: Per-job lease duration stamped on claims.
        heartbeat_cadence_seconds:
          type: integer
          minimum: 1
          description: Recommended heartbeat cadence while a job is running.
    WorkerSocketCancelDirective:
      type: object
      additionalProperties: false
      required:
      - job_id
      properties:
        job_id:
          type: string
        reason:
          type: string
        requested_at:
          type: string
          format: date-time
    WorkerSocketProtocolError:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Stable protocol error code. `worker_instance_conflict` is emitted when
            a duplicate live `worker_instance_id` registers and should be treated as a terminal
            worker startup failure.
        message:
          type: string
    WorkerSocketRegisterFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - worker_instance_id
      properties:
        type:
          type: string
          enum:
          - worker.register
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        worker_instance_id:
          type: string
          description: Stable process identity reported by the worker SDK.
        worker_session_token:
          type: string
          description: Previously issued session token used on reconnect; omitted on first
            register.
        concurrency_limit:
          type: integer
          minimum: 1
