        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createArtifact
      tags:
      - artifacts
      summary: Upload an artifact
      description: Accepts a multipart file upload, streams the bytes through Mobius to the
        configured artifact storage backend, computes the authoritative SHA-256 checksum,
        and returns the committed artifact metadata. New artifacts are private to the authenticated
        user's artifact space unless `visibility=shared` is supplied.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateArtifactRequest'
            encoding:
              tags:
                contentType: application/json
      responses:
        '201':
          description: Artifact uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
