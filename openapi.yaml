    ColumnType:
      type: string
      enum:
      - string
      - number
      - boolean
      - date
      - object
      - array
      - any
    ColumnDef:
      type: object
      additionalProperties: false
      required:
      - name
      - type
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/ColumnType'
        required:
