            type: string
    SkillAssignmentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Skill assignments for this agent, in position order.
          items:
            $ref: '#/components/schemas/SkillAssignment'
    SkillManifestEntry:
      type: object
      additionalProperties: false
      description: Skill metadata included in a resolved agent tool manifest. Full instructions
        are loaded at runtime through the invoke_skill tool.
      required:
      - id
      - name
      - active
      properties:
        id:
          type: string
          description: Skill ID this manifest entry resolved to.
        name:
          type: string
          description: Display name of the skill.
        description:
          type: string
          description: Markdown description of the skill's purpose.
        active:
          type: boolean
          description: Whether this skill is currently active in the resolved manifest.
        missing_required:
          type: array
          description: Tool selectors the skill requires but that are not available to the
