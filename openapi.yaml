        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelMessageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteMessage
      tags:
      - messages
      summary: Delete a channel message
      description: Soft-deletes one of the caller's own channel messages. The message row
        remains as a tombstone so threads, reactions history, and read cursors keep a stable
        parent, but response payloads no longer expose the body, attachments, blocks, or metadata.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/message_id'
      responses:
        '200':
          description: Deleted message tombstone.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessageTombstone'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/messages/{message_id}/reactions:
    post:
      operationId: addMessageReaction
      tags:
      - messages
      summary: Add a reaction to a channel message
      description: 'Adds the authenticated user''s emoji reaction to a message. The operation
        is idempotent for `(message_id, emoji, user)` and returns the existing reaction when
        already present. Reaction rows are also the substrate for inline approval cards: when
        the message references an approval interaction and the emoji maps to an outcome, permitted
        responders resolve the interaction through the same reaction.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/message_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddChannelMessageReactionRequest'
      responses:
        '200':
          description: Existing reaction returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessageReaction'
        '201':
          description: Reaction created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessageReaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteMessageReaction
      tags:
      - messages
      summary: Remove a reaction from a channel message
      description: Removes the authenticated user's reaction for the supplied emoji.
