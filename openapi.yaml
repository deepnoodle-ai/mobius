      - endpoint_kind
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this action.
        name:
          type: string
          description: Stable identifier used in loop definitions.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          allOf:
          - $ref: '#/components/schemas/ActionEndpointKind'
          description: Backing kind of this project-owned action. `http` actions POST to an
            endpoint URL. `worker` actions are dispatched through jobs to connected workers
            that advertise this registered name.
        endpoint_url:
          type: string
          format: uri
          description: 'HTTP/HTTPS URL Mobius POSTs to when invoking this action. Populated
            for endpoint_kind: http only.'
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotations'
          description: Safe-use hints returned for this action.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Free-form labels attached to this action.
        secret_ref:
          type: string
          description: Project secret reference that stores this action's signing key. Present
