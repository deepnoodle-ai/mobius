      - name: until
        in: query
        schema:
          type: string
          format: date-time
        description: Include events received before this timestamp.
      - name: cursor
        in: query
        schema:
          type: string
        description: Opaque pagination cursor returned by the previous page.
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
