        created_at:
          type: string
          format: date-time
          description: Timestamp when this action was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this action was last updated.
      example:
        id: act_8m4x9q2v7p5n3r6t
        name: review-pr
        title: Review PR
        description: Review a pull request and return findings.
        endpoint_kind: http
        invocation_format: signed_context_v1
        endpoint_url: https://hooks.example.com/mobius/review-pr
        input_schema:
          type: object
          required:
          - pull_request_url
          properties:
            pull_request_url:
              type: string
        output_schema:
          type: object
          properties:
            findings:
              type: array
              items:
                type: string
        annotations:
          idempotent: true
          destructive: false
          read_only: true
        tags:
          owner: product
        created_at: '2026-06-15T14:30:00Z'
        updated_at: '2026-06-15T14:30:00Z'
    RotateSecretResult:
      type: object
      additionalProperties: false
      description: New signing key material returned after rotating a signing secret.
      required:
      - secret_ref
      - secret_version
      - signing_secret
      properties:
        secret_ref:
          type: string
          description: Project secret reference that now stores the action signing key.
        secret_version:
          type: integer
          format: int64
          description: New project-secret version number.
        signing_secret:
          type: string
          description: Base64-encoded 32-byte signing key. Store it immediately — this is
