openapi: 3.0.3
info:
  title: mobius API
  version: 0.1.0
  description: Mobius is a work coordination platform for mixed teams of humans, systems,
    and AI agents
servers:
- url: https://api.mobiusops.ai
  description: Production
- url: http://localhost:8080
  description: Local development
security:
- BearerAuth: []
tags:
- name: channels
  x-displayName: Channels
  description: 'Project channels: container records, membership, archive state.'
- name: messages
  x-displayName: Messages
  description: 'Channel messages: send, list, get, update, and mark-read.'
- name: audit-logs
  x-displayName: Audit Logs
  description: Immutable audit records for security-sensitive project and organization activity.
- name: workflows
  x-displayName: Workflows
  description: Versioned workflow definitions and their executable specifications.
- name: runs
  x-displayName: Runs
  description: Workflow run lifecycle, events, signals, jobs, and runtime inspection.
- name: events
  x-displayName: Events
  description: Events API operations.
- name: actions
  x-displayName: Actions
  description: Project and catalog actions invoked by workflow steps.
- name: environments
  x-displayName: Environments
  description: Environments API operations.
- name: secrets
  x-displayName: Secrets
  description: Secrets API operations.
- name: references
  x-displayName: References
  description: References API operations.
- name: jobs
  x-displayName: Jobs
  description: Worker protocol endpoints for claiming, heartbeating, completing, and instrumenting
    step jobs.
- name: triggers
  x-displayName: Triggers
  description: Automated workflow starts from schedules, inbound webhooks, and platform events.
- name: worker-sessions
  x-displayName: Worker Sessions
  description: Recently seen worker sessions and their advertised capabilities.
- name: projects
  x-displayName: Projects
  description: Project records, membership, defaults, and project-scoped configuration.
- name: generate
  x-displayName: Generate
  description: Generate API operations.
- name: webhooks
  x-displayName: Webhooks
  description: Outgoing webhook subscriptions, tests, and delivery history.
- name: integration-providers
  x-displayName: Integration Providers
  description: Integration Providers API operations.
- name: metrics
  x-displayName: Metrics
  description: Project operational metrics for workflow and worker activity.
- name: interactions
  x-displayName: Interactions
  description: Human-in-the-loop requests, responses, and group routing.
- name: notification-preferences
  x-displayName: Notification Preferences
  description: Per-actor delivery defaults applied when an interaction does not override them
    (PRD 077).
- name: groups
  x-displayName: Groups
  description: Project groups, membership, and group interaction routing policy.
- name: agents
  x-displayName: Agents
  description: Agent identities, sessions, presence, and lifecycle administration.
- name: agent-capabilities
  x-displayName: Agent Capabilities
  description: Agent Capabilities API operations.
- name: actor-state
  x-displayName: Actor State
  description: Actor State API operations.
- name: presence
  x-displayName: Presence
  description: Presence API operations.
- name: team
  x-displayName: Team
  description: Team API operations.
- name: spans
  x-displayName: Spans
  description: Spans API operations.
- name: logs
  x-displayName: Logs
  description: Logs API operations.
- name: tables
  x-displayName: Tables
  description: Tables API operations.
- name: artifacts
  x-displayName: Artifacts
  description: Artifacts API operations.
- name: observables
  x-displayName: Observables
  description: Observables API operations.
paths:
  /v1/projects/{project}/channels:
    post:
      operationId: createChannel
      tags:
      - channels
      summary: Create a channel
      description: Creates a new channel or DM thread. The channel `name` must be URL-safe
        and unique within the project — it is immutable after creation. The creator is automatically
        added as an admin member. Supply `member_ids` to seed initial membership atomically.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      operationId: listChannels
      tags:
      - channels
      summary: List channels
      description: Returns channels in the project, optionally filtered by kind or visibility.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: kind
        in: query
        schema:
          type: string
          enum:
          - dm
          - channel
        description: Filter by channel kind.
      - name: private
        in: query
        schema:
          type: boolean
        description: Filter by private flag.
      - $ref: '#/components/parameters/TagFilterParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/projects/{project}/channels/{id}:
    get:
      operationId: getChannel
      tags:
      - channels
      summary: Get a channel
      description: Returns channel metadata for the given ID. Membership and messages are
        exposed through their own endpoints so callers can fetch only the detail they need.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateChannel
      tags:
      - channels
      summary: Update a channel
      description: Updates `display_name`, `topic`, `private`, or `archived_at`. The `name`
        (handle) is immutable and cannot be changed after creation.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteChannel
      tags:
      - channels
      summary: Delete a channel
      description: Hard-deletes the channel and its message history.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/members:
    get:
      operationId: listChannelMembers
      tags:
      - channels
      summary: List channel members
      description: Returns the current live membership of the channel.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMemberListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: addChannelMember
      tags:
      - channels
      summary: Add a member to a channel
      description: Adds a user or agent to the channel. Returns 409 if already a member.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddChannelMemberRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMember'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/channels/{id}/members/{member_id}:
    delete:
      operationId: removeChannelMember
      tags:
      - channels
      summary: Remove a member from a channel
      description: Removes a user or agent from the channel's live membership. Existing messages
        remain attributed to the removed member, and removing a member does not revoke project-level
        access outside this channel.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/member_id'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/interactions:
    get:
      operationId: listChannelInteractions
      tags:
      - channels
      summary: List channel interaction links
      description: Returns interactions associated with this channel. Purpose links mean the
        channel exists to resolve those interactions and can drive channel completion behavior.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: relation
        in: query
        schema:
          type: string
          enum:
          - purpose
          - context
          - followup
        description: Filter by association relation.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelInteractionLinkListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: associateChannelInteraction
      tags:
      - channels
      summary: Associate an interaction with a channel
      description: Associates an existing same-project interaction with the channel. When
        `relation` is `purpose`, the interaction participates in the channel's purpose completion
        rule.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssociateChannelInteractionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelInteractionLink'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/channels/{id}/interactions/{interaction_id}:
    delete:
      operationId: removeChannelInteraction
      tags:
      - channels
      summary: Remove a channel interaction association
      description: Removes an interaction association from a channel.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: interaction_id
        in: path
        required: true
        schema:
          type: string
        description: Interaction ID to unlink.
      - name: relation
        in: query
        schema:
          type: string
          enum:
          - purpose
          - context
          - followup
          default: purpose
        description: Relation to remove. Defaults to `purpose`.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/messages:
    get:
      operationId: listMessages
      tags:
      - messages
      summary: List messages in a channel
      description: |-
        Returns messages in reverse chronological order (newest first). Use `reply_to` to fetch a thread. Use `cursor` for pagination.

        Agent loop helpers (PRD 048 §6):
        - `since=<msg-id>` returns messages strictly newer than the given id
        in chronological order (oldest first), so an agent can stream them
        forward through its turn handler.
        - `unread=true` is shorthand for `since=<my last_read_message_id>`.
        Mutually exclusive with `since`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: sender_id
        in: query
        schema:
          type: string
        description: Filter by sender principal ID — a user ID (for `sender_type=member`),
          agent ID (for `sender_type=agent`), or service account ID (for `sender_type=service_account`).
      - name: reply_to
        in: query
        schema:
          type: string
        description: Return only replies to this message ID (thread view).
      - name: pinned
        in: query
        schema:
          type: boolean
        description: Filter by pinned status.
      - name: since
        in: query
        schema:
          type: string
        description: |-
          Return messages strictly newer than this cursor, in chronological
          order. Accepts either:
          - a message ID — strictly newer than that message in
          `(created_at, id)` order, or
          - an RFC3339 timestamp — strictly newer than that instant.
          Useful for agent loops that have already processed everything up
          to and including the cursor.
      - name: unread
        in: query
        schema:
          type: boolean
        description: 'When `true`, equivalent to passing `since=<my last_read_message_id>`.
          Mutually exclusive with `since`. Requires a member-bound credential: callers without
          a user identity get 400, and authenticated non-members get 403.'
      - name: entity_type
        in: query
        schema:
          $ref: '#/components/schemas/EntityReferenceType'
        description: Return only messages that reference this entity type.
      - name: entity_id
        in: query
        schema:
          type: string
        description: Return only messages that reference this entity ID.
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessageListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: sendMessage
      tags:
      - messages
      summary: Send a message to a channel
      description: |-
        Posts a message to the channel. Sender identity is determined entirely by the authenticated credential — there is no field to override it.

        - When the credential is an API key whose service account backs an
        agent (1:1 invariant), the message is attributed to that agent.
        - When the credential is an API key whose service account backs no
        agent, the message is attributed to that service account.
        - When the credential is a user credential, the message is attributed
        to that user.

        Content is Markdown. Use `reply_to` for threading.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendChannelMessageRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/references:
    post:
      operationId: shareChannelEntity
      tags:
      - channels
      summary: Share an entity in a channel
      description: Posts a channel card for a canonical Mobius entity. The message stores
        a typed reference edge so humans and agents can discover the channel activity around
        a run, interaction, job, group, or other entity without scraping Markdown.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareChannelEntityRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/interactions/{interaction_id}/claim:
    post:
      operationId: claimChannelInteraction
      tags:
      - channels
      summary: Claim an interaction from a channel
      description: Claims a pending first-responder group interaction from the chat surface
        and appends a channel activity message that references the interaction.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: interaction_id
        in: path
        required: true
        schema:
          type: string
        description: Interaction to claim.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelInteractionActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/interactions/{interaction_id}/release:
    post:
      operationId: releaseChannelInteraction
      tags:
      - channels
      summary: Release an interaction claim from a channel
      description: Releases the authenticated member's first-responder interaction claim from
        the chat surface and appends channel-visible activity.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: interaction_id
        in: path
        required: true
        schema:
          type: string
        description: Interaction whose claim should be released.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelInteractionActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/interactions/{interaction_id}/respond:
    post:
      operationId: respondToChannelInteraction
      tags:
      - channels
      summary: Respond to an interaction from a channel
      description: Submits a canonical interaction response from the chat surface and appends
        a channel-visible activity message so human and agent channel participants can see
        that the interaction advanced.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: interaction_id
        in: path
        required: true
        schema:
          type: string
        description: Interaction to answer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelInteractionRespondRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelInteractionActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/channels/{id}/messages/{message_id}:
    get:
      operationId: getMessage
      tags:
      - messages
      summary: Get a channel message
      description: Returns a single message by ID, including threading, pin, edit, and sender
        attribution metadata. Use the list endpoint to page through a channel or thread.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/message_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateMessage
      tags:
      - messages
      summary: Update a channel message
      description: Updates content, metadata, or pinned state of a message. Sets `edited_at`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/message_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelMessageRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/channels/{id}/read:
    post:
      operationId: markMessagesRead
      tags:
      - messages
      summary: Mark messages in a channel as read
      description: |-
        Advances the caller's `last_read_message_id` for this channel. Used by agent loops to record progress: stream a batch with `?unread=true`, process each message, then call this endpoint with the latest id to acknowledge (PRD 048 §6).

        - When `up_to_message_id` is set, the read cursor advances to that
        id (the message must belong to this channel).
        - When the body is empty or `up_to_message_id` is omitted, the read
        cursor advances to the channel's latest message at call time.

        The caller must be a member of the channel. Non-members get 403.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkChannelMessagesReadRequest'
      responses:
        '204':
          description: Read cursor updated.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/audit-logs:
    get:
      operationId: listAuditLogs
      tags:
      - audit-logs
      summary: List audit log entries
      description: |-
        Returns an immutable, append-only log of create/update/delete/archive/restore actions performed against org resources. Entries record both the durable actor identity (service account or user) and the credential used, enabling attribution even when keys are later revoked.

        Combine `actor_id` + `resource_type` to audit a specific identity's writes to a resource class. Use `created_after` / `created_before` for time-bounded compliance exports.
      parameters:
      - name: resource_type
        in: query
        schema:
          type: string
        description: Filter by resource type
      - name: project_id
        in: query
        schema:
          type: string
        description: Filter by project ID
      - name: resource_id
        in: query
        schema:
          type: string
        description: Filter by resource ID
      - name: user_id
        in: query
        schema:
          type: string
        description: Filter by user ID
      - name: actor_type
        in: query
        schema:
          type: string
        description: Filter by actor type
      - name: actor_id
        in: query
        schema:
          type: string
        description: Filter by actor ID
      - name: action
        in: query
        schema:
          type: string
        description: Filter by action (create, update, delete, archive, restore)
      - name: created_after
        in: query
        schema:
          type: string
          format: date-time
        description: Filter to entries created after this timestamp
      - name: created_before
        in: query
        schema:
          type: string
          format: date-time
        description: Filter to entries created before this timestamp
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/projects/{project}/workflows:
    get:
      operationId: listWorkflows
      tags:
      - workflows
      summary: List workflow definitions
      description: Returns workflow definition summaries, newest-first. List responses omit
        the executable `spec`; use `getWorkflow` to fetch the full definition with its current
        spec.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/TagFilterParam'
      - name: cursor
        in: query
        description: Opaque pagination cursor returned from the previous response.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of results to return per page.
        schema:
          type: integer
          minimum: 1
          maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createWorkflow
      tags:
      - workflows
      summary: Create a workflow definition
      description: Creates a workflow definition with an initial version (version 1). The
        `handle` is auto-derived from `name` if omitted and must be unique within the project.
        Every call to `updateWorkflow` with a new `spec` creates a new version; version numbers
        are monotonically increasing.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRequest'
            example:
              name: document-review
              handle: document-review
              description: Summarize a document and request approval before publishing.
              published_as_tool: true
              spec:
                name: document-review
                inputs:
                - name: document_id
                  type: string
                  description: Document to review.
                steps:
                - name: summarize
                  action: summarize-document
                  parameters:
                    document_id: ${inputs.document_id}
                  next:
                  - step: approve
                - name: approve
                  interaction:
                    type: approval
                    message: Approve publishing this summary?
                    timeout: 24h
                    target:
                      type: group
                      id: approvers
                    spec:
                      mode: confirm
                      default_confirmed: false
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/workflows/{id}:
    get:
      operationId: getWorkflow
      tags:
      - workflows
      summary: Get a workflow definition
      description: Returns a workflow definition with its latest executable spec. Use the
        version endpoints when you need a historical spec instead of the current latest version.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinition'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateWorkflow
      tags:
      - workflows
      summary: Update a workflow definition
      description: Updating `spec` atomically creates a new immutable version (version N+1)
        and advances `latest_version`. Runs always execute the version they were started with;
        updating the definition does not affect running instances. Updating `name`, `description`,
        or `published_as_tool` without a `spec` does not create a new version.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkflowRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: deleteWorkflow
      tags:
      - workflows
      summary: Delete a workflow definition
      description: Hard-deletes the definition and all its versions. In-flight runs are not
        affected.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/workflows/{id}/versions:
    get:
      operationId: listWorkflowVersions
      tags:
      - workflows
      summary: List versions of a workflow definition
      description: Returns version summaries, newest-first. List responses omit the executable
        `spec`; fetch a single version via `getWorkflowVersion` to get the full spec for that
        version.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowVersionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/workflows/{id}/versions/{version}:
    get:
      operationId: getWorkflowVersion
      tags:
      - workflows
      summary: Get a specific version of a workflow definition
      description: Returns a single workflow version, including its full executable `spec`.
        `version` is the monotonically increasing version number (1-based).
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: version
        in: path
        required: true
        description: Version number (1-based) within this workflow definition.
        schema:
          type: integer
          minimum: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowVersion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/workflows/{id}/runs:
    get:
      operationId: listWorkflowRuns
      tags:
      - runs
      summary: List runs for a workflow definition
      description: Returns runs for a specific workflow definition, newest first. All statuses
        are included; this endpoint does not currently accept status or range filters.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: startWorkflowRun
      tags:
      - runs
      summary: Start a new workflow run against a saved definition
      description: 'Enqueues a run using the latest version of the workflow definition identified
        by the path parameter. This is the path-bound equivalent of `POST /v1/projects/{project}/runs`
        with `mode: saved` and `definition_id` set to this workflow''s ID.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartBoundRunRequest'
      responses:
        '202':
          description: Accepted. When `external_id` is set and matches an active run, the
            existing run is returned idempotently with this same status code instead of creating
            a new one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |-
            Conflict. Possible codes:

            - `project_archived` — the target project is archived. Restore
            the project before starting new runs; in-flight runs continue
            regardless.
            - `external_id_conflict` — `external_id` already belongs to a
            terminal run in this project. The response `details` carry
            `existing_run_id` (string), `status` (`completed` | `failed`),
            and the offending `external_id`. Fetch the prior run for its
            result, or POST a new attempt with a different external_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project}/runs:
    post:
      operationId: startRun
      tags:
      - runs
      summary: Start a new workflow run
      description: |-
        Starts a workflow run. The request body is a discriminated union over `mode`:

        - `mode: saved` — run a previously-created workflow definition. Set
        `definition_id` to the definition to run.
        - `mode: inline` — run an ephemeral workflow from an inline `spec`.
        No `WorkflowDefinition` is created; the returned run has
        `ephemeral: true` and omits `definition_id` / `definition_version`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartRunRequest'
            examples:
              saved:
                summary: Run a saved workflow
                value:
                  mode: saved
                  definition_id: wf_01hw1p4a5b6c7d8e9f0g1h2j3k
                  queue: default
                  inputs:
                    document_id: doc_01hw1m9z8y7x6w5v4u3t2s1r0q
                  metadata:
                    source: api
                    customer: acme
                  external_id: review-2026-04-24-001
              inline:
                summary: Run an inline workflow
                value:
                  mode: inline
                  queue: default
                  inputs:
                    document_id: doc_01hw1m9z8y7x6w5v4u3t2s1r0q
                  spec:
                    name: one-off-document-review
                    steps:
                    - name: summarize
                      action: summarize-document
                      parameters:
                        document_id: ${inputs.document_id}
      responses:
        '202':
          description: Accepted. When `external_id` is set and matches an active run in this
            project, the existing run is returned idempotently with this same status code
            instead of creating a new one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRun'
              example:
                id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                queue: default
                definition_id: wf_01hw1p4a5b6c7d8e9f0g1h2j3k
                definition_version: 3
                ephemeral: false
                workflow_name: document-review
                status: active
                path_counts:
                  total: 1
                  active: 1
                  working: 1
                  waiting: 0
                  completed: 0
                  failed: 0
                job_counts:
                  ready: 1
                  scheduled: 0
                  claimed: 0
                step_counts:
                  pending: 1
                  running: 0
                  completed: 0
                  failed: 0
                  skipped: 0
                  cancelled: 0
                wait_summary:
                  waiting_paths: 0
                  kind_counts: {}
                  next_wake_at: null
                  waiting_on_signal_names: []
                  interaction_ids: []
                errors: []
                attempt: 1
                inputs:
                  document_id: doc_01hw1m9z8y7x6w5v4u3t2s1r0q
                metadata:
                  source: api
                  customer: acme
                actor_type: api_key
                actor_id: key_01hw1q2r3s4t5u6v7w8x9y0z1a
                source_type: api
                source_id: review-service
                source_label: review-service
                external_id: review-2026-04-24-001
                created_at: '2026-04-24T14:30:00Z'
                updated_at: '2026-04-24T14:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |-
            Conflict. Possible codes:

            - `project_archived` — the target project is archived. Restore
            the project before starting new runs; in-flight runs continue
            regardless.
            - `external_id_conflict` — `external_id` already belongs to a
            terminal run in this project. The response `details` carry
            `existing_run_id` (string), `status` (`completed` | `failed`),
            and the offending `external_id`. Fetch the prior run for its
            result, or POST a new attempt with a different external_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    get:
      operationId: listRuns
      tags:
      - runs
      summary: List workflow runs
      description: Supports cursor-based pagination and keyset filtering by status, workflow
        definition, workflow type, queue, parent run, and source. When `has_more` is true,
        pass the returned `next_cursor` back on the next call to walk the result set.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: status
        in: query
        description: Filter by run status.
        schema:
          $ref: '#/components/schemas/WorkflowRunStatus'
      - name: lifecycle
        in: query
        description: 'Convenience filter that selects runs by lifecycle stage: `in_flight`
          returns active (not-yet-terminal) runs, `terminal` returns completed and failed
          runs. Ignored when `status` is set.'
        schema:
          type: string
          enum:
          - in_flight
          - terminal
      - name: created_at_after
        in: query
        description: Inclusive lower bound for `created_at`, RFC3339. Combine with `created_at_before`
          to scope to a time window.
        schema:
          type: string
          format: date-time
      - name: created_at_before
        in: query
        description: Exclusive upper bound for `created_at`, RFC3339. Combine with `created_at_after`
          to scope to a time window.
        schema:
          type: string
          format: date-time
      - name: workflow_type
        in: query
        description: Filter by workflow type name.
        schema:
          type: string
      - name: definition_id
        in: query
        description: Filter by workflow definition ID.
        schema:
          type: string
      - name: queue
        in: query
        description: Filter by queue name.
        schema:
          type: string
      - name: parent_run_id
        in: query
        description: Filter to child runs of the specified parent run.
        schema:
          type: string
      - name: source_type
        in: query
        description: Filter by run source type (e.g. api, trigger, slack, fork).
        schema:
          type: string
      - name: source_id
        in: query
        description: Filter by the source identifier for the source type.
        schema:
          type: string
      - name: external_id
        in: query
        description: Filter by caller-supplied external ID or correlation key.
        schema:
          type: string
      - name: forked_from
        in: query
        description: Filter to runs forked from the specified source run.
        schema:
          type: string
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/projects/{project}/runs/{id}:
    get:
      operationId: getRun
      tags:
      - runs
      summary: Get a workflow run
      description: Returns a run with its snapshotted workflow spec and spawned jobs. Terminal
        runs may include `result_b64`, `error_type`, and `error_message`; in-flight runs include
        current progress state.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/runs/{id}/forks:
    post:
      operationId: forkRun
      tags:
      - runs
      summary: Fork a terminal run from a specific step
      description: Creates a new active run that inherits step history before `from_step_id`
        and resumes execution at that step. The request must provide a new logical `external_id`.
        `external_id` keeps the normal project-wide run uniqueness semantics; retrying the
        same fork request with the same source run, fork step, `external_id`, and effective
        target definition version is idempotent and returns the existing forked run with `202`
        whether that fork is still active or already terminal. Omitting `definition_version_id`
        keeps the source run's definition version; supplying it pins post-fork execution to
        that explicit version, and a retry that changes this value is an `idempotency_conflict`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunForkRequest'
      responses:
        '202':
          description: Fork created, or an existing fork returned for an idempotent retry
            with the same source run, `from_step_id`, `external_id`, and effective target
            definition version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict. Expected fork-specific codes include `fork_source_active`,
            `idempotency_conflict`, and `external_id_conflict`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project}/runs/{id}/steps:
    get:
      operationId: listRunSteps
      tags:
      - runs
      summary: List run steps
      description: Lists durable `RunStep` records for a run. Run steps are the canonical
        execution history and are returned in ascending `transition_seq` order. Pagination
        continues from that same order so clients can replay or reconstruct the ledger incrementally.
        Run steps remain available after terminal job rows are TTL-swept; use jobs only for
        live worker claim state.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: path_id
        in: query
        description: Filter steps by workflow path identifier.
        schema:
          type: string
      - name: step_name
        in: query
        description: Filter steps by workflow step name.
        schema:
          type: string
      - name: status
        in: query
        description: Filter steps by current run-step status.
        schema:
          $ref: '#/components/schemas/RunStepStatus'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStepListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/runs/{id}/steps/{step_id}:
    get:
      operationId: getRunStep
      tags:
      - runs
      summary: Get one run step
      description: Returns a single durable `RunStep` row for a workflow run. Run steps are
        the canonical execution history; linked job state, when present, is live worker-claim
        metadata and may disappear after terminal job retention.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: step_id
        in: path
        required: true
        schema:
          type: string
      - name: include
        in: query
        description: Pass `run_state_after` to include `run_state_after_b64`; it is omitted
          otherwise.
        schema:
          type: string
          enum:
          - run_state_after
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStep'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/runs/{id}/jobs:
    get:
      operationId: listRunJobs
      tags:
      - runs
      summary: List jobs for a run
      description: Returns every workflow job spawned by the run, including pending, claimed,
