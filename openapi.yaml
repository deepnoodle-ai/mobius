                      parameters:
                        document_id: ${inputs.document_id}
      responses:
        '202':
          description: Accepted. When `external_id` is set and matches an active run in this
            project, the existing run is returned idempotently with this same status code
            instead of creating a new one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
              example:
                id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                queue: default
                definition_id: wf_01hw1p4a5b6c7d8e9f0g1h2j3k
                definition_version: 3
                ephemeral: false
                workflow_name: document-review
                status: active
                path_counts:
                  total: 1
                  active: 1
                  working: 1
                  waiting: 0
                  completed: 0
                  failed: 0
                job_counts:
                  ready: 1
                  scheduled: 0
                  claimed: 0
                step_counts:
                  pending: 1
                  running: 0
                  completed: 0
                  failed: 0
                  skipped: 0
                  cancelled: 0
                wait_summary:
                  waiting_paths: 0
                  wake_counts: {}
                  subject_counts: {}
                  next_wake_at: null
                errors: []
                attempt: 1
                inputs:
                  document_id: doc_01hw1m9z8y7x6w5v4u3t2s1r0q
                metadata:
                  source: api
                  customer: acme
                started_by_user_id: usr_01hw1q2r3s4t5u6v7w8x9y0z1a
                started_by_credential_kind: api_key
                source_type: api
                source_id: review-service
                source_label: review-service
                external_id: review-2026-04-24-001
                created_at: '2026-04-24T14:30:00Z'
                updated_at: '2026-04-24T14:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |-
            Conflict. Possible codes:

            - `project_archived` — the target project is archived. Restore
            the project before starting new runs; in-flight runs continue
            regardless.
            - `external_id_conflict` — `external_id` already belongs to a
            terminal run in this project. The response `details` carry
            `existing_run_id` (string), `status` (`completed` | `failed`),
            and the offending `external_id`. Fetch the prior run for its
            result, or POST a new attempt with a different external_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    get:
      operationId: listRuns
      tags:
      - runs
      summary: List workflow runs
      description: Supports cursor-based pagination and keyset filtering by status, workflow
        definition, workflow type, queue, parent run, and source. When `has_more` is true,
        pass the returned `next_cursor` back on the next call to walk the result set.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: status
        in: query
        description: Filter by run status.
        schema:
          $ref: '#/components/schemas/RunStatus'
      - name: lifecycle
        in: query
        description: 'Convenience filter that selects runs by lifecycle stage: `in_flight`
          returns active (not-yet-terminal) runs, `terminal` returns completed and failed
          runs. Ignored when `status` is set.'
        schema:
          type: string
          enum:
          - in_flight
          - terminal
      - name: created_at_after
        in: query
        description: Inclusive lower bound for `created_at`, RFC3339. Combine with `created_at_before`
          to scope to a time window.
        schema:
          type: string
          format: date-time
      - name: created_at_before
        in: query
        description: Exclusive upper bound for `created_at`, RFC3339. Combine with `created_at_after`
          to scope to a time window.
        schema:
          type: string
          format: date-time
      - name: workflow_type
        in: query
        description: Filter by workflow type name.
        schema:
          type: string
      - name: definition_id
        in: query
        description: Filter by workflow definition ID.
        schema:
          type: string
      - name: queue
        in: query
        description: Filter by queue name.
        schema:
          type: string
      - name: parent_run_id
        in: query
        description: Filter to child runs of the specified parent run.
        schema:
          type: string
      - name: source_type
        in: query
        description: Filter by run source type (e.g. api, trigger, slack, fork).
        schema:
          type: string
      - name: source_id
        in: query
        description: Filter by the source identifier for the source type.
        schema:
          type: string
      - name: external_id
        in: query
        description: Filter by caller-supplied external ID or correlation key.
        schema:
          type: string
      - name: forked_from
        in: query
        description: Filter to runs forked from the specified source run.
        schema:
          type: string
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunListResponse'
        '401':
