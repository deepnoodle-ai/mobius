        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: deleteTableRow
      tags:
      - tables
      summary: Delete row
      description: Deletes one row from the table by row ID.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/TableIDParam'
      - name: row_id
        in: path
        required: true
        description: Table row ID.
        schema:
          type: string
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/artifacts:
    get:
      operationId: listArtifacts
      tags:
      - artifacts
      summary: List artifacts
      description: Returns ready artifacts in the project, ordered (created_at desc, id desc).
        Optional filters narrow by run, step, or mime prefix. Deleted or unfinished artifacts
        are excluded from API reads.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: run_id
        in: query
        required: false
        description: Filter to artifacts produced by this loop run.
        schema:
          type: string
      - name: step_id
        in: query
        required: false
        description: Filter to artifacts produced by this run step.
        schema:
          type: string
      - name: mime
        in: query
        required: false
        schema:
          type: string
        description: Mime prefix filter (e.g. `image/`)
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/projects/{project_handle}/artifacts/{artifact_id}:
    get:
      operationId: getArtifact
      tags:
      - artifacts
      summary: Get artifact
      description: Returns artifact metadata after enforcing the caller's project and owner-user
        artifact scope.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteArtifact
      tags:
      - artifacts
      summary: Delete artifact
      description: Deletes the artifact and removes any Mobius-managed content before reporting
        success. Deleted artifacts are removed from public API visibility, and their content
        no longer counts toward artifact quota.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/artifacts/{artifact_id}/content:
    get:
      operationId: getArtifactContent
      tags:
      - artifacts
      summary: Get artifact content
      description: 'Streams artifact bytes through the Mobius API after enforcing the caller''s
        artifact access scope. Safe preview mime types are returned inline; all other content
        is served as an attachment with `X-Content-Type-Options: nosniff`.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      responses:
        '200':
          description: Streamed artifact bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project_handle}/artifacts/{artifact_id}/signed-url:
    post:
      operationId: createArtifactSignedUrl
      tags:
      - artifacts
      summary: Create signed artifact URL
      description: Generates a fresh, time-boxed Mobius-managed storage URL for the artifact
        after enforcing the caller's artifact access scope. Use `getArtifactContent` when
        bytes should flow through the Mobius API instead of a signed storage URL.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      - name: ttl_seconds
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Requested signed URL TTL. The server caps this at the maximum supported
          artifact download TTL.
      responses:
        '200':
          description: Signed URL created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactSignedUrl'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/settings/artifact-storage/quota:
    get:
      operationId: getArtifactStorageQuota
      tags:
      - artifacts
      summary: Get artifact storage quota
      description: Returns Mobius-managed artifact quota usage for the current org.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactQuotaUsage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |-
        Bearer credential supplied via the `Authorization: Bearer <credential>` header. Two credential types are accepted:

        - **API keys** — prefix `mbx_`. Issued from the Mobius app or via the
        API key endpoints. API keys authenticate as a machine principal in one
        project. Send the raw `mbx_...` secret for normal requests. A
        trailing `.<project_handle>` suffix is accepted for compatibility and
        is validated when present.
        - **CLI credentials** — prefix `mbc_`. Issued by the device-auth
        flow on behalf of a user. Unpinned CLI credentials are org-scoped and
        sent as the raw token. Project-pinned CLI credentials may include a
        trailing `.<project_handle>` suffix; the suffix is validated when
        present.
  parameters:
    ProjectHandleParam:
      name: project_handle
      in: path
      required: true
      schema:
        type: string
      description: Project handle
    IDParam:
      name: resource_id
      in: path
      required: true
      description: Resource ID.
      schema:
        type: string
    SessionIdParam:
      name: session_id
      in: path
      required: true
      description: Identifier of the conversation session.
      schema:
        type: string
    TurnIdParam:
      name: turn_id
      in: path
      required: true
      description: Identifier of a turn within a session.
      schema:
        type: string
    ActionNameParam:
      name: action_name
      in: path
      required: true
      description: Action name used in loop step definitions.
      schema:
        type: string
    principal_id:
      name: principal_id
      in: path
      required: true
      description: Principal ID.
      schema:
        type: string
    CursorParam:
      name: cursor
      in: query
      description: Cursor for pagination (opaque string from previous response)
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    AfterSequenceParam:
      name: after_sequence
      in: query
      description: Continuation cursor for sequence-ordered lists. Only include rows whose
        monotonic per-resource sequence is strictly greater than this value. Pass the `next_sequence`
        from the previous response to fetch the next page.
      schema:
        type: integer
        format: int64
        minimum: 0
    BeforeSequenceParam:
      name: before_sequence
      in: query
      description: Backward continuation cursor for sequence-ordered lists. Only include rows
        whose monotonic per-resource sequence is strictly less than this value. Combine with
        `order=desc` to page toward older rows from a known position; pass the `prev_sequence`
        from the previous response to fetch the next older page.
      schema:
        type: integer
        format: int64
        minimum: 1
    OrderParam:
      name: order
      in: query
      description: Scan direction for the page. `asc` (the default) returns oldest-first;
        `desc` returns newest-first — the way to fetch the latest rows of a long list (the
        tail) in a single request. Items in the response are always ordered ascending regardless
        of this value; `order` only selects which end of the list the page is taken from.
      schema:
        type: string
        enum:
        - asc
        - desc
        default: asc
    LastEventIDParam:
      name: Last-Event-ID
      in: header
      required: false
      description: SSE reconnect cursor. The browser EventSource API replays the last event's
        `id` in this header on automatic reconnect; the server resumes the stream after that
        sequence number. When both this header and the `after_sequence` query parameter are
        supplied, the larger sequence wins, so an explicit `after_sequence` never rewinds
        a live reconnect. Ignored for non-streaming (JSON) requests.
      schema:
        type: integer
        format: int64
        minimum: 0
    EnvironmentIDParam:
      name: environment_id
      in: path
      required: true
      description: Environment ID.
      schema:
        type: string
    SecretParam:
      name: secret_name
      in: path
      required: true
      schema:
        type: string
      description: Secret ID or secret name.
    SecretVersionParam:
      name: version
      in: path
      required: true
      schema:
        type: string
      description: Secret version number or `latest`.
    ReferenceTypeParam:
      name: reference_type
      in: path
      required: true
      description: Reference type name, such as `slack.channel` or `table.table`.
      schema:
        type: string
    IntegrationIDParam:
      name: integration_id
      in: path
      required: true
      description: Integration record ID.
      schema:
        type: string
        pattern: ^intg_[A-Za-z0-9]+$
    IntegrationEventIDParam:
      name: event_id
      in: path
      required: true
      description: Integration event receipt ID.
      schema:
        type: string
        pattern: ^ievt_[A-Za-z0-9]+$
    IntegrationProviderParam:
      name: provider
      in: path
      required: true
      description: Framework provider identifier from the integration provider catalog.
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Stable caller-generated key. Reusing it returns the original operation.
      schema:
        type: string
        minLength: 1
        maxLength: 255
    OrgIDParam:
      name: org_id
      in: path
      required: true
      description: Organization ID.
      schema:
        type: string
    MemoryKeyParam:
      name: memory_key
      in: path
      required: true
      description: 'The key identifying a memory entry. Restricted to a path-safe character
        set (letters, numbers, and `. _ : -`) so it stays reliably addressable.'
      schema:
        type: string
        minLength: 1
        maxLength: 256
        pattern: ^[A-Za-z0-9._:-]+$
    ContextIncludeParam:
      name: include
      in: query
      required: false
      description: Set to `context` to include caller-supplied runtime context rows whose
        model-visible names begin with `app-`. Platform-owned runtime context remains hidden.
      schema:
        $ref: '#/components/schemas/ContextIncludeParam'
    NudgeIdParam:
      name: nudge_id
      in: path
      required: true
      description: Session nudge identifier.
      schema:
        type: string
    TableIDParam:
      name: table_id
      in: path
      required: true
      description: Table ID.
      schema:
        type: string
        pattern: ^table_[A-Za-z0-9]+$
    TableNameQueryParam:
      name: name
      in: query
      schema:
        type: string
        pattern: ^[a-z][a-z0-9_]*$
        maxLength: 64
      description: Filter tables by name. Table names are unique within a project; use this
        as a discovery filter and use the returned table `id` for follow-up operations.
    ArtifactIdParam:
      name: artifact_id
      in: path
      required: true
      schema:
        type: string
        pattern: ^art_[A-Za-z0-9]+$
      description: ID of the artifact
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded. Retry after the delay indicated in the `Retry-After`
        header.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Limit of the tightest active rate-limit bucket.
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Requests remaining in the tightest bucket's current window.
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp (seconds) when the tightest bucket resets.
        X-RateLimit-Scope:
          schema:
            type: string
            enum:
            - key
            - org
          description: Scope of the tightest bucket.
        X-RateLimit-Policy:
          schema:
            type: string
          description: All active windows for the selected scope, in `limit;w=seconds` form.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NoContent:
      description: No Content
    ProviderError:
      description: LLM provider error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      description: Standard error envelope returned by API endpoints.
      required:
      - error
      properties:
        error:
          type: object
          additionalProperties: false
          description: Error detail.
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: 'Stable, machine-readable error code in lower_snake_case. The cross-cutting
                codes clients can rely on across endpoints are: `bad_request` (malformed input
                / failed validation), `unauthorized`, `permission_denied`, `forbidden`, `not_found`,
                `conflict` / `already_exists`, `rate_limit_exceeded`, and `service_unavailable`.
                Direct session invocation conflicts use `session_turn_active` with the blocking
                `turn_id` and `status` in `details`. Session-key lookups without an agent
                scope use `session_key_scope_required`; supplying both agent ID and name uses
                `session_agent_ref_conflict`. Project API-key creation for a principal with
                no role assignments uses `principal_has_no_roles`. Authenticated callers missing
                a permission receive `permission_denied` with the required permission in `details`.
                Endpoint-specific codes (e.g. `loop_paused`, `invalid_signature`) extend this
                set; an unrecognized code should be handled by its HTTP status family.'
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              additionalProperties: true
              description: Optional structured details specific to a `code`. Endpoints that
                set this document the per-code shape inline. Absent for codes whose `code`
                + `message` are sufficient.
    GenericEventPayload:
      type: object
      additionalProperties: true
      description: Event-type-specific payload for less common event types.
    GenerationDeltaFrame:
      type: object
      additionalProperties: true
      required:
      - event_type
      - delta
      description: Live-only token preview frame that can appear on run and session SSE streams.
        It is not persisted, does not carry an SSE `id:`, and cannot be replayed with `after_sequence`
        or `Last-Event-ID`.
      properties:
        event_type:
          type: string
          enum:
          - generation.delta
        run_id:
          type: string
          nullable: true
        session_id:
          type: string
          nullable: true
        turn_id:
          type: string
          nullable: true
        job_id:
          type: string
          nullable: true
        tool_call_id:
          type: string
          nullable: true
        live_sequence:
          type: integer
          format: int64
          nullable: true
          description: Monotonic per-turn sequence across all live-only session frames; use
            to detect dropped live frames.
        delta_sequence:
          type: integer
          format: int64
          nullable: true
          description: Publisher-local ordering hint for deltas within a turn, not a replay
            cursor.
        emitted_at:
          type: string
          format: date-time
          nullable: true
          description: Server timestamp when this live preview frame was emitted.
        delta:
          type: object
          additionalProperties: true
          description: 'Token preview payload. Normal answer text arrives as `{ "text": "..."
            }`; summarized reasoning/thinking arrives as `{ "type": "thinking", "thinking":
            "..." }`.'
        worker_id:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
          description: Model producing the generation, e.g. `claude-sonnet-4-6`.
    ResourceScope:
      type: string
      enum:
      - owner
      description: Optional namespace for named runtime resources. Omitted/null means the
        project/default scope; `owner` means names are unique within `(project, owned_by)`.
    CapabilityReadiness:
      type: string
      enum:
      - ready
      - needs_setup
      description: Whether a catalog capability — an action, an event source, or an integration
        provider — is usable right now. `ready` means it can be used as-is; `needs_setup`
        means it is known and supported but blocked by configuration, credentials, permissions,
        provider runtime availability, or implementation status. This is catalog *readiness*,
        and is deliberately separate from a resource's lifecycle state (such as integration
        `status` or artifact lifecycle).
    CapabilityReadinessReason:
      type: string
      enum:
      - not_configured
      - inactive
      - expired
      - provider_unavailable
      - permission_missing
      - not_implemented
      description: Why a capability is `needs_setup`. Present only when readiness is `needs_setup`.
        `not_configured` — no integration or credential is connected yet. `inactive` — the
        backing integration is manually disabled. `expired` — the backing credential has expired.
        `provider_unavailable` — the provider runtime is not currently available. `permission_missing`
        — the caller lacks permission to use it. `not_implemented` — a placeholder for a capability
        that is not yet available.
    TagMap:
      type: object
      description: Key/value tags for organizing and filtering resources. Up to 8 per resource;
        keys 1–128 characters, values up to 256. Keys prefixed `mobius:` are system-managed
        and cannot be set by callers.
      additionalProperties:
        type: string
        maxLength: 256
      maxProperties: 8
      example:
        owner: product
    AgentStatus:
      type: string
      enum:
      - active
      - inactive
      description: Administrative status. Inactive agents cannot claim new jobs. Deleted agents
        are excluded from normal reads.
    ProjectAccessMode:
      type: string
      enum:
      - open
      - restricted
      description: '`open`: every org member can see and use the project, subject to role
        assignments. `restricted`: only listed project members (and org owners/admins) can
        see or use the project.'
    Project:
      type: object
      additionalProperties: false
      description: Workspace boundary for loops, actions, credentials, agents, and runtime
        activity. Most operational APIs live under a project, so this object tells clients
        which handle to use and who can see the project.
      required:
      - id
      - name
      - handle
      - access_mode
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this project.
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug used as a path segment in project API routes. Unique
            within the org. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        external_ref:
          type: string
          description: Client-owned tenant/workspace correlation key. Unique within the org
            when present. Set this when provisioning one Mobius project per external workspace
            so client-resolver callbacks can map scheduled runs back to the owning tenant.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Current project access policy: `open` or `restricted`.'
        created_by:
          type: string
          description: Principal ID of whoever created this project.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Free-form labels used for filtering, ownership, or automation.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this project was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this project was last updated.
      example:
        id: prj_3q7m9x2v5n8p4r6t
        name: Product Ops
        handle: product-ops
        description: Product operations workflows
        external_ref: workspace_789
        access_mode: restricted
        created_by: user_2f9s3k4m5n6p7q8r
        tags:
          owner: product
        created_at: '2026-06-15T14:30:00Z'
        updated_at: '2026-06-15T14:30:00Z'
    ProjectListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Project'
        has_more:
          type: boolean
          description: Whether more results are available beyond this page.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    AgentModelRouteMode:
      type: string
      enum:
      - managed
      - worker
      description: 'Model-call route mode: `managed` or `worker`.'
    AgentModelRoute:
      type: object
      additionalProperties: false
      description: Default model route used by built-in messaging and by loop agent steps
        that do not override the route.
      required:
      - mode
      properties:
        mode:
          $ref: '#/components/schemas/AgentModelRouteMode'
          description: Where this model call should run.
        environment_id:
          type: string
          description: Environment to use for worker-backed model calls.
        provider:
          type: string
          description: Provider id advertised by a local worker when `mode` is `worker`.
        model:
          type: string
          description: Model identifier to use for this route.
    AgentToolPresentation:
      type: string
      enum:
      - flat
      - meta
      description: Controls how granted actions are surfaced to the model in Mobius-hosted
        agent turns. `meta` (the default) groups related actions behind compact command routers,
        while `flat` exposes one tool per action.
    SessionCompactionThreshold:
      type: string
      enum:
      - xs
      - sm
      - md
      - lg
      - xl
      description: 'T-shirt size selecting when `auto` compaction triggers as a percentage
        of the session model''s input context window: `xs` 10%, `sm` 20%, `md` 40%, `lg` 60%,
        and `xl` 80%. Unknown/custom models use a conservative 200k-token context window.
        `sm` is the default.'
    SessionCompactionPolicy:
      type: object
      additionalProperties: false
      description: Controls how a session's transcript is automatically summarized as it grows.
        On create the supplied fields are merged over the owning agent's default policy and
        the server defaults; on update they patch the session's current policy. Omitted fields
        keep their resolved values.
      properties:
        strategy:
          type: string
          enum:
          - auto
          - manual
          - disabled
          - none
          description: '`auto` (default) compacts automatically when the transcript crosses
            the model-relative `threshold` or exact `threshold_tokens` trigger. `manual` only
            compacts on an explicit compact request. `disabled` (alias `none`) never compacts.'
        threshold:
          $ref: '#/components/schemas/SessionCompactionThreshold'
          description: Model-relative size at which `auto` compacts. Each preset is a percentage
            of the session model's input context window; `sm` is the default. Mutually exclusive
            with `threshold_tokens`.
        threshold_tokens:
          type: integer
          format: int64
          minimum: 1
          maximum: 10000000
          description: Exact estimated-token count at which `auto` compacts. Use this for
            advanced workloads that need a specific threshold rather than a model-relative
            preset. Mutually exclusive with `threshold`.
        summary_model:
          type: string
          description: Model used to produce compaction summaries.
      example:
        strategy: auto
        threshold: sm
        summary_model: claude-haiku-4-5-20251001
    ThinkingEffort:
      type: string
      enum:
      - inherit
      - low
      - medium
      - high
      - xhigh
      - max
      description: Reasoning-effort level for a turn, lowest (`low`) to highest (`max`). Higher
        effort spends more tokens on reasoning, improving quality on hard tasks at the cost
        of latency and credits. Levels above what the resolved model supports are clamped
        down. Set on an agent it is the default; set on a session or loop step it overrides
        the agent default. `inherit` (or omitting the field) defers to the layer below — the
        agent default for a session/step, or the provider's own default when nothing sets
        a level.
    Agent:
      type: object
      additionalProperties: false
      description: AI actor identity. An agent IS a principal (its permissions are role grants
        on that principal); agents are useful when loops need a named actor with instructions,
        configuration, and session presence.
      required:
      - id
      - principal_id
      - name
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this agent.
        principal_id:
          type: string
          description: The machine principal (principals.id, kind `agent`) this agent IS.
            Created atomically with the agent and immutable. Used as the `owned_by` value
            when filtering or claiming resources owned by this agent.
        name:
          type: string
          description: Mutable unique name within the project. Free-form human-readable label;
            use `id` for stable references and job targeting.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform agent classification for tooling and filtering (e.g. "llm",
            "rpa").
        color:
          type: string
          description: Display color for this agent in UI surfaces. One of the Mantine color
            palette keys (e.g. `indigo`, `teal`, `grape`); empty string falls back to a hash-derived
            color.
          maxLength: 24
        model:
          type: string
          description: Model identifier for platform agents. Accepts any id returned by `GET
            /v1/projects/{project_handle}/catalog/models` (including slash-bearing OpenRouter
            catalog ids), optionally `provider/`-prefixed (e.g. `xai/grok-4`); bare known
            ids (e.g. `claude-sonnet-4-6`) are auto-detected to their provider. Empty string
            falls back to the platform default.
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Default route for model calls made by this agent.
        tool_presentation:
          $ref: '#/components/schemas/AgentToolPresentation'
          description: Default tool presentation used by loop agent steps and built-in channel-message
            replies for this agent.
        system_prompt:
          type: string
          description: Custom system prompt for platform agents. Empty string uses the generated
            default based on the agent name.
        timeout_seconds:
          type: integer
          format: int64
          minimum: 0
          description: Execution timeout, in seconds, for a single turn of this platform agent.
            `0` (or omitted) uses the platform default (600s / 10 minutes). A loop step's
            own timeout overrides this for that step.
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Default session-compaction policy. New sessions opened against this
            agent inherit it (below server defaults, above explicit per-session overrides).
            Absent when the agent has no default.
        thinking_effort:
          $ref: '#/components/schemas/ThinkingEffort'
          description: Default reasoning-effort level. New sessions and loop agent steps inherit
            it, above the provider default and below explicit per-session/per-step overrides.
            Absent when the agent has no default.
        status:
          $ref: '#/components/schemas/AgentStatus'
          description: 'Current agent status: `active` or `inactive`.'
        email_address:
          type: string
          description: Inbox address provisioned via POST /v1/projects/{project_handle}/agents/{resource_id}/inbox
            (opt-in; not created automatically at agent creation). The field is populated
            only after a successful provisioning call. Use this address to add the agent as
            a member on external platforms (Linear, GitHub, Slack, etc.) so the platform can
            deliver notifications to the agent.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Free-form labels used for filtering, ownership, or automation.
        created_by:
          type: string
          description: ID of the principal who created this agent.
        updated_by:
          type: string
          description: ID of the principal who last updated this agent.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this agent was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this agent was last updated.
      example:
        id: agent_5n8p2q7m4x9r3v6t
        principal_id: agent_5n8p2q7m4x9r3v6t
        name: PR reviewer
        description: Reviews pull requests for risky changes.
        kind: llm
        color: teal
        model: claude-sonnet-4-6
        tool_presentation: meta
        status: active
        tags:
          owner: product
        created_by: user_2f9s3k4m5n6p7q8r
        updated_by: user_2f9s3k4m5n6p7q8r
