        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          enum:
          - builtin
          - http
          - worker
          description: Backing kind. "builtin" for Mobius platform actions implemented in
            Go (no DB row), "http" for project-owned or integration HTTP endpoints, and "worker"
            for project-owned custom actions dispatched to connected workers.
