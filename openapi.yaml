  /v1/projects/{project}/runs/{id}/forks:
    post:
      operationId: forkRun
      tags:
      - runs
      summary: Fork a terminal run from a specific step
      description: Creates a new active run that inherits step history before `from_step_id`
        and resumes execution at that step. The request must provide a new logical `external_id`.
        `external_id` keeps the normal project-wide run uniqueness semantics; retrying the
        same fork request with the same source run, fork step, `external_id`, and effective
        target definition version is idempotent and returns the existing forked run with `202`
        whether that fork is still active or already terminal. Omitting `definition_version_id`
        keeps the source run's definition version; supplying it pins post-fork execution to
        that explicit version, and a retry that changes this value is an `idempotency_conflict`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunForkRequest'
      responses:
        '202':
          description: Fork created, or an existing fork returned for an idempotent retry
            with the same source run, `from_step_id`, `external_id`, and effective target
            definition version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict. Expected fork-specific codes include `fork_source_active`,
            `idempotency_conflict`, and `external_id_conflict`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project}/runs/{id}/steps:
    get:
      operationId: listRunSteps
      tags:
      - runs
      summary: List run steps
      description: Lists durable `RunStep` records for a run. Run steps are the canonical
        execution history and are returned in ascending `transition_seq` order. Pagination
        continues from that same order so clients can replay or reconstruct the ledger incrementally.
        Run steps remain available after terminal job rows are TTL-swept; use jobs only for
        live worker claim state.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: path_id
        in: query
        description: Filter steps by workflow path identifier.
