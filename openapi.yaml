components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |-
        Bearer credential supplied via the `Authorization: Bearer <credential>` header. Two credential types are accepted:

        - **API keys** — prefix `mbx_`. Issued from the dashboard or via the
        API key endpoints. API keys authenticate as a service account in one
        project and are sent with a trailing `.<project_handle>` suffix —
        e.g. `mbx_abcdef….myproject`.
        - **CLI credentials** — prefix `mbc_`. Issued by the device-auth
        flow on behalf of a user. Unpinned CLI credentials are org-scoped
        and sent as the raw token. Project-pinned CLI credentials MUST be
        sent with a trailing `.<project_handle>` suffix — e.g.
        `mbc_abcdef….myproject`. The suffix is required: the handle is how
        the server resolves the bound project.
    XApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key supplied through the `x-api-key` header. This is primarily used
        by Anthropic-compatible clients targeting `/v1/messages`; project service-account
        keys are required for that endpoint.
  parameters:
    ProjectHandleParam:
      name: project
      in: path
      required: true
      schema:
        type: string
      description: Project handle (unique per organization)
    IDParam:
      name: id
      in: path
      required: true
      description: Resource ID.
      schema:
        type: string
    ActionNameParam:
      name: action_name
      in: path
      required: true
      description: Project-scoped action name used in workflow step definitions.
      schema:
        type: string
    member_id:
      name: member_id
      in: path
      required: true
      description: User ID (`users.id`) of the channel member. Agent members use their backing
        user ID, not `agents.id`.
      schema:
        type: string
    user_id:
      name: user_id
      in: path
      required: true
      description: User ID.
      schema:
        type: string
    message_id:
      name: message_id
      in: path
      required: true
      description: ID of the channel message.
      schema:
        type: string
    presence_id:
      name: presence_id
      in: path
      required: true
      description: ID of the agent presence record.
      schema:
        type: string
    CursorParam:
      name: cursor
      in: query
      description: Cursor for pagination (opaque string from previous response)
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    TagFilterParam:
      name: tag
      in: query
      description: |-
        Filter results by tag. Repeatable; multiple values combine with AND. Format: `Key:Value`, `Key:*` for any value, `Key:a,b,c` for IN.

        Tag values containing `:` or `,` cannot be filtered with this grammar — the parser splits on those literally. Constrain values to plain identifiers when you intend to filter on them.

        Not supported on the runs list — runs are too high-cardinality for ad-hoc tag filtering. To narrow runs by parent workflow, use the workflow-scoped endpoint `GET /v1/projects/{project}/workflows/{id}/runs` and inspect `tags` on each run client-side.
      explode: true
      schema:
        type: array
        items:
          type: string
    AdminOrgIDParam:
      name: org_id
      in: path
      required: true
      schema:
        type: string
      description: ID of the target organization for the admin operation.
    APIKeyProjectIDParam:
      name: project_id
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/ProjectID'
      description: Optional project filter for this request. When `project_id` is provided,
        the API key operation is resolved in that project's permission context. When omitted,
        org-level callers operate across projects.
    EnvironmentIDParam:
      name: environment_id
      in: path
      required: true
      schema:
        type: string
    SecretParam:
      name: secret
      in: path
      required: true
      schema:
        type: string
      description: Secret ID or project-scoped secret name.
    SecretVersionParam:
      name: version
      in: path
      required: true
      schema:
        type: string
      description: Secret version number or `latest`.
    ReferenceTypeParam:
      name: reference_type
      in: path
      required: true
      description: Reference type name, such as `slack.channel` or `table.table`.
      schema:
        type: string
    TriggerTargetIDParam:
      name: target_id
      in: path
      required: true
      description: Trigger target ID.
      schema:
        type: string
    IssueKeyParam:
      name: issue_key
      in: path
      required: true
      description: Jira issue key, e.g. `ENG-123`.
      schema:
        type: string
    GroupParam:
      name: group
      in: path
      required: true
      description: Group ID.
      schema:
        type: string
    widget_id:
      name: widget_id
      in: path
      required: true
      description: Widget ID within the dashboard.
      schema:
        type: string
    TableNameParam:
      name: table_name
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-z][a-z0-9_]*$
        maxLength: 64
      description: Table name, lowercase alphanumeric and underscores. Names are unique within
        the resolved scope. Omitted scope means the project/default scope; use `scope=owner`
        together with `owned_by` or `owned_by_me=true` for per-user memory tables. With `scope=owner`,
        the same table_name may exist under different owner scopes, so consumers must consider
        scope plus name when resolving uniqueness.
    TableScopeParam:
      name: scope
      in: query
      schema:
        $ref: '#/components/schemas/ResourceScope'
      description: Scope used to resolve `table_name`. Omit for the project/default scope;
        use `owner` with `owned_by` or `owned_by_me=true` for per-user memory tables. For
        list filters, scope is orthogonal and does not affect ownership-filter precedence.
    TableOwnedByParam:
      name: owned_by
      in: query
      schema:
        type: string
      description: Canonical user owner ID. Used with `scope=owner` for lookups; for list
        filters, narrows to tables owned by this user. Ignored when `owned_by_me=true` is
        present.
    TableOwnedByMeParam:
      name: owned_by_me
      in: query
      schema:
        type: boolean
      description: Resolve `table_name` in the authenticated user's owner scope, or filter
        lists to tables owned by the authenticated user.
    ArtifactIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^art_[A-Za-z0-9]+$
      description: TypeID of the artifact (`art_...`)
    RunIdParam:
      name: run_id
      in: path
      required: true
      schema:
        type: string
      description: Workflow run ID
    ObservableIdParam:
      name: observable_id
      in: path
      required: true
      description: Observable ID or project-scoped Observable name.
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded. Retry after the delay indicated in the `Retry-After`
        header.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Limit of the tightest active rate-limit bucket.
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Requests remaining in the tightest bucket's current window.
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp (seconds) when the tightest bucket resets.
        X-RateLimit-Scope:
          schema:
            type: string
            enum:
            - key
            - org
          description: Scope of the tightest bucket.
        X-RateLimit-Policy:
          schema:
            type: string
          description: All active windows for the selected scope, in `limit;w=seconds` form.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NoContent:
      description: No Content
    ProviderError:
      description: LLM provider error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      description: Standard error envelope returned by API endpoints.
      required:
      - error
      properties:
        error:
          type: object
          additionalProperties: false
          description: Error detail.
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              additionalProperties: true
              description: Optional structured details specific to a `code`. Endpoints that
                set this document the per-code shape inline. Absent for codes whose `code`
                + `message` are sufficient.
    ProjectID:
      type: string
      description: Project ID.
    ResourceScope:
      type: string
      enum:
      - owner
      description: Optional namespace for named runtime resources. Omitted/null means the
        project/default scope; `owner` means names are unique within `(project, owned_by)`.
    Metadata:
      type: object
      description: Free-form JSON object for caller-defined metadata.
      additionalProperties: true
    TagMap:
      type: object
      description: Key/value tag map. Keys 1–128 chars, values 0–256 chars. Keys with the
        `mobius:` prefix are system-managed and cannot be set by callers. Maximum 8 tags per
        resource. Use tags to organize resources by environment, team, cost-center, or any
        other dimension meaningful to your organization; tags can be filtered on most list
        endpoints.
      additionalProperties:
        type: string
        maxLength: 256
      maxProperties: 8
      example:
        Environment: Production
        Department: Finance
        Owner: team@example.com
    InteractionMode:
      type: string
      enum:
      - confirm
      - select
      - multi_select
      - input
      description: Declarative UI/input primitive for collecting the response. This is a portable
        rendering contract, not executable code. Values are `confirm`, `select`, `multi_select`,
        and `input`.
    InteractionOption:
      type: object
      required:
      - value
      - label
      additionalProperties: false
      description: Selectable option for `select` and `multi_select` modes.
      properties:
        value:
          type: string
          description: Machine-readable value submitted when this option is chosen.
        label:
          type: string
          description: Human-readable label displayed for this option.
        description:
          type: string
          description: Optional additional context shown beneath the label.
    InteractionSpec:
      type: object
      required:
      - mode
      additionalProperties: false
      description: |-
        Declarative dialog contract for rendering and validating an interaction. Used at both authoring time (inside a workflow definition) and runtime (persisted on an interaction). PRD 077 decouples protocol kind from input shape: each kind declares which spec modes are *allowed*, not which is *implied*. An approval may now legitimately use `select` mode (approve/deny/defer), for example.

        Allowed combinations:
        * `approval` → `confirm`, `select`
        * `review` → `select`, `input`
        * `request` → `select`, `multi_select`, `input`
        * `vote` → `select`, `multi_select` (requires `vote_rules`)
        * `handoff` → `input`
      properties:
        mode:
          $ref: '#/components/schemas/InteractionMode'
          description: UI/input mode used to render and validate the response.
        options:
          type: array
          maxItems: 100
          description: Required for `select` and `multi_select` modes.
          items:
            $ref: '#/components/schemas/InteractionOption'
        default_value:
          type: string
          description: Default selected option for `select` mode.
        default_values:
          type: array
          maxItems: 100
          description: Default selected options for `multi_select` mode.
          items:
            type: string
        default_text:
          type: string
          description: Initial text value for `input` mode.
        default_confirmed:
          type: boolean
          description: Initial yes/no value for `confirm` mode.
        placeholder:
          type: string
          description: Hint text shown for `input` mode.
        multiline:
          type: boolean
          description: When true, render `input` mode as a multiline text area.
        vote_rules:
          $ref: '#/components/schemas/VoteRules'
          description: Vote-protocol parameters. Required for `vote`-kind interactions and
            rejected on other kinds.
    VoteRules:
      type: object
      additionalProperties: false
      required:
      - options
      description: Parameters of a vote-kind interaction (PRD 077). Carries the electorate,
        vote changeability, anonymity, quorum, close time, and tie-break behaviour.
      properties:
        options:
          type: array
          minItems: 2
          maxItems: 50
          items:
            $ref: '#/components/schemas/VoteOption'
          description: Choices voters can select. Values must be unique.
        eligibility:
          $ref: '#/components/schemas/VoteEligibility'
          description: Explicit voter set or `group_snapshot` to use the interaction's target
            group snapshot. Omit for non-group interactions that accept any caller.
        anonymous:
          type: boolean
          description: When true, non-owner UI should hide voter IDs. Anonymity is a UX property;
            response rows still retain real responder IDs.
        changeable:
          type: boolean
          description: When true, voters may re-cast before close.
        quorum_count:
          type: integer
          minimum: 0
          description: Minimum number of active votes before the vote can resolve.
        quorum_fraction:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Minimum fraction of eligible voters that must vote before the vote
            can resolve.
        close_at:
          type: string
          format: date-time
          description: Time after which new votes are rejected.
        tie_break:
          type: string
          enum:
          - none
          - first_cast
          - owner
          description: How to resolve a tied top vote count on close.
        reveal_live_tally:
          type: boolean
          description: Opt-in display of running counts before close.
    VoteOption:
      type: object
      additionalProperties: false
      required:
      - value
      - label
      description: A choice on a vote interaction.
      properties:
        value:
          type: string
          description: Machine-readable choice value.
        label:
          type: string
          description: Display label.
        description:
          type: string
          description: Optional extra context.
    VoteEligibility:
      type: object
      additionalProperties: false
      required:
      - kind
      description: Who is eligible to vote on this interaction. `explicit` lists voters directly;
        `group_snapshot` uses the interaction's resolved target users.
      properties:
        kind:
          type: string
          enum:
          - explicit
          - group_snapshot
        voter_user_ids:
          type: array
          items:
            type: string
          description: Required when `kind=explicit`.
    FeatureKey:
      type: string
      enum:
      - feature.apps
      - feature.observables
      description: Server-defined product feature key. `feature.apps` controls the Apps product
        area; `feature.observables` controls Observables.
    FeatureOverrideScope:
      type: string
      enum:
      - org
      - project
      description: Scope for a feature override. Org overrides apply across the organization;
        project overrides apply only to the specified project and take precedence over org
        overrides.
    User:
      type: object
      additionalProperties: false
      description: Human identity known to the organization. User records are useful for membership
        lists, role assignment UIs, attribution, and displaying profile information next to
        actions.
      required:
      - id
      - email
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Clerk user ID. Stable and globally unique across all orgs.
        email:
          type: string
          description: Primary email address from Clerk.
        display_name:
          type: string
          description: Authoritative single-line label for this user, regardless of kind.
            Humans get "First Last"; agents get the agent name; service accounts get the SA
            name. Renderers should prefer this over first_name/last_name.
        color:
          type: string
          description: Optional Mantine palette key (e.g. "indigo") used by avatar surfaces
            when no avatar_url is set. Populated for agent-kind users; empty otherwise.
        first_name:
          type: string
          description: User's first name from their Clerk profile.
        last_name:
          type: string
          description: User's last name from their Clerk profile.
        avatar_url:
          type: string
          description: Profile avatar URL from Clerk (may be a Gravatar or uploaded image).
        created_at:
          type: string
          format: date-time
          description: When the user record was first mirrored into Mobius.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this user record was last synced from Clerk.
    ProjectAccessMode:
      type: string
      enum:
      - org_open
      - restricted
      description: '`org_open`: every org member can see and use the project, subject to role
        assignments. `restricted`: only listed project members (and org owners/admins) can
        see or use the project.'
    Project:
      type: object
      additionalProperties: false
      description: Workspace boundary for workflows, actions, credentials, agents, and runtime
        activity. Most operational APIs are project-scoped, so this object tells clients which
        handle to use and who can see the project.
      required:
      - id
      - name
      - handle
      - access_mode
      - permissions_enabled
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this project.
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug used as a path segment in all project-scoped API routes.
            Unique within the org. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Current project access policy: `org_open` or `restricted`.'
        permissions_enabled:
          type: boolean
          description: Whether role-permission enforcement is enabled for this project. When
            false, authenticated project members can access project-scoped APIs according
            to the broader org/project access policy.
        created_by:
          type: string
          description: User ID of the org member who created this project.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this project was archived. `null` for active projects.
            Archived projects are read-only and excluded from the default project listing.
        default_agent_role_id:
          type: string
          nullable: true
          description: Role assigned to the auto-created service account of any new agent
            in this project, when no per-call `role_ids` are supplied on `createAgent`. `null`
            falls through to the system `Agent` role floor.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this project.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this project was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this project was last updated.
    ProjectListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Project'
    AgentStatus:
      type: string
      enum:
      - active
      - inactive
      description: Administrative status. Inactive agents cannot claim new jobs. Soft-deleted
        agents are represented by `deleted_at` and excluded from normal reads.
    LegacyAgentPresence:
      type: string
      enum:
      - online
      - offline
      - stale
      description: Deprecated computed status. `online` means a connected presence record
        with a fresh heartbeat; `stale` means heartbeats are overdue; `offline` means no connected
        records.
    UserConnectionStatus:
      type: string
      enum:
      - online
      - idle
      - offline
    UserPresenceSource:
      type: string
      enum:
      - web
      - worker_session
      - agent_presence
      - platform_hosted
    Agent:
      type: object
      additionalProperties: false
      description: Project-scoped automated worker identity backed by a service account. Agents
        are useful when workflows need to target a named machine actor with capabilities,
        configuration, and session presence.
      required:
      - id
      - service_account_id
      - name
      - status
      - presence
      - connection_status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this agent.
        service_account_id:
          type: string
          description: The service account whose credentials this agent uses to authenticate.
            Each service account backs at most one agent; this binding is immutable after
            creation.
        user_id:
          type: string
          description: Canonical user (users.id) backing this agent. Used as the `owned_by`
            value when filtering or claiming resources owned by this agent's backing user.
        name:
          type: string
          description: Mutable unique name within the project. Free-form human-readable label;
            use `id` for stable references and job targeting.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform agent classification for tooling and filtering (e.g. "llm",
            "rpa").
        color:
          type: string
          description: Display color for this agent in UI surfaces such as channel avatars
            and message rails. One of the Mantine color palette keys (e.g. `indigo`, `teal`,
            `grape`); empty string falls back to a hash-derived color.
          maxLength: 24
        capabilities:
          type: object
          additionalProperties: true
          description: Arbitrary capability map used by orchestrators to select suitable agents.
        model:
          type: string
          description: Anthropic model identifier for platform agents (e.g. `claude-sonnet-4-6`).
            Empty string falls back to the platform default.
        system_prompt:
          type: string
          description: Custom system prompt for platform agents. Empty string uses the generated
            default based on the agent name.
        status:
          $ref: '#/components/schemas/AgentStatus'
          description: 'Current agent status: `active` or `inactive`.'
        presence:
          $ref: '#/components/schemas/LegacyAgentPresence'
          description: Deprecated alias of connection_status for first rollout compatibility.
        connection_status:
          $ref: '#/components/schemas/UserConnectionStatus'
        connection_last_seen_at:
          type: string
          format: date-time
        presence_source:
          $ref: '#/components/schemas/UserPresenceSource'
        email_address:
          type: string
          description: Inbox address provisioned via POST /v1/projects/{project}/agents/{id}/inbox
            (opt-in; not created automatically at agent creation). The field is populated
            only after a successful provisioning call. Use this address to add the agent as
            a member on external platforms (Linear, GitHub, Slack, etc.) so the platform can
            deliver notifications to the agent.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this agent.
        created_by:
          type: string
          description: User ID of the principal who created this agent.
        updated_by:
          type: string
          description: User ID of the principal who last updated this agent.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this agent was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this agent was last updated.
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the agent has been soft-deleted. Soft-deleted agents are excluded
            from normal listing and lookups but their records are retained so historical chat
            messages can resolve the sender name.
    AgentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Agent'
    AuditLogEntry:
      type: object
      additionalProperties: false
      description: Immutable record of a security- or configuration-relevant change. Use audit
        log entries to answer who changed a resource, when it happened, and which project
        or credential was involved.
      required:
      - id
      - action
      - resource_type
      - resource_id
      - created_at
      properties:
        id:
          type: string
          description: Unique audit log entry ID
        user_id:
          type: string
          description: ID of the user who performed the action
        project_id:
          type: string
          description: Project ID when the audited resource is project-scoped
        actor_name:
          type: string
          description: Display name of the user at the time the entry was written (snapshotted)
        credential_id:
          type: string
          description: Credential ID used for the request, when applicable
        credential_name:
          type: string
          description: Human-readable credential name or session label captured when the audit
            entry was written
        action:
          type: string
          enum:
          - create
          - update
          - delete
          - archive
          - restore
          description: 'Type of action performed: `create`, `update`, `delete`, `archive`,
            or `restore`.'
        resource_type:
          type: string
          description: Type of resource affected (e.g., job, channel, document)
        resource_id:
          type: string
          description: ID of the affected resource
        resource_name:
          type: string
          description: Human-readable name of the affected resource
        changes:
          type: object
          additionalProperties: true
          description: Object containing before/after changes for update actions
        ip_address:
          type: string
          description: IP address of the request
        user_agent:
          type: string
          description: User agent of the request
        created_at:
          type: string
          format: date-time
          description: Timestamp when the action was performed
    AuditLogListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        next_cursor:
          type: string
          description: Cursor for fetching next page of results
        has_more:
          type: boolean
          description: Whether more results are available
    ChannelCompletionBehavior:
      type: string
      enum:
      - none
      - mark_inactive
      - archive
      description: Behavior to apply when every purpose-linked interaction is terminal.
    ChannelMessageSenderType:
      type: string
      enum:
      - human
      - agent
      - service_account
      - system
      description: |-
        Authenticated user kind that posted the message, derived from the
        credential at send time and never overrideable in the request body
        (PRD 048 §5). `sender_id` is always `users.id`; values align with
        `users.kind`:
        - `human` — a human org member's user credential.
        - `agent` — an API key whose service account backs an agent (1:1
        invariant from PRD 048 §1).
        - `service_account` — an API key whose service account backs no
        agent.
        - `system` — an internal system user that authored workflow/system
        messages.
    EntityReferenceType:
      type: string
      enum:
      - run
      - run_step
      - job
      - interaction
      - workflow_definition
      - channel_message
      - agent
      - user
      - group
      - artifact
      description: Mobius entity kind that can be attached to a channel message.
    EntityReference:
      type: object
      additionalProperties: false
      description: Experimental typed link from a channel message to another Mobius entity.
        Clients use references to render cards and chips without parsing Markdown.
      required:
      - entity_type
      - entity_id
      properties:
        entity_type:
          $ref: '#/components/schemas/EntityReferenceType'
          description: Referenced Mobius entity kind.
        entity_id:
          type: string
          description: Stable ID of the referenced entity.
        relation:
          type: string
          description: Relationship to the message, such as primary, source, context, or mention.
        label:
          type: string
          description: Snapshot label to display when the entity cannot be hydrated.
        project_id:
          type: string
          description: Project that owns the entity when known.
    ChannelMessageFileAttachmentSource:
      type: string
      enum:
      - artifact
      description: Storage system that owns the attached file.
    ChannelMessageFileAttachmentPreviewKind:
      type: string
      enum:
      - image
      - text
      - download
      description: Preview hint derived from the artifact MIME type.
    ChannelMessageFileAttachment:
      type: object
      additionalProperties: false
      description: Artifact-backed file attached to a channel message. Attachments are shared,
        pinned project artifacts; the message snapshots display metadata so clients can render
        history without refetching artifact rows.
      required:
      - artifact_id
      - name
      - mime_type
      - size_bytes
      - preview_kind
      - source
      - storage
      properties:
        artifact_id:
          type: string
          description: ID of the shared, pinned artifact that stores the bytes.
        name:
          type: string
          description: Snapshot filename or display name.
        mime_type:
          type: string
          description: Snapshot MIME type.
        size_bytes:
          type: integer
          format: int64
          minimum: 0
          description: Snapshot byte size.
        preview_kind:
          $ref: '#/components/schemas/ChannelMessageFileAttachmentPreviewKind'
        source:
          $ref: '#/components/schemas/ChannelMessageFileAttachmentSource'
        storage:
          $ref: '#/components/schemas/ArtifactStorageBackend'
    ChannelMessageFileAttachmentInput:
      type: object
      additionalProperties: false
      description: Existing artifact to attach to a new channel message.
      required:
      - artifact_id
      properties:
        artifact_id:
          type: string
          description: ID of an already-created project artifact. The service requires it
            to be available, shared, and pinned before storing the message.
    Channel:
      type: object
      additionalProperties: false
      description: Project-scoped messaging room or direct-message thread.
      required:
      - id
      - name
      - display_name
      - agent_instructions
      - agent_instructions_version
      - kind
      - private
      - created_by
      - purpose
      - completion_behavior
      - default_notification_level
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this channel.
        name:
          type: string
          description: URL-safe channel handle, unique within the project. Immutable after
            creation.
        display_name:
          type: string
          description: Human-facing display name shown in the UI.
        topic:
          type: string
          description: Optional topic or description shown at the top of the channel.
        agent_instructions:
          type: string
          maxLength: 12000
          description: Markdown instructions that are injected into agent turns running in
            this channel. Layering order is org context, project context, channel instructions,
            then message-level instructions; the more specific layer wins when instructions
            conflict.
        agent_instructions_updated_by:
          type: string
          nullable: true
          description: User ID that last edited the channel agent instructions.
        agent_instructions_updated_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when channel agent instructions were last edited.
        agent_instructions_version:
          type: integer
          format: int32
          description: Monotonic version incremented whenever channel agent instructions change.
        kind:
          type: string
          enum:
          - dm
          - channel
          description: '`channel` — persistent named room. `dm` — direct-message thread, typically
            between a small fixed set of participants.'
        private:
          type: boolean
          description: When true, the channel is invite-only and not visible in public listings.
        created_by:
          type: string
          description: User ID of the principal who created this channel.
        updated_by:
          type: string
          description: User ID of the principal who last updated this channel.
        purpose:
          type: string
          enum:
          - general
          - resolve_interactions
          description: '`general` channels are ordinary rooms. `resolve_interactions` channels
            exist to resolve one or more purpose-linked interactions.'
        completion_behavior:
          $ref: '#/components/schemas/ChannelCompletionBehavior'
        default_notification_level:
          $ref: '#/components/schemas/ChannelNotificationLevel'
          description: Channel-level default inherited by members when they join. Existing
            member overrides are not changed when this field is updated.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Set when this purpose-scoped channel has completed.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the channel is archived. Archived channels are hidden in the
            UI but their message history remains accessible.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this channel.
        current_member:
          $ref: '#/components/schemas/ChannelMember'
          description: Authenticated caller's membership in this channel, when available.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this channel was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this channel was last updated.
    ChannelListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of project channels.
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Channel'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    ChannelNotificationLevel:
      type: string
      enum:
      - all
      - mentions
      - none
      description: Per-channel notification preference for a member. `all` pings for every
        channel message, `mentions` pings only for direct mentions and high-signal events,
        and `none` suppresses channel message notifications.
    ChannelMember:
      type: object
      additionalProperties: false
      description: Live membership record for a `users.id` principal in a channel.
      required:
      - id
      - channel_id
      - user_id
      - role
      - joined_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        channel_id:
          type: string
          description: ID of the channel this membership belongs to.
        user_id:
          type: string
          description: ID from the users table for the member. Agent members use their backing
            users.id, not agents.id.
        role:
          type: string
          enum:
          - member
          - admin
          description: '`admin` — can update channel settings and manage members. `member`
            — can post messages and view history. Creators are automatically assigned `admin`.'
        last_read_message_id:
          type: string
          nullable: true
          description: ID of the last message this member has read; null until the member
            reads a message.
        notification_level:
          $ref: '#/components/schemas/ChannelNotificationLevel'
          default: mentions
          description: Member-specific notification setting for this channel.
        muted:
          type: boolean
          description: Deprecated mirror of `notification_level=none`.
        starred:
          type: boolean
          description: Whether this member has starred the channel for quick access.
        joined_at:
          type: string
          format: date-time
          description: Timestamp when this member joined the channel.
    ChannelMemberListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of members in a channel.
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ChannelMember'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    ChannelMessage:
      type: object
      additionalProperties: false
      description: Message posted in a channel, including sender attribution and rendering
        metadata.
      required:
      - id
      - channel_id
      - sender_type
      - sender_id
      - type
      - content
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this message.
        channel_id:
          type: string
          description: ID of the channel this message was posted in.
        sender_type:
          $ref: '#/components/schemas/ChannelMessageSenderType'
          description: Whether the sender is a human, an agent worker, a bare service account
            credential, or an internal system principal.
        sender_id:
          type: string
          description: Sender user ID. For `sender_type=agent`, this is the agent's backing
            `users.id`, not `agents.id`; for `sender_type=system`, this is the per-org system
            `users.id`.
        sender_session_id:
          type: string
          nullable: true
          description: Live agent session that posted the message, when applicable.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          - blocks
          description: Rendering hint for the UI. `message` — standard chat bubble. `notice`
            — system/informational notice (no attribution). `card` — structured card layout.
            `blocks` — rich content blocks layout.
        type:
          type: string
          description: Dot-namespaced message type identifier, e.g. `user.message`, `ai.response`.
            Used for filtering and display logic.
        content:
          type: string
          description: Message body in Markdown.
        reply_to:
          type: string
          nullable: true
          description: ID of the parent message this reply belongs to, or null when this is
            not a threaded reply.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Free-form metadata attached to the message.
        references:
          type: array
          description: Experimental typed entity links rendered by richer channel clients.
          items:
            $ref: '#/components/schemas/EntityReference'
        attachments:
          type: array
          description: Structured media attachments rendered alongside the message body.
          items:
            $ref: '#/components/schemas/ChannelMessageAttachment'
        file_attachments:
          type: array
          description: Artifact-backed files attached to this message.
          default: []
          maxItems: 10
          items:
            $ref: '#/components/schemas/ChannelMessageFileAttachment'
        unfurls:
          type: array
          description: Server-generated URL preview snapshots for links in the message body.
          items:
            $ref: '#/components/schemas/ChannelMessageUnfurl'
        reactions:
          type: array
          description: Reaction summaries grouped by emoji.
          items:
            $ref: '#/components/schemas/ChannelMessageReactionSummary'
        blocks:
          type: array
          description: Typed rich-content blocks for structured display.
          items:
            $ref: '#/components/schemas/MessageBlock'
        pinned:
          type: boolean
          description: Whether this message is pinned in the channel.
        pinned_by:
          type: string
          nullable: true
          description: User ID of the member who pinned this message, or null when the message
            is not pinned.
        edited_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the message content has been updated after initial send.
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the message has been soft-deleted and should render as a tombstone.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this message was posted.
    ChannelMessageTombstone:
      type: object
      additionalProperties: false
      description: Soft-deleted channel message placeholder returned by delete operations.
      required:
      - id
      - channel_id
      - sender_type
      - sender_id
      - type
      - deleted_at
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this message.
        channel_id:
          type: string
          description: ID of the channel this message was posted in.
        sender_type:
          $ref: '#/components/schemas/ChannelMessageSenderType'
        sender_id:
          type: string
          description: Sender user ID.
        sender_session_id:
          type: string
          nullable: true
          description: Live agent session that posted the message, when applicable.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          - blocks
          description: Rendering hint for the UI.
        type:
          type: string
          description: Dot-namespaced message type identifier.
        content:
          type: string
          nullable: true
          description: Tombstones may include an empty body for clients that expect this field.
        reply_to:
          type: string
          nullable: true
          description: ID of the parent message this reply belongs to, or null when this is
            not a threaded reply.
        deleted_at:
          type: string
          format: date-time
          description: Set when the message was soft-deleted.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this message was posted.
    ChannelMessageAttachment:
      type: object
      additionalProperties: false
      description: Structured non-text payload attached to a channel message.
      required:
      - id
      - kind
      - url
      properties:
        id:
          type: string
          description: Stable attachment identifier within the message.
        kind:
          type: string
          enum:
          - gif
          description: Attachment kind. MB-292 supports animated GIF attachments.
        url:
          type: string
          format: uri
          description: Canonical media URL.
        content_type:
          type: string
          enum:
          - image/gif
          default: image/gif
          description: Media content type.
        title:
          type: string
          description: Optional human label for accessibility and previews.
        provider:
          type: string
          description: Source provider, such as `giphy`.
        preview_url:
          type: string
          format: uri
          description: Optional smaller preview URL.
        source_query:
          type: string
          description: Search query that produced the GIF, if any.
        width:
          type: integer
          minimum: 0
          description: Intrinsic media width in pixels, when known.
        height:
          type: integer
          minimum: 0
          description: Intrinsic media height in pixels, when known.
    CustomEmoji:
      type: object
      additionalProperties: false
      description: Project-scoped custom emoji shortcode.
      required:
      - id
      - shortcode
      - image_url
      - content_type
      - size_bytes
      - animated
      - created_by
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique custom emoji ID.
        shortcode:
          type: string
          description: Shortcode without surrounding colons.
        image_url:
          type: string
          description: Image URL or base64 data URL.
        content_type:
          type: string
          enum:
          - image/png
          - image/jpeg
          - image/webp
          - image/gif
          description: Image content type.
        size_bytes:
          type: integer
          format: int64
          minimum: 0
          description: Original uploaded image size.
        animated:
          type: boolean
          description: True for animated custom emoji, including GIFs.
        created_by:
          type: string
          description: User ID that created the custom emoji.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CustomEmojiListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CustomEmoji'
    CreateCustomEmojiRequest:
      type: object
      additionalProperties: false
      required:
      - shortcode
      - image_url
      - content_type
      - size_bytes
      properties:
        shortcode:
          type: string
          description: Shortcode with or without surrounding colons.
        image_url:
          type: string
          description: Image URL or base64 data URL.
        content_type:
          type: string
          enum:
          - image/png
          - image/jpeg
          - image/webp
          - image/gif
          description: Image content type.
        size_bytes:
          type: integer
          format: int64
          minimum: 0
          description: Original uploaded image size.
        animated:
          type: boolean
          default: false
          description: True for animated custom emoji, including GIFs.
    ChannelMessageUnfurl:
      type: object
      additionalProperties: false
      description: URL preview snapshot generated by the server when a message is posted.
      required:
      - url
      - display_url
      - source
      - status
      - fetched_at
      properties:
        url:
          type: string
          format: uri
          description: Canonical URL found in the message body.
        display_url:
          type: string
          description: Compact URL text suitable for card display.
        title:
          type: string
          description: Preview title from OpenGraph/Twitter metadata or the HTML title.
        description:
          type: string
          description: Preview description from OpenGraph/Twitter metadata or the HTML description.
        site_name:
          type: string
          description: Site name from OpenGraph metadata when available.
        image_url:
          type: string
          format: uri
          description: Preview image URL when a safe public image URL was advertised.
        content_type:
          type: string
          description: Response content type observed while generating the preview.
        source:
          type: string
          enum:
          - external
          - internal
          description: Whether the preview came from an external fetch or an internal Mobius
            resolver.
        status:
          type: string
          enum:
          - resolved
          - blocked
          - unavailable
          description: Preview resolution status. Blocked means the server refused to fetch
            the URL for safety.
        fetched_at:
          type: string
          format: date-time
          description: Timestamp when this preview snapshot was generated.
    ChannelMessageReaction:
      type: object
      additionalProperties: false
      description: One user's persisted emoji reaction on a channel message.
      required:
      - id
      - message_id
      - user_id
      - emoji
      - created_at
      properties:
        id:
          type: string
          description: Unique reaction ID.
        message_id:
          type: string
          description: Message the reaction belongs to.
        user_id:
          type: string
          description: User that added the reaction. Agent reactions use the agent's backing
            user ID.
        emoji:
          type: string
          description: Unicode emoji or custom emoji shortcode.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the reaction was added.
    ChannelMessageReactionSummary:
      type: object
      additionalProperties: false
      description: Read-side grouped reaction data for a message.
      required:
      - emoji
      - count
      - reacted_by_me
      properties:
        emoji:
          type: string
          description: Unicode emoji or custom emoji shortcode.
        count:
          type: integer
          minimum: 0
          description: Number of users with this reaction.
        user_ids:
          type: array
          items:
            type: string
          description: Users that reacted with this emoji.
        reacted_by_me:
          type: boolean
          description: Whether the authenticated caller has this reaction.
    AddChannelMessageReactionRequest:
      type: object
      additionalProperties: false
      required:
      - emoji
      properties:
        emoji:
          type: string
          description: Unicode emoji or custom emoji shortcode to add.
    ChannelMessageListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of channel messages.
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ChannelMessage'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    ShareChannelEntityRequest:
      type: object
      additionalProperties: false
      description: Entity reference and optional message fields for posting a channel card.
      required:
      - reference
      properties:
        reference:
          $ref: '#/components/schemas/EntityReference'
          description: Canonical entity to attach to the channel message.
        content:
          type: string
          description: Optional Markdown fallback body. If omitted, the server derives a short
            label from the reference.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          default: card
          description: Rendering hint for the created channel message.
        type:
          type: string
          description: Optional dot-namespaced message type. If omitted, the server derives
            one from the entity type.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Optional free-form message metadata.
    CreateChannelRequest:
      type: object
      additionalProperties: false
      description: Fields used to create a project channel or direct-message thread.
      required:
      - name
      - display_name
      - kind
      properties:
        name:
          type: string
          description: URL-safe handle, unique within the project. Immutable after creation
            — choose carefully.
        display_name:
          type: string
          description: Human-facing display name shown in the UI.
        topic:
          type: string
          description: Optional channel topic or description.
        kind:
          type: string
          enum:
          - dm
          - channel
          description: Channel kind, either `dm` or `channel`. Cannot be changed after creation.
        private:
          type: boolean
          default: false
          description: When true, the channel is invite-only.
        member_ids:
          type: array
          items:
            type: string
          description: Optional list of `users.id` values to add as members at creation time.
            Agent members use their backing user IDs, not `agents.id`. All receive the `member`
            role; the creator is added as `admin` separately.
        purpose:
          type: string
          enum:
          - general
          - resolve_interactions
          default: general
          description: Optional purpose for the channel.
        associated_interaction_ids:
          type: array
          items:
            type: string
          description: Existing same-project interaction IDs to link as the channel's purpose
            at creation time. Required when `purpose` is `resolve_interactions`.
        completion_behavior:
          allOf:
          - $ref: '#/components/schemas/ChannelCompletionBehavior'
          default: none
        default_notification_level:
          allOf:
          - $ref: '#/components/schemas/ChannelNotificationLevel'
          description: Initial notification default inherited by members added to this channel.
            Defaults to `all` for DMs and `mentions` for channels.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateChannelRequest:
      type: object
      additionalProperties: false
      description: Mutable channel fields.
      properties:
        display_name:
          type: string
          description: Updated display name.
        topic:
          type: string
          description: Updated topic or description.
        agent_instructions:
          type: string
          maxLength: 12000
          description: Replaces the channel's markdown agent instructions. Agents receive
            these instructions on subsequent channel-scoped turns after their org/project
            context and before message-level instructions.
        private:
          type: boolean
          description: Toggle invite-only visibility.
        purpose:
          type: string
          enum:
          - general
          - resolve_interactions
          description: Channel purpose. `resolve_interactions` requires at least one purpose-linked
            interaction.
        completion_behavior:
          $ref: '#/components/schemas/ChannelCompletionBehavior'
        default_notification_level:
          $ref: '#/components/schemas/ChannelNotificationLevel'
          description: Updates the default for future members. Existing member-specific notification
            settings are left unchanged.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the channel. System tags
            (`mobius:*`) are preserved.
    AddChannelMemberRequest:
      type: object
      additionalProperties: false
      description: Member identity and role to add to a channel.
      required:
      - participant_id
      properties:
        participant_id:
          type: string
          description: User ID (`users.id`) to add to the channel. Agent members use their
            backing user ID, not `agents.id`.
        role:
          type: string
          enum:
          - member
          - admin
          default: member
          description: Role to assign the new member, either `member` or `admin`.
    UpdateChannelMemberRequest:
      type: object
      additionalProperties: false
      description: Mutable per-member channel preferences.
      properties:
        notification_level:
          $ref: '#/components/schemas/ChannelNotificationLevel'
          description: Preferred channel notification level.
        muted:
          type: boolean
          description: Deprecated alias for setting `notification_level` to `none` when true
            and `mentions` when false.
        starred:
          type: boolean
          description: Whether this member has starred the channel for quick access.
    AssociateChannelInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - interaction_id
      properties:
        interaction_id:
          type: string
          description: Existing same-project interaction ID to associate.
        relation:
          type: string
          enum:
          - purpose
          - context
          - followup
          default: purpose
          description: Relation between the channel and interaction.
    ChannelInteractionLink:
      type: object
      additionalProperties: false
      required:
      - id
      - channel_id
      - interaction_id
      - relation
      - created_by_user_id
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this association.
        channel_id:
          type: string
          description: Channel ID.
        interaction_id:
          type: string
          description: Interaction ID.
        relation:
          type: string
          enum:
          - purpose
          - context
          - followup
          description: How the interaction is associated with the channel.
        created_by_user_id:
          type: string
          description: User ID that created the association.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the association was created.
    ChannelInteractionLinkListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChannelInteractionLink'
    ChannelMessageDraft:
      type: object
      additionalProperties: false
      description: One user's persisted composer state for a channel or thread.
      required:
      - id
      - channel_id
      - user_id
      - content
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Draft ID.
        channel_id:
          type: string
          description: Channel ID.
        user_id:
          type: string
          description: User ID that owns this private draft.
        content:
          type: string
          description: Draft Markdown body.
        reply_to:
          type: string
          description: Parent message ID when this is a thread-reply draft.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Free-form composer metadata reserved for rich composer state.
        references:
          type: array
          description: Typed entity links selected in the composer.
          items:
            $ref: '#/components/schemas/EntityReference'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ChannelMessageDraftListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChannelMessageDraft'
    UpsertChannelDraftRequest:
      type: object
      additionalProperties: false
      description: Composer state to persist for the authenticated user.
      required:
      - content
      properties:
        content:
          type: string
          description: Draft Markdown body.
        reply_to:
          type: string
          description: Parent message ID when saving a thread-reply draft.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Free-form composer metadata reserved for rich composer state.
        references:
          type: array
          description: Typed entity links selected in the composer.
          items:
            $ref: '#/components/schemas/EntityReference'
    ScheduledChannelMessageStatus:
      type: string
      enum:
      - scheduled
      - sending
      - sent
      - failed
      - canceled
      description: Delivery lifecycle for a scheduled channel message.
    ScheduledChannelMessage:
      type: object
      additionalProperties: false
      description: A user-authored channel message pending future delivery.
      required:
      - id
      - channel_id
      - sender_type
      - sender_id
      - content
      - display
      - type
      - scheduled_at
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Scheduled message ID.
        channel_id:
          type: string
          description: Channel ID.
        sender_type:
          $ref: '#/components/schemas/ChannelMessageSenderType'
        sender_id:
          type: string
          description: User ID that will author the posted message.
        content:
          type: string
          description: Message body in Markdown.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          - blocks
          description: Rendering hint for the eventual message.
        type:
          type: string
          description: Dot-namespaced message type identifier.
        reply_to:
          type: string
          description: Parent message ID for scheduled thread replies.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Free-form metadata to attach to the eventual message.
        references:
          type: array
          description: Typed entity links for card/chip rendering.
          items:
            $ref: '#/components/schemas/EntityReference'
        scheduled_at:
          type: string
          format: date-time
          description: Future send time.
        status:
          $ref: '#/components/schemas/ScheduledChannelMessageStatus'
        failure_message:
          type: string
          description: Delivery failure details visible to the sender.
        sent_message_id:
          type: string
          description: Channel message ID created when delivery succeeds.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ScheduledChannelMessageListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduledChannelMessage'
    ScheduleChannelMessageRequest:
      type: object
      additionalProperties: false
      description: Fields used to defer sending a channel message.
      required:
      - content
      - scheduled_at
      properties:
        content:
          type: string
          description: Message body in Markdown.
        scheduled_at:
          type: string
          format: date-time
          description: Future send time.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          - blocks
          default: message
        type:
          type: string
          default: user.message
        reply_to:
          type: string
          description: Parent message ID for threading.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Free-form metadata to attach to the eventual message.
        references:
          type: array
          items:
            $ref: '#/components/schemas/EntityReference'
    UpdateScheduledChannelMessageRequest:
      type: object
      additionalProperties: false
      description: Mutable fields for an editable scheduled message.
      properties:
        content:
          type: string
          description: Updated Markdown content.
        scheduled_at:
          type: string
          format: date-time
          description: Updated future send time.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Replacement free-form metadata.
        references:
          type: array
          description: Replacement typed entity links.
          items:
            $ref: '#/components/schemas/EntityReference'
    SendChannelMessageRequest:
      type: object
      additionalProperties: false
      description: Fields used to post a new channel message. Sender attribution is determined
        entirely by the authenticated credential and cannot be overridden via this request
        body. At least one of `content`, `blocks`, or `attachments` must be non-empty.
      properties:
        content:
          type: string
          description: Message body in Markdown. Required when `blocks` and `attachments`
            are both empty.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          - blocks
          default: message
          description: 'Rendering hint for the UI: `message`, `notice`, `card`, or `blocks`.'
        type:
          type: string
          default: user.message
          description: Dot-namespaced message type identifier.
        reply_to:
          type: string
          description: Parent message ID for threading (creates a reply).
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Free-form metadata to attach to the message.
        references:
          type: array
          description: Experimental typed entity links for card/chip rendering.
          items:
            $ref: '#/components/schemas/EntityReference'
        attachments:
          type: array
          description: Structured media attachments rendered alongside the message body.
          items:
            $ref: '#/components/schemas/ChannelMessageAttachment'
        file_attachments:
          type: array
          description: Existing shared, pinned artifacts to attach to this message.
          default: []
          maxItems: 10
          items:
            $ref: '#/components/schemas/ChannelMessageFileAttachmentInput'
        blocks:
          type: array
          description: Typed rich-content blocks. At most 20. Validated server-side.
          items:
            $ref: '#/components/schemas/MessageBlock'
    UpdateChannelMessageRequest:
      type: object
      additionalProperties: false
      description: Mutable fields for an existing channel message.
      properties:
        content:
          type: string
          description: Updated Markdown content. Sets `edited_at` on the message.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Replacement free-form metadata for the message.
        references:
          type: array
          description: Replacement typed entity links for card/chip rendering.
          items:
            $ref: '#/components/schemas/EntityReference'
        attachments:
          type: array
          description: Replacement structured media attachments. Send an empty array to remove
            attachments.
          items:
            $ref: '#/components/schemas/ChannelMessageAttachment'
        blocks:
          type: array
          description: Replacement typed rich-content blocks. At most 20. Validated server-side.
          items:
            $ref: '#/components/schemas/MessageBlock'
        pinned:
          type: boolean
          description: Pin or unpin the message. Sets/clears `pinned_by`.
    MarkChannelMessagesReadRequest:
      type: object
      additionalProperties: false
      description: Body for `POST /v1/projects/{project}/channels/{id}/read`. When omitted,
        the read cursor advances to the channel's latest message.
      properties:
        up_to_message_id:
          type: string
          description: Message ID to advance the read cursor to. Must belong to this channel.
            Omit to advance to the channel's latest message.
    OpenDirectMessageRequest:
      type: object
      additionalProperties: false
      description: Request body for the idempotent open-DM endpoint.
      required:
      - participant_id
      properties:
        participant_id:
          type: string
          description: User ID (`users.id`) of the other DM participant. Agent participants
            use their backing user ID, not `agents.id`.
        display_name:
          type: string
          description: Human-facing display name for the channel. Defaults to the participant's
            name or ID when omitted. Only used on creation; ignored when an existing channel
            is returned.
    MessageBlock:
      type: object
      additionalProperties: false
      description: A typed rich-content block carried by a channel message.
      required:
      - type
      properties:
        type:
          type: string
          description: Block type identifier (e.g. "header", "table", "badge_row", "artifact_ref").
        version:
          type: integer
          description: Catalog version at authoring time. Defaults to the server's current
            version for that block type when omitted.
        config:
          type: object
          additionalProperties: true
          description: Type-specific configuration object, validated server-side by the BlockCatalog.
    MessageBlockCatalogEntry:
      type: object
      additionalProperties: false
      description: Describes one block type the server can validate and render.
      required:
      - type
      - label
      - description
      - version
      properties:
        type:
          type: string
        label:
          type: string
        description:
          type: string
        version:
          type: integer
    MessageBlockCatalogResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MessageBlockCatalogEntry'
    ArtifactStorageBackend:
      type: string
      enum:
      - mobius
      - s3
    APIKey:
      type: object
      additionalProperties: false
      description: Stored API credential metadata for automation and service access. The raw
        secret is never returned here; use this object to list, audit, expire, or identify
        keys by prefix without exposing tokens.
      required:
      - id
      - name
      - key_prefix
      - project_id
      - service_account_id
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this API key.
        name:
          type: string
          description: Human-readable label, unique within the project.
        key_prefix:
          type: string
          description: First 8 characters of the key, used to identify it without exposing
            the secret.
        project_id:
          $ref: '#/components/schemas/ProjectID'
          description: Project that owns the service account this key authenticates as.
        service_account_id:
          type: string
          description: Service account this key authenticates as.
        expires_at:
          type: string
          format: date-time
          description: Hard expiry timestamp. Requests using an expired key receive 401.
        last_used_at:
          type: string
          format: date-time
          description: Timestamp of the most recent authenticated request using this key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this API key.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this key was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this key was last updated.
    APIKeyCreateResult:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - key_prefix
      - project_id
      - service_account_id
      - created_at
      - updated_at
      - key
      description: Returned only on key creation. Contains the raw `key` value which is not
        retrievable after this response.
      properties:
        id:
          type: string
          description: Unique identifier for the created API key.
        name:
          type: string
          description: Human-readable name for the key.
        key_prefix:
          type: string
          description: First 8 characters of the key for identification.
        project_id:
          $ref: '#/components/schemas/ProjectID'
          description: Project that owns the service account this key authenticates as.
        service_account_id:
          type: string
          description: Service account this key authenticates as.
        expires_at:
          type: string
          format: date-time
          description: Timestamp when this key expires. Omitted if it does not expire.
        last_used_at:
          type: string
          format: date-time
          description: Timestamp of the most recent authenticated request using this key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this API key.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this key was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this key was last updated.
        key:
          type: string
          description: The raw API key. Returned only once at creation — store it securely
            immediately.
    APIKeyListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/APIKey'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateAPIKeyRequest:
      type: object
      required:
      - name
      - project_id
      - service_account_id
      additionalProperties: false
      description: Request shape for creating a project API key for a service account. The
        key authenticates as that service account; permissions are managed by assigning roles
        to the service account, not by granting permissions to the key.
      properties:
        name:
          type: string
          description: Human-readable label, unique within the project.
        project_id:
          $ref: '#/components/schemas/ProjectID'
          description: Project that owns both the service account and the new key.
        service_account_id:
          type: string
          description: Service account this key authenticates as.
        expires_at:
          type: string
          format: date-time
          description: Optional hard expiry. Omit for a non-expiring key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    WorkflowExpressionValidationMode:
      type: string
      description: '`template` validates strings that may contain `${...}` tokens. `expression`
        validates a bare expression or predicate without `${...}` wrapping.'
      enum:
      - template
      - expression
    WorkflowExpressionValidationItem:
      type: object
      additionalProperties: false
      required:
      - id
      - expression
      properties:
        id:
          type: string
          description: Client-generated stable field identifier returned with diagnostics.
          maxLength: 256
        expression:
          type: string
          description: Expression or template text to validate.
          maxLength: 16384
        mode:
          $ref: '#/components/schemas/WorkflowExpressionValidationMode'
    ValidateWorkflowExpressionsRequest:
      type: object
      additionalProperties: false
      required:
      - expressions
      properties:
        expressions:
          type: array
          description: Expression batch. The server validates each item independently.
          maxItems: 200
          items:
            $ref: '#/components/schemas/WorkflowExpressionValidationItem'
    WorkflowExpressionDiagnosticError:
      type: object
      additionalProperties: false
      required:
      - message
      properties:
        message:
          type: string
        start:
          type: integer
          minimum: 0
          description: Optional zero-based character offset when known.
        end:
          type: integer
          minimum: 0
          description: Optional exclusive character offset when known.
    WorkflowExpressionDiagnostic:
      type: object
      additionalProperties: false
      required:
      - id
      - errors
      properties:
        id:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowExpressionDiagnosticError'
    WorkflowExpressionValidationResponse:
      type: object
      additionalProperties: false
      required:
      - diagnostics
      properties:
        diagnostics:
          type: array
          description: Diagnostics for invalid expressions. Valid expressions are omitted.
          items:
            $ref: '#/components/schemas/WorkflowExpressionDiagnostic'
    WorkflowSpec:
      type: object
      required:
      - name
      oneOf:
      - required:
        - steps
      - required:
        - code
      description: |-
        Workflow definition shaped like `workflow.Options`.

        A workflow is **either** a spec-step DAG or a code workflow:

        * Spec-step workflows declare `steps: [...]` (with optional
        `start_at`). Each step is a worker-action, server-action,
        wait, join, or other declarative construct.
        * Code workflows declare `code: { handler, runtime?, queue? }`
        and no `steps`. The handler's runtime control flow replaces
        the step graph; durable sub-steps are executed via the SDK's
        `step.run` / `step.waitFor*` helpers and recorded against the
        run ledger.

        Exactly one of `steps` or `code` must be set; setting both, or neither, is rejected by the schema's `oneOf` constraint.

        Authoring rule for spec-step workflows: `action` is the canonical field for executable steps. The engine routes each action step to the right executor based on the action's registered `runs_on` metadata — there is no author-side kind hint. Platform-owned actions are claimed by the in-daemon worker pool; customer- registered actions are claimed by the customer's deployed workers over the standard `/v1/.../jobs/claim` surface.
      additionalProperties: false
      properties:
        name:
          type: string
          description: Workflow name.
        description:
          type: string
          description: Optional description of the workflow's purpose.
        start_at:
          type: string
          description: 'Spec-step workflows: step name to start execution from. Defaults to
            the first step. Ignored for code workflows.'
        inputs:
          type: array
          description: Declared input parameters accepted by this workflow.
          items:
            $ref: '#/components/schemas/WorkflowInput'
        outputs:
          type: object
          description: Declared terminal contract. Compact values are expressions; long-form
            values may include value/schema/description.
          additionalProperties:
            $ref: '#/components/schemas/WorkflowOutput'
        steps:
          type: array
          description: Ordered list of steps that make up a spec-step workflow. Mutually exclusive
            with `code`.
          items:
            $ref: '#/components/schemas/WorkflowStep'
        code:
          $ref: '#/components/schemas/WorkflowCodeSpec'
          description: Configuration for a code workflow. Mutually exclusive with `steps`.
            The worker invokes the registered handler whose runtime control flow drives the
            run.
    WorkflowInput:
      type: object
      description: Declares one named input accepted by a workflow spec.
      required:
      - name
      - type
      additionalProperties: false
      properties:
        name:
          type: string
          description: Input parameter name referenced in step expressions.
        type:
          type: string
          description: Data type of the input (e.g. string, integer, boolean, object).
        description:
          type: string
          description: Human-readable description of this input parameter.
        default:
          description: Optional default value.
    WorkflowOutput:
      description: Declares one output value produced by a workflow spec.
      oneOf:
      - type: string
        description: Compact expression form, e.g. `${steps.summarize.result.text}`.
      - type: object
        required:
        - value
        additionalProperties: false
        properties:
          value:
            description: Expression or literal output value.
          schema:
            type: object
            additionalProperties: true
            description: Optional JSON Schema for this output.
          description:
            type: string
            description: Human-readable description of this output value.
    WorkflowStep:
      description: 'A workflow step. Exactly one step shape should be used. Step variants
        are identified either by `kind` or by their distinctive required property (`action`,
        `each`, `type: set`, `join`, `wait`, `react`, `wait_until`, `sleep`, `pause`, or `interaction`).
        If `kind` is omitted and `action` is present, Mobius infers `kind: action`. Code workflows
        do not use `WorkflowStep`; see `WorkflowSpec.code`.'
      oneOf:
      - $ref: '#/components/schemas/WorkflowExecutableStep'
      - $ref: '#/components/schemas/WorkflowAgentInvokeStep'
      - $ref: '#/components/schemas/WorkflowEachStep'
      - $ref: '#/components/schemas/WorkflowSetStep'
      - $ref: '#/components/schemas/WorkflowJoinStep'
      - $ref: '#/components/schemas/WorkflowJoinKindStep'
      - $ref: '#/components/schemas/WorkflowWaitStep'
      - $ref: '#/components/schemas/WorkflowWaitKindStep'
      - $ref: '#/components/schemas/WorkflowReactStep'
      - $ref: '#/components/schemas/WorkflowReactKindStep'
      - $ref: '#/components/schemas/WorkflowWaitUntilStep'
      - $ref: '#/components/schemas/WorkflowWaitUntilKindStep'
      - $ref: '#/components/schemas/WorkflowSleepStep'
      - $ref: '#/components/schemas/WorkflowSleepKindStep'
      - $ref: '#/components/schemas/WorkflowPauseStep'
      - $ref: '#/components/schemas/WorkflowPauseKindStep'
      - $ref: '#/components/schemas/WorkflowInteractionStep'
      - $ref: '#/components/schemas/WorkflowInteractionKindStep'
    WorkflowStepLayout:
      type: object
      additionalProperties: false
      description: Optional presentation hint for the visual editor. Ignored by the execution
        engine; when absent, editors auto-lay out the step.
      properties:
        x:
          type: number
          description: Horizontal position of the step in the editor canvas.
        y:
          type: number
          description: Vertical position of the step in the editor canvas.
    WorkflowExecutableStep:
      type: object
      description: 'Executes a catalog action and exposes its result at `steps.<name>.result`.
        `kind: action` is optional when `action` is present.'
      additionalProperties: false
      required:
      - name
      - action
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        kind:
          type: string
          enum:
          - action
          description: Optional explicit step kind. Omit this when the `action` shorthand
            is clearer.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated when more than one edge
            matches.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        action:
          type: string
          description: Canonical executable-step field. The engine resolves the execution
            domain (platform pool vs. customer worker) from the action's registered `runs_on`
            metadata, not from any step field.
        bind:
          type: object
          additionalProperties:
            type: string
          description: Optional writes to top-level `vars.*` keys, evaluated after the step
            completes. Targets must look like `vars.foo`.
        parameters:
          type: object
          additionalProperties: true
          description: Legacy input parameters passed to the action. Prefer `with` for new
            YAML.
        with:
          type: object
          additionalProperties: true
          description: Preferred input object passed to the action, supporting expression
            interpolation.
        retry:
          type: array
          description: Retry policies applied when the action fails.
          items:
            $ref: '#/components/schemas/WorkflowRetry'
        catch:
          type: array
          description: Error catch clauses that redirect execution on specific failures.
          items:
            $ref: '#/components/schemas/WorkflowCatch'
      example:
        name: summarize
        action: summarize-document
        parameters:
          doc_id: ${inputs.doc_id}
    WorkflowAgentInvokeStep:
      type: object
      description: First-class authored `agent.invoke` step. It asks an agent to take one
        turn and exposes the response at `steps.<name>.result`. Internally this compiles to
        the `agent.invoke` catalog action/job.
      additionalProperties: false
      required:
      - name
      - kind
      - with
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        kind:
          type: string
          enum:
          - agent.invoke
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
        with:
          $ref: '#/components/schemas/WorkflowAgentInvokeConfig'
        bind:
          type: object
          additionalProperties:
            type: string
          description: Optional writes to top-level `vars.*` keys, evaluated after the step
            completes. Targets must look like `vars.foo`.
        retry:
          type: array
          description: Retry policies applied when the agent.invoke job fails.
          items:
            $ref: '#/components/schemas/WorkflowRetry'
        catch:
          type: array
          description: Error catch clauses that redirect execution when agent.invoke fails.
          items:
            $ref: '#/components/schemas/WorkflowCatch'
    WorkflowEachStep:
      type: object
      description: Runs one action once per item in a fan-out collection.
      additionalProperties: false
      required:
      - name
      - action
      - each
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after all fan-out items
            complete.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the fan-out completes.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        action:
          type: string
          description: Action to run once per item.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Fan-out configuration that supplies the collection and optional item
            alias.
        bind:
          type: object
          additionalProperties:
            type: string
          description: Optional writes to top-level `vars.*` keys after each item result is
            available.
        parameters:
          type: object
          additionalProperties: true
          description: Legacy input parameters passed to each action invocation. Prefer `with`
            for new YAML.
        with:
          type: object
          additionalProperties: true
          description: Preferred input object passed to each action invocation, supporting
            expression interpolation over `each`.
        retry:
          type: array
          description: Retry policies applied when an item action fails.
          items:
            $ref: '#/components/schemas/WorkflowRetry'
        catch:
          type: array
          description: Error catch clauses that redirect execution when an item action fails.
          items:
            $ref: '#/components/schemas/WorkflowCatch'
      example:
        name: comment-on-issues
        action: github.issue.comment
        each:
          items: ${inputs.issues}
          as: issue
        parameters:
          issue_number: ${each.issue.number}
          body: Reviewed by Mobius
    WorkflowSetStep:
      type: object
      description: Binds one or more top-level vars and produces the bound object as this
        step's result.
      additionalProperties: false
      required:
      - name
      - type
      - vars
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        type:
          type: string
          enum:
          - set
        description:
          type: string
        next:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
        vars:
          type: object
          minProperties: 1
          additionalProperties: true
          description: 'Bindings keyed by top-level vars key. `repo: ${steps.fetch.result}`
            writes `vars.repo`.'
    WorkflowJoinStep:
      type: object
      description: Waits for one or more parallel branches before continuing.
      additionalProperties: false
      required:
      - name
      - join
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the join completes.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        join:
          $ref: '#/components/schemas/WorkflowJoinConfig'
          description: Branches, count, and branch result mappings used by the join.
    WorkflowJoinKindStep:
      type: object
      description: Canonical authored join step using `kind` and `with`.
      additionalProperties: false
      required:
      - name
      - kind
      - with
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        kind:
          type: string
          enum:
          - join
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the join completes.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        with:
          $ref: '#/components/schemas/WorkflowJoinConfig'
          description: Branches, count, and branch result mappings used by the join.
    WorkflowWaitStep:
      type: object
      description: Suspends a branch on a typed Subject subscription (RFC 064). Resumes on
        the first matching delivery, or on the first complete batch when `wait.batch` is set.
        One-shot — for a durable subscription that loops per delivery, use `react`.
      additionalProperties: false
      required:
      - name
      - wait
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after the delivery arrives.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the delivery arrives.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        wait:
          $ref: '#/components/schemas/WorkflowWaitConfig'
          description: Subject, timeout, and optional batching for this suspension.
    WorkflowWaitKindStep:
      type: object
      description: Canonical authored wait step using `kind` and `with`.
      additionalProperties: false
      required:
      - name
      - kind
      - with
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        kind:
          type: string
          enum:
          - wait
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after the delivery arrives.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the delivery arrives.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        with:
          $ref: '#/components/schemas/WorkflowWaitConfig'
          description: Subject, timeout, and optional batching for this suspension.
    WorkflowReactStep:
      type: object
      description: First-class agent-reactor step (RFC 064). Suspends on a durable Subject
        subscription, drains an optional batch, then emits an `agent.invoke` job for the configured
        agent turn. For event subjects the subscription persists across agent turns so events
        arriving while the agent is busy are delivered at the next loop iteration.
      additionalProperties: false
      required:
      - name
      - react
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after the agent turn
            completes.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the agent turn completes.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        react:
          $ref: '#/components/schemas/WorkflowReactConfig'
          description: Subscription, batching, and agent invocation settings for this reactive
            step.
        bind:
          type: object
          additionalProperties:
            type: string
          description: Optional writes to top-level `vars.*` keys, evaluated after the step
            completes. Targets must look like `vars.foo`.
        retry:
          type: array
          description: Retry policies applied when the emitted agent.invoke job fails.
          items:
            $ref: '#/components/schemas/WorkflowRetry'
        catch:
          type: array
          description: Error catch clauses that redirect execution when the emitted agent.invoke
            job fails.
          items:
            $ref: '#/components/schemas/WorkflowCatch'
    WorkflowReactKindStep:
      type: object
      description: Canonical authored react step using `kind` and `with`.
      additionalProperties: false
      required:
      - name
      - kind
      - with
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        kind:
          type: string
          enum:
          - react
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after the agent turn
            completes.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
        with:
          $ref: '#/components/schemas/WorkflowReactConfig'
          description: Subscription, batching, and agent invocation settings for this reactive
            step.
        bind:
          type: object
          additionalProperties:
            type: string
          description: Optional writes to top-level `vars.*` keys, evaluated after the step
            completes. Targets must look like `vars.foo`.
        retry:
          type: array
          description: Retry policies applied when the emitted agent.invoke job fails.
          items:
            $ref: '#/components/schemas/WorkflowRetry'
        catch:
          type: array
          description: Error catch clauses that redirect execution when the emitted agent.invoke
            job fails.
          items:
            $ref: '#/components/schemas/WorkflowCatch'
    WorkflowWaitUntilStep:
      type: object
      description: Polls project or external state until a strict boolean condition evaluates
        true, suspending the run durably between checks.
      additionalProperties: false
      required:
      - name
      - wait_until
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after the condition
            passes.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the condition passes.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        wait_until:
          $ref: '#/components/schemas/WorkflowWaitUntilConfig'
          description: Poll/observable source, condition, timeout, and timeout routing.
    WorkflowWaitUntilKindStep:
      type: object
      description: Canonical authored wait-until step using `kind` and `with`.
      additionalProperties: false
      required:
      - name
      - kind
      - with
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        kind:
          type: string
          enum:
          - wait_until
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after the condition
            passes.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the condition passes.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        with:
          $ref: '#/components/schemas/WorkflowWaitUntilConfig'
          description: Poll/observable source, condition, timeout, and timeout routing.
    WorkflowSleepStep:
      type: object
      description: Suspends a branch for a fixed duration before continuing.
      additionalProperties: false
      required:
