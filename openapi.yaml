  /v1/projects/{project_handle}/sessions/{session_id}/stream:
    get:
      operationId: streamSession
      tags:
      - sessions
      summary: Stream a session's activity
      description: |-
        Opens a long-lived Server-Sent Events stream that is a live view over the session's one durable conversation log (its transcript messages). It is the single streaming surface for a session.

        The transcript messages with `sequence > after_sequence` are replayed first — covering any turn that committed between the client's last read and the stream open — then the in-flight turn is tailed live. Each committed message is framed as `event: <type>` (`user.message`, `agent.message`, or the non-terminal `compaction.created`) with a `data:` line carrying the message payload and an `id:` line carrying the message `sequence`. The cursor is therefore the same `sequence` the messages API uses: reconnect with `?after_sequence=N` (or the `Last-Event-ID` header) to resume exactly where you left off, with no separate event cursor.

        The stream follows the session's active turn and closes once the session is idle — no queued or running turn — after the active turn's committed rows and a terminal `turn.completed` / `turn.failed` / `turn.cancelled` frame have been delivered. A later turn is a new activity tail; open a new stream for it or use the streaming `POST .../turns` response.

        Live-only `generation.delta`, `session.message.preview`, `session.resync`, `tool.call`, and `tool.result` frames carry no `id:`, are interleaved best-effort for low-latency rendering, and are never persisted or replayed — on reconnect the durable message frames are the source of truth.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/SessionIdParam'
      - $ref: '#/components/parameters/AfterSequenceParam'
      - $ref: '#/components/parameters/LastEventIDParam'
      responses:
        '200':
          description: 'A Server-Sent Events stream of session activity. Each frame is `event:
            <event type>` followed by a `data:` line carrying the JSON-encoded payload. Durable
            message frames carry an `id:` line with the message `sequence` for `Last-Event-ID`
            resume; live-only frames (`generation.delta`, `session.message.preview`, `session.resync`,
            `tool.call`, `tool.result`) do not carry `id:` and cannot be replayed.'
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SessionStreamFrame'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project_handle}/sessions/{session_id}/cancel:
    post:
      operationId: cancelSession
      tags:
      - sessions
      summary: Cancel the session's active turn
      description: |-
        Idempotently cancels active dispatcher-owned turns in the session and retires their pending waits, interactions, nudges, and jobs. Each turn's terminal `turn.cancelled` transition is emitted once. Cancellation is cooperative and does not roll back effects that already happened. Committed transcript rows remain; live-only preview content is discarded. Cancelled turns cannot be resumed, and stream cursors resume observation only. Returns the updated session. Requires the `mobius.agent.invoke` permission (or the agent's own backing principal).

        By default loop-owned turns are left to the loop engine and skipped. Set `force=true` to also cancel loop-owned turns — the recovery path for a session wedged on a turn whose run is dead or stuck. Forcing may leave that run inconsistent, so use it only to unlock an otherwise stuck session, not as a routine stop.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/SessionIdParam'
      - name: force
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: When true, also cancel loop-owned turns to unlock a wedged session. Use
          only for recovery; the owning run may be left inconsistent.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project_handle}/sessions/{session_id}/compact:
