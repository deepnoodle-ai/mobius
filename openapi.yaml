              signal_name: manager_approval
              target_user_ids:
              - user_2f9s3k4m5n6p7q8r
              kind: request_approval
              title: Approve publishing the April billing report?
              context:
                report_id: rpt_2026_04
                amount_usd: 12850
              spec:
                mode: confirm
                default_confirmed: false
              require_all: false
              expires_at: '2026-04-25T14:30:00Z'
