    SpanKind:
      type: string
      description: Mirrors the OpenTelemetry `SpanKind` enum. Stored lowercase.
      enum:
      - internal
      - client
      - server
      - producer
      - consumer
    SpanStatusCode:
      type: string
      description: Mirrors the OpenTelemetry `Status.code` enum.
      enum:
      - unset
      - ok
      - error
    SpanEvent:
      type: object
      description: One entry in the span's `events` array.
      additionalProperties: false
      required:
      - name
      - time
      properties:
        name:
          type: string
        time:
          type: string
          format: date-time
        attributes:
          type: object
          additionalProperties: true
    SpanLink:
      type: object
      description: One entry in the span's `links` array.
      additionalProperties: false
      required:
      - trace_id
      - span_id
      properties:
        trace_id:
          type: string
        span_id:
          type: string
        attributes:
          type: object
          additionalProperties: true
    Span:
      type: object
      description: Domain projection of one persisted OTLP span. Linkage fields (`run_id`,
        `step_id`, `job_id`, `agent_id`, `service_account_id`) are resolved at ingest time
        from semantic-convention attributes and may be absent when no Mobius entity could
        be matched.
      additionalProperties: false
      required:
      - id
      - org_id
      - project_id
      - trace_id
      - span_id
      - name
      - kind
      - operation_name
      - scope_name
      - service_name
      - started_at
      - status
      - created_at
      properties:
        id:
          type: string
          description: Mobius span row identifier (TypeID, prefix `span_`).
        org_id:
          type: string
        project_id:
          type: string
        run_id:
          type: string
        step_id:
          type: string
        job_id:
          type: string
        agent_id:
          type: string
        service_account_id:
          type: string
        trace_id:
          type: string
          description: Hex-encoded 16-byte OTel trace ID.
        span_id:
          type: string
          description: Hex-encoded 8-byte OTel span ID.
        parent_span_id:
          type: string
          description: Parent span ID, omitted for trace roots.
        name:
          type: string
        kind:
          $ref: '#/components/schemas/SpanKind'
        operation_name:
          type: string
          description: Normalized OTel semconv operation name.
        scope_name:
          type: string
          description: OTel instrumentation scope name.
        service_name:
          type: string
          description: OTel `service.name` resource attribute.
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          description: Omitted while the span is still in flight.
        duration_ms:
          type: integer
          format: int64
          description: Convenience derived value (`ended_at - started_at` in milliseconds).
            Emitted as `-1` when `ended_at` is absent.
        status:
          $ref: '#/components/schemas/SpanStatusCode'
        status_message:
          type: string
        attributes:
          type: object
          additionalProperties: true
        events:
          type: array
          items:
            $ref: '#/components/schemas/SpanEvent'
        links:
          type: array
          items:
            $ref: '#/components/schemas/SpanLink'
        created_at:
          type: string
          format: date-time
    SpanListResponse:
      type: object
      description: Paginated span list.
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Span'
        has_more:
          type: boolean
        next_cursor:
          type: string
          description: Opaque cursor for fetching the next page. Present only when `has_more`
            is true.
    SpanCounts:
      type: object
      description: Aggregate breakdown of spans within some scope. Used both by per-step badges
        on the run timeline and by trace summary cards on Trace tabs.
      additionalProperties: false
      required:
      - total
      - llm_calls
      - tool_calls
      - errors
      properties:
        total:
          type: integer
          description: Total span count (all kinds).
        llm_calls:
          type: integer
          description: Spans whose `operation_name` indicates an LLM call (`chat`, `text_completion`,
            `generate_content`, `embeddings`).
        tool_calls:
          type: integer
          description: Spans whose `operation_name` is `execute_tool`.
        errors:
          type: integer
          description: Spans whose status code is `error`.
    StepSpanCountsResponse:
      type: object
      description: Map of step_id → SpanCounts.
      additionalProperties: false
      required:
      - counts
      properties:
        counts:
          type: object
          description: Keys are run step IDs.
          additionalProperties:
            $ref: '#/components/schemas/SpanCounts'
    TraceLinkages:
      type: object
      description: Anchor Mobius entities for the trace summary card — at most one of each
        dimension. Resolved as the first non-empty value across the trace's spans (sorted
        by `started_at`), so traces that span multiple steps, jobs, or agents will surface
        the earliest one here. The full multi-entity set is recoverable from the underlying
        `Span.{run,step,job,agent}_id` fields when needed. Free-floating traces have no fields
        set.
      additionalProperties: false
      properties:
        run_id:
          type: string
        step_id:
          type: string
        job_id:
          type: string
        agent_id:
          type: string
    TraceSummary:
      type: object
      description: One trace's summary card on a TraceList. The summary is computed in the
        API layer by aggregating spans for the trace.
      additionalProperties: false
      required:
      - trace_id
      - root_name
      - started_at
      - duration_ms
      - span_count
      - status
      properties:
        trace_id:
          type: string
        root_name:
          type: string
          description: Display name for the card. Resolved from the trace's root span when
            one is present, otherwise from the earliest span by `started_at`.
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          description: Latest `ended_at` across the trace's spans, when present.
        duration_ms:
          type: integer
          format: int64
          description: '`ended_at - started_at` in milliseconds, or `-1` when at least one
            span in the trace is still in flight.'
        span_count:
          type: integer
        llm_call_count:
          type: integer
        tool_call_count:
          type: integer
        error_count:
          type: integer
        status:
          $ref: '#/components/schemas/SpanStatusCode'
        service_names:
          type: array
          description: Distinct `service.name` values represented in the trace.
          items:
            type: string
        linked:
          $ref: '#/components/schemas/TraceLinkages'
    TraceListResponse:
      type: object
      description: Paginated list of trace summary cards.
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TraceSummary'
        has_more:
          type: boolean
        next_cursor:
          type: string
    TraceDetail:
      type: object
