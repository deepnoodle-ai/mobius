    ActionAnnotationsRequest:
      type: object
      additionalProperties: false
      description: Request hints that describe the safe-use properties of the action. Used
        by the engine and tooling to decide retry behavior, dry-run eligibility, etc. Unknown
        request properties are rejected.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    ActionAnnotations:
      type: object
      additionalProperties: true
      description: Response hints that describe the safe-use properties of the action. Response
        annotations are forward-compatible so the server can add response-only hints without
        breaking strict clients.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    ActionEndpointKind:
      type: string
      enum:
      - http
      - worker
      description: Backing kind for a project-owned custom action. `http` actions POST to
        a registered endpoint. `worker` actions dispatch jobs to connected workers that advertise
        the registered action name.
    CreateActionRequest:
      type: object
      additionalProperties: false
      description: Registers a project-owned custom action callable from loops and agents.
      required:
      - name
      properties:
        name:
          type: string
          description: Identifier used in loop step definitions. Lowercase alphanumeric +
            hyphens, e.g. "send-email". Must be unique within the project. Cannot start with
            "mobius." (reserved prefix).
        title:
          type: string
          description: Human-readable display name shown in the UI and catalog.
        description:
          type: string
          description: Markdown-safe description of what the action does.
        endpoint_kind:
          type: string
          allOf:
          - $ref: '#/components/schemas/ActionEndpointKind'
          default: http
          description: Backing kind for the action. `http` actions POST to `endpoint_url`
            with a Mobius signature. `worker` actions are dispatched through jobs to connected
            workers that advertise this registered name.
        endpoint_url:
          type: string
          format: uri
          description: Required when endpoint_kind is `http`; omitted for worker actions.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsRequest'
          description: Safe-use hints used by execution and authoring tools.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Free-form labels used for filtering, ownership, or lifecycle policy.
      example:
        name: review-pr
        title: Review PR
        description: Review a pull request and return findings.
        endpoint_kind: http
        endpoint_url: https://hooks.example.com/mobius/review-pr
        input_schema:
          type: object
          required:
          - pull_request_url
          properties:
            pull_request_url:
              type: string
        output_schema:
          type: object
          properties:
            findings:
              type: array
              items:
                type: string
        annotations:
          idempotent: true
          destructive: false
          read_only: true
        tags:
          owner: product
    UpdateActionRequest:
      type: object
      additionalProperties: false
      description: Updates action metadata, endpoint, schemas, or safe-use hints.
      properties:
        title:
          type: string
          description: Replacement display title.
        description:
          type: string
          description: Replacement Markdown description.
        endpoint_url:
          type: string
          format: uri
          description: Replacement endpoint URL. Valid for HTTP actions only.
        input_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for inputs. Replaces the existing schema.
        output_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for outputs. Replaces the existing schema.
        annotations:
          type: object
          allOf:
          - $ref: '#/components/schemas/ActionAnnotationsRequest'
          nullable: true
          description: Pass null to clear all annotation flags.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Replacement labels; send an empty object to clear all tags.
    Action:
