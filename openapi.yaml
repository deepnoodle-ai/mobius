        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createTrigger
      tags:
      - triggers
      summary: Create a trigger
      description: 'Creates a trigger. `source_config` must match `kind`: a `ScheduleSourceConfig`
        for schedule, a `WebhookSourceConfig` for webhook, an `EventSourceConfig` for event.
        For webhook triggers, `source_config.handle` is auto-derived from `name` when omitted
        and must be unique within the project; the `receive_url` for posting events is returned
        on the response''s `source_config`.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTriggerRequest'
            examples:
              webhook:
                summary: Webhook trigger
                value:
                  name: Billing report webhook
                  kind: webhook
                  source_config:
                    handle: billing-report
                    signing_secret: whsec_0123456789abcdef
                  targets:
                  - workflow_id: wf_01hw1p4a5b6c7d8e9f0g1h2j3k
                    condition: $.event.type == 'billing.report.ready'
                    input_mapping:
                      report_id: $.event.report_id
                      account_id: $.event.account_id
                    enabled: true
                  concurrency_policy: forbid
                  enabled: true
              schedule:
                summary: Schedule trigger
                value:
                  name: Weekday billing sweep
                  kind: schedule
                  source_config:
                    cron: 0 9 * * 1-5
                  targets:
                  - workflow_id: wf_01hw1p4a5b6c7d8e9f0g1h2j3k
                  concurrency_policy: forbid
                  enabled: true
              event:
                summary: Platform event trigger
                value:
                  name: Run completion audit
                  kind: event
                  source_config:
                    event_type: run.completed
                  targets:
                  - workflow_id: wf_01hw1p4a5b6c7d8e9f0g1h2j3k
                    input_mapping:
                      run_id: $.event.run_id
                  enabled: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trigger'
              example:
                id: trg_01hw1s2t3u4v5w6x7y8z9a0b1c
                name: Billing report webhook
                kind: webhook
                source_config:
                  handle: billing-report
                  receive_url: https://api.mobiusops.ai/v1/projects/claims/triggers/webhook/billing-report
                targets:
                - id: trgt_01hw1s4d5e6f7g8h9j0k1m2n3p
                  trigger_id: trg_01hw1s2t3u4v5w6x7y8z9a0b1c
                  workflow_id: wf_01hw1p4a5b6c7d8e9f0g1h2j3k
                  condition: $.event.type == 'billing.report.ready'
                  input_mapping:
                    report_id: $.event.report_id
                    account_id: $.event.account_id
                  enabled: true
                  created_at: '2026-04-24T14:35:00Z'
                  updated_at: '2026-04-24T14:35:00Z'
                concurrency_policy: forbid
                enabled: true
                created_by: user_2f9s3k4m5n6p7q8r9s0t1u2v3w
                created_at: '2026-04-24T14:35:00Z'
                updated_at: '2026-04-24T14:35:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
