      description: Anthropic Messages API-compatible route. This exists so the official Anthropic
        client can be pointed at Mobius by setting its base URL to the Mobius API origin and
        using a project-pinned Mobius API key as `x-api-key`. The response is the raw Anthropic-compatible
        message object, not wrapped in a Mobius `data` envelope.
