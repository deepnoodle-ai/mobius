      - runs
      summary: List the steps of an automation run
      description: Returns the durable step records for one run, ordered by step index. Each
        row carries the step's kind, status, attempt count, inputs, result, and any error
        metadata recorded by the engine.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRunStepListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/runs/{id}/events:
    get:
      operationId: listRunEvents
      tags:
      - runs
      summary: List run events
      description: Returns the durable run-event log used by clients (UI, SDK, integrations)
        to observe a run as it progresses. Events are ordered by sequence number and cover
        run, step, turn, tool, action, artifact, and cleanup lifecycle. Use `since_sequence`
        to fetch only events strictly after a previously observed sequence number, which is
        the standard polling pattern paired with the SSE stream.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: since_sequence
        in: query
        description: Return events with sequence > since_sequence.
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRunEventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/runs/{id}/events.stream:
    get:
      operationId: streamRunEvents
      tags:
      - runs
      summary: Stream run events over Server-Sent Events
      description: Long-lived SSE stream of run events ordered by sequence number. Each `data:`
        frame is a JSON-encoded `AutomationRunEvent`. The stream terminates when the run reaches
        a terminal status. Clients that disconnect should reconnect using `?since_sequence=N`
        (or the SSE `Last-Event-ID` header set to the last sequence) to resume without gaps.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: since_sequence
        in: query
        description: Stream events with sequence > since_sequence.
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: OK
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/runs/{id}/signals:
    post:
      operationId: signalRun
      tags:
      - runs
      summary: Resume a suspended run step
      description: Resumes a run that is suspended on a `wait_event` step matching the provided
        `step_key`. The `result` payload becomes the step's output and is available to downstream
        steps via `{{ .context.<save_as> }}`.
      parameters:
