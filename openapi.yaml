      summary: Commit an uploaded artifact
      description: Verify the bytes uploaded against the `:slot` URL and transition the artifact
        to `available`. The server consults the storage backend's HEAD metadata to confirm
        the object exists and matches the caller-reported `size_bytes` and `sha256`. Mismatches
        mark the row `failed`, attempt to delete the orphan, and return 422.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
