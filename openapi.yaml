    JobClaimRequest:
      type: object
      additionalProperties: false
      required:
      - worker_instance_id
      - worker_session_token
      - concurrency_limit
      description: Body for `POST /jobs/claim`. Workers identify themselves with `worker_instance_id`
        (the row key on the workers page) plus a per-boot `worker_session_token`. The server
        returns an opaque `lease_token` on the claim that folds the session token and the
        claim attempt together; subsequent fenced calls echo the `lease_token`, not the raw
        session token.
      properties:
        worker_instance_id:
          type: string
          description: Caller-configured stable identifier for the worker process. The SDK
            auto-detects this on Cloud Run, Kubernetes, Fly, Railway, and Render; otherwise
            it falls back to OS hostname then to a per-boot UUID. Stored on the claimed job
            as `claimed_by` for human-readable display.
        worker_session_token:
          type: string
          description: Per-boot token generated by the SDK on Worker construction. Stamped
            onto the claimed job and folded into the `lease_token` returned in the `JobClaim`.
            Opaque to operators.
        concurrency_limit:
          type: integer
          minimum: 1
          default: 1
          description: Maximum number of concurrent in-flight jobs this worker process intends
            to hold. Recorded on the worker_session row; used for the saturation bar in the
            admin UI. The server does not enforce the limit — the worker is trusted to gate
            its own claim loop.
        worker_name:
          type: string
          description: Optional human-readable name shown in the worker list.
        worker_version:
          type: string
          description: Optional version string shown in the worker list.
        queues:
          type: array
          description: Queue names the worker subscribes to. When empty the worker claims
            from any queue in the project. Workflow runs default to the "default" queue when
            not otherwise specified.
          items:
            type: string
        actions:
          type: array
          description: Action names this worker can execute. When provided, only jobs whose
            `spec.kind == "action"` and whose `spec.name` is in this list are returned. When
            empty, action filtering is skipped.
          items:
            type: string
        handlers:
          type: array
          description: Code handler IDs this worker has registered. When provided, only jobs
            whose `spec.kind == "code"` and whose `spec.handler` is in this list are returned.
            When empty, no code jobs are claimed unless `actions` is also empty (in which
            case all matching queue/action criteria apply). Code-mode SDKs always populate
            this with the set of handlers they have registered.
          items:
            type: string
        wait_seconds:
          type: integer
          minimum: 0
          maximum: 30
          description: How long to hold the request open waiting for a job to surface. 0 returns
            immediately. Capped at 30 by the server.
    JobClaim:
      type: object
      additionalProperties: false
      description: Lease handed to a worker after a successful claim. Carries the `spec` of
        the work to do, an opaque `lease_token` the worker echoes on subsequent fenced calls,
        and a recommended heartbeat cadence.
      required:
      - job_id
      - run_id
      - workflow_name
      - step_name
      - spec
      - lease_token
      - queue
      properties:
        job_id:
          type: string
          description: Job ID — use as the `{id}` path parameter for heartbeat, report, history,
            events.
        run_id:
          type: string
          description: Parent workflow run ID.
        workflow_name:
          type: string
          description: Handle of the workflow definition that owns this run.
        step_name:
          type: string
          description: Step label from the workflow spec — used for UI and interaction signal
            name derivation. For code workflows this is the synthesised "run" step name.
        spec:
          $ref: '#/components/schemas/JobSpec'
          description: 'Discriminated description of the work to do. `kind: "action"` for
            spec-step worker jobs; `kind: "code"` for code-handler invocations.'
        agent_id:
          type: string
          description: Agent that should execute this job, when the step is agent-targeted.
        agent_session_id:
          type: string
          description: Agent session the job was routed to, when applicable.
        lease_token:
          type: string
          description: Opaque fence value the worker must echo on heartbeat / report / events
            calls. Combines the `worker_session_token` with the claim attempt; mismatch on
            echo returns 409 lease-lost.
        attempt_number:
          type: integer
          description: Workflow-level attempt counter, informational only. Action jobs increment
            this on automatic retry; code jobs always report 1 (the SDK manages its own per-step
            retry policy internally). Never the fence value — that role belongs to `lease_token`.
        queue:
          type: string
          description: Queue name the job was claimed from.
        heartbeat_interval_seconds:
          type: integer
          description: Recommended heartbeat interval in seconds. Workers should call `POST
            /v1/projects/{project}/jobs/{id}/heartbeat` at this cadence to keep the lease
            alive. Typically 30 seconds.
    JobSpec:
      description: 'Discriminated description of the work attached to a job. `kind: "action"`
        carries an action name and parameter map; the worker dispatches to the registered
        action handler. `kind: "code"` carries a registered handler id, the runtime hint,
        run inputs, and a cursor over the durable replay history; the worker dispatches to
        the user-authored code handler.'
      oneOf:
      - $ref: '#/components/schemas/JobActionSpec'
      - $ref: '#/components/schemas/JobCodeSpec'
      discriminator:
        propertyName: kind
        mapping:
          action: '#/components/schemas/JobActionSpec'
          code: '#/components/schemas/JobCodeSpec'
    JobActionSpec:
      type: object
      additionalProperties: false
      required:
      - kind
      - name
      description: Action-spec job description.
      properties:
        kind:
          type: string
          enum:
          - action
        name:
          type: string
          minLength: 1
          description: Action name the worker must execute for this step.
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters for this step, resolved from the workflow spec and
            prior step outputs.
    JobCodeSpec:
      type: object
      additionalProperties: false
      required:
      - kind
      - handler
      description: Code-spec job description.
      properties:
        kind:
          type: string
          enum:
          - code
        handler:
          type: string
          minLength: 1
          description: Stable handler id the worker SDK registered. The worker dispatches
            the job to the function registered under this id.
        runtime:
          type: string
          description: Opaque hint identifying the language/runtime that owns the handler
            ("typescript", "python", etc.). Informational only.
        inputs:
          type: object
          additionalProperties: true
          description: Inputs the run was started with. The SDK passes these to the handler
            as its first argument.
        history_cursor:
          type: string
          description: Opaque cursor the SDK passes to `GET /jobs/{id}/history?after=…` to
            stream replay history. The empty string is the "from the beginning" sentinel;
            the SDK should also treat an absent / empty value as "no further pages." Each
            resume advances the cursor past the previously fetched batch.
        history:
          type: array
          description: Optional inline history. The server may include a short history here
            when it knows the payload will fit; otherwise the SDK fetches it via `GET /jobs/{id}/history`.
            When set, the SDK should consume this batch as the prefix and only paginate via
            `history_cursor` for subsequent batches.
          items:
            $ref: '#/components/schemas/CodeStepCompletion'
    JobHeartbeatDirectives:
      type: object
      additionalProperties: false
      description: Server instructions returned with a heartbeat. Workers should inspect this
        on every heartbeat so cancellation and future control signals can interrupt long-running
        work promptly.
      properties:
        should_cancel:
          type: boolean
          default: false
          description: When true, the run has received a cancellation request. The worker
            must stop processing immediately and post a `fail` outcome via the report endpoint.
    JobHeartbeat:
      type: object
      additionalProperties: false
      description: Heartbeat acknowledgement for a claimed job. A successful response means
        the worker still owns the lease and should continue unless the directives say otherwise.
      required:
      - ok
      - directives
      properties:
        ok:
          type: boolean
          description: True when the lease was successfully refreshed.
        directives:
          $ref: '#/components/schemas/JobHeartbeatDirectives'
          description: Server instructions the worker should observe after the heartbeat.
    JobFenceRequest:
      type: object
      additionalProperties: false
      description: Lease fence presented on heartbeat / events. The worker echoes the `lease_token`
        from the original claim; the server unfolds the embedded session token + attempt and
        rejects with 409 lease-lost on mismatch.
      required:
      - lease_token
      properties:
        worker_instance_id:
          type: string
          description: Echo of the `worker_instance_id` from the claim. Logged for audit;
            not the fence value.
        lease_token:
          type: string
          description: Opaque lease fence value from the original claim. Mismatch returns
            409 lease-lost.
    JobReportRequest:
      type: object
      additionalProperties: false
      required:
      - lease_token
      - outcomes
      description: Single terminal report for a claimed job attempt. The worker echoes the
        `lease_token` from the claim and supplies an ordered list of `outcomes` ending in
        exactly one terminator (`complete` / `fail` / `suspend`).
      properties:
        worker_instance_id:
          type: string
          description: Echo of the claim's `worker_instance_id`. Audit only.
        lease_token:
          type: string
          minLength: 1
          description: Opaque fence value from the original claim. Mismatch returns 409 lease-lost;
            a duplicate report with the same token and terminator is idempotent (204).
        outcomes:
          type: array
          description: Ordered list of outcomes. May contain zero or more durable progress
            entries (`step_done`, `wait_observed`) followed by exactly one terminator (`complete`,
            `fail`, `suspend`). The terminator must be the final entry; no entry may follow
            it. Action-spec jobs may not include `step_done` or `wait_observed`; code-spec
            jobs may.
          minItems: 1
          items:
            $ref: '#/components/schemas/Outcome'
    Outcome:
      description: One thing that happened during a job attempt. Discriminated by `kind`.
        Durable kinds (`step_done`, `wait_observed`) describe sub-steps a code handler executed
        or observed during this invocation; terminal kinds (`complete`, `fail`, `suspend`)
        end the attempt.
      oneOf:
      - $ref: '#/components/schemas/OutcomeStepDone'
      - $ref: '#/components/schemas/OutcomeWaitObserved'
      - $ref: '#/components/schemas/OutcomeComplete'
      - $ref: '#/components/schemas/OutcomeFail'
      - $ref: '#/components/schemas/OutcomeSuspend'
      discriminator:
        propertyName: kind
        mapping:
          step_done: '#/components/schemas/OutcomeStepDone'
          wait_observed: '#/components/schemas/OutcomeWaitObserved'
          complete: '#/components/schemas/OutcomeComplete'
          fail: '#/components/schemas/OutcomeFail'
          suspend: '#/components/schemas/OutcomeSuspend'
    OutcomeStepDone:
      type: object
      additionalProperties: false
      required:
      - kind
      - step_id
      - status
      description: A durable child step the handler executed. Code-spec jobs only. Each `step_done`
        becomes one row in the run-step ledger and is replayed back to the handler on the
        next invocation.
      properties:
        kind:
          type: string
          enum:
          - step_done
        step_id:
          type: string
          minLength: 1
          description: Deterministic identifier the handler passed to step.run("id", fn).
            Replay key.
        status:
          type: string
          enum:
          - completed
          - failed
          - skipped
        result:
          description: Value the handler should observe on replay. JSON-shape; freely structured
            by the handler. Omit for `failed` / `skipped`.
        error_type:
          type: string
          description: Error class for a failed sub-step.
        error_message:
          type: string
          description: Human-readable error detail for a failed sub-step.
        attempt:
          type: integer
          minimum: 0
          description: Worker-side per-step retry counter. 0 for first try.
    OutcomeWaitObserved:
      type: object
      additionalProperties: false
      required:
      - kind
      - step_id
      - wait_kind
      - status
      description: A previously-parked wait the handler observed completing during replay.
        Code-spec jobs only. The status is typically `completed`; `failed` is used when the
        wait raised a timeout the handler is surfacing back through the ledger.
      properties:
        kind:
          type: string
          enum:
          - wait_observed
        step_id:
          type: string
          minLength: 1
          description: Deterministic identifier the handler passed to the wait helper.
        wait_kind:
          type: string
          enum:
          - sleep
          - wait_signal
          - wait_event
          - interaction
          - pause
          description: Kind of the wait that completed.
        status:
          type: string
          enum:
          - completed
          - failed
          - skipped
        result:
          description: Payload delivered by the wait (e.g. signal payload, interaction response).
            Omit when not applicable (sleep, pause).
        error_type:
          type: string
        error_message:
          type: string
        attempt:
          type: integer
          minimum: 0
    OutcomeComplete:
      type: object
      additionalProperties: false
      required:
      - kind
      description: 'Terminal: the attempt finished successfully. For action jobs, `result_b64`
        becomes the step output. For code jobs, `result_b64` becomes the run output.'
      properties:
        kind:
          type: string
          enum:
          - complete
        result_b64:
          type: string
          description: Base64-encoded (standard encoding) bytes representing the handler/action
            result. Decoded by the engine and stored on the job (action) or the run (code).
    OutcomeFail:
      type: object
      additionalProperties: false
      required:
      - kind
      - error_type
      - error_message
      description: 'Terminal: the attempt failed. For action jobs this triggers retry if the
        spec allows; for code jobs the run terminally fails.'
      properties:
        kind:
          type: string
          enum:
          - fail
        error_type:
          type: string
          minLength: 1
          description: Short error class identifier (e.g. "TimeoutError").
        error_message:
          type: string
          description: Human-readable error detail.
    OutcomeSuspend:
      type: object
      additionalProperties: false
      required:
      - kind
      - step_id
      - wait
      description: 'Terminal: the code handler hit a wait it could not satisfy locally and
        is yielding control. Code-spec jobs only. The server parks the run on `wait`; on resume
        a fresh code-invoke job is emitted.'
      properties:
        kind:
          type: string
          enum:
          - suspend
        step_id:
          type: string
          minLength: 1
          description: Deterministic identifier the handler passed to the wait helper.
        wait:
          $ref: '#/components/schemas/WaitDescriptor'
          description: The wait the handler hit.
    WaitDescriptor:
      description: Wait descriptor a code handler yielded. Discriminated by `kind`. Reuses
        the declarative wait config schemas from workflow.yaml — code workflows ignore the
        `on_timeout` fields on those configs because the SDK handles timeout flows directly
        in the handler (try/catch around the await), but accepting the shape verbatim avoids
        forking schemas just for code mode.
      oneOf:
      - $ref: '#/components/schemas/WaitDescriptorSleep'
      - $ref: '#/components/schemas/WaitDescriptorWaitSignal'
      - $ref: '#/components/schemas/WaitDescriptorWaitEvent'
      - $ref: '#/components/schemas/WaitDescriptorInteraction'
      - $ref: '#/components/schemas/WaitDescriptorPause'
      discriminator:
        propertyName: kind
        mapping:
          sleep: '#/components/schemas/WaitDescriptorSleep'
          wait_signal: '#/components/schemas/WaitDescriptorWaitSignal'
          wait_event: '#/components/schemas/WaitDescriptorWaitEvent'
          interaction: '#/components/schemas/WaitDescriptorInteraction'
          pause: '#/components/schemas/WaitDescriptorPause'
    WaitDescriptorSleep:
      type: object
      additionalProperties: false
      required:
      - kind
      - sleep
      properties:
        kind:
          type: string
          enum:
          - sleep
        sleep:
          $ref: '#/components/schemas/WorkflowSleepConfig'
    WaitDescriptorWaitSignal:
      type: object
      additionalProperties: false
      required:
      - kind
      - wait_signal
      properties:
        kind:
          type: string
          enum:
          - wait_signal
        wait_signal:
          $ref: '#/components/schemas/WorkflowWaitSignalConfig'
    WaitDescriptorWaitEvent:
      type: object
      additionalProperties: false
      required:
      - kind
      - wait_event
      properties:
        kind:
          type: string
          enum:
          - wait_event
        wait_event:
          $ref: '#/components/schemas/WorkflowWaitEventConfig'
    WaitDescriptorInteraction:
      type: object
      additionalProperties: false
      required:
      - kind
      - interaction
      properties:
        kind:
          type: string
          enum:
          - interaction
        interaction:
          $ref: '#/components/schemas/WorkflowInteractionConfig'
    WaitDescriptorPause:
      type: object
      additionalProperties: false
      required:
      - kind
      properties:
        kind:
          type: string
          enum:
          - pause
        pause:
          $ref: '#/components/schemas/WorkflowPauseConfig'
    JobHistoryResponse:
      type: object
      additionalProperties: false
      required:
      - entries
      description: Paginated page of replay-history entries for a code-spec job. `entries`
        are in commit order. `next_cursor`, when non-empty, is the cursor to pass on the next
        request to fetch the next page; an empty / absent value means no further pages.
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/CodeStepCompletion'
        next_cursor:
          type: string
          description: Cursor for the next page. Empty / absent when this is the last page.
    CodeStepCompletion:
      type: object
      additionalProperties: false
      description: One entry in the replay history of a code-spec job. Mirrors what the worker
        reported via a previous `step_done` or `wait_observed` outcome — the SDK fast-forwards
        through these on replay so cached `step.run` / `step.waitFor*` calls return without
        re-executing the user-supplied function.
      required:
      - step_id
      - kind
      - status
      properties:
        step_id:
          type: string
          minLength: 1
          description: Deterministic identifier the handler passed to step.run() (or step.sleep,
            step.waitForSignal, etc.). Replay key.
        kind:
          type: string
          enum:
          - run
          - sleep
          - wait_signal
          - wait_event
          - interaction
          - pause
          description: Sub-step kind. `run` carries the value `step.run` returned; wait kinds
            capture the payload (signal, event, interaction response) the wait delivered,
            or are markers for kinds without a payload (sleep, pause).
        status:
          type: string
          enum:
          - completed
          - failed
          - skipped
        result:
          description: Value the handler should observe on replay. JSON-shape; kind-specific.
        error_type:
          type: string
        error_message:
          type: string
        attempt:
          type: integer
          minimum: 0
          description: Worker-side per-step retry counter. 0 for first try.
    RunActionRequest:
      type: object
      additionalProperties: false
      properties:
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters passed to the action handler.
        timeout_seconds:
          type: integer
          minimum: 0
          description: Override the default action execution timeout.
        dry_run:
          type: boolean
          description: When true, invokes the action without side effects. Only effective
            for actions that support dry-run mode.
    RunActionResult:
      type: object
      additionalProperties: false
      required:
      - output
      properties:
        output:
          oneOf:
          - type: object
            additionalProperties: true
          - type: array
            items: {}
          - type: string
          - type: number
          - type: integer
          - type: boolean
          description: Free-form output returned by the action handler.
    JobEventsRequest:
      type: object
      additionalProperties: false
      required:
      - lease_token
      - events
      description: Fenced batch of custom run events published by the worker holding a job's
        lease. Every event in `events` is published under the same `lease_token`; mismatch
        returns 409 lease-lost.
      properties:
        worker_instance_id:
          type: string
          description: Echo of the claim's `worker_instance_id`. Audit only.
        lease_token:
          type: string
          description: Opaque lease fence value from the claim; mismatch returns 409 lease-lost.
        events:
          type: array
          description: The batch of events to publish. All events are validated atomically.
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/JobEventEntry'
    JobEventEntry:
      type: object
      additionalProperties: false
      description: Custom progress or telemetry event emitted while a worker owns a job. Use
        these events to stream domain-specific status into run timelines without changing
        the job completion payload.
      required:
      - type
      - payload
      properties:
        type:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^[a-zA-Z0-9_.-]+$
          description: Caller-chosen event type identifier. The `mobius.` prefix is reserved
            for server-emitted well-known kinds and is rejected with 400.
        payload:
          type: object
          additionalProperties: true
          description: Free-form JSON payload. Bounded by the server-side byte limit (default
            16 KiB per event); oversize payloads are rejected with 413.
    CreateJobInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - target
      - kind
      - message
      description: Creates an interaction from a claimed job context. The server derives the
        owning run from the job and may derive the signal name when omitted.
      properties:
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: User, group, or agent that should receive the interaction.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind. Renamed from `type` in the PRD 077 v-bump.
        message:
          type: string
          description: Message shown to the responder.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        signal_name:
          type: string
          description: Optional signal name override. When omitted, the server derives the
            signal name from step_name or falls back to a default interaction signal name.
        step_name:
          type: string
          description: Optional workflow step label for UI/debugging context
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the message.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When target.type is "group", setting require_all=true means all snapshotted
            group members must respond before the interaction is considered complete. Ignored
            for non-group targets. Defaults to false when omitted. Mutually exclusive with
            `resolution_policy`; prefer the policy form for new code.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Declarative resolution rule. When supplied the policy evaluator drives
            completion; legacy `require_all`/`first_responder` behaviour is bypassed for that
            interaction.
        submission_review_policy:
          $ref: '#/components/schemas/ReviewPolicy'
          description: Template review policy applied to submissions of this interaction (PRD
            077 §3.5). Currently meaningful only for handoff-kind interactions.
        timeout:
          type: string
          description: Optional duration string (e.g. "24h", "30m") specifying how long the
            interaction should remain open before expiring. When absent the caller is responsible
            for setting expires_at directly.
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires.
    TriggerKind:
      type: string
      enum:
      - schedule
      - webhook
      - event
      - channel_message
      - table_row
      - email
      description: 'Determines the event source and required `source_config` shape: schedule,
        webhook, event, channel_message, table_row, or email.'
    ConcurrencyPolicy:
      type: string
      enum:
      - allow
      - forbid
      - replace
      description: |-
        Controls overlapping runs from the same trigger:
        - `allow` — start new runs unconditionally.
        - `forbid` — skip the new fire if a run from this trigger is still active.
        - `replace` — cancel the active run before starting a new one.
    TriggerFireStatus:
      type: string
      enum:
      - success
      - partial_failure
      - failed
      - skipped
      description: |-
        Outcome of a trigger activation:
        - `success` — all enabled targets started their runs (or no targets configured).
        - `partial_failure` — at least one target failed while others succeeded.
        - `failed` — all targets failed, or a trigger-level error prevented any target.
        - `skipped` — the concurrency policy suppressed the entire activation.
    TriggerFireTargetStatus:
      type: string
      enum:
      - success
      - failed
      - skipped
      description: Outcome for a single target within a trigger fire activation. Per-target
        results never aggregate, so `partial_failure` cannot appear here.
    TriggerTarget:
      type: object
      additionalProperties: false
      required:
      - id
      - trigger_id
      - kind
      - enabled
      - created_at
      - updated_at
      description: |-
        An effect a trigger executes when it fires. Two kinds:

        - `launch_run` (default): starts a new workflow run. `workflow_id`
        required. `external_id_template` optional — when set, the new
        run's `external_id` is derived from the event so a later
        `signal_run` target can find it.
        - `signal_run`: locates an existing run by
        `run_selector.external_id_template` and delivers a signal to
        its `wait_signal` step. `workflow_id` is absent.
      properties:
        id:
          type: string
          description: Unique identifier for this target.
        trigger_id:
          type: string
          description: ID of the trigger this target belongs to.
        kind:
          type: string
          enum:
          - launch_run
          - signal_run
          default: launch_run
          description: Discriminates the target's effect. `launch_run` starts a new workflow
            run; `signal_run` signals an existing run.
        workflow_id:
          type: string
          description: ID of the workflow definition to run. Required for `launch_run` targets;
            absent for `signal_run`.
        condition:
          type: string
          description: 'Expression evaluated against the event environment (`{ meta, event
            }`). The target is skipped when the expression evaluates to false or yields a
            non-boolean value, and is marked failed if evaluation errors. Bare expressions
            are accepted; the wrapped form `${expr}` is also allowed. Omit to always run.
            Example: `event.pull_request.merged == true`. Malformed expressions are rejected
            on create/update with `400 invalid_argument`.'
        input_mapping:
          type: object
          additionalProperties:
            type: string
          description: |-
            (launch_run only) Maps workflow input names to expressions evaluated against the event environment (`{ meta, event }`). Values use Mobius's `${expr}` template syntax — pure expressions (`${event.actor.id}`) preserve their native type, mixed templates (`Bearer ${meta.id}`) always render to a string, and other literals pass through as-is. Legacy JSONPath-like values (`$.…`) and unwrapped `event.` / `meta.` references are rejected with 400 on create/update.

            Resolution is fail-closed: an expression that references a missing field (`${event.pull_request.merged_by.login}` on an event without `merged_by`) fails the dispatch with `input_resolution_error` naming the offending key. No run is launched. Author expressions to reference only fields you expect to be present. Example: `{"user_id": "${event.actor.id}"}`.
        external_id_template:
          type: string
          description: '(launch_run only) `${expr}` template that derives the new run''s `external_id`
            from the event environment. Lets a subsequent `signal_run` target locate this
            run. Example: `github:${event.repository.full_name}#${event.pull_request.number}`.'
        run_selector:
          $ref: '#/components/schemas/TriggerTargetRunSelector'
        signal_topic:
          type: string
          description: (signal_run only) The `wait_signal` topic to deliver to the located
            run.
        signal_payload_mapping:
          type: object
          additionalProperties:
            type: string
          description: (signal_run only) Maps the signal payload keys to expressions evaluated
            against the event environment. Available to the workflow as `signal.payload`.
            Resolution is fail-closed — an expression that references a missing field fails
            the target with `signal_payload_resolution_error` (the signal-side analogue of
            `input_mapping`'s `input_resolution_error`) and the signal is not delivered.
        enabled:
          type: boolean
          description: When false, this target is paused and will not fire.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this target was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this target was last updated.
    TriggerTargetRunSelector:
      type: object
      additionalProperties: false
      required:
      - external_id_template
      description: (signal_run only) Locates an existing run to deliver a signal to. Today
        only `external_id_template` is supported; the shape is reserved as an object so future
        filters (e.g. workflow scope, multi-run match) can be added without breaking the API.
      properties:
        external_id_template:
          type: string
          minLength: 1
          description: '`${expr}` template rendered against the event environment. The result
            must equal the run''s `external_id`. Required — the server rejects `signal_run`
            targets whose selector omits or renders this to an empty string.'
    TriggerTargetListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated list of targets attached to one trigger. Trigger fan-out is
        configured as a small bounded set rather than a high-volume collection.
      properties:
        items:
          type: array
          description: The list of targets for this trigger.
          items:
            $ref: '#/components/schemas/TriggerTarget'
    CreateTriggerTargetRequest:
      type: object
      additionalProperties: false
      description: Parameters for attaching a target to a trigger. Use `kind` to select between
        launching a new run (default) and signaling an existing run. Validation enforces the
        right field combination.
      properties:
        kind:
          type: string
          enum:
          - launch_run
          - signal_run
          default: launch_run
        workflow_id:
          type: string
          description: (launch_run only) ID of the workflow definition to run. Required when
            `kind=launch_run`.
        condition:
          type: string
          description: 'Expression evaluated against the event environment (`{ meta, event
            }`). The target is skipped when it evaluates to false or yields a non-boolean
            value, and is marked failed if evaluation errors. Bare expressions are accepted;
            the wrapped `${expr}` form is also allowed. Omit to always run. Example: `event.pull_request.merged
            == true`. Malformed expressions are rejected on create/update with `400 invalid_argument`.'
        input_mapping:
          type: object
          additionalProperties:
            type: string
          description: '(launch_run only) Maps workflow input names to expressions evaluated
            against the event environment (`{ meta, event }`). Values use Mobius''s `${expr}`
            template syntax — pure expressions (`${event.actor.id}`) preserve their native
            type, mixed templates (`user-${event.actor.id}`) always render to a string, and
            other literals pass through as-is. Legacy JSONPath-like values (`$.…`) and unwrapped
            `event.` / `meta.` references are rejected with 400. Example: `{"user_id": "${event.actor.id}",
            "label": "static"}`.'
        external_id_template:
          type: string
          description: (launch_run only) Template for the new run's `external_id`.
        run_selector:
          $ref: '#/components/schemas/TriggerTargetRunSelector'
        signal_topic:
          type: string
          description: (signal_run only) `wait_signal` topic to deliver to.
        signal_payload_mapping:
          type: object
          additionalProperties:
            type: string
          description: (signal_run only) Maps signal payload keys to expressions.
        enabled:
          type: boolean
          description: Whether this target starts enabled. Defaults to true when omitted.
    UpdateTriggerTargetRequest:
      type: object
      additionalProperties: false
      description: Partial update for a trigger target; omitted fields are unchanged.
      properties:
        kind:
          type: string
          enum:
          - launch_run
          - signal_run
          description: Replacement kind. Changing kind requires the corresponding kind-specific
            fields to be updated in the same request.
        workflow_id:
          type: string
          description: Replacement workflow definition ID.
        condition:
          type: string
          description: Replacement condition expression. Set to empty string to remove.
        input_mapping:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Replacement input mapping. Same `${expr}` template contract as on create
            — legacy JSONPath-like values (`$.…`) and unwrapped `event.` / `meta.` references
            are rejected with 400. Set to null to clear all mappings.
        external_id_template:
          type: string
          description: Replacement external_id template. Set to empty string to clear.
        run_selector:
          $ref: '#/components/schemas/TriggerTargetRunSelector'
        signal_topic:
          type: string
          description: Replacement signal topic.
        signal_payload_mapping:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Replacement signal payload mapping. Set to null to clear.
        enabled:
          type: boolean
          description: Set to false to pause this target without removing it.
    TriggerFireTargetResult:
      type: object
      additionalProperties: false
      required:
      - target_id
      - kind
      - status
      description: Outcome of a single target within a trigger fire activation. `kind` discriminates
        the result shape so consumers can branch on it instead of inferring from optional
        fields like `workflow_id` or `external_id_resolved`.
      properties:
        target_id:
          type: string
          description: ID of the trigger target that was evaluated.
        kind:
          type: string
          enum:
          - launch_run
          - signal_run
          default: launch_run
          description: Effect kind of the evaluated target. `launch_run` started (or attempted)
            a new workflow run; `signal_run` delivered (or attempted to deliver) a signal
            to an existing run. Lets clients reliably branch on `kind` instead of inspecting
            optional fields like `workflow_id` or `external_id_resolved`.
        workflow_id:
          type: string
          description: ID of the workflow definition that was started or attempted. Present
            only for `launch_run` targets — `signal_run` targets deliver a signal to an existing
            run and have no workflow definition association of their own.
        run_id:
          type: string
          description: ID of the run that was launched or signaled. Absent when the target
            failed or was skipped before resolving a run.
        status:
          $ref: '#/components/schemas/TriggerFireTargetStatus'
          description: 'Outcome for this target: `success`, `skipped`, or `failed`.'
        error:
          type: string
          description: Error detail when status is `failed`. Empty for `success` and `skipped`
            results — `skipped` causes go in `reason` instead. Pre-split historical rows persisted
            skip causes here, so consumers should fall back to `error` when `reason` is empty
            on a skipped row.
        reason:
          type: string
          description: 'Why the target was skipped, when status is `skipped`. Examples: `condition
            false`, `target disabled`, `no run matching external_id <id>`. Empty for `success`
            and `failed` results.'
        external_id_resolved:
          type: string
          description: Rendered value of the target's `external_id_template` (launch_run)
            or `run_selector.external_id_template` (signal_run). Lets operators verify the
            two templates produce matching strings without re-deriving them by hand. Absent
            when the target has no template or when rendering failed before a value was produced.
    ScheduleSourceConfig:
      type: object
      additionalProperties: false
      minProperties: 1
      maxProperties: 1
      description: Source configuration for `schedule` triggers. Provide exactly one of `cron`
        or `interval`.
      properties:
        cron:
          type: string
          description: 5-field cron expression or @-descriptor, e.g. `0 9 * * 1-5` or `@hourly`.
        interval:
          type: string
          description: Go duration string, e.g. `5m`, `1h`, `30s`. Must be positive.
    WebhookSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `webhook` triggers.
      properties:
        handle:
          type: string
          description: URL-safe handle that determines the inbound `receive_url`. Auto-derived
            from the trigger's `name` when omitted. Must be unique within the project.
        signing_secret:
          type: string
          writeOnly: true
          description: Optional HMAC-SHA256 secret for verifying inbound webhook payloads.
            When set, Mobius validates the `X-Mobius-Signature` header on incoming requests.
            Accepted on create/update; omitted from GET/list responses.
        receive_url:
          type: string
          readOnly: true
          description: Full URL for posting inbound events. Computed from `handle`.
    EventSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `event` triggers.
      properties:
        event_type:
          type: string
          description: Platform event type to match, e.g. `run.completed`.
        actor_state:
          $ref: '#/components/schemas/ActorStateTriggerSourceConfig'
          description: Transition filter for `actor_state.changed` event triggers.
    ActorStateTriggerSourceConfig:
      type: object
      additionalProperties: false
      description: Narrow transition filter for Actor State event triggers.
      properties:
        actor_id:
          type: string
          description: Actor ID to match. Omit to match any actor in the project.
        from_availability:
          $ref: '#/components/schemas/ActorAvailability'
        to_availability:
          $ref: '#/components/schemas/ActorAvailability'
    ChannelMessageSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `channel_message` triggers.
      properties:
        channel_id:
          type: string
          description: ID of the channel to watch. When omitted, the trigger fires for messages
            in any channel within the project.
        pattern:
          type: string
          description: Optional Go regular expression matched against message content. When
            omitted, all messages pass the content filter.
        sender_types:
          type: array
          items:
            $ref: '#/components/schemas/ChannelMessageSenderType'
          description: Restricts which sender types fire the trigger. When omitted, all sender
            types are eligible.
    TableRowSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `table_row` triggers.
      properties:
        table_name:
          type: string
          description: Name of the table to watch. When omitted, the trigger fires for row
            changes in any table within the project.
        events:
          type: array
          items:
            type: string
            enum:
            - inserted
            - updated
            - deleted
          description: Row change events that fire the trigger. When omitted, all three events
            (inserted, updated, deleted) fire the trigger.
    EmailSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `email` triggers.
      properties:
        agent_id:
          type: string
          description: ID of the agent whose inbox fires this trigger. When omitted, any agent
            inbox in the project can fire the trigger.
        subject_pattern:
          type: string
          description: Optional Go regular expression matched against the email subject. When
            omitted, all subjects pass the filter.
    TriggerSourceConfig:
      description: Typed source configuration. The shape is determined by the trigger's `kind`
        (`schedule` → `ScheduleSourceConfig`, `webhook` → `WebhookSourceConfig`, `event` →
        `EventSourceConfig`, `channel_message` → `ChannelMessageSourceConfig`, `table_row`
        → `TableRowSourceConfig`, `email` → `EmailSourceConfig`); mismatches are rejected
        with 400.
      anyOf:
      - $ref: '#/components/schemas/ScheduleSourceConfig'
      - $ref: '#/components/schemas/WebhookSourceConfig'
      - $ref: '#/components/schemas/EventSourceConfig'
      - $ref: '#/components/schemas/ChannelMessageSourceConfig'
      - $ref: '#/components/schemas/TableRowSourceConfig'
      - $ref: '#/components/schemas/EmailSourceConfig'
    Trigger:
      type: object
      additionalProperties: false
      description: Event source that starts one or more workflow targets.
      required:
      - id
      - name
      - kind
      - concurrency_policy
      - enabled
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this trigger.
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          $ref: '#/components/schemas/TriggerKind'
          description: Trigger source kind that determines the source_config schema.
        source_config:
          $ref: '#/components/schemas/TriggerSourceConfig'
          description: Typed configuration for the trigger source.
        targets:
          type: array
          items:
            $ref: '#/components/schemas/TriggerTarget'
          description: Targets attached to this trigger, populated via join.
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: When false, the trigger is paused and will not fire.
        last_fire_at:
          type: string
          format: date-time
          description: Timestamp of the most recent fire attempt.
        next_fire_at:
          type: string
          format: date-time
          description: Computed next scheduled fire time (schedule triggers only).
        created_by:
          type: string
          description: User ID of the org member who created this trigger.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this trigger.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this trigger was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this trigger was last updated.
    TriggerListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of triggers.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Trigger'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    TriggerFire:
      type: object
      additionalProperties: false
      required:
      - id
      - trigger_id
      - fired_at
      - status
      - created_at
      description: A single trigger fire event and its outcome.
      properties:
        id:
          type: string
          description: Unique identifier for this fire record.
        trigger_id:
          type: string
          description: ID of the trigger that fired.
        scheduled_at:
          type: string
          format: date-time
          description: When the trigger was scheduled to fire (schedule triggers only).
        fired_at:
          type: string
          format: date-time
          description: When the fire was actually processed.
        target_results:
          type: array
          items:
            $ref: '#/components/schemas/TriggerFireTargetResult'
          description: Per-target outcomes for this activation.
        status:
          $ref: '#/components/schemas/TriggerFireStatus'
          description: Overall trigger fire outcome.
        error:
          type: string
          description: Error detail when status is `failed`.
        dedup_key:
          type: string
          description: Deduplication key used to prevent duplicate fires for the same scheduled
            slot.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this fire record was created.
    TestFireTriggerResult:
      type: object
      additionalProperties: false
      required:
      - mode
      - targets
      properties:
        mode:
          type: string
          enum:
          - preview
          - execute
        targets:
          type: array
          items:
            $ref: '#/components/schemas/TestFireTargetResult'
    TestFireTriggerRequest:
      type: object
      additionalProperties: false
      required:
      - event
      description: Synthetic event payload used to drive a test-fire dispatch.
      properties:
        event:
          type: object
          additionalProperties: true
          description: Synthetic event payload — the same shape an integration would deliver.
            Available to expressions as `event.x`.
        meta:
          type: object
          additionalProperties: true
          description: 'Optional meta envelope. Available to expressions as `meta.x`. When
            omitted, defaults to `{ id: "test-fire", event_type: "<test>", provider: "<test>"
            }`.'
        mode:
          type: string
          enum:
          - preview
          - execute
          default: preview
          description: '`preview` resolves input mappings and condition outcomes without launching
            runs. `execute` runs the real dispatcher path — runs are tagged with source_label
            `test-fire` so they are filterable in the run list.'
    TriggerFireListResponse:
      type: object
      additionalProperties: false
      description: Paginated history of trigger fire attempts.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/TriggerFire'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateTriggerRequest:
      description: Creates a trigger. The request is discriminated by `kind`, and each variant
        requires the matching `source_config` schema.
      oneOf:
      - $ref: '#/components/schemas/CreateScheduleTriggerRequest'
      - $ref: '#/components/schemas/CreateWebhookTriggerRequest'
      - $ref: '#/components/schemas/CreateEventTriggerRequest'
      - $ref: '#/components/schemas/CreateChannelMessageTriggerRequest'
      - $ref: '#/components/schemas/CreateTableRowTriggerRequest'
      - $ref: '#/components/schemas/CreateEmailTriggerRequest'
      discriminator:
        propertyName: kind
        mapping:
          schedule: '#/components/schemas/CreateScheduleTriggerRequest'
          webhook: '#/components/schemas/CreateWebhookTriggerRequest'
          event: '#/components/schemas/CreateEventTriggerRequest'
          channel_message: '#/components/schemas/CreateChannelMessageTriggerRequest'
          table_row: '#/components/schemas/CreateTableRowTriggerRequest'
          email: '#/components/schemas/CreateEmailTriggerRequest'
    CreateScheduleTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a schedule trigger from a cron expression or fixed interval.
      required:
      - name
      - kind
      - source_config
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          type: string
          enum:
          - schedule
          description: Discriminator value — must be `schedule`.
        source_config:
          $ref: '#/components/schemas/ScheduleSourceConfig'
          description: Schedule-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateWebhookTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a webhook trigger with an inbound receive URL.
      required:
      - name
      - kind
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          type: string
          enum:
          - webhook
          description: Discriminator value — must be `webhook`.
        source_config:
          $ref: '#/components/schemas/WebhookSourceConfig'
          description: Webhook-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateEventTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates an event trigger for platform-originated events.
      required:
      - name
      - kind
      - source_config
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          type: string
          enum:
          - event
          description: Discriminator value — must be `event`.
        source_config:
          $ref: '#/components/schemas/EventSourceConfig'
          description: Event-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateChannelMessageTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a trigger that fires when a matching channel message is posted.
      required:
      - name
      - kind
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          type: string
          enum:
          - channel_message
          description: Discriminator value — must be `channel_message`.
        source_config:
          $ref: '#/components/schemas/ChannelMessageSourceConfig'
          description: Channel-message-specific source configuration. When omitted, equivalent
            to `{}`.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateTableRowTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a trigger that fires when a table row is inserted, updated, or
        deleted.
      required:
      - name
      - kind
      - source_config
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          type: string
          enum:
          - table_row
          description: Discriminator value — must be `table_row`.
        source_config:
          $ref: '#/components/schemas/TableRowSourceConfig'
          description: Data-table-row-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateEmailTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a trigger that fires when an inbound email arrives at the agent's
        inbox.
      required:
      - name
      - kind
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          type: string
          enum:
          - email
          description: Discriminator value — must be `email`.
        source_config:
          $ref: '#/components/schemas/EmailSourceConfig'
          description: Email-specific source configuration. When omitted, equivalent to `{}`.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateTriggerRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        source_config:
          $ref: '#/components/schemas/TriggerSourceConfig'
          description: Replacement source configuration; its shape must match the trigger
            kind.
        targets:
          type: array
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
          description: Replacement target set for this trigger. Omit to leave targets unchanged;
            send an empty array to remove all targets.
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Replacement policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Set to false to pause the trigger without deleting it.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the trigger. System tags
            (`mobius:*`) are preserved.
    ActorAvailability:
      type: string
      enum:
      - available
      - focused
      - busy
      - waiting
      - away
      - offline
    WorkerSession:
      type: object
      additionalProperties: false
      description: Recently observed worker process for a project. Use sessions to see which
        machines, users, service accounts, or agents are polling for work, what their configured
        concurrency is, and whether they appear stale.
      required:
      - id
      - worker_instance_id
      - concurrency_limit
      - instance_status
      - stale
      - busy_job_count
      - current_jobs
      properties:
        id:
          type: string
          description: Server-assigned session row ID (`wsess_…`). Generated by the control
            plane on first registration; opaque to workers and stable across refreshes for
            a given live row.
        worker_instance_id:
          type: string
          description: Caller-configured stable identifier for the worker process. The SDK
            auto-detects this from the runtime platform (Cloud Run revision, Kubernetes pod,
            Fly machine, Railway replica, Render instance) and falls back to a UUID. Unique
            within `(org_id, project_id)`.
        concurrency_limit:
          type: integer
          minimum: 1
          description: Configured maximum number of jobs this worker process will hold in
            flight simultaneously. Reported by the SDK on register; rendered as a saturation
            bar in the admin UI (`busy_job_count / concurrency_limit`).
        name:
          type: string
          description: Optional human-readable name supplied in the claim request.
        version:
          type: string
          description: Optional version string supplied in the claim request.
        last_seen_at:
          type: string
          format: date-time
          description: Timestamp of this session's most recent job claim poll. Updated on
            every `POST /v1/projects/{project}/jobs/claim` call regardless of whether a job
            was returned. Used to compute `stale`.
        last_activity_at:
          type: string
          format: date-time
          description: Most recent observed activity for this session, derived from `last_seen_at`,
            currently claimed job heartbeats, and the latest terminal job update.
        capabilities:
          type: array
          items:
            type: string
          description: Reserved for future capability-based job routing. Not currently used
            for filtering.
        service_account_id:
          type: string
          description: Service account this session authenticated as on register/heartbeat.
            Set when a machine identity is polling; mutually exclusive with `user_id`. Stable
            across credential rotation — use this to group sessions by identity in the admin
            UI.
        user_id:
          type: string
          description: User this session authenticated as on register/heartbeat. Set when
            a human is polling via the CLI; mutually exclusive with `service_account_id`.
        user:
          $ref: '#/components/schemas/User'
          description: Embedded profile for `user_id` when this is a CLI-backed human worker
            session. Absent when the user record is unavailable or the session is service-account-backed.
        api_key_id:
          type: string
          description: ID of the specific API key this session presented on its most recent
            register/heartbeat. Only set for service-account-backed sessions; changes across
            credential rotations. Use together with `service_account_id` to see rotation progress
            across a fleet.
        agent_id:
          type: string
          description: Agent this session represents, when the polling process declared itself
            as a registered agent (via `agent_id` on the claim request or via inference from
            the service account). Absent for ad-hoc worker processes that are not tied to
            a declared agent.
        instance_status:
          type: string
          enum:
          - active
          - stale
          - draining
          description: |-
            High-level lifecycle indicator for the row.
            * `active` — recent heartbeat, healthy.
            * `stale` — no heartbeat within the staleness window; row
            retained for display until the 30-day delete floor.
            * `draining` — explicit graceful-shutdown signal from the
            SDK (reserved for future SDK releases).

            Conflicts (a different process tried to register this `worker_instance_id` within the takeover window and was rejected) are surfaced inline as a 409 from the worker protocol; the previous registration's row remains `active` and never appears as a separate "conflicting" entry.
        stale:
          type: boolean
          description: True when `last_seen_at` is older than 2 minutes or absent. Computed
            at read time, not stored. Equivalent to `instance_status == "stale"`; both are
            returned for backward compatibility while clients update.
        busy_job_count:
          type: integer
          minimum: 0
          description: Number of jobs this worker session is currently holding.
        current_jobs:
          type: array
          description: Currently claimed jobs held by this worker session.
          items:
            $ref: '#/components/schemas/WorkerSessionJobRef'
        last_job:
          $ref: '#/components/schemas/WorkerSessionJobRef'
          description: Most recent completed or failed job this worker session handled.
    WorkerSessionJobRef:
      type: object
      additionalProperties: false
      required:
      - id
      - run_id
      - step_name
      - action
      - status
      - updated_at
      properties:
        id:
          type: string
          description: Job ID.
        run_id:
          type: string
          description: Workflow run that owns the job.
        step_name:
          type: string
          description: Workflow step name.
        action:
          type: string
          description: Action executed by the worker.
        status:
          type: string
          enum:
          - pending
          - claimed
          - completed
          - failed
          description: Current job lifecycle state.
        claimed_at:
          type: string
          format: date-time
          description: Timestamp when the worker claimed the job.
        heartbeat_at:
          type: string
          format: date-time
          description: Most recent heartbeat timestamp while the job is claimed.
        updated_at:
          type: string
          format: date-time
          description: Last job update timestamp.
    WorkerSessionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - totals
      properties:
        items:
          type: array
          description: The list of recently seen worker sessions.
          items:
            $ref: '#/components/schemas/WorkerSession'
        totals:
          $ref: '#/components/schemas/WorkerSessionTotals'
          description: Aggregate counts across `items`, computed by the server so UIs do not
            need to re-derive them on every render.
    WorkerSessionTotals:
      type: object
      additionalProperties: false
      required:
      - active_instances
      - slots
      - busy
      - stale
      description: Project-wide rollup of the rendered worker sessions. Useful for the page
        header — "3 active instances · 18 slots · 7 busy · 1 stale" — without iterating items
        client-side.
      properties:
        active_instances:
          type: integer
          minimum: 0
          description: Count of `instance_status == "active"` rows.
        slots:
          type: integer
          minimum: 0
          description: Sum of `concurrency_limit` across active rows.
        busy:
          type: integer
          minimum: 0
          description: Sum of `busy_job_count` across active rows.
        stale:
          type: integer
          minimum: 0
          description: Count of `instance_status == "stale"` rows.
    User:
      type: object
      additionalProperties: false
      description: Human identity known to the organization. User records are useful for membership
        lists, role assignment UIs, attribution, and displaying profile information next to
        actions.
      required:
      - id
      - email
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Clerk user ID. Stable and globally unique across all orgs.
        email:
          type: string
          description: Primary email address from Clerk.
        first_name:
          type: string
          description: User's first name from their Clerk profile.
        last_name:
          type: string
          description: User's last name from their Clerk profile.
        avatar_url:
          type: string
          description: Profile avatar URL from Clerk (may be a Gravatar or uploaded image).
        created_at:
          type: string
          format: date-time
          description: When the user record was first mirrored into Mobius.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this user record was last synced from Clerk.
    ProjectAccessMode:
      type: string
      enum:
      - org_open
      - restricted
      description: '`org_open`: every org member can see and use the project, subject to role
        assignments. `restricted`: only listed project members (and org owners/admins) can
        see or use the project.'
    Project:
      type: object
      additionalProperties: false
      description: Workspace boundary for workflows, actions, credentials, agents, and runtime
        activity. Most operational APIs are project-scoped, so this object tells clients which
        handle to use and who can see the project.
      required:
      - id
      - name
      - handle
      - access_mode
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this project.
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug used as a path segment in all project-scoped API routes.
            Unique within the org. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Current project access policy: `org_open` or `restricted`.'
        created_by:
          type: string
          description: User ID of the org member who created this project.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this project was archived. `null` for active projects.
            Archived projects are read-only and excluded from the default project listing.
        default_agent_role_id:
          type: string
          nullable: true
          description: Role assigned to the auto-created service account of any new agent
            in this project, when no per-call `role_ids` are supplied on `createAgent`. `null`
            falls through to the system `Agent` role floor.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this project.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this project was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this project was last updated.
    ProjectListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Project'
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug for API routes. Auto-derived from name if omitted. Must
            be unique within the org. Cannot be changed after creation.
        description:
          type: string
          description: Optional human-readable description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Initial project access policy: `org_open` or `restricted`.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        description:
          type: string
          description: Replacement description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Replacement project access policy: `org_open` or `restricted`.'
        seed_existing_members:
          type: boolean
          description: When transitioning from `org_open` to `restricted`, set true to insert
            all current org members as project members so nobody loses visibility on the flip.
            Ignored on other transitions.
        default_agent_role_id:
          type: string
          nullable: true
          description: Replacement role assigned to the auto-created service account of any
            new agent in this project. `null` clears the override and falls through to the
            system `Agent` role floor. Must resolve to a system-defined role or a role scoped
            to this project.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the project.
    ProjectMember:
      type: object
      additionalProperties: false
      description: Explicit project membership used when a project is restricted. Use this
        record to decide who can see or operate on a project outside the default org-wide
        access model.
      required:
      - id
      - project_id
      - user_id
      - added_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        project_id:
          type: string
          description: ID of the project this membership belongs to.
        user_id:
          type: string
          description: ID of the user who is a member.
        user:
          $ref: '#/components/schemas/User'
          description: Profile of the member. Embedded by `listProjectMembers` so UIs can
            render names, emails, and avatars without a separate user lookup. Absent on the
            `addProjectMember` response.
        added_by_actor_type:
          type: string
          description: Actor type of whoever added this member, if recorded.
        added_by_actor_id:
          type: string
          description: Actor ID of whoever added this member, if recorded.
        added_at:
          type: string
          format: date-time
          description: Timestamp when the member was added.
    ProjectMemberListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of members for this project.
          items:
            $ref: '#/components/schemas/ProjectMember'
        has_more:
          type: boolean
          description: Whether more results are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    AddProjectMemberRequest:
      type: object
      additionalProperties: false
      required:
      - user_id
      properties:
        user_id:
          type: string
          description: User ID of the org member to add to this project.
    GenerateRequest:
      type: object
      additionalProperties: true
      required:
      - model
      - messages
      properties:
        model:
          type: string
          description: Model identifier, for example `claude-sonnet-4-20250514`.
        provider:
          type: string
          enum:
          - anthropic
          - openai
          - google
          - grok
          - xai
          default: anthropic
          description: Provider used to resolve project integration credentials. Omit for
            Anthropic. `xai` is accepted as an alias for `grok`.
        system:
          oneOf:
          - type: string
          - type: array
            items:
              $ref: '#/components/schemas/SystemTextBlock'
          description: System prompt, either a string or Anthropic text blocks.
        messages:
          type: array
          maxItems: 128
          description: Conversation history in Anthropic Messages format. `content` may be
            a string or content-block array.
          items:
            $ref: '#/components/schemas/GenerateMessage'
        tools:
          type: array
          maxItems: 64
          description: Anthropic tool definitions.
          items:
            $ref: '#/components/schemas/GenerateToolDefinition'
        tool_choice:
          $ref: '#/components/schemas/GenerateToolChoice'
        max_tokens:
          type: integer
          minimum: 1
          default: 4096
        temperature:
          type: number
        stop_sequences:
          type: array
          maxItems: 16
          items:
            type: string
        stream:
          type: boolean
          default: false
        metadata:
          type: object
          additionalProperties: true
          description: Optional Anthropic metadata such as `user_id`.
    SystemTextBlock:
      type: object
      additionalProperties: false
      required:
      - type
      - text
      properties:
        type:
          type: string
          enum:
          - text
        text:
          type: string
        cache_control:
          type: object
          additionalProperties: true
    GenerateMessage:
      type: object
      additionalProperties: false
      required:
      - role
      - content
      properties:
        role:
          type: string
          enum:
          - user
          - assistant
        content:
          oneOf:
          - type: string
          - type: array
            items:
              $ref: '#/components/schemas/ContentBlock'
    ContentBlock:
      oneOf:
      - $ref: '#/components/schemas/TextContentBlock'
      - $ref: '#/components/schemas/ImageContentBlock'
      - $ref: '#/components/schemas/ToolUseContentBlock'
      - $ref: '#/components/schemas/ToolResultContentBlock'
    TextContentBlock:
      type: object
      additionalProperties: false
      required:
      - type
      - text
      properties:
        type:
          type: string
          enum:
          - text
        text:
          type: string
        cache_control:
          type: object
          additionalProperties: true
    ImageContentBlock:
      type: object
      additionalProperties: false
      required:
      - type
      - source
      properties:
        type:
          type: string
          enum:
          - image
        source:
          type: object
          additionalProperties: true
        cache_control:
          type: object
          additionalProperties: true
    ToolUseContentBlock:
      type: object
      additionalProperties: false
      required:
      - type
      - id
      - name
      - input
      properties:
        type:
          type: string
          enum:
          - tool_use
        id:
          type: string
        name:
          type: string
        input:
          type: object
          additionalProperties: true
    ToolResultContentBlock:
      type: object
      additionalProperties: false
      required:
      - type
      - tool_use_id
      - content
      properties:
        type:
          type: string
          enum:
          - tool_result
        tool_use_id:
          type: string
        content:
          oneOf:
          - type: string
          - type: array
            items:
              $ref: '#/components/schemas/ContentBlock'
        is_error:
          type: boolean
        cache_control:
          type: object
          additionalProperties: true
    GenerateToolDefinition:
      type: object
      additionalProperties: true
      required:
      - name
      - input_schema
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          type: object
          additionalProperties: true
    GenerateToolChoice:
      type: object
      additionalProperties: false
      required:
      - type
      oneOf:
      - additionalProperties: false
        required:
        - type
        - name
        properties:
          type:
            type: string
            enum:
            - tool
          name:
            type: string
      - additionalProperties: false
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - auto
            - any
            - none
      properties:
        type:
          type: string
          enum:
          - auto
          - any
          - tool
          - none
        name:
          type: string
    LLMGenerateResponse:
      type: object
      additionalProperties: false
      required:
      - id
      - type
      - role
      - model
      - content
      - stop_reason
      - usage
      properties:
        id:
          type: string
        type:
          type: string
          enum:
          - message
          default: message
        role:
          type: string
          enum:
          - assistant
        model:
          type: string
        content:
          type: array
          items:
            type: object
            additionalProperties: true
        stop_reason:
          type: string
          nullable: true
          description: Why generation stopped.
        stop_sequence:
          type: string
          nullable: true
        usage:
          $ref: '#/components/schemas/LLMGenerateUsage'
    LLMGenerateUsage:
      type: object
      additionalProperties: false
      required:
      - input_tokens
      - output_tokens
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_creation_input_tokens:
          type: integer
        cache_read_input_tokens:
          type: integer
    WebhookDeliveryStatus:
      type: string
      enum:
      - pending
      - processing
      - delivered
      - failed
      description: '`pending` — queued, not yet attempted. `processing` — currently being
        delivered. `delivered` — recipient returned 2xx. `failed` — all retry attempts exhausted.'
    Webhook:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - url
      - events
      - enabled
      - created_at
      - updated_at
      description: A project-level outgoing webhook subscription. When a subscribed event
        fires, Mobius POSTs the event payload to `url`.
      properties:
        id:
          type: string
          description: Unique identifier for this webhook.
        name:
          type: string
          description: Human-readable name, unique within the project.
        url:
          type: string
          description: The customer endpoint Mobius POSTs event payloads to.
        events:
          type: array
          items:
            type: string
          description: Subscribed event types. Use dot notation (`run.completed`, `run.failed`)
            or wildcards (`run.*` for all run events).
        enabled:
          type: boolean
          description: When false, matching events are not delivered.
        created_by:
          type: string
          description: User ID of the org member who created this webhook.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this webhook.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this webhook was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this webhook was last updated.
    WebhookListResponse:
      type: object
      additionalProperties: false
      required:
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Webhook'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    WebhookDelivery:
      type: object
      additionalProperties: false
      required:
      - id
      - webhook_id
      - event_type
      - status
      - attempts
      - created_at
      description: One delivery record for a webhook event. The daemon claims pending rows,
        POSTs the payload, and transitions to `delivered` or retries on failure. A delivery
        reaches `failed` only after exhausting all 10 retry attempts.
      properties:
        id:
          type: string
          description: Unique identifier for this delivery record.
        webhook_id:
          type: string
          description: ID of the webhook this delivery belongs to.
        run_id:
          type: string
          description: Run that triggered the event, when applicable.
        event_type:
          type: string
          description: The event type that triggered this delivery (e.g. `run.completed`).
        status:
          $ref: '#/components/schemas/WebhookDeliveryStatus'
          description: 'Current delivery status: `pending`, `delivered`, or `failed`.'
        attempts:
          type: integer
          description: Number of delivery attempts made so far. Max 10.
        last_error:
          type: string
          description: Error message from the most recent failed attempt.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this delivery was first attempted.
        delivered_at:
          type: string
          format: date-time
          description: Timestamp of the successful delivery. Absent until delivered.
    WebhookDeliveryListResponse:
      type: object
      additionalProperties: false
      required:
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/WebhookDelivery'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateWebhookRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - events
      properties:
        name:
          type: string
          description: Human-readable name, unique within the project.
        url:
          type: string
          description: The endpoint Mobius will POST event payloads to. May be left empty
            at creation time so a candidate URL can be tested via the ping endpoint before
            it is saved; events do not fire for webhooks with an empty URL.
        signing_secret:
          type: string
          description: 'Optional HMAC-SHA256 secret. When set, Mobius signs each POST body
            and includes `X-Mobius-Signature: sha256=<hex>` in the request headers.'
        events:
          type: array
          items:
            type: string
          description: Event types to subscribe to. Use wildcards for broad subscriptions,
            e.g. `["run.*"]` for all run events.
        enabled:
          type: boolean
          description: Whether the webhook starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateWebhookRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        url:
          type: string
          description: Replacement endpoint URL.
        signing_secret:
          type: string
          description: Replace the current signing secret. Set to empty string to disable
            signing. Omit to leave the current secret unchanged.
        events:
          type: array
          items:
            type: string
          description: Replacement event subscriptions. Replaces the entire current list.
        enabled:
          type: boolean
          description: Set to false to disable delivery without deleting the webhook.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the webhook. System tags
            (`mobius:*`) are preserved.
    PingWebhookRequest:
      type: object
      additionalProperties: false
      properties:
        url:
          type: string
          description: URL to test. When supplied, the ping is sent to this URL instead of
            the webhook's saved URL — use this to validate a candidate URL before saving it.
            When omitted, the webhook's current saved URL is used.
    PingWebhookResult:
      type: object
      additionalProperties: false
      required:
      - success
      properties:
        success:
          type: boolean
          description: True if the target responded with a 2xx status code.
        status_code:
          type: integer
          description: HTTP status code returned by the target. Absent on network error.
        error:
          type: string
          description: Error message if the request could not be completed.
        latency_ms:
          type: integer
          description: Round-trip latency in milliseconds.
    IntegrationStatus:
      type: string
      enum:
      - active
      - inactive
      - expired
      description: '`active` — integration is enabled and usable by workflows. `inactive`
        — manually disabled; no automatic expiry behavior. `expired` — token/credential has
        expired (e.g., OAuth token not refreshed).'
    IntegrationProvidersResponse:
      type: object
      additionalProperties: false
      required:
      - providers
      description: Integration providers and capabilities available to a project.
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationProvider'
    IntegrationProvider:
      type: object
      additionalProperties: false
      required:
      - name
      - display_name
      - auth_kind
      - capabilities
      - connection
      - events
      - actions
      - trigger_patterns
      properties:
        name:
          type: string
          description: Stable provider identifier (`github`, `slack`, …).
        display_name:
          type: string
        description:
          type: string
          description: Human-readable provider summary for directory and detail surfaces.
        category:
          type: string
          description: Human-readable grouping label for directory surfaces.
        icon:
          type: string
          description: Stable icon key that clients may map to their own icon set.
        auth_kind:
          type: string
          description: Authentication mechanism the provider uses (e.g. `github_app_install`,
            `oauth2`, `api_key`).
        docs_url:
          type: string
          description: Link to upstream provider docs, when known.
        capabilities:
          type: object
          additionalProperties:
            type: boolean
          description: Boolean capability flags reflecting which framework interfaces the
            provider implements (`connect`, `sync`, `live_status`, etc.).
        connection:
          $ref: '#/components/schemas/IntegrationProviderConnection'
        events:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationProviderEventType'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationProviderAction'
        trigger_patterns:
          type: array
          description: Provider-owned trigger authoring presets. Empty until trigger patterns
            are registered for this provider.
          items:
            $ref: '#/components/schemas/IntegrationProviderTriggerPattern'
    IntegrationProviderConnection:
      type: object
      additionalProperties: false
      required:
      - connected
      description: Project-local connection summary for a provider.
      properties:
        connected:
          type: boolean
          description: True when this project has an active integration row for the provider.
        integration_id:
          type: string
          description: Most relevant integration ID for this provider in the project, when
            one exists.
        integration_name:
          type: string
          description: Most relevant integration name for this provider in the project, when
            one exists.
        status:
          $ref: '#/components/schemas/IntegrationStatus'
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the most relevant integration row was last updated.
    IntegrationProviderTriggerPattern:
      type: object
      additionalProperties: false
      required:
      - id
      - label
      description: Catalog descriptor for creating a trigger from a provider-owned event pattern.
        The array is currently empty for all providers; this schema reserves the response
        shape for the trigger-pattern rollout.
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
        event_type:
          type: string
        category:
          type: string
    IntegrationProviderEventType:
      type: object
      additionalProperties: false
      required:
      - name
      - schema_version
      properties:
        name:
          type: string
          description: Dotted event-type identifier (`github.pull_request.opened`).
        schema_version:
          type: integer
          description: Integer schema version. Bumps are additive-only by convention.
        description:
          type: string
        payload_schema:
          type: object
          additionalProperties: true
          description: JSON Schema for the event payload. Absent when the registered Go type
            cannot be reflected meaningfully (for example, `map[string]any` aliases of raw
            upstream payloads).
    IntegrationProviderAction:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Workflow-callable action name (`github.create-comment`).
        title:
          type: string
        description:
          type: string
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema for the action's parameters object.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema for the action's result object.
    RunMetrics:
      type: object
      additionalProperties: false
      description: Workflow run statistics for the rolling window.
      required:
      - per_minute
      - total_window
      - failure_rate
      - avg_seconds
      - p95_step_seconds
      - queue_depth
      - running_count
      - status_breakdown
      properties:
        per_minute:
          type: number
          format: double
          description: Average number of new runs started per minute within the window.
        total_window:
          type: integer
          description: Total runs started within the window.
        failure_rate:
          type: number
          format: double
          description: Fraction of completed runs that ended in `failed` status. Range 0.0–1.0.
        avg_seconds:
          type: number
          format: double
          description: Mean wall-clock duration of completed runs within the window, in seconds.
        p95_step_seconds:
          type: number
          format: double
          description: 95th-percentile job duration (claim→terminal) from the 40 most recent
            completed jobs, in seconds.
        queue_depth:
          type: integer
          description: Number of jobs currently in `pending` state.
        running_count:
          type: integer
          description: Number of runs currently in the `active` lifecycle.
        status_breakdown:
          type: object
          additionalProperties:
            type: integer
          description: Map of run status → count across all runs in the project (not windowed).
    JobMetrics:
      type: object
      additionalProperties: false
      description: Job queue statistics.
      required:
      - pending
      - claimed
      - failed_window
      - retry_rate
      properties:
        pending:
          type: integer
          description: Jobs currently in `pending` state.
        claimed:
          type: integer
          description: Jobs currently in `claimed` state.
        failed_window:
          type: integer
          description: Jobs that reached a terminal failed state within the window.
        retry_rate:
          type: number
          format: double
          description: Fraction of terminal jobs that required at least one retry within the
            window.
    WorkerMetrics:
      type: object
      additionalProperties: false
      description: Worker session health.
      required:
      - active
      - stale
      properties:
        active:
          type: integer
          description: Workers whose `last_seen_at` is within the staleness threshold.
        stale:
          type: integer
          description: Workers whose `last_seen_at` has exceeded the staleness threshold.
    InteractionMetrics:
      type: object
      additionalProperties: false
      description: Interaction queue statistics.
      required:
      - open_count
      - claimed_count
      - p95_response_seconds
      - status_breakdown
      properties:
        open_count:
          type: integer
          description: Interactions in `pending` or `claimed` state awaiting response.
        claimed_count:
          type: integer
          description: Interactions currently claimed by a responder.
        p95_response_seconds:
          type: number
          format: double
          description: 95th-percentile time from creation to resolution for completed interactions
            within the window.
        status_breakdown:
          type: object
          additionalProperties:
            type: integer
          description: Map of interaction status → count across all interactions in the project.
    ChannelMetrics:
      type: object
      additionalProperties: false
      description: Channel activity statistics.
      required:
      - active_count
      - message_rate
      properties:
        active_count:
          type: integer
          description: Non-archived channels in the project.
        message_rate:
          type: number
          format: double
          description: Average messages posted per minute within the window.
    ProjectMetrics:
      type: object
      additionalProperties: false
      description: Operational health snapshot for a project. Use it to power dashboards,
        detect stuck queues or stale workers, and summarize run throughput and failure rates
        over a recent window.
      required:
      - generated_at
      - window_minutes
      - runs
      - jobs
      - workers
      - interactions
      - channels
      - runs_per_minute
      - total_runs_window
      - failure_rate
      - avg_run_seconds
      - p95_step_seconds
      - queue_depth
      - running_count
      - active_workers
      - stale_workers
      - status_breakdown
      properties:
        generated_at:
          type: string
          format: date-time
          description: Timestamp when this metrics snapshot was computed.
        window_minutes:
          type: integer
          description: Rolling window width used for rate and failure metrics. Default is
            60 minutes.
        runs:
          $ref: '#/components/schemas/RunMetrics'
        jobs:
          $ref: '#/components/schemas/JobMetrics'
        workers:
          $ref: '#/components/schemas/WorkerMetrics'
        interactions:
          $ref: '#/components/schemas/InteractionMetrics'
        channels:
          $ref: '#/components/schemas/ChannelMetrics'
        runs_per_minute:
          type: number
          format: double
          description: 'Deprecated: use runs.per_minute.'
          x-deprecated: true
        total_runs_window:
          type: integer
          description: 'Deprecated: use runs.total_window.'
          x-deprecated: true
        failure_rate:
          type: number
          format: double
          description: 'Deprecated: use runs.failure_rate.'
          x-deprecated: true
        avg_run_seconds:
          type: number
          format: double
          description: 'Deprecated: use runs.avg_seconds.'
          x-deprecated: true
        p95_step_seconds:
          type: number
          format: double
          description: 'Deprecated: use runs.p95_step_seconds.'
          x-deprecated: true
        queue_depth:
          type: integer
          description: 'Deprecated: use runs.queue_depth.'
          x-deprecated: true
        running_count:
          type: integer
          description: 'Deprecated: use runs.running_count.'
          x-deprecated: true
        active_workers:
          type: integer
          description: 'Deprecated: use workers.active.'
          x-deprecated: true
        stale_workers:
          type: integer
          description: 'Deprecated: use workers.stale.'
          x-deprecated: true
        status_breakdown:
          type: object
          additionalProperties:
            type: integer
          description: 'Deprecated: use runs.status_breakdown.'
          x-deprecated: true
    NotificationPreferences:
      type: object
      additionalProperties: false
      required:
      - org_id
      - actor_type
      - actor_id
      description: Per-actor delivery defaults applied when an interaction does not specify
        a `delivery` override (PRD 077 §3.8). One row per (org, actor_type, actor_id) in v1.
      properties:
        id:
          type: string
        org_id:
          type: string
        actor_type:
          type: string
          enum:
          - user
          - agent
        actor_id:
          type: string
        channels:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryChannel'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UpdateNotificationPreferencesRequest:
      type: object
      additionalProperties: false
      required:
      - channels
      properties:
        channels:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryChannel'
    InteractionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Interaction'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    CreateInteractionRequest:
      description: Creates an interaction directly. Use the standalone variant with no workflow
        side effect, or the run-backed variant that requires both `run_id` and `signal_name`
        so completion can resume the run. For worker/job usage, prefer the job-scoped route
        so the server can derive the owning run from the claimed job context.
      oneOf:
      - $ref: '#/components/schemas/CreateStandaloneInteractionRequest'
      - $ref: '#/components/schemas/CreateRunBackedInteractionRequest'
    CreateStandaloneInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - kind
      - target
      - message
      description: Creates a standalone interaction. Completion records the response but does
        not deliver a workflow signal.
      properties:
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: User, group, or agent that should receive the interaction.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind. Renamed from `type` in the PRD 077 v-bump.
        message:
          type: string
          description: Message shown to the responder describing what response is needed.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the message.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When target.type is "group", setting require_all=true means all snapshotted
            group members must respond before the interaction is considered complete. Ignored
            for non-group targets. Defaults to false when omitted. Mutually exclusive with
            `resolution_policy`; prefer the policy form for new code.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Declarative resolution rule. When supplied the policy evaluator drives
            completion; legacy `require_all`/`first_responder` behaviour is bypassed for that
            interaction.
        submission_review_policy:
          $ref: '#/components/schemas/ReviewPolicy'
          description: Template review policy applied to submissions of this interaction (PRD
            077 §3.5). Currently meaningful only for handoff-kind interactions.
        consumer:
          $ref: '#/components/schemas/Consumer'
          description: Polymorphic identifier of what is waiting on this interaction's resolution
            (PRD 077 §3.7). When omitted on a run-backed create request, the server derives
            a `kind=run` consumer from `run_id` and `signal_name`.
        delivery:
          $ref: '#/components/schemas/Delivery'
          description: Optional per-interaction delivery override (PRD 077 §3.8).
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded to.
    CreateRunBackedInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - run_id
      - signal_name
      - kind
      - target
      - message
      description: Creates a run-backed interaction. Completion delivers `signal_name` to
        `run_id` so a waiting run path can resume.
      properties:
        run_id:
          type: string
          description: ID of the workflow run to resume when this interaction is completed.
        signal_name:
          type: string
          description: Signal name the interaction will complete against when run-backed.
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: User, group, or agent that should receive the interaction.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind. Renamed from `type` in the PRD 077 v-bump.
        message:
          type: string
          description: Message shown to the responder describing what response is needed.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the message.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When target.type is "group", setting require_all=true means all snapshotted
            group members must respond before the interaction is considered complete. Ignored
            for non-group targets. Defaults to false when omitted. Mutually exclusive with
            `resolution_policy`; prefer the policy form for new code.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Declarative resolution rule. When supplied the policy evaluator drives
            completion; legacy `require_all`/`first_responder` behaviour is bypassed for that
            interaction.
        submission_review_policy:
          $ref: '#/components/schemas/ReviewPolicy'
          description: Template review policy applied to submissions of this interaction (PRD
            077 §3.5). Currently meaningful only for handoff-kind interactions.
        consumer:
          $ref: '#/components/schemas/Consumer'
          description: Polymorphic identifier of what is waiting on this interaction's resolution
            (PRD 077 §3.7). When omitted on a run-backed create request, the server derives
            a `kind=run` consumer from `run_id` and `signal_name`.
        delivery:
          $ref: '#/components/schemas/Delivery'
          description: Optional per-interaction delivery override (PRD 077 §3.8).
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded to.
    RespondToInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - value
      properties:
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by the responder.
        comment:
          type: string
          description: Optional free-text comment accompanying the response. Available on
            every interaction kind (approval, choice, multi-choice, input) and never gated
            by the spec — the responder may always attach reasoning, caveats, or follow-up
            notes alongside `value`.
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Optional 0..1 confidence score the responder attaches to their answer.
            Required when the interaction's resolution policy weights by confidence; ignored
            otherwise.
    SubmitHandoffRequest:
      type: object
      additionalProperties: false
      required:
      - value
      properties:
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: Evidence or completion payload supplied by the assignee.
        comment:
          type: string
          description: Optional note from the assignee.
    ReviewHandoffRequest:
      type: object
      additionalProperties: false
      properties:
        comment:
          type: string
          description: Optional review note for acceptance.
    SendBackHandoffRequest:
      type: object
      additionalProperties: false
      required:
      - comment
      properties:
        comment:
          type: string
          minLength: 1
          description: Feedback explaining what needs to change before resubmission.
    InteractionBallot:
      type: object
      additionalProperties: false
      required:
      - id
      - interaction_id
      - voter_type
      - cast_at
      description: One voter's ballot on a vote-kind interaction. Distinct from `InteractionResponse`
        because ballots carry changeable, withdrawable, and optionally anonymous semantics
        (PRD 077).
      properties:
        id:
          type: string
        interaction_id:
          type: string
        voter_type:
          type: string
          enum:
          - user
          - agent
          description: Voter actor class.
        voter_id:
          type: string
          description: Voter identity. Anonymised (omitted) when the vote's `anonymous` rule
            is true and the caller is not the interaction owner.
        choices:
          type: array
          items:
            type: string
          description: Option values selected by this voter.
        comment:
          type: string
          nullable: true
        cast_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        withdrawn:
          type: boolean
          description: True when the voter withdrew before close.
        withdrawn_at:
          type: string
          format: date-time
          nullable: true
    InteractionBallotListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InteractionBallot'
    CastBallotRequest:
      type: object
      additionalProperties: false
      required:
      - choices
      properties:
        choices:
          type: array
          minItems: 1
          items:
            type: string
          description: Option values the voter selects. `select`-mode votes accept exactly
            one entry; `multi_select` accepts one or more.
        comment:
          type: string
          description: Optional free-text comment alongside the vote.
    CloseVoteRequest:
      type: object
      additionalProperties: false
      description: Optional payload accompanying a close-vote call.
      properties:
        comment:
          type: string
          description: Free-text reason recorded with the close event.
    CancelInteractionRequest:
      type: object
      additionalProperties: false
      description: Optional payload accompanying a cancel request. The reason is recorded
        on the interaction and forwarded in the cancellation signal so workflows can route
        to a fallback.
      properties:
        reason:
          type: string
          description: Free-text reason recorded on the interaction.
    Group:
      type: object
      additionalProperties: true
      description: Project-scoped collection of users used as an interaction target. Groups
        let workflows route approvals, reviews, and input requests to a team by handle rather
        than hard-coding individual users.
      required:
      - id
      - handle
      - name
      - routing_policy
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this group.
        handle:
          type: string
          description: URL-safe identifier, unique within the project. Immutable after creation.
        name:
          type: string
          description: Human-readable display name.
        description:
          type: string
          description: Optional human-readable description.
        routing_policy:
          type: string
          enum:
          - first_responder
          - all_members
          description: 'How interactions targeting this group collect responses. `first_responder`:
            first member to claim or respond wins. `all_members`: every snapshotted member
            must respond.'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this group was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this group was last updated.
    GroupListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Group'
    GroupWithCount:
      description: Group plus its current live member count. Use this lighter summary in list
        views where clients need to show routing targets without fetching the full member
        list for every group.
      allOf:
      - $ref: '#/components/schemas/Group'
      - type: object
        required:
        - member_count
        properties:
          member_count:
            type: integer
            description: Current live member count. May differ from interaction membership
              snapshots.
    GroupWithCountListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/GroupWithCount'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    GroupMember:
      type: object
      additionalProperties: false
      description: User membership in a project group. Membership determines who receives
        future group-targeted interactions; existing interaction snapshots are not retroactively
        changed.
      required:
      - id
      - group_id
      - user_id
      - added_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        group_id:
          type: string
          description: ID of the group this membership belongs to.
        user_id:
          type: string
          description: ID of the user who is a member.
        added_by:
          type: string
          nullable: true
          description: User ID of the org member who added this person to the group.
        added_at:
          type: string
          format: date-time
          description: Timestamp when this member was added to the group.
    GroupMemberListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/GroupMember'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    CreateGroupRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        handle:
          type: string
          description: URL-safe handle, unique within the project. Auto-derived from name
            if omitted.
        name:
          type: string
          description: Display name (1–64 chars).
        description:
          type: string
          description: Optional human-readable description.
        routing_policy:
          type: string
          enum:
          - first_responder
          - all_members
          default: first_responder
          description: 'How responses are collected from group members: `first_responder`
            or `all_members`. Defaults to `first_responder`.'
    UpdateGroupRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        description:
          type: string
          description: Replacement description.
        routing_policy:
          type: string
          enum:
          - first_responder
          - all_members
          description: Replacement routing policy, either `first_responder` or `all_members`.
            Affects future interactions only; in-flight interactions retain the snapshotted
            policy.
    AddGroupMemberRequest:
      type: object
      additionalProperties: false
      required:
      - user_id
      properties:
        user_id:
          type: string
          description: Org member user ID to add. Must be a current org member.
    AgentStatus:
      type: string
      enum:
      - active
      - inactive
      description: Administrative status. Inactive agents cannot claim new jobs.
    AgentPresence:
      type: string
      enum:
      - online
      - offline
      - stale
      description: Computed from the most recent 20 sessions. `online` means a connected session
        with a fresh heartbeat; `stale` means heartbeats are overdue; `offline` means no connected
        sessions.
    AgentSessionStatus:
      type: string
      enum:
      - connected
      - disconnected
      - stale
      description: Connection state for an agent session. `connected` sessions are usable,
        `stale` sessions have missed heartbeats, and `disconnected` sessions have been closed.
    Agent:
      type: object
      additionalProperties: false
      description: Project-scoped automated worker identity backed by a service account. Agents
        are useful when workflows need to target a named machine actor with capabilities,
        configuration, and session presence.
      required:
      - id
      - service_account_id
      - name
      - status
      - presence
      - connection_status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this agent.
        service_account_id:
          type: string
          description: The service account whose credentials this agent uses to authenticate.
            Each service account backs at most one agent; this binding is immutable after
            creation.
        name:
          type: string
          description: Mutable unique name within the project. Free-form human-readable label;
            use `id` for stable references and job targeting.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform agent classification for tooling and filtering (e.g. "llm",
            "rpa").
        color:
          type: string
          description: Display color for this agent in UI surfaces such as channel avatars
            and message rails. One of the Mantine color palette keys (e.g. `indigo`, `teal`,
            `grape`); empty string falls back to a hash-derived color.
          maxLength: 24
        capabilities:
          type: object
          additionalProperties: true
          description: Arbitrary capability map used by orchestrators to select suitable agents.
        config:
          type: object
          additionalProperties: true
          description: Agent-specific configuration blob stored and returned opaquely.
        status:
          $ref: '#/components/schemas/AgentStatus'
          description: 'Current agent status: `active` or `inactive`.'
        presence:
          $ref: '#/components/schemas/AgentPresence'
          description: Deprecated alias of connection_status for first rollout compatibility.
        connection_status:
          $ref: '#/components/schemas/ActorConnectionStatus'
        connection_last_seen_at:
          type: string
          format: date-time
        presence_source:
          $ref: '#/components/schemas/ActorPresenceSource'
        email_address:
          type: string
          description: Inbox address provisioned via POST /v1/projects/{project}/agents/{id}/inbox
            (opt-in; not created automatically at agent creation). The field is populated
            only after a successful provisioning call. Use this address to add the agent as
            a member on external platforms (Linear, GitHub, Slack, etc.) so the platform can
            deliver notifications to the agent.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this agent.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this agent was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this agent was last updated.
    AgentSession:
      type: object
      additionalProperties: false
      description: Live or historical connection from an agent process. Use sessions to monitor
        availability, transport, metadata, and heartbeat freshness for automated workers.
      required:
      - id
      - agent_id
      - status
      - transport
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this session.
        agent_id:
          type: string
          description: ID of the agent this session belongs to.
        status:
          $ref: '#/components/schemas/AgentSessionStatus'
          description: 'Current session status: `connected` or `disconnected`.'
        transport:
          type: string
          description: Connection mechanism identifier (e.g. "sse", "polling").
        metadata:
          type: object
          additionalProperties: true
          description: Caller-supplied metadata (e.g. hostname, version, region).
        connected_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this session was established.
        last_seen_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent heartbeat.
        disconnected_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this session was closed. Null while connected.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this session record was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this session was last updated.
    AgentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Agent'
    AgentSessionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/AgentSession'
    ToolkitActionGrant:
      type: object
      additionalProperties: false
      required:
      - selector_type
      - selector
      properties:
        selector_type:
          type: string
          enum:
          - exact
          - group
          - platform
          - custom
          - workflow
          - wildcard
          description: How to match action catalog names.
        selector:
          type: string
          description: 'Selector value. Examples: `github.list_issues`, `github.*`, `platform.github.*`,
            `custom.*`, `workflow.*`, or `*`.'
    Toolkit:
      type: object
      additionalProperties: false
      required:
      - id
      - org_id
      - project_id
      - name
      - source
      - status
      - action_grants
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Toolkit ID (TypeID `tk_...`).
        org_id:
          type: string
        project_id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        source:
          type: string
          enum:
          - system
          - project
        status:
          type: string
          enum:
          - active
          - archived
        action_grants:
          type: array
          description: Action selectors granted by this toolkit. Each entry is matched against
            the unified action catalog at manifest-resolution time.
          items:
            $ref: '#/components/schemas/ToolkitActionGrant'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ToolkitRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        slug:
          type: string
          description: Optional stable slug. When omitted, the server derives one from `name`.
        description:
          type: string
          maxLength: 1000
        action_grants:
          type: array
          items:
            $ref: '#/components/schemas/ToolkitActionGrant'
    ToolkitListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Toolkit'
    ToolkitAssignment:
      type: object
      additionalProperties: false
      required:
      - agent_id
      - toolkit_id
      - position
      - created_at
      properties:
        agent_id:
          type: string
        toolkit_id:
          type: string
        toolkit:
          $ref: '#/components/schemas/Toolkit'
        position:
          type: integer
        created_at:
          type: string
          format: date-time
    ReplaceToolkitsRequest:
      type: object
      additionalProperties: false
      required:
      - toolkit_ids
      properties:
        toolkit_ids:
          type: array
          items:
            type: string
    ToolkitAssignmentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ToolkitAssignment'
    Skill:
      type: object
      additionalProperties: false
      required:
      - id
      - org_id
      - project_id
      - name
      - source
      - status
      - instructions
      - allowed_tools
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Skill ID (TypeID `skl_...`).
        org_id:
          type: string
        project_id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        source:
          type: string
          enum:
          - system
          - project
          - imported
        status:
          type: string
          enum:
          - active
          - archived
        instructions:
          type: string
          description: Markdown instructions loaded when the skill is active.
        allowed_tools:
          type: array
          description: Canonical action names, wildcard selectors, or group references that
            narrow the agent's effective tool set while this skill is active. Uses the same
            selector vocabulary as toolkit grants.
          items:
            type: string
        frontmatter:
          type: object
          additionalProperties: true
          description: Original imported frontmatter preserved for round-tripping.
        model_hint:
          type: string
          description: Advisory model preference; it does not override the agent model in
            v1.
        user_invocable:
          type: boolean
          description: Whether users may directly request this skill by name.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SkillRequest:
