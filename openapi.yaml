    Skill:
      type: object
      additionalProperties: false
      required:
      - id
      - org_id
      - project_id
      - name
      - source
      - status
      - instructions
      - allowed_tools
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Skill ID (TypeID `skill_...`).
        org_id:
          type: string
          description: Organization that owns this skill.
        project_id:
          type: string
          description: Project that owns this skill.
        name:
          type: string
          description: Human-readable skill name.
        slug:
          type: string
          description: Stable slug used in API paths and references.
        description:
          type: string
          description: Markdown description of the skill's purpose.
        source:
          type: string
          enum:
          - system
          - project
          - imported
          description: Provenance of this skill. `system` is built-in; `project` is user-authored;
            `imported` came from an external bundle.
        status:
          type: string
          enum:
          - active
          - archived
          description: Lifecycle status of the skill.
        instructions:
          type: string
          description: Markdown instructions loaded when the skill is active.
        allowed_tools:
          type: array
          description: Canonical action names, wildcard selectors, or group references that
            narrow the agent's effective tool set while this skill is active. Uses the same
            selector vocabulary as toolkit grants.
          items:
            type: string
        frontmatter:
          type: object
          additionalProperties: true
          description: Original imported frontmatter preserved for round-tripping.
        model_hint:
          type: string
          description: Advisory model preference; it does not override the agent model in
            v1.
        user_invocable:
          type: boolean
          description: Whether users may directly request this skill by name.
        created_by:
          type: string
          description: User ID of the principal who created this skill.
        updated_by:
          type: string
          description: User ID of the principal who last updated this skill.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
    SkillRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - instructions
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          description: Human-readable skill name.
        slug:
          type: string
          description: Optional stable slug. When omitted, the server derives one from `name`.
        description:
          type: string
          maxLength: 1000
          description: Markdown description of the skill's purpose.
        instructions:
          type: string
          minLength: 1
          description: Markdown instructions loaded when the skill is active.
        allowed_tools:
          type: array
          description: Tool selectors that narrow the agent's effective tool set while this
            skill is active.
          items:
            type: string
        frontmatter:
          type: object
          additionalProperties: true
          description: Original imported frontmatter preserved for round-tripping.
        model_hint:
          type: string
          description: Advisory model preference; does not override the agent's default model.
        user_invocable:
          type: boolean
          description: Whether users may directly request this skill by name.
    ImportSkillRequest:
