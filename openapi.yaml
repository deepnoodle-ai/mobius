      description: 'Returns the active org''s pluggable definition-source configuration: where
        definitions resolve from (`mobius_stored` default or `client_resolver`) and, for the
        client resolver, the endpoint and caching policy. The bearer token is never returned
        — `auth_configured` reports whether one is set. Requires `Admin` or `Owner` membership.'
