    EnvironmentStartWorkerResult:
      type: object
      additionalProperties: false
      required:
      - environment
      - api_key_id
      - key_expires_at
      - stdout
      - stderr
      - exit_code
      properties:
        environment:
          $ref: '#/components/schemas/Environment'
        api_key_id:
          type: string
        key_expires_at:
          type: string
          format: date-time
        stdout:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer
    SecretValues:
      type: object
      additionalProperties:
        type: string
      minProperties: 1
      description: JSON key/value payload encrypted as a SecretVersion.
    SecretVersionState:
      type: string
      enum:
      - ENABLED
      - DISABLED
      - DESTROYED
      description: Secret version lifecycle state.
    Secret:
      type: object
      additionalProperties: false
      description: Project-scoped secret metadata. Values are never returned.
      required:
      - id
      - name
      - version
      - key_names
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique secret ID.
        name:
          type: string
          description: Project-scoped secret name.
        description:
          type: string
          description: Optional human-readable description.
        version:
          type: integer
          format: int64
          description: Latest version number.
        key_names:
          type: array
          items:
            type: string
          description: Sorted keys present in the latest version.
        created_by:
          type: string
          description: User ID of the principal who created this secret.
        updated_by:
          type: string
          description: User ID of the principal who last updated this secret.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SecretVersion:
      type: object
      additionalProperties: false
      description: SecretVersion metadata. Values are never returned.
      required:
      - id
      - secret_id
      - version
      - state
      - sha256
      - created_at
      properties:
        id:
          type: string
          description: Unique secret version ID.
        secret_id:
          type: string
          description: Parent secret ID.
        version:
          type: integer
          format: int64
          description: Version number.
        state:
          $ref: '#/components/schemas/SecretVersionState'
        sha256:
          type: string
          description: SHA-256 of the canonical JSON plaintext, for change detection only.
        kms_key_id:
          type: string
          description: Key identifier used to seal the payload.
        created_by:
          type: string
          description: User that created this version, when known.
        created_at:
          type: string
          format: date-time
        destroyed_at:
          type: string
          format: date-time
    SecretListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Secret'
        next_cursor:
          type: string
          description: Cursor for the next page, when more results exist.
    SecretVersionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SecretVersion'
    CreateSecretRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - values
      properties:
        name:
          type: string
          description: Project-scoped secret name.
        description:
          type: string
          description: Optional human-readable description.
        values:
          $ref: '#/components/schemas/SecretValues'
    UpdateSecretRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          description: Replacement description.
        values:
          $ref: '#/components/schemas/SecretValues'
    JobClaimRequest:
      type: object
      additionalProperties: false
      required:
      - worker_instance_id
      - worker_session_token
      - concurrency_limit
      description: Body for `POST /jobs/claim`. Workers identify themselves with `worker_instance_id`
        (the row key on the workers page) plus a per-boot `worker_session_token`. The server
        returns an opaque `lease_token` on the claim that folds the session token and the
        claim attempt together; subsequent fenced calls echo the `lease_token`, not the raw
        session token.
      properties:
        worker_instance_id:
          type: string
          description: Caller-configured stable identifier for the worker process. The SDK
            auto-detects this on Cloud Run, Kubernetes, Fly, Railway, and Render; otherwise
            it falls back to OS hostname then to a per-boot UUID. Stored on the claimed job
            as `claimed_by` for human-readable display.
        worker_session_token:
          type: string
          description: Per-boot token generated by the SDK on Worker construction. Stamped
            onto the claimed job and folded into the `lease_token` returned in the `JobClaim`.
            Opaque to operators.
        concurrency_limit:
          type: integer
          minimum: 1
          default: 1
          description: Maximum number of concurrent in-flight jobs this worker process intends
            to hold. Recorded on the worker_session row; used for the saturation bar in the
            admin UI. The server does not enforce the limit — the worker is trusted to gate
            its own claim loop.
        worker_name:
          type: string
          description: Optional human-readable name shown in the worker list.
        worker_version:
          type: string
          description: Optional version string shown in the worker list.
        queues:
          type: array
          description: Queue names the worker subscribes to. When empty the worker claims
            from any queue in the project. Workflow runs default to the "default" queue when
            not otherwise specified.
          items:
            type: string
        actions:
          type: array
          description: Action names this worker can execute. When provided, only jobs whose
            `spec.kind == "action"` and whose `spec.name` is in this list are returned. When
            empty, action filtering is skipped.
          items:
            type: string
        handlers:
          type: array
          description: Code handler IDs this worker has registered. When provided, only jobs
            whose `spec.kind == "code"` and whose `spec.handler` is in this list are returned.
            When empty, no code jobs are claimed unless `actions` is also empty (in which
            case all matching queue/action criteria apply). Code-mode SDKs always populate
            this with the set of handlers they have registered.
          items:
            type: string
        wait_seconds:
          type: integer
          minimum: 0
          maximum: 30
          description: How long to hold the request open waiting for a job to surface. 0 returns
            immediately. Capped at 30 by the server.
    JobClaim:
      type: object
      additionalProperties: false
      description: Lease handed to a worker after a successful claim. Carries the `spec` of
        the work to do, an opaque `lease_token` the worker echoes on subsequent fenced calls,
        and a recommended heartbeat cadence.
      required:
      - job_id
      - run_id
      - workflow_name
      - step_name
      - spec
      - lease_token
      - queue
      properties:
        job_id:
          type: string
          description: Job ID — use as the `{id}` path parameter for heartbeat, report, history,
            events.
        run_id:
          type: string
          description: Parent workflow run ID.
        workflow_name:
          type: string
          description: Handle of the workflow definition that owns this run.
        step_name:
          type: string
          description: Step label from the workflow spec — used for UI and interaction signal
            name derivation. For code workflows this is the synthesised "run" step name.
        spec:
          $ref: '#/components/schemas/JobSpec'
          description: 'Discriminated description of the work to do. `kind: "action"` for
            spec-step worker jobs; `kind: "code"` for code-handler invocations.'
        agent_id:
          type: string
          description: Agent that should execute this job, when the step is agent-targeted.
        agent_presence_id:
          type: string
          description: Agent presence the job was routed to, when applicable.
        lease_token:
          type: string
          description: Opaque fence value the worker must echo on heartbeat / report / events
            calls. Combines the `worker_session_token` with the claim attempt; mismatch on
            echo returns 409 lease-lost.
        attempt_number:
          type: integer
          description: Workflow-level attempt counter, informational only. Action jobs increment
            this on automatic retry; code jobs always report 1 (the SDK manages its own per-step
            retry policy internally). Never the fence value — that role belongs to `lease_token`.
        queue:
          type: string
          description: Queue name the job was claimed from.
        heartbeat_interval_seconds:
          type: integer
          description: Recommended heartbeat interval in seconds. Workers should call `POST
            /v1/projects/{project}/jobs/{id}/heartbeat` at this cadence to keep the lease
            alive. Typically 30 seconds.
    JobSpec:
      description: 'Discriminated description of the work attached to a job. `kind: "action"`
        carries an action name and parameter map; the worker dispatches to the registered
        action handler. `kind: "code"` carries a registered handler id, the runtime hint,
        run inputs, and a cursor over the durable replay history; the worker dispatches to
        the user-authored code handler.'
      oneOf:
      - $ref: '#/components/schemas/JobActionSpec'
      - $ref: '#/components/schemas/JobCodeSpec'
      discriminator:
        propertyName: kind
        mapping:
          action: '#/components/schemas/JobActionSpec'
          code: '#/components/schemas/JobCodeSpec'
    JobActionSpec:
      type: object
      additionalProperties: false
      required:
      - kind
      - name
      description: Action-spec job description.
      properties:
        kind:
          type: string
          enum:
          - action
        name:
          type: string
          minLength: 1
          description: Action name the worker must execute for this step.
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters for this step, resolved from the workflow spec and
            prior step outputs.
    JobCodeSpec:
      type: object
      additionalProperties: false
      required:
      - kind
      - handler
      description: Code-spec job description.
      properties:
        kind:
          type: string
          enum:
          - code
        handler:
          type: string
          minLength: 1
          description: Stable handler id the worker SDK registered. The worker dispatches
            the job to the function registered under this id.
        runtime:
          type: string
          description: Opaque hint identifying the language/runtime that owns the handler
            ("typescript", "python", etc.). Informational only.
        inputs:
          type: object
          additionalProperties: true
          description: Inputs the run was started with. The SDK passes these to the handler
            as its first argument.
        history_cursor:
          type: string
          description: Opaque cursor the SDK passes to `GET /jobs/{id}/history?after=…` to
            stream replay history. The empty string is the "from the beginning" sentinel;
            the SDK should also treat an absent / empty value as "no further pages." Each
            resume advances the cursor past the previously fetched batch.
        history:
          type: array
          description: Optional inline history. The server may include a short history here
            when it knows the payload will fit; otherwise the SDK fetches it via `GET /jobs/{id}/history`.
            When set, the SDK should consume this batch as the prefix and only paginate via
            `history_cursor` for subsequent batches.
          items:
            $ref: '#/components/schemas/CodeStepCompletion'
    JobHeartbeatDirectives:
      type: object
      additionalProperties: false
      description: Server instructions returned with a heartbeat. Workers should inspect this
        on every heartbeat so cancellation and future control signals can interrupt long-running
        work promptly.
      properties:
        should_cancel:
          type: boolean
          default: false
          description: When true, the run has received a cancellation request. The worker
            must stop processing immediately and post a `fail` outcome via the report endpoint.
    JobHeartbeat:
      type: object
      additionalProperties: false
      description: Heartbeat acknowledgement for a claimed job. A successful response means
        the worker still owns the lease and should continue unless the directives say otherwise.
      required:
      - ok
      - directives
      properties:
        ok:
          type: boolean
          description: True when the lease was successfully refreshed.
        directives:
          $ref: '#/components/schemas/JobHeartbeatDirectives'
          description: Server instructions the worker should observe after the heartbeat.
    JobFenceRequest:
      type: object
      additionalProperties: false
      description: Lease fence presented on heartbeat / events. The worker echoes the `lease_token`
        from the original claim; the server unfolds the embedded session token + attempt and
        rejects with 409 lease-lost on mismatch.
      required:
      - lease_token
      properties:
        worker_instance_id:
          type: string
          description: Echo of the `worker_instance_id` from the claim. Logged for audit;
            not the fence value.
        lease_token:
          type: string
          description: Opaque lease fence value from the original claim. Mismatch returns
            409 lease-lost.
    JobReportRequest:
      type: object
      additionalProperties: false
      required:
      - lease_token
      - outcomes
      description: Report for a claimed job attempt. The worker echoes the `lease_token` from
        the claim and supplies an ordered list of `outcomes`. Terminal reports end in exactly
        one terminator (`complete` / `fail` / `suspend`); partial reports (`partial=true`)
        contain only code progress outcomes and keep the job claimed.
      properties:
        worker_instance_id:
          type: string
          description: Echo of the claim's `worker_instance_id`. Audit only.
        lease_token:
          type: string
          minLength: 1
          description: Opaque fence value from the original claim. Mismatch returns 409 lease-lost;
            a duplicate report with the same token and terminator is idempotent (204).
        outcomes:
          type: array
          description: Ordered list of outcomes. May contain zero or more durable progress
            entries (`step_done`, `wait_observed`) followed by exactly one terminator (`complete`,
            `fail`, `suspend`) on terminal reports. The terminator must be the final entry;
            no entry may follow it. With `partial=true`, the list must contain at least one
            progress entry and no terminator. Action-spec jobs may not include `step_done`
            or `wait_observed`; code-spec jobs may.
          minItems: 1
          items:
            $ref: '#/components/schemas/Outcome'
    Outcome:
      description: One thing that happened during a job attempt. Discriminated by `kind`.
        Durable kinds (`step_done`, `wait_observed`) describe sub-steps a code handler executed
        or observed during this invocation; terminal kinds (`complete`, `fail`, `suspend`)
        end the attempt.
      oneOf:
      - $ref: '#/components/schemas/OutcomeStepDone'
      - $ref: '#/components/schemas/OutcomeWaitObserved'
      - $ref: '#/components/schemas/OutcomeComplete'
      - $ref: '#/components/schemas/OutcomeFail'
      - $ref: '#/components/schemas/OutcomeSuspend'
      discriminator:
        propertyName: kind
        mapping:
          step_done: '#/components/schemas/OutcomeStepDone'
          wait_observed: '#/components/schemas/OutcomeWaitObserved'
          complete: '#/components/schemas/OutcomeComplete'
          fail: '#/components/schemas/OutcomeFail'
          suspend: '#/components/schemas/OutcomeSuspend'
    OutcomeStepDone:
      type: object
      additionalProperties: false
      required:
      - kind
      - step_id
      - status
      description: A durable child step the handler executed. Code-spec jobs only. Each `step_done`
        becomes one row in the run-step ledger and is replayed back to the handler on the
        next invocation.
      properties:
        kind:
          type: string
          enum:
          - step_done
        step_id:
          type: string
          minLength: 1
          description: Deterministic identifier the handler passed to step.run("id", fn).
            Replay key.
        status:
          type: string
          enum:
          - completed
          - failed
          - skipped
        result:
          description: Value the handler should observe on replay. JSON-shape; freely structured
            by the handler. Omit for `failed` / `skipped`.
        error_type:
          type: string
          description: Error class for a failed sub-step.
        error_message:
          type: string
          description: Human-readable error detail for a failed sub-step.
        attempt:
          type: integer
          minimum: 0
          description: Worker-side per-step retry counter. 0 for first try.
    OutcomeWaitObserved:
      type: object
      additionalProperties: false
      required:
      - kind
      - step_id
      - wait_kind
      - status
      description: A previously-suspended wait the handler observed completing during replay.
        Code-spec jobs only. The status is typically `completed`; `failed` is used when the
        wait raised a timeout the handler is surfacing back through the ledger.
      properties:
        kind:
          type: string
          enum:
          - wait_observed
        step_id:
          type: string
          minLength: 1
          description: Deterministic identifier the handler passed to the wait helper.
        wait_kind:
          type: string
          enum:
          - sleep
          - wait_signal
          - wait_event
          - interaction
          - pause
          description: Kind of the wait that completed.
        status:
          type: string
          enum:
          - completed
          - failed
          - skipped
        result:
          description: Payload delivered by the wait (e.g. signal payload, interaction response).
            Omit when not applicable (sleep, pause).
        error_type:
          type: string
        error_message:
          type: string
        attempt:
          type: integer
          minimum: 0
    OutcomeComplete:
      type: object
      additionalProperties: false
      required:
      - kind
      description: 'Terminal: the attempt finished successfully. For action jobs, `result_b64`
        becomes the step output. For code jobs, `result_b64` becomes the run output.'
      properties:
        kind:
          type: string
          enum:
          - complete
        result_b64:
          type: string
          description: Base64-encoded (standard encoding) bytes representing the handler/action
            result. Decoded by the engine and stored on the job (action) or the run (code).
    OutcomeFail:
      type: object
      additionalProperties: false
      required:
      - kind
      - error_type
      - error_message
      description: 'Terminal: the attempt failed. For action jobs this triggers retry if the
        spec allows; for code jobs the run terminally fails.'
      properties:
        kind:
          type: string
          enum:
          - fail
        error_type:
          type: string
          minLength: 1
          description: Short error class identifier (e.g. "TimeoutError").
        error_message:
          type: string
          description: Human-readable error detail.
    OutcomeSuspend:
      type: object
      additionalProperties: false
      required:
      - kind
      - step_id
      - wait
      description: 'Terminal: the code handler hit a wait it could not satisfy locally and
        is yielding control. Code-spec jobs only. The server suspends the run on `wait`; on
        resume a fresh code-invoke job is emitted.'
      properties:
        kind:
          type: string
          enum:
          - suspend
        step_id:
          type: string
          minLength: 1
          description: Deterministic identifier the handler passed to the wait helper.
        wait:
          $ref: '#/components/schemas/WaitDescriptor'
          description: The wait the handler hit.
    WaitDescriptor:
      description: Wait descriptor a code handler yielded. Discriminated by `kind`. Reuses
        the declarative wait config schemas from workflow.yaml — code workflows ignore the
        `on_timeout` fields on those configs because the SDK handles timeout flows directly
        in the handler (try/catch around the await), but accepting the shape verbatim avoids
        forking schemas just for code mode.
      oneOf:
      - $ref: '#/components/schemas/WaitDescriptorSleep'
      - $ref: '#/components/schemas/WaitDescriptorWaitSignal'
      - $ref: '#/components/schemas/WaitDescriptorWaitEvent'
      - $ref: '#/components/schemas/WaitDescriptorInteraction'
      - $ref: '#/components/schemas/WaitDescriptorPause'
      discriminator:
        propertyName: kind
        mapping:
          sleep: '#/components/schemas/WaitDescriptorSleep'
          wait_signal: '#/components/schemas/WaitDescriptorWaitSignal'
          wait_event: '#/components/schemas/WaitDescriptorWaitEvent'
          interaction: '#/components/schemas/WaitDescriptorInteraction'
          pause: '#/components/schemas/WaitDescriptorPause'
    WaitDescriptorSleep:
      type: object
      additionalProperties: false
      required:
      - kind
      - sleep
      properties:
        kind:
          type: string
          enum:
          - sleep
        sleep:
          $ref: '#/components/schemas/WorkflowSleepConfig'
    WaitDescriptorWaitSignal:
      type: object
      additionalProperties: false
      required:
      - kind
      - wait_signal
      properties:
        kind:
          type: string
          enum:
          - wait_signal
        wait_signal:
          $ref: '#/components/schemas/WorkflowWaitSignalConfig'
    WaitDescriptorWaitEvent:
      type: object
      additionalProperties: false
      required:
      - kind
      - wait_event
      properties:
        kind:
          type: string
          enum:
          - wait_event
        wait_event:
          $ref: '#/components/schemas/WorkflowWaitEventConfig'
    WaitDescriptorInteraction:
      type: object
      additionalProperties: false
      required:
      - kind
      - interaction
      properties:
        kind:
          type: string
          enum:
          - interaction
        interaction:
          $ref: '#/components/schemas/WorkflowInteractionConfig'
    WaitDescriptorPause:
      type: object
      additionalProperties: false
      required:
      - kind
      properties:
        kind:
          type: string
          enum:
          - pause
        pause:
          $ref: '#/components/schemas/WorkflowPauseConfig'
    JobHistoryResponse:
      type: object
      additionalProperties: false
      required:
      - entries
      description: Paginated page of replay-history entries for a code-spec job. `entries`
        are in commit order. `next_cursor`, when non-empty, is the cursor to pass on the next
        request to fetch the next page; an empty / absent value means no further pages.
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/CodeStepCompletion'
        next_cursor:
          type: string
          description: Cursor for the next page. Empty / absent when this is the last page.
    CodeStepCompletion:
      type: object
      additionalProperties: false
      description: One entry in the replay history of a code-spec job. Mirrors what the worker
        reported via a previous `step_done` or `wait_observed` outcome — the SDK fast-forwards
        through these on replay so cached `step.run` / `step.waitFor*` calls return without
        re-executing the user-supplied function.
      required:
      - step_id
      - kind
      - status
      properties:
        step_id:
          type: string
          minLength: 1
          description: Deterministic identifier the handler passed to step.run() (or step.sleep,
            step.waitForSignal, etc.). Replay key.
        kind:
          type: string
          enum:
          - run
          - sleep
          - wait_signal
          - wait_event
          - interaction
          - pause
          description: Sub-step kind. `run` carries the value `step.run` returned; wait kinds
            capture the payload (signal, event, interaction response) the wait delivered,
            or are markers for kinds without a payload (sleep, pause).
        status:
          type: string
          enum:
          - completed
          - failed
          - skipped
        result:
          description: Value the handler should observe on replay. JSON-shape; kind-specific.
        error_type:
          type: string
        error_message:
          type: string
        attempt:
          type: integer
          minimum: 0
          description: Worker-side per-step retry counter. 0 for first try.
    RunActionRequest:
      type: object
      additionalProperties: false
      properties:
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters passed to the action handler.
        timeout_seconds:
          type: integer
          minimum: 0
          description: Override the default action execution timeout.
        dry_run:
          type: boolean
          description: When true, invokes the action without side effects. Only effective
            for actions that support dry-run mode.
    RunActionResult:
      type: object
      additionalProperties: false
      required:
      - output
      properties:
        output:
          oneOf:
          - type: object
            additionalProperties: true
          - type: array
            items: {}
          - type: string
          - type: number
          - type: integer
          - type: boolean
          description: Free-form output returned by the action handler.
    JobEventsRequest:
      type: object
      additionalProperties: false
      required:
      - lease_token
      - events
      description: Fenced batch of custom run events published by the worker holding a job's
        lease. Every event in `events` is published under the same `lease_token`; mismatch
        returns 409 lease-lost.
      properties:
        worker_instance_id:
          type: string
          description: Echo of the claim's `worker_instance_id`. Audit only.
        lease_token:
          type: string
          description: Opaque lease fence value from the claim; mismatch returns 409 lease-lost.
        events:
          type: array
          description: The batch of events to publish. All events are validated atomically.
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/JobEventEntry'
    JobEventEntry:
      type: object
      additionalProperties: false
      description: Custom progress or telemetry event emitted while a worker owns a job. Use
        these events to stream domain-specific status into run timelines without changing
        the job completion payload.
      required:
      - type
      - payload
      properties:
        type:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^[a-zA-Z0-9_.-]+$
          description: Caller-chosen event type identifier. The `mobius.` prefix is reserved
            for server-emitted well-known kinds and is rejected with 400.
        payload:
          type: object
          additionalProperties: true
          description: Free-form JSON payload. Bounded by the server-side byte limit (default
            16 KiB per event); oversize payloads are rejected with 413.
    InteractionKind:
      type: string
      enum:
      - approval
      - review
      - input
      - request
      - vote
      - handoff
      description: |-
        Protocol kind of the interaction (PRD 077). Each value names a
        distinct multi-party coordination protocol:
        * `approval` — a decision protocol (yes/no, optionally yes/no/defer)
        * `review` — a judgment protocol that evaluates supplied material
        * `request` — a data-collection protocol with structured or
        free-form input
        * `vote` — a collective-choice protocol with vote semantics
        (changeable until close, eligibility, quorum, anonymity, tie-break)
        * `handoff` — a work-completion protocol where ownership moves to
        another actor who submits completed output
        * `input` — *deprecated* alias of `request`; existing rows keep
        this value but new interactions should be created with
        `request`. The server normalises `input` to `request` on
        create.
    InteractionReference:
      type: object
      additionalProperties: false
      required:
      - kind
      description: Pointer to the work item, artifact, external ticket, or Mobius entity this
        interaction is about.
      properties:
        kind:
          type: string
          enum:
          - external_url
          - mobius_entity
        url:
          type: string
          format: uri
          description: Required when kind is `external_url`.
        entity_type:
          type: string
          description: Required when kind is `mobius_entity`.
        entity_id:
          type: string
          description: Required when kind is `mobius_entity`.
        project_id:
          type: string
          description: Optional project scope for Mobius entity references.
        relation:
          type: string
          description: Relationship such as `subject`, `evidence`, or `related`.
        label:
          type: string
          description: User-facing label for display.
    InteractionValue:
      description: Free-form JSON payload. Used both for responder-supplied values and for
        policy-derived values (e.g. `Interaction.outcome`, `ResolutionPolicy.proposal`); each
        consumer documents which.
      anyOf:
      - type: object
        nullable: true
        additionalProperties: true
      - type: array
        items: {}
      - type: string
      - type: number
      - type: boolean
    ResolutionPolicy:
      type: object
      additionalProperties: false
      required:
      - type
      description: Declarative resolution rule attached to an Interaction. Determines how
        participant responses become a final outcome.
      properties:
        type:
          type: string
          enum:
          - first_valid_response
          - all_required
          - simple_majority
          - threshold
          - weighted_vote
          - speculative
          - asymmetric
          description: Resolution rule. `first_valid_response` resolves on the first response
            (Tier 1 default). `all_required` waits for every eligible participant. `simple_majority`
            and `threshold` are voting policies. `weighted_vote` weighs responses by `confidence`.
            `speculative` resolves to `proposal` when the veto window closes without a veto.
            `asymmetric` runs different sub-rules per actor class (e.g. agents propose, humans
            decide via majority).
        quorum:
          type: integer
          minimum: 0
          description: Minimum responses required before a majority/threshold can resolve.
        threshold:
          type: integer
          minimum: 1
          description: Vote count any option must reach to win under `threshold`.
        tie_break:
          type: string
          enum:
          - first
          - owner_decides
          nullable: true
          description: Behavior on a tied top vote count for `simple_majority`. Null or absent
            keeps the interaction open; `first` picks the earliest-arriving value; `owner_decides`
            waits for `owner_id` to break the tie.
        owner_id:
          type: string
          description: Canonical users.id treated as authoritative when `tie_break` is `owner_decides`.
        weight_by:
          type: string
          enum:
          - confidence
          - equal
          description: Where `weighted_vote` reads weights from.
        min_confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Drop responses with confidence below this bar before weighting.
        proposal:
          $ref: '#/components/schemas/InteractionValue'
          description: 'Speculative policy: default outcome accepted automatically when the
            veto window closes without a veto. Configured on the policy, not supplied by responders.'
        veto_window_seconds:
          type: integer
          minimum: 0
          description: Window (in seconds, relative to creation time) during which a veto
            can be submitted. When the window passes the speculative interaction resolves
            to `proposal`. When zero `expires_at` is used.
        on_no_veto:
          type: string
          enum:
          - accept_proposal
          description: Currently only `accept_proposal` is supported.
        humans:
          $ref: '#/components/schemas/AsymmetricActorRule'
          description: 'Asymmetric policy: rule applied to user responders.'
        agents:
          $ref: '#/components/schemas/AsymmetricActorRule'
          description: 'Asymmetric policy: rule applied to agent responders.'
    AsymmetricActorRule:
      type: object
      additionalProperties: false
      required:
      - rule
      description: Per-actor-class rule under an asymmetric resolution policy. `propose` records
        responses for audit but ignores them for resolution. `decide` applies the optional
        `sub_policy` to that class's responses to drive resolution. `ignore` is reserved for
        future use.
      properties:
        rule:
          type: string
          enum:
          - propose
          - decide
          - ignore
          description: Role this actor class plays.
        sub_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Sub-rule applied to this class's responses when `rule` is `decide`.
            When omitted, decide-class defaults to `first_valid_response` over the class's
            responses.
    ReviewPolicy:
      type: object
      additionalProperties: false
      required:
      - type
      description: Reviewability policy for a handoff response (PRD 077 §3.5). Carried as
        a template on `Interaction.submission_review_policy` and snapshotted onto each `InteractionResponse.review_policy`
        row when `response_kind=handoff`.
      properties:
        type:
          type: string
          enum:
          - none
          - requester_acceptance_required
          description: '`none` completes a handoff when submitted. `requester_acceptance_required`
            moves submitted handoffs to `in_review` until an authorized reviewer accepts or
            sends back.'
        reviewer_user_ids:
          type: array
          items:
            type: string
          description: Optional explicit reviewer user IDs. When omitted for `requester_acceptance_required`,
            the `created_by` user is the reviewer. Workflow, system, or integration-created
            handoffs should provide explicit reviewers.
    CreateJobInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - target
      - kind
      - title
      description: Creates an interaction from a claimed job context. The server derives the
        owning run from the job and may derive the signal name when omitted.
      properties:
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: Resolved users or group routing input for the interaction.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind. Renamed from `type` in the PRD 077 v-bump.
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the responder.
        description:
          type: string
          description: Optional longer responder-facing detail or instructions.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        signal_name:
          type: string
          description: Optional signal name override. When omitted, the server derives the
            signal name from step_name or falls back to a default interaction signal name.
        step_name:
          type: string
          description: Optional workflow step label for UI/debugging context
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the title
            and description.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial interaction tag set used by list filtering and reporting.
        properties:
          type: object
          additionalProperties: true
          description: Free-form structured metadata to attach to the interaction.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When true, all target users must respond before the interaction is
            considered complete. Defaults to false when omitted. Mutually exclusive with `resolution_policy`;
            prefer the policy form for new code.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Declarative resolution rule. When supplied the policy evaluator drives
            completion.
        submission_review_policy:
          $ref: '#/components/schemas/ReviewPolicy'
          description: Template review policy applied to submissions of this interaction (PRD
            077 §3.5). Currently meaningful only for handoff-kind interactions.
        timeout:
          type: string
          description: Optional duration string (e.g. "24h", "30m") specifying how long the
            interaction should remain open before expiring. When absent the caller is responsible
            for setting expires_at directly.
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires.
    InteractionResponder:
      type: object
      required:
      - user_id
      additionalProperties: false
      description: Identifies the user who answered an interaction. Agents answer through
        their backing users.id.
      properties:
        user_id:
          type: string
          description: Responder user ID.
    InteractionResponse:
      type: object
      additionalProperties: false
      description: One persisted answer artifact for an interaction. Ordinary answers, vote
        choices, and handoff attempts all use this one shape; protocol differences live in
        `response_kind`, `state`, and the optional review fields. The response that triggered
        resolution is referenced from `Interaction.resolving_response_id`.
      required:
      - id
      - interaction_id
      - response_kind
      - state
      - responder_user_id
      - value
      - responded_at
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this response.
        interaction_id:
          type: string
          description: ID of the interaction this response belongs to.
        response_kind:
          type: string
          enum:
          - response
          - vote
          - handoff
          description: '`response` for ordinary answers, `vote` for vote choices, and `handoff`
            for delegated-work submission attempts.'
        state:
          type: string
          enum:
          - submitted
          - withdrawn
          - pending_review
          - accepted
          - sent_back
          description: Lifecycle state for this response row. Ordinary answers use `submitted`;
            vote rows may be `submitted` or `withdrawn`; handoff rows move through `pending_review`,
            `accepted`, or `sent_back`.
        responder_user_id:
          type: string
          description: User ID that submitted this response.
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by this participant.
        comment:
          type: string
          nullable: true
          description: Optional free-text comment from this responder.
        responded_at:
          type: string
          format: date-time
          description: Timestamp when this response was submitted.
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          nullable: true
          description: Optional 0..1 confidence score attached to this response.
        attempt:
          type: integer
          nullable: true
          description: Handoff attempt number when `response_kind=handoff`.
        reviewed_by:
          type: object
          allOf:
          - $ref: '#/components/schemas/InteractionResponder'
          nullable: true
        review_comment:
          type: string
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        review_policy:
          type: object
          allOf:
          - $ref: '#/components/schemas/ReviewPolicy'
          nullable: true
          description: Per-handoff-response reviewability snapshot.
        withdrawn_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RunConsumer:
      type: object
      additionalProperties: false
      required:
      - run_id
      - signal_name
      properties:
        run_id:
          type: string
        signal_name:
          type: string
    AgentToolConsumer:
      type: object
      additionalProperties: false
      required:
      - invocation_id
      - tool_call_id
      properties:
        invocation_id:
          type: string
        tool_call_id:
          type: string
    HttpSubscriberConsumer:
      type: object
      additionalProperties: false
      required:
      - callback_url
      properties:
        callback_url:
          type: string
          format: uri
          description: Absolute http(s) URL the server POSTs to when the interaction resolves.
            The body is a JSON object with the interaction id, kind, status, outcome value,
            comment, responder, and `resolved_by`. Delivery is enqueued as a `source_events`
            dispatch so the worker can retry failed attempts instead of dropping them inline
            with interaction resolution.
        secret_ref:
          type: string
          description: 'Reference to a project secret used to sign deliveries with HMAC-SHA256
            over the canonical string `{interaction_id}.{unix_timestamp}.{raw_body}`, where
            `raw_body` is the exact callback request body bytes. Accepts `<name>` for the
            latest enabled version or `<name>:<version>` to pin a specific positive-integer
            version. The plaintext signing bytes are taken from the secret''s `signing_key`,
            `secret`, or `hmac_secret` key — or the only key if exactly one is set. The hex
            signature is forwarded as `X-Mobius-Signature: sha256=<hex>` alongside `X-Mobius-Secret-Ref`,
            `X-Mobius-Secret-Version`, `X-Mobius-Signature-Version: v2`, and a unix `X-Mobius-Timestamp`.
            Consumers should reject stale timestamps (for example, older than five minutes).
            When `secret_ref` resolution fails the dispatch is retried by the event processor
            rather than sent unsigned.'
    Consumer:
      type: object
      additionalProperties: false
      required:
      - kind
      description: 'Polymorphic identifier of what is waiting on this interaction''s resolution
        (PRD 077 §3.7). Replaces the previously special-cased `run_id` + `signal_name` pair.
        When `kind=run`, the legacy fields are also populated for compatibility. `http_subscriber`
        enqueues a durable callback dispatch to `callback_url` when the interaction resolves;
        when `secret_ref` is set, the canonical string `{interaction_id}.{unix_timestamp}.{raw_body}`
        is signed with HMAC-SHA256 against the resolved project secret and the signed dispatch
        carries `X-Mobius-Signature`, `X-Mobius-Secret-Ref`, `X-Mobius-Secret-Version`, and
        `X-Mobius-Timestamp`. Signed dispatches also carry `X-Mobius-Signature-Version: v2`.
        Every durable dispatch also carries the stable outbox row id in `X-Mobius-Delivery-ID`
        and `Idempotency-Key`; retries reuse the same value. Verifiers should recompute the
        signature over the exact raw body, reject stale timestamps (for example, older than
        five minutes), deduplicate by delivery id, and check all five signing headers.'
      properties:
        kind:
          type: string
          enum:
          - run
          - agent_tool
          - http_subscriber
          - none
        run:
          type: object
          allOf:
          - $ref: '#/components/schemas/RunConsumer'
          nullable: true
        agent_tool:
          type: object
          allOf:
          - $ref: '#/components/schemas/AgentToolConsumer'
          nullable: true
        http_subscriber:
          type: object
          allOf:
          - $ref: '#/components/schemas/HttpSubscriberConsumer'
          nullable: true
    ChannelThreadDelivery:
      type: object
      additionalProperties: false
      required:
      - channel_id
      properties:
        channel_id:
          type: string
        parent_message_id:
          type: string
    EmailDelivery:
      type: object
      additionalProperties: false
      required:
      - to
      properties:
        to:
          type: array
          minItems: 1
          items:
            type: string
            format: email
    PageDelivery:
      type: object
      additionalProperties: false
      required:
      - policy_id
      properties:
        policy_id:
          type: string
    DeliveryChannel:
      type: object
      additionalProperties: false
      required:
      - kind
      description: A single delivery destination. `inbox_only` carries no payload; each other
        kind owns its variant. `page` is schema-only in v1 — the server rejects it at create
        until paging is implemented. `agent_queue` is not exposed until queue fan-out has
        real delivery semantics.
      properties:
        kind:
          type: string
          enum:
          - inbox_only
          - email
          - channel_thread
          - page
        channel_thread:
          type: object
          allOf:
          - $ref: '#/components/schemas/ChannelThreadDelivery'
          nullable: true
        email:
          type: object
          allOf:
          - $ref: '#/components/schemas/EmailDelivery'
          nullable: true
        page:
          type: object
          allOf:
          - $ref: '#/components/schemas/PageDelivery'
          nullable: true
    Delivery:
      type: object
      additionalProperties: false
      required:
      - channels
      description: Optional per-interaction delivery override (PRD 077 §3.8). When absent,
        each participant is notified per their own `NotificationPreferences`. When set, channels
        are added to the participant's preferences (additive default) or replace them (exclusive
        — `override_participant_preferences=true`).
      properties:
        channels:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DeliveryChannel'
        override_participant_preferences:
          type: boolean
          description: 'When false (default), additive: deliver via the listed channels in
            addition to participant preferences. When true, exclusive: deliver *only* via
            the listed channels.'
    Interaction:
      type: object
      additionalProperties: false
      description: Human or agent interaction request and its current response state.
      required:
      - id
      - kind
      - status
      - title
      - target_user_ids
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this interaction.
        run_id:
          type: string
          nullable: true
          description: Originating workflow run when the interaction is run-backed.
        signal_name:
          type: string
          nullable: true
          description: Signal name used to resume the originating run when run-backed.
        created_by:
          type: string
          nullable: true
          description: Canonical users.id of the human or agent user that created the interaction.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind of the interaction (PRD 077). Replaces the v1 wire field
            `type`; the rename landed in the v-bump that also renamed `Interaction.review_policy`
            to `submission_review_policy`.
        status:
          type: string
          enum:
          - pending
          - in_review
          - completed
          - expired
          - cancelled
          description: 'Current status of the interaction: pending, in_review, completed,
            expired, or cancelled.'
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the responder.
        description:
          type: string
          nullable: true
          description: Optional longer responder-facing detail or instructions.
        subject:
          type: object
          allOf:
          - $ref: '#/components/schemas/InteractionReference'
          nullable: true
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          nullable: true
          description: Additional key-value context surfaced in the UI alongside the title
            and description when supplied.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Uniform string key/value labels used for interaction list filtering
            and reporting.
        properties:
          type: object
          additionalProperties: true
          nullable: true
          description: Free-form structured metadata attached to the interaction.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        target_user_ids:
          type: array
          items:
            type: string
          description: Resolved user IDs targeted by the interaction.
        responder:
          type: object
          allOf:
          - $ref: '#/components/schemas/InteractionResponder'
          nullable: true
          description: User or agent that completed the interaction; null until completion.
        resolving_response_id:
          type: string
          nullable: true
          description: ID of the response that triggered resolution. Null while the interaction
            is pending, when the speculative `proposal` is auto-accepted with no response,
            on cancel, and on expiry. Look up the response in `responses` for the full payload.
        responses:
          type: array
          items:
            $ref: '#/components/schemas/InteractionResponse'
          description: All response artifacts recorded against this interaction in arrival
            order. Ordinary answers, vote rows, and handoff rows all appear here.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this interaction expires if not responded to.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the interaction received a terminal response.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this interaction was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this interaction was last updated.
        target_group_id:
          type: string
          nullable: true
          description: Resolved group ID used to produce target_user_ids, when any.
        require_all:
          type: boolean
          description: When true, all target users must respond before completion.
        resolution_policy:
          type: object
          allOf:
          - $ref: '#/components/schemas/ResolutionPolicy'
          nullable: true
          description: Declarative resolution rule attached at creation time. Legacy `require_all`
            inputs are synthesized into an equivalent policy at create time when present.
            Newer rows typically include this field; nullability covers historical rows and
            callers that omit it.
        submission_review_policy:
          type: object
          allOf:
          - $ref: '#/components/schemas/ReviewPolicy'
          nullable: true
          description: Template review policy applied to new submissions of this interaction
            (PRD 077 §3.5). Each submission carries its own `review_policy` snapshot taken
            at submit time; this field is the create-time intent that the snapshot is copied
            from.
        consumer:
          type: object
          allOf:
          - $ref: '#/components/schemas/Consumer'
          nullable: true
          description: Polymorphic identifier of what is waiting on this interaction's resolution
            (PRD 077 §3.7). Replaces the special-cased `run_id`/`signal_name` pair; the latter
            remain populated when `consumer.kind=run`.
        delivery:
          type: object
          allOf:
          - $ref: '#/components/schemas/Delivery'
          nullable: true
          description: Optional per-interaction delivery override (PRD 077 §3.8). When absent,
            the dispatcher uses each participant's NotificationPreferences.
        outcome:
          $ref: '#/components/schemas/InteractionValue'
          description: 'Final outcome selected by the resolution policy (not responder-supplied).
            Shape depends on the policy: `simple_majority` returns the winning option; `all_required`
            returns the array of every response; `speculative` returns either the proposal
            or the vetoer''s value. Omitted while the interaction is still pending.'
        resolved_by:
          type: string
          nullable: true
          description: Short audit string identifying which policy rule fired (e.g. `simple_majority`,
            `speculative_no_veto`, `simple_majority_owner_decides`). Null until the interaction
            reaches a resolved state.
        cancel_reason:
          type: string
          nullable: true
          description: Reason recorded when the interaction was cancelled.
    TriggerKind:
      type: string
      enum:
      - schedule
      - webhook
      - event
      - channel_message
      - table_row
      - email
      description: 'Determines the event source and required `source_config` shape: schedule,
        webhook, event, channel_message, table_row, or email.'
    ConcurrencyPolicy:
      type: string
      enum:
      - allow
      - forbid
      - replace
      description: |-
        Controls overlapping runs from the same trigger:
        - `allow` — start new runs unconditionally.
        - `forbid` — skip the new fire if a run from this trigger is still active.
        - `replace` — cancel the active run before starting a new one.
    TriggerFireStatus:
      type: string
      enum:
      - success
      - partial_failure
      - failed
      - skipped
      description: |-
        Outcome of a trigger activation:
        - `success` — all enabled targets started their runs (or no targets configured).
        - `partial_failure` — at least one target failed while others succeeded.
        - `failed` — all targets failed, or a trigger-level error prevented any target.
        - `skipped` — the concurrency policy suppressed the entire activation.
    TriggerFireTargetStatus:
      type: string
      enum:
      - success
      - failed
      - skipped
      description: Outcome for a single target within a trigger fire activation. Per-target
        results never aggregate, so `partial_failure` cannot appear here.
    TriggerTarget:
      type: object
      additionalProperties: false
      required:
      - id
      - trigger_id
      - kind
      - enabled
      - created_at
      - updated_at
      description: |-
        An effect a trigger executes when it fires. Two kinds:

        - `launch_run` (default): starts a new workflow run. `workflow_id`
        required. `external_id_template` optional — when set, the new
        run's `external_id` is derived from the event so a later
        `signal_run` target can find it.
        - `signal_run`: locates an existing run by
        `run_selector.external_id_template` and enqueues a signal
        source event the SubscriptionRouter delivers to the run's
        `wait` step (subject of kind `signal`). `workflow_id` is
        absent.
      properties:
        id:
          type: string
          description: Unique identifier for this target.
        trigger_id:
          type: string
          description: ID of the trigger this target belongs to.
        kind:
          type: string
          enum:
          - launch_run
          - signal_run
          default: launch_run
          description: Discriminates the target's effect. `launch_run` starts a new workflow
            run; `signal_run` signals an existing run.
        workflow_id:
          type: string
          description: ID of the workflow definition to run. Required for `launch_run` targets;
            absent for `signal_run`.
        condition:
          type: string
          description: 'Expression evaluated against the event environment (`{ meta, event
            }`). The target is skipped when the expression evaluates to false or yields a
            non-boolean value, and is marked failed if evaluation errors. Bare expressions
            are accepted; the wrapped form `${expr}` is also allowed. Omit to always run.
            Example: `event.pull_request.merged == true`. Malformed expressions are rejected
            on create/update with `400 invalid_argument`.'
        input_mapping:
          type: object
          additionalProperties:
            type: string
          description: |-
            (launch_run only) Maps workflow input names to expressions evaluated against the event environment (`{ meta, event }`). Values use Mobius's `${expr}` template syntax — pure expressions (`${event.actor.id}`) preserve their native type, mixed templates (`Bearer ${meta.id}`) always render to a string, and other literals pass through as-is. Legacy JSONPath-like values (`$.…`) and unwrapped `event.` / `meta.` references are rejected with 400 on create/update.

            Resolution is fail-closed: an expression that references a missing field (`${event.pull_request.merged_by.login}` on an event without `merged_by`) fails the dispatch with `input_resolution_error` naming the offending key. No run is launched. Author expressions to reference only fields you expect to be present. Example: `{"user_id": "${event.actor.id}"}`.
        external_id_template:
          type: string
          description: '(launch_run only) `${expr}` template that derives the new run''s `external_id`
            from the event environment. Lets a subsequent `signal_run` target locate this
            run. Example: `github:${event.repository.full_name}#${event.pull_request.number}`.'
        run_selector:
          $ref: '#/components/schemas/TriggerTargetRunSelector'
        signal_topic:
          type: string
          description: (signal_run only) Signal name to deliver to the located run. Matches
            a `wait` step with `subject.kind == "signal"` and this value as `subject.signal_name`.
        signal_payload_mapping:
          type: object
          additionalProperties:
            type: string
          description: (signal_run only) Maps the signal payload keys to expressions evaluated
            against the event environment. Available to the workflow as `signal.payload`.
            Resolution is fail-closed — an expression that references a missing field fails
            the target with `signal_payload_resolution_error` (the signal-side analogue of
            `input_mapping`'s `input_resolution_error`) and the signal is not delivered.
        enabled:
          type: boolean
          description: When false, this target is paused and will not fire.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this target was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this target was last updated.
    TriggerTargetRunSelector:
      type: object
      additionalProperties: false
      required:
      - external_id_template
      description: (signal_run only) Locates an existing run to deliver a signal to. Today
        only `external_id_template` is supported; the shape is reserved as an object so future
        filters (e.g. workflow scope, multi-run match) can be added without breaking the API.
      properties:
        external_id_template:
          type: string
          minLength: 1
          description: '`${expr}` template rendered against the event environment. The result
            must equal the run''s `external_id`. Required — the server rejects `signal_run`
            targets whose selector omits or renders this to an empty string.'
    TriggerTargetListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated list of targets attached to one trigger. Trigger fan-out is
        configured as a small bounded set rather than a high-volume collection.
      properties:
        items:
          type: array
          description: The list of targets for this trigger.
          items:
            $ref: '#/components/schemas/TriggerTarget'
    CreateTriggerTargetRequest:
      type: object
      additionalProperties: false
      description: Parameters for attaching a target to a trigger. Use `kind` to select between
        launching a new run (default) and signaling an existing run. Validation enforces the
        right field combination.
      properties:
        kind:
          type: string
          enum:
          - launch_run
          - signal_run
          default: launch_run
        workflow_id:
          type: string
          description: (launch_run only) ID of the workflow definition to run. Required when
            `kind=launch_run`.
        condition:
          type: string
          description: 'Expression evaluated against the event environment (`{ meta, event
            }`). The target is skipped when it evaluates to false or yields a non-boolean
            value, and is marked failed if evaluation errors. Bare expressions are accepted;
            the wrapped `${expr}` form is also allowed. Omit to always run. Example: `event.pull_request.merged
            == true`. Malformed expressions are rejected on create/update with `400 invalid_argument`.'
        input_mapping:
          type: object
          additionalProperties:
            type: string
          description: '(launch_run only) Maps workflow input names to expressions evaluated
            against the event environment (`{ meta, event }`). Values use Mobius''s `${expr}`
            template syntax — pure expressions (`${event.actor.id}`) preserve their native
            type, mixed templates (`user-${event.actor.id}`) always render to a string, and
            other literals pass through as-is. Legacy JSONPath-like values (`$.…`) and unwrapped
            `event.` / `meta.` references are rejected with 400. Example: `{"user_id": "${event.actor.id}",
            "label": "static"}`.'
        external_id_template:
          type: string
          description: (launch_run only) Template for the new run's `external_id`.
        run_selector:
          $ref: '#/components/schemas/TriggerTargetRunSelector'
        signal_topic:
          type: string
          description: (signal_run only) Signal name to deliver to the located run. Matches
            a `wait` step with `subject.kind == "signal"`.
        signal_payload_mapping:
          type: object
          additionalProperties:
            type: string
          description: (signal_run only) Maps signal payload keys to expressions.
        enabled:
          type: boolean
          description: Whether this target starts enabled. Defaults to true when omitted.
    UpdateTriggerTargetRequest:
      type: object
      additionalProperties: false
      description: Partial update for a trigger target; omitted fields are unchanged.
      properties:
        kind:
          type: string
          enum:
          - launch_run
          - signal_run
          description: Replacement kind. Changing kind requires the corresponding kind-specific
            fields to be updated in the same request.
        workflow_id:
          type: string
          description: Replacement workflow definition ID.
        condition:
          type: string
          description: Replacement condition expression. Set to empty string to remove.
        input_mapping:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Replacement input mapping. Same `${expr}` template contract as on create
            — legacy JSONPath-like values (`$.…`) and unwrapped `event.` / `meta.` references
            are rejected with 400. Set to null to clear all mappings.
        external_id_template:
          type: string
          description: Replacement external_id template. Set to empty string to clear.
        run_selector:
          $ref: '#/components/schemas/TriggerTargetRunSelector'
        signal_topic:
          type: string
          description: Replacement signal topic.
        signal_payload_mapping:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Replacement signal payload mapping. Set to null to clear.
        enabled:
          type: boolean
          description: Set to false to pause this target without removing it.
    TriggerFireTargetResult:
      type: object
      additionalProperties: false
      required:
      - target_id
      - kind
      - status
      description: Outcome of a single target within a trigger fire activation. `kind` discriminates
        the result shape so consumers can branch on it instead of inferring from optional
        fields like `workflow_id` or `external_id_resolved`.
      properties:
        target_id:
          type: string
          description: ID of the trigger target that was evaluated.
        kind:
          type: string
          enum:
          - launch_run
          - signal_run
          default: launch_run
          description: Effect kind of the evaluated target. `launch_run` started (or attempted)
            a new workflow run; `signal_run` delivered (or attempted to deliver) a signal
            to an existing run. Lets clients reliably branch on `kind` instead of inspecting
            optional fields like `workflow_id` or `external_id_resolved`.
        workflow_id:
          type: string
          description: ID of the workflow definition that was started or attempted. Present
            only for `launch_run` targets — `signal_run` targets deliver a signal to an existing
            run and have no workflow definition association of their own.
        run_id:
          type: string
          description: ID of the run that was launched or signaled. Absent when the target
            failed or was skipped before resolving a run.
        status:
          $ref: '#/components/schemas/TriggerFireTargetStatus'
          description: 'Outcome for this target: `success`, `skipped`, or `failed`.'
        error:
          type: string
          description: Error detail when status is `failed`. Empty for `success` and `skipped`
            results — `skipped` causes go in `reason` instead. Pre-split historical rows persisted
            skip causes here, so consumers should fall back to `error` when `reason` is empty
            on a skipped row.
        reason:
          type: string
          description: 'Why the target was skipped, when status is `skipped`. Examples: `condition
            false`, `target disabled`, `no run matching external_id <id>`. Empty for `success`
            and `failed` results.'
        external_id_resolved:
          type: string
          description: Rendered value of the target's `external_id_template` (launch_run)
            or `run_selector.external_id_template` (signal_run). Lets operators verify the
            two templates produce matching strings without re-deriving them by hand. Absent
            when the target has no template or when rendering failed before a value was produced.
    ScheduleSourceConfig:
      type: object
      additionalProperties: false
      minProperties: 1
      maxProperties: 1
      description: Source configuration for `schedule` triggers. Provide exactly one of `cron`
        or `interval`.
      properties:
        cron:
          type: string
          description: 5-field cron expression or @-descriptor, e.g. `0 9 * * 1-5` or `@hourly`.
        interval:
          type: string
          description: Go duration string, e.g. `5m`, `1h`, `30s`. Must be positive.
    WebhookSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `webhook` triggers.
      properties:
        handle:
          type: string
          description: URL-safe handle that determines the inbound `receive_url`. Auto-derived
            from the trigger's `name` when omitted. Must be unique within the project.
        signing_secret:
          type: string
          writeOnly: true
          description: Optional HMAC-SHA256 secret for verifying inbound webhook payloads.
            When set, Mobius validates the `X-Mobius-Signature` header on incoming requests.
            Accepted on create/update; omitted from GET/list responses.
        receive_url:
          type: string
          readOnly: true
          description: Full URL for posting inbound events. Computed from `handle`.
    EventSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `event` triggers.
      properties:
        event_type:
          type: string
          pattern: ^[A-Za-z_][A-Za-z0-9_]*(\.[A-Za-z_][A-Za-z0-9_]*)*(\.\*)?$
          description: 'Event type pattern to match. Exact match by default, or trailing `.*`
            for prefix matching. Examples: `github.pull_request.opened` (exact), `github.pull_request.*`
            (any github pull_request event), `github.*` (any github event).'
        user_state:
          $ref: '#/components/schemas/UserStateTriggerSourceConfig'
          description: Transition filter for `user.state.changed` event triggers.
    UserStateTriggerSourceConfig:
      type: object
      additionalProperties: false
      description: Narrow transition filter for User State event triggers.
      properties:
        user_id:
          type: string
          description: User ID to match. Omit to match any user in the project.
        from_availability:
          $ref: '#/components/schemas/UserAvailability'
        to_availability:
          $ref: '#/components/schemas/UserAvailability'
    ChannelMessageSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `channel_message` triggers.
      properties:
        channel_id:
          type: string
          description: ID of the channel to watch. When omitted, the trigger fires for messages
            in any channel within the project.
        pattern:
          type: string
          description: Optional Go regular expression matched against message content. When
            omitted, all messages pass the content filter.
        sender_types:
          type: array
          items:
            $ref: '#/components/schemas/ChannelMessageSenderType'
          description: Restricts which sender types fire the trigger. When omitted, all sender
            types are eligible.
    TableRowSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `table_row` triggers.
      properties:
        table_name:
          type: string
          description: Name of the table to watch. When omitted, the trigger fires for row
            changes in any table within the project.
        events:
          type: array
          items:
            type: string
            enum:
            - inserted
            - updated
            - deleted
          description: Row change events that fire the trigger. When omitted, all three events
            (inserted, updated, deleted) fire the trigger.
    EmailSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `email` triggers.
      properties:
        agent_id:
          type: string
          description: ID of the agent whose inbox fires this trigger. When omitted, any agent
            inbox in the project can fire the trigger.
        subject_pattern:
          type: string
          description: Optional Go regular expression matched against the email subject. When
            omitted, all subjects pass the filter.
    TriggerSourceConfig:
      description: Typed source configuration. The shape is determined by the trigger's `kind`
        (`schedule` → `ScheduleSourceConfig`, `webhook` → `WebhookSourceConfig`, `event` →
        `EventSourceConfig`, `channel_message` → `ChannelMessageSourceConfig`, `table_row`
        → `TableRowSourceConfig`, `email` → `EmailSourceConfig`); mismatches are rejected
        with 400.
      anyOf:
      - $ref: '#/components/schemas/ScheduleSourceConfig'
      - $ref: '#/components/schemas/WebhookSourceConfig'
      - $ref: '#/components/schemas/EventSourceConfig'
      - $ref: '#/components/schemas/ChannelMessageSourceConfig'
      - $ref: '#/components/schemas/TableRowSourceConfig'
      - $ref: '#/components/schemas/EmailSourceConfig'
    Trigger:
      type: object
      additionalProperties: false
      description: Event source that starts one or more workflow targets.
      required:
      - id
      - name
      - kind
      - concurrency_policy
      - enabled
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this trigger.
        name:
          type: string
          description: Human-readable trigger name, unique within the resolved scope.
        scope:
          $ref: '#/components/schemas/ResourceScope'
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`; defaults
            to the creator when possible.
        kind:
          $ref: '#/components/schemas/TriggerKind'
          description: Trigger source kind that determines the source_config schema.
        source_config:
          $ref: '#/components/schemas/TriggerSourceConfig'
          description: Typed configuration for the trigger source.
        targets:
          type: array
          items:
            $ref: '#/components/schemas/TriggerTarget'
          description: Targets attached to this trigger, populated via join.
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: When false, the trigger is paused and will not fire.
        last_fire_at:
          type: string
          format: date-time
          description: Timestamp of the most recent fire attempt.
        next_fire_at:
          type: string
          format: date-time
          description: Computed next scheduled fire time (schedule triggers only).
        created_by:
          type: string
          description: User ID of the principal who created this trigger.
        updated_by:
          type: string
          description: User ID of the principal who last updated this trigger.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this trigger.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this trigger was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this trigger was last updated.
    TriggerListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of triggers.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Trigger'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    TriggerFire:
      type: object
      additionalProperties: false
      required:
      - id
      - trigger_id
      - fired_at
      - status
      - created_at
      description: A single trigger fire event and its outcome.
      properties:
        id:
          type: string
          description: Unique identifier for this fire record.
        trigger_id:
          type: string
          description: ID of the trigger that fired.
        scheduled_at:
          type: string
          format: date-time
          description: When the trigger was scheduled to fire (schedule triggers only).
        fired_at:
          type: string
          format: date-time
          description: When the fire was actually processed.
        target_results:
          type: array
          items:
            $ref: '#/components/schemas/TriggerFireTargetResult'
          description: Per-target outcomes for this activation.
        source_event_id:
          type: string
          description: ID of the durable `source_events` row that produced this fire. Absent
            for historical rows recorded before source-event-backed trigger delivery.
        source_kind:
          type: string
          description: Source-event kind that produced this fire, when the linked source event
            is still retained.
        source_id:
          type: string
          description: Canonical source record ID associated with the source event. For integration
            events this is the `integration_events.id`; for channel, table, schedule, webhook,
            and email sources this is the relevant message, row, trigger, or agent ID.
        event_type:
          type: string
          description: Public event type that matched this trigger fire, when the linked source
            event is still retained.
        event_payload:
          type: object
          additionalProperties: true
          description: Raw JSON event envelope associated with this fire. When the linked
            source event is retained and public, this uses the same `{event, meta}` shape
            available to trigger conditions and input mappings. Falls back to the retained
            source-event payload for internal or legacy sources.
        status:
          $ref: '#/components/schemas/TriggerFireStatus'
          description: Overall trigger fire outcome.
        error:
          type: string
          description: Error detail when status is `failed`.
        dedup_key:
          type: string
          description: Deduplication key used to prevent duplicate fires for the same scheduled
            slot.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this fire record was created.
    TestFireTriggerResult:
      type: object
      additionalProperties: false
      required:
      - mode
      - targets
      properties:
        mode:
          type: string
          enum:
          - preview
          - execute
        targets:
          type: array
          items:
            $ref: '#/components/schemas/TestFireTargetResult'
    TestFireTriggerRequest:
      type: object
      additionalProperties: false
      required:
      - event
      description: Synthetic event payload used to drive a test-fire dispatch.
      properties:
        event:
          type: object
          additionalProperties: true
          description: Synthetic event payload — the same shape an integration would deliver.
            Available to expressions as `event.x`.
        meta:
          type: object
          additionalProperties: true
          description: 'Optional meta envelope. Available to expressions as `meta.x`. When
            omitted, defaults to `{ id: "test-fire", event_type: "<test>", provider: "<test>"
            }`.'
        mode:
          type: string
          enum:
          - preview
          - execute
          default: preview
          description: '`preview` resolves input mappings and condition outcomes without launching
            runs. `execute` runs the real dispatcher path — runs are tagged with source_label
            `test-fire` so they are filterable in the run list.'
    TriggerFireListResponse:
      type: object
      additionalProperties: false
      description: Paginated history of trigger fire attempts.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/TriggerFire'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateTriggerRequest:
      description: Creates a trigger. The request is discriminated by `kind`, and each variant
        requires the matching `source_config` schema.
      oneOf:
      - $ref: '#/components/schemas/CreateScheduleTriggerRequest'
      - $ref: '#/components/schemas/CreateWebhookTriggerRequest'
      - $ref: '#/components/schemas/CreateEventTriggerRequest'
      - $ref: '#/components/schemas/CreateChannelMessageTriggerRequest'
      - $ref: '#/components/schemas/CreateTableRowTriggerRequest'
      - $ref: '#/components/schemas/CreateEmailTriggerRequest'
      discriminator:
        propertyName: kind
        mapping:
          schedule: '#/components/schemas/CreateScheduleTriggerRequest'
          webhook: '#/components/schemas/CreateWebhookTriggerRequest'
          event: '#/components/schemas/CreateEventTriggerRequest'
          channel_message: '#/components/schemas/CreateChannelMessageTriggerRequest'
          table_row: '#/components/schemas/CreateTableRowTriggerRequest'
          email: '#/components/schemas/CreateEmailTriggerRequest'
    CreateScheduleTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a schedule trigger from a cron expression or fixed interval.
      required:
      - name
      - kind
      - source_config
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the resolved scope.
        scope:
          $ref: '#/components/schemas/ResourceScope'
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`; defaults
            to the creator when possible.
        kind:
          type: string
          enum:
          - schedule
          description: Discriminator value — must be `schedule`.
        source_config:
          $ref: '#/components/schemas/ScheduleSourceConfig'
          description: Schedule-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateWebhookTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a webhook trigger with an inbound receive URL.
      required:
      - name
      - kind
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the resolved scope.
        scope:
          $ref: '#/components/schemas/ResourceScope'
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`; defaults
            to the creator when possible.
        kind:
          type: string
          enum:
          - webhook
          description: Discriminator value — must be `webhook`.
        source_config:
          $ref: '#/components/schemas/WebhookSourceConfig'
          description: Webhook-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateEventTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates an event trigger for platform-originated events.
      required:
      - name
      - kind
      - source_config
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the resolved scope.
        scope:
          $ref: '#/components/schemas/ResourceScope'
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`; defaults
            to the creator when possible.
        kind:
          type: string
          enum:
          - event
          description: Discriminator value — must be `event`.
        source_config:
          $ref: '#/components/schemas/EventSourceConfig'
          description: Event-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateChannelMessageTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a trigger that fires when a matching channel message is posted.
      required:
      - name
      - kind
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the resolved scope.
        scope:
          $ref: '#/components/schemas/ResourceScope'
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`; defaults
            to the creator when possible.
        kind:
          type: string
          enum:
          - channel_message
          description: Discriminator value — must be `channel_message`.
        source_config:
          $ref: '#/components/schemas/ChannelMessageSourceConfig'
          description: Channel-message-specific source configuration. When omitted, equivalent
            to `{}`.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateTableRowTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a trigger that fires when a table row is inserted, updated, or
        deleted.
      required:
      - name
      - kind
      - source_config
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the resolved scope.
        scope:
          $ref: '#/components/schemas/ResourceScope'
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`; defaults
            to the creator when possible.
        kind:
          type: string
          enum:
          - table_row
          description: Discriminator value — must be `table_row`.
        source_config:
          $ref: '#/components/schemas/TableRowSourceConfig'
          description: Data-table-row-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateEmailTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a trigger that fires when an inbound email arrives at the agent's
        inbox.
      required:
      - name
      - kind
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the resolved scope.
        scope:
          $ref: '#/components/schemas/ResourceScope'
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`; defaults
            to the creator when possible.
        kind:
          type: string
          enum:
          - email
          description: Discriminator value — must be `email`.
        source_config:
          $ref: '#/components/schemas/EmailSourceConfig'
          description: Email-specific source configuration. When omitted, equivalent to `{}`.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateTriggerRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        scope:
          type: string
          allOf:
          - $ref: '#/components/schemas/ResourceScope'
          nullable: true
          description: Set to `owner` for owner-scoped names, or null to return to the project/default
            scope.
        owned_by:
          type: string
          nullable: true
          description: Canonical user owner ID. Required when `scope` is `owner`.
        source_config:
          $ref: '#/components/schemas/TriggerSourceConfig'
          description: Replacement source configuration; its shape must match the trigger
            kind.
        targets:
          type: array
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
          description: Replacement target set for this trigger. Omit to leave targets unchanged;
            send an empty array to remove all targets.
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Replacement policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Set to false to pause the trigger without deleting it.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the trigger. System tags
            (`mobius:*`) are preserved.
    UserAvailability:
      type: string
      enum:
      - available
      - focused
      - busy
      - waiting
      - away
      - offline
    WorkerSession:
      type: object
      additionalProperties: false
      description: Recently observed worker process for a project. Use sessions to see which
        machines, users, service accounts, or agents are polling for work, what their configured
        concurrency is, and whether they appear stale.
      required:
      - id
      - worker_instance_id
      - concurrency_limit
      - instance_status
      - stale
      - busy_job_count
      - current_jobs
      properties:
        id:
          type: string
          description: Server-assigned session row ID (`wsess_…`). Generated by the control
            plane on first registration; opaque to workers and stable across refreshes for
            a given live row.
        worker_instance_id:
          type: string
          description: Caller-configured stable identifier for the worker process. The SDK
            auto-detects this from the runtime platform (Cloud Run revision, Kubernetes pod,
            Fly machine, Railway replica, Render instance) and falls back to a UUID. Unique
            within `(org_id, project_id)`.
        concurrency_limit:
          type: integer
          minimum: 1
          description: Configured maximum number of jobs this worker process will hold in
            flight simultaneously. Reported by the SDK on register; rendered as a saturation
            bar in the admin UI (`busy_job_count / concurrency_limit`).
        name:
          type: string
          description: Optional human-readable name supplied in the claim request.
        version:
          type: string
          description: Optional version string supplied in the claim request.
        last_seen_at:
          type: string
          format: date-time
          description: Timestamp of this session's most recent job claim poll. Updated on
            every `POST /v1/projects/{project}/jobs/claim` call regardless of whether a job
            was returned. Used to compute `stale`.
        last_activity_at:
          type: string
          format: date-time
          description: Most recent observed activity for this session, derived from `last_seen_at`,
            currently claimed job heartbeats, and the latest terminal job update.
        capabilities:
          type: array
          items:
            type: string
          description: Reserved for future capability-based job routing. Not currently used
            for filtering.
        service_account_id:
          type: string
          description: Service account this session authenticated as on register/heartbeat.
            Set when a machine identity is polling; mutually exclusive with `user_id`. Stable
            across credential rotation — use this to group sessions by identity in the admin
            UI.
        user_id:
          type: string
          description: User this session authenticated as on register/heartbeat. Set when
            a human is polling via the CLI; mutually exclusive with `service_account_id`.
        user:
          $ref: '#/components/schemas/User'
          description: Embedded profile for `user_id` when this is a CLI-backed human worker
            session. Absent when the user record is unavailable or the session is service-account-backed.
        api_key_id:
          type: string
          description: ID of the specific API key this session presented on its most recent
            register/heartbeat. Only set for service-account-backed sessions; changes across
            credential rotations. Use together with `service_account_id` to see rotation progress
            across a fleet.
        agent_id:
          type: string
          description: Agent this session represents, when the polling process declared itself
            as a registered agent (via `agent_id` on the claim request or via inference from
            the service account). Absent for ad-hoc worker processes that are not tied to
            a declared agent.
        instance_status:
          type: string
          enum:
          - active
          - stale
          - draining
          description: |-
            High-level lifecycle indicator for the row.
            * `active` — recent heartbeat, healthy.
            * `stale` — no heartbeat within the staleness window; row
            retained for display until the 30-day delete floor.
            * `draining` — explicit graceful-shutdown signal from the
            SDK (reserved for future SDK releases).

            Conflicts (a different process tried to register this `worker_instance_id` within the takeover window and was rejected) are surfaced inline as a 409 from the worker protocol; the previous registration's row remains `active` and never appears as a separate "conflicting" entry.
        stale:
          type: boolean
          description: True when `last_seen_at` is older than 2 minutes or absent. Computed
            at read time, not stored. Equivalent to `instance_status == "stale"`; both are
            returned for backward compatibility while clients update.
        busy_job_count:
          type: integer
          minimum: 0
          description: Number of jobs this worker session is currently holding.
        current_jobs:
          type: array
          description: Currently claimed jobs held by this worker session.
          items:
            $ref: '#/components/schemas/WorkerSessionJobRef'
        last_job:
          $ref: '#/components/schemas/WorkerSessionJobRef'
          description: Most recent completed or failed job this worker session handled.
    WorkerSessionJobRef:
      type: object
      additionalProperties: false
      required:
      - id
      - run_id
      - step_name
      - action
      - status
      - updated_at
      properties:
        id:
          type: string
          description: Job ID.
        run_id:
          type: string
          description: Workflow run that owns the job.
        step_name:
          type: string
          description: Workflow step name.
        action:
          type: string
          description: Action executed by the worker.
        status:
          type: string
          enum:
          - pending
          - claimed
          - completed
          - failed
          description: Current job lifecycle state.
        claimed_at:
          type: string
          format: date-time
          description: Timestamp when the worker claimed the job.
        heartbeat_at:
          type: string
          format: date-time
          description: Most recent heartbeat timestamp while the job is claimed.
        updated_at:
          type: string
          format: date-time
          description: Last job update timestamp.
    WorkerSessionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - totals
      properties:
        items:
          type: array
          description: The list of recently seen worker sessions.
          items:
            $ref: '#/components/schemas/WorkerSession'
        totals:
          $ref: '#/components/schemas/WorkerSessionTotals'
          description: Aggregate counts across `items`, computed by the server so UIs do not
            need to re-derive them on every render.
    WorkerSessionTotals:
      type: object
      additionalProperties: false
      required:
      - active_instances
      - slots
      - busy
      - stale
      description: Project-wide rollup of the rendered worker sessions. Useful for the page
        header — "3 active instances · 18 slots · 7 busy · 1 stale" — without iterating items
        client-side.
      properties:
        active_instances:
          type: integer
          minimum: 0
          description: Count of `instance_status == "active"` rows.
        slots:
          type: integer
          minimum: 0
          description: Sum of `concurrency_limit` across active rows.
        busy:
          type: integer
          minimum: 0
          description: Sum of `busy_job_count` across active rows.
        stale:
          type: integer
          minimum: 0
          description: Count of `instance_status == "stale"` rows.
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug for API routes. Auto-derived from name if omitted. Must
            be unique within the org. Cannot be changed after creation.
        description:
          type: string
          description: Optional human-readable description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Initial project access policy: `org_open` or `restricted`.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        description:
          type: string
          description: Replacement description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Replacement project access policy: `org_open` or `restricted`.'
        seed_existing_members:
          type: boolean
          description: When transitioning from `org_open` to `restricted`, set true to insert
            all current org members as project members so nobody loses visibility on the flip.
            Ignored on other transitions.
        default_agent_role_id:
          type: string
          nullable: true
          description: Replacement role assigned to the auto-created service account of any
            new agent in this project. `null` clears the override and falls through to the
            system `Agent` role floor. Must resolve to a system-defined role or a role scoped
            to this project.
        permissions_enabled:
          type: boolean
          description: Enables or disables role-permission enforcement for this project. This
            is a project setting; there is no org-wide fallback role for regular users without
            assignments.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the project.
    ProjectMember:
      type: object
      additionalProperties: false
      description: Explicit project membership used when a project is restricted. Use this
        record to decide who can see or operate on a project outside the default org-wide
        access model.
      required:
      - id
      - project_id
      - user_id
      - added_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        project_id:
          type: string
          description: ID of the project this membership belongs to.
        user_id:
          type: string
          description: ID of the user who is a member.
        user:
          $ref: '#/components/schemas/User'
          description: Profile of the member. Embedded by `listProjectMembers` so UIs can
            render names, emails, and avatars without a separate user lookup. Absent on the
            `addProjectMember` response.
        added_by_user_id:
          type: string
          description: User ID of whoever added this member, if recorded.
        added_at:
          type: string
          format: date-time
          description: Timestamp when the member was added.
    ProjectMemberListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of members for this project.
          items:
            $ref: '#/components/schemas/ProjectMember'
        has_more:
          type: boolean
          description: Whether more results are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    AddProjectMemberRequest:
      type: object
      additionalProperties: false
      required:
      - user_id
      properties:
        user_id:
          type: string
          description: User ID of the org member to add to this project.
    FeatureGateSource:
      type: string
      enum:
      - default
      - org_override
      - project_override
      description: Source of the effective feature gate decision.
    FeatureGate:
      type: object
      additionalProperties: false
      required:
      - key
      - label
      - description
      - enabled
      - default_enabled
      - source
      - allowed_scopes
      properties:
        key:
          $ref: '#/components/schemas/FeatureKey'
        label:
          type: string
          description: Short user-facing name.
        description:
          type: string
          description: User-facing description of the gated product area.
        enabled:
          type: boolean
          description: Effective state after resolving defaults and overrides.
        default_enabled:
          type: boolean
          description: Built-in fallback state when no active override applies.
        source:
          $ref: '#/components/schemas/FeatureGateSource'
        source_scope:
          $ref: '#/components/schemas/FeatureOverrideScope'
          description: Override scope that produced this state, omitted for defaults.
        source_org_id:
          type: string
          description: Org ID for the override that produced this state.
        source_project_id:
          type: string
          description: Project ID for the override that produced this state.
        reason:
          type: string
          description: Optional operator-supplied reason from the active override.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiry for the active override.
        allowed_scopes:
          type: array
          items:
            $ref: '#/components/schemas/FeatureOverrideScope'
    FeatureGateListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FeatureGate'
    WebhookDeliveryStatus:
      type: string
      enum:
      - pending
      - processing
      - delivered
      - failed
      description: '`pending` — queued, not yet attempted. `processing` — currently being
        delivered. `delivered` — recipient returned 2xx. `failed` — all retry attempts exhausted.'
    Webhook:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - url
      - events
      - enabled
      - created_at
      - updated_at
      description: A project-level outgoing webhook subscription. When a subscribed event
        fires, Mobius POSTs the event payload to `url`.
      properties:
        id:
          type: string
          description: Unique identifier for this webhook.
        name:
          type: string
          description: Human-readable name, unique within the project.
        url:
          type: string
          description: The customer endpoint Mobius POSTs event payloads to.
        events:
          type: array
          items:
            type: string
          description: Subscribed event types. Use dot notation (`run.completed`, `run.failed`)
            or wildcards (`run.*` for all run events). An empty list subscribes to all event
            types.
        enabled:
          type: boolean
          description: When false, matching events are not delivered.
        created_by:
          type: string
          description: User ID of the principal who created this webhook.
        updated_by:
          type: string
          description: User ID of the principal who last updated this webhook.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this webhook.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this webhook was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this webhook was last updated.
    WebhookListResponse:
      type: object
      additionalProperties: false
      required:
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Webhook'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    WebhookDelivery:
      type: object
      additionalProperties: false
      required:
      - id
      - webhook_id
      - event_type
      - status
      - attempts
      - created_at
      description: One delivery record for a webhook event. The daemon claims pending rows,
        POSTs the payload, and transitions to `delivered` or retries on failure. A delivery
        reaches `failed` only after exhausting all 10 retry attempts.
      properties:
        id:
          type: string
          description: Unique identifier for this delivery record.
        webhook_id:
          type: string
          description: ID of the webhook this delivery belongs to.
        run_id:
          type: string
          description: Run that triggered the event, when applicable.
        event_type:
          type: string
          description: The event type that triggered this delivery (e.g. `run.completed`).
        status:
          $ref: '#/components/schemas/WebhookDeliveryStatus'
          description: 'Current delivery status: `pending`, `delivered`, or `failed`.'
        attempts:
          type: integer
          description: Number of delivery attempts made so far. Max 10.
        last_error:
          type: string
          description: Error message from the most recent failed attempt.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this delivery was first attempted.
        delivered_at:
          type: string
          format: date-time
          description: Timestamp of the successful delivery. Absent until delivered.
    WebhookDeliveryListResponse:
      type: object
      additionalProperties: false
      required:
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/WebhookDelivery'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateWebhookRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - events
      properties:
        name:
          type: string
          description: Human-readable name, unique within the project.
        url:
          type: string
          description: The endpoint Mobius will POST event payloads to. May be left empty
            at creation time so a candidate URL can be tested via the ping endpoint before
            it is saved; events do not fire for webhooks with an empty URL.
        signing_secret:
          type: string
          description: 'Optional HMAC-SHA256 secret. When set, Mobius signs each POST body
            and includes `X-Mobius-Signature: sha256=<hex>` in the request headers.'
        events:
          type: array
          items:
            type: string
          description: Event types to subscribe to. Use wildcards for broad subscriptions,
            e.g. `["run.*"]` for all run events. An empty list subscribes to all event types.
        enabled:
          type: boolean
          description: Whether the webhook starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateWebhookRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        url:
          type: string
          description: Replacement endpoint URL.
        signing_secret:
          type: string
          description: Replace the current signing secret. Set to empty string to disable
            signing. Omit to leave the current secret unchanged.
        events:
          type: array
          items:
            type: string
          description: Replacement event subscriptions. Replaces the entire current list;
            an empty list subscribes to all event types.
        enabled:
          type: boolean
          description: Set to false to disable delivery without deleting the webhook.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the webhook. System tags
            (`mobius:*`) are preserved.
    PingWebhookRequest:
      type: object
      additionalProperties: false
      properties:
        url:
          type: string
          description: URL to test. When supplied, the ping is sent to this URL instead of
            the webhook's saved URL — use this to validate a candidate URL before saving it.
            When omitted, the webhook's current saved URL is used.
    PingWebhookResult:
      type: object
      additionalProperties: false
      required:
      - success
      properties:
        success:
          type: boolean
          description: True if the target responded with a 2xx status code.
        status_code:
          type: integer
          description: HTTP status code returned by the target. Absent on network error.
        error:
          type: string
          description: Error message if the request could not be completed.
        latency_ms:
          type: integer
          description: Round-trip latency in milliseconds.
    PermissionDefinition:
      type: object
      additionalProperties: false
      required:
      - id
      - label
      - description
      - scope
      - category
      - risk
      - assignable
      - user_kinds
      properties:
        id:
          type: string
          description: Stable permission ID stored on roles.
        label:
          type: string
          description: Human-readable label for product UI.
        description:
          type: string
          description: Short explanation of what the permission grants.
        scope:
          type: string
          enum:
          - project
          - org
          - platform
          - action
        category:
          type: string
          enum:
          - project
          - access
          - workflows
          - work
          - channels
          - integrations
          - audit
          - billing
          - platform
          - actions
        risk:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
        assignable:
          type: boolean
          description: Whether this permission should be selectable in the current project
            role builder.
        user_kinds:
          type: array
          minItems: 1
          maxItems: 4
          uniqueItems: true
          items:
            type: string
            enum:
            - human
            - agent
            - service_account
            - system
          description: User kinds this permission is intended for.
    PermissionPreset:
      type: object
      additionalProperties: false
      required:
      - id
      - label
      - description
      - scope
      - permissions
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
        scope:
          type: string
          enum:
          - project
          - org
          - platform
          - action
        permissions:
          type: array
          maxItems: 64
          items:
            type: string
    ActionPermissionGroup:
      type: object
      additionalProperties: false
      required:
      - id
      - label
      - source
      - children
      properties:
        id:
          type: string
          description: Wildcard permission ID, for example `actions.execute.slack.*`.
        label:
          type: string
        source:
          type: string
          enum:
          - platform
          - integration
          - custom
        children:
          type: array
          maxItems: 200
          items:
            type: string
          description: Concrete action execution permission IDs included in this group.
    PermissionCatalogResponse:
      type: object
      additionalProperties: false
      required:
      - permissions
      - presets
      - action_groups
      properties:
        permissions:
          type: array
          maxItems: 64
          items:
            $ref: '#/components/schemas/PermissionDefinition'
        presets:
          type: array
          maxItems: 32
          items:
            $ref: '#/components/schemas/PermissionPreset'
        action_groups:
          type: array
          maxItems: 64
          items:
            $ref: '#/components/schemas/ActionPermissionGroup'
    Role:
      type: object
      additionalProperties: false
      description: Named bundle of permissions assignable to users or service accounts. Roles
        let admins grant workflow, project, and automation capabilities consistently without
        editing every user individually.
      required:
      - id
      - name
      - permissions
      - system_defined
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this role.
        project_id:
          type: string
          description: Scoping project. Empty for system-defined roles.
        name:
          type: string
          description: Human-readable role name, unique within org+project scope.
        description:
          type: string
          description: Optional human-readable description of what this role grants.
        permissions:
          type: array
          items:
            type: string
          description: Permission strings granted by this role. Source allowed values from
            `GET /v1/projects/{project}/permissions`; legacy IDs or values not present in
            that catalog are rejected.
        system_defined:
          type: boolean
          description: True for built-in platform roles that cannot be modified or deleted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this role.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this role was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this role was last updated.
    RoleAssignment:
      type: object
      additionalProperties: false
      description: Binding between a User and a role, optionally scoped to a project. Use
        assignments to explain why a user or service account has access and to audit who granted
        it.
      required:
      - id
      - user_id
      - role_id
      - role_name
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this role assignment.
        user_id:
          type: string
          description: User ID receiving the role.
        role_id:
          type: string
          description: ID of the assigned role.
        role_name:
          type: string
          description: Name of the assigned role.
        project_id:
          type: string
          description: Set for project-scoped assignments; empty for org-wide.
        granted_by_user_id:
          type: string
          description: User ID of the caller who created this assignment.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this assignment was created.
    RoleListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Role'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    RoleAssignmentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
