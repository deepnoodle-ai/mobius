    LoopSpecRepository:
      type: object
      additionalProperties: false
      description: Source repository target attached to a loop spec.
      required:
      - full_name
      properties:
        provider:
          type: string
          enum:
          - github
          default: github
          description: Repository provider. GitHub is the only supported provider today.
        id:
          description: Provider-specific repository id.
          oneOf:
          - type: integer
            format: int64
          - type: string
        full_name:
          type: string
          description: Provider repository full name, e.g. `owner/repo`.
        private:
          type: boolean
          description: Whether the provider reports this repository as private.
    LoopSpecInput:
      type: object
      additionalProperties: false
      description: One named input accepted by a loop spec.
      properties:
        type:
          type: string
          description: JSON-compatible input type expected by authoring tools.
        description:
          type: string
          description: Human guidance shown when collecting the input value.
        required:
          type: boolean
          description: Whether callers must provide this input when starting the loop.
        default:
          description: Optional default value for this input. May be any JSON value.
    LoopSpecTrigger:
      type: object
      additionalProperties: false
      description: One trigger declaration inside a loop spec.
      required:
      - kind
      properties:
        key:
          type: string
          description: Stable user-authored trigger key within the spec.
        name:
          type: string
          description: Human-readable trigger name.
        kind:
          type: string
          enum:
          - http
          - schedule
          - event
          - manual
          description: 'Trigger mechanism: `http`, `schedule`, `event`, or `manual`.'
        enabled:
          type: boolean
          description: Whether this trigger should be materialized for the current runnable
            definition.
        config:
          oneOf:
          - $ref: '#/components/schemas/HTTPTriggerConfig'
          - $ref: '#/components/schemas/ScheduleTriggerConfig'
          - $ref: '#/components/schemas/EventTriggerConfig'
          description: 'Kind-specific trigger configuration. Use `HTTPTriggerConfig` for `kind:
            http`, `ScheduleTriggerConfig` for `kind: schedule`, and `EventTriggerConfig`
            for `kind: event`. Omit for manual triggers.'
        concurrency_policy:
          type: string
          enum:
          - allow
          - queue
          - skip
          - replace
          description: 'Trigger concurrency behavior: `allow`, `queue`, `skip`, or `replace`.'
        max_concurrent_runs:
          type: integer
          minimum: 1
          description: Maximum number of concurrently active runs for this trigger.
    HTTPTriggerConfig:
      type: object
      additionalProperties: false
      description: Configuration for `LoopSpec.triggers[]` entries with `kind` set to `http`.
      properties:
        http_handle:
          type: string
          description: Optional public delivery handle for `POST /v1/triggers/http/{http_handle}`.
            Omit to let Mobius use the materialized trigger id as the unguessable handle.
    ScheduleTriggerConfig:
      type: object
      additionalProperties: false
      description: Configuration for `LoopSpec.triggers[]` entries with `kind` set to `schedule`.
        Provide exactly one of `cron` or `interval`; the compiler rejects configs that omit
        both or set both.
      properties:
        cron:
          type: string
          description: Standard five-field cron expression or descriptor such as `@hourly`.
        interval:
          type: string
          description: Go duration string such as `5m`, `1h`, or `24h`.
        timezone:
          type: string
          description: IANA time zone for cron schedules, such as `America/New_York`.
    EventTriggerConfig:
      type: object
      additionalProperties: false
      description: Configuration for `LoopSpec.triggers[]` entries with `kind` set to `event`.
      required:
      - event_type
      properties:
        event_type:
          type: string
          description: Source-event type or catalog pattern this trigger subscribes to.
        source_id:
          type: string
          description: Optional source identifier used to scope event matching.
        condition:
          type: string
          description: Optional expr predicate evaluated against the public `{ event, meta
            }` envelope.
    LoopStep:
      oneOf:
      - $ref: '#/components/schemas/LoopAgentStepSpec'
      - $ref: '#/components/schemas/LoopActionStepSpec'
      - $ref: '#/components/schemas/LoopSleepStepSpec'
      - $ref: '#/components/schemas/LoopWaitForEventStepSpec'
      - $ref: '#/components/schemas/LoopSubLoopStepSpec'
      - $ref: '#/components/schemas/LoopCheckStepSpec'
      discriminator:
        propertyName: kind
        mapping:
          agent: '#/components/schemas/LoopAgentStepSpec'
          action: '#/components/schemas/LoopActionStepSpec'
          sleep: '#/components/schemas/LoopSleepStepSpec'
          wait_for_event: '#/components/schemas/LoopWaitForEventStepSpec'
          loop: '#/components/schemas/LoopSubLoopStepSpec'
          check: '#/components/schemas/LoopCheckStepSpec'
      description: User-authored loop step, discriminated by `kind`.
    LoopAgentStepSpec:
      type: object
      additionalProperties: false
      description: Agent step entry inside `LoopSpec.steps`.
      required:
      - kind
      - config
      properties:
        id:
          type: string
          description: Optional stable step id within the spec. If omitted, the compiler uses
            the step index as a string, such as `"0"`.
        name:
          type: string
          description: Human-readable step name.
        if:
          type: string
          description: Bare expr predicate evaluated before the step runs; false skips the
            step.
        kind:
          type: string
          enum:
          - agent
          description: Step discriminator value; always `agent`.
        config:
          $ref: '#/components/schemas/LoopAgentStep'
          description: Agent-step configuration.
        retry:
          $ref: '#/components/schemas/LoopRetryPolicy'
          description: Retry policy for this step.
