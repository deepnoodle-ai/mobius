          items:
            type: string
    SkillAssignmentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Skill assignments for this agent, in position order.
          items:
            $ref: '#/components/schemas/SkillAssignment'
    SkillManifestEntry:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - instructions
      - active
      properties:
        id:
          type: string
          description: Skill ID this manifest entry resolved to.
        name:
          type: string
          description: Display name of the skill.
        instructions:
          type: string
          description: Markdown instructions loaded for this skill.
        active:
          type: boolean
          description: Whether this skill is currently active in the resolved manifest.
        model_hint:
          type: string
          description: Advisory model preference for this skill.
        user_invocable:
          type: boolean
          description: Whether users may directly request this skill by name.
        missing_required:
          type: array
          description: Tool selectors the skill requires but that are not available to the
            agent.
          items:
            type: string
        missing_recommended:
          type: array
          description: Tool selectors the skill recommends but that are not available to the
            agent.
          items:
            type: string
    AgentManifestWarning:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Machine-readable warning code.
        message:
          type: string
          description: Human-readable warning text.
        skill_id:
          type: string
          description: Skill the warning relates to, when applicable.
        toolkit_id:
          type: string
          description: Toolkit the warning relates to, when applicable.
        tool:
          type: string
          description: Tool selector the warning relates to, when applicable.
        action:
          type: string
          description: Action name the warning relates to, when applicable.
    AgentBlockedGrant:
      type: object
      additionalProperties: false
      required:
      - selector_type
      - selector
      - reason
      properties:
        selector_type:
          type: string
          description: Selector kind (e.g. `action`, `wildcard`, `group`).
        selector:
          type: string
          description: Selector value as authored on the toolkit grant.
        action_name:
          type: string
          description: Canonical action name the selector resolved to, when the grant matched
            a real catalog entry that the agent principal is not permitted to invoke.
        reason:
          type: string
          description: Why the grant is currently blocked (e.g. missing permission, archived
            action).
        permission_id:
          type: string
          description: ID of the missing permission, when the block was caused by an authorization
            gap.
    ResolvedActionGroup:
      type: object
      additionalProperties: false
      required:
      - name
      - members
      properties:
        name:
          type: string
          description: Canonical group name (e.g. `mobius.table.read`).
        members:
          type: array
          description: Action names the group expanded to during this resolution.
          items:
            type: string
    AgentToolManifest:
      type: object
      additionalProperties: false
      required:
      - agent_id
      - project_id
      - policy_hash
      - toolkit_ids
      - tools
      - skills
      - warnings
      - blocked_grants
      description: 'The flat, resolved tool set visible to one agent. Replaces the prior Capability/Action
        split: every entry in `tools` is an action catalog entry the agent can invoke as its
        own named tool.'
      properties:
        agent_id:
          type: string
          description: Agent this manifest was resolved for.
        project_id:
          type: string
          description: Project the manifest is scoped to.
        policy_hash:
          type: string
          description: Stable hash over the resolved tool + skill set; bumps when grants or
            permissions change.
        toolkit_ids:
          type: array
          description: Toolkit IDs that contributed to the resolved manifest.
          items:
            type: string
        tools:
          type: array
          description: Catalog entries the agent can invoke. Each entry surfaces to the LLM
            as its own named tool. Built-in, integration, automation, and custom-HTTP actions
            are intermingled here.
          items:
            $ref: '#/components/schemas/ActionCatalogEntry'
        groups_resolved:
          type: array
          description: Audit trail of group selectors that contributed to the resolved tool
            set. Operators see groups; the LLM only sees the flat `tools` list.
          items:
            $ref: '#/components/schemas/ResolvedActionGroup'
        skills:
          type: array
          description: Skills active for this agent in the resolved manifest.
          items:
            $ref: '#/components/schemas/SkillManifestEntry'
        warnings:
          type: array
          description: Non-fatal issues encountered while resolving the manifest.
          items:
            $ref: '#/components/schemas/AgentManifestWarning'
        blocked_grants:
          type: array
          description: Grants that resolved to a catalog entry the agent cannot currently
            invoke.
          items:
            $ref: '#/components/schemas/AgentBlockedGrant'
    CreateAgentRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        role_ids:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: Roles to assign to the agent's principal. When omitted, the agent inherits
            the project's `default_agent_role_id`, falling through to the system `Agent` role
            floor when unset.
        name:
          type: string
          description: Project-scoped unique name for this agent. Free-form human-readable
            label, 1-63 characters.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform classification (e.g. "llm", "rpa", "integration").
        color:
          type: string
          description: Display color for this agent (Mantine palette key, e.g. `indigo`).
            Optional; empty falls back to a hash-derived color.
          maxLength: 24
        capabilities:
          type: array
          items:
            type: string
          description: Capability names used by orchestrators to select suitable agents.
        model:
          type: string
          description: Model identifier for platform agents. Any id from `GET /v1/projects/{project}/catalog/models`,
            optionally `provider/`-prefixed (e.g. `xai/grok-4`); bare known ids (e.g. `claude-sonnet-4-6`)
            are auto-detected. Empty falls back to the platform default.
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
        tool_presentation:
          $ref: '#/components/schemas/AgentToolPresentation'
          description: Omit to use the create-time default, `flat`.
        system_prompt:
          type: string
          description: Custom system prompt for platform agents. Empty uses the generated
            default.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateAgentRequest:
      type: object
      additionalProperties: false
      description: 'Mutable agent fields. The agent''s backing identity (`principal_id`, the
        machine principal created atomically with the agent) is intentionally absent: it is
        immutable. Reassigning identity is delete-and-recreate.'
      properties:
        name:
          type: string
          description: Free-form human-readable label, 1-63 characters; must be unique within
            the project.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Replacement description.
          maxLength: 500
        kind:
          type: string
          description: Replacement freeform agent classification (e.g. `llm`, `rpa`).
        color:
          type: string
          description: Replacement display color (Mantine palette key, e.g. `indigo`). Pass
            empty string to clear and fall back to a hash-derived color.
          maxLength: 24
        capabilities:
          type: array
          items:
            type: string
          description: Replacement capability names.
        model:
          type: string
          description: Replacement model identifier for platform agents (any id from `GET
            /v1/projects/{project}/catalog/models`, optionally `provider/`-prefixed).
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
        tool_presentation:
          $ref: '#/components/schemas/AgentToolPresentation'
        system_prompt:
          type: string
          description: Replacement system prompt for platform agents.
        status:
          type: string
          enum:
          - active
          - inactive
          description: 'Replacement agent status: `active` or `inactive`. Use DELETE to soft-delete.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the agent. System tags
            (`mobius:*`) are preserved.
    Automation:
