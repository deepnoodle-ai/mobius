        output:
          type: object
          additionalProperties: true
          description: Declared run result contract.
        cleanup:
          type: array
          description: Cleanup steps or policies evaluated after normal step execution.
          items:
            type: object
            additionalProperties: true
        limits:
          $ref: '#/components/schemas/LoopSpecLimits'
          description: Run guardrails such as budget, timeout, and turn limits.
        defaults:
          $ref: '#/components/schemas/LoopSpecDefaults'
          description: Run-level defaults applied when individual steps omit a policy.
        run_name:
          $ref: '#/components/schemas/RunNameSpec'
          description: Optional templates for generating an operator-facing title and description
            for each run.
        default_config:
          type: object
          additionalProperties: true
          description: Default config values used when a run is started without overrides.
        settings:
          type: object
          additionalProperties: true
          description: Free-form loop-level settings consumed by the engine.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Free-form labels used for filtering, ownership, or automation.
      example:
        name: Daily security check
        description: Review open pull requests each morning.
        agent_id: agent_5n8p2q7m4x9r3v6t
        schema_version: '1'
        triggers:
        - name: Weekday morning
          kind: schedule
          config:
            cron: 0 9 * * 1-5
            timezone: America/New_York
        steps:
        - id: summarize
          kind: agent
          config:
            instructions: Summarize open pull requests.
        default_config:
          repository: deepnoodle-ai/mobius-cloud
        tags:
          owner: product
    UpdateLoopRequest:
      type: object
      additionalProperties: false
      description: Partial update of loop metadata and/or authoring fields. Authoring changes
        become runnable immediately.
      properties:
        name:
          type: string
          description: Human-readable display name.
        description:
          type: string
          description: Markdown description of the loop's purpose.
        status:
          $ref: '#/components/schemas/LoopStatus'
          description: Replacement lifecycle status for the loop.
        agent_id:
          type: string
          description: Agent associated with this loop. Agent steps use it when they do not
            pin `config.agent_id`.
        schema_version:
          type: string
          enum:
          - '1'
          description: Loop authoring schema version. Only schema version 1 is accepted.
        event:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LoopSpecInput'
          description: Declared event fields for this loop.
        config:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LoopSpecInput'
          description: Declared run config fields for this loop.
        concurrency:
          type: string
          enum:
          - allow
          - queue
          - skip
          - replace
          description: 'Concurrency behavior: `allow`, `queue`, `skip`, or `replace`.'
        triggers:
          type: array
          description: Replacement authored trigger declarations.
          items:
            $ref: '#/components/schemas/LoopSpecTrigger'
        repositories:
          type: array
          description: Replacement source repositories the loop targets.
          items:
            $ref: '#/components/schemas/LoopSpecRepository'
        steps:
          type: array
          description: Replacement ordered user-authored steps.
          items:
            $ref: '#/components/schemas/LoopStep'
        output:
          type: object
          additionalProperties: true
          description: Replacement run result contract.
        cleanup:
          type: array
          description: Replacement cleanup steps or policies.
          items:
            type: object
            additionalProperties: true
        limits:
          $ref: '#/components/schemas/LoopSpecLimits'
          description: Replacement run guardrails such as budget, timeout, and turn limits.
        defaults:
          $ref: '#/components/schemas/LoopSpecDefaults'
          description: Replacement run-level defaults.
        run_name:
          $ref: '#/components/schemas/RunNameSpec'
          description: Replacement templates for generating an operator-facing title and description
            for each run.
        default_config:
          type: object
          additionalProperties: true
          description: Default config values used when a run is started without overrides.
        settings:
          type: object
          additionalProperties: true
          description: Free-form loop-level settings consumed by the engine.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Replacement labels; send an empty object to clear all tags.
    RunNameSpec:
      type: object
      additionalProperties: false
      description: Templates for assigning an operator-facing title and optional description
        to each run. The object form leaves room for additional naming strategies without
        changing the loop spec shape.
      properties:
        template:
          type: string
          description: '`${{ event.* }}`, `${{ meta.* }}`, and `${{ config.* }}` template
            rendered as the run title when the run is created. When blank, the run title falls
            back to the loop name. This property remains required for compatibility, but may
            be blank when only description_template is configured. Send empty title and description
            templates in an update to clear the run display configuration.'
        description_template:
          type: string
          description: Optional `${{ event.* }}`, `${{ meta.* }}`, and `${{ config.* }}` template
            rendered as secondary descriptive text when the run is created.
      required:
      - template
    LoopSpecRepository:
      type: object
      additionalProperties: false
      description: Source repository target attached to a loop spec. A `static` repository
        clones the named `full_name`. A `match` repository resolves the repository from the
        run's trigger event (for example the base repository of an opened GitHub pull request)
        and requires the loop to have an event trigger; pull requests opened from a fork are
        never cloned. `full_name` is required for `static` repositories and ignored for `match`
        repositories.
      properties:
        source:
          type: string
          enum:
          - static
          - match
          default: static
          description: How the repository target is resolved. `static` clones `full_name`;
            `match` clones the repository the trigger event concerns.
        provider:
          type: string
          enum:
          - github
          default: github
          description: Repository provider. GitHub is the only supported provider today.
        id:
          description: Provider-specific repository id.
          oneOf:
          - type: integer
            format: int64
          - type: string
        full_name:
          type: string
          description: Provider repository full name, e.g. `owner/repo`. Required when `source`
            is `static`.
        ref:
          type: string
          description: Optional branch, tag, or ref to check out. For `static` repositories
            it pins the checkout; for `match` repositories it overrides the ref derived from
            the event. Omitted uses the provider default branch.
        private:
          type: boolean
          description: Whether the provider reports this repository as private.
        push:
          type: boolean
          default: false
          description: 'Authorize the loop''s managed environment to push to this repository.
            Defaults to `false`: the repository is cloned read-only and a `git push` from
            inside the environment fails with a permission error. Set `true` to let the environment
            obtain a write-scoped credential for this repository. Opt in per repository so
            environments are never write-capable by default.'
    LoopSpecInput:
      type: object
      additionalProperties: false
      description: One named input accepted by a loop spec.
      properties:
        type:
          type: string
          description: JSON-compatible input type expected by authoring tools.
        description:
          type: string
          description: Human guidance shown when collecting the input value.
        required:
          type: boolean
          description: Whether callers must provide this input when starting the loop.
        default:
          description: Optional default value for this input. May be any JSON value.
    LoopSpecTrigger:
      type: object
      additionalProperties: false
      description: One trigger declaration inside a loop spec.
      required:
      - kind
      properties:
        key:
          type: string
          description: Stable user-authored trigger key within the spec.
        name:
          type: string
          description: Human-readable trigger name.
        kind:
          type: string
          enum:
          - http
          - schedule
          - event
          - manual
          description: 'Trigger mechanism: `http`, `schedule`, `event`, or `manual`.'
        enabled:
          type: boolean
          description: Whether this trigger should be materialized for the current runnable
            definition.
        config:
          oneOf:
          - $ref: '#/components/schemas/HTTPTriggerConfig'
          - $ref: '#/components/schemas/ScheduleTriggerConfig'
          - $ref: '#/components/schemas/EventTriggerConfig'
          description: 'Kind-specific trigger configuration. Use `HTTPTriggerConfig` for `kind:
            http`, `ScheduleTriggerConfig` for `kind: schedule`, and `EventTriggerConfig`
            for `kind: event`. Omit for manual triggers.'
        concurrency_policy:
          type: string
          enum:
          - allow
          - queue
          - skip
          - replace
          description: 'Trigger concurrency behavior: `allow`, `queue`, `skip`, or `replace`.'
        max_concurrent_runs:
          type: integer
          minimum: 1
          description: Maximum number of concurrently active runs for this trigger.
    HTTPTriggerConfig:
      type: object
      additionalProperties: false
      description: Configuration for `LoopSpec.triggers[]` entries with `kind` set to `http`.
      properties:
        http_handle:
          type: string
          description: Optional public delivery handle for `POST /v1/triggers/http/{http_handle}`.
            Omit to let Mobius use the materialized trigger id as the unguessable handle.
    ScheduleTriggerConfig:
      type: object
      additionalProperties: false
      description: Configuration for `LoopSpec.triggers[]` entries with `kind` set to `schedule`.
        Provide exactly one of `cron` or `interval`; the compiler rejects configs that omit
        both or set both.
      properties:
        cron:
          type: string
          description: Standard five-field cron expression or descriptor such as `@hourly`.
        interval:
          type: string
          description: Go duration string such as `5m`, `1h`, or `24h`.
        timezone:
          type: string
          description: IANA time zone for cron schedules, such as `America/New_York`.
    EventTriggerConfig:
      type: object
      additionalProperties: false
      description: Configuration for `LoopSpec.triggers[]` entries with `kind` set to `event`.
      required:
      - event_type
      properties:
        event_type:
          type: string
          description: Source-event type or catalog pattern this trigger subscribes to.
        source_id:
          type: string
          description: Optional source identifier used to scope event matching.
        condition:
          type: string
          description: Optional expr predicate evaluated against the public `{ event, meta
            }` envelope.
    LoopStep:
      oneOf:
      - $ref: '#/components/schemas/LoopAgentStepSpec'
      - $ref: '#/components/schemas/LoopActionStepSpec'
      - $ref: '#/components/schemas/LoopSleepStepSpec'
      - $ref: '#/components/schemas/LoopWaitForEventStepSpec'
      - $ref: '#/components/schemas/LoopSubLoopStepSpec'
      - $ref: '#/components/schemas/LoopCheckStepSpec'
      discriminator:
        propertyName: kind
        mapping:
          agent: '#/components/schemas/LoopAgentStepSpec'
          action: '#/components/schemas/LoopActionStepSpec'
          sleep: '#/components/schemas/LoopSleepStepSpec'
          wait_for_event: '#/components/schemas/LoopWaitForEventStepSpec'
          loop: '#/components/schemas/LoopSubLoopStepSpec'
          check: '#/components/schemas/LoopCheckStepSpec'
      description: User-authored loop step, discriminated by `kind`.
    LoopAgentStepSpec:
      type: object
      additionalProperties: false
      description: Agent step entry inside `LoopSpec.steps`.
      required:
      - kind
      - config
      properties:
        id:
          type: string
          description: Optional stable step id within the spec. If omitted, the compiler uses
            the step index as a string, such as `"0"`.
        name:
          type: string
          description: Human-readable step name.
        if:
          type: string
          description: Bare expr predicate evaluated before the step runs; false skips the
            step.
        kind:
          type: string
          enum:
          - agent
          description: Step discriminator value; always `agent`.
        config:
          $ref: '#/components/schemas/LoopAgentStep'
          description: Agent-step configuration.
        retry:
          $ref: '#/components/schemas/LoopRetryPolicy'
          description: Retry policy for this step.
        timeout:
          $ref: '#/components/schemas/LoopTimeoutPolicy'
          description: Timeout policy for this step.
    LoopActionStepSpec:
      type: object
      additionalProperties: false
      description: Action step entry inside `LoopSpec.steps`.
      required:
      - kind
      - config
      properties:
        id:
          type: string
          description: Optional stable step id within the spec. If omitted, the compiler uses
            the step index as a string, such as `"0"`.
        name:
          type: string
          description: Human-readable step name.
        if:
          type: string
          description: Bare expr predicate evaluated before the step runs; false skips the
            step.
        kind:
          type: string
          enum:
          - action
          description: Step discriminator value; always `action`.
        config:
          $ref: '#/components/schemas/LoopActionStep'
          description: Action-step configuration.
        retry:
          $ref: '#/components/schemas/LoopRetryPolicy'
          description: Retry policy for this step.
        timeout:
          $ref: '#/components/schemas/LoopTimeoutPolicy'
          description: Timeout policy for this step.
    LoopSleepStepSpec:
      type: object
      additionalProperties: false
      description: Sleep step entry inside `LoopSpec.steps`.
      required:
      - kind
      - config
      properties:
        id:
          type: string
          description: Optional stable step id within the spec. If omitted, the compiler uses
            the step index as a string, such as `"0"`.
        name:
          type: string
          description: Human-readable step name.
        if:
          type: string
          description: Bare expr predicate evaluated before the step runs; false skips the
            step.
        kind:
          type: string
          enum:
          - sleep
          description: Step discriminator value; always `sleep`.
        config:
          $ref: '#/components/schemas/LoopSleepStep'
          description: Sleep-step configuration.
        retry:
          $ref: '#/components/schemas/LoopRetryPolicy'
          description: Retry policy for this step.
        timeout:
          $ref: '#/components/schemas/LoopTimeoutPolicy'
          description: Timeout policy for this step.
    LoopWaitForEventStepSpec:
      type: object
      additionalProperties: false
      description: Wait-for-event step entry inside `LoopSpec.steps`.
      required:
      - kind
      - config
      properties:
        id:
          type: string
          description: Optional stable step id within the spec. If omitted, the compiler uses
            the step index as a string, such as `"0"`.
        name:
          type: string
          description: Human-readable step name.
        if:
          type: string
          description: Bare expr predicate evaluated before the step runs; false skips the
            step.
        kind:
          type: string
          enum:
          - wait_for_event
          description: Step discriminator value; always `wait_for_event`.
        config:
          $ref: '#/components/schemas/LoopWaitForEventStep'
          description: Wait-for-event step configuration.
        retry:
          $ref: '#/components/schemas/LoopRetryPolicy'
          description: Retry policy for this step.
        timeout:
          $ref: '#/components/schemas/LoopTimeoutPolicy'
          description: Timeout policy for this step.
    LoopSubLoopStepSpec:
      type: object
      additionalProperties: false
      description: Child-loop step entry inside `LoopSpec.steps`.
      required:
      - kind
      - config
      properties:
        id:
          type: string
          description: Optional stable step id within the spec. If omitted, the compiler uses
            the step index as a string, such as `"0"`.
        name:
          type: string
          description: Human-readable step name.
        if:
          type: string
          description: Bare expr predicate evaluated before the step runs; false skips the
            step.
        kind:
          type: string
          enum:
          - loop
          description: Step discriminator value; always `loop`.
        config:
          $ref: '#/components/schemas/LoopSubLoopStep'
          description: Child-loop step configuration.
        retry:
          $ref: '#/components/schemas/LoopRetryPolicy'
          description: Retry policy for this step.
        timeout:
          $ref: '#/components/schemas/LoopTimeoutPolicy'
          description: Timeout policy for this step.
    LoopCheckStepSpec:
      type: object
      additionalProperties: false
      description: Check step entry inside `LoopSpec.steps`.
      required:
      - kind
      - config
      properties:
        id:
          type: string
          description: Optional stable step id within the spec. If omitted, the compiler uses
            the step index as a string, such as `"0"`.
        name:
          type: string
          description: Human-readable step name.
        if:
          type: string
          description: Bare expr predicate evaluated before the step runs; false skips the
            step.
        kind:
          type: string
          enum:
          - check
          description: Step discriminator value; always `check`.
        config:
          $ref: '#/components/schemas/LoopCheckStep'
          description: Check-step configuration.
        retry:
          $ref: '#/components/schemas/LoopRetryPolicy'
          description: Retry policy for this step.
        timeout:
          $ref: '#/components/schemas/LoopTimeoutPolicy'
          description: Timeout policy for this step.
    LoopSpecLimits:
      type: object
      additionalProperties: false
      description: Run guardrails. Lives at `spec.limits` in the JSON the engine compiles.
        Every limit is optional; absent or zero means unbounded (plan-level org caps still
        apply), with one exception — trial-plan runs default to a 100-credit ($1) budget when
        no budget is set here or on the start request. Paid plans default to unbounded.
      properties:
        budget_usd:
          type: number
          format: double
          minimum: 0
          description: 'Run budget in US dollars (1 credit = $0.01). The budget is a hard
            limit: the run halts with stop reason `budget_exceeded` at the next checkpoint
            (step boundary or agent tool iteration) once its metered spend reaches the ceiling.
            Enforcement granularity is one model call or metered action — a run can overshoot
            by at most the call in flight. Mutually exclusive with `credit_budget`; values
            finer than 0.001 credit ($0.00001) are rejected at compile.'
        credit_budget:
          type: integer
          format: int64
          minimum: 1
          description: Run budget in whole credits (1 credit = $0.01). Same ceiling semantics
            as `budget_usd`; set exactly one.
        wall_clock_timeout:
          type: string
          description: Run wall-clock limit as a Go duration string (e.g. `30m`, `2h`, `90s`).
            When set, the engine stamps `wall_clock_deadline_at = run.started_at + wall_clock_timeout`
            and the reaper fails the run (stop reason `wall_clock_exceeded`) after that instant
            even if a step executor is still grinding. Omit or set to `0` to disable.
        max_agent_turns:
          type: integer
          minimum: 1
          description: Run-wide cap on agent turns across all steps. Each agent step execution
            (including retries and resumed turns) consumes one turn. Breach halts the run
            with stop reason `turn_limit_reached`. Distinct from a step's `max_turns`, which
            bounds tool iterations within a single turn.
        daily_budget_usd:
          type: number
          format: double
          minimum: 0
          description: Rolling-24h spend ceiling in US dollars across ALL runs of this loop
            (the fleet-level counterpart of `budget_usd`). Enforced at run start (new runs
            are refused while the window is exhausted) and at the platform funding gate (an
            in-flight run halts at its next platform-funded call with stop reason `budget_exceeded`).
            Counts platform-billed spend; mutually exclusive with `daily_credit_budget`.
        daily_credit_budget:
          type: integer
          format: int64
          minimum: 1
          description: Rolling-24h loop spend ceiling in whole credits. Same semantics as
            `daily_budget_usd`; set exactly one.
        max_duplicate_tool_calls:
          type: integer
          minimum: 1
          description: How many identical tool calls (same tool name and canonicalized arguments)
            one agent turn tolerates before the turn halts with a `progress_stalled` error
            — the duplicate-tool-call breaker. The step's retry policy applies; if the run
            fails from it the stop reason is `progress_stalled` and a `run.progress_stalled`
            event is emitted on each trip. Omit for the platform default (3).
        pause_after_consecutive_failures:
          type: integer
          minimum: 1
          description: Loop circuit breaker. After this many consecutive failed runs the loop
            auto-pauses (status `paused`) and emits a `loop.auto_paused` event, so a bad deploy
            cannot burn all night at one run per trigger fire. Completed runs reset the streak;
            cancelled runs are neutral. Omit to disable.
    LoopSpecDefaults:
      type: object
      additionalProperties: false
      description: Run-level defaults inside the loop spec. Lives at `spec.defaults` in the
        JSON the engine compiles. The run wall-clock limit moved to `limits.wall_clock_timeout`.
      properties:
        environment:
          $ref: '#/components/schemas/LoopEnvironmentPolicy'
          description: Default managed-environment policy for steps that need one.
        agent_session:
          $ref: '#/components/schemas/LoopAgentSessionPolicy'
          description: Default durable session policy for agent steps.
    LoopEnvironmentPolicy:
      type: object
      additionalProperties: false
      description: 'Automatic managed-environment policy for loop execution. Omit to use the
        product default: each agent gets a persistent agent-bound environment, while direct
        environment actions get a run-bound environment. Set `disabled: true` to opt out.'
      properties:
        disabled:
          type: boolean
          description: Disable automatic environment allocation.
        mode:
          $ref: '#/components/schemas/EnvironmentMode'
          description: Environment ownership mode to request.
        environment_id:
          type: string
          description: Existing dedicated environment to use for this loop.
        template_id:
          type: string
          description: Environment template to use when Mobius creates one.
        provider:
          $ref: '#/components/schemas/EnvironmentProvider'
          description: Provider to use when Mobius creates an environment.
        runtime_version:
          type: string
          description: Mobius worker runtime version to install when starting the worker.
        auto_start_worker:
          type: boolean
          description: Whether Mobius should start the managed worker automatically.
        retention_policy:
          $ref: '#/components/schemas/EnvironmentRetentionPolicy'
          description: Cleanup behavior after the run or lease ends.
    LoopAgentStep:
      type: object
      additionalProperties: false
      description: Agent step configuration recognised inside `LoopSpec.steps[].config`.
      required:
      - instructions
      properties:
        agent_id:
          type: string
          description: Agent to run for this step. Omit to use the loop's top-level `agent_id`.
        instructions:
          type: string
          description: Prompt or task instructions rendered before the agent turn starts.
        tool_names:
          type: array
          items:
            type: string
          description: Optional per-step tool allow-list. When omitted and `disable_tools`
            is not true, the agent's full granted tool set is available. Send an empty array
            to allow no tools.
        disable_tools:
          type: boolean
          description: Set true to disable granted action and memory tools for this step.
            When false or omitted, granted tools are available unless `tool_names` narrows
            the allow-list. Reserved runtime tools such as `invoke_skill` and structured-output
            submission may still be present when applicable.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema the agent should satisfy when returning structured output.
        max_turns:
          type: integer
          minimum: 1
          description: Maximum tool iterations allowed within this agent turn.
        model_route:
          $ref: '#/components/schemas/LoopModelRoute'
          description: Optional model route override for this agent step.
        session:
          $ref: '#/components/schemas/LoopAgentSessionPolicy'
          description: Optional durable session policy override for this agent step.
    LoopAgentSessionPolicy:
      type: object
      additionalProperties: false
      description: 'Durable conversation-session policy for loop agent steps. Omit to enable
        the product default: loop-scoped sessions keyed from the triggering conversation when
        Mobius can identify one, such as a Telegram chat ID.'
      properties:
        scope:
          type: string
          enum:
          - auto
          - loop
          - agent
          description: Named-session boundary. `auto` and omitted use `loop`. `agent` intentionally
            shares the named session across loops using the same agent.
        name:
          type: string
          description: Optional Go-template string rendered against `event`, `meta`, `config`,
            `context`, `agent`, `loop`, `run`, `source`, and `step`. When omitted, Mobius
            derives a stable name from the event payload, falling back to the trigger or `default`.
        title:
          type: string
          description: Optional Go-template string for the session display title.
        visibility:
          $ref: '#/components/schemas/SessionVisibility'
          description: Visibility for durable sessions created from this policy.
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Optional per-session compaction policy merged with server defaults
            when the session is first created. Existing sessions keep their current compaction
            policy unless edited through a session-specific operation.
        thinking_effort:
          $ref: '#/components/schemas/ThinkingEffort'
          description: Optional reasoning-effort override for this step's session turns. Overrides
            the agent default. Set as a loop default it applies to every agent step; set on
            a step it overrides the loop default.
    LoopModelRoute:
      type: object
      additionalProperties: false
      description: Model-routing override for an agent step.
      required:
      - mode
      properties:
        mode:
          type: string
          enum:
          - managed
          - worker
          description: 'Model route mode: `managed` or `worker`.'
        environment_id:
          type: string
          description: Managed environment to route worker-backed model calls to.
        provider:
          type: string
          description: Provider id advertised by a local worker when `mode` is `worker`.
        model:
          type: string
          description: Model identifier for this route.
    LoopActionStep:
      type: object
      additionalProperties: false
      description: Action step configuration recognised inside `LoopSpec.steps[].config`.
      required:
      - action_name
      properties:
        action_name:
          type: string
          description: Catalog action name to invoke.
        execution_location:
          type: string
          enum:
          - managed
          - worker
          - environment
          description: 'Execution location: `managed`, `worker`, or `environment`.'
        environment_id:
          type: string
          description: 'Managed environment to route this worker-backed action to. When omitted
            for `execution_location: environment`, Mobius resolves one from `spec.defaults.environment`.'
        parameters:
          type: object
          additionalProperties: true
          description: Action parameters, after template rendering.
    LoopSleepStep:
      type: object
      additionalProperties: false
      description: Sleep step configuration recognised inside `LoopSpec.steps[].config`.
      properties:
        duration:
          type: string
          description: Go duration string such as `30s`, `5m`, or `2h`.
        until:
          type: string
          format: date-time
          description: Absolute time to resume the run.
    LoopWaitForEventStep:
      type: object
      additionalProperties: false
      description: Wait-for-event step configuration recognised inside `LoopSpec.steps[].config`.
      required:
      - event_type
      properties:
        event_type:
          type: string
          description: Event type or pattern that resumes the waiting step.
        source_id:
          type: string
          description: Optional source identifier used to scope event matching.
        match:
          type: object
          additionalProperties: true
          description: Structured field match applied to incoming event payloads.
        payload_mapping:
          type: object
          additionalProperties:
            type: string
          description: Optional output mapping evaluated against `{ event, meta }`.
    LoopSubLoopStep:
      type: object
      additionalProperties: false
      description: Loop-trigger step configuration recognised inside `LoopSpec.steps[].config`.
        Triggers another loop in the same project as an independent child run (fire-and-forget).
        The child run records `parent_run_id`, `parent_loop_id`, and `parent_step_key` so
        the lineage is visible from the child.
      required:
      - loop_id
      properties:
        loop_id:
          type: string
          description: ID of the loop to trigger, scoped to the same project as the parent
            loop.
        event:
          type: object
          additionalProperties: true
          description: Event object handed to the child run. String leaves render against
            the parent run before the child starts using `${{ ... }}` expr interpolations
            over `event`, `meta`, `config`, `steps.<id>.output`, or `steps[0].output`. When
            omitted the parent's resolved event payload is forwarded.
        config:
          type: object
          additionalProperties: true
          description: Optional config object handed to the child run.
        condition:
          type: string
          description: Removed legacy field. Use the step-level `if` field for child-loop
            conditions.
    LoopCheckStep:
      type: object
      additionalProperties: false
      description: 'Check step configuration recognised inside `LoopSpec.steps[].config`.
        A check step evaluates typed assertions over the run''s template `event`, `meta`,
        `config`, `steps.<id>.output`, and `steps[0].output`) — deterministic `expr` predicates,
        or `agent` judges for everything that isn''t deterministic — records a per-assertion
        verdict with cited evidence, and routes on failure: fail the run (stop reason `check_failed`),
        continue with the red verdict on the record, or open an approval gate carrying the
        evidence (rejection stops the run with `gate_rejected`). All assertions are evaluated;
        there is no short-circuit. An assertion that errors (bad expr, judge model failure,
        unparseable verdict) fails closed — never a silent pass.'
      required:
      - checks
      properties:
        checks:
          type: array
          minItems: 1
          description: Assertions evaluated in order; names must be unique.
          items:
            $ref: '#/components/schemas/LoopCheckAssertion'
        on_fail:
          type: string
          enum:
          - fail
          - continue
          - gate
          default: fail
          description: Routing when any assertion fails. `fail` stops the run with stop reason
            `check_failed`. `continue` proceeds with the red verdict recorded. `gate` opens
            a `request_approval` interaction carrying the failed assertions and evidence;
            approval resumes the run with the verdict recorded as overridden, rejection stops
            it with `gate_rejected`.
        gate:
          $ref: '#/components/schemas/LoopCheckGate'
          description: Approval gate configuration used when `on_fail` is `gate`.
    LoopCheckAssertion:
      type: object
      additionalProperties: false
      description: One assertion evaluated by a check step.
      required:
      - name
      - kind
      properties:
        name:
          type: string
          description: Unique assertion name shown on the timeline proof row.
        kind:
          type: string
          enum:
          - expr
          - agent
          description: '`expr` evaluates a deterministic predicate with the same language
            as step conditions and event waits. `agent` runs a bounded judge turn returning
            a strict `{pass, reason}` verdict; its spend counts against the run budget and
            it consumes one run agent turn.'
        expr:
          type: string
          description: 'Predicate for `kind: expr`, evaluated against the run''s template
            environment (`event`, `meta`, `config`, `steps.<id>.output`, and `steps[0].output`).
            Required for expr assertions.'
        agent:
          type: string
          description: 'Judge agent id for `kind: agent`. Omit to use the built-in platform
            reviewer `mobius-reviewer`. The judge should be a different agent than the one
            that produced the evidence; the compiler warns when a judge grades its own work.'
        prompt:
          type: string
          description: 'Judge instruction for `kind: agent`, rendered with `${{ ... }}` expr
            interpolation before the cited evidence is appended. Required for agent assertions.'
        evidence:
          type: array
          items:
            type: string
          description: Step ids whose saved outputs this assertion judges. Each must reference
            an earlier step. Cited outputs are shown to agent judges and recorded on the verdict.
    LoopCheckGate:
      type: object
      additionalProperties: false
      description: 'Approval gate opened when `on_fail: gate` trips.'
      required:
      - targets
      properties:
        targets:
          type: array
          minItems: 1
          items:
            type: string
          description: Principals who must respond. String entries may contain template actions
            resolved against the run.
        prompt:
          type: string
          description: Prompt shown to reviewers. Defaults to a generated summary of the failed
            assertions.
    LoopRetryPolicy:
      type: object
      additionalProperties: false
      description: Retry policy for a step. `max_attempts` is the total number of attempts
        (1 = no retry); it bounds both worker-reported failures and lease-loss recovery for
        worker-executed action steps. A worker that reports a failure with attempts remaining
        re-queues for another attempt rather than failing the run; the run fails once attempts
        are exhausted. The attempt count is visible on the run timeline (`action.retried`,
        `action.failed`) and on the executing job (`claim_attempt` / `max_attempts`). Cancellation
        is always terminal. Capped server-side at 10 attempts.
      properties:
        max_attempts:
          type: integer
          minimum: 1
          maximum: 10
          description: Total attempts allowed for the step, including the first attempt.
        delay:
          type: string
          description: Go duration string such as `30s`, `5m`, or `2h`. Applied between attempts
            for in-process (synchronous) action retries; worker-executed actions re-queue
            immediately for the next attempt.
    LoopTimeoutPolicy:
      type: object
      additionalProperties: false
      description: Timeout behavior for one loop step.
      properties:
        duration:
          type: string
          description: Go duration string such as `30s`, `5m`, or `2h`.
        on_timeout:
          type: string
          enum:
          - fail
          description: Timeout behavior; currently only `fail`.
    HTTPTriggerDeliveryRequest:
      type: object
      additionalProperties: true
      description: Free-form JSON object delivered to the HTTP trigger. The payload is recorded
        on the source event and forwarded to the run as the event.
    HTTPTriggerDeliveryResult:
      type: object
      additionalProperties: false
      required:
      - source_event_id
      - status
      description: Synchronous receipt for an inbound HTTP-trigger delivery. The trigger dispatch
        and run start happen asynchronously after this response. Clients can poll via `GET
        /v1/projects/{project_handle}/runs?source_event_id=<source_event_id>` to discover
        the run once the source-event processor reserves it.
      properties:
        source_event_id:
          type: string
          description: Durable source-event id (also the `dedup_key` seed). Stable across
            retries with the same `Idempotency-Key`.
        status:
          type: string
          enum:
          - accepted
          description: Acceptance status of the source-event row. The only synchronous success
            value is `accepted`; processing happens asynchronously after the source event
            is durable.
        deduped:
          type: boolean
          description: True when an existing source-event row was returned for the same idempotency
            key.
    StartLoopRunRequest:
      type: object
      additionalProperties: false
      description: Body for `POST /v1/projects/{project_handle}/loops/{resource_id}/runs`.
        All fields are optional; an empty body starts a run with an empty event/config envelope
        and no attribution.
      properties:
        event:
          type: object
          additionalProperties: true
          description: Exact event object that starts the run. Manual/API starts use this
            object the same way integration, HTTP, and schedule triggers do. Templates reference
            it via `${{ event.<key> }}`.
        meta:
          type: object
          additionalProperties: true
          description: Optional event metadata supplied by the caller. Mobius also adds provenance
            such as run, loop, source, trigger, and source-event ids.
        config:
          type: object
          additionalProperties: true
          description: Optional static or caller-provided configuration for handling the event.
            Templates reference it via `config.*`.
        source:
          $ref: '#/components/schemas/LoopRunSource'
          description: Attribution for the call that starts the run.
        idempotency_key:
          type: string
          description: Caller-supplied idempotency key, scoped to (org, project). Repeat calls
            with the same `idempotency_key` while the prior run is still non-terminal return
            the existing run (same `id`). A repeat after the prior run terminated returns
            `409 Conflict` with code `idempotency_key_conflict` and details containing the
            existing run id and its terminal status.
        budget_usd:
          type: number
          format: double
          minimum: 0
          description: Per-run budget override in US dollars (1 credit = $0.01). Overrides
            the loop spec's `limits` budget for this run only. Mutually exclusive with `credit_budget`
            — setting both is a `400`. Values finer than 0.001 credit ($0.00001) are rejected.
            The run halts at the next checkpoint (step boundary or agent tool iteration) once
            spend reaches the budget; enforcement granularity is one model call or metered
            action.
        credit_budget:
          type: integer
          format: int64
          minimum: 1
          description: Per-run budget override in whole credits (1 credit = $0.01). Same ceiling
            semantics as `budget_usd`; set exactly one.
      example:
        event:
          issue_id: '42'
          repository: deepnoodle-ai/mobius-cloud
        config:
          priority: normal
        source:
          type: api
          id: review-service
          label: review-service
        idempotency_key: review-service:issue-42
        credit_budget: 1000
    CancelLoopRunRequest:
      type: object
      additionalProperties: false
      description: Body for the cancellation endpoint. All fields optional.
      properties:
        reason:
          type: string
          description: Human-readable cancellation reason recorded on the run.
      example:
        reason: superseded by manual remediation
    RecoverLoopRunRequest:
      type: object
      additionalProperties: false
      description: Body for resuming or retrying a failed loop run in place. Limit fields
        are optional unless the prior failure was caused by that guardrail; in that case the
        replacement limit must be greater than the amount already consumed by the run.
      properties:
        reason:
          type: string
          description: Human-readable recovery reason recorded on the run event log.
        budget_usd:
          type: number
          format: double
          minimum: 0
          description: Replacement run budget in US dollars (1 credit = $0.01). Mutually exclusive
            with `credit_budget`; setting both is a `400`.
        credit_budget:
          type: integer
          format: int64
          minimum: 1
          description: Replacement run budget in whole credits (1 credit = $0.01). Must be
            greater than `credit_spent`.
        max_agent_turns:
          type: integer
          minimum: 1
          description: Replacement run-wide agent turn cap. Must be greater than `agent_turns_used`.
        wall_clock_extend_seconds:
          type: integer
          minimum: 1
          description: Additional wall-clock time, in seconds, granted from the recovery request
            time. Required when the run stopped on `wall_clock_exceeded`.
      example:
        reason: transient provider failure cleared
    SignalLoopRunRequest:
      type: object
      additionalProperties: false
      description: Body for resuming a suspended loop step.
      required:
      - step_key
      properties:
        step_key:
          type: string
          description: Step key currently in `suspended` state that should resume. Must match
            a step declared in the run's loop version spec.
        result:
          type: object
          additionalProperties: true
          description: Free-form payload saved as the resumed step's output.
      example:
        step_key: wait_for_external_result
        result:
          status: complete
          source: ci
    LoopRunSource:
      type: object
      additionalProperties: false
      description: Optional attribution for the call that started this run. Triggers and HTTP
        trigger dispatch populate `trigger_id` and `trigger_fire_id`. API callers usually
        only set `type` and `id`.
      properties:
        type:
          type: string
          enum:
          - api
          - trigger
          - manual
          - signal
          description: 'Source category for the run start: `api`, `trigger`, `manual`, or
            `signal`.'
        id:
          type: string
          description: Identifier within the source type's namespace.
        label:
          type: string
          description: Display label.
        trigger_id:
          type: string
          readOnly: true
          description: Trigger that fired this run, if any.
    LoopRun:
      type: object
      additionalProperties: false
      description: One loop run record.
      required:
      - id
      - loop_id
      - loop_version_id
      - loop_version
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable run identifier.
        loop_id:
          type: string
          description: Loop this run belongs to.
        name:
          type: string
          maxLength: 160
          description: Human-readable title for this run.
        description:
          type: string
          maxLength: 320
          description: Optional secondary description for this run.
        loop_name:
          type: string
          description: Human-readable name of the loop this run belongs to.
        loop_version_id:
          type: string
          description: LoopVersion record this run is executing.
        loop_version:
          type: integer
          description: Version number of the LoopVersion this run is executing.
        status:
          $ref: '#/components/schemas/LoopRunStatus'
          description: Current lifecycle state of this run.
        attempt:
          type: integer
          minimum: 1
          description: One-based execution attempt for this run. The original run starts at
            1 and increments each time the run is resumed or retried in place.
        queue_reason:
          $ref: '#/components/schemas/LoopRunQueueReason'
          description: Gate that placed this run in the durable queue. Present only while
            `status` is `queued`.
        plan_concurrency_limit:
          type: integer
          description: Org-wide concurrent-run ceiling stamped at run start. Present when
            the run was evaluated against a plan concurrency limit.
        stop_reason:
          $ref: '#/components/schemas/LoopRunStopReason'
          description: Terminal reason recorded when the run stops.
        credit_budget:
          type: number
          format: double
          description: The run's budget ceiling in credits (1 credit = $0.01), with up to
            3 decimal places. Resolved at run start from the StartRun override, the loop spec's
            `limits` block, or the trial-plan default, in that order. Absent when the run
            is unbounded.
        credit_spent:
          type: number
          format: double
          description: Metered spend attributed to this run so far, in credits (up to 3 decimal
            places). Incremented atomically with each usage-ledger insert that carries this
            run's id. Counts all metered work regardless of credential source (BYOK calls
            count at their rate-card equivalent even though they bill zero credits).
        max_agent_turns:
          type: integer
          description: Run-wide cap on agent turns across all steps, from the loop spec's
            `limits.max_agent_turns`. Absent when unbounded.
        agent_turns_used:
          type: integer
          description: Number of agent turns started for this run so far. Compared against
            `max_agent_turns` when that cap is set.
        event:
          type: object
          additionalProperties: true
          description: Exact safe/canonical event object that started the run, reachable in
            templates at `event.*`.
        meta:
          type: object
          additionalProperties: true
          description: 'Run and trigger metadata envelope, reachable in templates at `${{
            meta.* }}`: `run_id`, `loop_id`, `source`, `trigger`, plus trigger-supplied facts
            such as `event_type`, `source_event_id`, and `scheduled_at`.'
        config:
          type: object
          additionalProperties: true
          description: Optional static or caller-provided configuration resolved when the
            run started, reachable in templates at `config.*`.
        result:
          type: object
          additionalProperties: true
          description: Final result payload. When the loop declares an `output:` block this
            is that block rendered at completion; otherwise it is the run's accumulated step
            outputs, keyed by step id. Absent until the run terminates successfully.
        source:
          $ref: '#/components/schemas/LoopRunSource'
          description: Source that started this run.
        parent_run_id:
          type: string
          description: Run that triggered this run via an `loop` step. Present only on child
            runs; absent for top-level runs.
        parent_loop_id:
          type: string
          description: Loop that triggered this run via an `loop` step. Present only on child
            runs.
        parent_step_key:
          type: string
          description: Step key within the parent run's loop that triggered this run. Present
            only on child runs.
        error_message:
          type: string
          description: Human-readable failure summary; populated on `failed` runs.
        error_type:
          type: string
          description: Machine-readable failure classification when available.
        wake_at:
          type: string
          format: date-time
          description: Scheduled wake time for a suspended run.
        wall_clock_deadline_at:
          type: string
          format: date-time
          description: Deadline after which the loop reaper fails the run.
        started_at:
          type: string
          format: date-time
          description: Time the engine moved the run to `running`.
        completed_at:
          type: string
          format: date-time
          description: Time the run reached a terminal status.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
      example:
        id: run_8q5m2x9v7p3n4r6t
        loop_id: loop_9q2m7x5v3p8n4r6t
        name: 'Review pull request #1268'
        description: deepnoodle-ai/mobius-cloud · Add run descriptions
        loop_name: Daily security check
        loop_version_id: lver_4v9n2q7m5x8p3r6t
        loop_version: 3
        status: running
        credit_budget: 1000
        credit_spent: 12.5
        event:
          repository: deepnoodle-ai/mobius-cloud
        config:
          priority: normal
        source:
          type: api
          id: review-service
          label: review-service
        created_at: '2026-06-15T14:30:00Z'
        updated_at: '2026-06-15T14:31:00Z'
    LoopRunStatus:
      type: string
      enum:
      - queued
      - running
      - suspended
      - completed
      - failed
      - cancelled
      description: 'Run lifecycle state: `queued`, `running`, `suspended`, `completed`, `failed`,
        or `cancelled`.'
    LoopRunQueueReason:
      type: string
      enum:
      - plan_concurrency
      - loop_policy
      - trigger_concurrency
      description: Why a run is waiting in the queue. `plan_concurrency` means the organization's
        current plan has no active-run capacity available. `loop_policy` and `trigger_concurrency`
        mean authored concurrency policy deferred the run.
    LoopRunStopReason:
      type: string
      enum:
      - completed
      - step_failed
      - check_failed
      - gate_rejected
      - cancelled
      - replaced
      - wall_clock_exceeded
      - budget_exceeded
      - turn_limit_reached
      - progress_stalled
      - step_limit_reached
      description: |-
        Why a run stopped. Set exactly once when the run reaches a terminal status; absent on non-terminal runs. `status` carries the lifecycle state and `error_type` classifies the error when one occurred; `stop_reason` classifies the stop itself.

        Grouping: `completed` is the success terminal. `step_failed`, `check_failed`, and `gate_rejected` mean the work failed (an error, a failed verification, or a human rejection at a gate). `budget_exceeded`, `turn_limit_reached`, `wall_clock_exceeded`, `step_limit_reached`, and `progress_stalled` mean a configured guardrail halted the run — the limit worked; the loop did not break. `cancelled` and `replaced` mean somebody (or a concurrency policy) chose to stop it.
    LoopRunListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/LoopRun'
        next_cursor:
          type: string
          description: Opaque cursor for the next page; absent when no more results.
        has_more:
          type: boolean
          description: True when more items exist after this page.
      example:
        items:
        - id: run_8q5m2x9v7p3n4r6t
          loop_id: loop_9q2m7x5v3p8n4r6t
          loop_version_id: lver_4v9n2q7m5x8p3r6t
          loop_version: 3
          status: running
          created_at: '2026-06-15T14:30:00Z'
          updated_at: '2026-06-15T14:31:00Z'
        has_more: false
    LoopRunStepListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Steps for this run in `seq` order.
          items:
            $ref: '#/components/schemas/LoopRunStep'
    LoopRunLifecycleFrame:
      allOf:
      - $ref: '#/components/schemas/LoopRunEvent'
      description: 'Durable run lifecycle frame. SSE messages carrying this shape include
        `id: <sequence>`, and that value is the only cursor clients should persist for `after_sequence`
        or `Last-Event-ID` resume.'
    LoopRunStreamFrame:
      allOf:
      - $ref: '#/components/schemas/LoopRunLifecycleFrame'
      description: JSON payload of a single `data:` line on the run event SSE stream. Run
        stream frames are lifecycle/observability events and are replayable with an SSE `id:`.
        Agent transcript content is delivered by the referenced session stream.
    LoopRunEventListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Run events in this page, ordered by `sequence` ascending.
          items:
            $ref: '#/components/schemas/LoopRunEvent'
        next_sequence:
          type: integer
          format: int64
          description: Sequence number of the most recent event in `items`; clients can pass
            this back as `after_sequence` on the next poll.
        has_more:
          type: boolean
          description: True when more events exist after the returned page.
    ToolkitRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          description: Human-readable toolkit name.
        description:
          type: string
          maxLength: 1000
          description: Markdown description of the toolkit's purpose.
        actions:
          type: array
          description: Action selectors provided by this toolkit.
          items:
            $ref: '#/components/schemas/ToolkitAction'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Labels to apply to the toolkit.
      example:
        name: GitHub review
        description: GitHub actions needed for pull-request review.
        actions:
        - selector_type: exact
          selector: github.create_review_comment
        tags:
          owner: product
    ToolkitListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Toolkit'
    SkillRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - instructions
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          description: Human-readable skill name.
        description:
          type: string
          maxLength: 1000
          description: Markdown description of the skill's purpose.
        instructions:
          type: string
          minLength: 1
          description: Markdown instructions loaded when the skill is active.
        allowed_tools:
          type: array
          default: []
          description: Tool selectors that narrow the agent's effective tool set while this
            skill is active.
          items:
            type: string
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Labels to apply to the skill.
      example:
        name: Pull request review
        description: Review pull requests for correctness and risk.
        instructions: Check the diff and leave concise findings.
        allowed_tools:
        - github.create_review_comment
        tags:
          owner: product
    ImportSkillRequest:
      type: object
      additionalProperties: false
      required:
      - content
      properties:
        content:
          type: string
          description: Full skill document, optionally with YAML frontmatter.
        name:
          type: string
          description: Optional name override.
    SkillListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Skill'
    BlueprintApplyMode:
      type: string
      description: '`apply` performs the change; `preview` validates and returns a plan without
        mutating resources.'
      enum:
      - preview
      - apply
    BlueprintResourceType:
      type: string
      description: The kind of Mobius resource a binding or change refers to.
      enum:
      - action
      - toolkit
      - skill
      - agent
      - loop
      - table
    BlueprintChangeAction:
      type: string
      description: 'What apply did (or, in preview, would do): `created` a new resource, `updated`
        a managed one, `adopted` a matching unmanaged one, or left an `unchanged` resource
        untouched.'
      enum:
      - created
      - updated
      - adopted
      - unchanged
    BlueprintResourceRef:
      type: object
      additionalProperties: false
      description: A reference to a Mobius resource by direct `id`, by blueprint `key` (resolved
        within this apply first, then against existing bindings), or by `blueprint_ref` (resolved
        by key; its namespace is recorded as provenance and is not used for reference resolution
        in this version).
      properties:
        id:
          type: string
          description: Direct resource id.
        key:
          type: string
          description: Blueprint-defined resource key.
        blueprint_ref:
          $ref: '#/components/schemas/BlueprintRef'
    BlueprintRef:
      type: object
      additionalProperties: false
      description: A namespaced blueprint key reference.
      required:
      - key
      properties:
        namespace:
          type: string
        key:
          type: string
    ApplyBlueprintRequest:
      type: object
      additionalProperties: false
      description: A desired blueprint plus the apply mode.
      required:
      - resources
      properties:
        namespace:
          type: string
          description: Optional namespace that forms part of the blueprint identity.
        blueprint_key:
          type: string
          description: Optional blueprint identifier that forms part of the blueprint identity.
        blueprint_version:
          type: string
          description: Optional blueprint version recorded as provenance.
        protect_resources:
          type: boolean
          description: When set, controls whether ordinary update and delete operations may
            change resources managed by this blueprint. Blueprint Apply and blueprint deletion
            remain allowed. Omit to preserve protection on existing bindings; new bindings
            default to unprotected.
        mode:
          $ref: '#/components/schemas/BlueprintApplyMode'
        resources:
          $ref: '#/components/schemas/BlueprintResources'
    BlueprintResources:
      type: object
      additionalProperties: false
      description: The desired resources grouped by type. All groups are optional.
      properties:
        actions:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintActionInput'
        toolkits:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintToolkitInput'
        skills:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintSkillInput'
        agents:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintAgentInput'
        loops:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintLoopInput'
        tables:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintTableInput'
    BlueprintActionInput:
      type: object
      additionalProperties: false
      description: A desired action. `name` is its immutable project-unique identity.
      required:
      - key
      - name
      properties:
        key:
          type: string
          description: Blueprint-defined handle other resources use to reference it.
        name:
          type: string
        type:
          type: string
          description: Endpoint kind. Defaults to `http`. Immutable after create.
          enum:
          - http
          - worker
        endpoint:
          type: string
          description: Endpoint URL for http actions.
        title:
          type: string
        description:
          type: string
        input_schema:
          type: object
          additionalProperties: true
        output_schema:
          type: object
          additionalProperties: true
        annotations:
          $ref: '#/components/schemas/BlueprintActionAnnotations'
        tags:
          $ref: '#/components/schemas/TagMap'
    BlueprintActionAnnotations:
      type: object
      additionalProperties: false
      description: Behavioral annotations describing how an action may be used.
      properties:
        idempotent:
          type: boolean
        destructive:
          type: boolean
        read_only:
          type: boolean
        long_running:
          type: boolean
    BlueprintToolkitInput:
      type: object
      additionalProperties: false
      description: A desired toolkit. Resolved only through its binding (toolkits have no
        unique name).
      required:
      - key
      - name
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        actions:
          type: array
          description: Actions granted into the toolkit by canonical selector or legacy exact
            action name.
          items:
            $ref: '#/components/schemas/BlueprintToolkitActionGrant'
        tags:
          $ref: '#/components/schemas/TagMap'
        metadata:
          type: object
          additionalProperties: true
    BlueprintToolkitActionGrant:
      type: object
      additionalProperties: false
      description: Grants actions into a toolkit using the canonical Toolkit selector vocabulary.
        Supply `selector`; `selector_type` defaults to `exact`. `action_name` is a backwards-compatible
        alias for an exact selector and cannot be combined with `selector`.
      properties:
        selector_type:
          type: string
          enum:
          - exact
          - group
          - platform
          - custom
          - wildcard
          default: exact
          description: Selector type used to resolve matching actions.
        selector:
          type: string
          description: Canonical selector value, such as `github.*` or `*`.
        action_name:
          type: string
          deprecated: true
          description: Legacy alias for an exact action-name selector.
    BlueprintSkillInput:
      type: object
      additionalProperties: false
      description: A desired skill.
      required:
      - key
      - name
      properties:
        key:
          type: string
        name:
          type: string
        title:
          type: string
        description:
          type: string
        instructions:
          type: string
        allowed_tools:
          type: array
          description: Tool selectors that narrow the agent's effective tool set while this
            skill is active.
          items:
            type: string
        tags:
          $ref: '#/components/schemas/TagMap'
    BlueprintAgentInput:
      type: object
      additionalProperties: false
      description: A desired agent. `toolkits` and `skills`, when present, replace the agent's
        full assignment set; omit them to leave existing assignments untouched.
      required:
      - key
      - name
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        model:
          type: string
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Default route for model calls made by this agent.
        tool_presentation:
          $ref: '#/components/schemas/AgentToolPresentation'
          description: How granted actions are presented to the model.
        system_prompt:
          type: string
        timeout_seconds:
          type: integer
          format: int64
          minimum: 0
          description: Per-turn execution timeout; `0` uses the platform default.
        status:
          $ref: '#/components/schemas/AgentStatus'
          description: Desired agent lifecycle status.
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Default session-compaction policy inherited by new sessions.
        thinking_effort:
          $ref: '#/components/schemas/ThinkingEffort'
          description: Default reasoning-effort level for sessions and Loop agent steps.
        kind:
          type: string
        color:
          type: string
        toolkits:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintResourceRef'
        skills:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintResourceRef'
        tags:
          $ref: '#/components/schemas/TagMap'
    BlueprintLoopInput:
      type: object
      additionalProperties: false
      description: A desired loop. The spec-bearing fields (`steps`, `triggers`, `event`,
        `config`, `limits`, `output`, `concurrency`, `repositories`, `cleanup`, `defaults`,
        `run_name`) mirror the loop authoring shape and are compiled by the loop engine. Applied
        loops default to `draft` unless `status` is set. `default_config`, `settings`, and
        `tags` configure Loop row state.
      required:
      - key
      - name
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        agent:
          $ref: '#/components/schemas/BlueprintResourceRef'
        status:
          type: string
          enum:
          - draft
          - active
          - paused
        schema_version:
          type: string
          enum:
          - '1'
          default: '1'
          description: Loop authoring schema version. Only version 1 is accepted.
        steps:
          type: array
          items:
            type: object
            additionalProperties: true
        triggers:
          type: array
          items:
            type: object
            additionalProperties: true
        event:
          type: object
          description: Declared event input contract for the run (maps to the loop spec `event`).
          additionalProperties: true
        config:
          type: object
          additionalProperties: true
        limits:
          type: object
          additionalProperties: true
        output:
          type: object
          additionalProperties: true
        concurrency:
          type: string
        repositories:
          type: array
          items:
            type: object
            additionalProperties: true
        cleanup:
          type: array
          description: Cleanup steps run at the end of the run (maps to the loop spec `cleanup`).
          items:
            type: object
            additionalProperties: true
        defaults:
          type: object
          additionalProperties: true
        run_name:
          $ref: '#/components/schemas/RunNameSpec'
          description: Templates for the operator-facing title and description of each run.
        default_config:
          type: object
          additionalProperties: true
          description: Default config values used when a run starts without overrides.
        settings:
          type: object
          additionalProperties: true
          description: Free-form Loop-level settings consumed by the engine.
        tags:
          $ref: '#/components/schemas/TagMap'
    BlueprintTableInput:
      type: object
      additionalProperties: false
      description: A desired table. `key` is its stable Blueprint handle; `name` is project-unique
        (lower snake_case) and may be changed after binding. `schema` carries the full column
        and identity definition and is validated on apply. The identity column and the required-ness
        of existing columns are immutable after create, so a re-apply that changes them is
        rejected.
      required:
      - key
      - name
      - schema
      properties:
        key:
          type: string
          description: Blueprint-defined handle other resources use to reference it.
        name:
          type: string
        description:
          type: string
        instructions:
          type: string
          description: Optional author guidance for how this table should be used (e.g. surfaced
            to agents).
        schema:
          $ref: '#/components/schemas/TableSchema'
    BlueprintApplyResult:
      type: object
      additionalProperties: false
      description: The outcome of an apply or preview.
      required:
      - status
      - changes
      - bindings
      properties:
        status:
          type: string
          description: '`applied` for a mutating apply, `previewed` for a preview.'
          enum:
          - applied
          - previewed
        namespace:
          type: string
        blueprint_key:
          type: string
        blueprint_version:
          type: string
        changes:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintChange'
        bindings:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintBinding'
    BlueprintChange:
      type: object
      additionalProperties: false
      required:
      - resource_type
      - key
      - action
      properties:
        resource_type:
          $ref: '#/components/schemas/BlueprintResourceType'
        key:
          type: string
        action:
          $ref: '#/components/schemas/BlueprintChangeAction'
        resource_id:
          type: string
          description: The provisioned resource id. Empty for would-create entries in a preview.
    BlueprintBinding:
      type: object
      additionalProperties: false
      required:
      - resource_type
      - key
      - resource_id
      - protected
      - delete_on_destroy
      properties:
        resource_type:
          $ref: '#/components/schemas/BlueprintResourceType'
        key:
          type: string
        resource_id:
          type: string
        namespace:
          type: string
        blueprint_key:
          type: string
        blueprint_version:
          type: string
        protected:
          type: boolean
          description: Whether ordinary definition mutations are blocked.
        delete_on_destroy:
          type: boolean
          description: Whether deleting the blueprint will delete this resource instead of
            retaining it.
    BlueprintBindingListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintBinding'
    SetBlueprintProtectionRequest:
      type: object
      additionalProperties: false
      required:
      - protected
      properties:
        protected:
          type: boolean
    BlueprintDeleteResult:
      type: object
      additionalProperties: false
      required:
      - status
      - blueprint_key
      - deleted
      - retained
      properties:
        status:
          type: string
          enum:
          - deleted
        namespace:
          type: string
        blueprint_key:
          type: string
        deleted:
          type: array
          description: Resources deleted with the blueprint.
          items:
            $ref: '#/components/schemas/BlueprintBinding'
        retained:
          type: array
          description: Adopted or legacy resources retained after their bindings were removed.
          items:
            $ref: '#/components/schemas/BlueprintBinding'
    ColumnType:
      type: string
      enum:
      - string
      - number
      - boolean
      - date
      - object
      - array
      - any
      description: 'Column value type: `string`, `number`, `boolean`, `date`, `object`, `array`,
        or `any`.'
    ColumnDef:
      type: object
      additionalProperties: false
      required:
      - name
      - type
      description: One typed column in a table schema.
      properties:
        name:
          type: string
          description: Column name used as the key inside row `data`.
        type:
          $ref: '#/components/schemas/ColumnType'
          description: JSON-compatible value type accepted for this column.
        required:
          type: boolean
          default: false
          description: Whether inserts must include a non-null value for this column.
        indexed:
          type: boolean
          default: false
          deprecated: true
          description: Compatibility hint retained for older schemas. It does not create a
            physical database index.
        default:
          description: Default value applied when column is absent on insert
        description:
          type: string
          description: Human-readable explanation of the column's purpose.
        deprecated:
          type: boolean
          default: false
          description: Whether authors should avoid using this column in new rows.
    IndexDef:
      type: object
      additionalProperties: false
      required:
      - name
      - columns
      description: Compatibility metadata for older table schemas. Declared indexes do not
        create physical database indexes.
      properties:
        name:
          type: string
          description: Stable index name unique within the table schema.
        columns:
          type: array
          description: Column names included in the index, in order.
          items:
            type: string
    TableSchema:
      type: object
      required:
      - columns
      - identity_column
      additionalProperties: false
      description: Column definition for a virtual table. Each table has exactly one required
        string identity column and may nominate one optional string secondary key column.
      properties:
        identity_column:
          type: string
          minLength: 1
          description: Name of the required string column that uniquely identifies one row
            in this table.
        secondary_key_column:
          type: string
          description: Optional string column optimized for secondary lookups. It cannot be
            changed after creation.
        columns:
          type: array
          description: Ordered list of columns accepted in row data.
          items:
            $ref: '#/components/schemas/ColumnDef'
          minItems: 1
          maxItems: 200
        indexes:
          type: array
          deprecated: true
          description: Compatibility metadata retained for older schemas. Index declarations
            do not create physical database indexes.
          items:
            $ref: '#/components/schemas/IndexDef'
          maxItems: 20
        open:
          type: boolean
          default: false
          description: Allows rows to include undeclared keys while declared columns continue
            to be validated.
    PrincipalKind:
      type: string
      enum:
      - service
      - agent
      - system
      description: Machine principal kind. `service` is the standalone user-facing API client
        identity. `agent` and `system` are internal backing identities for agent execution
        and platform-internal work. (Human principals are managed as organization members,
        not on this surface.)
    PrincipalState:
      type: string
      enum:
      - active
      - disabled
      - deleted
      description: Canonical business-lifecycle state. `active` allows authentication and
        job claims; `disabled` is a reversible kill switch that blocks them but preserves
        the record and its assignments; `deleted` is the retained archived state used for
        audit, attribution, and history.
    Principal:
      type: object
      additionalProperties: false
      description: Non-human identity used by loop, agents, and API keys. A principal makes
        ownership, permissions, and credential rotation explicit without tying machine access
        to a human user. The `id` is the principal id used as the `owned_by` value when filtering
        or claiming resources.
      required:
      - id
      - kind
      - state
      - name
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this principal.
        kind:
          $ref: '#/components/schemas/PrincipalKind'
          description: Machine kind of this principal.
        state:
          $ref: '#/components/schemas/PrincipalState'
          description: 'Current lifecycle state: `active`, `disabled`, or retained `deleted`.'
        name:
          type: string
          description: Human-readable name for this principal. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        handle:
          type: string
          description: Typed, human-readable stable reference for this machine principal (`svc:acme-ci`,
            `agent:harry`, `system`). Replaces the synthetic email for non-humans (PRD 2026-06-04
            FR-3).
        owner_id:
          type: string
          description: Optional human principal accountable for this machine principal.
        role_ids:
          type: array
          items:
            type: string
          uniqueItems: true
          description: Role IDs currently assigned to this principal in the project.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key-value metadata. Subject to size and nesting depth limits.
        tags:
          $ref: '#/components/schemas/TagMap'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this principal was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this principal was last updated.
    PrincipalListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Principal'
    CreatePrincipalRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable name for this principal. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        owner_id:
          type: string
          description: Human principal accountable for this service principal.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary metadata to attach to the principal.
        role_ids:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: One or more role IDs to assign at creation time. All assignments are
            created atomically with the principal. Requires `mobius.project.admin`. Each role
            must belong to this project or be system-defined.
        tags:
          $ref: '#/components/schemas/TagMap'
    UpdatePrincipalRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          description: Replacement description.
        state:
          $ref: '#/components/schemas/PrincipalState'
          description: 'Replacement lifecycle state: `active` or `disabled`.'
        owner_id:
          type: string
          description: Human principal accountable for this principal.
        metadata:
          type: object
          additionalProperties: true
          description: Replacement metadata.
        role_ids:
          type: array
          items:
            type: string
          uniqueItems: true
          description: Replacement role IDs for this principal in the project. Send an empty
            array to remove all project role assignments. Requires `mobius.project.admin`.
        tags:
          $ref: '#/components/schemas/TagMap'
    Table:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - schema
      - created_at
      - updated_at
      description: Project table metadata and schema.
      properties:
        id:
          type: string
          description: Unique table identifier.
        name:
          type: string
          pattern: ^[a-z][a-z0-9_]*$
          maxLength: 64
          description: Lowercase snake_case table name, unique within the project.
        description:
          type: string
          description: Human-readable table description.
        instructions:
          type: string
          description: Optional author guidance for how this table should be used (e.g. surfaced
            to agents).
        schema:
          allOf:
          - $ref: '#/components/schemas/TableSchema'
          description: Column and index schema enforced for table rows.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Free-form labels used for filtering, ownership, or automation.
        created_by:
          type: string
          description: User ID of the principal who created this table.
        updated_by:
          type: string
          description: User ID of the principal who last updated this table.
        created_at:
          type: string
          format: date-time
          description: Time the table was created.
        updated_at:
          type: string
          format: date-time
          description: Time the table metadata or schema was last updated.
      example:
        id: table_2x7q5m9v3p8r4n6t
        name: review_findings
        description: Pull-request review findings.
        schema:
          columns:
          - name: pull_request_url
            type: string
            required: true
          - name: severity
            type: string
          - name: summary
            type: string
          identity_column: pull_request_url
        tags:
          team: product
        created_by: user_2f9s3k4m5n6p7q8r
        updated_by: user_2f9s3k4m5n6p7q8r
        created_at: '2026-06-15T14:30:00Z'
        updated_at: '2026-06-15T14:30:00Z'
    TableListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      description: Cursor-paginated list of tables.
      properties:
        items:
          type: array
          description: Tables in the current page.
          items:
            $ref: '#/components/schemas/Table'
        has_more:
          type: boolean
          description: Whether another page is available.
        next_cursor:
          type: string
          description: Cursor to pass on the next request when `has_more` is true.
      example:
        items:
        - id: table_2x7q5m9v3p8r4n6t
          name: review_findings
          schema:
            columns:
            - name: pull_request_url
              type: string
              required: true
            identity_column: pull_request_url
          created_at: '2026-06-15T14:30:00Z'
          updated_at: '2026-06-15T14:30:00Z'
        has_more: false
    TableStats:
      type: object
      description: Point-in-time storage and indexing statistics for one table.
      required:
      - table_id
      - row_count
      - approx_data_bytes
      - approx_index_bytes
      - indexed_column_count
      - declared_index_count
      - search_index_present
      - generated_at
      additionalProperties: false
      properties:
        table_id:
          type: string
          description: Table these statistics describe.
        row_count:
          type: integer
          format: int64
          description: Approximate number of rows in the table.
        approx_data_bytes:
          type: integer
          format: int64
          description: Approximate bytes used by table data.
        approx_index_bytes:
          type: integer
          format: int64
          description: Approximate bytes used by secondary lookup indexes.
        indexed_column_count:
          type: integer
          description: Number of schema columns optimized for secondary lookup.
        declared_index_count:
          type: integer
          description: Number of compatibility index declarations stored in the table schema.
        search_index_present:
          type: boolean
          description: Whether the fixed shared full-text search index is present.
        generated_at:
          type: string
          format: date-time
          description: Time this statistics snapshot was generated.
        oldest_row_created_at:
          type: string
          format: date-time
          description: Creation time of the oldest row, when the table has rows.
        newest_row_updated_at:
          type: string
          format: date-time
          description: Update time of the newest changed row, when the table has rows.
    CreateTableRequest:
      type: object
      required:
      - name
      - schema
      additionalProperties: false
      properties:
        name:
          type: string
          pattern: ^[a-z][a-z0-9_]*$
          maxLength: 64
          description: Table name (lowercase, snake_case); unique within the project.
        description:
          type: string
          maxLength: 1000
          description: Optional human-readable description of the table.
        instructions:
          type: string
          maxLength: 2000
          description: Optional author guidance for how this table should be used (e.g. surfaced
            to agents).
        schema:
          $ref: '#/components/schemas/TableSchema'
          description: Column and index definition for the new table.
      example:
        name: review_findings
        description: Pull-request review findings.
        schema:
          columns:
          - name: pull_request_url
            type: string
            required: true
          - name: severity
            type: string
          - name: summary
            type: string
          identity_column: pull_request_url
    UpdateTableRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          pattern: ^[a-z][a-z0-9_]*$
          maxLength: 64
          description: Table name (lowercase, snake_case); unique within the project.
        description:
          type: string
          maxLength: 1000
          description: Optional human-readable description of the table.
        instructions:
          type: string
          maxLength: 2000
          description: Optional author guidance for how this table should be used (e.g. surfaced
            to agents).
        schema:
          $ref: '#/components/schemas/TableSchema'
          description: Replacement column and index definition. The identity column and required
            column settings are immutable after creation; newly added columns must be optional.
    TableRow:
      type: object
      additionalProperties: false
      required:
      - id
      - table_id
      - data
      - version
      - created_at
      - updated_at
      description: One stored row in a project table.
      properties:
        id:
          type: string
          description: Unique row identifier.
        table_id:
          type: string
          description: Table this row belongs to.
        data:
          type: object
          additionalProperties: true
          description: JSON object keyed by table column name.
        version:
          type: integer
          description: Optimistic-lock version incremented on each update.
        created_at:
          type: string
          format: date-time
          description: Time the row was inserted.
        updated_at:
          type: string
          format: date-time
          description: Time the row was last updated.
      example:
        id: row_5p9x2q7m4n8v3r6t
        table_id: table_2x7q5m9v3p8r4n6t
        data:
          pull_request_url: https://github.com/deepnoodle-ai/mobius-cloud/pull/123
          severity: medium
          summary: Add a regression test for the error path.
        version: 1
        created_at: '2026-06-15T14:30:00Z'
        updated_at: '2026-06-15T14:30:00Z'
    InsertRowRequest:
      type: object
      required:
      - data
      additionalProperties: false
      properties:
        data:
          type: object
          additionalProperties: true
          description: JSON object keyed by table column name.
      example:
        data:
          pull_request_url: https://github.com/deepnoodle-ai/mobius-cloud/pull/123
          severity: medium
          summary: Add a regression test for the error path.
    UpdateRowRequest:
      type: object
      required:
      - data
      additionalProperties: false
      properties:
        data:
          type: object
          additionalProperties: true
          description: Fields to merge into the existing row, keyed by table column name.
        version:
          type: integer
          minimum: 0
          description: Expected version for optimistic locking. Omit or 0 to skip the check.
    QueryRowsRequest:
      type: object
      additionalProperties: false
      properties:
        filter:
          type: object
          additionalProperties: true
          description: Column equality or operator filter
        sort:
          type: array
          maxItems: 10
          description: Sort clauses applied after filtering.
          items:
            type: object
            required:
            - field
            additionalProperties: false
            properties:
              field:
                type: string
                description: Column name to sort by.
              order:
                type: string
                enum:
                - asc
                - desc
                default: asc
                description: 'Sort direction for this field: `asc` or `desc`.'
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          description: Maximum number of rows to return (1–100, default 20).
        cursor:
          type: string
          description: Opaque cursor from a prior response.
    TableRowQueryListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      description: Cursor-paginated table row query result.
      properties:
        items:
          type: array
          description: Rows in the current page.
          items:
            $ref: '#/components/schemas/TableRow'
        has_more:
          type: boolean
          description: Whether another result page is available.
        limit:
          type: integer
          description: Page size used for this response.
        next_cursor:
          type: string
          description: Cursor to pass on the next query when `has_more` is true.
    SearchRowsRequest:
      type: object
      required:
      - query
      additionalProperties: false
      properties:
        query:
          type: string
          minLength: 1
          description: Search query. Hyphens and other punctuation split terms for keyword
            matching.
        mode:
          type: string
          enum:
          - keyword
          - semantic
          - hybrid
          default: keyword
          description: Search mode. `keyword` uses token-prefix matching, `semantic` uses
            similarity over indexed row text, and `hybrid` combines both.
        filter:
          type: object
          additionalProperties: true
          description: Optional column equality or operator filter applied before search.
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          description: Maximum number of rows to return (1–100, default 20).
        cursor:
          type: string
          description: Opaque cursor from a prior search response.
    TableRowSearchListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      description: Cursor-paginated table row search result.
      properties:
        items:
          type: array
          description: Rows matching the search query and filters.
          items:
            $ref: '#/components/schemas/TableRow'
        has_more:
          type: boolean
          description: Whether another result page is available.
        limit:
          type: integer
          description: Page size used for this response.
        next_cursor:
          type: string
          description: Cursor to pass on the next search when `has_more` is true.
    BulkInsertRowsRequest:
      type: object
      required:
      - rows
      additionalProperties: false
      properties:
        rows:
          type: array
          description: Row data objects to validate and insert.
          minItems: 1
          maxItems: 1000
          items:
            type: object
            additionalProperties: true
    BulkInsertRowsResult:
      type: object
      additionalProperties: false
      required:
      - inserted
      - items
      description: Result of a successful bulk row insert.
      properties:
        inserted:
          type: integer
          description: Number of rows inserted.
        items:
          type: array
          description: Inserted rows in request order.
          items:
            $ref: '#/components/schemas/TableRow'
    UpsertRowRequest:
      type: object
      required:
      - data
      additionalProperties: false
      properties:
        data:
          type: object
          additionalProperties: true
          description: Fields to create or merge into the row. Must include the table's identity
            column.
    UpsertRowResult:
      type: object
      additionalProperties: false
      description: Result of inserting or updating a row by the table's identity column.
      required:
      - row
      - created
      properties:
        row:
          $ref: '#/components/schemas/TableRow'
          description: Row after insert or update.
        created:
          type: boolean
          description: True when a new row was inserted; false when an existing row was updated.
    ArtifactVisibility:
      type: string
      enum:
      - private
      - shared
      description: Private artifacts are visible only to their owner user. Shared artifacts
        are visible to the project.
    Artifact:
      type: object
      description: Stored file or generated artifact metadata.
      required:
      - id
      - visibility
      - name
      - mime_type
      - size_bytes
      - created_at
      additionalProperties: false
      properties:
        id:
          type: string
          description: Unique artifact identifier.
        visibility:
          $ref: '#/components/schemas/ArtifactVisibility'
          description: Visibility policy for the artifact.
        run_id:
          type: string
          description: Loop run that produced this artifact, derived from the active worker
            lease.
        step_id:
          type: string
          description: Loop step that produced this artifact, derived from the active worker
            lease.
        name:
          type: string
          description: Display name or relative virtual path. Forward slash may be used to
            organize artifacts inside private or shared project space.
        mime_type:
          type: string
          description: MIME type recorded for the artifact content.
        size_bytes:
          type: integer
          format: int64
          description: Artifact content size in bytes.
        sha256:
          type: string
          description: SHA-256 digest of the artifact content, when available.
        created_at:
          type: string
          format: date-time
          description: Time the artifact metadata was created.
        created_by:
          type: string
          description: Principal ID of the actor who created this artifact. Empty for system-initiated
            writes.
        updated_at:
          type: string
          format: date-time
          description: Time the artifact metadata was last updated.
        updated_by:
          type: string
          description: Principal ID of the actor who last updated this artifact. Empty for
            system-initiated writes.
      example:
        id: art_2m7q9x5v3p8n4r6t
        visibility: shared
        run_id: run_8q5m2x9v7p3n4r6t
        step_id: run_8q5m2x9v7p3n4r6t:review
        name: reports/review-findings.md
        mime_type: text/markdown
        size_bytes: 1842
        sha256: 8f4c2b9d0e6a1f3c5b7d9e0a2c4f6b8d9e1a3c5f7b9d0e2a4c6f8b0d2e4a6c8
        created_at: '2026-06-15T14:30:00Z'
        created_by: agent_5n8p2q7m4x9r3v6t
    ArtifactListResponse:
      type: object
      required:
      - items
      - has_more
      additionalProperties: false
      properties:
        items:
          type: array
          description: Artifacts in the current page.
          items:
            $ref: '#/components/schemas/Artifact'
        has_more:
          type: boolean
          description: Whether another page is available.
        next_cursor:
          type: string
          description: Cursor to pass on the next request when `has_more` is true.
      example:
        items:
        - id: art_2m7q9x5v3p8n4r6t
          visibility: shared
          name: reports/review-findings.md
          mime_type: text/markdown
          size_bytes: 1842
          created_at: '2026-06-15T14:30:00Z'
        has_more: false
    ArtifactSignedUrl:
      type: object
      description: Short-lived URL for downloading artifact content.
      required:
      - url
      - method
      - expires_at
      additionalProperties: false
      properties:
        url:
          type: string
          description: Signed URL to call before `expires_at`.
        method:
          type: string
          enum:
          - GET
          description: HTTP method to use with `url`; currently `GET`.
        expires_at:
          type: string
          format: date-time
          description: Time when the signed URL expires.
    ArtifactQuotaUsage:
      type: object
      description: Current artifact storage usage and quota snapshot.
      required:
      - used_bytes
      - limit_bytes
      - artifact_count
      - pending_count
      - generated_at
      additionalProperties: false
      properties:
        used_bytes:
          type: integer
          format: int64
          description: Bytes currently counted toward the artifact quota.
        limit_bytes:
          type: integer
          format: int64
          description: Maximum bytes allowed for artifacts.
        artifact_count:
          type: integer
          format: int64
          description: Number of artifacts currently counted.
        pending_count:
          type: integer
          format: int64
          description: Number of artifacts waiting for content upload.
        generated_at:
          type: string
          format: date-time
          description: Time this quota snapshot was generated.
