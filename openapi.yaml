          type: string
          description: Freeform agent classification for tooling and filtering (e.g. "llm",
            "rpa").
        color:
          type: string
          description: Display color for this agent in UI surfaces. One of the Mantine color
            palette keys (e.g. `indigo`, `teal`, `grape`); empty string falls back to a hash-derived
            color.
          maxLength: 24
        model:
          type: string
          description: Model identifier for platform agents. Accepts any id returned by `GET
            /v1/projects/{project_handle}/catalog/models`, optionally `provider/`-prefixed
            (e.g. `xai/grok-4`); bare known ids (e.g. `claude-sonnet-4-6`) are auto-detected
            to their provider. Empty string falls back to the platform default.
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Default route for model calls made by this agent.
        tool_presentation:
          $ref: '#/components/schemas/AgentToolPresentation'
          description: Default tool presentation used by loop agent steps and built-in channel-message
            replies for this agent.
        system_prompt:
          type: string
          description: Custom system prompt for platform agents. Empty string uses the generated
            default based on the agent name.
        status:
          $ref: '#/components/schemas/AgentStatus'
          description: 'Current agent status: `active` or `inactive`.'
        email_address:
          type: string
          description: Inbox address provisioned via POST /v1/projects/{project_handle}/agents/{resource_id}/inbox
            (opt-in; not created automatically at agent creation). The field is populated
            only after a successful provisioning call. Use this address to add the agent as
