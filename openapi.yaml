            text/event-stream:
              schema:
                type: string
                description: Anthropic-format server-sent events.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '502':
          $ref: '#/components/responses/ProviderError'
