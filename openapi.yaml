          description: Optional name override.
    SkillListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Skill'
    SkillAssignment:
      type: object
      additionalProperties: false
      required:
      - agent_id
