    InteractionMode:
      type: string
      enum:
      - confirm
      - select
      - multi_select
      - input
      description: Declarative UI/input primitive for collecting the response. This is a portable
        rendering contract, not executable code. Values are `confirm`, `select`, `multi_select`,
        and `input`.
    InteractionOption:
      type: object
      required:
      - value
      - label
      additionalProperties: false
      description: Selectable option for `select` and `multi_select` modes.
      properties:
        value:
          type: string
          description: Machine-readable value submitted when this option is chosen.
        label:
          type: string
          description: Human-readable label displayed for this option.
        description:
          type: string
          description: Optional additional context shown beneath the label.
    InteractionSpec:
      type: object
      required:
      - mode
      additionalProperties: false
      description: |-
        Declarative dialog contract for rendering and validating an interaction. Used at both authoring time (inside a loop definition) and runtime (persisted on an interaction). Protocol kind is decoupled from input shape: each kind declares which spec modes are *allowed*, not which is *implied*. An approval may now legitimately use `select` mode (approve/deny/defer), for example.

        Allowed combinations:
        * `request_approval` → `confirm`, `select`
        * `request_review` → `select`, `input`
        * `request_information` → `select`, `multi_select`, `input`
      properties:
        mode:
          $ref: '#/components/schemas/InteractionMode'
          description: UI/input mode used to render and validate the response.
        options:
          type: array
          maxItems: 100
          description: Required for `select` and `multi_select` modes.
          items:
            $ref: '#/components/schemas/InteractionOption'
        default_value:
          type: string
          description: Default selected option for `select` mode.
        default_values:
          type: array
          maxItems: 100
          description: Default selected options for `multi_select` mode.
          items:
            type: string
        default_text:
          type: string
          description: Initial text value for `input` mode.
        default_confirmed:
          type: boolean
          description: Initial yes/no value for `confirm` mode.
        placeholder:
          type: string
          description: Hint text shown for `input` mode.
        multiline:
          type: boolean
          description: When true, render `input` mode as a multiline text area.
    InteractionKind:
      type: string
      enum:
      - request_information
      - request_approval
      - request_review
      description: |-
        Protocol kind of the interaction. Launch keeps this intentionally
        small:
        * `request_information` — a data-collection protocol with structured
        or free-form input
        * `request_approval` — a decision protocol (yes/no, optionally
        yes/no/defer)
        * `request_review` — a judgment protocol that evaluates supplied
        material
    InteractionValue:
      description: Free-form JSON payload. Used both for responder-supplied values and for
        policy-derived values (e.g. `Interaction.outcome`, `ResolutionPolicy.proposal`); each
        consumer documents which.
      anyOf:
      - type: object
        nullable: true
        description: Null when no interaction value has been supplied yet.
        additionalProperties: true
      - type: array
        items: {}
      - type: string
      - type: number
      - type: boolean
    InteractionResponder:
      type: object
      required:
      - user_id
      additionalProperties: false
      description: Identifies the principal who answered an interaction. Agents answer through
        their agent principal ID.
      properties:
        user_id:
          type: string
          description: Responder user ID.
    InteractionReference:
      type: object
      additionalProperties: false
      required:
      - kind
      description: Pointer to the work item, artifact, external ticket, or Mobius entity this
        interaction is about.
      properties:
        kind:
          type: string
          enum:
          - external_url
          - mobius_entity
        url:
          type: string
          format: uri
          description: Required when kind is `external_url`.
        entity_type:
          type: string
          description: Required when kind is `mobius_entity`.
        entity_id:
          type: string
          description: Required when kind is `mobius_entity`.
        relation:
          type: string
          description: Relationship such as `subject`, `evidence`, or `related`.
        label:
          type: string
          description: User-facing label for display.
    Delivery:
      type: object
      additionalProperties: false
      required:
      - channels
      description: Optional per-interaction delivery override. When absent, each participant
        is notified via the app inbox only.
      properties:
        channels:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DeliveryChannel'
    DeliveryChannel:
      type: object
      additionalProperties: false
      required:
      - kind
      description: A single delivery destination. `inbox_only` carries no payload; `email`
        requires the `email` variant.
      properties:
        kind:
          type: string
          enum:
          - inbox_only
          - email
        email:
          type: object
          allOf:
          - $ref: '#/components/schemas/EmailDelivery'
          nullable: true
          description: Email delivery payload when `kind=email`; null for inbox-only delivery.
    EmailDelivery:
      type: object
      additionalProperties: false
      required:
      - to
      properties:
        to:
          type: array
          minItems: 1
          items:
            type: string
            format: email
    Consumer:
      type: object
      additionalProperties: false
      required:
      - kind
      description: 'Polymorphic identifier of what is waiting on this interaction''s resolution.
        Replaces the previously special-cased `run_id` + `signal_name` pair. When `kind=run`,
        the legacy fields are also populated for compatibility. `http_subscriber` requires
        `secret_ref` and enqueues a durable callback dispatch to `callback_url` when the interaction
        resolves; the canonical string `v1.{delivery_id}.{unix_timestamp}.{raw_body}` is signed
        with HMAC-SHA256 against the resolved project signing key and the signed dispatch
        carries `X-Mobius-Signature`, `X-Mobius-Secret-Ref`, `X-Mobius-Secret-Version`, and
        `X-Mobius-Timestamp`. Signed dispatches also carry `X-Mobius-Signature-Version: v1`.
        Every durable dispatch also carries the stable outbox row id in `X-Mobius-Delivery-Id`
        and `Idempotency-Key`; retries reuse the same value. Verifiers should recompute the
        signature over the exact raw body, reject stale timestamps (for example, older than
        five minutes), deduplicate by delivery id, and check the signing headers.'
      properties:
        kind:
          type: string
          enum:
          - run
          - agent_tool
          - http_subscriber
          - none
        run:
          type: object
          allOf:
          - $ref: '#/components/schemas/RunConsumer'
          nullable: true
          description: Run resume target when `kind=run`; null for other consumer kinds.
        agent_tool:
          type: object
          allOf:
          - $ref: '#/components/schemas/AgentToolConsumer'
          nullable: true
          description: Agent tool continuation target when `kind=agent_tool`; null for other
            consumer kinds.
        http_subscriber:
          type: object
          allOf:
          - $ref: '#/components/schemas/HttpSubscriberConsumer'
          nullable: true
          description: HTTP callback target when `kind=http_subscriber`; null for other consumer
            kinds.
    RunConsumer:
      type: object
      additionalProperties: false
      required:
      - run_id
      - signal_name
      properties:
        run_id:
          type: string
        signal_name:
          type: string
    AgentToolConsumer:
      type: object
      additionalProperties: false
      required:
      - invocation_id
      - tool_call_id
      properties:
        invocation_id:
          type: string
        tool_call_id:
          type: string
        session_id:
          type: string
          description: Session whose turn raised this interaction, when session-scoped.
    HttpSubscriberConsumer:
      type: object
      additionalProperties: false
      required:
      - callback_url
      - secret_ref
      properties:
        callback_url:
          type: string
          format: uri
          description: Absolute http(s) URL the server POSTs to when the interaction resolves.
            The body is a JSON object with the interaction id, kind, status, outcome value,
            comment, responder, and `resolved_by`. Delivery is enqueued as a `source_events`
            dispatch so the worker can retry failed attempts instead of dropping them inline
            with interaction resolution.
        secret_ref:
          type: string
          description: 'Required reference to a project secret used to sign deliveries with
            HMAC-SHA256 over the canonical string `v1.{delivery_id}.{unix_timestamp}.{raw_body}`,
            where `delivery_id` is the value in `X-Mobius-Delivery-Id` and `raw_body` is the
            exact callback request body bytes. Accepts `<name>` for the latest enabled version
            or `<name>:<version>` to pin a specific positive-integer version. The plaintext
            signing bytes are taken from the secret''s `signing_key_b64` key, which must base64-decode
            to exactly 32 bytes. The hex signature is forwarded as `X-Mobius-Signature: sha256=<hex>`
            alongside `X-Mobius-Secret-Ref`, `X-Mobius-Secret-Version`, `X-Mobius-Signature-Version:
            v1`, and a unix `X-Mobius-Timestamp`. Consumers should reject stale timestamps
            (for example, older than five minutes). When `secret_ref` resolution fails the
            dispatch is retried by the event processor rather than sent unsigned.'
    InteractionResponse:
      type: object
      additionalProperties: false
      description: One persisted answer artifact for an interaction. The response that triggered
        resolution is referenced from `Interaction.resolving_response_id`.
      required:
      - id
      - interaction_id
      - response_kind
      - state
      - responder_user_id
      - value
      - responded_at
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this response.
        interaction_id:
          type: string
          description: ID of the interaction this response belongs to.
        response_kind:
          type: string
          enum:
          - response
          description: Answer response.
        state:
          type: string
          enum:
          - submitted
          description: Lifecycle state for this response row.
        responder_user_id:
          type: string
          description: User ID that submitted this response.
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by this participant.
        comment:
          type: string
          nullable: true
          description: Optional free-text comment from this responder.
        responded_at:
          type: string
          format: date-time
          description: Timestamp when this response was submitted.
        attempt:
          type: integer
          nullable: true
          description: Reserved for future retry-aware response flows; null until attempts
            are tracked.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ResolutionPolicy:
      type: object
      additionalProperties: false
      required:
      - type
      description: Declarative resolution rule attached to an Interaction. Determines how
        participant responses become a final outcome.
      properties:
        type:
          type: string
          enum:
          - any_of
          - all_of
          - quorum
          description: Resolution rule. `any_of` resolves on the first acceptable response.
            `all_of` waits for every assigned participant. `quorum` resolves once `threshold`
            distinct participants respond.
        threshold:
          type: integer
          minimum: 1
          description: Required when `type` is `quorum`. Number of distinct eligible participants
            that must respond before the interaction resolves. Must be `>= 1` and `<=` the
            participant count.
    Interaction:
      type: object
      additionalProperties: false
      description: Human or agent interaction request and its current response state.
      required:
      - id
      - kind
      - status
      - title
      - target_user_ids
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this interaction.
        run_id:
          type: string
          nullable: true
          description: Originating loop run when the interaction is run-backed.
        signal_name:
          type: string
          nullable: true
          description: Signal name used to resume the originating run when run-backed.
        created_by:
          type: string
          nullable: true
          description: Canonical principal ID of the human or agent that created the interaction;
            null for legacy/system-created rows.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind of the interaction.
        status:
          type: string
          enum:
          - pending
          - completed
          - expired
          - cancelled
          description: 'Current status of the interaction: pending, completed, expired, or
            cancelled.'
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the responder.
        description:
          type: string
          nullable: true
          description: Optional longer responder-facing detail or instructions.
        subject:
          type: object
          allOf:
          - $ref: '#/components/schemas/InteractionReference'
          nullable: true
          description: Primary work item or artifact the interaction is about; null when no
            subject was supplied.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          nullable: true
          description: Additional key-value context surfaced in the UI alongside the title
            and description when supplied.
        tags:
          $ref: '#/components/schemas/TagMap'
        properties:
          type: object
          additionalProperties: true
          nullable: true
          description: Free-form structured metadata attached to the interaction; null when
            no metadata is attached.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        target_user_ids:
          type: array
          items:
            type: string
          description: Resolved user IDs targeted by the interaction.
        responder:
          type: object
          allOf:
          - $ref: '#/components/schemas/InteractionResponder'
          nullable: true
          description: User or agent that completed the interaction; null until completion.
        resolving_response_id:
          type: string
          nullable: true
          description: ID of the response that triggered resolution. Null while the interaction
            is pending, cancelled, or expired. Look up the response in `responses` for the
            full payload.
        responses:
          type: array
          items:
            $ref: '#/components/schemas/InteractionResponse'
          description: All response artifacts recorded against this interaction in arrival
            order.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this interaction expires if not responded to.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the interaction received a terminal response.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this interaction was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this interaction was last updated.
        require_all:
          type: boolean
          description: When true, all target users must respond before completion.
        resolution_policy:
          type: object
          allOf:
          - $ref: '#/components/schemas/ResolutionPolicy'
          nullable: true
          description: Declarative resolution rule attached at creation time. Legacy `require_all`
            inputs are synthesized into an equivalent policy at create time when present.
            Newer rows typically include this field; nullability covers historical rows and
            callers that omit it.
        consumer:
          type: object
          allOf:
          - $ref: '#/components/schemas/Consumer'
          nullable: true
          description: Polymorphic identifier of what is waiting on this interaction's resolution.
            Replaces the special-cased `run_id`/`signal_name` pair; the latter remain populated
            when `consumer.kind=run`.
        delivery:
          type: object
          allOf:
          - $ref: '#/components/schemas/Delivery'
          nullable: true
          description: Optional per-interaction delivery override. When absent, the dispatcher
            delivers to the app inbox only.
        outcome:
          $ref: '#/components/schemas/InteractionValue'
          description: Final outcome selected by the resolution policy. Omitted while the
            interaction is still pending.
        resolved_by:
          type: string
          nullable: true
          description: Short audit string identifying which policy rule fired. Null until
            the interaction reaches a resolved state.
        cancel_reason:
          type: string
          nullable: true
          description: Reason recorded when the interaction was cancelled.
    InteractionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Interaction'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    CreateInteractionRequest:
      description: Creates an interaction directly. Use the standalone variant with no loop-run
        side effect, or the run-backed variant that requires both `run_id` and `signal_name`
        so completion can resume the run. For worker/job usage, prefer the job-scoped route
        so the server can derive the owning run from the claimed job context.
      oneOf:
      - $ref: '#/components/schemas/CreateStandaloneInteractionRequest'
      - $ref: '#/components/schemas/CreateRunBackedInteractionRequest'
    CreateStandaloneInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - kind
      - title
      - target_user_ids
      description: Creates a standalone interaction. Completion records the response but does
        not deliver a loop signal.
      properties:
        target_user_ids:
          type: array
          items:
            type: string
          minItems: 1
          description: Resolved user IDs to target directly. At least one target is required
            — every interaction needs someone who can answer it, even when a machine consumer
            is waiting on the outcome. Agents use their agent principal IDs.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind.
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the responder.
        description:
          type: string
          description: Optional longer responder-facing detail or instructions.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the title
            and description.
        tags:
          $ref: '#/components/schemas/TagMap'
        properties:
          type: object
          additionalProperties: true
          description: Free-form structured metadata to attach to the interaction.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When true, all target users must respond before the interaction is
            considered complete. Defaults to false when omitted. Mutually exclusive with `resolution_policy`;
            prefer the policy form for new code.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Declarative resolution rule. When supplied the policy evaluator drives
            completion.
        consumer:
          $ref: '#/components/schemas/Consumer'
          description: Polymorphic identifier of what is waiting on this interaction's resolution.
            When omitted on a run-backed create request, the server derives a `kind=run` consumer
            from `run_id` and `signal_name`.
        delivery:
          $ref: '#/components/schemas/Delivery'
          description: Optional per-interaction delivery override.
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded to.
    CreateRunBackedInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - run_id
      - signal_name
      - kind
      - title
      - target_user_ids
      description: |-
        Creates an interaction linked to a loop run for audit. The server derives a `kind=run` consumer from `run_id` and `signal_name`.

        This is an audit-only link: creating an interaction here does not suspend the run, and resolving it does not by itself resume a run. A run only blocks on, and resumes from, human input when the loop definition declares an interaction step — that step creates the interaction and registers the matching wait atomically. Use this endpoint to record a human decision against a run, not to drive run control flow.
      properties:
        run_id:
          type: string
          description: ID of the loop run associated with this interaction.
        signal_name:
          type: string
          description: Legacy signal name recorded with the run association.
        target_user_ids:
          type: array
          items:
            type: string
          minItems: 1
          description: Resolved user IDs to target directly. At least one target is required.
            Agents use their agent principal IDs.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind.
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the responder.
        description:
          type: string
          description: Optional longer responder-facing detail or instructions.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the title
            and description.
        tags:
          $ref: '#/components/schemas/TagMap'
        properties:
          type: object
          additionalProperties: true
          description: Free-form structured metadata to attach to the interaction.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When true, all target users must respond before the interaction is
            considered complete. Defaults to false when omitted. Mutually exclusive with `resolution_policy`;
            prefer the policy form for new code.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Declarative resolution rule. When supplied the policy evaluator drives
            completion.
        consumer:
          $ref: '#/components/schemas/Consumer'
          description: Polymorphic identifier of what is waiting on this interaction's resolution.
            When omitted on a run-backed create request, the server derives a `kind=run` consumer
            from `run_id` and `signal_name`.
        delivery:
          $ref: '#/components/schemas/Delivery'
          description: Optional per-interaction delivery override.
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded to.
    RespondToInteractionRequest:
      type: object
      additionalProperties: false
      properties:
        action:
          type: string
          enum:
          - submit
          description: Operation to perform through the canonical response endpoint. `submit`
            answers the interaction.
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by the responder. Required for `submit`.
        comment:
          type: string
          description: Optional free-text comment accompanying the action. Available on every
            interaction kind and never gated by the spec; the responder may always attach
            reasoning, caveats, or follow-up notes alongside `value`.
    CancelInteractionRequest:
      type: object
      additionalProperties: false
      description: Optional payload accompanying a cancel request. The reason is recorded
        on the interaction and forwarded in the cancellation signal so loops can route to
        a fallback.
      properties:
        reason:
          type: string
          description: Free-text reason recorded on the interaction.
    AgentMessagingDMPolicy:
      type: string
      enum:
      - open
      - allowlist
      - disabled
      description: 'Direct-message access policy: `open`, `allowlist`, or `disabled`.'
    AgentMessagingReplyMode:
      type: string
      enum:
      - auto
      description: Reply mode for built-in messaging; currently `auto`.
    AgentMessagingProvider:
      type: string
      enum:
      - slack
      - telegram
      - linear
      description: 'Provider supported by built-in agent messaging: `slack`, `telegram`, or
        `linear` (Linear agent sessions).'
    AgentMessagingBinding:
      type: object
      additionalProperties: false
      description: Messaging provider account that an agent can answer from.
      required:
      - id
      - agent_id
      - provider
      - integration_id
      - enabled
      - dms
      - mentions
      - all_messages
      - channels
      - dm_policy
      - sender_allow
      - reply_mode
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Messaging binding identifier.
        agent_id:
          type: string
          description: Agent this binding belongs to.
        provider:
          $ref: '#/components/schemas/AgentMessagingProvider'
          description: 'Messaging provider for this binding: `slack` or `telegram`.'
        integration_id:
          type: string
          description: Connected integration account this binding applies to.
        enabled:
          type: boolean
          description: Whether the agent can currently answer on this account.
        dms:
          type: boolean
          description: Whether direct messages are accepted.
        mentions:
          type: boolean
          description: Whether channel/group mentions activate the agent.
        all_messages:
          type: boolean
          description: Whether every message in the allowed conversations activates the agent.
        channels:
          type: array
          description: Optional provider conversation allowlist. Empty means any conversation
            on the integration.
          items:
            type: string
        dm_policy:
          $ref: '#/components/schemas/AgentMessagingDMPolicy'
          description: 'Who may direct-message this agent: `open`, `allowlist`, or `disabled`.'
        sender_allow:
          type: array
          description: Optional provider sender allowlist. Empty means any sender.
          items:
            type: string
        reply_mode:
          $ref: '#/components/schemas/AgentMessagingReplyMode'
          description: How the agent replies to inbound provider messages.
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Optional model route override used for replies through this binding.
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Optional compaction policy applied to sessions created from this binding.
            Unset inherits the agent default.
        created_at:
          type: string
          format: date-time
          description: Time the binding was created.
        updated_at:
          type: string
          format: date-time
          description: Time the binding was last updated.
    AgentMessagingBindingRequest:
      type: object
      additionalProperties: false
      required:
      - provider
      - integration_id
      properties:
        provider:
          $ref: '#/components/schemas/AgentMessagingProvider'
          description: 'Messaging provider for this binding: `slack` or `telegram`.'
        integration_id:
          type: string
          description: ID of the connected integration that backs this binding.
        enabled:
          type: boolean
          default: false
          description: Whether the binding is active and the agent responds on this provider.
        replace_existing:
          type: boolean
          default: false
          description: When enabling this binding, disable any other active agent binding
            for the same provider account.
        dms:
          type: boolean
          default: true
          description: Respond to direct messages.
        mentions:
          type: boolean
          default: true
          description: Respond when the agent is @-mentioned.
        all_messages:
          type: boolean
          default: false
          description: Respond to every message in bound channels, not just mentions.
        channels:
          type: array
          items:
            type: string
          description: Channel IDs the binding is scoped to (empty means all channels).
        dm_policy:
          $ref: '#/components/schemas/AgentMessagingDMPolicy'
          description: 'Who may direct-message this agent: `open`, `allowlist`, or `disabled`.'
        sender_allow:
          type: array
          items:
            type: string
          description: Sender IDs allowed to trigger the agent (empty means no allowlist).
        reply_mode:
          $ref: '#/components/schemas/AgentMessagingReplyMode'
          description: Reply behavior for provider messages; currently `auto`.
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Optional model route override used for replies through this binding.
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Optional compaction policy applied to sessions created from this binding.
            Unset inherits the agent default.
    AgentMessagingBindingListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Messaging bindings configured for this agent.
          items:
            $ref: '#/components/schemas/AgentMessagingBinding'
    ToolkitAssignment:
      type: object
      additionalProperties: false
      description: Assignment linking a toolkit to an agent.
      required:
      - agent_id
      - toolkit_id
      - position
      - created_at
      properties:
        agent_id:
          type: string
          description: Agent the toolkit is assigned to.
        toolkit_id:
          type: string
          description: Toolkit assigned to the agent.
        toolkit:
          $ref: '#/components/schemas/Toolkit'
          description: Expanded toolkit metadata for this assignment.
        position:
          type: integer
          description: Ordering position of this assignment in the agent's toolkit list.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
    ReplaceToolkitsRequest:
      type: object
      additionalProperties: false
      required:
      - toolkit_ids
      properties:
        toolkit_ids:
          type: array
          description: Full replace-set of toolkit IDs to assign to the agent, in desired
            order.
          items:
            type: string
    ToolkitAssignmentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Toolkit assignments for this agent, in position order.
          items:
            $ref: '#/components/schemas/ToolkitAssignment'
    SkillAssignment:
      type: object
      additionalProperties: false
      description: Assignment linking a skill to an agent.
      required:
      - agent_id
      - skill_id
      - enabled
      - position
      - created_at
      properties:
        agent_id:
          type: string
          description: Agent the skill is assigned to.
        skill_id:
          type: string
          description: Skill assigned to the agent.
        skill:
