        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        endpoint_url:
          type: string
          format: uri
          description: 'Endpoint URL (populated for endpoint_kind: http actions only).'
        invocation_format:
          allOf:
          - $ref: '#/components/schemas/ActionInvocationFormat'
          description: Resolved request-body contract for a project-owned custom action.
        execution:
