          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/runs/{id}/signals:
    post:
      operationId: sendRunSignal
      tags:
      - runs
      summary: Deliver a run-scoped signal
      description: Enqueues a public `source_event` for the named signal. The subscription
        router matches the event against any active `wait`/`react` subscriptions on the run
        and delivers it through the unified delivery pipeline. The response is an asynchronous
        acknowledgement carrying the persisted `source_event_id`; subscribers wake on their
        normal `run.resume` ticket. Unmatched signals are recorded as `source_events` but
        not stored as a durable per-run inbox — paths that suspend later do not retroactively
        consume them.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendRunSignalRequest'
            example:
