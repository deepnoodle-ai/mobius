          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      operationId: updateArtifactStorageSettings
      tags:
      - artifacts
      summary: Update project artifact-storage settings
      description: Updates project artifact storage settings. v1 accepts the contract shape
        while Mobius-managed storage remains the wired default.
