      tags:
      - artifacts
      summary: Replace artifact bytes
      description: Replaces the bytes behind an existing available artifact while preserving
        the artifact ID and stable content URL. This powers lightweight collaborative inline
        chat artifacts; updates are last-writer-wins and intended for small text, JSON, chart,
        form, and code artifacts.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ArtifactIdParam'
      requestBody:
