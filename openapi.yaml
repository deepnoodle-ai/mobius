  /v1/projects/{project}/artifacts:slot:
    post:
      operationId: createArtifactSlot
      tags:
      - artifacts
      summary: Reserve an artifact upload slot
      description: Reserve a `pending_upload` artifact row and mint a presigned PUT URL the
        worker uploads bytes to. Step-produced uploads MUST include the active job claim's
        `(job_id, worker_session_token, attempt)` triple — Mobius rejects mismatches with
        `409 conflict_wrong_claim`. After the worker uploads bytes, call `:commit` to verify
        and transition the row to `available`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArtifactSlotRequest'
      responses:
        '201':
          description: Slot reserved
          content:
