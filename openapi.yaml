  /v1/projects/{project_handle}/agents/invoke:
    post:
      operationId: invokeAgent
      tags:
      - sessions
      summary: Invoke an agent
      description: |-
        One compound runtime call for hosted apps: it resolves an agent, resolves or creates a session by `session_key`, appends the caller's input message, and starts an agent turn — collapsing the create-or-resolve-session plus start-turn sequence into a single retryable request. This is the entry point a product backend (an embedded app, a Slack handler, a Telegram bot) calls per inbound message; the lower-level session and turn APIs remain available for finer control.

        The optional `config` block lets you send an agent definition with the request — instructions, model, effort, per-turn timeout, toolkits, and skills — instead of using the one stored in Mobius. A field you set replaces the agent's value; a field you leave out keeps it. Mobius remembers the config on the session and reuses it on later turns until you send a new one. If your organization limits values like the model or timeout, those limits still apply. Omit `config` to run the agent on its stored definition.

        `config.timeout_seconds` is the session definition fallback; zero uses the platform default. For a one-shot override, send `operation.timeout_seconds` with a value of at least one. The operation value applies only to the newly admitted turn and takes precedence over the saved config value.

        By default it returns `202 Accepted` immediately with a durable `after_sequence` stream cursor; the turn keeps running even if the caller disconnects. When the request sets `Accept: text/event-stream`, the response is `200 OK` and the turn's activity is streamed inline on the same connection, identical to the `POST /v1/projects/{project_handle}/sessions/{session_id}/turns` stream. A repeated call with the same `input.idempotency_key` resolves the same session and returns the existing invocation without restarting it or writing new input, so a webhook handler can acknowledge fast and retry safely. Requires the `mobius.agent.invoke` permission (or the agent's own backing principal).

        Only one direct invocation may be nonterminal in a session. A distinct input while a turn is queued, running, or waiting returns `409` with `error.code = session_turn_active` and `error.details = {turn_id, status}` before the new input is appended. Use the session nudge endpoint explicitly to steer a running or waiting turn; Mobius never converts a second send into a nudge implicitly.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvokeAgentRequest'
            example:
              agent_ref:
                id: agent_5n8p2q7m4x9r3v6t
              session:
                mode: continue_or_create
                session_key: app:acct_123:user_456:slack:support:thread_789
                title: Support in Slack
                metadata:
                  account_id: acct_123
                  user_id: user_456
              config:
                instructions: You are Acme's support agent. Be concise and cite ticket numbers.
                model: claude-sonnet-4-6
                effort: medium
                toolkits:
                - name: tickets
                  actions:
                  - tickets.search
                  - tickets.get
              input:
                content:
                - type: text
                  text: Can you summarize my open tickets?
                idempotency_key: slack:evt_0a1b2c3d
              channel_context:
                provider: slack
                workspace_id: T123
                channel_id: C123
                thread_id: '1700000000.123'
      responses:
        '200':
          description: 'Server-sent event stream of the turn''s activity, returned when the
            request sets `Accept: text/event-stream`. Framing matches `GET /v1/projects/{project_handle}/sessions/{session_id}/stream`.'
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SessionStreamFrame'
        '202':
          description: The turn was accepted and is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnAck'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: A distinct direct invocation is already queued, running, or waiting.
            The `session_turn_active` error details contain its `turn_id` and `status`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/sessions:
