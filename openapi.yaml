      - agents
      summary: List agents
      description: Returns agents with computed presence. Filter by service_account_id to
        find all agents owned by a specific identity.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: service_account_id
        in: query
        description: Filter to agents backed by this service account.
        schema:
          type: string
      - name: status
        in: query
        description: Filter by administrative status (active/inactive), independent of presence.
        schema:
          $ref: '#/components/schemas/AgentStatus'
      - $ref: '#/components/parameters/TagFilterParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/agents/{id}:
    get:
      operationId: getAgent
      tags:
      - agents
      summary: Get an agent
      description: Returns one agent with its administrative status and computed presence.
        Presence is derived from recent sessions, so it may change without the agent record
        itself being updated.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateAgent
      tags:
      - agents
      summary: Update an agent
      description: Updates mutable agent fields. Setting `status` to `inactive` prevents the
        agent from claiming new jobs but does not terminate active sessions.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: deleteAgent
      tags:
      - agents
      summary: Delete an agent
      description: Hard-deletes the agent and all associated sessions. In-flight jobs claiming
        this agent are not automatically cancelled.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/agents/{id}/sessions:
    post:
      operationId: createAgentSession
      tags:
      - agents
      summary: Register a new agent session
      description: Called by a worker at startup to register a live connection. `transport`
        identifies the connection mechanism (e.g. "sse", "polling"). The session transitions
        to `connected` and should be kept alive via heartbeats.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentSessionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      operationId: listAgentSessions
      tags:
      - agents
      summary: List sessions for an agent
      description: 'Returns sessions newest-first. The agent''s `presence` is derived from
        the most recent 20 sessions across all transports: `online` if any connected session
        has a fresh heartbeat, `stale` if heartbeats are overdue, `offline` otherwise.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: status
        in: query
        description: Filter by session status.
        schema:
          $ref: '#/components/schemas/AgentSessionStatus'
      - name: transport
        in: query
        description: Filter by transport type (e.g. "sse", "polling").
        schema:
          type: string
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSessionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/agents/{id}/sessions/{session_id}:
    get:
      operationId: getAgentSession
      tags:
      - agents
      summary: Get an agent session
      description: Returns one live or historical session for the agent. Use this to inspect
        transport details, heartbeat freshness, and disconnect state for a specific worker
        process.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/session_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/agents/{id}/sessions/{session_id}/heartbeat:
    post:
      operationId: heartbeatAgentSession
      tags:
      - agents
      summary: Refresh an agent session heartbeat
      description: Updates `last_seen_at` on the session and keeps the agent's computed presence
        as `online`. Workers should call this at a regular interval (typically every 30s).
        Sessions that miss heartbeats become `stale`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/session_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/agents/{id}/sessions/{session_id}/disconnect:
    post:
      operationId: disconnectAgentSession
      tags:
      - agents
      summary: Mark an agent session as disconnected
      description: Explicitly closes a session, setting status to `disconnected` and recording
        `disconnected_at`. Prefer this over letting sessions go stale on graceful shutdown.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - $ref: '#/components/parameters/session_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/tools:
    get:
      operationId: listTools
      tags:
      - tools
      summary: List workflow tools
      description: Returns all workflow definitions that have been published as tools for
        the project. Each entry includes the tool name, description, and JSON Schema for the
        input — compatible with the Anthropic and OpenAI tool use APIs.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolDefinitionListResponse'
              example:
                items:
                - name: document-review
                  description: Summarize a document and request approval before publishing.
                  input_schema:
                    type: object
                    required:
                    - document_id
                    properties:
                      document_id:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/tools/{handle}/runs:
    post:
      operationId: runTool
      tags:
      - tools
      summary: Invoke a workflow tool
      description: 'Starts a workflow run for the named tool (workflow handle) and waits for
        it to complete up to `timeout_seconds` (default 30s, max 120s). Returns the run output
        directly when the workflow completes within the timeout. On timeout the response includes
        the run ID and `status: active` so the caller can switch to polling via `GET /v1/projects/{project}/tools/{handle}/runs/{run_id}`.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: handle
        in: path
        required: true
        description: Workflow handle identifying the tool to invoke.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolRunRequest'
            example:
              input:
                document_id: doc_01hw1m9z8y7x6w5v4u3t2s1r0q
              timeout_seconds: 45
      responses:
        '200':
          description: OK — run completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolRun'
              example:
                run_id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                status: completed
                output:
                  summary: Ready for review.
                  approved: true
        '202':
          description: Accepted — run is active; poll for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolRun'
              example:
                run_id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                status: active
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/tools/{handle}/runs/{run_id}:
    get:
      operationId: getToolRun
      tags:
      - tools
      summary: Get an async tool run result
      description: Polls the workflow run backing an asynchronous tool invocation. A completed
        response includes `output`; a failed response includes `error`. The `handle` must
        match the tool that started the run.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: handle
        in: path
        required: true
        description: Workflow handle identifying the tool.
        schema:
          type: string
      - $ref: '#/components/parameters/run_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolRun'
              example:
                run_id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                status: completed
                output:
                  summary: Ready for review.
                  approved: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |-
        Bearer credential supplied via the `Authorization: Bearer <credential>` header. Two credential types are accepted:

        - **API keys** — prefix `mbx_`. Issued from the dashboard or via the
        API key endpoints. API keys with a project binding are scoped to
        that project; unbound keys are org-scoped ("system"). The raw token
        is sent as-is.
        - **CLI credentials** — prefix `mbc_`. Issued by the device-auth
        flow on behalf of a user. Unpinned CLI credentials are org-scoped
        and sent as the raw token. Project-pinned CLI credentials MUST be
        sent with a trailing `.<project_handle>` suffix — e.g.
        `mbc_abcdef….myproject`. The suffix is required: the handle is how
        the server resolves the bound project.
  parameters:
    ProjectHandleParam:
      name: project
      in: path
      required: true
      schema:
        type: string
      description: Project handle (unique per organization)
    IDParam:
      name: id
      in: path
      required: true
      description: Resource ID.
      schema:
        type: string
    ActionNameParam:
      name: action_name
      in: path
      required: true
      description: Project-scoped action name used in workflow step definitions.
      schema:
        type: string
    member_id:
      name: member_id
      in: path
      required: true
      description: User or agent ID of the channel member.
      schema:
        type: string
    user_id:
      name: user_id
      in: path
      required: true
      description: User ID.
      schema:
        type: string
    message_id:
      name: message_id
      in: path
      required: true
      description: ID of the channel message.
      schema:
        type: string
    session_id:
      name: session_id
      in: path
      required: true
      description: ID of the agent session.
      schema:
        type: string
    run_id:
      name: run_id
      in: path
      required: true
      description: ID of the tool run to poll.
      schema:
        type: string
    CursorParam:
      name: cursor
      in: query
      description: Cursor for pagination (opaque string from previous response)
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    TagFilterParam:
      name: tag
      in: query
      description: |-
        Filter results by tag. Repeatable; multiple values combine with AND. Format: `Key:Value`, `Key:*` for any value, `Key:a,b,c` for IN.

        Tag values containing `:` or `,` cannot be filtered with this grammar — the parser splits on those literally. Constrain values to plain identifiers when you intend to filter on them.

        Not supported on the runs list — runs are too high-cardinality for ad-hoc tag filtering. To narrow runs by parent workflow, use the workflow-scoped endpoint `GET /v1/projects/{project}/workflows/{id}/runs` and inspect `tags` on each run client-side.
      explode: true
      schema:
        type: array
        items:
          type: string
    APIKeyProjectIDParam:
      name: project_id
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/ProjectID'
      description: Optional project scope for this request. When `project_id` is provided,
        the API key operation is resolved in that project's permission context. When `project_id`
        is omitted, the request is treated as org-level and project-pinned keys are excluded.
    TriggerTargetIDParam:
      name: target_id
      in: path
      required: true
      description: Trigger target ID.
      schema:
        type: string
    GroupParam:
      name: group
      in: path
      required: true
      description: Group ID or handle.
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded. Retry after the delay indicated in the `Retry-After`
        header.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Limit of the tightest active rate-limit bucket.
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Requests remaining in the tightest bucket's current window.
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp (seconds) when the tightest bucket resets.
        X-RateLimit-Scope:
          schema:
            type: string
            enum:
            - key
            - org
          description: Scope of the tightest bucket.
        X-RateLimit-Policy:
          schema:
            type: string
          description: All active windows for the selected scope, in `limit;w=seconds` form.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NoContent:
      description: No Content
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      description: Standard error envelope returned by API endpoints.
      required:
      - error
      properties:
        error:
          type: object
          additionalProperties: false
          description: Error detail.
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
    HealthResponse:
      type: object
      additionalProperties: false
      description: Health-check response for load balancers and uptime probes.
      required:
      - status
      properties:
        status:
          type: string
          description: Current server status. `ok` when all dependencies are reachable.
    ProjectID:
      type: string
      description: Project ID.
    Metadata:
      type: object
      description: Free-form JSON object for caller-defined metadata.
      additionalProperties: true
    TagMap:
      type: object
      description: Azure-style key/value tag map. Keys 1–128 chars, values 0–256 chars. Keys
        with the `mobius:` prefix are system-managed and cannot be set by callers. Maximum
        50 tags per resource. Use tags to organise resources by environment, team, cost-center,
        or any other dimension meaningful to your organisation; tags can be filtered on most
        list endpoints.
      additionalProperties:
        type: string
        maxLength: 256
      maxProperties: 50
      example:
        Environment: Production
        Department: Finance
        Owner: team@example.com
    InteractionMode:
      type: string
      enum:
      - confirm
      - select
      - multi_select
      - input
      description: Declarative UI/input primitive for collecting the response. This is a portable
        rendering contract, not executable code. Values are `confirm`, `select`, `multi_select`,
        and `input`.
    InteractionOption:
      type: object
      required:
      - value
      - label
      additionalProperties: false
      description: Selectable option for `select` and `multi_select` modes.
      properties:
        value:
          type: string
          description: Machine-readable value submitted when this option is chosen.
        label:
          type: string
          description: Human-readable label displayed for this option.
        description:
          type: string
          description: Optional additional context shown beneath the label.
    InteractionSpec:
      type: object
      required:
      - mode
      additionalProperties: false
      description: |-
        Declarative dialog contract for rendering and validating an interaction. Used at both authoring time (inside a workflow definition) and runtime (persisted on an interaction). Compatibility rules are enforced server-side:

        - `approval` requires `mode = confirm`
        - `review` requires `mode = select`
        - `input` supports `input`, `select`, or `multi_select`
      properties:
        mode:
          $ref: '#/components/schemas/InteractionMode'
          description: UI/input mode used to render and validate the response.
        options:
          type: array
          maxItems: 100
          description: Required for `select` and `multi_select` modes.
          items:
            $ref: '#/components/schemas/InteractionOption'
        default_value:
          type: string
          description: Default selected option for `select` mode.
        default_values:
          type: array
          maxItems: 100
          description: Default selected options for `multi_select` mode.
          items:
            type: string
        default_text:
          type: string
          description: Initial text value for `input` mode.
        default_confirmed:
          type: boolean
          description: Initial yes/no value for `confirm` mode.
        placeholder:
          type: string
          description: Hint text shown for `input` mode.
        multiline:
          type: boolean
          description: When true, render `input` mode as a multiline text area.
    ChannelMessageSenderType:
      type: string
      enum:
      - member
      - agent
      description: Whether the message was sent by a human org member or an agent worker.
    Channel:
      type: object
      additionalProperties: false
      description: Project-scoped messaging room or direct-message thread.
      required:
      - id
      - name
      - display_name
      - kind
      - private
      - created_by
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this channel.
        name:
          type: string
          description: URL-safe channel handle, unique within the project. Immutable after
            creation.
        display_name:
          type: string
          description: Human-facing display name shown in the UI.
        topic:
          type: string
          description: Optional topic or description shown at the top of the channel.
        kind:
          type: string
          enum:
          - dm
          - channel
          description: '`channel` — persistent named room. `dm` — direct-message thread, typically
            between a small fixed set of participants.'
        private:
          type: boolean
          description: When true, the channel is invite-only and not visible in public listings.
        created_by:
          type: string
          description: User ID of the org member who created the channel.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the channel is archived. Archived channels are hidden in the
            UI but their message history remains accessible.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this channel.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this channel was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this channel was last updated.
    ChannelListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of project channels.
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Channel'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    ChannelMember:
      type: object
      additionalProperties: false
      description: Live membership record for a user or agent in a channel.
      required:
      - id
      - channel_id
      - user_id
      - role
      - joined_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        channel_id:
          type: string
          description: ID of the channel this membership belongs to.
        user_id:
          type: string
          description: ID of the user or agent who is a member.
        role:
          type: string
          enum:
          - member
          - admin
          description: '`admin` — can update channel settings and manage members. `member`
            — can post messages and view history. Creators are automatically assigned `admin`.'
        last_read_message_id:
          type: string
          nullable: true
          description: ID of the last message this member has read; null until the member
            reads a message.
        muted:
          type: boolean
          description: When true, notifications for this channel are suppressed for this member.
        starred:
          type: boolean
          description: Whether this member has starred the channel for quick access.
        joined_at:
          type: string
          format: date-time
          description: Timestamp when this member joined the channel.
    ChannelMemberListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of members in a channel.
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ChannelMember'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    ChannelMessage:
      type: object
      additionalProperties: false
      description: Message posted in a channel, including sender attribution and rendering
        metadata.
      required:
      - id
      - channel_id
      - sender_type
      - sender_id
      - type
      - content
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this message.
        channel_id:
          type: string
          description: ID of the channel this message was posted in.
        sender_type:
          $ref: '#/components/schemas/ChannelMessageSenderType'
          description: Whether the sender is a human member or an agent worker.
        sender_id:
          type: string
          description: User ID (for `member`) or agent ID (for `agent`) of the message sender.
        sender_session_id:
          type: string
          nullable: true
          description: Live agent session that posted the message, when applicable.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          description: Rendering hint for the UI. `message` — standard chat bubble. `notice`
            — system/informational notice (no attribution). `card` — structured card layout.
        type:
          type: string
          description: Dot-namespaced message type identifier, e.g. `user.message`, `ai.response`.
            Used for filtering and display logic.
        content:
          type: string
          description: Message body in Markdown.
        reply_to:
          type: string
          nullable: true
          description: ID of the parent message this reply belongs to, or null when this is
            not a threaded reply.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Free-form metadata attached to the message.
        pinned:
          type: boolean
          description: Whether this message is pinned in the channel.
        pinned_by:
          type: string
          nullable: true
          description: User ID of the member who pinned this message, or null when the message
            is not pinned.
        edited_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the message content has been updated after initial send.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this message was posted.
    ChannelMessageListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of channel messages.
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ChannelMessage'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    CreateChannelRequest:
      type: object
      additionalProperties: false
      description: Fields used to create a project channel or direct-message thread.
      required:
      - name
      - display_name
      - kind
      properties:
        name:
          type: string
          description: URL-safe handle, unique within the project. Immutable after creation
            — choose carefully.
        display_name:
          type: string
          description: Human-facing display name shown in the UI.
        topic:
          type: string
          description: Optional channel topic or description.
        kind:
          type: string
          enum:
          - dm
          - channel
          description: Channel kind, either `dm` or `channel`. Cannot be changed after creation.
        private:
          type: boolean
          default: false
          description: When true, the channel is invite-only.
        member_ids:
          type: array
          items:
            type: string
          description: Optional list of user or agent IDs to add as members at creation time.
            All receive the `member` role; the creator is added as `admin` separately.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateChannelRequest:
      type: object
      additionalProperties: false
      description: Mutable channel fields.
      properties:
        display_name:
          type: string
          description: Updated display name.
        topic:
          type: string
          description: Updated topic or description.
        private:
          type: boolean
          description: Toggle invite-only visibility.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the channel. System tags
            (`mobius:*`) are preserved.
    AddChannelMemberRequest:
      type: object
      additionalProperties: false
      description: Member identity and role to add to a channel.
      required:
      - user_id
      properties:
        user_id:
          type: string
          description: User or agent ID to add to the channel.
        role:
          type: string
          enum:
          - member
          - admin
          default: member
          description: Role to assign the new member, either `member` or `admin`.
    SendChannelMessageRequest:
      type: object
      additionalProperties: false
      description: Fields used to post a new channel message.
      required:
      - content
      properties:
        sender_agent_id:
          type: string
          description: Durable agent identity to attribute the message to. When set, `sender_type`
            on the resulting message is `agent`.
        sender_session_id:
          type: string
          description: Live agent session to associate with the message.
        content:
          type: string
          description: Message body in Markdown.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          default: message
          description: 'Rendering hint for the UI: `message`, `notice`, or `card`.'
        type:
          type: string
          default: user.message
          description: Dot-namespaced message type identifier.
        reply_to:
          type: string
          description: Parent message ID for threading (creates a reply).
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Free-form metadata to attach to the message.
    UpdateChannelMessageRequest:
      type: object
      additionalProperties: false
      description: Mutable fields for an existing channel message.
      properties:
        content:
          type: string
          description: Updated Markdown content. Sets `edited_at` on the message.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Replacement free-form metadata for the message.
        pinned:
          type: boolean
          description: Pin or unpin the message. Sets/clears `pinned_by`.
    AuditLogEntry:
      type: object
      additionalProperties: false
      description: Immutable record of a security- or configuration-relevant change. Use audit
        log entries to answer who changed a resource, when it happened, and which project
        or credential was involved.
      required:
      - id
      - action
      - resource_type
      - resource_id
      - created_at
      properties:
        id:
          type: string
          description: Unique audit log entry ID
        user_id:
          type: string
          description: ID of the user who performed the action, when a human user is attributable
        project_id:
          type: string
          description: Project ID when the audited resource is project-scoped
        actor_type:
          type: string
          description: Durable actor type that performed the action
        actor_id:
          type: string
          description: Durable actor ID that performed the action
        actor_name:
          type: string
          description: Display name of the actor (email for users, service account name for
            service accounts)
        credential_id:
          type: string
          description: Credential ID used for the request, when applicable
        action:
          type: string
          enum:
          - create
          - update
          - delete
          - archive
          - restore
          description: 'Type of action performed: `create`, `update`, `delete`, `archive`,
            or `restore`.'
        resource_type:
          type: string
          description: Type of resource affected (e.g., job, channel, document)
        resource_id:
          type: string
          description: ID of the affected resource
        resource_name:
          type: string
          description: Human-readable name of the affected resource
        changes:
          type: object
          additionalProperties: true
          description: Object containing before/after changes for update actions
        ip_address:
          type: string
          description: IP address of the request
        user_agent:
          type: string
          description: User agent of the request
        created_at:
          type: string
          format: date-time
          description: Timestamp when the action was performed
    AuditLogListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        next_cursor:
          type: string
          description: Cursor for fetching next page of results
        has_more:
          type: boolean
          description: Whether more results are available
    APIKeyProjectID:
      allOf:
      - $ref: '#/components/schemas/ProjectID'
      description: Set for project-pinned keys; omitted for org-scoped keys.
    APIKey:
      type: object
      additionalProperties: false
      description: Stored API credential metadata for automation and service access. The raw
        secret is never returned here; use this object to list, audit, expire, or identify
        keys by prefix without exposing tokens.
      required:
      - id
      - name
      - key_prefix
      - scope
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this API key.
        name:
          type: string
          description: Human-readable label, unique within the org (or org+project for project-pinned
            keys).
        key_prefix:
          type: string
          description: First 8 characters of the key, used to identify it without exposing
            the secret.
        scope:
          type: string
          enum:
          - org
          - system
          description: '`org` is the standard API key scope; `system` is reserved for platform-level
            access. Project-pinned versus org-level behavior is determined by `project_id`.'
        permissions:
          type: array
          items:
            type: string
          description: Explicit permission set granted to this key (e.g. "mobius.job.claim").
        project_id:
          $ref: '#/components/schemas/APIKeyProjectID'
          description: Project this key is pinned to; null or omitted for org-scoped and system
            keys.
        service_account_id:
          type: string
          description: Optional service account for attribution and quota tracking.
        expires_at:
          type: string
          format: date-time
          description: Hard expiry timestamp. Requests using an expired key receive 401.
        last_used_at:
          type: string
          format: date-time
          description: Timestamp of the most recent authenticated request using this key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this API key.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this key was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this key was last updated.
    APIKeyCreateResult:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - key_prefix
      - scope
      - created_at
      - updated_at
      - key
      description: Returned only on key creation. Contains the raw `key` value which is not
        retrievable after this response.
      properties:
        id:
          type: string
          description: Unique identifier for the created API key.
        name:
          type: string
          description: Human-readable name for the key.
        key_prefix:
          type: string
          description: First 8 characters of the key for identification.
        scope:
          type: string
          enum:
          - org
          - system
          description: Scope of the key. `org` is the standard API key scope, and `system`
            is reserved for platform-only keys. Project-pinned versus org-level behavior is
            determined by `project_id`.
        permissions:
          type: array
          items:
            type: string
          description: List of permissions granted to this key.
        project_id:
          $ref: '#/components/schemas/APIKeyProjectID'
          description: Project this key is pinned to; null or omitted for org-scoped and system
            keys.
        service_account_id:
          type: string
          description: ID of the service account this key belongs to.
        expires_at:
          type: string
          format: date-time
          description: Timestamp when this key expires. Null if it does not expire.
        last_used_at:
          type: string
          format: date-time
          description: Timestamp of the most recent authenticated request using this key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this API key.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this key was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this key was last updated.
        key:
          type: string
          description: The raw API key. Returned only once at creation — store it securely
            immediately.
    APIKeyListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/APIKey'
    CreateAPIKeyRequest:
      description: Request shape for creating either a project-pinned key or an org-level
        key. Choose the project-pinned variant when automation should be unable to cross project
        boundaries.
      oneOf:
      - $ref: '#/components/schemas/CreateProjectPinnedAPIKeyRequest'
      - $ref: '#/components/schemas/CreateOrgOrSystemAPIKeyRequest'
    CreateProjectPinnedAPIKeyRequest:
      type: object
      required:
      - name
      - project_id
      additionalProperties: false
      properties:
        name:
          type: string
          description: Human-readable label, unique within the org (or project for project-pinned
            keys).
        project_id:
          allOf:
          - $ref: '#/components/schemas/ProjectID'
          description: Set `project_id` to pin this key to exactly one project. When `project_id`
            is omitted, the request creates an org-level key instead.
        scope:
          type: string
          enum:
          - org
          default: org
          description: Standard API key scope for project-pinned keys; value is always `org`.
        permissions:
          type: array
          items:
            type: string
          description: Permissions to grant. Each permission must be held by the creating
            caller — you cannot grant more than you have.
        service_account_id:
          type: string
          description: Associate this key with a service account for attribution.
        expires_at:
          type: string
          format: date-time
          description: Optional hard expiry. Omit for a non-expiring key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateOrgOrSystemAPIKeyRequest:
      type: object
      required:
      - name
      additionalProperties: false
      properties:
        name:
          type: string
          description: Human-readable label, unique within the org (or project for project-pinned
            keys).
        scope:
          type: string
          enum:
          - org
          - system
          default: org
          description: 'Standard API key scope: `org` for organization keys or `system` for
            platform-only keys. Project-pinned versus org-level behavior is determined separately
            by `project_id`.'
        permissions:
          type: array
          items:
            type: string
          description: Permissions to grant. Each permission must be held by the creating
            caller — you cannot grant more than you have.
        service_account_id:
          type: string
          description: Associate this key with a service account for attribution.
        expires_at:
          type: string
          format: date-time
          description: Optional hard expiry. Omit for a non-expiring key.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    AuthContext:
      type: object
      additionalProperties: false
      description: Server-resolved identity context for the current request. Use this to confirm
        which org, actor, and auth mechanism the API associated with the supplied credential.
      required:
      - user_id
      - auth_type
      - is_org_admin
      properties:
        user_id:
          type: string
          description: Resolved user ID for this request (may be a service account ID for
            API-key auth).
        org_id:
          type: string
          description: Org ID resolved from the authentication credential.
        role:
          type: string
          description: Org member role (owner, admin, member) — empty for API-key auth.
        auth_type:
          type: string
          description: 'How the caller authenticated: `clerk` (browser JWT), `api_key`, or
            `cli_token`.'
        is_org_admin:
          type: boolean
          description: True when the caller is an owner or admin of the active organization.
    ConfirmDeviceCodeRequest:
      type: object
      additionalProperties: false
      required:
      - user_code
      properties:
        user_code:
          type: string
          description: The user code displayed in the CLI during the device authorization
            flow.
        label:
          type: string
          description: Optional label to identify this credential in the CLI credentials list.
        project_id:
          type: string
          description: Optional project ID to pin the issued CLI credential to. When set,
            the resulting token is usable only for that project and must carry the project's
            handle as a trailing `.<handle>` suffix.
    ConfirmDeviceCodeResult:
      type: object
      additionalProperties: false
      required:
      - confirmed
      properties:
        confirmed:
          type: boolean
          description: True when the device code was successfully confirmed and a CLI credential
            has been issued.
    CLICredentialStatus:
      type: string
      enum:
      - active
      - revoked
      description: Lifecycle state for a CLI credential. `active` credentials can authenticate
        requests; `revoked` credentials are retained for audit history but no longer work.
    CLICredential:
      type: object
      additionalProperties: false
      description: User-authorized CLI credential metadata. Use it to show local login sessions,
        identify project-pinned tokens, and revoke stale command-line access without revealing
        the token itself.
      required:
      - id
      - user_id
      - label
      - token_prefix
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this credential.
        user_id:
          type: string
          description: ID of the user who authorized this credential.
        project_id:
          type: string
          description: Project ID the credential is pinned to. Empty when the credential is
            org-scoped (usable across every project the user can access).
        project_handle:
          type: string
          description: Handle of the pinned project, echoed here so clients can format the
            trailing `.<handle>` suffix on every request. Empty when the credential is not
            pinned.
        label:
          type: string
          description: Human-readable label identifying this credential.
        token_prefix:
          type: string
          description: First few characters of the token, shown for identification without
            exposing the secret.
        status:
          $ref: '#/components/schemas/CLICredentialStatus'
          description: 'Credential lifecycle state: `active` or `revoked`.'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this credential was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this credential was last updated.
        last_used_at:
          type: string
          format: date-time
          description: Timestamp of the most recent authenticated request using this credential.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this credential expires. Null if it does not expire.
    CLICredentialListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of credentials issued to the current user.
          items:
            $ref: '#/components/schemas/CLICredential'
    WorkflowSpec:
      type: object
      required:
      - name
      - steps
      description: |-
        Workflow definition shaped like `workflow.Options`.

        Authoring rule: `action` is the canonical field for executable steps. When `action_kind` is omitted, `action` uses worker/job semantics. Use `action_kind: "server"` for Mobius-managed server actions such as platform integrations or custom HTTP-backed actions.
      additionalProperties: false
      properties:
        name:
          type: string
          description: Workflow name.
        description:
          type: string
          description: Optional description of the workflow's purpose.
        start_at:
          type: string
          description: Step name to start execution from. Defaults to the first step.
        inputs:
          type: array
          description: Declared input parameters accepted by this workflow.
          items:
            $ref: '#/components/schemas/WorkflowInput'
        outputs:
          type: array
          description: Declared output values produced by this workflow.
          items:
            $ref: '#/components/schemas/WorkflowOutput'
        state:
          type: object
          additionalProperties: true
          description: Initial workflow state.
        steps:
          type: array
          description: Ordered list of steps that make up this workflow.
          items:
            $ref: '#/components/schemas/WorkflowStep'
    WorkflowInput:
      type: object
      description: Declares one named input accepted by a workflow spec.
      required:
      - name
      - type
      additionalProperties: false
      properties:
        name:
          type: string
          description: Input parameter name referenced in step expressions.
        type:
          type: string
          description: Data type of the input (e.g. string, integer, boolean, object).
        description:
          type: string
          description: Human-readable description of this input parameter.
        default:
          description: Optional default value.
    WorkflowOutput:
      type: object
      description: Declares one named output value produced by a workflow spec.
      required:
      - name
      - variable
      additionalProperties: false
      properties:
        name:
          type: string
          description: Output name exposed to callers and downstream steps.
        variable:
          type: string
          description: State variable name whose value is mapped to this output.
        branch:
          type: string
          description: Defaults to `main` when omitted.
        description:
          type: string
          description: Human-readable description of this output value.
    WorkflowStep:
      description: A workflow step. Exactly one step shape should be used. Step variants are
        identified by their distinctive required property (`action`, `join`, `wait_signal`,
        `sleep`, `pause`, or `interaction`). The current authored shape intentionally does
        not add a separate discriminator field, so existing workflow YAML stays compact.
      oneOf:
      - $ref: '#/components/schemas/WorkflowExecutableStep'
      - $ref: '#/components/schemas/WorkflowJoinStep'
      - $ref: '#/components/schemas/WorkflowWaitSignalStep'
      - $ref: '#/components/schemas/WorkflowSleepStep'
      - $ref: '#/components/schemas/WorkflowPauseStep'
      - $ref: '#/components/schemas/WorkflowInteractionStep'
    WorkflowStepLayout:
      type: object
      additionalProperties: false
      description: Optional presentation hint for the visual editor. Ignored by the execution
        engine; when absent, editors auto-lay out the step.
      properties:
        x:
          type: number
          description: Horizontal position of the step in the editor canvas.
        y:
          type: number
          description: Vertical position of the step in the editor canvas.
    WorkflowExecutableStep:
      type: object
      description: Executes a worker or server action and stores its result in workflow state.
      additionalProperties: false
      required:
      - name
      - action
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated when more than one edge
            matches.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration that runs this step once per item.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        action:
          type: string
          description: 'Canonical executable-step field. When `action_kind` is omitted, the
            engine treats this as a worker action. Use `action_kind: server` for Mobius-managed
            server actions.'
        action_kind:
          $ref: '#/components/schemas/WorkflowActionKind'
          description: Whether `action` is handled by a worker or by a Mobius-managed server
            action.
        store:
          type: string
          description: State variable name where the action result is stored.
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters passed to the action, supporting expression interpolation.
        retry:
          type: array
          description: Retry policies applied when the action fails.
          items:
            $ref: '#/components/schemas/WorkflowRetry'
        catch:
          type: array
          description: Error catch clauses that redirect execution on specific failures.
          items:
            $ref: '#/components/schemas/WorkflowCatch'
      example:
        name: summarize
        action: summarize-document
        parameters:
          doc_id: ${inputs.doc_id}
    WorkflowJoinStep:
      type: object
      description: Waits for one or more parallel branches before continuing.
      additionalProperties: false
      required:
      - name
      - join
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the join completes.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated join evaluation.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        join:
          $ref: '#/components/schemas/WorkflowJoinConfig'
          description: Branches, count, and branch result mappings used by the join.
    WorkflowWaitSignalStep:
      type: object
      description: Suspends a branch until an external signal with the matching topic arrives.
      additionalProperties: false
      required:
      - name
      - wait_signal
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the signal arrives.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated signal waits.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        wait_signal:
          $ref: '#/components/schemas/WorkflowWaitSignalConfig'
          description: Signal topic, timeout, and storage behavior for this suspension.
    WorkflowSleepStep:
      type: object
      description: Suspends a branch for a fixed duration before continuing.
      additionalProperties: false
      required:
      - name
      - sleep
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the sleep completes.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated sleeps.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        sleep:
          $ref: '#/components/schemas/WorkflowSleepConfig'
          description: Duration to wait before the branch resumes.
    WorkflowPauseStep:
      type: object
      description: Suspends a branch until it is manually resumed.
      additionalProperties: false
      required:
      - name
      - pause
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the pause is resumed.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated pauses.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        pause:
          $ref: '#/components/schemas/WorkflowPauseConfig'
          description: Optional pause reason surfaced to operators.
    WorkflowInteractionStep:
      type: object
      description: Creates a human or agent interaction and resumes when the interaction completes.
      additionalProperties: false
      required:
      - name
      - interaction
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the interaction completes.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated interactions.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        interaction:
          $ref: '#/components/schemas/WorkflowInteractionConfig'
          description: Interaction prompt, recipient, response schema, and timeout behavior.
    WorkflowActionKind:
      type: string
      enum:
      - worker
      - server
      description: 'Execution mode for `action` steps: `worker` creates claimable jobs for
        external workers, while `server` executes Mobius-managed actions such as integrations
        inside the service. Omit for the current default of `worker`.'
    WorkflowEdgeMatchingStrategy:
      type: string
      enum:
      - all
      - first
      description: 'Controls matching when multiple outbound edge conditions are true: `all`
        follows every matching edge in parallel, while `first` follows only the first matching
        edge in declaration order.'
    WorkflowEdge:
      type: object
      description: Directed transition from one workflow step to another.
      required:
      - step
      additionalProperties: false
      properties:
        step:
          type: string
          description: Name of the step to transition to.
        condition:
          type: string
          description: Expression that must evaluate to true for this edge to be followed.
        branch:
          type: string
          description: Branch name assigned to parallel execution started by this edge.
    WorkflowEach:
      type: object
      description: Fan-out configuration that repeats a step over a collection.
      required:
      - items
      additionalProperties: false
      properties:
        items:
          description: Expression or literal collection to iterate over.
        as:
          type: string
          description: Variable name bound to the current iteration element.
    WorkflowRetry:
      type: object
      description: Retry policy for a workflow step after a recoverable failure.
      additionalProperties: false
      properties:
        error_equals:
          type: array
          description: Error class names this policy applies to. Retries all errors when omitted.
          items:
            type: string
        max_retries:
          type: integer
          minimum: 0
          description: Maximum number of retry attempts. Zero disables retries.
        base_delay:
          type: string
          description: Go duration string.
        max_delay:
          type: string
          description: Go duration string.
        backoff_rate:
          type: number
          description: Exponential backoff multiplier applied to the delay after each attempt.
        jitter_strategy:
          type: string
          enum:
          - NONE
          - FULL
          description: 'Jitter strategy to apply to the computed delay: NONE or FULL.'
        timeout:
          type: string
          description: Go duration string.
    WorkflowCatch:
      type: object
      description: Error routing rule that transfers execution to another step.
      required:
      - error_equals
      - next
      additionalProperties: false
      properties:
        error_equals:
          type: array
          description: Error class names this catch clause handles.
          items:
            type: string
        next:
          type: string
          description: Step name to transition to when this clause is matched.
        store:
          type: string
          description: State variable name where the caught error is stored.
    WorkflowJoinConfig:
      type: object
      additionalProperties: false
      description: Waits for one or more parallel branches to complete before proceeding.
      properties:
        branches:
          type: array
          items:
            type: string
          description: Branch names to wait for. Defaults to all branches if omitted.
        count:
          type: integer
          minimum: 0
          description: Minimum number of branches that must complete. Defaults to all listed
            branches.
        branch_mappings:
          type: object
          additionalProperties:
            type: string
          description: Maps branch names to variable names for storing per-branch results.
    WorkflowWaitSignalConfig:
      type: object
      required:
      - topic
      - timeout
      additionalProperties: false
      description: Suspends the run until a signal with the matching topic arrives.
      properties:
        topic:
          type: string
          description: Signal topic to wait on. Must match the `name` field in POST /v1/projects/{project}/runs/{id}/signals.
        timeout:
          type: string
          description: Maximum wait duration as a Go duration string (e.g. "24h", "30m").
        store:
          type: string
          description: Variable name to store the signal payload in after resumption.
        on_timeout:
          type: string
          description: Step name to transition to if the timeout elapses without a signal.
            Fails the run if omitted.
    WorkflowSleepConfig:
      type: object
      description: Configuration for a sleep step.
      required:
      - duration
      additionalProperties: false
      properties:
        duration:
          type: string
          description: Go duration string.
    WorkflowPauseConfig:
      type: object
      description: Configuration for a manual pause step.
      additionalProperties: false
      properties:
        reason:
          type: string
          description: Optional human-readable reason displayed when the run is paused.
    WorkflowInteractionConfig:
      type: object
      description: Configuration for an interaction step that waits on a response.
      required:
      - type
      - message
      - target
      - timeout
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
          - approval
          - review
          - input
          description: 'Interaction kind: approval requires a yes/no decision, review requests
            acknowledgement, input collects free-form data.'
        message:
          type: string
          description: Prompt message shown to the interaction recipient.
        context:
          type: object
          additionalProperties: true
          description: Arbitrary key-value context passed alongside the interaction for rendering.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        timeout:
          type: string
          description: Go duration string.
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: User, group, or agent that should receive the interaction.
        require_all:
          type: boolean
          description: When true, all group members must respond before the interaction completes.
            Only meaningful when type is `group`.
    WorkflowDefinitionSummary:
      type: object
      additionalProperties: true
      description: Workflow definition metadata without the executable `spec`. Returned by
        list endpoints; fetch a single definition via `getWorkflow` to get the full spec.
      required:
      - id
      - name
      - handle
      - latest_version
      - created_by
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this workflow definition.
        name:
          type: string
          description: Human-readable workflow name.
        handle:
          type: string
          description: URL-safe slug, unique within the project. Used to reference this workflow
            in triggers and tools.
        description:
          type: string
          description: Optional description of the workflow's purpose.
        latest_version:
          type: integer
          description: The current highest version number. Starts at 1 and increments with
            each spec update.
        published_as_tool:
          type: boolean
          description: When true, this workflow is exposed as a callable tool via /api/tools.
        created_by:
          type: string
          description: User ID of the org member who created this workflow definition.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this workflow. Inherited by runs at start
            time; see `WorkflowRun.tags`.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this workflow definition was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this workflow definition was last updated.
    WorkflowDefinition:
      description: Full workflow definition including the executable `spec`. Returned by `getWorkflow`,
        `createWorkflow`, and `updateWorkflow`.
      allOf:
      - $ref: '#/components/schemas/WorkflowDefinitionSummary'
      - type: object
        required:
        - spec
        properties:
          spec:
            $ref: '#/components/schemas/WorkflowSpec'
            description: Executable workflow spec for this definition.
    WorkflowDefinitionListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of workflow definition summaries.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/WorkflowDefinitionSummary'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateWorkflowRequest:
      type: object
      additionalProperties: false
      description: Creates a saved workflow definition and its first immutable version.
      required:
      - name
      - spec
      properties:
        name:
          type: string
          description: Human-readable workflow name, unique within the project.
        handle:
          type: string
          description: URL-safe handle for this workflow, unique within the project. Auto-derived
            from name if omitted.
        description:
          type: string
          description: Optional description of the workflow's purpose.
        published_as_tool:
          type: boolean
          description: When true, expose this workflow as a callable tool via /api/tools.
        spec:
          $ref: '#/components/schemas/WorkflowSpec'
          description: Executable workflow spec to persist as version 1.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateWorkflowRequest:
      type: object
      additionalProperties: false
      description: Updates workflow metadata and optionally creates a new immutable version
        when `spec` changes.
      properties:
        name:
          type: string
          description: Replacement human-readable workflow name.
        description:
          type: string
          description: Replacement description. Omit to leave unchanged.
        published_as_tool:
          type: boolean
          description: When true, expose this workflow as a callable tool via /api/tools.
        spec:
          $ref: '#/components/schemas/WorkflowSpec'
          description: Replacement executable workflow spec. Supplying this creates a new
            version.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the workflow's tag set. Omit to leave tags
            unchanged.
    WorkflowVersionSummary:
      type: object
      additionalProperties: true
      description: Workflow version metadata without the executable `spec`. Returned by `listWorkflowVersions`.
      required:
      - id
      - version
      - created_by
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this workflow version.
        version:
          type: integer
          description: Monotonically increasing version number. Starts at 1.
        created_by:
          type: string
          description: User ID of the org member who created this version.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this version was created.
    WorkflowVersion:
      description: Full workflow version including the executable `spec`.
      allOf:
      - $ref: '#/components/schemas/WorkflowVersionSummary'
      - type: object
        required:
        - spec
        properties:
          spec:
            $ref: '#/components/schemas/WorkflowSpec'
            description: Executable workflow spec captured for this immutable version.
    WorkflowVersionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated list of immutable versions for one workflow definition. Version
        histories are expected to stay small enough to return in one response; fetch an individual
        version to retrieve its executable spec.
      properties:
        items:
          type: array
          description: The list of workflow versions, newest first.
          items:
            $ref: '#/components/schemas/WorkflowVersionSummary'
    WorkflowRunStatus:
      type: string
      enum:
      - active
      - completed
      - failed
      description: Public run lifecycle. Path-level fields explain why an active run is working,
        waiting, sleeping, retrying, paused, or blocked at a join.
    WorkflowRunPathState:
      type: string
      enum:
      - working
      - waiting
      - completed
      - failed
      description: Current state of one execution path.
    WorkflowRunWaitKind:
      type: string
      enum:
      - sleep
      - signal
      - interaction
      - pause
      - join
      - retry
      description: What a waiting path is blocked on.
    WorkflowRunWaitDetail:
      type: object
      additionalProperties: false
      required:
      - kind
      properties:
        kind:
          $ref: '#/components/schemas/WorkflowRunWaitKind'
        wake_at:
          type: string
          format: date-time
          description: Earliest time the runtime should inspect or resume this path.
        signal_name:
          type: string
          description: Signal name this path is waiting for.
        interaction_id:
          type: string
          description: Pending interaction linked to this wait.
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: Interaction target, when kind is `interaction`.
        reason:
          type: string
          description: Human-readable pause or wait reason.
        join_step:
          type: string
          description: Join step this path is waiting at.
        waiting_for_paths:
          type: array
          items:
            type: string
          description: Path IDs still required before a join can proceed.
        attempt:
          type: integer
          description: Retry attempt number for `retry` waits.
        max_attempts:
          type: integer
          description: Maximum attempts for `retry` waits.
    WorkflowRunPath:
      type: object
      additionalProperties: false
      required:
      - path_id
      - state
      properties:
        path_id:
          type: string
          description: Stable execution path identifier, e.g. `main` or `main/each/0`.
        state:
          $ref: '#/components/schemas/WorkflowRunPathState'
        waiting_on:
          $ref: '#/components/schemas/WorkflowRunWaitDetail'
          description: Present when `state` is `waiting`.
        error_type:
          type: string
          description: Path-local failure type when state is `failed`.
        error_message:
          type: string
          description: Path-local failure message when state is `failed`.
    WorkflowRunPathCounts:
      type: object
      additionalProperties: false
      required:
      - total
      - active
      - working
      - waiting
      - completed
      - failed
      description: 'Current path counts. Invariants: `total = working + waiting + completed
        + failed`; `active = working + waiting`.'
      properties:
        total:
          type: integer
        active:
          type: integer
        working:
          type: integer
        waiting:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
    WorkflowRunWaitSummary:
      type: object
      additionalProperties: false
      required:
      - waiting_paths
      - kind_counts
      - next_wake_at
      - waiting_on_signal_names
      - interaction_ids
      description: Always-present aggregate of waiting paths.
      properties:
        waiting_paths:
          type: integer
        kind_counts:
          type: object
          additionalProperties:
            type: integer
          description: Count of waiting paths by `waiting_on.kind`.
        next_wake_at:
          type: string
          format: date-time
          nullable: true
          description: Earliest wake time among waiting paths, or null.
        waiting_on_signal_names:
          type: array
          items:
            type: string
        interaction_ids:
          type: array
          items:
            type: string
    WorkflowRunError:
      type: object
      additionalProperties: false
      required:
      - error_type
      - error_message
      properties:
        path_id:
          type: string
        error_type:
          type: string
        error_message:
          type: string
    WorkflowRun:
      type: object
      description: Runtime record for one workflow execution.
      additionalProperties: true
      required:
      - id
      - workflow_name
      - status
      - path_counts
      - wait_summary
      - errors
      - attempt
      - ephemeral
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this run.
        queue:
          type: string
          description: Queue this run was enqueued on.
        parent_run_id:
          type: string
          description: ID of the parent run, when this is a child run spawned by a fan-out
            step.
        definition_id:
          type: string
          description: ID of the workflow definition this run was started from. Present only
            when `ephemeral` is false; omitted for ephemeral runs started from an inline spec.
        definition_version:
          type: integer
          description: Version number of the workflow definition this run was started from.
            Present only when `ephemeral` is false.
        ephemeral:
          type: boolean
          description: True when the run was started from an inline spec rather than a saved
            workflow definition. Derived server-side; always present on the response. When
            true, `definition_id` and `definition_version` are omitted.
        workflow_name:
          type: string
          description: Name of the workflow as recorded at run creation time.
        status:
          $ref: '#/components/schemas/WorkflowRunStatus'
          description: Public lifecycle for this run.
        path_counts:
          $ref: '#/components/schemas/WorkflowRunPathCounts'
          description: Current path counts derived from the run projection.
        wait_summary:
          $ref: '#/components/schemas/WorkflowRunWaitSummary'
          description: Always-present aggregate of waiting paths.
        errors:
          type: array
          description: Run-level errors that caused a failed lifecycle.
          items:
            $ref: '#/components/schemas/WorkflowRunError'
        attempt:
          type: integer
          description: Retry attempt number (1-based). Increments each time the run is retried.
        inputs:
          type: object
          additionalProperties: true
          description: Input values provided when the run was started.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this run. Inherited from the parent workflow
            at start time, with caller-supplied overrides merged on top. System tags (`mobius:*`)
            are read-only.
        error_message:
          type: string
          description: Error message from the most recent failure. Present when status is
            failed.
        actor_type:
          type: string
          description: Type of the actor that started this run (user, service_account, system).
        actor_id:
          type: string
          description: ID of the actor that started this run.
        initiated_by:
          type: string
          description: Human-readable label for the initiator (e.g. trigger name, API key
            name).
        external_id:
          type: string
          description: Caller-supplied idempotency key or correlation ID.
        cancel_requested:
          type: boolean
          description: Compatibility boolean set when cancellation was requested. Use `cancel_requested_at`
            for audit detail and `status` for terminal checks.
        cancel_requested_at:
          type: string
          format: date-time
          description: Timestamp when cancellation was requested.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this run was created.
        started_at:
          type: string
          format: date-time
          description: Timestamp when a worker first claimed this run.
        completed_at:
          type: string
          format: date-time
          description: Timestamp when this run reached a terminal state.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this run was last updated.
        wall_clock_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will fail this run with `error_type=run_timeout`
            if it has not reached a terminal state. Present only when `resolved_config` contains
            an entry with `category="timeouts"` and `key="wall_clock"` whose value resolves
            to a finite duration. Anchored to `created_at`.
        error_type:
          type: string
          enum:
          - run_timeout
          - run_cancelled
          - job_failed
          - run_failed
          description: 'Typed run-level failure cause: `run_timeout`, `run_cancelled`, `job_failed`,
            or `run_failed`. Its own vocabulary, not a superset of the job-level `error_type`.
            Present when `status=failed`.'
        resolved_config:
          $ref: '#/components/schemas/ResolvedConfig'
          description: Run-level cascade config frozen when the run was started.
        default_job_config:
          $ref: '#/components/schemas/ResolvedConfig'
          description: Default job-level cascade config inherited by jobs unless a step overrides
            it.
    WorkflowRunListResponse:
      type: object
      description: Paginated list of workflow runs.
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/WorkflowRun'
        has_more:
          type: boolean
          description: True when more pages are available.
        next_cursor:
          type: string
          description: Opaque cursor for fetching the next page. Present only when has_more
            is true.
    WorkflowRunDetail:
      description: Detailed workflow run including its spec snapshot, terminal result, and
        jobs.
      allOf:
      - $ref: '#/components/schemas/WorkflowRun'
      - type: object
        required:
        - paths
        properties:
          paths:
            type: array
            description: Current path-level execution projection for this run.
            items:
              $ref: '#/components/schemas/WorkflowRunPath'
          spec:
            $ref: '#/components/schemas/WorkflowSpec'
            description: Spec snapshot used to execute this run.
          result_b64:
            type: string
            description: Base64-encoded terminal result blob
          jobs:
            type: array
            description: Jobs spawned by this run.
            items:
              $ref: '#/components/schemas/Job'
    StartSavedRunRequest:
      type: object
      additionalProperties: false
      required:
      - mode
      - definition_id
      description: 'Run a previously-created workflow definition. Selected by `mode: saved`
        on `POST /v1/projects/{project}/runs`. The run inherits the workflow definition''s
        tags at start time; see the `tags` field below for the override rules.'
      properties:
        mode:
          type: string
          enum:
          - saved
          description: Discriminator value — must be `saved`.
        definition_id:
          type: string
          description: ID of an existing workflow definition to run.
        queue:
          type: string
          description: Queue name to enqueue the run on. Defaults to "default".
        inputs:
          type: object
          additionalProperties: true
          description: Input values to pass to the workflow. Must conform to the workflow's
            declared input schema.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run for filtering and
            display.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Tags applied on top of the workflow definition's inherited tags. Caller
            keys override on conflict; an entry whose value is the empty string opts the inherited
            key out entirely (so the run does not carry it). Setting a tag value to "" is
            therefore reserved as the opt-out signal — use a placeholder value if you actually
            want a stored empty value.
        external_id:
          type: string
          description: Caller-supplied idempotency key or correlation ID attached to the run.
        config:
          $ref: '#/components/schemas/ConfigEntries'
          description: Run-level cascade config overrides applied when starting the run.
    StartInlineRunRequest:
      type: object
      additionalProperties: false
      required:
      - mode
      - spec
      description: 'Run an ephemeral workflow from an inline spec. Selected by `mode: inline`
        on `POST /v1/projects/{project}/runs`. No `WorkflowDefinition` is persisted; the spec
        is snapshotted onto the returned run.'
      properties:
        mode:
          type: string
          enum:
          - inline
          description: Discriminator value — must be `inline`.
        spec:
          $ref: '#/components/schemas/WorkflowSpec'
          description: Inline executable spec to snapshot onto the ephemeral run.
        queue:
          type: string
          description: Queue name to enqueue the run on. Defaults to "default".
        inputs:
          type: object
          additionalProperties: true
          description: Input values to pass to the workflow. Must conform to the workflow's
            declared input schema.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run for filtering and
            display.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tags for this inline run. Inline runs have no parent workflow
            definition, so there is nothing to inherit from — every tag on the run comes from
            this map.
        external_id:
          type: string
          description: Caller-supplied idempotency key or correlation ID attached to the run.
        config:
          $ref: '#/components/schemas/ConfigEntries'
          description: Run-level cascade config overrides applied when starting the run.
    StartRunRequest:
      description: |-
        Request body for `POST /v1/projects/{project}/runs`. Discriminated by
        `mode`:
        - `saved` — body conforms to `StartSavedRunRequest`.
        - `inline` — body conforms to `StartInlineRunRequest`.
      oneOf:
      - $ref: '#/components/schemas/StartSavedRunRequest'
      - $ref: '#/components/schemas/StartInlineRunRequest'
      discriminator:
        propertyName: mode
        mapping:
          saved: '#/components/schemas/StartSavedRunRequest'
          inline: '#/components/schemas/StartInlineRunRequest'
    StartBoundRunRequest:
      type: object
      additionalProperties: false
      description: 'Request body for `POST /v1/projects/{project}/workflows/{id}/runs`. The
        definition to run is identified by the path parameter, so neither `mode` nor `definition_id`
        appear here. Inline specs are not allowed on this route — use `POST /v1/projects/{project}/runs`
        with `mode: inline` instead.'
      properties:
        queue:
          type: string
          description: Queue name to enqueue the run on. Defaults to "default".
        inputs:
          type: object
          additionalProperties: true
          description: Input values to pass to the workflow. Must conform to the workflow's
            declared input schema.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run for filtering and
            display.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Tags applied on top of the bound workflow definition's inherited tags.
            Caller keys override on conflict; an entry whose value is the empty string opts
            the inherited key out entirely (so the run does not carry it). Setting a tag value
            to "" is therefore reserved as the opt-out signal — use a placeholder value if
            you actually want a stored empty value.
        external_id:
          type: string
          description: Caller-supplied idempotency key or correlation ID attached to the run.
        config:
          $ref: '#/components/schemas/ConfigEntries'
          description: Run-level cascade config overrides applied when starting the bound
            workflow.
    ConfigEntry:
      type: object
      description: One cascade config override entry.
      required:
      - category
      - key
      - value
      additionalProperties: false
      properties:
        category:
          type: string
          description: Config category token, for example `timeouts`.
        key:
          type: string
          description: Config key within the category, for example `execution`.
        value:
          type: string
          description: Raw string value interpreted by the category-specific parser.
    ConfigEntries:
      type: array
      items:
        $ref: '#/components/schemas/ConfigEntry'
      description: Flat cascade config input used outside authored workflow YAML. Each entry
        addresses one `(category, key)` pair. Unknown categories or unknown keys under a known
        category are rejected at write time. The only category shipped in Phase 1 is `timeouts`,
        whose keys are `claim`, `liveness`, `execution`, `wall_clock`.
    ResolvedConfig:
      type: array
      items:
        $ref: '#/components/schemas/ResolvedConfigEntry'
      description: Frozen cascade resolution in flat entry form. Keys unset at every layer
        are omitted. See PRD 035.
    ResolvedConfigEntry:
      type: object
      description: One cascade config value after layer resolution.
      required:
      - category
      - key
      - value
      - source
      additionalProperties: false
      properties:
        category:
          type: string
          description: Config category token, for example `timeouts`.
        key:
          type: string
          description: Resolved key within the category.
        value:
          type: string
          description: Resolved raw string value.
        source:
          type: string
          enum:
          - service
          - project
          - workflow
          - run
          - step
          description: 'Cascade layer that supplied the winning value: service, project, workflow,
            run, or step.'
    ActionLogEntry:
      type: object
      description: One server-side action invocation recorded for a workflow run.
      additionalProperties: false
      required:
      - id
      - action
      - step_name
      - branch_id
      - started_at
      - duration_ms
      properties:
        id:
          type: string
          description: Unique identifier for this action log entry.
        action:
          type: string
          description: Action name that was executed.
        step_name:
          type: string
          description: Workflow step name that produced this action log entry.
        branch_id:
          type: string
          description: Execution branch this entry belongs to.
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters that were passed to the action.
        result:
          type: object
          additionalProperties: true
          description: Output returned by the action. Present on success.
        error:
          type: string
          description: Error message when the action failed.
        started_at:
          type: string
          format: date-time
          description: Timestamp when the action execution started.
        duration_ms:
          type: integer
          description: Elapsed time in milliseconds from start to completion.
    ActionLogListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated action log for one workflow run. Entries are scoped to a single
        run and ordered for inspection rather than broad search.
      properties:
        items:
          type: array
          description: The list of action log entries for this run.
          items:
            $ref: '#/components/schemas/ActionLogEntry'
    JobStatus:
      type: string
      enum:
      - pending
      - claimed
      - completed
      - failed
      description: |-
        Job lifecycle state:
        - `pending`   — created, not yet claimed by a worker.
        - `claimed`   — held under an active worker lease.
        - `completed` — terminal success.
        - `failed`    — terminal failure; may follow retries.
    Job:
      type: object
      additionalProperties: false
      required:
      - id
      - run_id
      - step_name
      - action
      - queue
      - status
      - attempt
      - max_attempts
      - scheduled_at
      - created_at
      - updated_at
      description: A claimable unit of work derived from a single workflow step execution.
      properties:
        id:
          type: string
          description: Unique identifier for this job.
        run_id:
          type: string
          description: The workflow run this job belongs to.
        parent_job_id:
          type: string
          description: Set when this job is a child of a fan-out (each) step.
        path_id:
          type: string
          description: Opaque identifier for the execution path within the run (used for fan-out
            deduplication).
        step_name:
          type: string
          description: Workflow step name this job was created for.
        action:
          type: string
          description: Action name the worker must execute to complete this job.
        queue:
          type: string
          description: Queue the job was placed in. Workers subscribe to queues to receive
            jobs.
        parameters:
          type: object
          additionalProperties: true
          description: Resolved input parameters to pass to the action.
        status:
          $ref: '#/components/schemas/JobStatus'
          description: Current job lifecycle state.
        claimed_by:
          type: string
          description: Worker ID that claimed this job.
        agent_id:
          type: string
          description: Agent ID the claiming worker is acting on behalf of.
        agent_session_id:
          type: string
          description: Agent session ID provided during the claim.
        claimed_at:
          type: string
          format: date-time
          description: Timestamp when this job was claimed by a worker.
        heartbeat_at:
          type: string
          format: date-time
          description: Timestamp of the most recent heartbeat. Used to detect stale claims.
        attempt:
          type: integer
          description: Current attempt number (1-based). Increments on each retry.
        max_attempts:
          type: integer
          description: Maximum number of attempts before the job is permanently failed.
        scheduled_at:
          type: string
          format: date-time
          description: Earliest time at which this job may be claimed.
        last_error:
          type: string
          description: Error detail from the most recent failed attempt.
        claim_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will fail this job with `error_type=claim_timeout`
            if no worker has claimed it. Present only when `resolved_config` contains an entry
            with `category="timeouts"` and `key="claim"` whose value resolves to a finite
            duration. Re-stamped whenever the job returns to `pending`.
        liveness_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will either reset (retries remain) or
            fail this job with `error_type=liveness_timeout` if the worker has not heartbeated
            in time. Present only when `resolved_config` contains an entry with `category="timeouts"`
            and `key="liveness"` whose value resolves to a finite duration and the job is
            claimed.
        execution_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will fail this job with `error_type=execution_timeout`
            if it has not completed. Present only when `resolved_config` contains an entry
            with `category="timeouts"` and `key="execution"` whose value resolves to a finite
            duration.
        error_type:
          type: string
          description: Failure cause. Server-produced timeout and cancellation failures use
            stable tokens such as `claim_timeout`, `liveness_timeout`, `execution_timeout`,
            `run_cancelled`, `run_timeout`, and `run_failed`; worker-reported failures may
            use caller-defined class names. Present when `status=failed`.
        resolved_config:
          $ref: '#/components/schemas/ResolvedConfig'
          description: Job-level cascade config resolved for this job.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this job was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this job was last updated.
    JobListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated list of jobs spawned by one workflow run. This is scoped to
        a single run for debugging and execution inspection rather than a project-wide search
        surface.
      properties:
        items:
          type: array
          description: The list of jobs for this run.
          items:
            $ref: '#/components/schemas/Job'
    SendRunSignalRequest:
      type: object
      description: Delivers an external signal to a workflow run.
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Signal topic (e.g. "approval", "webhook").
        payload:
          type: object
          additionalProperties: true
          description: Arbitrary payload delivered to the waiting step when the signal is
            received.
    RunSignal:
      type: object
      description: Persisted external signal delivered to a workflow run.
      additionalProperties: false
      required:
      - id
      - run_id
      - name
      properties:
        id:
          type: string
          description: Unique identifier for this signal.
        run_id:
          type: string
          description: ID of the run this signal was delivered to.
        name:
          type: string
          description: Signal topic name matching the wait_signal step's topic.
    InteractionTarget:
      type: object
      required:
      - type
      - id
      additionalProperties: false
      description: 'Identifies who should receive an interaction request. Note: distinct from
        the caller/audit `Actor` vocabulary — a target is a *recipient*, not someone who has
        acted yet.'
      properties:
        type:
          type: string
          enum:
          - user
          - agent
          - group
          description: 'Target kind: a specific user, an agent queue, or a group.'
        id:
          type: string
          description: User ID for user; queue name for agent; group ID or handle for group.
    ActionAnnotationsRequest:
      type: object
      additionalProperties: false
      description: Request hints that describe the safe-use properties of the action. Used
        by the engine and tooling to decide retry behavior, dry-run eligibility, etc. Unknown
        request properties are rejected.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    ActionAnnotationsResponse:
      type: object
      additionalProperties: true
      description: Response hints that describe the safe-use properties of the action. Response
        annotations are forward-compatible so the server can add response-only hints without
        breaking strict clients.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    CreateActionRequest:
      type: object
      additionalProperties: false
      description: Registers a project-owned action endpoint callable from workflow steps.
      required:
      - name
      - endpoint_url
      properties:
        name:
          type: string
          description: Project-scoped identifier used in workflow step definitions. Lowercase
            alphanumeric + hyphens, e.g. "send-email". Must be unique within the project.
            Cannot start with "mobius." (reserved prefix).
        title:
          type: string
          description: Human-readable display name shown in the UI and catalog.
        description:
          type: string
          description: Markdown-safe description of what the action does.
        endpoint_url:
          type: string
          format: uri
          description: HTTP/HTTPS URL Mobius will POST to when invoking the action.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsRequest'
          description: Safe-use hints used by execution and authoring tools.
    UpdateActionRequest:
      type: object
      additionalProperties: false
      description: Updates action metadata, endpoint, schemas, or safe-use hints.
      properties:
        title:
          type: string
          description: Replacement display title.
        description:
          type: string
          description: Replacement Markdown description.
        endpoint_url:
          type: string
          format: uri
          description: Replacement endpoint URL.
        input_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for inputs. Replaces the existing schema.
        output_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for outputs. Replaces the existing schema.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsRequest'
          nullable: true
          description: Pass null to clear all annotation flags.
    Action:
      type: object
      additionalProperties: false
      description: Project-owned HTTP action endpoint callable by workflow steps.
      required:
      - id
      - name
      - endpoint_url
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this action.
        name:
          type: string
          description: Project-scoped stable identifier used in workflow step definitions.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_url:
          type: string
          format: uri
          description: HTTP/HTTPS URL Mobius POSTs to when invoking this action.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsResponse'
          description: Safe-use hints returned for this action.
        signing_secret:
          type: string
          description: Raw HMAC-SHA256 signing secret. Only populated on create and rotate
            responses; null on all other reads. Store this value securely on first receipt
            — it cannot be retrieved again.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this action was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this action was last updated.
    ActionListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of project-owned actions.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Action'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    RotateSecretResult:
      type: object
      additionalProperties: false
      description: New signing secret returned after rotating an action secret.
      required:
      - signing_secret
      properties:
        signing_secret:
          type: string
          description: The new raw signing secret. Store it immediately — this is the only
            time it is returned.
    ActionCatalogEntry:
      type: object
      additionalProperties: false
      description: One project or platform action available to workflow authors.
      required:
      - name
      - source
      - available
      properties:
        name:
          type: string
          description: Action name as used in workflow step definitions.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        integration:
          type: string
          description: Integration slug this action belongs to (e.g. "slack"), if platform-provided.
        source:
          type: string
          description: 'Origin of this action: "project" for project-owned actions, or the
            integration slug for platform-provided actions.'
        available:
          type: boolean
          description: Whether this action can currently be invoked. False if the required
            integration is not connected or the caller lacks permission.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsResponse'
          description: Safe-use hints returned for this catalog action.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        endpoint_url:
          type: string
          format: uri
          description: Endpoint URL (populated for project-owned actions only).
    ActionCatalogListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated project action catalog. This endpoint returns the complete
        set of available project and platform actions so clients can build pickers without
        paging across a small catalog.
      properties:
        items:
          type: array
          description: The full list of catalog entries.
          items:
            $ref: '#/components/schemas/ActionCatalogEntry'
    ActionAuditLogEntry:
      type: object
      additionalProperties: false
      description: Audit record for one action invocation.
      required:
      - id
      - action_name
      - source
      - status
      - retry_count
      - started_at
      - finished_at
      properties:
        id:
          type: string
          description: Unique identifier for this audit log entry.
        run_id:
          type: string
          description: Workflow run that triggered this invocation, if run-backed.
        step_name:
          type: string
          description: Workflow step name that triggered this invocation.
        action_name:
          type: string
          description: Name of the action that was invoked.
        source:
          type: string
          description: Invocation source ("workflow", "direct", etc.).
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters passed to the action.
        output_summary:
          type: object
          additionalProperties: true
          description: Truncated or summarized action output for audit purposes.
        status:
          type: string
          description: Terminal invocation status ("success", "failed", etc.).
        retry_count:
          type: integer
          description: Number of retry attempts before this terminal status was reached.
        started_at:
          type: string
          format: date-time
          description: Timestamp when this invocation started.
        finished_at:
          type: string
          format: date-time
          description: Timestamp when this invocation completed.
        error_type:
          type: string
          description: Machine-readable error classification when status is "failed".
        error_message:
          type: string
          description: Human-readable error detail when status is "failed".
    ActionAuditLogListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of action invocation audit records.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ActionAuditLogEntry'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    JobClaimRequest:
      type: object
      additionalProperties: false
      required:
      - worker_id
      properties:
        worker_id:
          type: string
          description: Caller-assigned stable identifier for this worker process. Used as
            the lease fence and for worker registry tracking.
        agent_id:
          type: string
          description: Durable agent identity the worker is acting on behalf of.
        agent_session_id:
          type: string
          description: Live agent session the worker is acting on behalf of.
        worker_name:
          type: string
          description: Optional human-readable name shown in the worker list.
        worker_version:
          type: string
          description: Optional version string shown in the worker list.
        queues:
          type: array
          description: Queue names the worker subscribes to. When empty the worker claims
            from any queue in the project. Workflow runs default to the "default" queue when
            not otherwise specified.
          items:
            type: string
        actions:
          type: array
          description: Action names this worker can execute. When provided, only jobs whose
            `action` is in this list are returned. When empty, action filtering is skipped.
          items:
            type: string
        wait_seconds:
          type: integer
          minimum: 0
          maximum: 30
          description: How long to hold the request open waiting for a job to surface. 0 returns
            immediately. Capped at 30 by the server.
    JobClaim:
      type: object
      additionalProperties: false
      description: Lease handed to a worker after a successful claim. It contains the action
        to run, resolved parameters, and fencing values the worker must echo on heartbeat,
        event, and complete calls.
      required:
      - job_id
      - run_id
      - workflow_name
      - step_name
      - action
      - attempt
      - queue
      - parameters
      properties:
        job_id:
          type: string
          description: Job ID — use as the `{id}` path parameter for heartbeat, complete,
            and events.
        run_id:
          type: string
          description: Parent workflow run ID.
        workflow_name:
          type: string
          description: Handle of the workflow definition that owns this run.
        step_name:
          type: string
          description: Step label from the workflow spec — used for UI and interaction signal
            name derivation.
        action:
          type: string
          description: Action name the worker must execute for this step.
        agent_id:
          type: string
          description: Agent that should execute this job, when the step is agent-targeted.
        agent_session_id:
          type: string
          description: Agent session the job was routed to, when applicable.
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters for this step, resolved from the workflow spec and
            prior step outputs.
        attempt:
          type: integer
          description: 1-based attempt counter. Incremented on each automatic retry. Include
            in the fence for all subsequent heartbeat and complete calls.
        queue:
          type: string
          description: Queue name the job was claimed from.
        heartbeat_interval_seconds:
          type: integer
          description: Recommended heartbeat interval in seconds. Workers should call `POST
            /v1/projects/{project}/jobs/{id}/heartbeat` at this cadence to keep the lease
            alive. Typically 30 seconds.
    JobHeartbeatDirectives:
      type: object
      additionalProperties: false
      description: Server instructions returned with a heartbeat. Workers should inspect this
        on every heartbeat so cancellation and future control signals can interrupt long-running
        work promptly.
      properties:
        should_cancel:
          type: boolean
          default: false
          description: 'When true, the run has received a cancellation request. The worker
            must stop processing immediately and call complete with `status: failed`.'
    JobHeartbeat:
      type: object
      additionalProperties: false
      description: Heartbeat acknowledgement for a claimed job. A successful response means
        the worker still owns the lease and should continue unless the directives say otherwise.
      required:
      - ok
      - directives
      properties:
        ok:
          type: boolean
          description: True when the lease was successfully refreshed.
        directives:
          $ref: '#/components/schemas/JobHeartbeatDirectives'
          description: Server instructions the worker should observe after the heartbeat.
    JobFenceRequest:
      type: object
      additionalProperties: false
      required:
      - worker_id
      - attempt
      properties:
        worker_id:
          type: string
          description: Must match the `worker_id` from the original claim.
        attempt:
          type: integer
          description: Must match the `attempt` from the original claim.
    JobCompleteRequest:
      type: object
      additionalProperties: false
      required:
      - worker_id
      - attempt
      - status
      properties:
        worker_id:
          type: string
          description: Must match the `worker_id` from the original claim.
        attempt:
          type: integer
          description: Must match the `attempt` from the original claim.
        status:
          type: string
          enum:
          - completed
          - failed
          description: 'Terminal status for this job attempt: `completed` or `failed`. `failed`
            triggers the workflow engine''s retry logic if `attempt < max_attempts`.'
        result_b64:
          type: string
          description: Base64-encoded (standard encoding) bytes representing the job's output.
            The workflow engine decodes this and may pass it as input to downstream steps.
            Omit if the step produces no output.
        error_type:
          type: string
          description: 'Short error class identifier (e.g. "TimeoutError"). Used for observability
            and retry classification. Only relevant when `status: failed`.'
        error_message:
          type: string
          description: Human-readable error detail. Only relevant for failed status.
    RunActionRequest:
      type: object
      additionalProperties: false
      properties:
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters passed to the action handler.
        timeout_seconds:
          type: integer
          minimum: 0
          description: Override the default action execution timeout.
        dry_run:
          type: boolean
          description: When true, invokes the action without side effects. Only effective
            for actions that support dry-run mode.
    RunActionResult:
      type: object
      additionalProperties: false
      required:
      - output
      properties:
        output:
          oneOf:
          - type: object
            additionalProperties: true
          - type: array
            items: {}
          - type: string
          - type: number
          - type: integer
          - type: boolean
          description: Free-form output returned by the action handler.
    JobEventsRequest:
      type: object
      additionalProperties: false
      required:
      - worker_id
      - attempt
      - events
      description: 'Fenced batch of custom run events published by the worker holding a job''s
        lease. The fence is per-request: every event in `events` is published under the same
        `worker_id` + `attempt` pair.'
      properties:
        worker_id:
          type: string
          description: Must match the `worker_id` from the original claim.
        attempt:
          type: integer
          description: Must match the `attempt` from the original claim.
        events:
          type: array
          description: The batch of events to publish. All events are validated atomically.
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/JobEventEntry'
    JobEventEntry:
      type: object
      additionalProperties: false
      description: Custom progress or telemetry event emitted while a worker owns a job. Use
        these events to stream domain-specific status into run timelines without changing
        the job completion payload.
      required:
      - type
      - payload
      properties:
        type:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^[a-zA-Z0-9_.-]+$
          description: Caller-chosen event type identifier. The `mobius.` prefix is reserved
            for server-emitted well-known kinds and is rejected with 400.
        payload:
          type: object
          additionalProperties: true
          description: Free-form JSON payload. Bounded by the server-side byte limit (default
            16 KiB per event); oversize payloads are rejected with 413.
    InteractionType:
      type: string
      enum:
      - approval
      - review
      - input
      description: 'Interaction kind: `approval` captures a decision, `review` captures acknowledgement
        or notes, and `input` collects free-form data.'
    CreateJobInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - target
      - type
      - message
      description: Creates an interaction from a claimed job context. The server derives the
        owning run from the job and may derive the signal name when omitted.
      properties:
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: User, group, or agent that should receive the interaction.
        type:
          $ref: '#/components/schemas/InteractionType'
          description: Interaction kind that determines the response workflow.
        message:
          type: string
          description: Message shown to the responder.
        signal_name:
          type: string
          description: Optional signal name override. When omitted, the server derives the
            signal name from step_name or falls back to a default interaction signal name.
        step_name:
          type: string
          description: Optional workflow step label for UI/debugging context
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the message.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When target.type is "group", setting require_all=true means all snapshotted
            group members must respond before the interaction is considered complete. Ignored
            for non-group targets. Defaults to false when omitted.
        timeout:
          type: string
          description: Optional duration string (e.g. "24h", "30m") specifying how long the
            interaction should remain open before expiring. When absent the caller is responsible
            for setting expires_at directly.
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires.
    InteractionResponder:
      type: object
      required:
      - type
      - id
      additionalProperties: false
      description: Identifies who answered an interaction. Groups cannot themselves respond
        — only a user within a group — so `group` is not a valid responder type.
      properties:
        type:
          type: string
          enum:
          - user
          - agent
          description: 'Responder kind: a user or an agent.'
        id:
          type: string
          description: User ID for user; agent ID for agent.
    InteractionValue:
      description: Free-form JSON payload supplied by the responder.
      oneOf:
      - type: object
        additionalProperties: true
      - type: array
        items: {}
      - type: string
      - type: number
      - type: integer
      - type: boolean
    InteractionResponse:
      type: object
      additionalProperties: false
      description: Final response that completed an interaction.
      required:
      - value
      - at
      properties:
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by the responder.
        comment:
          type: string
          nullable: true
          description: Optional free-text comment from the responder.
        at:
          type: string
          format: date-time
          description: When the response was submitted
    InteractionPartialResponse:
      type: object
      additionalProperties: false
      description: One member response captured while a group interaction waits for all members.
      required:
      - user_id
      - value
      - responded_at
      properties:
        user_id:
          type: string
          description: ID of the user who submitted this partial response.
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by this group member.
        comment:
          type: string
          nullable: true
          description: Optional free-text comment from this responder.
        responded_at:
          type: string
          format: date-time
          description: Timestamp when this response was submitted.
    Interaction:
      type: object
      additionalProperties: false
      description: Human or agent interaction request and its current response state.
      required:
      - id
      - type
      - status
      - target
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this interaction.
        run_id:
          type: string
          nullable: true
          description: Originating workflow run when the interaction is run-backed.
        signal_name:
          type: string
          nullable: true
          description: Signal name used to resume the originating run when run-backed.
        type:
          $ref: '#/components/schemas/InteractionType'
          description: Interaction kind that determines the expected response experience.
        status:
          type: string
          enum:
          - pending
          - completed
          - expired
          description: 'Current status of the interaction: pending, completed, or expired.'
        message:
          type: string
          nullable: true
          description: Human-readable message shown to the responder when supplied.
        context:
          type: object
          additionalProperties: true
          nullable: true
          description: Additional key-value context surfaced in the UI alongside the message
            when supplied.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: Recipient of the interaction.
        responder:
          type: object
          additionalProperties: false
          nullable: true
          description: User or agent that completed the interaction; null until completion.
          $ref: '#/components/schemas/InteractionResponder'
        response:
          type: object
          additionalProperties: false
          nullable: true
          description: Final response payload; null while the interaction is pending or expired
            without a response.
          $ref: '#/components/schemas/InteractionResponse'
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this interaction expires if not responded to.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the interaction received a terminal response.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this interaction was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this interaction was last updated.
        target_group_id:
          type: string
          nullable: true
          description: Resolved group ID (set when target.type = group)
        target_member_snapshot:
          type: array
          items:
            type: string
          nullable: true
          description: User IDs of group members at the time of creation; null for non-group
            targets.
        routing_policy_snapshot:
          type: string
          enum:
          - first_responder
          - all_members
          nullable: true
          description: 'Group routing policy captured at creation time: first_responder or
            all_members. Null for non-group targets.'
        require_all:
          type: boolean
          description: When true, all snapshotted members must respond before completion
        claimed_by:
          type: string
          nullable: true
          description: User ID of the member who claimed this interaction; null until claimed
            and only used for first_responder routing.
        claimed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when a first-responder member claimed this interaction.
        partial_responses:
          type: array
          items:
            $ref: '#/components/schemas/InteractionPartialResponse'
          nullable: true
          description: Per-member responses for all_members routing; null for non-group interactions
            or before any partial responses.
    TriggerKind:
      type: string
      enum:
      - schedule
      - webhook
      - event
      description: 'Determines the event source and required `source_config` shape: schedule,
        webhook, or event.'
    ConcurrencyPolicy:
      type: string
      enum:
      - allow
      - forbid
      - replace
      description: |-
        Controls overlapping runs from the same trigger:
        - `allow` — start new runs unconditionally.
        - `forbid` — skip the new fire if a run from this trigger is still active.
        - `replace` — cancel the active run before starting a new one.
    TriggerFireStatus:
      type: string
      enum:
      - success
      - partial_failure
      - failed
      - skipped
      description: |-
        Outcome of a trigger activation:
        - `success` — all enabled targets started their runs (or no targets configured).
        - `partial_failure` — at least one target failed while others succeeded.
        - `failed` — all targets failed, or a trigger-level error prevented any target.
        - `skipped` — the concurrency policy suppressed the entire activation.
    TriggerTarget:
      type: object
      additionalProperties: false
      required:
      - id
      - trigger_id
      - workflow_id
      - enabled
      - created_at
      - updated_at
      description: A workflow to start when this trigger fires.
      properties:
        id:
          type: string
          description: Unique identifier for this target.
        trigger_id:
          type: string
          description: ID of the trigger this target belongs to.
        workflow_id:
          type: string
          description: ID of the workflow definition to run.
        condition:
          type: string
          description: Expression evaluated against the event payload. The target is skipped
            if this evaluates to false. Omit to always run.
        input_mapping:
          type: object
          additionalProperties:
            type: string
          description: 'Maps workflow input names to JSONPath expressions evaluated against
            the event payload. Example: `{"user_id": "$.event.actor.id"}`.'
        enabled:
          type: boolean
          description: When false, this target is paused and will not start a run when the
            trigger fires.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this target was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this target was last updated.
    TriggerTargetListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated list of targets attached to one trigger. Trigger fan-out is
        configured as a small bounded set rather than a high-volume collection.
      properties:
        items:
          type: array
          description: The list of targets for this trigger.
          items:
            $ref: '#/components/schemas/TriggerTarget'
    CreateTriggerTargetRequest:
      type: object
      additionalProperties: false
      required:
      - workflow_id
      description: Parameters for attaching a workflow target to a trigger.
      properties:
        workflow_id:
          type: string
          description: ID of the workflow definition to run.
        condition:
          type: string
          description: Expression evaluated against the event payload. Omit to always run.
        input_mapping:
          type: object
          additionalProperties:
            type: string
          description: Maps workflow input names to JSONPath expressions.
        enabled:
          type: boolean
          description: Whether this target starts enabled. Defaults to true when omitted.
    UpdateTriggerTargetRequest:
      type: object
      additionalProperties: false
      description: Partial update for a trigger target; omitted fields are unchanged.
      properties:
        workflow_id:
          type: string
          description: Replacement workflow definition ID.
        condition:
          type: string
          description: Replacement condition expression. Set to empty string to remove.
        input_mapping:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Replacement input mapping. Set to null to clear all mappings.
        enabled:
          type: boolean
          description: Set to false to pause this target without removing it.
    TriggerFireTargetResult:
      type: object
      additionalProperties: false
      required:
      - target_id
      - workflow_id
      - status
      description: Outcome of a single target within a trigger fire activation.
      properties:
        target_id:
          type: string
          description: ID of the trigger target that was evaluated.
        workflow_id:
          type: string
          description: ID of the workflow definition that was started (or attempted).
        run_id:
          type: string
          description: ID of the workflow run that was created. Absent when the target failed
            or was skipped.
        status:
          $ref: '#/components/schemas/TriggerFireStatus'
          description: 'Outcome for this target: `started`, `skipped`, or `failed`.'
        error:
          type: string
          description: Error detail when status is `failed`.
    ScheduleSourceConfig:
      type: object
      additionalProperties: false
      minProperties: 1
      maxProperties: 1
      description: Source configuration for `schedule` triggers. Provide exactly one of `cron`
        or `interval`.
      properties:
        cron:
          type: string
          description: 5-field cron expression or @-descriptor, e.g. `0 9 * * 1-5` or `@hourly`.
        interval:
          type: string
          description: Go duration string, e.g. `5m`, `1h`, `30s`. Must be positive.
    WebhookSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `webhook` triggers.
      properties:
        handle:
          type: string
          description: URL-safe handle that determines the inbound `receive_url`. Auto-derived
            from the trigger's `name` when omitted. Must be unique within the project.
        signing_secret:
          type: string
          writeOnly: true
          description: Optional HMAC-SHA256 secret for verifying inbound webhook payloads.
            When set, Mobius validates the `X-Mobius-Signature` header on incoming requests.
            Accepted on create/update; omitted from GET/list responses.
        receive_url:
          type: string
          readOnly: true
          description: Full URL for posting inbound events. Computed from `handle`.
    EventSourceConfig:
      type: object
      additionalProperties: false
      description: Source configuration for `event` triggers.
      properties:
        event_type:
          type: string
          description: Platform event type to match, e.g. `run.completed`.
    TriggerSourceConfig:
      description: Typed source configuration. The shape is determined by the trigger's `kind`
        (`schedule` → `ScheduleSourceConfig`, `webhook` → `WebhookSourceConfig`, `event` →
        `EventSourceConfig`); mismatches are rejected with 400.
      oneOf:
      - $ref: '#/components/schemas/ScheduleSourceConfig'
      - $ref: '#/components/schemas/WebhookSourceConfig'
      - $ref: '#/components/schemas/EventSourceConfig'
    Trigger:
      type: object
      additionalProperties: false
      description: Event source that starts one or more workflow targets.
      required:
      - id
      - name
      - kind
      - concurrency_policy
      - enabled
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this trigger.
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          $ref: '#/components/schemas/TriggerKind'
          description: Trigger source kind that determines the source_config schema.
        source_config:
          $ref: '#/components/schemas/TriggerSourceConfig'
          description: Typed configuration for the trigger source.
        targets:
          type: array
          items:
            $ref: '#/components/schemas/TriggerTarget'
          description: Targets attached to this trigger, populated via join.
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: When false, the trigger is paused and will not fire.
        last_fire_at:
          type: string
          format: date-time
          description: Timestamp of the most recent fire attempt.
        next_fire_at:
          type: string
          format: date-time
          description: Computed next scheduled fire time (schedule triggers only).
        created_by:
          type: string
          description: User ID of the org member who created this trigger.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this trigger.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this trigger was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this trigger was last updated.
    TriggerListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of triggers.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Trigger'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    TriggerFire:
      type: object
      additionalProperties: false
      required:
      - id
      - trigger_id
      - fired_at
      - status
      - created_at
      description: A single trigger fire event and its outcome.
      properties:
        id:
          type: string
          description: Unique identifier for this fire record.
        trigger_id:
          type: string
          description: ID of the trigger that fired.
        scheduled_at:
          type: string
          format: date-time
          description: When the trigger was scheduled to fire (schedule triggers only).
        fired_at:
          type: string
          format: date-time
          description: When the fire was actually processed.
        target_results:
          type: array
          items:
            $ref: '#/components/schemas/TriggerFireTargetResult'
          description: Per-target outcomes for this activation.
        status:
          $ref: '#/components/schemas/TriggerFireStatus'
          description: 'Overall trigger fire outcome: `started`, `skipped`, or `failed`.'
        error:
          type: string
          description: Error detail when status is `failed`.
        dedup_key:
          type: string
          description: Deduplication key used to prevent duplicate fires for the same scheduled
            slot.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this fire record was created.
    TriggerFireListResponse:
      type: object
      additionalProperties: false
      description: Paginated history of trigger fire attempts.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/TriggerFire'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateTriggerRequest:
      description: Creates a trigger. The request is discriminated by `kind`, and each variant
        requires the matching `source_config` schema.
      oneOf:
      - $ref: '#/components/schemas/CreateScheduleTriggerRequest'
      - $ref: '#/components/schemas/CreateWebhookTriggerRequest'
      - $ref: '#/components/schemas/CreateEventTriggerRequest'
      discriminator:
        propertyName: kind
        mapping:
          schedule: '#/components/schemas/CreateScheduleTriggerRequest'
          webhook: '#/components/schemas/CreateWebhookTriggerRequest'
          event: '#/components/schemas/CreateEventTriggerRequest'
    CreateScheduleTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a schedule trigger from a cron expression or fixed interval.
      required:
      - name
      - kind
      - source_config
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          type: string
          enum:
          - schedule
          description: Discriminator value — must be `schedule`.
        source_config:
          $ref: '#/components/schemas/ScheduleSourceConfig'
          description: Schedule-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateWebhookTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates a webhook trigger with an inbound receive URL.
      required:
      - name
      - kind
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          type: string
          enum:
          - webhook
          description: Discriminator value — must be `webhook`.
        source_config:
          $ref: '#/components/schemas/WebhookSourceConfig'
          description: Webhook-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    CreateEventTriggerRequest:
      type: object
      additionalProperties: false
      description: Creates an event trigger for platform-originated events.
      required:
      - name
      - kind
      - source_config
      properties:
        name:
          type: string
          description: Human-readable trigger name, unique within the project.
        kind:
          type: string
          enum:
          - event
          description: Discriminator value — must be `event`.
        source_config:
          $ref: '#/components/schemas/EventSourceConfig'
          description: Event-specific source configuration.
        targets:
          type: array
          description: Workflows to start when this trigger fires (inline convenience; stored
            as sub-resources).
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Whether the trigger starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateTriggerRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        source_config:
          $ref: '#/components/schemas/TriggerSourceConfig'
          description: Replacement source configuration; its shape must match the trigger
            kind.
        targets:
          type: array
          items:
            $ref: '#/components/schemas/CreateTriggerTargetRequest'
          description: Replacement target set for this trigger. Omit to leave targets unchanged;
            send an empty array to remove all targets.
        concurrency_policy:
          $ref: '#/components/schemas/ConcurrencyPolicy'
          description: Replacement policy for overlapping runs started by this trigger.
        enabled:
          type: boolean
          description: Set to false to pause the trigger without deleting it.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the trigger. System tags
            (`mobius:*`) are preserved.
    WorkerSession:
      type: object
      additionalProperties: false
      description: Recently observed worker process for a project. Use sessions to see which
        machines, users, service accounts, or agents are polling for work and whether they
        appear stale.
      required:
      - id
      - stale
      properties:
        id:
          type: string
          description: Caller-assigned stable identifier for this worker process.
        name:
          type: string
          description: Optional human-readable name supplied in the claim request.
        version:
          type: string
          description: Optional version string supplied in the claim request.
        last_seen_at:
          type: string
          format: date-time
          description: Timestamp of this session's most recent job claim poll. Updated on
            every `POST /v1/projects/{project}/jobs/claim` call regardless of whether a job
            was returned. Used to compute `stale`.
        capabilities:
          type: array
          items:
            type: string
          description: Reserved for future capability-based job routing. Not currently used
            for filtering.
        service_account_id:
          type: string
          description: Service account this session authenticated as on register/heartbeat.
            Set when a machine identity is polling; mutually exclusive with `user_id`. Stable
            across credential rotation — use this to group sessions by identity in the admin
            UI.
        user_id:
          type: string
          description: User this session authenticated as on register/heartbeat. Set when
            a human is polling via the CLI; mutually exclusive with `service_account_id`.
        api_key_id:
          type: string
          description: ID of the specific API key this session presented on its most recent
            register/heartbeat. Only set for service-account-backed sessions; changes across
            credential rotations. Use together with `service_account_id` to see rotation progress
            across a fleet.
        agent_id:
          type: string
          description: Agent this session represents, when the polling process declared itself
            as a registered agent (via `agent_id` on the claim request or via inference from
            the service account). Absent for ad-hoc worker processes that are not tied to
            a declared agent.
        stale:
          type: boolean
          description: True when `last_seen_at` is older than 2 minutes or absent. Computed
            at read time, not stored.
    WorkerSessionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of recently seen worker sessions.
          items:
            $ref: '#/components/schemas/WorkerSession'
    ProjectAccessMode:
      type: string
      enum:
      - org_open
      - restricted
      description: '`org_open`: every org member can see and use the project, subject to role
        assignments. `restricted`: only listed project members (and org owners/admins) can
        see or use the project.'
    Project:
      type: object
      additionalProperties: false
      description: Workspace boundary for workflows, actions, credentials, agents, and runtime
        activity. Most operational APIs are project-scoped, so this object tells clients which
        handle to use and who can see the project.
      required:
      - id
      - name
      - handle
      - access_mode
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this project.
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug used as a path segment in all project-scoped API routes.
            Unique within the org. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Current project access policy: `org_open` or `restricted`.'
        created_by:
          type: string
          description: User ID of the org member who created this project.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this project was archived. `null` for active projects.
            Archived projects are read-only and excluded from the default project listing.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this project. See TagMap for syntax and limits.
            Keys with the `mobius:` prefix are system-managed.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this project was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this project was last updated.
    ProjectListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Project'
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug for API routes. Auto-derived from name if omitted. Must
            be unique within the org. Cannot be changed after creation.
        description:
          type: string
          description: Optional human-readable description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Initial project access policy: `org_open` or `restricted`.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        description:
          type: string
          description: Replacement description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Replacement project access policy: `org_open` or `restricted`.'
        seed_existing_members:
          type: boolean
          description: When transitioning from `org_open` to `restricted`, set true to insert
            all current org members as project members so nobody loses visibility on the flip.
            Ignored on other transitions.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the project. System-managed
            tags (`mobius:*`) are preserved.
    ProjectMember:
      type: object
      additionalProperties: false
      description: Explicit project membership used when a project is restricted. Use this
        record to decide who can see or operate on a project outside the default org-wide
        access model.
      required:
      - id
      - project_id
      - user_id
      - added_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        project_id:
          type: string
          description: ID of the project this membership belongs to.
        user_id:
          type: string
          description: ID of the user who is a member.
        user:
          $ref: '#/components/schemas/User'
          description: Profile of the member. Embedded by `listProjectMembers` so UIs can
            render names, emails, and avatars without a separate user lookup. Absent on the
            `addProjectMember` response.
        added_by_actor_type:
          type: string
          description: Actor type of whoever added this member, if recorded.
        added_by_actor_id:
          type: string
          description: Actor ID of whoever added this member, if recorded.
        added_at:
          type: string
          format: date-time
          description: Timestamp when the member was added.
    ProjectMemberListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of members for this project.
          items:
            $ref: '#/components/schemas/ProjectMember'
        has_more:
          type: boolean
          description: Whether more results are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    AddProjectMemberRequest:
      type: object
      additionalProperties: false
      required:
      - user_id
      properties:
        user_id:
          type: string
          description: User ID of the org member to add to this project.
    User:
      type: object
      additionalProperties: false
      description: Human identity known to the organization. User records are useful for membership
        lists, role assignment UIs, attribution, and displaying profile information next to
        actions.
      required:
      - id
      - email
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Clerk user ID. Stable and globally unique across all orgs.
        email:
          type: string
          description: Primary email address from Clerk.
        first_name:
          type: string
          description: User's first name from their Clerk profile.
        last_name:
          type: string
          description: User's last name from their Clerk profile.
        avatar_url:
          type: string
          description: Profile avatar URL from Clerk (may be a Gravatar or uploaded image).
        created_at:
          type: string
          format: date-time
          description: When the user record was first mirrored into Mobius.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this user record was last synced from Clerk.
    WebhookDeliveryStatus:
      type: string
      enum:
      - pending
      - processing
      - delivered
      - failed
      description: '`pending` — queued, not yet attempted. `processing` — currently being
        delivered. `delivered` — recipient returned 2xx. `failed` — all retry attempts exhausted.'
    Webhook:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - url
      - events
      - enabled
      - created_at
      - updated_at
      description: A project-level outgoing webhook subscription. When a subscribed event
        fires, Mobius POSTs the event payload to `url`.
      properties:
        id:
          type: string
          description: Unique identifier for this webhook.
        name:
          type: string
          description: Human-readable name, unique within the project.
        url:
          type: string
          description: The customer endpoint Mobius POSTs event payloads to.
        events:
          type: array
          items:
            type: string
          description: Subscribed event types. Use dot notation (`run.completed`, `run.failed`)
            or wildcards (`run.*` for all run events).
        enabled:
          type: boolean
          description: When false, matching events are not delivered.
        created_by:
          type: string
          description: User ID of the org member who created this webhook.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this webhook.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this webhook was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this webhook was last updated.
    WebhookListResponse:
      type: object
      additionalProperties: false
      required:
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Webhook'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    WebhookDelivery:
      type: object
      additionalProperties: false
      required:
      - id
      - webhook_id
      - event_type
      - status
      - attempts
      - created_at
      description: One delivery record for a webhook event. The daemon claims pending rows,
        POSTs the payload, and transitions to `delivered` or retries on failure. A delivery
        reaches `failed` only after exhausting all 10 retry attempts.
      properties:
        id:
          type: string
          description: Unique identifier for this delivery record.
        webhook_id:
          type: string
          description: ID of the webhook this delivery belongs to.
        run_id:
          type: string
          description: Run that triggered the event, when applicable.
        event_type:
          type: string
          description: The event type that triggered this delivery (e.g. `run.completed`).
        status:
          $ref: '#/components/schemas/WebhookDeliveryStatus'
          description: 'Current delivery status: `pending`, `delivered`, or `failed`.'
        attempts:
          type: integer
          description: Number of delivery attempts made so far. Max 10.
        last_error:
          type: string
          description: Error message from the most recent failed attempt.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this delivery was first attempted.
        delivered_at:
          type: string
          format: date-time
          description: Timestamp of the successful delivery. Absent until delivered.
    WebhookDeliveryListResponse:
      type: object
      additionalProperties: false
      required:
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/WebhookDelivery'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateWebhookRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - events
      properties:
        name:
          type: string
          description: Human-readable name, unique within the project.
        url:
          type: string
          description: The endpoint Mobius will POST event payloads to. May be left empty
            at creation time so a candidate URL can be tested via the ping endpoint before
            it is saved; events do not fire for webhooks with an empty URL.
        signing_secret:
          type: string
          description: 'Optional HMAC-SHA256 secret. When set, Mobius signs each POST body
            and includes `X-Mobius-Signature: sha256=<hex>` in the request headers.'
        events:
          type: array
          items:
            type: string
          description: Event types to subscribe to. Use wildcards for broad subscriptions,
            e.g. `["run.*"]` for all run events.
        enabled:
          type: boolean
          description: Whether the webhook starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateWebhookRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        url:
          type: string
          description: Replacement endpoint URL.
        signing_secret:
          type: string
          description: Replace the current signing secret. Set to empty string to disable
            signing. Omit to leave the current secret unchanged.
        events:
          type: array
          items:
            type: string
          description: Replacement event subscriptions. Replaces the entire current list.
        enabled:
          type: boolean
          description: Set to false to disable delivery without deleting the webhook.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the webhook. System tags
            (`mobius:*`) are preserved.
    PingWebhookRequest:
      type: object
      additionalProperties: false
      properties:
        url:
          type: string
          description: URL to test. When supplied, the ping is sent to this URL instead of
            the webhook's saved URL — use this to validate a candidate URL before saving it.
            When omitted, the webhook's current saved URL is used.
    PingWebhookResult:
      type: object
      additionalProperties: false
      required:
      - success
      properties:
        success:
          type: boolean
          description: True if the target responded with a 2xx status code.
        status_code:
          type: integer
          description: HTTP status code returned by the target. Absent on network error.
        error:
          type: string
          description: Error message if the request could not be completed.
        latency_ms:
          type: integer
          description: Round-trip latency in milliseconds.
    IntegrationStatus:
      type: string
      enum:
      - active
      - inactive
      - expired
      description: '`active` — integration is enabled and usable by workflows. `inactive`
        — manually disabled; no automatic expiry behavior. `expired` — token/credential has
        expired (e.g., OAuth token not refreshed).'
    Integration:
      type: object
      additionalProperties: false
      description: Project-scoped connection to an external provider such as Slack, GitHub,
        or a model service. Workflows and actions use integrations to find provider configuration
        without embedding secrets in definitions.
      required:
      - id
      - name
      - provider
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this integration.
        name:
          type: string
          description: Human-readable name, unique per `(project, provider)` tuple.
        provider:
          type: string
          description: Free-form provider identifier (e.g. `openai`, `slack`, `github`). Immutable
            after creation.
        config:
          type: object
          additionalProperties: true
          description: Provider-specific credential and configuration blob stored as JSON.
            The shape is provider-defined.
        status:
          $ref: '#/components/schemas/IntegrationStatus'
          description: 'Current integration state: `connected`, `disconnected`, or `error`.'
        created_by:
          type: string
          description: User ID of the org member who created this integration.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this integration.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this integration was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this integration was last updated.
    IntegrationListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Integration'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateIntegrationRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - provider
      properties:
        name:
          type: string
          description: Human-readable name. Must be unique per `(project, provider)` tuple.
        provider:
          type: string
          description: Provider identifier string (e.g. `openai`, `github`). Immutable after
            creation.
        credentials:
          type: object
          additionalProperties: true
          description: Sensitive credentials (API keys, tokens, secrets). Stored encrypted
            and never returned in API responses.
        config:
          type: object
          additionalProperties: true
          description: Non-sensitive provider-specific settings (e.g. default bucket, from
            address).
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateIntegrationRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Updated display name.
        credentials:
          type: object
          additionalProperties: true
          description: Replacement credentials blob (full replace). Stored encrypted and never
            returned in API responses.
        config:
          type: object
          additionalProperties: true
          description: Replacement config blob (full replace, not merge).
        status:
          $ref: '#/components/schemas/IntegrationStatus'
          description: 'Replacement integration state: `connected`, `disconnected`, or `error`.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the integration. System
            tags (`mobius:*`) are preserved.
    CopyIntegrationRequest:
      type: object
      additionalProperties: false
      required:
      - source_project_id
      - source_integration_id
      properties:
        source_project_id:
          type: string
          description: ID of the source project. Must be in the same org.
        source_integration_id:
          type: string
          description: ID of the integration to copy from the source project.
        name:
          type: string
          description: Name for the copied integration in the destination project. Defaults
            to the source integration's name. Required if the source name conflicts with an
            existing `(provider, name)` in this project.
    BillingSubscription:
      type: object
      additionalProperties: false
      description: Current billing entitlement for an organization. Use it to show plan status,
        trial/grace timing, renewal behavior, and usage caps that may block workflow execution.
      required:
      - id
      - plan_type
      - status
      - seat_count
      - current_period_start
      - current_period_end
      - trial_days_remaining
      - trial_warning
      - monthly_credit_cap
      - per_run_step_cap
      - alert_thresholds_percent
      - cancel_at_period_end
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this subscription.
        plan_type:
          type: string
          description: 'Active plan: `trial`, `free`, `pro`, or `business`. New orgs start
            on `trial`; the plan downgrades to `free` when the trial expires.'
        status:
          type: string
          description: 'Stripe subscription status: `active`, `trialing`, `past_due`, `canceled`,
            `unpaid`, or `incomplete`.'
        seat_count:
          type: integer
          description: Number of licensed seats included in the subscription.
        current_period_start:
          type: string
          format: date-time
          description: Start of the current billing period.
        current_period_end:
          type: string
          format: date-time
          description: End of the current billing period. Usage resets at this timestamp.
        trial_ends_at:
          type: string
          format: date-time
          description: When the trial period expires. Only set for `trial` plan.
        grace_ends_at:
          type: string
          format: date-time
          description: When the post-expiry grace period ends. During grace, the org retains
            access but is prompted to upgrade.
        trial_days_remaining:
          type: integer
          description: Days remaining in the trial. 0 when the trial has ended.
        trial_warning:
          type: boolean
          description: True when fewer than 7 days remain in the trial period.
        monthly_credit_cap:
          type: integer
          format: int64
          description: Maximum usage credits allowed per billing period. Workflow execution
            is blocked when this cap is reached.
        per_run_step_cap:
          type: integer
          description: 'Maximum number of job steps allowed per individual workflow run. Default:
            10,000 (pro/trial), 50,000 (business).'
        alert_thresholds_percent:
          type: array
          items:
            type: integer
          description: Percentage levels (1–100) of `monthly_credit_cap` at which usage alert
            notifications are sent. Up to `max_alert_thresholds` from the plan.
        cancel_at_period_end:
          type: boolean
          description: When true, the subscription will not renew at `current_period_end`.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this subscription was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this subscription was last updated.
    BillingPlan:
      type: object
      additionalProperties: false
      description: Purchasable plan configuration exposed to clients before checkout. It explains
        price, included usage, seat limits, and operational caps so users can compare plans
        before upgrading.
      required:
      - plan_type
      - price_cents
      - included_credits
      - seat_limit
      - default_monthly_credit_cap
      - default_per_run_step_cap
      - max_alert_thresholds
      - trial_days
      - credit_card_required
      properties:
        plan_type:
          type: string
          description: Plan name — `trial`, `pro`, or `business`.
        price_cents:
          type: integer
          description: Monthly price in cents (USD).
        included_credits:
          type: integer
          format: int64
          description: Usage credits included in the base price.
        seat_limit:
          type: integer
          description: Maximum org members on this plan. 0 means unlimited.
        default_monthly_credit_cap:
          type: integer
          format: int64
          description: Default `monthly_credit_cap` applied to new subscriptions on this plan.
        default_per_run_step_cap:
          type: integer
          description: Default `per_run_step_cap` applied to new subscriptions on this plan.
        max_alert_thresholds:
          type: integer
          description: Maximum number of alert thresholds configurable on this plan.
        trial_days:
          type: integer
          description: Trial period length in days. 0 for plans without a trial.
        credit_card_required:
          type: boolean
          description: When true, a payment method is required to start this plan.
    BillingPlanListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of available plans.
          items:
            $ref: '#/components/schemas/BillingPlan'
    BillingUsageKeySummary:
      type: object
      additionalProperties: false
      description: Attribution row for usage generated by a single API key. Useful for identifying
        which automation or service account is driving billing consumption within the current
        period.
      required:
      - api_key_id
      - count
      properties:
        api_key_id:
          type: string
          description: The API key responsible for this usage.
        count:
          type: integer
          description: Number of usage records attributed to this key in the current period.
    BillingUsageSummary:
      type: object
      additionalProperties: false
      description: Billing-period usage snapshot for an organization. Use it to show remaining
        capacity, estimated overage, and which categories or API keys are contributing to
        spend.
      required:
      - current_period_start
      - current_period_end
      - current_usage
      - included_limit
      - overage_calls
      - overage_cost
      - by_category
      - by_api_key
      properties:
        current_period_start:
          type: string
          format: date-time
          description: Start of the current billing period.
        current_period_end:
          type: string
          format: date-time
          description: End of the current billing period.
        current_usage:
          type: integer
          description: Total usage credits consumed in the current billing period.
        included_limit:
          type: integer
          description: Included credits from the plan before overage applies.
        overage_calls:
          type: integer
          description: Number of usage records that exceed the included limit.
        overage_cost:
          type: integer
          description: Estimated overage cost in cents for the current period.
        by_category:
          type: object
          additionalProperties:
            type: integer
          description: Usage breakdown by resource category (e.g. `run`, `job`).
        by_api_key:
          type: array
          items:
            $ref: '#/components/schemas/BillingUsageKeySummary'
          description: Per-API-key usage breakdown for cost attribution.
    Invoice:
      type: object
      additionalProperties: false
      description: Customer-facing invoice metadata from Stripe. Clients use invoices to display
        payment status and link users to hosted invoice or PDF views.
      required:
      - id
      - status
      - currency
      - amount_due
      - amount_paid
      - created_at
      properties:
        id:
          type: string
          description: Stripe invoice ID.
        status:
          type: string
          description: Stripe invoice status (`draft`, `open`, `paid`, `void`, `uncollectible`).
        currency:
          type: string
          description: ISO 4217 currency code (e.g. `usd`).
        amount_due:
          type: integer
          description: Total amount due in the smallest currency unit (e.g. cents).
        amount_paid:
          type: integer
          description: Amount already paid against this invoice.
        hosted_invoice_url:
          type: string
          format: uri
          description: Stripe-hosted invoice page URL for the customer.
        invoice_pdf:
          type: string
          format: uri
          description: Direct link to the invoice PDF.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this invoice was created by Stripe.
    InvoiceListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of recent invoices, newest first.
          items:
            $ref: '#/components/schemas/Invoice'
    CreateCheckoutRequest:
      type: object
      additionalProperties: false
      required:
      - success_url
      - cancel_url
      properties:
        success_url:
          type: string
          format: uri
          description: URL Stripe redirects to after a successful checkout.
        cancel_url:
          type: string
          format: uri
          description: URL Stripe redirects to when the user cancels checkout.
    CreatePortalRequest:
      type: object
      additionalProperties: false
      required:
      - return_url
      properties:
        return_url:
          type: string
          format: uri
          description: URL Stripe redirects to after the user exits the customer portal.
    BillingURLResult:
      type: object
      additionalProperties: false
      required:
      - url
      properties:
        url:
          type: string
          format: uri
          description: Stripe-hosted URL to redirect the user's browser to.
    UpdateBillingLimitsRequest:
      type: object
      additionalProperties: false
      properties:
        monthly_credit_cap:
          type: integer
          format: int64
          description: New monthly credit ceiling. When reached, workflow execution is blocked
            until the next billing period.
        per_run_step_cap:
          type: integer
          description: Maximum job steps per workflow run. Prevents runaway runs from consuming
            unbounded credits.
        alert_thresholds_percent:
          type: array
          items:
            type: integer
          description: Replacement list of alert threshold percentages (1–100). Replaces the
            full existing list. Must not exceed the plan's `max_alert_thresholds`.
    OnboardingStatus:
      type: object
      additionalProperties: false
      description: Whether the current user has completed initial organization setup. Use
        this at app startup to decide whether to route the user into onboarding or the normal
        workspace experience.
      required:
      - completed
      properties:
        completed:
          type: boolean
          description: Whether the user has completed onboarding and has an org
        org_id:
          type: string
          description: The user's org ID (present only when completed is true)
        org_name:
          type: string
          description: The user's org display name (present only when completed is true)
    OnboardingResult:
      type: object
      additionalProperties: false
      required:
      - org_id
      - org_name
      properties:
        org_id:
          type: string
          description: ID of the newly created (or existing) org
        org_name:
          type: string
          description: Display name of the org
    ProjectMetrics:
      type: object
      additionalProperties: false
      description: Operational health snapshot for a project. Use it to power dashboards,
        detect stuck queues or stale workers, and summarize run throughput and failure rates
        over a recent window.
      required:
      - generated_at
      - window_minutes
      - runs_per_minute
      - total_runs_window
      - failure_rate
      - avg_run_seconds
      - p95_step_seconds
      - queue_depth
      - running_count
      - active_workers
      - stale_workers
      - status_breakdown
      properties:
        generated_at:
          type: string
          format: date-time
          description: Timestamp when this metrics snapshot was computed.
        window_minutes:
          type: integer
          description: Rolling window width used for rate and failure metrics. Default is
            60 minutes.
        runs_per_minute:
          type: number
          format: double
          description: Average number of new workflow runs started per minute within the window.
        total_runs_window:
          type: integer
          description: Total number of workflow runs started within the window.
        failure_rate:
          type: number
          format: double
          description: Fraction of completed runs that ended in `failed` status within the
            window. Range 0.0–1.0.
        avg_run_seconds:
          type: number
          format: double
          description: Mean wall-clock duration of completed runs within the window, in seconds.
        p95_step_seconds:
          type: number
          format: double
          description: 95th-percentile job duration (claim time to terminal state) computed
            across the 40 most recent completed jobs, in seconds. Use this to detect slow
            or stuck steps.
        queue_depth:
          type: integer
          description: Number of jobs currently in `pending` state waiting to be claimed.
        running_count:
          type: integer
          description: Number of workflow runs currently in the `active` lifecycle.
        active_workers:
          type: integer
          description: Number of workers whose `last_seen_at` is within the 2-minute staleness
            threshold.
        stale_workers:
          type: integer
          description: Number of workers whose `last_seen_at` has exceeded the 2-minute staleness
            threshold.
        status_breakdown:
          type: object
          additionalProperties:
            type: integer
          description: Map of workflow run status → count across all runs in the project (not
            windowed). Includes all terminal and in-progress statuses.
    PreviewPermissionsRequest:
      type: object
      additionalProperties: false
      properties:
        service_account_default_role:
          type: string
          description: Role name assigned as a fallback to service accounts that have no explicit
            assignment at the time of preview.
    EnablePermissionsRequest:
      type: object
      additionalProperties: false
      properties:
        service_account_default_role:
          type: string
          description: Fallback role name for service accounts with no existing assignment.
            Applied only to service accounts not covered by the `assignments` list.
        assignments:
          type: array
          description: Explicit role assignments to create as part of the enable operation.
          items:
            $ref: '#/components/schemas/PermissionsAssignmentInput'
    PermissionsAssignmentInput:
      type: object
      additionalProperties: false
      description: Desired role assignment supplied while enabling permissions. Use this to
        make the initial rollout explicit instead of relying only on default roles for users
        and service accounts.
      required:
      - actor_type
      - actor_id
      oneOf:
      - required:
        - role_id
      - required:
        - role_name
      properties:
        actor_type:
          type: string
          enum:
          - user
          - service_account
          description: 'Actor type: `user` or `service_account`.'
        actor_id:
          type: string
          description: ID of the user or service account.
        role_id:
          type: string
          description: Mutually exclusive with `role_name`.
        role_name:
          type: string
          description: Resolved to a role ID server-side. Mutually exclusive with `role_id`.
        project_id:
          type: string
          description: Scope this assignment to a project. Omit for org-wide.
    PermissionsAssignmentProposal:
      type: object
      additionalProperties: false
      description: Role assignment the server would create during a permissions preview or
        enable operation. Clients can show these proposals before enforcing permissions so
        admins understand the blast radius.
      required:
      - actor_type
      - actor_id
      - role_id
      - role_name
      properties:
        actor_type:
          type: string
          enum:
          - user
          - service_account
          description: 'Actor type: `user` or `service_account`.'
        actor_id:
          type: string
          description: ID of the user or service account.
        role_id:
          type: string
          description: ID of the role that would be assigned.
        role_name:
          type: string
          description: Name of the role that would be assigned.
        project_id:
          type: string
          nullable: true
          description: Project scope for the assignment. Null for org-wide assignments.
    PermissionsPlan:
      type: object
      additionalProperties: false
      required:
      - permissions_enabled
      - assignments
      description: Current or proposed permissions state, including the full set of role assignments.
      properties:
        permissions_enabled:
          type: boolean
          description: Whether enforcement is currently (or will be after enable) active.
        assignments:
          type: array
          description: The set of role assignments that will be created on enable.
          items:
            $ref: '#/components/schemas/PermissionsAssignmentProposal'
    PermissionsState:
      type: object
      additionalProperties: false
      description: Lightweight org-level switch showing whether permission enforcement is
        active. Use it to decide whether role assignments are informational or actually gate
        API access.
      required:
      - permissions_enabled
      properties:
        permissions_enabled:
          type: boolean
          description: Whether enforcement is currently active for the org.
    Role:
      type: object
      additionalProperties: false
      description: Named bundle of permissions assignable to users or service accounts. Roles
        let admins grant workflow, project, and automation capabilities consistently without
        editing every actor individually.
      required:
      - id
      - name
      - description
      - permissions
      - system_defined
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this role.
        project_id:
          type: string
          description: Scoping project. Empty for org-wide roles.
        name:
          type: string
          description: Human-readable role name, unique within org+project scope.
        description:
          type: string
          description: Optional human-readable description of what this role grants.
        permissions:
          type: array
          items:
            type: string
          description: Permission strings granted by this role (e.g. "mobius.job.claim").
        system_defined:
          type: boolean
          description: True for built-in platform roles that cannot be modified or deleted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this role.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this role was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this role was last updated.
    RoleAssignment:
      type: object
      additionalProperties: false
      description: Binding between an actor and a role, optionally scoped to a project. Use
        assignments to explain why a user or service account has access and to audit who granted
        it.
      required:
      - id
      - actor_type
      - actor_id
      - role_id
      - role_name
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this role assignment.
        actor_type:
          type: string
          enum:
          - user
          - service_account
          description: 'Type of actor this assignment applies to: `user` or `service_account`.'
        actor_id:
          type: string
          description: User ID or service account ID receiving the role.
        role_id:
          type: string
          description: ID of the assigned role.
        role_name:
          type: string
          description: Name of the assigned role.
        project_id:
          type: string
          description: Set for project-scoped assignments; empty for org-wide.
        granted_by_actor_type:
          type: string
          description: Actor type of the caller who created this assignment.
        granted_by_actor_id:
          type: string
          description: Actor ID of the caller who created this assignment.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this assignment was created.
    RoleListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Role'
    RoleAssignmentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/RoleAssignment'
    CreateRoleRequest:
      type: object
      additionalProperties: false
      required:
      - project_id
      - name
      - permissions
      properties:
        project_id:
          type: string
          description: Project this role belongs to. Custom roles are always project-scoped.
        name:
          type: string
          description: Unique name within the project.
        description:
          type: string
          description: Optional human-readable description of what this role grants.
        permissions:
          type: array
          items:
            type: string
          description: Permission strings to include (e.g. "mobius.workflow.create").
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateRoleRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          description: Replacement description.
        permissions:
          type: array
          items:
            type: string
          description: Replaces the existing permissions array entirely.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the role. System tags (`mobius:*`)
            are preserved.
    CreateRoleAssignmentRequest:
      type: object
      additionalProperties: false
      required:
      - actor_type
      - actor_id
      oneOf:
      - required:
        - role_id
      - required:
        - role_name
      properties:
        actor_type:
          type: string
          enum:
          - user
          - service_account
          description: 'Type of actor to assign the role to: `user` or `service_account`.'
        actor_id:
          type: string
          description: User ID or service account ID to assign the role to.
        role_id:
          type: string
          description: Mutually exclusive with `role_name`.
        role_name:
          type: string
          description: Resolved to a role ID server-side. Mutually exclusive with `role_id`.
        project_id:
          type: string
          description: Scope this assignment to a project. Omit for org-wide assignment.
    SystemRoleName:
      type: string
      enum:
      - Owner
      - Admin
      - Operator
      - Worker
      - Viewer
      description: 'One of the built-in system roles: `Owner`, `Admin`, `Operator`, `Worker`,
        or `Viewer`. These are seeded at startup and cannot be deleted. `Owner` and `Admin`
        bypass project-member visibility for restricted projects.'
    Org:
      type: object
      additionalProperties: false
      description: Top-level account boundary for users, projects, billing, roles, and shared
        settings. Use the org to understand default access policy and the handle/name shown
        across the workspace.
      required:
      - id
      - name
      - handle
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this organization.
        name:
          type: string
          description: Human-readable org name.
        handle:
          type: string
          description: URL-safe slug used in API routes and display. Unique across all orgs.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key-value metadata stored alongside the org.
        default_member_role:
          $ref: '#/components/schemas/SystemRoleName'
          description: System-role name assigned at org scope to new org members. Defaults
            to `Operator`.
        default_project_access_mode:
          type: string
          enum:
          - org_open
          - restricted
          description: 'Access mode applied to newly-created projects when the caller does
            not pass one explicitly: `org_open` or `restricted`. Changing this only affects
            future projects.'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this organization was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this organization was last updated.
    OrgListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Org'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    CreateOrgRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - handle
      properties:
        name:
          type: string
          description: Human-readable organization name.
        handle:
          type: string
          description: URL-safe slug. Must be globally unique across all orgs.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary metadata to attach to the organization.
    UpdateOrgRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Must be non-empty if provided.
        handle:
          type: string
          description: Must be non-empty if provided. Changing the handle affects all API
            route URLs for this org.
        metadata:
          type: object
          additionalProperties: true
          description: Replacement metadata.
        default_member_role:
          $ref: '#/components/schemas/SystemRoleName'
          description: System-role name assigned to new org members at org scope.
        default_project_access_mode:
          type: string
          enum:
          - org_open
          - restricted
          description: 'Access mode applied to newly-created projects: `org_open` or `restricted`.'
    OrgMember:
      type: object
      additionalProperties: false
      description: User's membership in an organization. Use this record to show who belongs
        to the org, what their broad org role is, and any embedded user profile needed for
        member management.
      required:
      - id
      - user_id
      - role
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        user_id:
          type: string
          description: ID of the user who is a member.
        role:
          type: string
          enum:
          - Owner
          - Admin
          - Member
          description: '`Owner` has full control including org deletion; `Admin` can manage
            members and settings; `Member` has read-only org access.'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this member joined.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this membership was last updated.
        user:
          $ref: '#/components/schemas/User'
          description: Embedded user profile for this organization member.
    OrgMemberListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/OrgMember'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    AddOrgMemberRequest:
      type: object
      additionalProperties: false
      required:
      - user_id
      - role
      properties:
        user_id:
          type: string
          description: Clerk user ID of the user to add.
        role:
          type: string
          enum:
          - Owner
          - Admin
          - Member
          description: 'Role to assign the new member: `Owner`, `Admin`, or `Member`.'
    UpdateOrgMemberRoleRequest:
      type: object
      additionalProperties: false
      required:
      - role
      properties:
        role:
          type: string
          enum:
          - Owner
          - Admin
          - Member
          description: 'New role to assign: `Owner`, `Admin`, or `Member`.'
    OrgInvite:
      type: object
      additionalProperties: false
      description: Presentation view of a Clerk Organization Invitation. Mobius does not persist
        invitations — Clerk owns the token, expiry, accept UX, and email delivery. `project_grants`
        and `invited_by` are stashed in Clerk's `publicMetadata` at create time and applied
        via webhook when the invitee accepts.
      required:
      - id
      - org_id
      - email
      - role
      - status
      - created_at
      properties:
        id:
          type: string
          description: Clerk invitation id (e.g. `orginv_2abc...`).
        org_id:
          type: string
          description: ID of the organization the invitation belongs to.
        email:
          type: string
          description: Email address the invitation was sent to.
        role:
          type: string
          enum:
          - Owner
          - Admin
          - Member
          description: Org role the invitee will receive on accept.
        project_grants:
          type: array
          items:
            type: string
          description: Project IDs the invitee will be added to on accept.
        status:
          type: string
          enum:
          - pending
          - accepted
          - revoked
          description: Lifecycle reported by Clerk. Tokens that expired without acceptance
            surface as `revoked`.
        invited_by:
          type: string
          description: User ID of the inviter (from Clerk publicMetadata).
        expires_at:
          type: string
          format: date-time
          description: Clerk-managed expiry timestamp.
        created_at:
          type: string
          format: date-time
          description: When the invitation was created in Clerk.
    OrgInviteListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/OrgInvite'
    CreateOrgInviteRequest:
      type: object
      additionalProperties: false
      required:
      - email
      properties:
        email:
          type: string
          description: Email address to invite.
        role:
          type: string
          enum:
          - Owner
          - Admin
          - Member
          description: Org role assigned on accept. Defaults to `Member`.
        project_grants:
          type: array
          items:
            type: string
          description: Project IDs the invitee will be added to on accept.
    InteractionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Interaction'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    CreateInteractionRequest:
      description: Creates an interaction directly. Use the standalone variant with no workflow
        side effect, or the run-backed variant that requires both `run_id` and `signal_name`
        so completion can resume the run. For worker/job usage, prefer the job-scoped route
        so the server can derive the owning run from the claimed job context.
      oneOf:
      - $ref: '#/components/schemas/CreateStandaloneInteractionRequest'
      - $ref: '#/components/schemas/CreateRunBackedInteractionRequest'
    CreateStandaloneInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - type
      - target
      - message
      description: Creates a standalone interaction. Completion records the response but does
        not deliver a workflow signal.
      properties:
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: User, group, or agent that should receive the interaction.
        type:
          $ref: '#/components/schemas/InteractionType'
          description: Interaction kind that determines the response workflow.
        message:
          type: string
          description: Message shown to the responder describing what response is needed.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the message.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When target.type is "group", setting require_all=true means all snapshotted
            group members must respond before the interaction is considered complete. Ignored
            for non-group targets. Defaults to false when omitted.
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded to.
    CreateRunBackedInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - run_id
      - signal_name
      - type
      - target
      - message
      description: Creates a run-backed interaction. Completion delivers `signal_name` to
        `run_id` so a waiting run path can resume.
      properties:
        run_id:
          type: string
          description: ID of the workflow run to resume when this interaction is completed.
        signal_name:
          type: string
          description: Signal name the interaction will complete against when run-backed.
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: User, group, or agent that should receive the interaction.
        type:
          $ref: '#/components/schemas/InteractionType'
          description: Interaction kind that determines the response workflow.
        message:
          type: string
          description: Message shown to the responder describing what response is needed.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the message.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When target.type is "group", setting require_all=true means all snapshotted
            group members must respond before the interaction is considered complete. Ignored
            for non-group targets. Defaults to false when omitted.
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded to.
    RespondToInteractionRequest:
      type: object
      additionalProperties: false
      properties:
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by the responder.
        comment:
          type: string
          description: Optional free-text comment accompanying the response.
    SlackInstall:
      type: object
      additionalProperties: false
      description: Start of the Slack OAuth installation flow. Redirect users to the authorize
        URL when they want to connect a Slack workspace to a project.
      required:
      - authorize_url
      properties:
        authorize_url:
          type: string
          description: The Slack OAuth authorize URL to redirect the user to.
    Group:
      type: object
      additionalProperties: true
      description: Project-scoped collection of users used as an interaction target. Groups
        let workflows route approvals, reviews, and input requests to a team by handle rather
        than hard-coding individual users.
      required:
      - id
      - handle
      - name
      - routing_policy
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this group.
        handle:
          type: string
          description: URL-safe identifier, unique within the project. Immutable after creation.
        name:
          type: string
          description: Human-readable display name.
        description:
          type: string
          description: Optional human-readable description.
        routing_policy:
          type: string
          enum:
          - first_responder
          - all_members
          description: 'How interactions targeting this group collect responses. `first_responder`:
            first member to claim or respond wins. `all_members`: every snapshotted member
            must respond.'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this group was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this group was last updated.
    GroupListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Group'
    GroupWithCount:
      description: Group plus its current live member count. Use this lighter summary in list
        views where clients need to show routing targets without fetching the full member
        list for every group.
      allOf:
      - $ref: '#/components/schemas/Group'
      - type: object
        required:
        - member_count
        properties:
          member_count:
            type: integer
            description: Current live member count. May differ from interaction membership
              snapshots.
    GroupWithCountListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/GroupWithCount'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    GroupMember:
      type: object
      additionalProperties: false
      description: User membership in a project group. Membership determines who receives
        future group-targeted interactions; existing interaction snapshots are not retroactively
        changed.
      required:
      - id
      - group_id
      - user_id
      - added_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        group_id:
          type: string
          description: ID of the group this membership belongs to.
        user_id:
          type: string
          description: ID of the user who is a member.
        added_by:
          type: string
          nullable: true
          description: User ID of the org member who added this person to the group.
        added_at:
          type: string
          format: date-time
          description: Timestamp when this member was added to the group.
    GroupMemberListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/GroupMember'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    CreateGroupRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        handle:
          type: string
          description: URL-safe handle, unique within the project. Auto-derived from name
            if omitted.
        name:
          type: string
          description: Display name (1–64 chars).
        description:
          type: string
          description: Optional human-readable description.
        routing_policy:
          type: string
          enum:
          - first_responder
          - all_members
          default: first_responder
          description: 'How responses are collected from group members: `first_responder`
            or `all_members`. Defaults to `first_responder`.'
    UpdateGroupRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        description:
          type: string
          description: Replacement description.
        routing_policy:
          type: string
          enum:
          - first_responder
          - all_members
          description: Replacement routing policy, either `first_responder` or `all_members`.
            Affects future interactions only; in-flight interactions retain the snapshotted
            policy.
    AddGroupMemberRequest:
      type: object
      additionalProperties: false
      required:
      - user_id
      properties:
        user_id:
          type: string
          description: Org member user ID to add. Must be a current org member.
    AgentStatus:
      type: string
      enum:
      - active
      - inactive
      description: Administrative status. Inactive agents cannot claim new jobs.
    AgentPresence:
      type: string
      enum:
      - online
      - offline
      - stale
      description: Computed from the most recent 20 sessions. `online` means a connected session
        with a fresh heartbeat; `stale` means heartbeats are overdue; `offline` means no connected
        sessions.
    AgentSessionStatus:
      type: string
      enum:
      - connected
      - disconnected
      - stale
      description: Connection state for an agent session. `connected` sessions are usable,
        `stale` sessions have missed heartbeats, and `disconnected` sessions have been closed.
    Agent:
      type: object
      additionalProperties: false
      description: Project-scoped automated worker identity backed by a service account. Agents
        are useful when workflows need to target a named machine actor with capabilities,
        configuration, and session presence.
      required:
      - id
      - service_account_id
      - name
      - status
      - presence
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this agent.
        service_account_id:
          type: string
          description: The service account whose credentials this agent uses to authenticate.
            Can be changed via PATCH.
        name:
          type: string
          description: Mutable unique name within the project. Free-form human-readable label;
            use `id` for stable references and job targeting.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform agent classification for tooling and filtering (e.g. "llm",
            "rpa").
        capabilities:
          type: object
          additionalProperties: true
          description: Arbitrary capability map used by orchestrators to select suitable agents.
        config:
          type: object
          additionalProperties: true
          description: Agent-specific configuration blob stored and returned opaquely.
        status:
          $ref: '#/components/schemas/AgentStatus'
          description: 'Current agent status: `active` or `disabled`.'
        presence:
          $ref: '#/components/schemas/AgentPresence'
          description: 'Current agent presence: `online`, `offline`, or `unknown`.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this agent.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this agent was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this agent was last updated.
    AgentSession:
      type: object
      additionalProperties: false
      description: Live or historical connection from an agent process. Use sessions to monitor
        availability, transport, metadata, and heartbeat freshness for automated workers.
      required:
      - id
      - agent_id
      - status
      - transport
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this session.
        agent_id:
          type: string
          description: ID of the agent this session belongs to.
        status:
          $ref: '#/components/schemas/AgentSessionStatus'
          description: 'Current session status: `connected` or `disconnected`.'
        transport:
          type: string
          description: Connection mechanism identifier (e.g. "sse", "polling").
        metadata:
          type: object
          additionalProperties: true
          description: Caller-supplied metadata (e.g. hostname, version, region).
        connected_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this session was established.
        last_seen_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent heartbeat.
        disconnected_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this session was closed. Null while connected.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this session record was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this session was last updated.
    AgentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Agent'
    AgentSessionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/AgentSession'
    CreateAgentRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        service_account_id:
          type: string
          description: Service account that backs this agent. Must be active and belong to
            the same project. If omitted, a new service account is auto-created with the same
            name as the agent.
        name:
          type: string
          description: Project-scoped unique name for this agent. Free-form human-readable
            label, 1-63 characters.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform classification (e.g. "llm", "rpa", "integration").
        capabilities:
          type: object
          additionalProperties: true
          description: Arbitrary capability map used by orchestrators to select suitable agents.
        config:
          type: object
          additionalProperties: true
          description: Agent-specific configuration stored and returned opaquely.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateAgentRequest:
      type: object
      additionalProperties: false
      properties:
        service_account_id:
          type: string
          description: Replacement service account. Must be active and belong to the same
            project.
        name:
          type: string
          description: Free-form human-readable label, 1-63 characters; must be unique within
            the project.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Replacement description.
          maxLength: 500
        kind:
          type: string
          description: Replacement freeform agent classification (e.g. `llm`, `rpa`).
        capabilities:
          type: object
          additionalProperties: true
          description: Replacement capability map.
        config:
          type: object
          additionalProperties: true
          description: Replacement configuration blob.
        status:
          $ref: '#/components/schemas/AgentStatus'
          description: 'Replacement agent status: `active` or `disabled`.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the agent. System tags
            (`mobius:*`) are preserved.
    CreateAgentSessionRequest:
      type: object
      additionalProperties: false
      required:
      - transport
      properties:
        transport:
          type: string
          description: Connection mechanism identifier (e.g. "sse", "polling").
        metadata:
          type: object
          additionalProperties: true
          description: Optional metadata such as hostname, SDK version, or region.
    ServiceAccountStatus:
      type: string
      enum:
      - active
      - disabled
      description: '`active` allows authentication and job claims; `disabled` blocks them
        but preserves the record and its assignments.'
    ServiceAccount:
      type: object
      additionalProperties: false
      description: Non-human identity used by automation, agents, and API keys. Service accounts
        make ownership, permissions, and credential rotation explicit without tying machine
        access to a human user.
      required:
      - id
      - name
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this service account.
        name:
          type: string
          description: Human-readable name for this service account. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        status:
          $ref: '#/components/schemas/ServiceAccountStatus'
          description: 'Current service account status: `active` or `disabled`.'
        owner_user_id:
          type: string
          description: Optional org member responsible for this service account.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key-value metadata. Subject to size and nesting depth limits.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: 'Resource tags applied to this service account. Distinct from `metadata`:
            `tags` is the uniform string-to-string field used for filtering and reporting;
            `metadata` is a free-form caller-defined blob.'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this service account was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this service account was last updated.
    ServiceAccountListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ServiceAccount'
    CreateServiceAccountRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable name for this service account. Immutable after creation.
        description:
          type: string
          description: Optional human-readable description.
        owner_user_id:
          type: string
          description: Org member responsible for this service account.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary metadata to attach to the service account.
        role_ids:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: One or more role IDs to assign at creation time. All assignments are
            created atomically with the service account. Requires `mobius.permission.manage`.
            Each role must belong to this project or be org-scoped (project_id empty).
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateServiceAccountRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          description: Replacement description.
        status:
          $ref: '#/components/schemas/ServiceAccountStatus'
          description: 'Replacement service account status: `active` or `disabled`.'
        owner_user_id:
          type: string
          description: ID of the org member responsible for this service account.
        metadata:
          type: object
          additionalProperties: true
          description: Replacement metadata.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the service account. System
            tags (`mobius:*`) are preserved.
    ToolDefinition:
      type: object
      additionalProperties: false
      description: Published workflow exposed as an invokable tool. Clients can use this definition
        to list available tools and render input forms from the JSON Schema before starting
        a run.
      required:
      - name
      - description
      - input_schema
      properties:
        name:
          type: string
          description: Tool name (workflow handle). Stable across publish/unpublish cycles.
        description:
          type: string
          description: Human-readable description of what the tool does.
        input_schema:
          type: object
          description: JSON Schema Draft 7 object describing the tool inputs.
          additionalProperties: true
    ToolDefinitionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of published workflow tools.
          items:
            $ref: '#/components/schemas/ToolDefinition'
    ToolRunRequest:
      type: object
      additionalProperties: false
      properties:
        input:
          type: object
          description: Input values matching the tool's input_schema.
          additionalProperties: true
        timeout_seconds:
          type: integer
          description: How long (in seconds) to wait for synchronous completion. Default 30,
            max 120. If the run does not complete within this window the response is 202 with
            status active.
          minimum: 1
          maximum: 120
    ToolRun:
      type: object
      additionalProperties: false
      description: Status envelope for a tool invocation backed by a workflow run. Use it
        to poll asynchronous work, read completed output, or surface failure details to the
        caller.
      required:
      - run_id
      - status
      properties:
        run_id:
          type: string
          description: Unique run identifier for polling.
        status:
          type: string
          description: 'Workflow run lifecycle: `active`, `completed`, or `failed`.'
          enum:
          - active
          - completed
          - failed
        output:
          type: object
          description: Run output. Present when status is "completed".
          additionalProperties: true
        error:
          type: string
          description: Error message. Present when status is "failed".
