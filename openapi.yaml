        log_name:
          type: string
        log_path:
          type: string
        tail:
          type: integer
        content:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer
    CreateEnvironmentGitCredentialRequest:
      type: object
      additionalProperties: false
      required:
      - repo_full_name
