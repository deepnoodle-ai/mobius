              $ref: '#/components/schemas/ReplaceSkillsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillAssignmentListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/agents/{id}/tool-manifest:
    get:
      operationId: getAgentToolManifest
      tags:
      - agent-tools
      - agent-capabilities
      summary: Resolve an agent tool manifest
      description: 'Resolves the effective tool manifest for an agent: the flat set of actions
        the agent can invoke, computed from toolkit grants, service- account permissions,
        optional toolkit filters, optional per-invocation tool filters, and optional active
        skill narrowing.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: toolkit_ids
        in: query
        description: Optional comma-separated toolkit subset to apply.
        schema:
          type: string
      - name: skill_name
        in: query
        description: Optional assigned skill name to preselect as active.
        schema:
          type: string
      - name: allowed_tools
        in: query
        description: Optional comma-separated canonical action names, wildcard selectors,
          or group references to apply as a per-invocation filter against the resolved tool
          set.
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentToolManifest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/automations:
    get:
      operationId: listAutomations
      tags:
      - automations
      summary: List automations in a project
      description: Returns automations in the project, newest-first. Supports filtering by
        lifecycle status and cursor-based pagination.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: status
        in: query
        description: Filter by lifecycle status.
        schema:
          $ref: '#/components/schemas/AutomationStatus'
      - name: cursor
        in: query
        description: Opaque pagination cursor from a prior response.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of items to return.
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createAutomation
      tags:
      - automations
      summary: Create an automation
      description: Creates a new automation in `draft` status. The `handle` must be unique
        within the project and is immutable.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAutomationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Automation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/automations/{handle}:
    get:
      operationId: getAutomation
      tags:
      - automations
      summary: Get an automation
      description: Returns one automation by its project-unique handle.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: handle
        in: path
        required: true
        description: Project-unique automation handle.
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Automation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateAutomation
      tags:
      - automations
      summary: Update an automation
      description: Updates mutable fields on the automation. The handle, org, and project
        remain immutable.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: handle
        in: path
        required: true
        description: Project-unique automation handle.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAutomationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Automation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAutomation
      tags:
      - automations
      summary: Archive an automation
      description: Soft-archives the automation. Existing runs remain queryable; new runs
