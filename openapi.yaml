        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
