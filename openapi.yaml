        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/sessions/{session_id}/turns:
    get:
      operationId: listSessionTurns
      tags:
      - sessions
      summary: List session turns
      description: Returns the session's turns, the structure the turn-grouped transcript
        is built on. Each turn groups related transcript messages and includes links to any
        run step or channel exchange that produced it. Turns are ordered by creation time;
        `order=desc` returns the newest turns (the tail) first, and long sessions are walked
        page-by-page via the `next_cursor` returned in the response. Pass `ids` to fetch exactly
        a known set of turns in one bounded request — the join a transcript view uses to resolve
        a loaded message window's `turn_id`s to their headers; when `ids` is set the cursor
        and order parameters are ignored.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/SessionIdParam'
      - name: ids
        in: query
        description: Return exactly the turns with these ids (the transcript-join primitive).
          When set, pagination and ordering are ignored and the named turns are returned in
          chronological order.
        schema:
          type: array
          items:
            type: string
        style: form
        explode: false
      - $ref: '#/components/parameters/OrderParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTurnListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: startTurn
      tags:
      - sessions
      summary: Start an agent turn
      description: |-
        Appends one caller input message to the session and starts an agent turn to respond. By default returns `202 Accepted` immediately with a durable `after_sequence` cursor (a message `sequence`) to stream from. The turn keeps running even if the caller disconnects. When the request sets `Accept: text/event-stream`, the response is `200 OK` and the turn's activity is streamed inline on the same connection, equivalent to opening `GET .../stream` at the returned cursor. A repeated call with the same `idempotency_key` returns the existing invocation without restarting it or writing new input. A distinct send while a direct turn is queued, running, or waiting returns `409 session_turn_active` before appending the new input; use the nudge endpoint explicitly to steer an active turn. Requires the `mobius.agent.invoke` permission (or the agent's own backing principal).

        The session definition's `config.timeout_seconds` may be zero to use the platform default. Set `operation.timeout_seconds` to at least one for a one-shot override on this turn; it takes precedence and is not saved on the session.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/SessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartTurnRequest'
      responses:
        '200':
          description: 'Server-sent event stream of the turn''s activity, returned when the
            request sets `Accept: text/event-stream`. Framing matches `GET .../stream`.'
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SessionStreamFrame'
        '202':
          description: The turn was accepted and is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnAck'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: A distinct direct invocation is already queued, running, or waiting.
            The `session_turn_active` error details contain its `turn_id` and `status`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
