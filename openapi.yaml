  /v1/projects/{project}/artifacts:
    get:
      operationId: listArtifacts
      tags:
      - artifacts
      summary: List artifacts in a project
      description: Returns artifacts in the project, ordered (created_at desc, id desc). Optional
        filters narrow by run, step, state, or mime prefix. Results are scoped to the authenticated
        principal's User-owned artifact space.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: run_id
        in: query
        required: false
        schema:
          type: string
      - name: step_id
        in: query
        required: false
        schema:
          type: string
      - name: mime
        in: query
        required: false
        schema:
          type: string
        description: Mime prefix filter (e.g. `image/`)
      - name: state
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ArtifactState'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
