    SessionStatus:
      type: string
      enum:
      - active
      - archived
      - deleted
      description: 'Durable conversation session status: `active`, `archived`, or `deleted`.'
    SessionOrigin:
      type: string
      enum:
      - manual
      - api
      - loop
      - interaction
      description: 'Surface that created the session: `manual`, `api`, `loop`, or `interaction`.'
    SessionScope:
      type: string
      enum:
      - agent
      - loop
      description: 'Boundary used to resolve named sessions: `agent` or `loop`.'
    SessionVisibility:
      type: string
      enum:
      - project
      - private
      description: 'Visibility of the session in project surfaces: `project` or `private`.'
    SessionRetentionPolicy:
      type: object
      additionalProperties: false
      required:
      - mode
      description: |-
        Controls how long a session is retained. Applied only when the session is first created (like `compaction_policy`); ignored when an existing session is resolved. `standard` is the default and keeps the session forever. `bounded` expires the session — pruning its transcript from every read path — once it has been idle past `ttl_seconds`. Kept for audit after expiry: a tombstone session row with its token totals, and the turn rows with their status, error, usage, and timings.

        `ttl_seconds` is required when `mode` is `bounded` and ignored for `standard`; the server validates this (a `oneOf` encoding was dropped because it only produced untyped union codegen without adding runtime enforcement in the generated Go/TypeScript clients).
      properties:
        mode:
          type: string
          enum:
          - standard
          - bounded
          description: '`standard` (default) retains the session indefinitely. `bounded` expires
            the session after it has been idle for `ttl_seconds`.'
        ttl_seconds:
          type: integer
          format: int64
          minimum: 3600
          maximum: 2592000
          description: 'Idle lifetime in seconds; required when `mode` is `bounded` and ignored
            otherwise. Measured from the last message activity (`last_message_at`), not session
            creation — continuing the session before it expires simply extends its life. Minimum
            1 hour, maximum 30 days. The 1-hour floor keeps a caller''s idempotency window
            comfortably inside the retention window: after expiry a retried idempotency key
            mints a fresh session rather than deduplicating against a pruned one.'
      example:
        mode: bounded
        ttl_seconds: 86400
    SessionCompactionBoundary:
      type: object
      additionalProperties: false
      description: Pointer to the latest compaction marker in a session's transcript. The
        marker is itself a transcript message (role `compaction`); everything at or below
        `covers_through_sequence` is summarized history.
      required:
      - message_id
      - sequence
      - covers_through_sequence
      properties:
        message_id:
          type: string
          description: Id of the compaction summary message in the transcript.
        sequence:
          type: integer
          description: Transcript sequence of the compaction marker itself.
        covers_through_sequence:
          type: integer
          description: Highest message sequence this summary covers — the before/after boundary.
    Session:
      type: object
      additionalProperties: false
      description: Durable conversation transcript owned by an agent.
      required:
      - id
      - agent_id
      - title
      - status
      - origin
      - scope
      - scope_ref_id
      - scope_name
      - session_key
      - visibility
      - message_count
      - token_input_total
      - token_output_total
      - cache_read_input_total
      - cache_creation_input_total
      - version
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable session identifier.
        agent_id:
          type: string
          description: Agent that owns this session.
        title:
          type: string
          description: Human-readable session title.
        status:
          $ref: '#/components/schemas/SessionStatus'
          description: Lifecycle status of the session.
        origin:
          $ref: '#/components/schemas/SessionOrigin'
          description: Surface that created the session.
        scope:
          $ref: '#/components/schemas/SessionScope'
          description: Boundary used to resolve the session key.
        scope_ref_id:
          type: string
          description: Advanced provenance identifying the resource that owns the session
            namespace. Mobius derives this from `agent_id` for normal agent sessions.
        scope_name:
          type: string
          deprecated: true
          description: Deprecated legacy alias of `session_key`. Kept for compatibility while
            clients migrate to the canonical conversation-key field.
        session_key:
          type: string
          description: Stable caller-assigned conversation key, unique within one agent.
        visibility:
          $ref: '#/components/schemas/SessionVisibility'
          description: Where the session appears in project UI surfaces.
        model:
          type: string
          description: Model the session most recently exchanged tokens with.
        model_provider:
          type: string
          description: Provider for the recorded `model`.
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Resolved message-compaction policy in effect for this session.
        retention:
          $ref: '#/components/schemas/SessionRetentionPolicy'
          description: Resolved retention policy in effect for this session. `standard` for
            ordinary permanent sessions.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When a `bounded` session will expire if it stays idle, computed from
            its last message activity (`last_message_at`) and the retention TTL. Null for
            `standard` sessions and for bounded sessions with no activity yet. After this
            time the transcript is pruned and the session reads as deleted.
        thinking_effort:
          $ref: '#/components/schemas/ThinkingEffort'
          description: This session's reasoning-effort override, or absent when the session
            inherits the agent default. Turns resolve the effective level as agent default
            then this override.
        latest_compaction:
          $ref: '#/components/schemas/SessionCompactionBoundary'
          nullable: true
          description: The most recent compaction marker in the transcript, or null when the
            session has never been compacted. Delineates summarized history (sequences at
            or below `covers_through_sequence`) from the live tail. Returned on the single-session
            read; absent from list entries.
        message_count:
          type: integer
          description: Total messages currently in the session, including compaction summaries.
        token_input_total:
          type: integer
          description: Lifetime fresh (uncached) input-token total for this session. Prompt-cache
            tokens are reported separately in `cache_read_input_total` and `cache_creation_input_total`.
        token_output_total:
          type: integer
          description: Lifetime output-token total reported for this session.
        cache_read_input_total:
          type: integer
          description: Lifetime prompt-cache-read input-token total for this session.
        cache_creation_input_total:
          type: integer
          description: Lifetime prompt-cache-write (cache creation) input-token total for
            this session.
        version:
          type: integer
          description: Optimistic-concurrency version. Increments on every mutation.
        last_message_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent message append; null before any messages
            are stored.
        forked_from_session_id:
          type: string
          description: Source session this one was forked from, if any.
        forked_from_sequence:
          type: integer
          description: Sequence number in the source session at which the fork was taken.
        created_by:
          type: string
          description: User who created this session, if attribution was captured.
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
