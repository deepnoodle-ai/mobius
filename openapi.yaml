  /v1/projects/{project_handle}/sessions/{session_id}/messages:
    get:
      operationId: listSessionMessages
      tags:
      - sessions
      summary: List session messages
      description: 'Returns a page of session transcript messages. The page is sequence-anchored
        and bidirectional: `after_sequence` pages forward (newer), `before_sequence` pages
        backward (older), and `order=desc` fetches the newest messages — the tail of a long
        session — in a single request. Items are always returned ascending by `sequence`;
        the response carries both `next_sequence` (forward cursor) and `prev_sequence` (backward
        cursor).'
