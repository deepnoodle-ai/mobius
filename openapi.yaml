    TableSchema:
      type: object
      required:
      - columns
      additionalProperties: false
      properties:
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnDef'
          minItems: 1
          maxItems: 200
        indexes:
          type: array
          items:
            $ref: '#/components/schemas/IndexDef'
          maxItems: 20
    TableAccessMode:
      type: string
      enum:
      - project
      - private
      description: Controls read/write access to the table. "project" allows anyone with project
        table permissions (default for unowned tables). "private" restricts access to the
        owner only (default when an owner is set).
    Table:
      type: object
      additionalProperties: false
      required:
      - id
      - org_id
      - project_id
      - name
      - schema
      - access_mode
      - created_at
      - updated_at
      properties:
        id:
          type: string
        org_id:
          type: string
        project_id:
          type: string
        name:
          type: string
        scope:
          $ref: '#/components/schemas/ResourceScope'
        description:
          type: string
        schema:
          $ref: '#/components/schemas/TableSchema'
        tags:
          type: object
          additionalProperties:
            type: string
        owned_by:
          type: string
          description: Canonical user owner ID. AI-agent owners use their backing user ID.
        access_mode:
          allOf:
          - $ref: '#/components/schemas/TableAccessMode'
          description: Controls read/write access. When access_mode is "private", owned_by
            MUST be present; the server enforces this invariant. If access_mode is omitted
            on create, the server defaults to "private" when an owner is set and "project"
            when no owner is provided.
        created_by:
          type: string
          description: User ID of the principal who created this table.
        updated_by:
          type: string
          description: User ID of the principal who last updated this table.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TableListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Table'
        has_more:
          type: boolean
        next_cursor:
          type: string
    TableStats:
      type: object
      required:
      - table_id
      - row_count
      - approx_data_bytes
      - approx_index_bytes
      - indexed_column_count
      - declared_index_count
      - search_index_present
      - generated_at
      additionalProperties: false
      properties:
        table_id:
          type: string
        row_count:
          type: integer
          format: int64
        approx_data_bytes:
          type: integer
          format: int64
        approx_index_bytes:
          type: integer
          format: int64
        indexed_column_count:
          type: integer
        declared_index_count:
          type: integer
        search_index_present:
          type: boolean
        generated_at:
          type: string
          format: date-time
        oldest_row_created_at:
          type: string
          format: date-time
        newest_row_updated_at:
          type: string
          format: date-time
    CreateTableRequest:
      type: object
      required:
      - name
      - schema
      additionalProperties: false
      properties:
        name:
          type: string
          pattern: ^[a-z][a-z0-9_]*$
          maxLength: 64
        description:
          type: string
          maxLength: 1000
        schema:
          $ref: '#/components/schemas/TableSchema'
        scope:
          $ref: '#/components/schemas/ResourceScope'
        owned_by:
          type: string
          description: Canonical user owner ID. Required when `scope` is `owner`; defaults
            to the authenticated user for owned table creates.
        access_mode:
          $ref: '#/components/schemas/TableAccessMode'
    UpdateTableRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          maxLength: 1000
        schema:
          $ref: '#/components/schemas/TableSchema'
        scope:
          type: string
          allOf:
          - $ref: '#/components/schemas/ResourceScope'
          nullable: true
          description: Set to `owner` for owner-scoped names, or null to return to the project/default
            scope.
        owned_by:
          type: string
          nullable: true
          description: Canonical user owner ID. Send null to clear ownership.
        access_mode:
          $ref: '#/components/schemas/TableAccessMode'
    TableRow:
      type: object
      additionalProperties: false
      required:
      - id
      - table_id
      - data
      - version
      - created_at
      - updated_at
      properties:
        id:
          type: string
        table_id:
          type: string
        data:
          type: object
          additionalProperties: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InsertRowRequest:
      type: object
      required:
      - data
      additionalProperties: false
      properties:
        data:
          type: object
          additionalProperties: true
    UpdateRowRequest:
      type: object
      required:
      - data
      additionalProperties: false
      properties:
        data:
          type: object
          additionalProperties: true
        version:
          type: integer
          minimum: 0
          description: Expected version for optimistic locking. Omit or 0 to skip the check.
    QueryRowsRequest:
      type: object
      additionalProperties: false
      properties:
        filter:
          type: object
          additionalProperties: true
          description: Column equality or operator filter
        sort:
          type: array
          maxItems: 10
          items:
            type: object
            required:
            - field
            additionalProperties: false
            properties:
              field:
                type: string
              order:
                type: string
                enum:
                - asc
                - desc
                default: asc
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        cursor:
          type: string
          description: Opaque cursor from a prior response.
    QueryRowsResponse:
      type: object
      additionalProperties: false
      required:
      - rows
      - has_more
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/TableRow'
        has_more:
          type: boolean
        limit:
          type: integer
        next_cursor:
          type: string
    SearchRowsRequest:
      type: object
      required:
      - query
      additionalProperties: false
      properties:
        query:
          type: string
          minLength: 1
          description: Keyword search query.
        filter:
          type: object
          additionalProperties: true
          description: Optional column equality or operator filter applied before text search.
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        cursor:
          type: string
          description: Opaque cursor from a prior search response.
    SearchRowsResponse:
      type: object
      additionalProperties: false
      required:
      - rows
      - has_more
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/TableRow'
        has_more:
          type: boolean
        limit:
          type: integer
        next_cursor:
          type: string
    BulkInsertRowsRequest:
      type: object
      required:
      - rows
      additionalProperties: false
      properties:
        rows:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            type: object
            additionalProperties: true
    BulkInsertRowsResponse:
      type: object
      additionalProperties: false
      required:
      - inserted
      - rows
      properties:
        inserted:
          type: integer
        rows:
          type: array
          items:
            $ref: '#/components/schemas/TableRow'
    UpsertRowRequest:
      type: object
      required:
      - key_columns
      - data
      additionalProperties: false
      properties:
        key_columns:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 10
          description: Column names used to match an existing row.
        data:
          type: object
          additionalProperties: true
          description: Full row data. Must include values for all key_columns.
    UpsertRowResponse:
      type: object
      additionalProperties: false
      required:
      - row
      - created
      properties:
        row:
          $ref: '#/components/schemas/TableRow'
        created:
          type: boolean
          description: True when a new row was inserted; false when an existing row was updated.
