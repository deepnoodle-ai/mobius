      operationId: getRunStep
      tags:
      - runs
      summary: Get one run step
      description: Returns a single durable `RunStep` row for a workflow run. Run steps are
        the canonical execution history; linked job state, when present, is live worker-claim
        metadata and may disappear after terminal job retention.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: step_id
        in: path
        required: true
        schema:
          type: string
      - name: include
        in: query
        description: Pass `run_state_after` to include `run_state_after_b64`; it is omitted
