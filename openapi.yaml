      tags:
      - automations
      summary: List automations in a project
      description: Returns automations in the project, newest-first. Supports filtering by
        lifecycle status and cursor-based pagination. Archived automations are excluded by
        default; pass `status=archived` to list only archived, or `status=all` to include
        every status.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: status
        in: query
        description: Filter by lifecycle status. Omit to return all non-archived automations
          (the default). Pass a single status to filter to it exactly, or `all` to include
          archived automations too.
        schema:
          type: string
          enum:
          - draft
          - active
          - paused
          - archived
          - all
      - name: cursor
        in: query
        description: Opaque pagination cursor from a prior response.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of items to return.
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
