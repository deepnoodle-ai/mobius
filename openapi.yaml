      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/SessionIdParam'
      - $ref: '#/components/parameters/AfterSequenceParam'
      - $ref: '#/components/parameters/BeforeSequenceParam'
      - $ref: '#/components/parameters/OrderParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/ContextIncludeParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionMessageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: appendSessionMessages
