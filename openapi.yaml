  /v1/triggers/http/{http_handle}:
    post:
      operationId: deliverHTTPTrigger
      tags:
      - automations
      summary: Deliver an HTTP request payload to a trigger
      description: Public, unauthenticated endpoint that resolves the `http_handle` to a configured
        http-kind trigger and commits a durable source-event row; the run starts asynchronously.
        Idempotent on the `idempotency_key` query parameter or the standard `X-Idempotency-Key`
        header — repeats with the same key return the same `source_event_id` without enqueuing
        a duplicate. Resolve the resulting run via `GET /v1/projects/{project}/runs?source_event_id=<source_event_id>`.
      security: []
      parameters:
      - name: http_handle
        in: path
        required: true
        description: Globally unique identifier for the trigger. The endpoint carries no project
          context, so the handle is resolved on its own; it defaults to the trigger's globally
          unique id and is treated as an unguessable delivery token.
        schema:
          type: string
      - name: idempotency_key
        in: query
        required: false
        schema:
          type: string
        description: Optional idempotency key (also accepted via the X-Idempotency-Key header).
      - name: X-Idempotency-Key
        in: header
        required: false
        schema:
          type: string
        description: Alternative to the `idempotency_key` query parameter. When both are present
          the query parameter wins. Repeats with the same key return the same `source_event_id`
          (resolve the run via `source_event_id`) without enqueuing a duplicate.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Free-form payload forwarded to the run as inputs.
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPTriggerDeliveryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/automations/{handle}/runs:
    post:
      operationId: startRun
      tags:
      - runs
      summary: Start a new automation run
      description: |-
        Resolves `{handle}` to the latest runnable version and starts a run. Returns the created run when accepted, or the existing run when the request carries a `trigger_fire_id` (or `external_id`) that matches a still-active prior run (idempotent retry).

        Idempotency conflicts on `external_id` against a terminal-prior run surface as `409 Conflict` with error code `external_id_conflict` and `details` populated with `existing_run_id`, `status`, and `external_id`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: handle
        in: path
        required: true
        description: Automation handle (unique per project).
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAutomationRunRequest'
      responses:
        '202':
          description: Accepted. Returns the run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/runs:
    get:
      operationId: listRuns
      tags:
      - runs
      summary: List automation runs
      description: Returns automation runs for the project, newest-first. Supports filters
        by status, automation_id, and source_event_id, plus cursor-based pagination.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/AutomationRunStatus'
        description: Filter to one status.
      - name: automation_id
        in: query
        schema:
          type: string
        description: Filter to one automation's runs.
      - name: source_event_id
        in: query
        schema:
          type: string
        description: Filter to runs originating from a single source event. Pass the `source_event_id`
          returned by the HTTP-trigger delivery endpoint to discover the run it started.
      - name: cursor
        in: query
        schema:
          type: string
        description: Opaque pagination cursor from a prior response.
      - name: limit
        in: query
        description: Maximum number of items to return.
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRunListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/projects/{project}/runs/{id}:
    get:
      operationId: getRun
      tags:
      - runs
      summary: Get an automation run
      description: Returns one automation run by ID with its current status, inputs, result,
        and source attribution.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRun'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/runs/{id}/cancellations:
    post:
      operationId: cancelRun
      tags:
      - runs
      summary: Cancel an in-flight run
      description: Marks the run cancelled and closes any open waits. Safe to call on an already-terminal
        run (returns the current state, no error).
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
