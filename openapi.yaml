      - token
      - expires_at
      - repo_full_name
      properties:
        host:
          type: string
        username:
          type: string
        token:
          type: string
          description: One-time GitHub installation token. Do not log or persist.
        expires_at:
          type: string
          format: date-time
        repo_full_name:
          type: string
    SecretValues:
      type: object
      additionalProperties:
        type: string
      minProperties: 1
      description: JSON key/value payload encrypted as a SecretVersion.
    SecretVersionState:
      type: string
      enum:
      - ENABLED
      - DISABLED
      - DESTROYED
      description: Secret version lifecycle state.
    Secret:
      type: object
      additionalProperties: false
      description: Project-scoped secret metadata. Values are never returned.
      required:
      - id
      - name
      - version
      - key_names
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique secret ID.
        name:
          type: string
          description: Project-scoped secret name.
        description:
          type: string
          description: Optional human-readable description.
        version:
          type: integer
          format: int64
          description: Latest version number.
        key_names:
          type: array
          items:
            type: string
          description: Sorted keys present in the latest version.
        created_by:
          type: string
          description: User ID of the principal who created this secret.
        updated_by:
          type: string
          description: User ID of the principal who last updated this secret.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SecretVersion:
      type: object
      additionalProperties: false
      description: SecretVersion metadata. Values are never returned.
      required:
      - id
      - secret_id
      - version
      - state
      - sha256
      - created_at
      properties:
        id:
          type: string
          description: Unique secret version ID.
        secret_id:
          type: string
          description: Parent secret ID.
        version:
          type: integer
          format: int64
          description: Version number.
        state:
          $ref: '#/components/schemas/SecretVersionState'
        sha256:
          type: string
          description: SHA-256 of the canonical JSON plaintext, for change detection only.
        kms_key_id:
          type: string
          description: Key identifier used to seal the payload.
        created_by:
          type: string
          description: User that created this version, when known.
        created_at:
          type: string
          format: date-time
        destroyed_at:
          type: string
          format: date-time
    SecretListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Secret'
        next_cursor:
          type: string
          description: Cursor for the next page, when more results exist.
    SecretVersionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SecretVersion'
    CreateSecretRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - values
      properties:
        name:
          type: string
          description: Project-scoped secret name.
        description:
          type: string
          description: Optional human-readable description.
        values:
          $ref: '#/components/schemas/SecretValues'
    UpdateSecretRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          description: Replacement description.
        values:
          $ref: '#/components/schemas/SecretValues'
    WorkerSession:
      type: object
      additionalProperties: false
      description: Recently observed worker process for a project. Use sessions to see which
        machines, users, service accounts, or agents are polling for work, what their configured
        concurrency is, and whether they appear stale.
      required:
      - id
      - worker_instance_id
      - concurrency_limit
      - instance_status
      - stale
      - busy_job_count
      - current_jobs
      properties:
        id:
          type: string
          description: Server-assigned session row ID (`wsess_…`). Generated by the control
            plane on first registration; opaque to workers and stable across refreshes for
            a given live row.
        worker_instance_id:
          type: string
          description: Caller-configured stable identifier for the worker process. The SDK
            auto-detects this from the runtime platform (Cloud Run revision, Kubernetes pod,
            Fly machine, Railway replica, Render instance) and falls back to a UUID. Unique
            within `(org_id, project_id)`.
        concurrency_limit:
          type: integer
          minimum: 1
          description: Configured maximum number of jobs this worker process will hold in
            flight simultaneously. Reported by the SDK on register; rendered as a saturation
            bar in the admin UI (`busy_job_count / concurrency_limit`).
        name:
          type: string
          description: Optional human-readable name supplied in the claim request.
        version:
          type: string
          description: Optional version string supplied in the claim request.
        last_seen_at:
          type: string
          format: date-time
          description: Timestamp of this session's most recent register, claim, or job heartbeat
            activity. Used to compute `stale`.
        last_activity_at:
          type: string
          format: date-time
          description: Most recent observed activity for this session, derived from `last_seen_at`,
            currently claimed job heartbeats, and the latest terminal job update.
        capabilities:
          type: array
          items:
            type: string
          description: Coarse capability labels advertised by the worker for routing and builder
            eligibility.
        queues:
          type: array
          items:
            type: string
          description: Queue names this worker can claim. Empty or absent means the default
            project queue set.
        action_names:
          type: array
          items:
            type: string
          description: Action names this worker can execute. Empty or absent means the worker
            has not advertised a narrowed action set.
        models:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSocketModelCapability'
          description: Provider/model pairs this worker can generate with.
        service_account_id:
          type: string
          description: Service account this session authenticated as on register/heartbeat.
            Set when a machine identity is polling; mutually exclusive with `user_id`. Stable
            across credential rotation — use this to group sessions by identity in the admin
            UI.
        user_id:
          type: string
          description: User this session authenticated as on register/heartbeat. Set when
            a human is polling via the CLI; mutually exclusive with `service_account_id`.
        user:
          $ref: '#/components/schemas/User'
          description: Embedded profile for `user_id` when this is a CLI-backed human worker
            session. Absent when the user record is unavailable or the session is service-account-backed.
        api_key_id:
          type: string
          description: ID of the specific API key this session presented on its most recent
            register/heartbeat. Only set for service-account-backed sessions; changes across
            credential rotations. Use together with `service_account_id` to see rotation progress
            across a fleet.
        agent_id:
          type: string
          description: Agent this session represents, when the polling process declared itself
            as a registered agent (via `agent_id` on the claim request or via inference from
            the service account). Absent for ad-hoc worker processes that are not tied to
            a declared agent.
        environment_id:
          type: string
          description: Managed environment this worker is running inside, when Mobius started
            it in a Sprite or another managed execution environment.
        instance_status:
          type: string
          enum:
          - active
          - stale
          - draining
          description: |-
            High-level lifecycle indicator for the row.
            * `active` — recent heartbeat, healthy.
            * `stale` — no heartbeat within the staleness window; row
            retained for display until the 30-day delete floor.
            * `draining` — explicit graceful-shutdown signal from the
            SDK (reserved for future SDK releases).

            Conflicts (a different process tried to register this `worker_instance_id` within the takeover window and was rejected) are surfaced inline as a 409 from the worker protocol; the previous registration's row remains `active` and never appears as a separate "conflicting" entry.
        stale:
          type: boolean
          description: True when `last_seen_at` is older than 2 minutes or absent. Computed
            at read time, not stored. Equivalent to `instance_status == "stale"`; both are
            returned for backward compatibility while clients update.
        busy_job_count:
          type: integer
          minimum: 0
          description: Number of jobs this worker session is currently holding.
        current_jobs:
          type: array
          description: Currently claimed jobs held by this worker session.
          items:
            $ref: '#/components/schemas/WorkerSessionJobRef'
        last_job:
          $ref: '#/components/schemas/WorkerSessionJobRef'
          description: Most recent completed or failed job this worker session handled.
    WorkerSessionJobRef:
      type: object
      additionalProperties: false
      required:
      - id
      - run_id
      - step_name
      - action
      - status
      - updated_at
      properties:
        id:
          type: string
          description: Job ID.
        run_id:
          type: string
          description: Automation run that owns the job.
        step_name:
          type: string
          description: Automation step name.
        action:
          type: string
          description: Action executed by the worker.
        status:
          type: string
          enum:
          - pending
          - claimed
          - completed
          - failed
          description: Current job lifecycle state.
        claimed_at:
          type: string
          format: date-time
          description: Timestamp when the worker claimed the job.
        heartbeat_at:
          type: string
          format: date-time
          description: Most recent heartbeat timestamp while the job is claimed.
        updated_at:
          type: string
          format: date-time
          description: Last job update timestamp.
    WorkerSessionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - totals
      properties:
        items:
          type: array
          description: The list of recently seen worker sessions.
          items:
            $ref: '#/components/schemas/WorkerSession'
        totals:
          $ref: '#/components/schemas/WorkerSessionTotals'
          description: Aggregate counts across `items`, computed by the server so UIs do not
            need to re-derive them on every render.
    WorkerSessionTotals:
      type: object
      additionalProperties: false
      required:
      - active_instances
      - slots
      - busy
      - stale
      description: Project-wide rollup of the rendered worker sessions. Useful for the page
        header — "3 active instances · 18 slots · 7 busy · 1 stale" — without iterating items
        client-side.
      properties:
        active_instances:
          type: integer
          minimum: 0
          description: Count of `instance_status == "active"` rows.
        slots:
          type: integer
          minimum: 0
          description: Sum of `concurrency_limit` across active rows.
        busy:
          type: integer
          minimum: 0
          description: Sum of `busy_job_count` across active rows.
        stale:
          type: integer
          minimum: 0
          description: Count of `instance_status == "stale"` rows.
    WorkerSocketModelCapability:
      type: object
      additionalProperties: false
      required:
      - provider
      - model
      properties:
        provider:
          type: string
          description: LLM provider identifier, such as `ollama`.
        model:
          type: string
          description: Provider-local model name.
    WorkerSocketFrame:
      oneOf:
      - $ref: '#/components/schemas/WorkerSocketRegisterFrame'
      - $ref: '#/components/schemas/WorkerSocketRegisteredFrame'
      - $ref: '#/components/schemas/WorkerSocketReadyFrame'
      - $ref: '#/components/schemas/WorkerSocketJobsClaimFrame'
      - $ref: '#/components/schemas/WorkerSocketJobsClaimedFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkAvailableFrame'
      - $ref: '#/components/schemas/WorkerSocketJobHeartbeatFrame'
      - $ref: '#/components/schemas/WorkerSocketJobHeartbeatAckFrame'
      - $ref: '#/components/schemas/WorkerSocketJobReportFrame'
      - $ref: '#/components/schemas/WorkerSocketJobReportAckFrame'
      - $ref: '#/components/schemas/WorkerSocketGenerationDeltaFrame'
      - $ref: '#/components/schemas/WorkerSocketGenerationDeltaAckFrame'
      - $ref: '#/components/schemas/WorkerSocketJobCancelFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkerDrainingFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkerDrainingAckFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkerDrainFrame'
      - $ref: '#/components/schemas/WorkerSocketKeepaliveFrame'
      - $ref: '#/components/schemas/WorkerSocketErrorFrame'
      description: Typed JSON frame exchanged over `/workers/socket`. WebSocket traffic is
        not ordinary request/response HTTP, but the frame schemas are included in the public
        OpenAPI contract so SDKs can share a wire format.
    WorkerSocketMessageID:
      type: string
      description: Client-supplied correlation and short-window deduplication key. When present
        on a client frame, the server echoes it on the response frame.
    WorkerSocketLeaseConfig:
      type: object
      additionalProperties: false
      required:
      - lease_duration_seconds
      - heartbeat_cadence_seconds
      properties:
        lease_duration_seconds:
          type: integer
          minimum: 1
          description: Per-job lease duration stamped on claims.
        heartbeat_cadence_seconds:
          type: integer
          minimum: 1
          description: Recommended heartbeat cadence while a job is running.
    WorkerSocketCancelDirective:
      type: object
      additionalProperties: false
      required:
      - job_id
      properties:
        job_id:
          type: string
        reason:
          type: string
        requested_at:
          type: string
          format: date-time
    WorkerSocketProtocolError:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      properties:
        code:
          type: string
        message:
          type: string
    WorkerSocketRegisterFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - worker_instance_id
      properties:
        type:
          type: string
          enum:
          - worker.register
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        worker_instance_id:
          type: string
          description: Stable process identity reported by the worker SDK.
        worker_session_token:
          type: string
          description: Previously issued session token used on reconnect; omitted on first
            register.
        concurrency_limit:
          type: integer
          minimum: 1
          description: Maximum jobs this worker process will hold concurrently.
        available_slots:
          type: integer
          minimum: 0
          description: Currently available capacity. Defaults to `concurrency_limit`.
        name:
          type: string
        version:
          type: string
        environment_id:
          type: string
          description: Environment this worker is running inside, when the worker was started
            by Mobius in a Sprite or other managed environment.
        capabilities:
          type: array
          items:
            type: string
          description: Coarse capability labels reserved for future routing.
        queues:
          type: array
          items:
            type: string
          description: Queue names this worker can claim. Empty means all project queues.
        action_names:
          type: array
          items:
            type: string
          description: Action names this worker can execute. Empty means every locally registered
            action.
        models:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSocketModelCapability'
          description: Provider/model pairs this worker can generate with.
    WorkerSocketRegisteredFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - worker_session_token
      - lease
      properties:
        type:
          type: string
          enum:
          - worker.registered
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        worker_session_token:
          type: string
          description: Server-issued per-session token to reuse after reconnects.
        lease:
          $ref: '#/components/schemas/WorkerSocketLeaseConfig'
    WorkerSocketReadyFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - worker.ready
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        available_slots:
          type: integer
          minimum: 0
        queues:
          type: array
          items:
            type: string
        action_names:
          type: array
          items:
            type: string
        models:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSocketModelCapability'
    WorkerSocketJobsClaimFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - jobs.claim
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        available_slots:
          type: integer
          minimum: 0
        queues:
          type: array
          items:
            type: string
        action_names:
          type: array
          items:
            type: string
        models:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSocketModelCapability'
    WorkerSocketClaimedJob:
      type: object
      additionalProperties: false
      required:
      - id
      - kind
      - origin
      - executor_kind
      - queue
      - spec
      - lease_token
      - claim_attempt
      - lease_duration_seconds
      - heartbeat_cadence_seconds
      properties:
        id:
          type: string
          description: Job ID.
        kind:
          type: string
          enum:
          - action_execution
          - llm_generation
        origin:
          type: string
          enum:
          - automation_action_step
          - agent_tool_call
          - agent_llm_call
          - conversation_tool_call
          - conversation_llm_call
          - server_internal
        executor_kind:
          type: string
          enum:
          - customer_worker
          - server_worker
        queue:
          type: string
        action_name:
          type: string
          description: Present for `action_execution` jobs.
        environment_id:
          type: string
          description: Present when the job is pinned to a managed environment worker.
        provider:
          type: string
          description: Present for `llm_generation` jobs.
        model:
          type: string
          description: Present for `llm_generation` jobs.
        run_id:
          type: string
        step_id:
          type: string
        agent_turn_id:
          type: string
        session_id:
          type: string
        tool_call_id:
          type: string
        spec:
          type: object
          additionalProperties: true
          description: Worker-specific action or generation payload.
        lease_token:
          type: string
          description: Opaque per-job lease fence returned by claim.
        claim_attempt:
          type: integer
          minimum: 1
        lease_duration_seconds:
          type: integer
          minimum: 1
        heartbeat_cadence_seconds:
          type: integer
          minimum: 1
    WorkerSocketJobsClaimedFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - jobs
      properties:
        type:
          type: string
          enum:
          - jobs.claimed
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSocketClaimedJob'
    WorkerSocketWorkAvailableFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - work.available
    WorkerSocketJobHeartbeatFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      - lease_token
      properties:
        type:
          type: string
          enum:
          - job.heartbeat
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        lease_token:
          type: string
          description: Opaque per-job lease fence returned by claim.
    WorkerSocketJobHeartbeatAckFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      properties:
        type:
          type: string
          enum:
          - job.heartbeat.ack
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        cancel:
          $ref: '#/components/schemas/WorkerSocketCancelDirective'
    WorkerSocketJobReportFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      - lease_token
      properties:
        type:
          type: string
          enum:
          - job.report
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        lease_token:
          type: string
          description: Opaque per-job lease fence returned by claim.
        status:
          type: string
          enum:
          - completed
          - failed
          - cancelled
          default: completed
        result:
          type: object
          additionalProperties: true
        error_type:
          type: string
        error_message:
          type: string
    WorkerSocketJobReportAckFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      properties:
        type:
          type: string
          enum:
          - job.report.ack
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        duplicate:
          type: boolean
          description: True when an identical terminal report was already accepted for this
            lease.
    WorkerSocketGenerationDeltaFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      - lease_token
      - sequence
      - delta
      properties:
        type:
          type: string
          enum:
          - generation.delta
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        lease_token:
          type: string
          description: Opaque per-job lease fence returned by claim.
        sequence:
          type: integer
          format: int64
          minimum: 0
          description: Worker-local monotonically increasing sequence for this generation.
        delta:
          type: object
          additionalProperties: true
          description: Provider-neutral streaming delta payload.
    WorkerSocketGenerationDeltaAckFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      - received_sequence
      properties:
        type:
          type: string
          enum:
          - generation.delta.ack
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        received_sequence:
          type: integer
          format: int64
    WorkerSocketJobCancelFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      properties:
        type:
          type: string
          enum:
          - job.cancel
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        reason:
          type: string
        requested_at:
          type: string
          format: date-time
    WorkerSocketWorkerDrainingFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - worker.draining
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
    WorkerSocketWorkerDrainingAckFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - worker.draining.ack
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
    WorkerSocketWorkerDrainFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - worker.drain
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
    WorkerSocketKeepaliveFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - keepalive
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
    WorkerSocketErrorFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - error
      properties:
        type:
          type: string
          enum:
          - error
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        error:
          $ref: '#/components/schemas/WorkerSocketProtocolError'
    ConfigEntry:
      type: object
      additionalProperties: false
      required:
      - key
      - value
      properties:
        key:
          type: string
          minLength: 1
        value: {}
    ConfigEntries:
      type: array
      items:
        $ref: '#/components/schemas/ConfigEntry'
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug for API routes. Auto-derived from name if omitted. Must
            be unique within the org. Cannot be changed after creation.
        description:
          type: string
          description: Optional human-readable description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Initial project access policy: `org_open` or `restricted`.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        description:
          type: string
          description: Replacement description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Replacement project access policy: `org_open` or `restricted`.'
        seed_existing_members:
          type: boolean
          description: When transitioning from `org_open` to `restricted`, set true to insert
            all current org members as project members so nobody loses visibility on the flip.
            Ignored on other transitions.
        default_agent_role_id:
          type: string
          nullable: true
          description: Replacement role assigned to the auto-created service account of any
            new agent in this project. `null` clears the override and falls through to the
            system `Agent` role floor. Must resolve to a system-defined role or a role scoped
            to this project.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the project.
    ProjectMember:
      type: object
      additionalProperties: false
      description: Explicit project membership used when a project is restricted. Use this
        record to decide who can see or operate on a project outside the default org-wide
        access model.
      required:
      - id
      - project_id
      - user_id
      - added_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        project_id:
          type: string
          description: ID of the project this membership belongs to.
        user_id:
          type: string
          description: ID of the user who is a member.
        user:
          $ref: '#/components/schemas/User'
          description: Profile of the member. Embedded by `listProjectMembers` so UIs can
            render names, emails, and avatars without a separate user lookup. Absent on the
            `addProjectMember` response.
        added_by_user_id:
          type: string
          description: User ID of whoever added this member, if recorded.
        added_at:
          type: string
          format: date-time
          description: Timestamp when the member was added.
    ProjectMemberListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of members for this project.
          items:
            $ref: '#/components/schemas/ProjectMember'
        has_more:
          type: boolean
          description: Whether more results are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    AddProjectMemberRequest:
      type: object
      additionalProperties: false
      required:
      - user_id
      properties:
        user_id:
          type: string
          description: User ID of the org member to add to this project.
    FeatureGateSource:
      type: string
      enum:
      - default
      - org_override
      - project_override
      description: Source of the effective feature gate decision.
    FeatureGate:
      type: object
      additionalProperties: false
      required:
      - key
      - label
      - description
      - enabled
      - default_enabled
      - source
      - allowed_scopes
      properties:
        key:
          $ref: '#/components/schemas/FeatureKey'
        label:
          type: string
          description: Short user-facing name.
        description:
          type: string
          description: User-facing description of the gated product area.
        enabled:
          type: boolean
          description: Effective state after resolving defaults and overrides.
        default_enabled:
          type: boolean
          description: Built-in fallback state when no active override applies.
        source:
          $ref: '#/components/schemas/FeatureGateSource'
        source_scope:
          $ref: '#/components/schemas/FeatureOverrideScope'
          description: Override scope that produced this state, omitted for defaults.
        source_org_id:
          type: string
          description: Org ID for the override that produced this state.
        source_project_id:
          type: string
          description: Project ID for the override that produced this state.
        reason:
          type: string
          description: Optional operator-supplied reason from the active override.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiry for the active override.
        allowed_scopes:
          type: array
          items:
            $ref: '#/components/schemas/FeatureOverrideScope'
    FeatureGateListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FeatureGate'
    WebhookDeliveryStatus:
      type: string
      enum:
      - pending
      - processing
      - delivered
      - failed
      description: '`pending` — queued, not yet attempted. `processing` — currently being
        delivered. `delivered` — recipient returned 2xx. `failed` — all retry attempts exhausted.'
    Webhook:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - url
      - events
      - enabled
      - created_at
      - updated_at
      description: A project-level outgoing webhook subscription. When a subscribed event
        fires, Mobius POSTs the event payload to `url`.
      properties:
        id:
          type: string
          description: Unique identifier for this webhook.
        name:
          type: string
          description: Human-readable name, unique within the project.
        url:
          type: string
          description: The customer endpoint Mobius POSTs event payloads to.
        events:
          type: array
          items:
            type: string
          description: Subscribed event types. Use dot notation (`run.completed`, `run.failed`)
            or wildcards (`run.*` for all run events). An empty list subscribes to all event
            types.
        enabled:
          type: boolean
          description: When false, matching events are not delivered.
        created_by:
          type: string
          description: User ID of the principal who created this webhook.
        updated_by:
          type: string
          description: User ID of the principal who last updated this webhook.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this webhook.
        secret_ref:
          type: string
          description: Project secret reference that stores this webhook's signing key.
        secret_version:
          type: integer
          format: int64
          description: Version of `secret_ref` created by this response. Only populated on
            create and rotate responses.
        signing_secret:
          type: string
          description: Base64-encoded 32-byte HMAC-SHA256 signing key. Only populated on create
            and rotate responses; null on all other reads. Store this value securely on first
            receipt — it cannot be retrieved again.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this webhook was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this webhook was last updated.
    WebhookListResponse:
      type: object
      additionalProperties: false
      required:
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Webhook'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    WebhookDeliveryRecord:
      type: object
      additionalProperties: false
      required:
      - id
      - webhook_id
      - event_type
      - status
      - attempts
      - created_at
      description: One delivery record for a webhook event. The daemon claims pending rows,
        POSTs the payload, and transitions to `delivered` or retries on failure. A delivery
        reaches `failed` only after exhausting all 10 retry attempts.
      properties:
        id:
          type: string
          description: Unique identifier for this delivery record.
        webhook_id:
          type: string
          description: ID of the webhook this delivery belongs to.
        run_id:
          type: string
          description: Run that triggered the event, when applicable.
        event_type:
          type: string
          description: The event type that triggered this delivery (e.g. `run.completed`).
        status:
          $ref: '#/components/schemas/WebhookDeliveryStatus'
          description: 'Current delivery status: `pending`, `delivered`, or `failed`.'
        attempts:
          type: integer
          description: Number of delivery attempts made so far. Max 10.
        last_error:
          type: string
          description: Error message from the most recent failed attempt.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this delivery was first attempted.
        delivered_at:
          type: string
          format: date-time
          description: Timestamp of the successful delivery. Absent until delivered.
    WebhookDeliveryListResponse:
      type: object
      additionalProperties: false
      required:
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/WebhookDeliveryRecord'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateWebhookRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - events
      properties:
        name:
          type: string
          description: Human-readable name, unique within the project.
        url:
          type: string
          description: The endpoint Mobius will POST event payloads to. May be left empty
            at creation time so a candidate URL can be tested via the ping endpoint before
            it is saved; events do not fire for webhooks with an empty URL.
        events:
          type: array
          items:
            type: string
          description: Event types to subscribe to. Use wildcards for broad subscriptions,
            e.g. `["run.*"]` for all run events. An empty list subscribes to all event types.
        enabled:
          type: boolean
          description: Whether the webhook starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateWebhookRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        url:
          type: string
          description: Replacement endpoint URL.
        events:
          type: array
          items:
            type: string
          description: Replacement event subscriptions. Replaces the entire current list;
            an empty list subscribes to all event types.
        enabled:
          type: boolean
          description: Set to false to disable delivery without deleting the webhook.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the webhook. System tags
            (`mobius:*`) are preserved.
    PingWebhookRequest:
      type: object
      additionalProperties: false
      properties:
        url:
          type: string
          description: URL to test. When supplied, the ping is sent to this URL instead of
            the webhook's saved URL — use this to validate a candidate URL before saving it.
            When omitted, the webhook's current saved URL is used.
    PingWebhookResult:
      type: object
      additionalProperties: false
      required:
      - success
      properties:
        success:
          type: boolean
          description: True if the target responded with a 2xx status code.
        status_code:
          type: integer
          description: HTTP status code returned by the target. Absent on network error.
        error:
          type: string
          description: Error message if the request could not be completed.
        latency_ms:
          type: integer
          description: Round-trip latency in milliseconds.
    PermissionDefinition:
      type: object
      additionalProperties: false
      required:
      - id
      - label
      - description
      - scope
      - category
      - risk
      - assignable
      - user_kinds
      properties:
        id:
          type: string
          description: Stable permission ID stored on roles.
        label:
          type: string
          description: Human-readable label for product UI.
        description:
          type: string
          description: Short explanation of what the permission grants.
        scope:
          type: string
          enum:
          - project
          - org
          - platform
          - action
        category:
          type: string
          enum:
          - project
          - access
          - automations
          - runs
          - work
          - integrations
          - audit
          - billing
          - platform
          - actions
        risk:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
        assignable:
          type: boolean
          description: Whether this permission should be selectable in the current project
            role builder.
        user_kinds:
          type: array
          minItems: 1
          maxItems: 4
          uniqueItems: true
          items:
            type: string
            enum:
            - human
            - agent
            - service_account
            - system
          description: User kinds this permission is intended for.
    PermissionPreset:
      type: object
      additionalProperties: false
      required:
      - id
      - label
      - description
      - scope
      - permissions
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
        scope:
          type: string
          enum:
          - project
          - org
          - platform
          - action
        permissions:
          type: array
          maxItems: 64
          items:
            type: string
    ActionPermissionGroup:
      type: object
      additionalProperties: false
      required:
      - id
      - label
      - source
      - children
      properties:
        id:
          type: string
          description: Wildcard permission ID, for example `actions.execute.slack.*`.
        label:
          type: string
        source:
          type: string
          enum:
          - platform
          - integration
          - custom
        children:
          type: array
          maxItems: 200
          items:
            type: string
          description: Concrete action execution permission IDs included in this group.
    PermissionCatalogResponse:
      type: object
      additionalProperties: false
      required:
      - permissions
      - presets
      - action_groups
      properties:
        permissions:
          type: array
          maxItems: 64
          items:
            $ref: '#/components/schemas/PermissionDefinition'
        presets:
          type: array
          maxItems: 32
          items:
            $ref: '#/components/schemas/PermissionPreset'
        action_groups:
          type: array
          maxItems: 64
          items:
            $ref: '#/components/schemas/ActionPermissionGroup'
    Role:
      type: object
      additionalProperties: false
      description: Named bundle of permissions assignable to users or service accounts. Roles
        let admins grant automation, project, and integration capabilities consistently without
        editing every user individually.
      required:
      - id
      - name
      - permissions
      - system_defined
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this role.
        project_id:
          type: string
          description: Scoping project. Empty for system-defined roles.
        name:
          type: string
          description: Human-readable role name, unique within org+project scope.
        description:
          type: string
          description: Optional human-readable description of what this role grants.
        permissions:
          type: array
          items:
            type: string
          description: Permission strings granted by this role. Source allowed values from
            `GET /v1/projects/{project}/permissions`; legacy IDs or values not present in
            that catalog are rejected.
        system_defined:
          type: boolean
          description: True for built-in platform roles that cannot be modified or deleted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this role.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this role was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this role was last updated.
    RoleAssignment:
      type: object
      additionalProperties: false
      description: Binding between a User and a role in one project. Use assignments to explain
        why a user or service account has access and to audit who granted it.
      required:
      - id
      - user_id
      - role_id
      - role_name
      - project_id
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this role assignment.
        user_id:
          type: string
          description: User ID receiving the role.
        role_id:
          type: string
          description: ID of the assigned role.
        role_name:
          type: string
          description: Name of the assigned role.
        project_id:
          type: string
          description: Project this assignment belongs to.
        granted_by_user_id:
          type: string
          description: User ID of the caller who created this assignment.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this assignment was created.
    RoleListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Role'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    RoleAssignmentListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/RoleAssignment'
    CreateRoleRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - permissions
      properties:
        name:
          type: string
          description: Unique name within the project.
        description:
          type: string
          description: Optional human-readable description of what this role grants.
        permissions:
          type: array
          items:
            type: string
          description: Permission strings to include. Source allowed values from `GET /v1/projects/{project}/permissions`;
            legacy IDs or values not present in that catalog are rejected.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateRoleRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          description: Replacement description.
        permissions:
          type: array
          items:
            type: string
          description: Replaces the existing permissions array entirely. Source allowed values
            from `GET /v1/projects/{project}/permissions`; legacy IDs or values not present
            in that catalog are rejected.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the role. System tags (`mobius:*`)
            are preserved.
    CreateRoleAssignmentRequest:
      type: object
      additionalProperties: false
      required:
      - user_id
      oneOf:
      - required:
        - role_id
      - required:
        - role_name
      properties:
        user_id:
          type: string
          description: Principal User ID to assign the role to.
        role_id:
          type: string
          description: Mutually exclusive with `role_name`.
        role_name:
          type: string
          description: Resolved to a role ID server-side. Mutually exclusive with `role_id`.
    InteractionKind:
      type: string
      enum:
      - request_information
      - request_approval
      - request_review
      description: |-
        Protocol kind of the interaction. Launch keeps this intentionally
        small:
        * `request_information` — a data-collection protocol with structured
        or free-form input
        * `request_approval` — a decision protocol (yes/no, optionally
        yes/no/defer)
        * `request_review` — a judgment protocol that evaluates supplied
        material
    InteractionValue:
      description: Free-form JSON payload. Used both for responder-supplied values and for
        policy-derived values (e.g. `Interaction.outcome`, `ResolutionPolicy.proposal`); each
        consumer documents which.
      anyOf:
      - type: object
        nullable: true
        additionalProperties: true
      - type: array
        items: {}
      - type: string
      - type: number
      - type: boolean
    InteractionResponder:
      type: object
      required:
      - user_id
      additionalProperties: false
      description: Identifies the user who answered an interaction. Agents answer through
        their backing users.id.
      properties:
        user_id:
          type: string
          description: Responder user ID.
    InteractionReference:
      type: object
      additionalProperties: false
      required:
      - kind
      description: Pointer to the work item, artifact, external ticket, or Mobius entity this
        interaction is about.
      properties:
        kind:
          type: string
          enum:
          - external_url
          - mobius_entity
        url:
          type: string
          format: uri
          description: Required when kind is `external_url`.
        entity_type:
          type: string
          description: Required when kind is `mobius_entity`.
        entity_id:
          type: string
          description: Required when kind is `mobius_entity`.
        project_id:
          type: string
          description: Optional project scope for Mobius entity references.
        relation:
          type: string
          description: Relationship such as `subject`, `evidence`, or `related`.
        label:
          type: string
          description: User-facing label for display.
    Delivery:
      type: object
      additionalProperties: false
      required:
      - channels
      description: Optional per-interaction delivery override. When absent, each participant
        is notified via the app inbox only.
      properties:
        channels:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DeliveryChannel'
    DeliveryChannel:
      type: object
      additionalProperties: false
      required:
      - kind
      description: A single delivery destination. `inbox_only` carries no payload; `email`
        requires the `email` variant.
      properties:
        kind:
          type: string
          enum:
          - inbox_only
          - email
        email:
          type: object
          allOf:
          - $ref: '#/components/schemas/EmailDelivery'
          nullable: true
    EmailDelivery:
      type: object
      additionalProperties: false
      required:
      - to
      properties:
        to:
          type: array
          minItems: 1
          items:
            type: string
            format: email
    Consumer:
      type: object
      additionalProperties: false
      required:
      - kind
      description: 'Polymorphic identifier of what is waiting on this interaction''s resolution
        (PRD 077 §3.7). Replaces the previously special-cased `run_id` + `signal_name` pair.
        When `kind=run`, the legacy fields are also populated for compatibility. `http_subscriber`
        requires `secret_ref` and enqueues a durable callback dispatch to `callback_url` when
        the interaction resolves; the canonical string `v1.{delivery_id}.{unix_timestamp}.{raw_body}`
        is signed with HMAC-SHA256 against the resolved project signing key and the signed
        dispatch carries `X-Mobius-Signature`, `X-Mobius-Secret-Ref`, `X-Mobius-Secret-Version`,
        and `X-Mobius-Timestamp`. Signed dispatches also carry `X-Mobius-Signature-Version:
        v1`. Every durable dispatch also carries the stable outbox row id in `X-Mobius-Delivery-Id`
        and `Idempotency-Key`; retries reuse the same value. Verifiers should recompute the
        signature over the exact raw body, reject stale timestamps (for example, older than
        five minutes), deduplicate by delivery id, and check the signing headers.'
      properties:
        kind:
          type: string
          enum:
          - run
          - agent_tool
          - http_subscriber
          - none
        run:
          type: object
          allOf:
          - $ref: '#/components/schemas/RunConsumer'
          nullable: true
        agent_tool:
          type: object
          allOf:
          - $ref: '#/components/schemas/AgentToolConsumer'
          nullable: true
        http_subscriber:
          type: object
          allOf:
          - $ref: '#/components/schemas/HttpSubscriberConsumer'
          nullable: true
    RunConsumer:
      type: object
      additionalProperties: false
      required:
      - run_id
      - signal_name
      properties:
        run_id:
          type: string
        signal_name:
          type: string
    AgentToolConsumer:
      type: object
      additionalProperties: false
      required:
      - invocation_id
      - tool_call_id
      properties:
        invocation_id:
          type: string
        tool_call_id:
          type: string
    HttpSubscriberConsumer:
      type: object
      additionalProperties: false
      required:
      - callback_url
      - secret_ref
      properties:
        callback_url:
          type: string
          format: uri
          description: Absolute http(s) URL the server POSTs to when the interaction resolves.
            The body is a JSON object with the interaction id, kind, status, outcome value,
            comment, responder, and `resolved_by`. Delivery is enqueued as a `source_events`
            dispatch so the worker can retry failed attempts instead of dropping them inline
            with interaction resolution.
        secret_ref:
          type: string
          description: 'Required reference to a project secret used to sign deliveries with
            HMAC-SHA256 over the canonical string `v1.{delivery_id}.{unix_timestamp}.{raw_body}`,
            where `delivery_id` is the value in `X-Mobius-Delivery-Id` and `raw_body` is the
            exact callback request body bytes. Accepts `<name>` for the latest enabled version
            or `<name>:<version>` to pin a specific positive-integer version. The plaintext
            signing bytes are taken from the secret''s `signing_key_b64` key, which must base64-decode
            to exactly 32 bytes. The hex signature is forwarded as `X-Mobius-Signature: sha256=<hex>`
            alongside `X-Mobius-Secret-Ref`, `X-Mobius-Secret-Version`, `X-Mobius-Signature-Version:
            v1`, and a unix `X-Mobius-Timestamp`. Consumers should reject stale timestamps
            (for example, older than five minutes). When `secret_ref` resolution fails the
            dispatch is retried by the event processor rather than sent unsigned.'
    InteractionResponse:
      type: object
      additionalProperties: false
      description: One persisted answer artifact for an interaction. The response that triggered
        resolution is referenced from `Interaction.resolving_response_id`.
      required:
      - id
      - interaction_id
      - response_kind
      - state
      - responder_user_id
      - value
      - responded_at
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this response.
        interaction_id:
          type: string
          description: ID of the interaction this response belongs to.
        response_kind:
          type: string
          enum:
          - response
          description: Answer response.
        state:
          type: string
          enum:
          - submitted
          description: Lifecycle state for this response row.
        responder_user_id:
          type: string
          description: User ID that submitted this response.
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by this participant.
        comment:
          type: string
          nullable: true
          description: Optional free-text comment from this responder.
        responded_at:
          type: string
          format: date-time
          description: Timestamp when this response was submitted.
        attempt:
          type: integer
          nullable: true
          description: Reserved for future retry-aware response flows.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ResolutionPolicy:
      type: object
      additionalProperties: false
      required:
      - type
      description: Declarative resolution rule attached to an Interaction. Determines how
        participant responses become a final outcome.
      properties:
        type:
          type: string
          enum:
          - any_of
          - all_of
          - quorum
          description: Resolution rule. `any_of` resolves on the first acceptable response.
            `all_of` waits for every assigned participant. `quorum` resolves once `threshold`
            distinct participants respond.
        threshold:
          type: integer
          minimum: 1
          description: Required when `type` is `quorum`. Number of distinct eligible participants
            that must respond before the interaction resolves. Must be `>= 1` and `<=` the
            participant count.
    Interaction:
      type: object
      additionalProperties: false
      description: Human or agent interaction request and its current response state.
      required:
      - id
      - kind
      - status
      - title
      - target_user_ids
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this interaction.
        run_id:
          type: string
          nullable: true
          description: Originating automation run when the interaction is run-backed.
        signal_name:
          type: string
          nullable: true
          description: Signal name used to resume the originating run when run-backed.
        created_by:
          type: string
          nullable: true
          description: Canonical users.id of the human or agent user that created the interaction.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind of the interaction.
        status:
          type: string
          enum:
          - pending
          - completed
          - expired
          - cancelled
          description: 'Current status of the interaction: pending, completed, expired, or
            cancelled.'
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the responder.
        description:
          type: string
          nullable: true
          description: Optional longer responder-facing detail or instructions.
        subject:
          type: object
          allOf:
          - $ref: '#/components/schemas/InteractionReference'
          nullable: true
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          nullable: true
          description: Additional key-value context surfaced in the UI alongside the title
            and description when supplied.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Uniform string key/value labels used for interaction list filtering
            and reporting.
        properties:
          type: object
          additionalProperties: true
          nullable: true
          description: Free-form structured metadata attached to the interaction.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        target_user_ids:
          type: array
          items:
            type: string
          description: Resolved user IDs targeted by the interaction.
        responder:
          type: object
          allOf:
          - $ref: '#/components/schemas/InteractionResponder'
          nullable: true
          description: User or agent that completed the interaction; null until completion.
        resolving_response_id:
          type: string
          nullable: true
          description: ID of the response that triggered resolution. Null while the interaction
            is pending, cancelled, or expired. Look up the response in `responses` for the
            full payload.
        responses:
          type: array
          items:
            $ref: '#/components/schemas/InteractionResponse'
          description: All response artifacts recorded against this interaction in arrival
            order.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this interaction expires if not responded to.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the interaction received a terminal response.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this interaction was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this interaction was last updated.
        require_all:
          type: boolean
          description: When true, all target users must respond before completion.
        resolution_policy:
          type: object
          allOf:
          - $ref: '#/components/schemas/ResolutionPolicy'
          nullable: true
          description: Declarative resolution rule attached at creation time. Legacy `require_all`
            inputs are synthesized into an equivalent policy at create time when present.
            Newer rows typically include this field; nullability covers historical rows and
            callers that omit it.
        consumer:
          type: object
          allOf:
          - $ref: '#/components/schemas/Consumer'
          nullable: true
          description: Polymorphic identifier of what is waiting on this interaction's resolution
            (PRD 077 §3.7). Replaces the special-cased `run_id`/`signal_name` pair; the latter
            remain populated when `consumer.kind=run`.
        delivery:
          type: object
          allOf:
          - $ref: '#/components/schemas/Delivery'
          nullable: true
          description: Optional per-interaction delivery override. When absent, the dispatcher
            delivers to the app inbox only.
        outcome:
          $ref: '#/components/schemas/InteractionValue'
          description: Final outcome selected by the resolution policy. Omitted while the
            interaction is still pending.
        resolved_by:
          type: string
          nullable: true
          description: Short audit string identifying which policy rule fired. Null until
            the interaction reaches a resolved state.
        cancel_reason:
          type: string
          nullable: true
          description: Reason recorded when the interaction was cancelled.
    InteractionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Interaction'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    CreateInteractionRequest:
      description: Creates an interaction directly. Use the standalone variant with no automation-run
        side effect, or the run-backed variant that requires both `run_id` and `signal_name`
        so completion can resume the run. For worker/job usage, prefer the job-scoped route
        so the server can derive the owning run from the claimed job context.
      oneOf:
      - $ref: '#/components/schemas/CreateStandaloneInteractionRequest'
      - $ref: '#/components/schemas/CreateRunBackedInteractionRequest'
    CreateStandaloneInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - kind
      - title
      description: Creates a standalone interaction. Completion records the response but does
        not deliver an automation signal.
      properties:
        target_user_ids:
          type: array
          items:
            type: string
          description: Resolved user IDs to target directly. Agents use their backing user
            IDs.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind. Renamed from `type` in the PRD 077 v-bump.
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the responder.
        description:
          type: string
          description: Optional longer responder-facing detail or instructions.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the title
            and description.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial interaction tag set used by list filtering and reporting.
        properties:
          type: object
          additionalProperties: true
          description: Free-form structured metadata to attach to the interaction.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When true, all target users must respond before the interaction is
            considered complete. Defaults to false when omitted. Mutually exclusive with `resolution_policy`;
            prefer the policy form for new code.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Declarative resolution rule. When supplied the policy evaluator drives
            completion.
        consumer:
          $ref: '#/components/schemas/Consumer'
          description: Polymorphic identifier of what is waiting on this interaction's resolution
            (PRD 077 §3.7). When omitted on a run-backed create request, the server derives
            a `kind=run` consumer from `run_id` and `signal_name`.
        delivery:
          $ref: '#/components/schemas/Delivery'
          description: Optional per-interaction delivery override (PRD 077 §3.8).
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded to.
    CreateRunBackedInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - run_id
      - signal_name
      - kind
      - title
      description: Creates a run-backed interaction. **Deprecated as a resume mechanism.**
        Under RFC 064 an automation run only resumes from an interaction response when its
        materializer registered a `run_subscription` with `Subject{kind:interaction, interaction_id:...}`.
        That registration only happens for interactions created from within an automation
        step (declarative `interaction` step or job-scoped `POST /v1/projects/{project}/jobs/{id}/interactions`).
        Direct run-backed creates through this endpoint produce a pending interaction record
        linked to `run_id` for audit, but completion will not wake the run. Use the job-scoped
        route for resume semantics. `signal_name` is retained on the request shape for backwards
        compatibility and audit; routing no longer depends on it.
      properties:
        run_id:
          type: string
          description: ID of the automation run to resume when this interaction is completed.
        signal_name:
          type: string
          description: Signal name the interaction will complete against when run-backed.
        target_user_ids:
          type: array
          items:
            type: string
          description: Resolved user IDs to target directly. Agents use their backing user
            IDs.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind. Renamed from `type` in the PRD 077 v-bump.
        title:
          type: string
          minLength: 1
          description: Short non-empty title shown to the responder.
        description:
          type: string
          description: Optional longer responder-facing detail or instructions.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          description: Additional key-value context surfaced in the UI alongside the title
            and description.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial interaction tag set used by list filtering and reporting.
        properties:
          type: object
          additionalProperties: true
          description: Free-form structured metadata to attach to the interaction.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        require_all:
          type: boolean
          description: When true, all target users must respond before the interaction is
            considered complete. Defaults to false when omitted. Mutually exclusive with `resolution_policy`;
            prefer the policy form for new code.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Declarative resolution rule. When supplied the policy evaluator drives
            completion.
        consumer:
          $ref: '#/components/schemas/Consumer'
          description: Polymorphic identifier of what is waiting on this interaction's resolution
            (PRD 077 §3.7). When omitted on a run-backed create request, the server derives
            a `kind=run` consumer from `run_id` and `signal_name`.
        delivery:
          $ref: '#/components/schemas/Delivery'
          description: Optional per-interaction delivery override (PRD 077 §3.8).
        expires_at:
          type: string
          format: date-time
          description: Timestamp after which this interaction expires if not responded to.
    RespondToInteractionRequest:
      type: object
      additionalProperties: false
      properties:
        action:
          type: string
          enum:
          - submit
          description: Operation to perform through the canonical response endpoint. `submit`
            answers the interaction.
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by the responder. Required for `submit`.
        comment:
          type: string
          description: Optional free-text comment accompanying the action. Available on every
            interaction kind and never gated by the spec; the responder may always attach
            reasoning, caveats, or follow-up notes alongside `value`.
    CancelInteractionRequest:
      type: object
      additionalProperties: false
      description: Optional payload accompanying a cancel request. The reason is recorded
        on the interaction and forwarded in the cancellation signal so automations can route
        to a fallback.
      properties:
        reason:
          type: string
          description: Free-text reason recorded on the interaction.
    SessionStatus:
      type: string
      enum:
      - active
      - archived
      - deleted
      description: Durable conversation session status.
    SessionOrigin:
      type: string
      enum:
      - interaction
      - manual
      - api
      description: Surface that created the session.
    SessionScope:
      type: string
      enum:
      - agent
      description: Boundary used to resolve named sessions.
    SessionVisibility:
      type: string
      enum:
      - project
      - private
      description: Visibility of the session in project surfaces.
    SessionMessageRole:
      type: string
      enum:
      - system
      - user
      - assistant
      - tool
      - compaction
      description: Role of one message in a session transcript.
    Session:
      type: object
      additionalProperties: false
      required:
      - id
      - project_id
      - agent_id
      - title
      - status
      - origin
      - scope
      - scope_ref_id
      - scope_name
      - visibility
      - message_count
      - token_input_total
      - token_output_total
      - version
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable session identifier.
        project_id:
          type: string
          description: Project that owns this session.
        agent_id:
          type: string
          description: Agent that owns this session.
        title:
          type: string
          description: Human-readable session title.
        status:
          $ref: '#/components/schemas/SessionStatus'
        origin:
          $ref: '#/components/schemas/SessionOrigin'
        scope:
          $ref: '#/components/schemas/SessionScope'
        scope_ref_id:
          type: string
          description: Identifier of the resource the session is scoped to (e.g. the agent
            for agent-scoped sessions).
        scope_name:
          type: string
          description: Resolved name of the scope reference.
        visibility:
          $ref: '#/components/schemas/SessionVisibility'
        model:
          type: string
          description: Model the session most recently exchanged tokens with.
        model_provider:
          type: string
          description: Provider for the recorded `model`.
        compaction_policy:
          type: object
          additionalProperties: true
          description: Per-session overrides for the message-compaction policy.
        message_count:
          type: integer
          description: Total messages currently in the session, including compaction summaries.
        token_input_total:
          type: integer
          description: Lifetime input-token total reported for this session.
        token_output_total:
          type: integer
          description: Lifetime output-token total reported for this session.
        version:
          type: integer
          description: Optimistic-concurrency version. Increments on every mutation.
        last_message_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent message append, if any.
        forked_from_session_id:
          type: string
          description: Source session this one was forked from, if any.
        forked_from_sequence:
          type: integer
          description: Sequence number in the source session at which the fork was taken.
        created_by_user_id:
          type: string
          description: User who created this session, if attribution was captured.
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
    SessionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Session'
    SessionMessage:
      type: object
      additionalProperties: false
      required:
      - id
      - session_id
      - agent_id
      - role
      - content
      - sequence
      - created_at
      properties:
        id:
          type: string
          description: Stable message identifier.
        session_id:
          type: string
          description: Session this message belongs to.
        agent_id:
          type: string
          description: Agent that owns the parent session.
        role:
          $ref: '#/components/schemas/SessionMessageRole'
        content:
          type: string
          description: Plain-text content. For multimodal messages, see `content_blocks`.
        content_blocks:
          type: array
          description: Structured content blocks (text, tool calls, tool results, etc.) for
            multimodal messages.
          items:
            type: object
            additionalProperties: true
        covers_through_sequence:
          type: integer
          description: For `compaction` messages, the highest sequence number this summary
            covers.
        sequence:
          type: integer
          description: Monotonic per-session sequence number assigned at append time.
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata for this message.
        created_at:
          type: string
          format: date-time
          description: Server timestamp when the message was appended.
    SessionMessageListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Messages in this page, ordered by `sequence` ascending.
          items:
            $ref: '#/components/schemas/SessionMessage'
    AppendSessionMessagesRequest:
      type: object
      additionalProperties: false
      required:
      - messages
      properties:
        messages:
          type: array
          minItems: 1
          description: Messages to append to the session, in order.
          items:
            $ref: '#/components/schemas/AppendSessionMessage'
        token_input_total:
          type: integer
          minimum: 0
          description: Updated lifetime input-token total for this session.
        token_output_total:
          type: integer
          minimum: 0
          description: Updated lifetime output-token total for this session.
        model:
          type: string
          description: Model that produced these messages.
        model_provider:
          type: string
          description: Provider for the supplied `model`.
    AppendSessionMessage:
      type: object
      additionalProperties: false
      required:
      - role
      - content
      properties:
        role:
          $ref: '#/components/schemas/SessionMessageRole'
        content:
          type: string
          description: Plain-text content for the message.
        content_blocks:
          type: array
          description: Structured content blocks for multimodal messages.
          items:
            type: object
            additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata for this message.
        created_at:
          type: string
          format: date-time
          description: Caller-supplied creation timestamp. The server assigns one if absent.
