          type: string
          format: date-time
          description: Timestamp when this invocation started.
        finished_at:
          type: string
          format: date-time
          description: Timestamp when this invocation completed.
        error_type:
          type: string
          description: Machine-readable error classification when status is "failed".
        error_message:
          type: string
          description: Human-readable error detail when status is "failed".
    ActionInvocationListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of action invocation telemetry records.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ActionInvocationEntry'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    EventCatalogResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - reserved_prefixes
      description: The triggerable event catalog available to a project.
      properties:
        items:
          type: array
          description: Event sources available for authoring triggers.
          items:
            $ref: '#/components/schemas/EventCatalogSource'
        reserved_prefixes:
          type: array
          description: Platform namespaces that are recognized but are not triggerable event
            sources. Authoring UIs use these to distinguish a recognized-but-unsupported matcher
            prefix from a wholly unknown one.
          items:
            $ref: '#/components/schemas/EventCatalogReservedPrefix'
    EventCatalogSource:
      type: object
      additionalProperties: false
      required:
      - prefix
      - kind
      - readiness
      - display_name
      - event_types
      description: One event source rooted at a top-level dotted prefix. Integration sources
        are open-set (any `<prefix>.<resource>.<event>` matches); `event_types` lists the
        currently-active, documented members.
      properties:
        prefix:
          type: string
          description: Top-level dotted segment that names the source (`table`, `github`).
        kind:
          type: string
          enum:
          - integration
          - capability
          description: '`integration` for provider event sources; `capability` for built-in
            Mobius platform event sources.'
        display_name:
          type: string
          description: Human-readable source name for UI pickers.
        description:
          type: string
          description: Short explanation of what emits events under this prefix.
        readiness:
          $ref: '#/components/schemas/CapabilityReadiness'
          description: Whether this source can start a loop now. `capability` sources are
            always `ready`. `integration` sources are `ready` only when the project has an
            active, usable connection for the provider.
        readiness_reason:
          $ref: '#/components/schemas/CapabilityReadinessReason'
          description: Why an `integration` source is `needs_setup`. Omitted when `readiness`
            is `ready` and for `capability` sources.
        event_types:
          type: array
          description: Concrete event types currently documented for this source.
          items:
            $ref: '#/components/schemas/EventCatalogEventType'
    EventCatalogEventType:
      type: object
      additionalProperties: false
      required:
      - name
      description: One concrete event type exposed by an event catalog source.
      properties:
        name:
          type: string
          description: Dotted event-type identifier (`table.row.inserted`, `github.pull_request.opened`).
        description:
          type: string
          description: Human-readable explanation of when this event fires.
        event_schema:
          type: object
          additionalProperties: true
          description: JSON Schema for the normalized event data available to event-trigger
            runs at `${{ event.* }}` and to event conditions/mappings at `event.*`. Absent
            only when the event payload is intentionally open-ended and the provider has not
            registered an authoring schema.
        meta_schema:
          type: object
          additionalProperties: true
          description: JSON Schema for normalized routing metadata available to event-trigger
            runs at `${{ meta.* }}` and to event conditions/mappings at `meta.*`.
    EventCatalogReservedPrefix:
      type: object
      additionalProperties: false
      required:
      - prefix
      - kind
      description: A recognized event namespace that is not itself triggerable.
      properties:
        prefix:
          type: string
          description: Reserved top-level event prefix.
        kind:
          type: string
          enum:
          - capability
          - utility
          description: Whether the prefix names a platform capability or an authoring utility
            namespace.
    ModelCatalogResponse:
      type: object
      additionalProperties: false
      description: Models a platform agent can be assigned in this project, grouped by available
        provider.
      required:
      - default_model
      - items
      properties:
        default_model:
          type: string
          description: Model id assigned when an agent specifies no model.
        items:
          type: array
          description: Available providers in display order. Providers with no configured
            credentials are omitted.
          items:
            $ref: '#/components/schemas/ModelProviderGroup'
        reason:
          type: string
          enum:
          - platform_funding_denied
          - credentials_unavailable
          description: Present when `items` is empty because the request was denied rather
            than because no catalog exists. `platform_funding_denied` means Mobius-managed
            provider credentials are gated by billing or plan state; `credentials_unavailable`
            means no usable provider credentials were available.
    ModelProviderGroup:
      type: object
      additionalProperties: false
      required:
      - provider
      - display_name
      - source
      - models
      description: Available model choices for one provider.
      properties:
        provider:
          type: string
          description: Canonical provider id (`anthropic`, `openai`, `gemini`, `xai`).
        display_name:
          type: string
          description: Human-readable provider label.
        source:
          type: string
          enum:
          - byok
          - platform
          description: Where credentials come from — a project integration (`byok`) or a platform-managed
            key (`platform`).
        models:
          type: array
          description: Models offered by this provider in display order.
          items:
            $ref: '#/components/schemas/ModelOption'
    ModelOption:
      type: object
      additionalProperties: false
      description: One selectable LLM model in the project model catalog.
      required:
      - id
      - provider
      - label
      properties:
        id:
          type: string
          description: Bare model id assigned to an agent's `model` field.
        provider:
          type: string
          description: Canonical provider id this model belongs to.
        label:
          type: string
          description: Human-readable model label for UI.
        description:
          type: string
          description: Short guidance about when to use this model.
        recommended:
          type: boolean
          description: Whether this is the suggested default for its provider.
    EnvironmentProvider:
      type: string
      enum:
      - sprites
      - cloudflare_containers
      - worker
      description: 'Backing provider: `sprites`, `cloudflare_containers`, or `worker`.'
    ProvisionEnvironmentProvider:
      type: string
      description: 'Providers the control plane can provision on demand: `sprites` or `cloudflare_containers`.
        Excludes `worker`: worker-provided environments are registered out-of-band via the
        attach endpoint and are never provisioned through create/acquire.'
      enum:
      - sprites
      - cloudflare_containers
    EnvironmentStatus:
      type: string
      description: 'Lifecycle status: `provisioning`, `ready`, `running`, `retained`, `destroying`,
        `destroyed`, `failed`, or `orphaned`.'
      enum:
      - provisioning
      - ready
      - running
      - retained
      - destroying
      - destroyed
      - failed
      - orphaned
    EnvironmentLifetime:
      type: string
      enum:
      - run
      - lease
      - explicit
      description: Lifecycle owner for automatic cleanup. `run` environments are destroyed
        during their owning run's Finalize phase; `lease` environments are reaped after lease
        expiry; `explicit` environments require an explicit destroy call.
    EnvironmentMode:
      type: string
      enum:
      - manual
      - run
      - agent
      - loop
      description: High-level ownership policy for how Mobius plans to use the environment.
        `run` is one-shot and auto-cleaned with a run; `agent` and `loop` are persistent environment
        policies; `manual` is operator controlled.
    EnvironmentRetentionPolicy:
      type: string
      description: 'Retention behavior: `manual`, `destroy_on_success`, `retain_on_failure`,
        or `retain_always`.'
      enum:
      - manual
      - destroy_on_success
      - retain_on_failure
      - retain_always
    EnvironmentCleanupStatus:
      type: string
      enum:
      - none
      - pending
      - succeeded
      - failed
      - skipped
      description: 'Cleanup outcome: `none`, `pending`, `succeeded`, `failed`, or `skipped`.'
    Environment:
      type: object
      additionalProperties: false
      description: Durable execution environment summary.
      required:
      - id
      - name
      - provider
      - status
      - lifetime
      - cleanup_status
      - retention_policy
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique environment identifier.
        name:
          type: string
          description: Human-readable environment name.
        scope:
          $ref: '#/components/schemas/ResourceScope'
          description: Naming scope for this environment.
        provider:
          $ref: '#/components/schemas/EnvironmentProvider'
          description: Backing environment provider.
        status:
          $ref: '#/components/schemas/EnvironmentStatus'
          description: Current provisioning and lifecycle status.
        lifetime:
          $ref: '#/components/schemas/EnvironmentLifetime'
          description: How long the environment is expected to live.
        owned_by:
          type: string
          description: Principal owner ID. For agent-started work, this is the agent's principal
            ID.
        current_worker_session_id:
          type: string
          description: Worker session currently attached to this environment, when any.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Optional labels for filtering and organization.
        cleanup_status:
          $ref: '#/components/schemas/EnvironmentCleanupStatus'
          description: Last cleanup outcome.
        retention_policy:
          $ref: '#/components/schemas/EnvironmentRetentionPolicy'
          description: Retention behavior after work completes.
        last_seen_at:
          type: string
          format: date-time
          description: Last time the provider or worker reported the environment.
        created_at:
          type: string
          format: date-time
          description: Time the environment record was created.
        updated_at:
          type: string
          format: date-time
          description: Time the environment record was last updated.
    EnvironmentListResponse:
      type: object
      additionalProperties: false
      description: Cursor-paginated list of environments.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: Environments in the current page.
          items:
            $ref: '#/components/schemas/Environment'
        has_more:
          type: boolean
          description: Whether another page is available.
        next_cursor:
          type: string
          description: Cursor to pass on the next request when `has_more` is true.
    CreateEnvironmentRequest:
      type: object
      additionalProperties: false
      description: Request body for creating a managed environment.
      properties:
        name:
          type: string
          description: Human-readable environment name.
        scope:
          $ref: '#/components/schemas/ResourceScope'
          description: Optional naming scope for the environment.
        provider:
          $ref: '#/components/schemas/ProvisionEnvironmentProvider'
          description: 'Provider to provision: `sprites` or `cloudflare_containers`.'
        owned_by:
          type: string
          description: Canonical user owner ID. Defaults to the authenticated user.
        template_id:
          type: string
          enum:
          - coding-default
          description: V1 supports only coding-default.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Labels used for filtering, ownership, or cleanup policy.
    UpdateEnvironmentRequest:
      type: object
      additionalProperties: false
      properties:
        scope:
          type: string
          allOf:
          - $ref: '#/components/schemas/ResourceScope'
          nullable: true
          description: Resource scope; send null to return to the project/default scope.
        owned_by:
          type: string
          nullable: true
          description: Canonical user owner ID. Send null to clear ownership.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Replacement labels; send an empty object to clear all tags.
    WorkerSocketModelCapability:
      type: object
      additionalProperties: false
      required:
      - provider
      - model
      properties:
        provider:
          type: string
          description: LLM provider identifier, such as `ollama`.
        model:
          type: string
          description: Provider-local model name.
    WorkerSocketFrame:
      oneOf:
      - $ref: '#/components/schemas/WorkerSocketRegisterFrame'
      - $ref: '#/components/schemas/WorkerSocketRegisteredFrame'
      - $ref: '#/components/schemas/WorkerSocketReadyFrame'
      - $ref: '#/components/schemas/WorkerSocketJobsClaimFrame'
      - $ref: '#/components/schemas/WorkerSocketJobsClaimedFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkAvailableFrame'
      - $ref: '#/components/schemas/WorkerSocketJobHeartbeatFrame'
      - $ref: '#/components/schemas/WorkerSocketJobHeartbeatAckFrame'
      - $ref: '#/components/schemas/WorkerSocketJobReportFrame'
      - $ref: '#/components/schemas/WorkerSocketJobReportAckFrame'
      - $ref: '#/components/schemas/WorkerSocketGenerationDeltaFrame'
      - $ref: '#/components/schemas/WorkerSocketGenerationDeltaAckFrame'
      - $ref: '#/components/schemas/WorkerSocketJobCancelFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkerDrainingFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkerDrainingAckFrame'
      - $ref: '#/components/schemas/WorkerSocketWorkerDrainFrame'
      - $ref: '#/components/schemas/WorkerSocketKeepaliveFrame'
      - $ref: '#/components/schemas/WorkerSocketErrorFrame'
      description: Typed JSON frame exchanged over `/workers/socket`. WebSocket traffic is
        not ordinary request/response HTTP, but the frame schemas are included in the public
        OpenAPI contract so SDKs can share a wire format.
    WorkerSocketMessageID:
      type: string
      description: Client-supplied correlation and short-window deduplication key. When present
        on a client frame, the server echoes it on the response frame.
    WorkerSocketLeaseConfig:
      type: object
      additionalProperties: false
      required:
      - lease_duration_seconds
      - heartbeat_cadence_seconds
      properties:
        lease_duration_seconds:
          type: integer
          minimum: 1
          description: Per-job lease duration stamped on claims.
        heartbeat_cadence_seconds:
          type: integer
          minimum: 1
          description: Recommended heartbeat cadence while a job is running.
    WorkerSocketCancelDirective:
      type: object
      additionalProperties: false
      required:
      - job_id
      properties:
        job_id:
          type: string
        reason:
          type: string
        requested_at:
          type: string
          format: date-time
    WorkerSocketProtocolError:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Stable protocol error code. `worker_instance_conflict` is emitted when
            a duplicate live `worker_instance_id` registers and should be treated as a terminal
            worker startup failure.
        message:
          type: string
    WorkerSocketRegisterFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - worker_instance_id
      properties:
        type:
          type: string
          enum:
          - worker.register
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        worker_instance_id:
          type: string
          description: Stable process identity reported by the worker SDK.
        worker_session_token:
          type: string
          description: Previously issued session token used on reconnect; omitted on first
            register.
        concurrency_limit:
          type: integer
          minimum: 1
          description: Maximum jobs this worker process will hold concurrently.
        available_slots:
          type: integer
          minimum: 0
          description: Currently available capacity. Defaults to `concurrency_limit`.
        name:
          type: string
        version:
          type: string
        environment_id:
          type: string
          description: Environment this worker is running inside, when the worker was started
            by Mobius in a Sprite or other managed environment.
        capabilities:
          type: array
          items:
            type: string
          description: Coarse capability labels reserved for future routing.
        queues:
          type: array
          items:
            type: string
          description: Queue names this worker can claim. Empty means all project queues.
        action_names:
          type: array
          items:
            type: string
          description: Action names this worker can execute. Empty means every locally registered
            action.
        models:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSocketModelCapability'
          description: Provider/model pairs this worker can generate with.
    WorkerSocketRegisteredFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - worker_session_token
      - lease
      properties:
        type:
          type: string
          enum:
          - worker.registered
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        worker_session_token:
          type: string
          description: Server-issued per-session token to reuse after reconnects.
        lease:
          $ref: '#/components/schemas/WorkerSocketLeaseConfig'
    WorkerSocketReadyFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - worker.ready
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        available_slots:
          type: integer
          minimum: 0
        queues:
          type: array
          items:
            type: string
        action_names:
          type: array
          items:
            type: string
        models:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSocketModelCapability'
    WorkerSocketJobsClaimFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - jobs.claim
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        available_slots:
          type: integer
          minimum: 0
        queues:
          type: array
          items:
            type: string
        action_names:
          type: array
          items:
            type: string
        models:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSocketModelCapability'
    WorkerSocketClaimedJob:
      type: object
      additionalProperties: false
      required:
      - id
      - kind
      - origin
      - executor_kind
      - queue
      - spec
      - lease_token
      - claim_attempt
      - lease_duration_seconds
      - heartbeat_cadence_seconds
      properties:
        id:
          type: string
          description: Job ID.
        kind:
          type: string
          enum:
          - action_execution
          - llm_generation
        origin:
          type: string
          enum:
          - loop_action_step
          - agent_tool_call
          - agent_llm_call
          - conversation_tool_call
          - conversation_llm_call
          - direct_action_invoke
          - server_internal
        executor_kind:
          type: string
          enum:
          - customer_worker
          - server_worker
        queue:
          type: string
        action_name:
          type: string
          description: Present for `action_execution` jobs.
        environment_id:
          type: string
          description: Present when the job is pinned to a managed environment worker.
        provider:
          type: string
          description: Present for `llm_generation` jobs.
        model:
          type: string
          description: Present for `llm_generation` jobs.
        run_id:
          type: string
        step_id:
          type: string
        agent_turn_id:
          type: string
        session_id:
          type: string
        tool_call_id:
          type: string
        spec:
          type: object
          additionalProperties: true
          description: Worker-specific action or generation payload.
        lease_token:
          type: string
          description: Opaque per-job lease fence returned by claim.
        claim_attempt:
          type: integer
          minimum: 1
        lease_duration_seconds:
          type: integer
          minimum: 1
        heartbeat_cadence_seconds:
          type: integer
          minimum: 1
    WorkerSocketJobsClaimedFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - jobs
      properties:
        type:
          type: string
          enum:
          - jobs.claimed
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/WorkerSocketClaimedJob'
    WorkerSocketWorkAvailableFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - work.available
    WorkerSocketJobHeartbeatFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      - lease_token
      properties:
        type:
          type: string
          enum:
          - job.heartbeat
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        lease_token:
          type: string
          description: Opaque per-job lease fence returned by claim.
    WorkerSocketJobHeartbeatAckFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      properties:
        type:
          type: string
          enum:
          - job.heartbeat.ack
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        cancel:
          $ref: '#/components/schemas/WorkerSocketCancelDirective'
    WorkerSocketJobReportFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      - lease_token
      properties:
        type:
          type: string
          enum:
          - job.report
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        lease_token:
          type: string
          description: Opaque per-job lease fence returned by claim.
        status:
          type: string
          enum:
          - completed
          - failed
          - cancelled
          default: completed
        result:
          type: object
          additionalProperties: true
        error_type:
          type: string
        error_message:
          type: string
    WorkerSocketJobReportAckFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      properties:
        type:
          type: string
          enum:
          - job.report.ack
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        duplicate:
          type: boolean
          description: True when an identical terminal report was already accepted for this
            lease.
    WorkerSocketGenerationDeltaFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      - lease_token
      - sequence
      - delta
      properties:
        type:
          type: string
          enum:
          - generation.delta
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        lease_token:
          type: string
          description: Opaque per-job lease fence returned by claim.
        sequence:
          type: integer
          format: int64
          minimum: 0
          description: Worker-local monotonically increasing sequence for this generation.
        delta:
          type: object
          additionalProperties: true
          description: Provider-neutral streaming delta payload.
    WorkerSocketGenerationDeltaAckFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      - received_sequence
      properties:
        type:
          type: string
          enum:
          - generation.delta.ack
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        received_sequence:
          type: integer
          format: int64
    WorkerSocketJobCancelFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - job_id
      properties:
        type:
          type: string
          enum:
          - job.cancel
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        job_id:
          type: string
        reason:
          type: string
        requested_at:
          type: string
          format: date-time
    WorkerSocketWorkerDrainingFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - worker.draining
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
    WorkerSocketWorkerDrainingAckFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - worker.draining.ack
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
    WorkerSocketWorkerDrainFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - worker.drain
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
    WorkerSocketKeepaliveFrame:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - keepalive
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
    WorkerSocketErrorFrame:
      type: object
      additionalProperties: false
      required:
      - type
      - error
      properties:
        type:
          type: string
          enum:
          - error
        message_id:
          $ref: '#/components/schemas/WorkerSocketMessageID'
        error:
          $ref: '#/components/schemas/WorkerSocketProtocolError'
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable project name.
        handle:
          type: string
          description: URL-safe slug for API routes. Auto-derived from name if omitted. Must
            be unique within the org. Cannot be changed after creation.
        description:
          type: string
          description: Optional human-readable description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Initial project access policy: `open` or `restricted`.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial labels used for filtering, ownership, or automation.
      example:
        name: Product Ops
        handle: product-ops
        description: Product operations workflows
        access_mode: restricted
        tags:
          owner: product
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        description:
          type: string
          description: Replacement description.
        access_mode:
          $ref: '#/components/schemas/ProjectAccessMode'
          description: 'Replacement project access policy: `open` or `restricted`.'
        seed_existing_members:
          type: boolean
          description: When transitioning from `open` to `restricted`, set true to insert
            all current org members as project members so nobody loses visibility on the flip.
            Ignored on other transitions.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Replacement labels; send an empty object to clear all tags.
    WebhookDeliveryStatus:
      type: string
      enum:
      - pending
      - processing
      - delivered
      - failed
      description: '`pending` — queued, not yet attempted. `processing` — currently being
        delivered. `delivered` — recipient returned 2xx. `failed` — all retry attempts exhausted.'
    Webhook:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - url
      - events
      - enabled
      - created_at
      - updated_at
      description: A project-level outgoing webhook subscription. When a subscribed event
        fires, Mobius POSTs the event payload to `url`.
      properties:
        id:
          type: string
          description: Unique identifier for this webhook.
        name:
          type: string
          description: Human-readable name, unique within the project.
        url:
          type: string
          description: The customer endpoint Mobius POSTs event payloads to.
        events:
          type: array
          items:
            type: string
          description: Subscribed event types. Use dot notation (`run.completed`, `run.failed`)
            or wildcards (`run.*` for all run events). An empty list subscribes to all event
            types.
        enabled:
          type: boolean
          description: When false, matching events are not delivered.
        created_by:
          type: string
          description: User ID of the principal who created this webhook.
        updated_by:
          type: string
          description: User ID of the principal who last updated this webhook.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Free-form labels used for filtering, ownership, or delivery policy.
        secret_ref:
          type: string
          description: Project secret reference that stores this webhook's signing key.
        secret_version:
          type: integer
          format: int64
          description: Version of `secret_ref` created by this response. Only populated on
            create and rotate responses.
        signing_secret:
          type: string
          description: Base64-encoded 32-byte HMAC-SHA256 signing key. Only populated on create
            and rotate responses; null on all other reads. Store this value securely on first
            receipt — it cannot be retrieved again.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this webhook was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this webhook was last updated.
      example:
        id: wbh_7x3m9q2v5p8n4r6t
        name: Run status sink
        url: https://hooks.example.com/mobius/run-status
        events:
        - run.completed
        - run.failed
        enabled: true
        created_by: user_2f9s3k4m5n6p7q8r
        tags:
          owner: product
        secret_ref: mobius/webhook/wbh_7x3m9q2v5p8n4r6t
        secret_version: 1
        created_at: '2026-06-15T14:30:00Z'
        updated_at: '2026-06-15T14:30:00Z'
    WebhookListResponse:
      type: object
      additionalProperties: false
      required:
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Webhook'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
      example:
        items:
        - id: wbh_7x3m9q2v5p8n4r6t
          name: Run status sink
          url: https://hooks.example.com/mobius/run-status
          events:
          - run.completed
          - run.failed
          enabled: true
          created_at: '2026-06-15T14:30:00Z'
          updated_at: '2026-06-15T14:30:00Z'
        has_more: false
    WebhookDeliveryRecord:
      type: object
      additionalProperties: false
      required:
      - id
      - webhook_id
      - event_type
      - status
      - attempts
      - created_at
      description: One delivery record for a webhook event. The daemon claims pending rows,
        POSTs the payload, and transitions to `delivered` or retries on failure. A delivery
        reaches `failed` only after exhausting all 10 retry attempts.
      properties:
        id:
          type: string
          description: Unique identifier for this delivery record.
        webhook_id:
          type: string
          description: ID of the webhook this delivery belongs to.
        run_id:
          type: string
          description: Run that triggered the event, when applicable.
        event_type:
          type: string
          description: The event type that triggered this delivery (e.g. `run.completed`).
        status:
          $ref: '#/components/schemas/WebhookDeliveryStatus'
          description: 'Current delivery status: `pending`, `delivered`, or `failed`.'
        attempts:
          type: integer
          description: Number of delivery attempts made so far. Max 10.
        last_error:
          type: string
          description: Error message from the most recent failed attempt.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this delivery was first attempted.
        delivered_at:
          type: string
          format: date-time
          description: Timestamp of the successful delivery. Absent until delivered.
      example:
        id: whd_4q8m2x7v5p9n3r6t
        webhook_id: wbh_7x3m9q2v5p8n4r6t
        run_id: run_8q5m2x9v7p3n4r6t
        event_type: run.completed
        status: delivered
        attempts: 1
        created_at: '2026-06-15T14:44:00Z'
        delivered_at: '2026-06-15T14:44:01Z'
    WebhookDeliveryListResponse:
      type: object
      additionalProperties: false
      required:
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/WebhookDeliveryRecord'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateWebhookRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - events
      properties:
        name:
          type: string
          description: Human-readable name, unique within the project.
        url:
          type: string
          description: The endpoint Mobius will POST event payloads to. May be left empty
            at creation time so a candidate URL can be tested via the ping endpoint before
            it is saved; events do not fire for webhooks with an empty URL.
        events:
          type: array
          items:
            type: string
          description: Event types to subscribe to. Use wildcards for broad subscriptions,
            e.g. `["run.*"]` for all run events. An empty list subscribes to all event types.
        enabled:
          type: boolean
          description: Whether the webhook starts enabled. Defaults to true when omitted.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial labels to apply to the webhook.
      example:
        name: Run status sink
        url: https://hooks.example.com/mobius/run-status
        events:
        - run.completed
        - run.failed
        enabled: true
        tags:
          owner: product
    UpdateWebhookRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Replacement human-readable name.
        url:
          type: string
          description: Replacement endpoint URL.
        events:
          type: array
          items:
            type: string
          description: Replacement event subscriptions. Replaces the entire current list;
            an empty list subscribes to all event types.
        enabled:
          type: boolean
          description: Set to false to disable delivery without deleting the webhook.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Replacement labels; send an empty object to clear all tags.
    PingWebhookRequest:
      type: object
      additionalProperties: false
      properties:
        url:
          type: string
          description: URL to test. When supplied, the ping is sent to this URL instead of
            the webhook's saved URL — use this to validate a candidate URL before saving it.
            When omitted, the webhook's current saved URL is used.
    PingWebhookResult:
      type: object
      additionalProperties: false
      required:
      - success
      properties:
        success:
          type: boolean
          description: True if the target responded with a 2xx status code.
        status_code:
          type: integer
          description: HTTP status code returned by the target. Absent on network error.
        error:
          type: string
          description: Error message if the request could not be completed.
        latency_ms:
          type: integer
          description: Round-trip latency in milliseconds.
    AgentMessagingDMPolicy:
      type: string
      enum:
      - open
      - allowlist
      - disabled
      description: 'Direct-message access policy: `open`, `allowlist`, or `disabled`.'
    AgentMessagingReplyMode:
      type: string
      enum:
      - auto
      description: Reply mode for built-in messaging; currently `auto`.
    AgentMessagingProvider:
      type: string
      enum:
      - slack
      - telegram
      description: 'Provider supported by built-in agent messaging: `slack` or `telegram`.'
    AgentMessagingBinding:
      type: object
      additionalProperties: false
      description: Messaging provider account that an agent can answer from.
      required:
      - id
      - agent_id
      - provider
      - integration_id
      - enabled
      - dms
      - mentions
      - all_messages
      - channels
      - dm_policy
      - sender_allow
      - reply_mode
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Messaging binding identifier.
        agent_id:
          type: string
          description: Agent this binding belongs to.
        provider:
          $ref: '#/components/schemas/AgentMessagingProvider'
          description: 'Messaging provider for this binding: `slack` or `telegram`.'
        integration_id:
          type: string
          description: Connected integration account this binding applies to.
        enabled:
          type: boolean
          description: Whether the agent can currently answer on this account.
        dms:
          type: boolean
          description: Whether direct messages are accepted.
        mentions:
          type: boolean
          description: Whether channel/group mentions activate the agent.
        all_messages:
          type: boolean
          description: Whether every message in the allowed conversations activates the agent.
        channels:
          type: array
          description: Optional provider conversation allowlist. Empty means any conversation
            on the integration.
          items:
            type: string
        dm_policy:
          $ref: '#/components/schemas/AgentMessagingDMPolicy'
          description: 'Who may direct-message this agent: `open`, `allowlist`, or `disabled`.'
        sender_allow:
          type: array
          description: Optional provider sender allowlist. Empty means any sender.
          items:
            type: string
        reply_mode:
          $ref: '#/components/schemas/AgentMessagingReplyMode'
          description: How the agent replies to inbound provider messages.
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Optional model route override used for replies through this binding.
        created_at:
          type: string
          format: date-time
          description: Time the binding was created.
        updated_at:
          type: string
          format: date-time
          description: Time the binding was last updated.
    AgentMessagingBindingRequest:
      type: object
      additionalProperties: false
      required:
      - provider
      - integration_id
      properties:
        provider:
          $ref: '#/components/schemas/AgentMessagingProvider'
          description: 'Messaging provider for this binding: `slack` or `telegram`.'
        integration_id:
          type: string
          description: ID of the connected integration that backs this binding.
        enabled:
          type: boolean
          default: false
          description: Whether the binding is active and the agent responds on this provider.
        replace_existing:
          type: boolean
          default: false
          description: When enabling this binding, disable any other active agent binding
            for the same provider account.
        dms:
          type: boolean
          default: true
          description: Respond to direct messages.
        mentions:
          type: boolean
          default: true
          description: Respond when the agent is @-mentioned.
        all_messages:
          type: boolean
          default: false
          description: Respond to every message in bound channels, not just mentions.
        channels:
          type: array
          items:
            type: string
          description: Channel IDs the binding is scoped to (empty means all channels).
        dm_policy:
          $ref: '#/components/schemas/AgentMessagingDMPolicy'
          description: 'Who may direct-message this agent: `open`, `allowlist`, or `disabled`.'
        sender_allow:
          type: array
          items:
            type: string
          description: Sender IDs allowed to trigger the agent (empty means no allowlist).
        reply_mode:
          $ref: '#/components/schemas/AgentMessagingReplyMode'
          description: Reply behavior for provider messages; currently `auto`.
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Optional model route override used for replies through this binding.
    AgentMessagingBindingListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Messaging bindings configured for this agent.
          items:
            $ref: '#/components/schemas/AgentMessagingBinding'
    SessionStatus:
      type: string
      enum:
      - active
      - archived
      - deleted
      description: 'Durable conversation session status: `active`, `archived`, or `deleted`.'
    SessionOrigin:
      type: string
      enum:
      - manual
      - api
      - loop
      description: 'Surface that created the session: `manual`, `api`, or `loop`.'
    SessionScope:
      type: string
      enum:
      - agent
      - loop
      description: 'Boundary used to resolve named sessions: `agent` or `loop`.'
    SessionVisibility:
      type: string
      enum:
      - project
      - private
      description: 'Visibility of the session in project surfaces: `project` or `private`.'
    SessionMessageRole:
      type: string
      enum:
      - system
      - user
      - assistant
      - tool
      - compaction
      description: 'Message role: `system`, `user`, `assistant`, `tool`, or `compaction`.'
    SessionMessageEntryType:
      type: string
      enum:
      - message
      - compaction
      description: 'Transcript entry type: `message` or `compaction`.'
    AgentTurnStatus:
      type: string
      enum:
      - running
      - waiting
      - completed
      - failed
      - cancelled
      description: 'Agent turn lifecycle status: `running`, `waiting`, `completed`, `failed`,
        or `cancelled`.'
    AgentTurn:
      type: object
      additionalProperties: false
      description: One attempt of an agent running the agent loop — the unit that produces
        a transcript. A turn is triggered either by a loop step (run_id + step_id) or an inbound
        channel message (channel_exchange_id); the two are mutually exclusive. Its messages
        are read via the turn's transcript endpoint.
      required:
      - id
      - agent_id
      - session_id
      - attempt
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable turn identifier.
        agent_id:
          type: string
          description: Agent that ran this turn.
        session_id:
          type: string
          description: Session this turn's transcript was appended to.
        run_id:
          type: string
          description: Loop run that triggered this turn. Absent for messaging turns.
        step_key:
          type: string
          description: Step key (matches LoopRunStep.step_key, not its id) of the loop step
            that triggered this turn. Absent for messaging turns.
        channel_exchange_id:
          type: string
          description: Inbound channel exchange that triggered this turn. Absent for loop
            turns.
        attempt:
          type: integer
          description: 1-based attempt number for this run-step; retries create new turns.
        status:
          $ref: '#/components/schemas/AgentTurnStatus'
          description: Current lifecycle status of the agent turn.
        seq:
          type: integer
          description: Per-session ordering hint (cosmetic; turns are ordered by creation
            time).
        error_type:
          type: string
          description: Machine-readable failure category when the turn failed.
        error_message:
          type: string
          description: Human-readable failure detail when the turn failed.
        created_at:
          type: string
          format: date-time
          description: Time the turn was created.
        updated_at:
          type: string
          format: date-time
          description: Time the turn was last updated.
        completed_at:
          type: string
          format: date-time
          description: When the turn reached a terminal status.
    AgentTurnListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Turns in this session, ordered by creation time.
          items:
            $ref: '#/components/schemas/AgentTurn'
    Session:
      type: object
      additionalProperties: false
      description: Durable conversation transcript owned by an agent.
      required:
      - id
      - agent_id
      - title
      - status
      - origin
      - scope
      - scope_ref_id
      - scope_name
      - session_key
      - visibility
      - message_count
      - token_input_total
      - token_output_total
      - version
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable session identifier.
        agent_id:
          type: string
          description: Agent that owns this session.
        title:
          type: string
          description: Human-readable session title.
        status:
          $ref: '#/components/schemas/SessionStatus'
          description: Lifecycle status of the session.
        origin:
          $ref: '#/components/schemas/SessionOrigin'
          description: Surface that created the session.
        scope:
          $ref: '#/components/schemas/SessionScope'
          description: Boundary used to resolve the session key.
        scope_ref_id:
          type: string
          description: Identifier of the resource the session is scoped to (e.g. the agent
            for agent-scoped sessions).
        scope_name:
          type: string
          description: Caller-assigned name identifying this conversation within its scope
            (`scope` + `scope_ref_id`); reused as the session routing key.
        session_key:
          type: string
          description: Stable session routing key used to look up a scoped conversation (mirrors
            `scope_name`).
        visibility:
          $ref: '#/components/schemas/SessionVisibility'
          description: Where the session appears in project UI surfaces.
        model:
          type: string
          description: Model the session most recently exchanged tokens with.
        model_provider:
          type: string
          description: Provider for the recorded `model`.
        compaction_policy:
          type: object
          additionalProperties: true
          description: Per-session overrides for the message-compaction policy.
        message_count:
          type: integer
          description: Total messages currently in the session, including compaction summaries.
        token_input_total:
          type: integer
          description: Lifetime input-token total reported for this session.
        token_output_total:
          type: integer
          description: Lifetime output-token total reported for this session.
        version:
          type: integer
          description: Optimistic-concurrency version. Increments on every mutation.
        last_message_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent message append; null before any messages
            are stored.
        forked_from_session_id:
          type: string
          description: Source session this one was forked from, if any.
        forked_from_sequence:
          type: integer
          description: Sequence number in the source session at which the fork was taken.
        created_by:
          type: string
          description: User who created this session, if attribution was captured.
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
    SessionListResponse:
