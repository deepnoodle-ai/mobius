      tags:
      - events
      summary: Subscribe to a project-wide live event stream (SSE)
      description: |-
        Opens a Server-Sent Events connection delivering every live event in the project. Each frame carries a JSON envelope `{type, run_id?, channel_id?, interaction_id?, seq?, timestamp, data}` where `type` is one of:

        - `run_updated` — the run row's status, heartbeat, or
        timestamps changed; `data` is a full Run.
        - `job_updated` — a single job's status or attempt
        advanced; `data` is a full Job. The job's id is on
        `data.id`.
        - `run_step_updated` — a durable run-step row was created
        or advanced; `data` is a full RunStep.
        - `interaction_created` / `interaction_completed` /
        `interaction_group_claimed` /
        `interaction_group_released` / `interaction_cancelled`
        — interaction lifecycle; `data` is a full Interaction
        and the envelope sets `interaction_id`.
        - `message_created` — a channel message was persisted; the
        envelope sets `channel_id` and `data` is a full
        ChannelMessage. Live-only — no `?since=<seq>` replay.
        - `agent_typing` / `member_typing` — a channel participant is
        composing live-only status. Agent frames carry
        `{agent_id, agent_name, status, phase?, message?, tool_name?}`;
        `status` is `started` or `stopped`, `phase` distinguishes
        automatic states such as `generating_response` and
        `using_tool`, and `message` can override the displayed
        status text for the current agent turn.
        - `span_appended` — an OTLP span was persisted against a
        run; `data` carries `{span_id, trace_id, name, ...}`.
        - `custom` — a worker emitted a domain-specific event via
        `POST /v1/projects/{project}/jobs/{id}/events`. `data`
        carries `{kind: "custom", type, job_id, data, step_id?,
        path_id?}` where `type` is the worker-supplied name and
        inner `data` is the worker payload. `step_id` is set
        when the originating job is owned by a workflow step
        and lets consumers correlate the event to the durable
        run step after the job is reaped on TTL; `path_id`
        mirrors the run's execution path for path-scoped
        consumers.

        On this project-wide endpoint the envelope's `seq` is an opaque project-stream cursor — formatted as `{unix_nano}:{run_event_id}` — for the durable project stream, not the run-local `run_events.seq` value (which is only meaningful within a single run and is what `streamRunEvents` returns). Treat the cursor as opaque: clients should store the exact `id:`/`seq` string they most recently received and pass it back unchanged as `?since=...` on reconnect. Initial connections without `since` are live-only and do not replay old run history; pass `since=0` only when explicitly requesting a bounded fresh-start replay. Live-only events (e.g. `message_created`) are not replayed on reconnect. If replay cannot be complete because the replay window is capped or a filter cannot be honored durably, the stream emits a `stream_gap` event whose data includes `{refetch_required: true}`. Comment frames (`:keepalive`) are emitted every ~15s to keep intermediaries from closing the connection.

        Optional entity-axis filters narrow the stream. Each accepts a comma-separated list of IDs; an event is delivered when it matches at least one non-empty axis (OR across axes). When all filters are empty the subscription receives every event in the project.

        Unknown future event types may appear; clients should ignore types they don't recognize rather than treat the stream as malformed.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: since
        in: query
        description: Opaque durable project-stream cursor to replay from. Pass back the exact
          `id:`/`seq` string previously received from this endpoint, or `0` for an explicit
          bounded fresh-start replay. Omit on initial live-only connects. Do not pass a run-local
          `seq` from `streamRunEvents` here.
        schema:
          type: string
      - name: run
        in: query
        description: Comma-separated run IDs to filter by.
        schema:
          type: string
      - name: channel
        in: query
        description: Comma-separated channel IDs to filter by.
        schema:
          type: string
      - name: interaction
        in: query
        description: Comma-separated interaction IDs to filter by.
        schema:
          type: string
      responses:
        '200':
          description: OK (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: run_updated
                id: 1777041900000000000:revt_01hw1n1z2y3x4w5v6u7t8s9r0q
                data: {"type":"run_updated","run_id":"run_01hw1n1a2b3c4d5e6f7g8h9j0k","seq":"1777041900000000000:revt_01hw1n1z2y3x4w5v6u7t8s9r0q","timestamp":"2026-04-24T14:45:00Z","data":{"...full Run, truncated...":"...","status":"active"}}

                :keepalive
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/projects/{project}/runs/{id}/events:
    get:
      operationId: streamRunEvents
      tags:
      - events
      summary: Subscribe to a stream of events for a single run (SSE)
      description: Same envelope as `streamProjectEvents`, filtered to events whose envelope
        carries this run's `run_id` — i.e. run, job, run-step, span, interaction, and worker
        `custom` events. Channel-scoped events that don't carry `run_id` (notably `message_created`)
        are not delivered here; consume those via `streamProjectEvents` with a `?channel=`
        filter. The server writes one seed `run_updated` frame on connection so reconnects
        do not miss the latest state. On this run-scoped endpoint the envelope's `seq` is
        the run-local `run_events.seq` (a per-run monotonic integer); clients pass the latest
        observed `seq` string back as `?since=<seq>` to replay durable events recorded after
        that point. This cursor is run-local — do not persist or reuse it across runs or with
        `streamProjectEvents`, which emits an opaque project-stream cursor of the form `{unix_nano}:{run_event_id}`
        instead.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: since
        in: query
        description: Run-local `run_events.seq` cursor to replay from, encoded as a string.
          Do not pass a project-stream cursor from `streamProjectEvents` here.
        schema:
          type: string
      responses:
        '200':
          description: OK (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: run_step_updated
                id: 43
                data: {"type":"run_step_updated","run_id":"run_01hw1n1a2b3c4d5e6f7g8h9j0k","seq":"43","timestamp":"2026-04-24T14:46:00Z","data":{"id":"step_01hw1n2p3q4r5s6t7u8v9w0x1y","run_id":"run_01hw1n1a2b3c4d5e6f7g8h9j0k","path_id":"main","step_name":"summarize","action":"summarize-document","attempt":1,"transition_seq":7,"kind":"worker_action","source":"executed","status":"completed","parameters":{"document_id":"doc_01hw1m9z8y7x6w5v4u3t2s1r0q"},"job_id":"job_01hw1n2a3b4c5d6e7f8g9h0j1k","created_at":"2026-04-24T14:45:10Z","started_at":"2026-04-24T14:45:12Z","completed_at":"2026-04-24T14:46:00Z","updated_at":"2026-04-24T14:46:00Z"}}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/actions:
    get:
      operationId: listCatalogActions
      tags:
      - actions
      summary: List the action catalog
      description: 'Returns the full catalog of actions available to this project: project-owned
        HTTP actions, platform-provided integration actions (Slack, GitHub, etc.), and workflow-backed
        actions (workflows with `published_as_tool = true`). The `available` flag indicates
        whether the action can currently be invoked. The `endpoint_kind` field distinguishes
        HTTP-backed from workflow-backed actions.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionCatalogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createAction
      tags:
      - actions
      summary: Create an action
      description: 'Creates a project-scoped HTTP action. `name` is the stable identifier
        used in workflow step definitions and must be unique within the project. A signing
        secret is generated automatically and returned in the response; this is the only time
        the raw secret is exposed — store it securely. Actions created via this endpoint always
        have `endpoint_kind: http`.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/actions/{action_name}:
    get:
      operationId: getCatalogAction
      tags:
      - actions
      summary: Get one catalog action by name
      description: Returns availability status, schemas, and metadata for a single catalog
        entry.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ActionNameParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionCatalogEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateAction
      tags:
      - actions
      summary: Update an action
      description: 'Patches action metadata and schemas. All fields are optional; omitted
        fields are unchanged. Updating `annotations` replaces the entire annotations object
        — pass `null` to clear all annotation flags. Only applicable to `endpoint_kind: http`
        actions; workflow-backed actions are mutated through the workflow surface.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ActionNameParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAction
      tags:
      - actions
      summary: Delete an action
      description: Rejected with 409 if any workflow step currently references this action
        by name (`ErrActionInUse`). Remove all references before deleting.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ActionNameParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/actions/{action_name}/secret/rotate:
    post:
      operationId: rotateActionSecret
      tags:
      - actions
      summary: Rotate an action signing secret
      description: 'Generates a new HMAC-SHA256 signing secret for the action. The previous
        secret is retained server-side for a brief grace period (typically minutes) so in-flight
        requests signed with the old key are not immediately rejected. Store the returned
        secret — it cannot be retrieved again. Only applicable to `endpoint_kind: http` actions.'
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ActionNameParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateSecretResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/action-invocations:
    get:
      operationId: listActionInvocations
      tags:
      - actions
      summary: List action invocation records
      description: Returns per-invocation telemetry records for action executions in the project.
        Each record captures the action name, input parameters, output summary, final status,
        error details, and retry count. Filter by `run_id` to inspect all action calls within
        a single workflow run, by `job_id` to scope to a specific job, or by `action_name`
        for cross-run analysis.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - name: run_id
        in: query
        description: Filter to invocations from a specific workflow run.
        schema:
          type: string
      - name: job_id
        in: query
        description: Filter to invocations from a specific job.
        schema:
          type: string
      - name: action_name
        in: query
        description: Filter to invocations of a specific action.
        schema:
          type: string
      - name: status
        in: query
        description: Filter by terminal status (e.g. "success", "failed").
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionInvocationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/projects/{project}/actions/{action_name}/invocations:
    post:
      operationId: invokeAction
      tags:
      - actions
      summary: Invoke an action
      description: |-
        User-driven invocation of any catalog action — HTTP-backed or workflow-backed. The request waits up to `timeout_seconds` for synchronous completion. Returns the output directly on 200 (terminal within the timeout). Returns 202 with `run_id` when the backing workflow is still active. Polling for an active run goes through the existing run endpoints.

        - **HTTP-backed** actions (`endpoint_kind: http`) always complete
        inline; 200 is the only terminal response.
        - **Workflow-backed** actions (`endpoint_kind: workflow`) may return
        202 when the run does not complete within `timeout_seconds`.

        Worker-fenced invocations from within a job stay at `POST /v1/projects/{p}/jobs/{id}/actions/{name}`.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/ActionNameParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionInvocationRequest'
      responses:
        '200':
          description: OK — invocation completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionInvocationResult'
        '202':
          description: Accepted — workflow-backed run is still active; poll via run endpoints
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionInvocationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/environments:
    get:
      operationId: listEnvironments
      tags:
      - environments
      summary: List environments
      description: Returns project environments visible to the caller, newest-first. Filters
        let clients narrow by provider, lifecycle status, purpose, binding, owner scope, and
        recently destroyed tombstones.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - name: provider
        in: query
        schema:
          $ref: '#/components/schemas/EnvironmentProvider'
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/EnvironmentStatus'
      - name: lifetime
        in: query
        schema:
          $ref: '#/components/schemas/EnvironmentLifetime'
      - name: purpose
        in: query
        schema:
          $ref: '#/components/schemas/EnvironmentPurpose'
      - name: scope
        in: query
        description: Omit for all/default-scoped environments; use `owner` with `owned_by`
          to list owner-scoped environments.
        schema:
          $ref: '#/components/schemas/ResourceScope'
      - name: owned_by
        in: query
        description: Canonical user owner ID for the environment.
        schema:
          type: string
      - name: bound_to_type
        in: query
        schema:
          $ref: '#/components/schemas/EnvironmentBoundToType'
      - name: bound_to_id
        in: query
        schema:
          type: string
      - name: include_destroyed
        in: query
        description: Include destroyed environments in the result. By default destroyed rows
          are excluded; set this to true (or pass status=destroyed) to see them.
        schema:
          type: boolean
          default: false
      - name: destroyed_since
        in: query
        description: Narrow destroyed rows to those torn down at or after this timestamp.
          Composes with `status=destroyed` to fetch a "recently destroyed" tombstone window
          (e.g. last hour). Non-destroyed rows are unaffected when this is combined with the
          default (no-status) view.
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createEnvironment
      tags:
      - environments
      summary: Create an environment
      description: Creates a durable execution environment record and provisions it with the
        selected provider. The server resolves scope and ownership before enforcing uniqueness
        for the environment name.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEnvironmentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/environments/acquire:
    post:
      operationId: acquireEnvironment
      tags:
      - environments
      summary: Acquire an environment lease
      description: Collection-level acquire creates or claims an environment and creates a
        single active lease. There is intentionally no per-environment acquire endpoint.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcquireEnvironmentRequest'
      responses:
        '200':
          description: Acquired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentAcquireResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/environments/leases/{lease_id}/release:
    post:
      operationId: releaseEnvironmentLease
      tags:
      - environments
      summary: Release an environment lease
      description: Releases a previously acquired environment lease so the environment can
        be reused, retired, or reclaimed by another worker. The released lease snapshot is
        returned for audit and UI state updates.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: lease_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentLease'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/environments/{environment_id}:
    get:
      operationId: getEnvironment
      tags:
      - environments
      summary: Get an environment
      description: Returns the current environment record, including provider status, lease
        metadata, ownership, binding, and retention settings.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/EnvironmentIDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateEnvironment
      tags:
      - environments
      summary: Update environment metadata
      description: Only purpose, retention_policy, scope, owned_by, bound_to_type, bound_to_id,
        and tags are mutable.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/EnvironmentIDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEnvironmentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: destroyEnvironment
      tags:
      - environments
      summary: Destroy an environment
      description: Requests provider teardown for the environment and records the destroyed
        state in Mobius. The response includes the final environment snapshot after the destroy
        request is accepted.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/EnvironmentIDParam'
      responses:
        '200':
          description: Destroyed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/environments/{environment_id}/reconcile:
    post:
      operationId: reconcileEnvironment
      tags:
      - environments
      summary: Reconcile environment provider state
      description: Refreshes Mobius' environment record from the provider control plane. Use
        this when a UI or operator needs to resynchronize status after an out-of-band provider
        change.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/EnvironmentIDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/environments/{environment_id}/exec:
    post:
      operationId: execEnvironment
      tags:
      - environments
      summary: Execute a command inside an environment
      description: Runs a command in the target environment and returns its captured output.
        The environment must be active and able to accept execution requests from the selected
        provider.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/EnvironmentIDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecEnvironmentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentExecResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/projects/{project}/environments/{environment_id}/files:
    put:
      operationId: writeEnvironmentFile
      tags:
      - environments
      summary: Write a file into an environment
      description: Writes file content into the environment filesystem. The request is intended
        for setup and repair flows that need to place source files, scripts, or configuration
        before executing work.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/EnvironmentIDParam'
      requestBody:
        required: true
        content:
