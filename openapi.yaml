  /v1/projects/{project_handle}/blueprints/{blueprint_key}:
    delete:
      operationId: deleteBlueprint
      tags:
      - blueprints
      summary: Delete an applied blueprint
      description: Deletes resources that Mobius created for one named blueprint, in reverse
        dependency order. Adopted resources and legacy bindings whose origin is unknown are
        retained and unbound unless `delete_retained` is explicitly true. Deletion commits
        one resource at a time; retry the request after a partial failure to continue from
        the remaining bindings. After a non-2xx response, list the exact blueprint bindings
        again to see what remains. Omitting `namespace` targets only the unnamespaced blueprint;
        it is not a wildcard across namespaces.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: blueprint_key
        in: path
        required: true
        schema:
          type: string
      - name: namespace
        in: query
        description: Blueprint namespace. Omit for an unnamespaced blueprint.
        schema:
          type: string
      - name: delete_retained
        in: query
        description: Also delete adopted resources and legacy bindings whose ownership is
          unknown. Defaults to false. Use only after inspecting the blueprint bindings because
          these resources may contain customer-authored data.
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Blueprint bindings removed and selected resources deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlueprintDeleteResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}/principals:
    post:
      operationId: createPrincipal
      tags:
      - principals
      summary: Create service principal
      description: Creates a standalone `service` principal within the project. Supply `role_ids`
        to assign roles at creation time; agent and system principals are created by their
        own flows.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrincipalRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Principal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      operationId: listPrincipals
      tags:
      - principals
      summary: List machine principals
      description: Returns project machine principals (`service`, `agent`, `system`) used
        by workers, agents, and loop. Only active principals are returned by default; pass
        `include_disabled=true` to also include disabled ones (e.g. for an admin audit). Filter
        by `kind` to narrow to a single kind.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: kind
        in: query
        required: false
        description: Filter principals by kind.
        schema:
          $ref: '#/components/schemas/PrincipalKind'
      - name: include_disabled
        in: query
        required: false
        description: Include disabled principals. By default only active ones are returned.
        schema:
          type: boolean
          default: false
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project_handle}/principals/{resource_id}:
    get:
      operationId: getPrincipal
      tags:
      - principals
      summary: Get principal
      description: Returns one machine principal, including disabled state, owner, metadata,
        and timestamps. API keys belonging to the principal are managed through the API key
        endpoints.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Principal'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updatePrincipal
      tags:
      - principals
      summary: Update principal
      description: Updates mutable fields. To disable without deleting, set `state` to `disabled`.
        The `name` field is immutable after creation.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePrincipalRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Principal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deletePrincipal
      tags:
      - principals
      summary: Delete principal
      description: Archives the principal so it disappears from normal use while the record
        remains available for attribution and audit history. Returns `409 Conflict` while
        an agent or active API key still references the principal; disable instead for an
        immediate kill switch.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '204':
          description: No Content
        '401':
