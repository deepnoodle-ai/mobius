  /v1/projects:
    get:
      operationId: listProjects
      tags:
      - projects
      summary: List projects
      description: 'Lists the projects the caller can see, newest first. Results are paginated:
        pass `limit` to size the page and follow `next_cursor` (returned while `has_more`
        is true) to walk the full set — the way to enumerate an org that runs a project per
        tenant. Use `search` to substring-match name, handle, or description, and repeat `tag`
        to narrow to projects carrying specific labels. Deleted projects are omitted from
        normal list responses.'
      parameters:
      - name: search
        in: query
        description: Case-insensitive substring filter applied to project name, handle, and
          description.
        schema:
          type: string
      - name: tag
        in: query
        description: Filter to projects carrying the given tags. Each value is either a bare
          key (matches any project that has the key) or `key:value` (matches the exact key/value
          pair). Comma-separate to require several tags; a project must match every one.
        schema:
          type: array
          items:
            type: string
        style: form
        explode: false
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createProject
      tags:
      - projects
      summary: Create project
      description: Creates a project within the authenticated org. If `handle` is omitted
        it is auto-derived from `name` (lowercased, spaces replaced with hyphens). Returns
        409 if the handle already exists in the org.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
            example:
              name: Product Ops
              handle: product-ops
              description: Product operations workflows
              access_mode: restricted
              tags:
                owner: product
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                id: prj_3q7m9x2v5n8p4r6t
                name: Product Ops
                handle: product-ops
                description: Product operations workflows
                access_mode: restricted
                created_by: user_2f9s3k4m5n6p7q8r
                tags:
                  owner: product
                created_at: '2026-06-15T14:30:00Z'
                updated_at: '2026-06-15T14:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/projects/{project_handle}:
    get:
      operationId: getProject
