    put:
      operationId: replaceDefinitionResolver
      tags:
      - organizations
      x-public: true
      summary: Replace the org's definition-resolver config
      description: Full-replace of the active org's definition-source configuration. All configurable
        fields are authoritative; `auth.token` is write-only — supply it to set or rotate
        the shared bearer token, omit `auth` to keep the existing token, or send an empty
        token to clear it. Execution behavior stays clamped by the org policy ceiling regardless
        of source. Requires `Admin` or `Owner` membership.
      requestBody:
        required: true
