    AgentToolManifest:
      type: object
      additionalProperties: false
      required:
      - agent_id
      - project_id
      - policy_hash
      - toolkit_ids
      - tools
      - skills
      - warnings
      - blocked_grants
      description: 'The flat, resolved tool set visible to one agent. Replaces the prior Capability/Action
        split: every entry in `tools` is an action catalog entry the agent can invoke as its
        own named tool.'
      properties:
        agent_id:
          type: string
        project_id:
          type: string
        policy_hash:
          type: string
          description: Stable hash over the resolved tool + skill set; bumps when grants or
            permissions change.
        toolkit_ids:
          type: array
          items:
            type: string
        tools:
          type: array
          description: Catalog entries the agent can invoke. Each entry surfaces to the LLM
            as its own named tool. Built-in, integration, workflow, and custom-HTTP actions
            are intermingled here.
          items:
            $ref: '#/components/schemas/ActionCatalogEntry'
        groups_resolved:
          type: array
          description: Audit trail of group selectors that contributed to the resolved tool
            set. Operators see groups; the LLM only sees the flat `tools` list.
          items:
            $ref: '#/components/schemas/ResolvedActionGroup'
        skills:
          type: array
          items:
            $ref: '#/components/schemas/SkillManifestEntry'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/AgentManifestWarning'
        blocked_grants:
          type: array
          items:
            $ref: '#/components/schemas/AgentBlockedGrant'
    CreateAgentRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        service_account_id:
          type: string
          description: Service account that backs this agent. Must be active, belong to the
            same project, and currently back zero other agents. If omitted, a new service
            account is auto-created with the same name as the agent.
        role_ids:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: Roles to assign to the auto-created service account. Mutually exclusive
            with `service_account_id` (the existing SA already carries its own role assignments
            — change them via the service-accounts endpoints). When omitted, the SA inherits
            the project's `default_agent_role_id`, falling through to the system `Agent` role
            floor when unset.
        name:
          type: string
          description: Project-scoped unique name for this agent. Free-form human-readable
            label, 1-63 characters.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform classification (e.g. "llm", "rpa", "integration").
        color:
          type: string
          description: Display color for this agent (Mantine palette key, e.g. `indigo`).
            Optional; empty falls back to a hash-derived color.
          maxLength: 24
        capabilities:
          type: object
          additionalProperties: true
          description: Arbitrary capability map used by orchestrators to select suitable agents.
        model:
          type: string
          description: Anthropic model identifier for platform agents (e.g. `claude-sonnet-4-6`).
            Empty falls back to the platform default.
        system_prompt:
          type: string
          description: Custom system prompt for platform agents. Empty uses the generated
            default.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateAgentRequest:
      type: object
      additionalProperties: false
      description: 'Mutable agent fields. `service_account_id` is intentionally absent: the
        SA↔Agent binding is immutable per the 1:1 invariant. Reassigning identity is delete-and-recreate.'
      properties:
        name:
          type: string
          description: Free-form human-readable label, 1-63 characters; must be unique within
            the project.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Replacement description.
          maxLength: 500
        kind:
          type: string
          description: Replacement freeform agent classification (e.g. `llm`, `rpa`).
        color:
          type: string
          description: Replacement display color (Mantine palette key, e.g. `indigo`). Pass
            empty string to clear and fall back to a hash-derived color.
          maxLength: 24
        capabilities:
          type: object
          additionalProperties: true
          description: Replacement capability map.
        model:
          type: string
          description: Replacement Anthropic model identifier for platform agents.
        system_prompt:
          type: string
          description: Replacement system prompt for platform agents.
        status:
          type: string
          enum:
          - active
          - inactive
          description: 'Replacement agent status: `active` or `inactive`. Use DELETE to soft-delete.'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the agent. System tags
            (`mobius:*`) are preserved.
    CreateAgentPresenceRequest:
      type: object
      additionalProperties: false
