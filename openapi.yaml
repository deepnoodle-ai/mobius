        created_by: user_2f9s3k4m5n6p7q8r
        updated_by: user_2f9s3k4m5n6p7q8r
        created_at: '2026-06-15T14:30:00Z'
        updated_at: '2026-06-15T14:30:00Z'
    AgentTurnStatus:
      type: string
      enum:
      - queued
      - running
      - waiting
      - completed
      - failed
      - cancelled
      description: 'Agent turn lifecycle status: `queued`, `running`, `waiting`, `completed`,
        `failed`, or `cancelled`.'
    AgentTurnErrorScope:
      type: string
      enum:
      - agent_turn
      description: Present when the overall agent-turn budget was exhausted.
    AgentTurnOutputSource:
      type: string
      enum:
      - tool
      - text
      description: 'Provenance of a completed turn''s structured `output`: `tool` when the
        agent submitted it through the reserved `mobius_submit_output` tool, or `text` when
        Mobius accepted a schema-valid final message as a fallback.'
    AgentTurn:
      type: object
      additionalProperties: false
      description: One attempt of an agent running the agent loop — the unit that produces
        a transcript. A turn is triggered by a direct send to the session, a loop step (run_id
        + step_key), or an inbound channel message (channel_exchange_id). Its messages are
        read via the turn's transcript endpoint.
      required:
      - id
      - agent_id
      - session_id
      - attempt
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable turn identifier.
        agent_id:
          type: string
          description: Agent that ran this turn.
        session_id:
          type: string
          description: Session this turn's transcript was appended to.
        run_id:
          type: string
          description: Loop run that triggered this turn. Absent for messaging turns.
        step_key:
          type: string
          description: Step key (matches LoopRunStep.step_key, not its id) of the loop step
            that triggered this turn. Absent for messaging turns.
        channel_exchange_id:
          type: string
          description: Inbound channel exchange that triggered this turn. Absent for loop
            turns.
        attempt:
          type: integer
          description: 1-based attempt number for this run-step; retries create new turns.
        status:
          $ref: '#/components/schemas/AgentTurnStatus'
          description: Current lifecycle status of the agent turn.
        seq:
          type: integer
          description: Per-session ordering hint (cosmetic; turns are ordered by creation
            time).
        error_type:
          type: string
          description: Machine-readable failure category when the turn failed.
        error_message:
          type: string
          description: Human-readable failure detail when the turn failed.
        error_scope:
          $ref: '#/components/schemas/AgentTurnErrorScope'
        output:
          type: object
          additionalProperties: true
          description: The validated structured output. Present only on a `completed` turn
            that declared an output schema. Read this instead of parsing the transcript.
        output_source:
          $ref: '#/components/schemas/AgentTurnOutputSource'
          description: 'Where `output` came from: a `mobius_submit_output` submission (`tool`)
            or the schema-valid final-text fallback (`text`).'
        effective_timeout_seconds:
          type: integer
          format: int64
          description: Authoritative active-execution budget selected for the turn.
        created_at:
          type: string
          format: date-time
          description: Time the turn was created.
        updated_at:
          type: string
          format: date-time
          description: Time the turn was last updated.
        completed_at:
          type: string
          format: date-time
          description: When the turn reached a terminal status.
    AgentTurnListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Turns in this session, ordered by creation time.
          items:
            $ref: '#/components/schemas/AgentTurn'
        has_more:
          type: boolean
          description: True when more turns exist past this page.
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor to pass as `cursor` on the next request. Null when `has_more`
            is false.
    SessionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Session'
        has_more:
          type: boolean
          description: True when more sessions exist past this page.
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page — pass back as `cursor`. Null when
            `has_more` is false.
    UpdateSessionRequest:
      type: object
      additionalProperties: false
      description: Mutable display and lifecycle fields for a session.
      properties:
        title:
          type: string
          description: Human-readable session title.
        status:
          $ref: '#/components/schemas/SessionStatus'
          description: Lifecycle status. `active` restores archived sessions; `deleted` is
            terminal.
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Partial patch to the session's compaction policy. Only the supplied
            fields change; omitted fields keep their current values.
        thinking_effort:
          $ref: '#/components/schemas/ThinkingEffort'
          description: Reasoning-effort override for this session. Send a level to override,
            or `inherit` to clear it and fall back to the agent default. Omit to leave the
            current value unchanged.
    SessionTranscriptMessage:
      type: object
      additionalProperties: false
      required:
      - id
      - session_id
      - agent_id
      - role
      - content
      - entry_type
      - status
      - turn_index
      - sequence
      - created_at
      properties:
        id:
          type: string
        session_id:
          type: string
        agent_id:
          type: string
        turn_id:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/SessionMessageRole'
        content:
          type: array
          items:
            $ref: '#/components/schemas/SessionContentBlock'
        entry_type:
          type: string
          description: Known values include message and compaction; unknown values must be
            preserved.
        status:
          type: string
          description: Known values are streaming and final; unknown values must be preserved.
        turn_index:
          type: integer
          nullable: true
        sequence:
          type: integer
          nullable: true
        covers_through_sequence:
          type: integer
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    SessionTranscriptTurn:
      type: object
      additionalProperties: false
      required:
      - id
      - agent_id
      - session_id
      - attempt
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
        agent_id:
          type: string
        session_id:
          type: string
        run_id:
          type: string
        step_key:
          type: string
        channel_exchange_id:
          type: string
        attempt:
          type: integer
        status:
          type: string
          description: Known AgentTurn status; unknown values must be preserved.
        seq:
          type: integer
        error_type:
          type: string
        error_message:
          type: string
        usage:
          type: object
          additionalProperties: true
          description: Token usage recorded when the turn terminalized, when available.
        output:
          type: object
          additionalProperties: true
          description: The validated structured output, delivered on the terminal `turn.upsert`
            frame. Present only on a `completed` turn that declared an output schema.
        output_source:
          $ref: '#/components/schemas/AgentTurnOutputSource'
          description: Where `output` came from (`tool` or `text`).
        wait:
          $ref: '#/components/schemas/SessionTranscriptWait'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
    SessionTranscriptSnapshot:
      type: object
      additionalProperties: false
      required:
      - messages
      - turns
      - interactions
      - has_more
      - resume_cursor
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SessionTranscriptMessage'
        turns:
          type: array
          items:
            $ref: '#/components/schemas/SessionTranscriptTurn'
        interactions:
          type: array
          description: Pending interactions raised by agent tool calls in this session.
          items:
            $ref: '#/components/schemas/Interaction'
        has_more:
          type: boolean
        resume_cursor:
          type: string
        next_page_token:
          type: string
    SessionTranscriptFrame:
      oneOf:
      - $ref: '#/components/schemas/MessageUpsertFrame'
      - $ref: '#/components/schemas/MessageBlockFrame'
      - $ref: '#/components/schemas/MessageBlockPatchFrame'
      - $ref: '#/components/schemas/MessageDeltaFrame'
      - $ref: '#/components/schemas/TurnUpsertFrame'
      - $ref: '#/components/schemas/InteractionUpsertFrame'
      - $ref: '#/components/schemas/StreamReadyFrame'
      - $ref: '#/components/schemas/StreamEndFrame'
      discriminator:
        propertyName: event_type
        mapping:
          message.upsert: '#/components/schemas/MessageUpsertFrame'
          message.block: '#/components/schemas/MessageBlockFrame'
          message.block.patch: '#/components/schemas/MessageBlockPatchFrame'
          message.delta: '#/components/schemas/MessageDeltaFrame'
          turn.upsert: '#/components/schemas/TurnUpsertFrame'
          interaction.upsert: '#/components/schemas/InteractionUpsertFrame'
          stream.ready: '#/components/schemas/StreamReadyFrame'
          stream.end: '#/components/schemas/StreamEndFrame'
    MessageUpsertFrame:
      allOf:
      - $ref: '#/components/schemas/SessionTranscriptMessage'
      - type: object
        required:
        - event_type
        properties:
          event_type:
            type: string
            enum:
            - message.upsert
    MessageBlockFrame:
      type: object
      additionalProperties: false
      required:
      - event_type
      - session_id
      - message_id
      - content_index
      - block
      properties:
        event_type:
          type: string
          enum:
          - message.block
        session_id:
          type: string
        message_id:
          type: string
        content_index:
          type: integer
          minimum: 0
        block:
          $ref: '#/components/schemas/SessionContentBlock'
    MessageBlockPatchFrame:
      type: object
      additionalProperties: false
      required:
      - event_type
      - session_id
      - message_id
      - content_index
      properties:
        event_type:
          type: string
          enum:
          - message.block.patch
        session_id:
          type: string
        message_id:
          type: string
        content_index:
          type: integer
          minimum: 0
        status:
          type: string
          description: Known values are pending, running, ok, error, and cancelled.
        progress:
          type: object
          nullable: true
          additionalProperties: true
        resolved_action:
          $ref: '#/components/schemas/SessionResolvedAction'
    MessageDeltaFrame:
      type: object
      additionalProperties: false
      required:
      - event_type
      - session_id
      - message_id
      - content_index
      properties:
        event_type:
          type: string
          enum:
          - message.delta
        session_id:
          type: string
        message_id:
          type: string
        content_index:
          type: integer
          minimum: 0
        text:
          type: string
        thinking:
          type: string
    TurnUpsertFrame:
      allOf:
      - $ref: '#/components/schemas/SessionTranscriptTurn'
      - type: object
        required:
        - event_type
        properties:
          event_type:
            type: string
            enum:
            - turn.upsert
    InteractionUpsertFrame:
      allOf:
      - $ref: '#/components/schemas/Interaction'
      - type: object
        required:
        - event_type
        properties:
          event_type:
            type: string
            enum:
            - interaction.upsert
    StreamReadyFrame:
      type: object
      additionalProperties: false
      required:
      - event_type
      - session_id
      - resume_cursor
      properties:
        event_type:
          type: string
          enum:
          - stream.ready
        session_id:
          type: string
        resume_cursor:
          type: string
    SessionStreamFrame:
      anyOf:
      - $ref: '#/components/schemas/SessionUserMessagePayload'
      - $ref: '#/components/schemas/AgentMessagePayload'
      - $ref: '#/components/schemas/CompactionCreatedPayload'
      - $ref: '#/components/schemas/TurnStartedPayload'
      - $ref: '#/components/schemas/TurnWaitingPayload'
      - $ref: '#/components/schemas/TurnCompletedPayload'
      - $ref: '#/components/schemas/TurnFailedPayload'
      - $ref: '#/components/schemas/TurnCancelledPayload'
      - $ref: '#/components/schemas/NudgeEventPayload'
      - $ref: '#/components/schemas/SessionMessagePreviewFrame'
      - $ref: '#/components/schemas/SessionResyncFrame'
      - $ref: '#/components/schemas/StreamEndFrame'
      - $ref: '#/components/schemas/ToolCallPayload'
      - $ref: '#/components/schemas/ToolResultPayload'
      - $ref: '#/components/schemas/GenerationDeltaFrame'
      description: |-
        JSON payload of a single `data:` line on the session SSE stream, paired with an `event: <event type>` line.

        The `event:` line is the authoritative frame selector. This union is reference-only: several payloads are structurally identical (e.g. `user.message` and `agent.message`) or permissive open objects, so the `data:` body alone cannot be shape-matched to a single variant. Consumers MUST dispatch on the `event:` name and decode the body as the corresponding payload — never validate the bare body against the union.

        Durable message frames (`user.message`, `agent.message`, `compaction.created`) are replayed from the transcript and carry an SSE `id: <sequence>` — that `sequence` is the only cursor a client persists for `after_sequence` / `Last-Event-ID` resume. Terminal `turn.*` frames mark the active turn settling. `session.message.preview`, `session.resync`, `nudge.queued`, `nudge.delivered`, `nudge.cancelled`, `tool.call`, `tool.result`, and `generation.delta` frames are live-only and carry no `id:`. `stream.end` is the final envelope on every deliberate server-side close and also carries no `id:`.
    SessionMessagePreviewFrame:
      type: object
      additionalProperties: true
      required:
      - event_type
      - id
      - session_id
      - turn_id
      - role
      - entry_type
      - content
      - metadata
      description: Live-only, SessionMessage-compatible transcript preview for an in-flight
        agent response segment. It carries no durable `seq`, transcript `sequence`, or stable
        `message_id`; the committed row later replaces it by `turn_id` plus `metadata.response_message_index`.
      properties:
        event_type:
          type: string
          enum:
          - session.message.preview
        id:
          type: string
          description: Provisional live id. Do not persist or use as the durable message id.
        session_id:
          type: string
          description: Session this preview belongs to.
        agent_id:
          type: string
          description: Agent that owns the parent session, when known.
        run_id:
          type: string
          description: Loop run that produced the preview, when applicable.
        turn_id:
          type: string
          description: Agent turn that produced the preview.
        live_sequence:
          type: integer
          format: int64
          description: Monotonic per-turn sequence across all live-only session frames; use
            to detect dropped live frames.
        role:
          $ref: '#/components/schemas/SessionMessageRole'
        entry_type:
          $ref: '#/components/schemas/SessionMessageEntryType'
        content:
          type: array
          description: Ordered content blocks using the same canonical block shape as SessionMessage.
          items:
            $ref: '#/components/schemas/SessionContentBlock'
        metadata:
          type: object
          additionalProperties: true
          description: Must include `response_message_index`, the handoff key shared with
            the durable transcript row.
        emitted_at:
          type: string
          format: date-time
          description: Server timestamp when this live preview frame was emitted.
    SessionLiveSnapshot:
      type: object
      additionalProperties: false
      required:
      - session_id
      - turn_id
      - frames
      - last_live_sequence
      - updated_at
      description: Ephemeral live transcript snapshot for an in-flight turn. Deployments with
        shared cache support make it available across backend replicas.
      properties:
        session_id:
          type: string
        turn_id:
          type: string
        frames:
          type: array
          description: Live-only frame payloads in live_sequence order. Each item has the
            same shape as its SSE `data:` payload.
          items:
            type: object
            additionalProperties: true
        last_live_sequence:
          type: integer
          format: int64
          description: Highest live_sequence included in `frames`, or 0 when no live frames
            are available.
        updated_at:
          type: string
          format: date-time
          description: Server timestamp when the snapshot was last updated.
    SessionResyncFrame:
      type: object
      additionalProperties: false
      required:
      - event_type
      - session_id
      - reason
      description: Live-only marker asking the client to reconcile the active turn from the
        live snapshot endpoint.
      properties:
        event_type:
          type: string
          enum:
          - session.resync
        session_id:
          type: string
        reason:
          type: string
          description: Machine-readable resync reason, e.g. `subscriber_overflow`.
    StreamEndFrame:
      type: object
      additionalProperties: false
      required:
      - event_type
      - session_id
      - reason
      description: Final envelope on a deliberate session-stream close. An idle close means
        no non-terminal turn remains; a rotate close asks the client to reconnect immediately
        with the same durable transcript cursor.
      properties:
        event_type:
          type: string
          enum:
          - stream.end
        session_id:
          type: string
        reason:
          type: string
          enum:
          - idle
          - rotate
    SessionUserMessagePayload:
      type: object
      additionalProperties: true
      required:
      - message_id
      - sequence
      - role
      - content
      description: 'Payload of a `user.message` content event: the durable encoding of one
        non-assistant transcript message — caller input, or a user-role message carrying tool
        results. It mirrors the transcript row exactly, carrying the message identity (`message_id`
        + `sequence`) and full content. Replaying these events reconstructs the same view
        as reading the messages API.'
      properties:
        message_id:
          type: string
          description: Id of the transcript message this event mirrors.
        sequence:
          type: integer
          format: int64
          description: The mirrored message's per-session transcript sequence.
        role:
          $ref: '#/components/schemas/SessionMessageRole'
          description: Transcript role of the message (e.g. `user`, `system`, or a user-role
            message carrying tool results); never `assistant`.
        content:
          type: array
          description: The message's full canonical content blocks (text, tool_result, …).
          items:
            $ref: '#/components/schemas/SessionContentBlock'
        turn_id:
          type: string
          description: The agent turn that produced this message, when applicable.
    TurnStartedPayload:
      type: object
      additionalProperties: true
      description: 'Payload of a `turn.started` event. Empty: the turn is identified by the
        envelope `turn_id`, so nothing is duplicated in the payload.'
    AgentMessagePayload:
      type: object
      additionalProperties: true
      required:
      - message_id
      - sequence
      - role
      - content
      description: 'Payload of an `agent.message` content event: the durable encoding of one
        assistant transcript message. Carries the message''s full structured content (text,
        thinking, tool_use) plus the message identity (`message_id` + `sequence`). Replaying
        these events reconstructs the same view as reading the messages API.'
      properties:
        message_id:
          type: string
          description: Id of the transcript message this event mirrors.
        sequence:
          type: integer
          format: int64
          description: The mirrored message's per-session transcript sequence.
        role:
          type: string
          enum:
          - assistant
          description: Always `assistant`.
        content:
          type: array
          description: The assistant message's full canonical content blocks (text, thinking,
            tool_use).
          items:
            $ref: '#/components/schemas/SessionContentBlock'
        turn_id:
          type: string
          description: The agent turn that produced this message.
    ToolCallPayload:
      type: object
      additionalProperties: true
      description: 'Payload of a live-only `tool.call` frame — an in-flight preview that a
        tool was invoked during the active turn. Never persisted and carries no sequence:
        the durable record of the call is the `tool_use` content block of the assistant message,
        delivered as an `agent.message` event when the turn commits.'
      properties:
        tool_call_id:
          type: string
        tool_name:
          type: string
        input:
          type: object
          additionalProperties: true
        live_sequence:
          type: integer
          format: int64
          description: Monotonic per-turn sequence across all live-only session frames; use
            to detect dropped live frames.
        emitted_at:
          type: string
          format: date-time
          description: Server timestamp when this live preview frame was emitted.
    ToolResultPayload:
      type: object
      additionalProperties: true
      description: 'Payload of a live-only `tool.result` frame — an in-flight preview that
        a tool returned during the active turn. Never persisted and carries no sequence: the
        durable record is the `tool_result` content block of the following transcript message,
        delivered as a `user.message` event when the turn commits.'
      properties:
        tool_call_id:
          type: string
        tool_name:
          type: string
        content:
          type: array
          description: 'The tool result as canonical content blocks (e.g. `[{ "type": "text",
            "text": "…" }]`), the same `SessionContentBlock` shape as the `tool_result` content
            of the durable transcript message — so the live preview and the committed record
            read identically. In practice the server collapses the result to a single `text`
            block.'
          items:
            $ref: '#/components/schemas/SessionContentBlock'
        display:
          type: string
        is_error:
          type: boolean
        error:
          type: string
        live_sequence:
          type: integer
          format: int64
          description: Monotonic per-turn sequence across all live-only session frames; use
            to detect dropped live frames.
        emitted_at:
          type: string
          format: date-time
          description: Server timestamp when this live preview frame was emitted.
    TurnWaitingPayload:
      type: object
      additionalProperties: true
      properties:
        turn_id:
          type: string
        reason:
          type: string
        wait:
          $ref: '#/components/schemas/SessionTranscriptWait'
    SessionTranscriptWait:
      type: object
      additionalProperties: false
      required:
      - kind
      - interaction_id
      - tool_call_id
      properties:
        kind:
          type: string
          enum:
          - interaction
        interaction_id:
          type: string
        tool_call_id:
          type: string
        expires_at:
          type: string
          format: date-time
    TurnCompletedPayload:
      type: object
      additionalProperties: true
      description: Payload of a `turn.completed` event — the terminal idle marker carrying
        token usage. The assistant output is not duplicated here; it is delivered as `agent.message`
        content events when the transcript commits.
      properties:
        usage:
          type: object
          additionalProperties: true
    TurnFailedPayload:
      type: object
      additionalProperties: true
      properties:
        error:
          type: string
        error_type:
          type: string
    TurnCancelledPayload:
      type: object
      additionalProperties: true
      properties:
        reason:
          type: string
    NudgeEventPayload:
      type: object
      additionalProperties: true
      required:
      - nudge_id
      - turn_id
      - delivery
      - status
      description: Live reconciliation hint emitted for `nudge.queued`, `nudge.delivered`,
        and `nudge.cancelled`. Re-read the queue resource after receiving it; this pulse is
        not durable replay state.
      properties:
        nudge_id:
          type: string
        turn_id:
          type: string
        delivery:
          $ref: '#/components/schemas/SessionNudgeDelivery'
        status:
          $ref: '#/components/schemas/SessionNudgeStatus'
    CompactionCreatedPayload:
      type: object
      additionalProperties: true
      description: 'Payload of a `compaction.created` event, emitted when the session transcript
        is summarized. The event is non-terminal: it never closes the session stream, so a
        live consumer observes a compaction landing inline.'
      properties:
        message_id:
          type: string
          description: Id of the compaction summary message appended to the transcript.
        sequence:
          type: integer
          format: int64
          description: The summary message's per-session transcript sequence.
        role:
          type: string
          description: Transcript role of the summary entry.
        content:
          type: array
          description: The summary's full canonical content blocks, so replaying the stream
            reconstructs the compaction entry exactly.
          items:
            $ref: '#/components/schemas/SessionContentBlock'
        covers_through_sequence:
          type: integer
          description: Highest message sequence the new summary covers — the before/after
            boundary.
        message_count:
          type: integer
          description: Number of transcript messages folded into this summary.
        summary_model:
          type: string
          description: Model that produced the summary.
    AppendSessionMessagesRequest:
      type: object
      additionalProperties: false
      required:
      - messages
      properties:
        messages:
          type: array
          minItems: 1
          description: Messages to append to the session, in order.
          items:
            $ref: '#/components/schemas/AppendSessionMessage'
        token_input_total:
          type: integer
          minimum: 0
          description: Fresh (uncached) input tokens to add to this session's lifetime total.
        token_output_total:
          type: integer
          minimum: 0
          description: Output tokens to add to this session's lifetime total.
        cache_read_input_total:
          type: integer
          minimum: 0
          description: Prompt-cache-read input tokens to add to this session's lifetime total.
        cache_creation_input_total:
          type: integer
          minimum: 0
          description: Prompt-cache-write input tokens to add to this session's lifetime total.
        model:
          type: string
          description: Model that produced these messages.
        model_provider:
          type: string
          description: Provider for the supplied `model`.
    AppendSessionMessage:
      type: object
      additionalProperties: false
      description: Message payload to append to an existing durable session.
      required:
      - role
      - content
      properties:
        role:
          $ref: '#/components/schemas/SessionMessageRole'
          description: Role to store for this appended message.
        content:
          type: array
          description: Ordered content blocks (text, tool calls, tool results, images). Blocks
            of type `reminder` are host-managed runtime context and are rejected on this surface.
          items:
            type: object
            additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata for this message.
        created_at:
          type: string
          format: date-time
          description: Caller-supplied creation timestamp. The server assigns one if absent.
    InvokeAgentRequest:
      type: object
      additionalProperties: false
      description: 'A single compound invocation: which agent to run, how to resolve the session,
        the caller''s input message, and optional channel routing context. `config.timeout_seconds`
        may be zero to use the platform default; `operation.timeout_seconds` must be at least
        one and takes precedence for this admitted turn.'
      required:
      - agent_ref
      - input
      properties:
        agent_ref:
          $ref: '#/components/schemas/AgentRef'
        session:
          $ref: '#/components/schemas/InvokeSessionSpec'
        config:
          $ref: '#/components/schemas/InlineAgentConfig'
        operation:
          $ref: '#/components/schemas/AgentTurnOperationPolicy'
        input:
          $ref: '#/components/schemas/InvokeInput'
        output:
          $ref: '#/components/schemas/TurnOutputSpec'
          description: Optional structured-output contract for this turn. Read the validated
            value from the completed turn's `output`.
        channel_context:
          $ref: '#/components/schemas/ChannelContext'
    InlineAgentConfig:
      type: object
      additionalProperties: false
      description: |-
        An agent definition sent with the invocation instead of one stored in Mobius ahead of time. Send it on the call that creates the session and it becomes that session's definition; send it again on a later turn to replace it; leave it out and the session keeps the definition it already has.

        A session holds one config at a time. If two calls share a session and both send `config`, the last one Mobius saves wins, so give each definition you want to run at the same time its own session.

        Every field is optional. A field you set replaces the agent's value; a field you leave out keeps the agent's value. The `toolkits` and `skills` lists replace the agent's lists entirely — they are not merged item by item. If your organization sets limits on the model, effort, or timeout, those limits still apply, so a value here can never exceed them. Use `config` for one-off invocations only: loops and schedules must point to a stored agent, so creating or updating one with `config` is rejected.
      properties:
        instructions:
          type: string
          description: System-prompt instructions for the agent. Replaces the agent's configured
            system prompt for this session. Empty falls back to the generated default.
        model:
          type: string
          description: LLM model identifier. Resolves through the same model routing and allow
            rules as a stored agent's model.
        effort:
          $ref: '#/components/schemas/ThinkingEffort'
          description: Reasoning-effort level for the agent's turns.
        timeout_seconds:
          type: integer
          format: int64
          minimum: 0
          description: Per-turn execution timeout in seconds. Zero uses the platform default.
            A loop step's own timeout still overrides this.
        toolkits:
          type: array
          description: Toolkit selections that replace the agent's toolkit assignments for
            this session. Each names the actions (from this project's action catalog) the
            agent may call. Replaces wholesale — an omitted `toolkits` inherits the agent's
            assignments.
          items:
            $ref: '#/components/schemas/InlineToolkit'
        skills:
          type: array
          description: Skills that replace the agent's skill assignments for this session.
            Each carries its full instruction body, lazy-loaded via the invoke_skill tool.
            Replaces wholesale.
          items:
            $ref: '#/components/schemas/InlineSkill'
    AgentTurnOperationPolicy:
      type: object
      additionalProperties: false
      description: Operational policy for this newly admitted turn only. Unlike `config`,
        this policy is not saved on the session. Its timeout takes precedence over the session's
        inline-definition timeout and remains constrained by any deployment timeout ceiling.
        `config.timeout_seconds` may be zero to use the platform default; this operation timeout
        must be at least one.
      properties:
        timeout_seconds:
          type: integer
          format: int64
          minimum: 1
          description: Overall active-execution budget for this logical turn.
    InlineToolkit:
      type: object
      additionalProperties: false
      required:
      - name
      description: A toolkit selection carried in an inline agent config.
      properties:
        name:
          type: string
          description: Toolkit name.
        actions:
          type: array
          description: Action names (from the project catalog) this toolkit grants.
          items:
            type: string
    InlineSkill:
      type: object
      additionalProperties: false
      required:
      - name
      description: A skill definition carried in an inline agent config.
      properties:
        name:
          type: string
          description: Skill name, referenced by the invoke_skill tool.
        description:
          type: string
          description: One-line summary shown in the agent's skills list.
        body:
          type: string
          description: The skill's full instructions, loaded on demand.
    AgentRef:
      type: object
      additionalProperties: false
      minProperties: 1
      description: Reference to an agent in this project. Supply exactly one of `id` (the
        agent identifier) or `name` (the project-unique agent name). A blueprint-binding reference
        form is reserved for a later release and is not resolvable yet.
      properties:
        id:
          type: string
          description: Agent identifier.
        name:
          type: string
          description: Project-unique agent name.
    InvokeSessionSpec:
      type: object
      additionalProperties: false
      description: 'How to resolve or create the session this invocation runs in. Mirrors
        the create-session policy: `mode` + `session_key` resolve a durable conversation for
        the agent, and the remaining fields seed a session that does not already exist (they
        are ignored when an existing session is resolved). Omit the whole object to use a
        single default session per agent in `continue_or_create` mode.'
      properties:
        mode:
          type: string
          enum:
          - new
          - continue
          - continue_or_create
          description: '`continue_or_create` (default) resolves an existing session for the
            `session_key` or creates one; `new` always creates a fresh session; `continue`
            resolves an existing session and fails if none exists.'
        session_key:
          type: string
          description: Stable key identifying the conversation within the agent.
        title:
          type: string
          description: Human-friendly title for a newly created session.
        visibility:
          $ref: '#/components/schemas/SessionVisibility'
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Per-session compaction overrides applied when the session is first
            created. Merged over the agent's default policy and server defaults. Ignored when
            an existing session is resolved.
        retention:
          $ref: '#/components/schemas/SessionRetentionPolicy'
          description: Retention policy applied when the session is first created. Ignored
            when an existing session is resolved.
        thinking_effort:
          $ref: '#/components/schemas/ThinkingEffort'
          description: Reasoning-effort override applied when the session is first created.
            Overrides the agent default. Ignored when an existing session is resolved.
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata stored on a newly created session.
    RuntimeContextItem:
      type: object
      additionalProperties: false
      required:
      - name
      - content
      properties:
        name:
          type: string
          pattern: ^[a-z][a-z0-9-]*$
          maxLength: 64
          description: Stable application-defined context name. Delivered to the model namespaced
            as `app-<name>`. Supply the application name without that namespace; for example,
            `app-board` is delivered as `app-app-board`.
        content:
          type: string
          minLength: 1
          maxLength: 8192
          description: Current value of this context, rendered verbatim to the model. OpenAPI
            `maxLength` counts Unicode code points; Mobius separately enforces an 8,192-byte
            UTF-8 limit server-side.
    RuntimeContext:
      type: array
      maxItems: 8
      description: |-
        Ordered application-owned runtime context for this turn. Send the full current value for each named item. Mobius records an item only on first use, material change, or after compaction removes its prior value from the active model window. Omitting a name leaves its last value standing; send an explicit value such as `none` to clear application state. Names must be unique within the request. Content is limited to 8,192 UTF-8 bytes per item and 16,384 bytes total.

        Context remains at contextual authority and cannot grant permissions. A retry using the same `idempotency_key` returns the original turn and ignores any newly supplied context.
      items:
        $ref: '#/components/schemas/RuntimeContextItem'
    TurnOutputSpec:
      type: object
      additionalProperties: false
      required:
      - schema
      description: 'Attaches a structured-output contract to a turn. When present, Mobius
        exposes a reserved submit tool whose input schema is the schema below, validates the
        submission server-side, and a turn that never produces a schema-valid object fails
        with `error_type: output_schema_unsatisfied` instead of completing. Read the validated
        value from the completed turn''s `output`. This is a per-turn contract, not agent
        identity, so it works with stored agents and may differ between turns of one session.'
      properties:
        schema:
          type: object
          additionalProperties: true
          description: 'JSON Schema the turn''s final output must satisfy. The root must be
            `type: object` and self-contained (no `$ref`); the serialized schema must not
            exceed 32 KiB. Mobius enforces the OpenAPI 3.0 subset: `required`, `enum`, `additionalProperties`,
            `minItems`/`maxItems`, `minLength`/`maxLength`, `pattern`, numeric bounds, nested
            objects/arrays, `oneOf`/`anyOf`/`allOf`, and `nullable`. Not supported: `$ref`/`$defs`,
            `if`/`then`/`else`, `const` (use a one-value `enum`), `patternProperties`, and
            `prefixItems`.'
    InvokeInput:
      type: object
      additionalProperties: false
      description: The caller input message that starts the agent turn.
      required:
      - content
      properties:
        content:
          type: array
          minItems: 1
          description: Ordered content blocks (text, images) for the input message.
          items:
            type: object
            additionalProperties: true
        idempotency_key:
          type: string
          description: Dedup key scoped to the resolved session. A repeat call with the same
            key returns the existing invocation and writes nothing new; it never restarts
            a terminal turn. Derive it from the provider event id for Slack/Telegram webhook
            retries. Omitting it or sending a blank value disables retry deduplication.
        context:
          $ref: '#/components/schemas/RuntimeContext'
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata attached to the input message.
    ChannelContext:
      type: object
      additionalProperties: false
      description: Optional messaging provider/channel routing context (Slack, Telegram, …).
        Persisted on the started turn's input-message metadata under a `channel_context` key
        so chat history and support views can trace a turn back to the provider thread it
        came from.
      properties:
        provider:
          type: string
          description: Messaging provider, e.g. `slack` or `telegram`.
        workspace_id:
          type: string
          description: Provider workspace/team identifier.
        channel_id:
          type: string
          description: Provider channel or chat identifier.
        thread_id:
          type: string
          description: Provider thread identifier within the channel.
    CreateSessionRequest:
      type: object
      additionalProperties: false
      description: Resolve-or-create policy for a session.
      required:
      - agent_id
      properties:
        agent_id:
          type: string
          description: Agent that owns the session.
        mode:
          type: string
          enum:
          - new
          - continue
          - continue_or_create
          description: '`continue_or_create` (default) resolves an existing session for the
            `session_key` or creates one; `new` always creates a fresh session; `continue`
            resolves an existing session and fails if none exists.'
        session_key:
          type: string
          description: Stable key identifying the conversation within the agent.
        title:
          type: string
          description: Human-friendly session title.
        visibility:
          $ref: '#/components/schemas/SessionVisibility'
        model:
          type: string
          description: Model to record on the session.
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Per-session compaction overrides applied when the session is first
            created. Merged over the agent's default policy and server defaults. Ignored when
            an existing session is resolved.
        retention:
          $ref: '#/components/schemas/SessionRetentionPolicy'
          description: Retention policy applied when the session is first created. Ignored
            when an existing session is resolved.
        thinking_effort:
          $ref: '#/components/schemas/ThinkingEffort'
          description: Reasoning-effort override applied when the session is first created.
            Overrides the agent default. Ignored when an existing session is resolved.
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata for the session.
    StartTurnRequest:
      type: object
      additionalProperties: false
      description: Caller input that starts an agent turn in a session. The session definition's
        `config.timeout_seconds` may be zero to use the platform default; `operation.timeout_seconds`
        must be at least one and takes precedence for this admitted turn.
      required:
      - content
      properties:
        role:
          type: string
          enum:
          - user
          default: user
          description: Role of the input message. A turn carries caller input, so only `user`
            is accepted; defaults to `user` when omitted.
        content:
          type: array
          minItems: 1
          description: Ordered content blocks (text, images) for the input message.
          items:
            type: object
            additionalProperties: true
        idempotency_key:
          type: string
          description: Dedup key scoped to the session. A repeat call with the same key returns
            the existing invocation and writes nothing new; it never restarts a terminal turn.
            Omitting it or sending a blank value disables retry deduplication.
        operation:
          $ref: '#/components/schemas/AgentTurnOperationPolicy'
        context:
          $ref: '#/components/schemas/RuntimeContext'
        output:
          $ref: '#/components/schemas/TurnOutputSpec'
          description: Optional structured-output contract for this turn. Read the validated
            value from the completed turn's `output`.
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata attached to the input message.
    TurnAck:
      type: object
      additionalProperties: false
      description: Acknowledgement that a turn started, with a stream cursor.
      required:
      - session
      - turn
      - resume_cursor
      - after_sequence
      properties:
        session:
          $ref: '#/components/schemas/Session'
        turn:
          $ref: '#/components/schemas/AgentTurn'
        user_message:
          $ref: '#/components/schemas/SessionTranscriptMessage'
          description: Durable caller row created for this turn.
        resume_cursor:
          type: string
          minLength: 1
          description: Opaque stable v2 lower boundary for streaming and terminal settlement.
            It precedes every durable message owned by the returned turn and is safe for both
            fresh and deduplicated invocations. A deduplicated retry may replay already-observed
            frames.
        after_sequence:
          type: integer
          format: int64
          description: The transcript message `sequence` cursor to stream from. Pass it as
            `after_sequence` to `GET .../stream` to follow this turn.
        deduped:
          type: boolean
          description: True when a repeated idempotency key returned an existing turn without
            restarting it.
    NudgeSessionRequest:
      type: object
      additionalProperties: false
      required:
      - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 32768
          description: User direction to deliver at the next iteration boundary.
        idempotency_key:
          type: string
          maxLength: 255
          description: Dedup key scoped to the session. Reusing the key with identical content
            returns the original nudge request; different content conflicts.
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata retained with the nudge request.
        wake:
          type: boolean
          default: false
          description: 'When true and the target turn is waiting on an interruptible agent
            tool, resolve that tool call with `{ "interrupted": true, "reason": "user_direction"
            }` and resume the same turn. Running and newly queued turns ignore this field.'
    SessionNudgeStatus:
      type: string
      enum:
      - pending
      - delivered
      - cancelled
      description: Durable nudge queue lifecycle status.
    SessionNudgeDelivery:
      type: string
      enum:
      - current_turn
      - new_turn
      description: '`current_turn` means the input targets an in-flight turn; `new_turn` means
        Mobius queued a direct-session turn because none was nudgeable.'
    SessionNudgeTurn:
      type: object
      additionalProperties: false
      required:
      - id
      - status
      properties:
        id:
          type: string
        status:
          $ref: '#/components/schemas/AgentTurnStatus'
    SessionNudge:
      type: object
      additionalProperties: false
      required:
      - id
      - status
      - delivery
      - content
      - turn
      - sender_principal_id
      - created_at
      properties:
        id:
          type: string
          description: Stable nudge identifier.
        status:
          $ref: '#/components/schemas/SessionNudgeStatus'
        delivery:
          $ref: '#/components/schemas/SessionNudgeDelivery'
        content:
          type: string
          description: Exact user direction supplied when the nudge was queued.
        turn:
          $ref: '#/components/schemas/SessionNudgeTurn'
        sender_principal_id:
          type: string
          description: Principal that queued the nudge.
        created_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
    SessionNudgeListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SessionNudge'
        has_more:
          type: boolean
        next_cursor:
          type: string
          nullable: true
          description: Opaque continuation cursor, or null at the end.
    SessionNudgeAck:
      type: object
      additionalProperties: false
      required:
      - nudge_id
      - delivery
      - session
      - turn
      - after_sequence
      - deduped
      - woke_turn
      properties:
        nudge_id:
          type: string
          description: Stable id of the durable nudge mailbox row.
        delivery:
          $ref: '#/components/schemas/SessionNudgeDelivery'
        session:
          $ref: '#/components/schemas/Session'
        turn:
          $ref: '#/components/schemas/AgentTurn'
        after_sequence:
          type: integer
          format: int64
          description: Current transcript sequence cursor for following the target turn.
        deduped:
          type: boolean
          description: True when an existing idempotent nudge request was returned.
        woke_turn:
          type: boolean
          description: True when wake interrupted a waiting tool and requeued this turn.
    Loop:
      type: object
      additionalProperties: false
      description: A loop and its current authored definition. Updating any authoring field
        creates an internal revision and makes it runnable immediately.
      required:
      - id
      - name
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable loop identifier.
        name:
          type: string
          description: Human-readable display name.
        description:
          type: string
          description: Markdown description of the loop's purpose.
        status:
          $ref: '#/components/schemas/LoopStatus'
          description: 'Current loop lifecycle status: `draft`, `active`, `paused`, or `deleted`.'
        owner:
          type: string
          description: User who created or currently owns this loop.
        agent_id:
          type: string
          description: Agent associated with this loop. Agent steps use it when they do not
            pin `config.agent_id`.
        schema_version:
          type: string
          enum:
          - '1'
          default: '1'
          description: Loop authoring schema version. Only schema version 1 is accepted.
        event:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LoopSpecInput'
          description: Declared event fields for this loop.
        config:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LoopSpecInput'
          description: Declared run config fields for this loop.
        concurrency:
          type: string
          enum:
          - allow
          - queue
          - skip
          - replace
          description: 'Concurrency behavior: `allow`, `queue`, `skip`, or `replace`.'
        triggers:
          type: array
          description: Authored trigger declarations for this loop.
          items:
            $ref: '#/components/schemas/LoopSpecTrigger'
        repositories:
          type: array
          description: Source repositories the loop targets.
          items:
            $ref: '#/components/schemas/LoopSpecRepository'
        steps:
          type: array
          description: Ordered user-authored steps to execute for each run.
          items:
            $ref: '#/components/schemas/LoopStep'
        output:
          type: object
          additionalProperties: true
          description: Declared run result contract.
        cleanup:
          type: array
          description: Cleanup steps or policies evaluated after normal step execution.
          items:
            type: object
            additionalProperties: true
        limits:
          $ref: '#/components/schemas/LoopSpecLimits'
          description: Run guardrails such as budget, timeout, and turn limits.
        defaults:
          $ref: '#/components/schemas/LoopSpecDefaults'
          description: Run-level defaults applied when individual steps omit a policy.
        run_name:
          $ref: '#/components/schemas/RunNameSpec'
          description: Optional templates for generating an operator-facing title and description
            for each run.
        default_config:
          type: object
          additionalProperties: true
          description: Default config values used when a run is started without overrides.
        settings:
          type: object
          additionalProperties: true
          description: Free-form loop-level settings consumed by the engine.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Free-form labels used for filtering, ownership, or automation.
        last_run_at:
          type: string
          format: date-time
          description: Timestamp of the most recent run start, if any.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
      example:
        id: loop_9q2m7x5v3p8n4r6t
        name: Daily security check
        description: Review open pull requests each morning.
        status: active
        owner: user_2f9s3k4m5n6p7q8r
        agent_id: agent_5n8p2q7m4x9r3v6t
        schema_version: '1'
        default_config:
          repository: deepnoodle-ai/mobius-cloud
        tags:
          owner: product
        triggers:
        - name: Weekday morning
          kind: schedule
          config:
            cron: 0 9 * * 1-5
            timezone: America/New_York
        steps:
        - id: summarize
          kind: agent
          config:
            agent_id: agent_5n8p2q7m4x9r3v6t
            instructions: Summarize open pull requests.
        last_run_at: '2026-06-15T13:00:00Z'
        created_at: '2026-06-15T14:30:00Z'
        updated_at: '2026-06-15T14:30:00Z'
    LoopStatus:
      type: string
      enum:
      - draft
      - active
      - paused
      - deleted
      description: 'Loop lifecycle status: `draft`, `active`, `paused`, or `deleted`.'
    LoopListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Loop'
        next_cursor:
          type: string
          description: Opaque cursor for the next page; absent when no more results.
        has_more:
          type: boolean
          description: True when more items exist after this page.
      example:
        items:
        - id: loop_9q2m7x5v3p8n4r6t
          name: Daily security check
          status: active
          triggers: []
          created_at: '2026-06-15T14:30:00Z'
          updated_at: '2026-06-15T14:30:00Z'
        has_more: false
    CreateLoopRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable display name.
        description:
          type: string
          description: Markdown description of the loop's purpose.
        agent_id:
          type: string
          description: Agent associated with this loop. Agent steps use it when they do not
