      summary: List the action catalog
      description: 'Returns the full catalog of actions available to this project: project-owned
        HTTP actions, platform-provided integration actions (Slack, GitHub, etc.), and workflow-backed
        actions (workflows with `published_as_tool = true`). The `available` flag indicates
        whether the action can currently be invoked. The `endpoint_kind` field distinguishes
