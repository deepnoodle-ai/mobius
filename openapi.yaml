    IntegrationListResponse:
      type: object
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Integration'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent
