  /v1/projects/{project_handle}/runs/{resource_id}/events.stream:
    get:
      operationId: streamRunEvents
      tags:
      - runs
      summary: Stream run events
      description: Long-lived SSE stream of run events ordered by sequence number. Each `data:`
        frame is a JSON-encoded `LoopRunEvent`. The stream terminates when the run reaches
        a terminal status. Clients that disconnect should reconnect using `?after_sequence=N`
        (or the SSE `Last-Event-ID` header set to the last sequence) to resume without gaps.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: after_sequence
        in: query
        description: Stream events with sequence > after_sequence.
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: 'Server-sent event stream. Each message is framed as `event: <run-event
            type>` followed by a `data:` line carrying the JSON-encoded run event (the `LoopRunEvent`
            shape). The stream ends when the run reaches a terminal status; reconnect with
            `after_sequence` (or the `Last-Event-ID` header) to resume.'
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/LoopRunEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project_handle}/runs/{resource_id}/signals:
    post:
      operationId: signalRun
      tags:
      - runs
      summary: Signal run
      description: Resumes a run that is suspended on a `wait_event` step matching the provided
        `step_key`. The `result` payload becomes the step's output, available to downstream
        steps at `steps.<id>.output` or `steps[0].output` in `${{ ... }}` templates.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignalLoopRunRequest'
            example:
              step_key: wait_for_external_result
              result:
                status: complete
                source: ci
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoopRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
