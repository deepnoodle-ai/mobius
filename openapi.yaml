  /v1/projects/{project}/interactions:
    post:
      operationId: createInteraction
      tags:
      - interactions
      summary: Create an interaction
      description: Creates a standalone or run-backed interaction. When `run_id` is provided,
        completing the interaction enqueues an `interaction.responded` source event that the
        SubscriptionRouter (RFC 064) matches to the run's `interaction` step by `interaction_id`
        — not by signal name. The `signal_name` field is retained for historical request shape
        and audit logging; routing no longer depends on it. Omit both `run_id` and `signal_name`
        for a standalone interaction that completes with no workflow side effect. Workers
        creating interactions from within a job should use the job-scoped route (`POST /v1/projects/{project}/jobs/{id}/interactions`)
        instead, which derives the run automatically.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInteractionRequest'
            example:
              run_id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
              signal_name: manager_approval
              target_group_id: grp_01hw1r0a2b3c4d5e6f7g8h9j0k
              kind: approval
              title: Approve publishing the April billing report?
              context:
                report_id: rpt_2026_04
                amount_usd: 12850
              spec:
                mode: confirm
                default_confirmed: false
              require_all: false
              expires_at: '2026-04-25T14:30:00Z'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interaction'
              example:
                id: int_01hw1r2s3t4u5v6w7x8y9z0a1b
                run_id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                signal_name: manager_approval
                kind: approval
                status: pending
                title: Approve publishing the April billing report?
                context:
                  report_id: rpt_2026_04
                  amount_usd: 12850
                spec:
                  mode: confirm
                  default_confirmed: false
                target_user_ids:
                - user_2f9s3k4m5n6p7q8r9s0t1u2v3w
                expires_at: '2026-04-25T14:30:00Z'
                created_at: '2026-04-24T14:30:00Z'
                updated_at: '2026-04-24T14:30:00Z'
                target_group_id: grp_01hw1r0a2b3c4d5e6f7g8h9j0k
                require_all: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      operationId: listInteractions
      tags:
      - interactions
      summary: List interactions
      description: Returns interactions newest-first, optionally filtered by kind, status,
        run, target, or the current caller's inbox. Inbox filtering includes direct targets
        and group interactions visible through live group membership.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - name: status
        in: query
        schema:
          type: string
          enum:
          - pending
          - in_review
          - completed
          - expired
          - cancelled
        description: Filter by status
      - name: kind
        in: query
        schema:
          $ref: '#/components/schemas/InteractionKind'
        description: Filter by interaction protocol kind
      - name: run_id
        in: query
        schema:
          type: string
        description: Filter by originating run ID
      - name: target_user_id
        in: query
        schema:
          type: string
        description: Filter by resolved target user ID.
      - name: inbox
        in: query
        schema:
          type: boolean
        description: When true, returns only interactions visible to the authenticated user
          (direct + group membership)
      - name: reviewer_user_id
        in: query
        schema:
          type: string
        description: Filter handoffs awaiting review by the specified reviewer user.
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/TagFilterParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InteractionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/projects/{project}/interactions/{id}:
    get:
      operationId: getInteraction
      tags:
      - interactions
      summary: Get an interaction
      description: Returns one interaction with target, response, and completion metadata.
        Run-backed interactions include the run and signal identifiers used to resume workflow
        execution.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteInteraction
      tags:
      - interactions
      summary: Delete an interaction
      description: Soft-deletes an interaction so it disappears from inbox and project listings.
        The row is retained for audit history. Only terminal interactions (`completed`, `cancelled`,
        `expired`) may be deleted; pending or in-review interactions must be cancelled first
        so any waiting workflow run can route to a fallback.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/projects/{project}/interactions/{id}/respond:
    post:
      operationId: respondToInteraction
      tags:
      - interactions
      summary: Submit a response to an interaction
      description: |-
        Canonical response endpoint for every interaction kind. A normal request/approval/review/input response, a vote response, and handoff submission/review transitions all use this endpoint. `action` defaults to `submit`; use the other action values only for lifecycle operations such as accepting a handoff, sending it back, withdrawing a vote, or manually closing a vote.

        The request body is intentionally the same envelope for every kind: `action`, `value`, and `comment`. Kind-specific behavior is selected from the interaction itself, not from separate request-body shapes.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: channel_id
        in: query
        required: false
        schema:
          type: string
        description: Optional channel context. When provided, the server appends a channel-visible
          activity message after applying the response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RespondToInteractionRequest'
            examples:
              approval:
                summary: Approve an interaction
                value:
                  action: submit
                  value: true
                  comment: Approved for publication.
              vote:
                summary: Cast a vote
                value:
                  action: submit
                  value: tacos
                  comment: Tacos.
              handoff_submit:
                summary: Submit handoff evidence
                value:
                  action: submit
                  value:
                    summary: Implementation is ready.
                    url: https://example.atlassian.net/browse/MOB-123
                  comment: All checks passed.
              handoff_accept:
                summary: Accept a handoff submission
                value:
                  action: accept
                  comment: Looks good.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interaction'
              example:
                id: int_01hw1r2s3t4u5v6w7x8y9z0a1b
                run_id: run_01hw1n1a2b3c4d5e6f7g8h9j0k
                signal_name: manager_approval
                kind: approval
                status: completed
                title: Approve publishing the April billing report?
                context:
                  report_id: rpt_2026_04
                  amount_usd: 12850
                spec:
                  mode: confirm
                  default_confirmed: false
                target_user_ids:
                - user_2f9s3k4m5n6p7q8r9s0t1u2v3w
                responder:
                  user_id: user_2f9s3k4m5n6p7q8r9s0t1u2v3w
                resolving_response_id: iresp_01hw1r3s3t4u5v6w7x8y9z0c1d
                responses:
                - id: iresp_01hw1r3s3t4u5v6w7x8y9z0c1d
                  interaction_id: int_01hw1r2s3t4u5v6w7x8y9z0a1b
                  response_kind: response
                  state: submitted
                  responder_user_id: user_2f9s3k4m5n6p7q8r9s0t1u2v3w
