      - runs
      summary: Get a workflow run
      description: Returns a run with its snapshotted workflow spec, result, and step history.
        Spawned worker jobs are returned separately by `GET /v1/projects/{project}/runs/{id}/jobs`.
        Terminal runs may include `result_b64`, `error_type`, and `error_message`; in-flight
        runs include current progress state.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
