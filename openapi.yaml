  /v1/projects/{project_handle}/runs/{resource_id}/events:
    get:
      operationId: listRunEvents
      tags:
      - runs
      summary: List or stream run events
      description: |-
        Returns the durable event log for one run, ordered by sequence number. Use `after_sequence` to poll only events recorded after the last sequence the client has observed.

        Content-negotiated: with `Accept: text/event-stream` this opens a long-lived Server-Sent Events stream instead of returning a JSON page: durable events are replayed from `after_sequence` and then tailed live, and the stream closes after the run is terminal and the server has drained all durable events committed before or with that terminal state. Reconnect with `?after_sequence=N` (or the `Last-Event-ID` header) to resume.
      parameters:
      - $ref: '#/components/parameters/ProjectHandleParam'
      - $ref: '#/components/parameters/IDParam'
      - name: after_sequence
        in: query
        description: Return events with sequence > after_sequence.
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      - $ref: '#/components/parameters/LastEventIDParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 'A JSON page of run events, or, when the request sets `Accept: text/event-stream`,
            a Server-Sent Events stream where each durable message is framed as `id: <sequence>`,
            `event: <run-event type>`, and a `data:` line carrying the JSON-encoded `LoopRunEvent`.
            Agent transcript content and token previews are streamed on the referenced session
            stream, not on the run stream.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoopRunEventListResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/LoopRunStreamFrame'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
