            agent.
          items:
            type: string
    AgentManifestWarning:
      type: object
      additionalProperties: false
      description: Non-fatal warning produced while resolving an agent tool manifest.
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Machine-readable warning code.
        message:
          type: string
          description: Human-readable warning text.
        skill_id:
          type: string
          description: Skill the warning relates to, when applicable.
        toolkit_id:
          type: string
          description: Toolkit the warning relates to, when applicable.
        tool:
          type: string
          description: Tool selector the warning relates to, when applicable.
        action:
          type: string
          description: Action name the warning relates to, when applicable.
    ResolvedActionGroup:
      type: object
      additionalProperties: false
      description: Action group expanded during manifest resolution.
      required:
      - name
      - members
      properties:
        name:
          type: string
          description: Canonical group name (e.g. `mobius.table.read`).
        members:
          type: array
          description: Action names the group expanded to during this resolution.
          items:
            type: string
    AgentToolManifest:
      type: object
      additionalProperties: false
      required:
      - agent_id
      - policy_hash
      - toolkit_ids
      - tools
      - skills
      - warnings
      description: 'The flat, resolved tool set visible to one agent. Replaces the prior Capability/Action
        split: every entry in `tools` is an action catalog entry the agent can invoke as its
        own named tool.'
      properties:
        agent_id:
          type: string
          description: Agent this manifest was resolved for.
        policy_hash:
          type: string
          description: Stable hash over the resolved tool + skill set; bumps when assigned
            toolkits or skills change.
        toolkit_ids:
          type: array
          description: Toolkit IDs that contributed to the resolved manifest.
          items:
            type: string
        tools:
          type: array
          description: Catalog entries the agent can invoke. Each entry surfaces to the LLM
            as its own named tool. Built-in, integration, loop, and custom-HTTP actions are
            intermingled here.
          items:
            $ref: '#/components/schemas/ActionCatalogEntry'
        groups_resolved:
          type: array
          description: Audit trail of group selectors that contributed to the resolved tool
            set. Operators see groups; the LLM only sees the flat `tools` list.
          items:
            $ref: '#/components/schemas/ResolvedActionGroup'
        skills:
          type: array
          description: Skills active for this agent in the resolved manifest.
          items:
            $ref: '#/components/schemas/SkillManifestEntry'
        warnings:
          type: array
          description: Non-fatal issues encountered while resolving the manifest.
          items:
            $ref: '#/components/schemas/AgentManifestWarning'
    CreateAgentRequest:
      type: object
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Unique name for this agent. Free-form human-readable label, 1-63 characters.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Optional human-readable description.
          maxLength: 500
        kind:
          type: string
          description: Freeform classification (e.g. "llm", "rpa", "integration").
        color:
          type: string
          description: Display color for this agent (Mantine palette key, e.g. `indigo`).
            Optional; empty falls back to a hash-derived color.
          maxLength: 24
        model:
          type: string
          description: Model identifier for platform agents. Any id from `GET /v1/projects/{project_handle}/catalog/models`,
            including slash-bearing OpenRouter catalog ids, or an optionally `provider/`-prefixed
            id (e.g. `xai/grok-4`); bare known ids (e.g. `claude-sonnet-4-6`) are auto-detected.
            Empty falls back to the platform default.
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Default route for model calls made by this agent.
        tool_presentation:
          $ref: '#/components/schemas/AgentToolPresentation'
          description: Omit to use the create-time default, `flat`.
        system_prompt:
          type: string
          description: Custom system prompt for platform agents. Empty uses the generated
            default.
        timeout_seconds:
          type: integer
          format: int64
          minimum: 0
          description: Per-turn execution timeout in seconds for this platform agent. Omit
            or `0` to use the platform default (600s / 10 minutes); a loop step's own timeout
            overrides it for that step.
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Default session-compaction policy new sessions inherit from this agent.
        thinking_effort:
          $ref: '#/components/schemas/ThinkingEffort'
          description: Default reasoning-effort level new sessions and loop agent steps inherit
            from this agent.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial labels used for filtering, ownership, or automation.
      example:
        name: PR reviewer
        description: Reviews pull requests for risky changes.
        kind: llm
        color: teal
        model: claude-sonnet-4-6
        tool_presentation: meta
        tags:
          owner: product
    UpdateAgentRequest:
      type: object
      additionalProperties: false
      description: 'Mutable agent fields. The agent''s backing identity (`principal_id`, the
        machine principal created atomically with the agent) is intentionally absent: it is
        immutable. Reassigning identity is delete-and-recreate.'
      properties:
        name:
          type: string
          description: Free-form human-readable label, 1-63 characters; must be unique within
            the project.
          minLength: 1
          maxLength: 63
        description:
          type: string
          description: Replacement description.
          maxLength: 500
        kind:
          type: string
          description: Replacement freeform agent classification (e.g. `llm`, `rpa`).
        color:
          type: string
          description: Replacement display color (Mantine palette key, e.g. `indigo`). Pass
            empty string to clear and fall back to a hash-derived color.
          maxLength: 24
        model:
          type: string
          description: Replacement model identifier for platform agents (any id from `GET
            /v1/projects/{project_handle}/catalog/models`, including slash-bearing OpenRouter
            catalog ids, or an optionally `provider/`-prefixed id).
        model_route:
          $ref: '#/components/schemas/AgentModelRoute'
          description: Replacement default route for model calls made by this agent.
        tool_presentation:
          $ref: '#/components/schemas/AgentToolPresentation'
          description: Replacement tool presentation used by loop agent steps and channel
            replies.
        system_prompt:
          type: string
          description: Replacement system prompt for platform agents.
        timeout_seconds:
          type: integer
          format: int64
          minimum: 0
          description: Replacement per-turn execution timeout in seconds for this platform
            agent. `0` resets to the platform default (600s / 10 minutes); a loop step's own
            timeout overrides it for that step.
        status:
          type: string
          enum:
          - active
          - inactive
          description: 'Replacement agent status: `active` or `inactive`. Use DELETE to delete
            the agent.'
        compaction_policy:
          $ref: '#/components/schemas/SessionCompactionPolicy'
          description: Replacement default session-compaction policy. Send an empty object
            to clear the default and fall back to server defaults.
        thinking_effort:
          $ref: '#/components/schemas/ThinkingEffort'
          description: Replacement default reasoning-effort level. Send `inherit` to clear
            the default and leave the provider default in place.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Replacement labels; send an empty object to clear all tags.
    MemoryKind:
      type: string
      enum:
      - fact
      - preference
      - episode
      - summary
      description: 'Classifies a memory entry. Kinds carry different retention and compaction
        semantics: facts and preferences are durable, episodes are the primary input to compaction,
        and a summary is the compacted product of other entries.'
    AgentMemory:
      type: object
      additionalProperties: false
      description: 'Summary of an agent''s private memory: how many entries it holds, a breakdown
        by kind, and when it last changed.'
      required:
      - agent_id
      - entry_count
      - counts_by_kind
      properties:
        agent_id:
          type: string
          description: The agent that owns this memory.
        entry_count:
          type: integer
          description: Number of entries currently held.
        counts_by_kind:
          type: object
          additionalProperties:
            type: integer
          description: Entry counts keyed by memory kind.
        updated_at:
          type: string
          format: date-time
          description: When any entry was last changed, when there are entries.
    AgentMemoryEntry:
      type: object
      additionalProperties: false
      description: A single durable memory in an agent's private memory, identified by a stable
        key the agent chose.
      required:
      - key
      - kind
      - entry_id
      - importance
      - pinned
      - version
      - created_at
      - updated_at
      properties:
        key:
          type: string
          description: Stable identifier the agent chose for this memory.
        kind:
          $ref: '#/components/schemas/MemoryKind'
        summary:
          type: string
          description: Short one-line summary shown in the agent's memory index.
        content:
          type: string
          description: The remembered content.
        metadata:
          type: object
          additionalProperties: true
          description: Structured metadata stored alongside the memory (provenance, tags,
            …).
        importance:
          type: integer
          description: Rank from 0 to 100; higher ranks sooner in recall and is kept longer
            under the memory cap.
        pinned:
          type: boolean
          description: Whether the entry is guaranteed in the memory index and exempt from
            the memory cap.
        source_run_id:
          type: string
          description: Identifier of the loop run that last wrote this memory, when known.
        entry_id:
          type: string
          description: Identifier of this memory entry.
        version:
          type: integer
          description: Monotonic version, incremented on each update.
        created_at:
          type: string
          format: date-time
          description: When the entry was first remembered.
        updated_at:
          type: string
          format: date-time
          description: When the entry was last updated.
    AgentMemoryEntryListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: Memory entries in the current page.
          items:
            $ref: '#/components/schemas/AgentMemoryEntry'
        has_more:
          type: boolean
          description: Whether more entries follow this page.
        next_cursor:
          type: string
          description: Cursor to fetch the next page, when has_more is true.
    SaveAgentMemoryEntryRequest:
      type: object
      additionalProperties: false
      description: Content for a memory entry. The key comes from the path.
      required:
      - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 16384
          description: The content to remember.
        summary:
          type: string
          maxLength: 140
          description: Optional short one-line summary (≤140 chars) shown in the memory index.
        kind:
          $ref: '#/components/schemas/MemoryKind'
        metadata:
          type: object
          additionalProperties: true
          description: Optional structured metadata to store alongside the memory.
        importance:
          type: integer
          minimum: 0
          maximum: 100
          description: Optional importance from 0 to 100; higher is kept longer during compaction.
        pinned:
          type: boolean
          description: Pin to exempt this memory from compaction.
    ContextIncludeParam:
      type: string
      enum:
      - context
    SessionMessageRole:
      type: string
      enum:
      - system
      - user
      - assistant
      - tool
      - compaction
      description: 'Message role: `system`, `user`, `assistant`, `tool`, or `compaction`.'
    SessionTextBlock:
      type: object
      additionalProperties: true
      required:
      - type
      - text
      description: Assistant or caller text.
      properties:
        type:
          type: string
          enum:
          - text
        text:
          type: string
          description: The text content.
    SessionThinkingBlock:
      type: object
      additionalProperties: true
      required:
      - type
      - thinking
      description: An extended-reasoning block produced by a reasoning model.
      properties:
        type:
          type: string
          enum:
          - thinking
        thinking:
          type: string
          description: The reasoning text.
        signature:
          type: string
          description: Provider signature for the reasoning block, when present.
    SessionResolvedAction:
      type: object
      additionalProperties: false
      required:
      - name
      - input
      description: Canonical project action resolved by a catalog tool dispatch.
      properties:
        name:
          type: string
          description: Canonical project action name, before provider-safe wire-name mangling.
        input:
          type: object
          additionalProperties: true
          description: Resolved action arguments. Meta-router command wrappers are removed.
    SessionToolUseBlock:
      type: object
      additionalProperties: true
      required:
      - type
      - id
      - name
      - input
      description: A tool call the agent issued.
      properties:
        type:
          type: string
          enum:
          - tool_use
        id:
          type: string
          description: Tool-call id; the matching tool_result references it.
        name:
          type: string
          description: Tool name.
        input:
          type: object
          additionalProperties: true
          description: Tool input arguments.
        status:
          type: string
          description: Known values are pending, running, ok, error, and cancelled; unknown
            values must be preserved.
        progress:
          type: object
          additionalProperties: true
          description: Latest in-flight progress snapshot. Absent on final transcript rows.
        resolved_action:
          $ref: '#/components/schemas/SessionResolvedAction'
    SessionContentBlock:
      oneOf:
      - $ref: '#/components/schemas/SessionTextBlock'
      - $ref: '#/components/schemas/SessionThinkingBlock'
      - $ref: '#/components/schemas/SessionToolUseBlock'
      - $ref: '#/components/schemas/SessionToolResultBlock'
      - $ref: '#/components/schemas/SessionImageBlock'
      - $ref: '#/components/schemas/SessionReminderBlock'
      description: One content block in a session transcript message — the canonical, frozen
        JSON shape Mobius persists and replays, discriminated by `type`. The variants are
        `text`, `thinking`, `tool_use`, `tool_result`, and `image`, plus host-managed `reminder`
        blocks when caller runtime context is explicitly included. Each variant permits provider-specific
        extra fields (citations, signatures, cache hints, and the like), and unknown fields
        are preserved rather than rejected, so the transcript round-trips losslessly across
        providers.
    SessionToolResultBlock:
      type: object
      additionalProperties: true
      required:
      - type
      - tool_use_id
      description: The result of a tool call.
      properties:
        type:
          type: string
          enum:
          - tool_result
        tool_use_id:
          type: string
          description: The tool_use id this result answers.
        content:
          description: Result payload — a string, or an array of typed sub-blocks using the
            same canonical block shape as a transcript message.
          oneOf:
          - type: string
          - type: array
            items:
              $ref: '#/components/schemas/SessionContentBlock'
        is_error:
          type: boolean
          description: True when the tool reported a failure.
    SessionImageBlock:
      type: object
      additionalProperties: true
      required:
      - type
      description: An image block, e.g. multimodal caller input.
      properties:
        type:
          type: string
          enum:
          - image
        source:
          type: object
          additionalProperties: true
          description: Provider-specific image source descriptor.
    SessionReminderBlock:
      type: object
      additionalProperties: true
      required:
      - type
      - name
      - tier
      - content
      description: Host-managed runtime context returned only when the request explicitly
        includes caller-supplied context.
      properties:
        type:
          type: string
          enum:
          - reminder
        name:
          type: string
          description: Model-visible reminder name, including the `app-` namespace.
        tier:
          type: string
          enum:
          - contextual
          - operator
          description: Reminder authority tier.
        content:
          type: string
          description: Reminder content rendered to the model.
    SessionMessageEntryType:
      type: string
      enum:
      - message
      - compaction
      description: 'Transcript entry type: `message` or `compaction`.'
    SessionMessage:
      type: object
      additionalProperties: false
      description: One persisted message or compaction entry in a session transcript.
      required:
      - id
      - session_id
      - agent_id
      - role
      - content
      - entry_type
      - sequence
      - created_at
      properties:
        id:
          type: string
          description: Stable message identifier.
        session_id:
          type: string
          description: Session this message belongs to.
        agent_id:
          type: string
          description: Agent that owns the parent session.
        role:
          $ref: '#/components/schemas/SessionMessageRole'
          description: Role of this message in the transcript.
        content:
          type: array
          description: Ordered canonical content blocks (text, thinking, tool_use, tool_result,
            image).
          items:
            $ref: '#/components/schemas/SessionContentBlock'
        entry_type:
          $ref: '#/components/schemas/SessionMessageEntryType'
          description: Whether this row is a normal message or a compaction summary.
        covers_through_sequence:
          type: integer
          description: For `compaction` messages, the highest sequence number this summary
            covers.
        sequence:
          type: integer
          description: Monotonic per-session sequence number assigned at append time.
        turn_id:
          type: string
          description: AgentTurn that produced this message. Run, step, and channel identity
            for the message are read from this turn. Absent for compaction summaries and messages
            not tied to a turn.
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata for this message.
        created_at:
          type: string
          format: date-time
          description: Server timestamp when the message was appended.
    SessionMessageListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          description: Messages in this page, ordered by `sequence` ascending.
          items:
            $ref: '#/components/schemas/SessionMessage'
        has_more:
          type: boolean
          description: True when more messages exist past this page in the query's scan direction.
        next_sequence:
          type: integer
          format: int64
          description: Sequence of the last (highest) item — pass back as `after_sequence`
            to page forward (newer).
        prev_sequence:
          type: integer
          format: int64
          description: Sequence of the first (lowest) item — pass back as `before_sequence`
            with `order=desc` to page backward (older). After paginating history, open the
            stream with `after_sequence=next_sequence` to receive the in-flight turn and everything
            after it — the stream and the messages API share one `sequence` cursor, so there
            is no overlap and no gap.
    ToolkitAction:
      type: object
      additionalProperties: false
      required:
      - selector_type
      - selector
      description: Action selector included in a toolkit.
      properties:
        selector_type:
          type: string
          enum:
          - exact
          - group
          - platform
          - custom
          - wildcard
          description: 'Selector type: `exact`, `group`, `platform`, `custom`, or `wildcard`.'
        selector:
          type: string
          description: 'Selector value. Examples: `github.list_issues`, `github.*`, `platform.github.*`,
            `custom.*`, or `*`.'
      example:
        selector_type: exact
        selector: github.create_review_comment
    Toolkit:
      type: object
      additionalProperties: false
      description: Reusable bundle of action selectors assignable to agents.
      required:
      - id
      - name
      - source
      - actions
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Toolkit ID.
        name:
          type: string
          description: Human-readable toolkit name.
        description:
          type: string
          description: Markdown description of the toolkit's purpose.
        source:
          type: string
          enum:
          - system
          - project
          description: Provenance of this toolkit. `system` toolkits are built-in; `project`
            toolkits are user-authored.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Labels to apply to the toolkit.
        actions:
          type: array
          description: Action selectors provided by this toolkit. Each entry is matched against
            the unified action catalog at manifest-resolution time.
          items:
            $ref: '#/components/schemas/ToolkitAction'
        created_by:
          type: string
          description: ID of the principal who created this toolkit.
        updated_by:
          type: string
          description: ID of the principal who last updated this toolkit.
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
      example:
        id: kit_4r8q2m7x9p5v3n6t
        name: GitHub review
        description: GitHub actions needed for pull-request review.
        source: project
        tags:
          owner: product
        actions:
        - selector_type: exact
          selector: github.create_review_comment
        created_by: user_2f9s3k4m5n6p7q8r
        updated_by: user_2f9s3k4m5n6p7q8r
        created_at: '2026-06-15T14:30:00Z'
        updated_at: '2026-06-15T14:30:00Z'
    Skill:
      type: object
      additionalProperties: false
      description: Reusable instruction bundle assignable to agents.
      required:
      - id
      - name
      - source
      - instructions
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Skill ID.
        name:
          type: string
          description: Human-readable skill name.
        description:
          type: string
          description: Markdown description of the skill's purpose.
        source:
          type: string
          enum:
          - system
          - project
          description: Provenance of this skill. `system` is built-in; `project` is project-local.
        instructions:
          type: string
          description: Markdown instructions loaded when the skill is active.
        allowed_tools:
          type: array
          description: Canonical action names, wildcard selectors, or group references that
            narrow the agent's effective tool set while this skill is active. Uses the same
