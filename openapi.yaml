        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |-
        Bearer credential supplied via the `Authorization: Bearer <credential>` header. Two credential types are accepted:

        - **API keys** — prefix `mbx_`. Issued from the dashboard or via the
        API key endpoints. API keys with a project binding are scoped to
        that project; unbound keys are org-scoped ("system"). The raw token
        is sent as-is.
        - **CLI credentials** — prefix `mbc_`. Issued by the device-auth
        flow on behalf of a user. Unpinned CLI credentials are org-scoped
        and sent as the raw token. Project-pinned CLI credentials MUST be
        sent with a trailing `.<project_handle>` suffix — e.g.
        `mbc_abcdef….myproject`. The suffix is required: the handle is how
        the server resolves the bound project.
    XApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key supplied through the `x-api-key` header. This is primarily used
        by Anthropic-compatible clients targeting `/v1/messages`; project-pinned keys are
        required for that endpoint.
  parameters:
    ProjectHandleParam:
      name: project
      in: path
      required: true
      schema:
        type: string
      description: Project handle (unique per organization)
    IDParam:
      name: id
      in: path
      required: true
      description: Resource ID.
      schema:
        type: string
    ActionNameParam:
      name: action_name
      in: path
      required: true
      description: Project-scoped action name used in workflow step definitions.
      schema:
        type: string
    member_id:
      name: member_id
      in: path
      required: true
      description: User or agent ID of the channel member.
      schema:
        type: string
    user_id:
      name: user_id
      in: path
      required: true
      description: User ID.
      schema:
        type: string
    message_id:
      name: message_id
      in: path
      required: true
      description: ID of the channel message.
      schema:
        type: string
    session_id:
      name: session_id
      in: path
      required: true
      description: ID of the agent session.
      schema:
        type: string
    run_id:
      name: run_id
      in: path
      required: true
      description: ID of the tool run to poll.
      schema:
        type: string
    CursorParam:
      name: cursor
      in: query
      description: Cursor for pagination (opaque string from previous response)
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    TagFilterParam:
      name: tag
      in: query
      description: |-
        Filter results by tag. Repeatable; multiple values combine with AND. Format: `Key:Value`, `Key:*` for any value, `Key:a,b,c` for IN.

        Tag values containing `:` or `,` cannot be filtered with this grammar — the parser splits on those literally. Constrain values to plain identifiers when you intend to filter on them.

        Not supported on the runs list — runs are too high-cardinality for ad-hoc tag filtering. To narrow runs by parent workflow, use the workflow-scoped endpoint `GET /v1/projects/{project}/workflows/{id}/runs` and inspect `tags` on each run client-side.
      explode: true
      schema:
        type: array
        items:
          type: string
    APIKeyProjectIDParam:
      name: project_id
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/ProjectID'
      description: Optional project scope for this request. When `project_id` is provided,
        the API key operation is resolved in that project's permission context. When `project_id`
        is omitted, the request is treated as org-level and project-pinned keys are excluded.
    EnvironmentIDParam:
      name: environment_id
      in: path
      required: true
      schema:
        type: string
    SecretParam:
      name: secret
      in: path
      required: true
      schema:
        type: string
      description: Secret ID or project-scoped secret name.
    SecretVersionParam:
      name: version
      in: path
      required: true
      schema:
        type: string
      description: Secret version number or `latest`.
    ReferenceTypeParam:
      name: reference_type
      in: path
      required: true
      description: Reference type name, such as `slack.channel` or `table.table`.
      schema:
        type: string
    TriggerTargetIDParam:
      name: target_id
      in: path
      required: true
      description: Trigger target ID.
      schema:
        type: string
    IssueKeyParam:
      name: issue_key
      in: path
      required: true
      description: Jira issue key, e.g. `ENG-123`.
      schema:
        type: string
    GroupParam:
      name: group
      in: path
      required: true
      description: Group ID or handle.
      schema:
        type: string
    widget_id:
      name: widget_id
      in: path
      required: true
      description: Widget ID within the dashboard.
      schema:
        type: string
    TableNameParam:
      name: table_name
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-z][a-z0-9_]*$
        maxLength: 64
      description: Table name (unique within the project; lowercase alphanumeric and underscores)
    ArtifactIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^art_[A-Za-z0-9]+$
      description: TypeID of the artifact (`art_...`)
    RunIdParam:
      name: run_id
      in: path
      required: true
      schema:
        type: string
      description: Workflow run ID
    ObservableIdParam:
      name: observable_id
      in: path
      required: true
      description: Observable ID or project-scoped Observable name.
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded. Retry after the delay indicated in the `Retry-After`
        header.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Limit of the tightest active rate-limit bucket.
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Requests remaining in the tightest bucket's current window.
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp (seconds) when the tightest bucket resets.
        X-RateLimit-Scope:
          schema:
            type: string
            enum:
            - key
            - org
          description: Scope of the tightest bucket.
        X-RateLimit-Policy:
          schema:
            type: string
          description: All active windows for the selected scope, in `limit;w=seconds` form.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NoContent:
      description: No Content
    ProviderError:
      description: LLM provider error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      description: Standard error envelope returned by API endpoints.
      required:
      - error
      properties:
        error:
          type: object
          additionalProperties: false
          description: Error detail.
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              additionalProperties: true
              description: Optional structured details specific to a `code`. Endpoints that
                set this document the per-code shape inline. Absent for codes whose `code`
                + `message` are sufficient.
    ProjectID:
      type: string
      description: Project ID.
    Metadata:
      type: object
      description: Free-form JSON object for caller-defined metadata.
      additionalProperties: true
    TagMap:
      type: object
      description: Key/value tag map. Keys 1–128 chars, values 0–256 chars. Keys with the
        `mobius:` prefix are system-managed and cannot be set by callers. Maximum 8 tags per
        resource. Use tags to organize resources by environment, team, cost-center, or any
        other dimension meaningful to your organization; tags can be filtered on most list
        endpoints.
      additionalProperties:
        type: string
        maxLength: 256
      maxProperties: 8
      example:
        Environment: Production
        Department: Finance
        Owner: team@example.com
    InteractionMode:
      type: string
      enum:
      - confirm
      - select
      - multi_select
      - input
      description: Declarative UI/input primitive for collecting the response. This is a portable
        rendering contract, not executable code. Values are `confirm`, `select`, `multi_select`,
        and `input`.
    InteractionOption:
      type: object
      required:
      - value
      - label
      additionalProperties: false
      description: Selectable option for `select` and `multi_select` modes.
      properties:
        value:
          type: string
          description: Machine-readable value submitted when this option is chosen.
        label:
          type: string
          description: Human-readable label displayed for this option.
        description:
          type: string
          description: Optional additional context shown beneath the label.
    InteractionSpec:
      type: object
      required:
      - mode
      additionalProperties: false
      description: |-
        Declarative dialog contract for rendering and validating an interaction. Used at both authoring time (inside a workflow definition) and runtime (persisted on an interaction). PRD 077 decouples protocol kind from input shape: each kind declares which spec modes are *allowed*, not which is *implied*. An approval may now legitimately use `select` mode (approve/deny/defer), for example.

        Allowed combinations:
        * `approval` → `confirm`, `select`
        * `review` → `select`, `input`
        * `request` → `select`, `multi_select`, `input`
        * `vote` → `select`, `multi_select` (requires `vote_rules`)
        * `handoff` → `input`
      properties:
        mode:
          $ref: '#/components/schemas/InteractionMode'
          description: UI/input mode used to render and validate the response.
        options:
          type: array
          maxItems: 100
          description: Required for `select` and `multi_select` modes.
          items:
            $ref: '#/components/schemas/InteractionOption'
        default_value:
          type: string
          description: Default selected option for `select` mode.
        default_values:
          type: array
          maxItems: 100
          description: Default selected options for `multi_select` mode.
          items:
            type: string
        default_text:
          type: string
          description: Initial text value for `input` mode.
        default_confirmed:
          type: boolean
          description: Initial yes/no value for `confirm` mode.
        placeholder:
          type: string
          description: Hint text shown for `input` mode.
        multiline:
          type: boolean
          description: When true, render `input` mode as a multiline text area.
        vote_rules:
          $ref: '#/components/schemas/VoteRules'
          description: Ballot-protocol parameters. Required for `vote`-kind interactions and
            rejected on other kinds.
    VoteRules:
      type: object
      additionalProperties: false
      required:
      - options
      description: Parameters of a vote-kind interaction (PRD 077). Carries the electorate,
        ballot changeability, anonymity, quorum, close time, and tie-break behaviour.
      properties:
        options:
          type: array
          minItems: 2
          maxItems: 50
          items:
            $ref: '#/components/schemas/VoteOption'
          description: Choices voters can select. Values must be unique.
        eligibility:
          $ref: '#/components/schemas/VoteEligibility'
          description: Explicit voter set or `group_snapshot` to use the interaction's target
            group snapshot. Omit for non-group interactions that accept any caller.
        anonymous:
          type: boolean
          description: When true, the list-ballots endpoint omits voter IDs for non-owner
            callers. Anonymity is a UX property — the audit log retains real IDs.
        changeable:
          type: boolean
          description: When true, voters may re-cast before close.
        quorum_count:
          type: integer
          minimum: 0
          description: Minimum number of active ballots before the vote can resolve.
        quorum_fraction:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Minimum fraction of eligible voters that must vote before the vote
            can resolve.
        close_at:
          type: string
          format: date-time
          description: Time after which new ballots are rejected.
        tie_break:
          type: string
          enum:
          - none
          - first_cast
          - owner
          description: How to resolve a tied top vote count on close.
        reveal_live_tally:
          type: boolean
          description: Opt-in display of running counts before close.
    VoteOption:
      type: object
      additionalProperties: false
      required:
      - value
      - label
      description: A choice on a vote ballot.
      properties:
        value:
          type: string
          description: Machine-readable choice value.
        label:
          type: string
          description: Display label.
        description:
          type: string
          description: Optional extra context.
    VoteEligibility:
      type: object
      additionalProperties: false
      required:
      - kind
      description: Who is eligible to vote on this interaction. `explicit` lists voters directly;
        `group_snapshot` uses the interaction's target group snapshot.
      properties:
        kind:
          type: string
          enum:
          - explicit
          - group_snapshot
        voters:
          type: array
          items:
            $ref: '#/components/schemas/InteractionTarget'
          description: Required when `kind=explicit`.
    InteractionTarget:
      type: object
      required:
      - type
      - id
      additionalProperties: false
      description: 'Identifies who should receive an interaction request. Note: distinct from
        the caller/audit `Actor` vocabulary — a target is a *recipient*, not someone who has
        acted yet.'
      properties:
        type:
          type: string
          enum:
          - user
          - agent
          - group
          description: 'Target kind: a specific user, an agent queue, or a group.'
        id:
          type: string
          description: User ID for user; queue name for agent; group ID or handle for group.
    ChannelCompletionBehavior:
      type: string
      enum:
      - none
      - mark_inactive
      - archive
      description: Behavior to apply when every purpose-linked interaction is terminal.
    ChannelMessageSenderType:
      type: string
      enum:
      - member
      - agent
      - service_account
      description: |-
        Authenticated principal that posted the message, derived from the
        credential at send time and never overrideable in the request body
        (PRD 048 §5):
        - `member` — a human org member's user credential.
        - `agent` — an API key whose service account backs an agent (1:1
        invariant from PRD 048 §1). `sender_id` is the agent's ID.
        - `service_account` — an API key whose service account backs no
        agent. `sender_id` is the service account's ID.
    EntityReferenceType:
      type: string
      enum:
      - workflow_run
      - run_step
      - job
      - interaction
      - workflow_definition
      - channel_message
      - agent
      - user
      - group
      description: Mobius entity kind that can be attached to a channel message.
    EntityReference:
      type: object
      additionalProperties: false
      description: Experimental typed link from a channel message to another Mobius entity.
        Clients use references to render cards and chips without parsing Markdown.
      required:
      - entity_type
      - entity_id
      properties:
        entity_type:
          $ref: '#/components/schemas/EntityReferenceType'
          description: Referenced Mobius entity kind.
        entity_id:
          type: string
          description: Stable ID of the referenced entity.
        relation:
          type: string
          description: Relationship to the message, such as primary, source, context, or mention.
        label:
          type: string
          description: Snapshot label to display when the entity cannot be hydrated.
        project_id:
          type: string
          description: Project that owns the entity when known.
    Channel:
      type: object
      additionalProperties: false
      description: Project-scoped messaging room or direct-message thread.
      required:
      - id
      - name
      - display_name
      - kind
      - private
      - created_by
      - purpose
      - completion_behavior
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this channel.
        name:
          type: string
          description: URL-safe channel handle, unique within the project. Immutable after
            creation.
        display_name:
          type: string
          description: Human-facing display name shown in the UI.
        topic:
          type: string
          description: Optional topic or description shown at the top of the channel.
        kind:
          type: string
          enum:
          - dm
          - channel
          description: '`channel` — persistent named room. `dm` — direct-message thread, typically
            between a small fixed set of participants.'
        private:
          type: boolean
          description: When true, the channel is invite-only and not visible in public listings.
        created_by:
          type: string
          description: User ID of the org member who created the channel.
        purpose:
          type: string
          enum:
          - general
          - resolve_interactions
          description: '`general` channels are ordinary rooms. `resolve_interactions` channels
            exist to resolve one or more purpose-linked interactions.'
        completion_behavior:
          $ref: '#/components/schemas/ChannelCompletionBehavior'
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Set when this purpose-scoped channel has completed.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the channel is archived. Archived channels are hidden in the
            UI but their message history remains accessible.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this channel.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this channel was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this channel was last updated.
    ChannelListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of project channels.
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Channel'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    ChannelMember:
      type: object
      additionalProperties: false
      description: Live membership record for a user or agent in a channel.
      required:
      - id
      - channel_id
      - user_id
      - role
      - joined_at
      properties:
        id:
          type: string
          description: Unique identifier for this membership record.
        channel_id:
          type: string
          description: ID of the channel this membership belongs to.
        user_id:
          type: string
          description: ID of the user or agent who is a member.
        role:
          type: string
          enum:
          - member
          - admin
          description: '`admin` — can update channel settings and manage members. `member`
            — can post messages and view history. Creators are automatically assigned `admin`.'
        last_read_message_id:
          type: string
          nullable: true
          description: ID of the last message this member has read; null until the member
            reads a message.
        muted:
          type: boolean
          description: When true, notifications for this channel are suppressed for this member.
        starred:
          type: boolean
          description: Whether this member has starred the channel for quick access.
        joined_at:
          type: string
          format: date-time
          description: Timestamp when this member joined the channel.
    ChannelMemberListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of members in a channel.
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ChannelMember'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    ChannelMessage:
      type: object
      additionalProperties: false
      description: Message posted in a channel, including sender attribution and rendering
        metadata.
      required:
      - id
      - channel_id
      - sender_type
      - sender_id
      - type
      - content
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this message.
        channel_id:
          type: string
          description: ID of the channel this message was posted in.
        sender_type:
          $ref: '#/components/schemas/ChannelMessageSenderType'
          description: Whether the sender is a human member, an agent worker, or a bare service
            account credential.
        sender_id:
          type: string
          description: Sender principal identifier — the user ID for `sender_type=member`,
            the agent's ID for `sender_type=agent`, or the service account's ID for `sender_type=service_account`.
        sender_session_id:
          type: string
          nullable: true
          description: Live agent session that posted the message, when applicable.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          description: Rendering hint for the UI. `message` — standard chat bubble. `notice`
            — system/informational notice (no attribution). `card` — structured card layout.
        type:
          type: string
          description: Dot-namespaced message type identifier, e.g. `user.message`, `ai.response`.
            Used for filtering and display logic.
        content:
          type: string
          description: Message body in Markdown.
        reply_to:
          type: string
          nullable: true
          description: ID of the parent message this reply belongs to, or null when this is
            not a threaded reply.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Free-form metadata attached to the message.
        references:
          type: array
          description: Experimental typed entity links rendered by richer channel clients.
          items:
            $ref: '#/components/schemas/EntityReference'
        pinned:
          type: boolean
          description: Whether this message is pinned in the channel.
        pinned_by:
          type: string
          nullable: true
          description: User ID of the member who pinned this message, or null when the message
            is not pinned.
        edited_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the message content has been updated after initial send.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this message was posted.
    ChannelMessageListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of channel messages.
      required:
      - items
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ChannelMessage'
        has_more:
          type: boolean
          description: Whether additional pages are available.
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
    ShareChannelEntityRequest:
      type: object
      additionalProperties: false
      description: Entity reference and optional message fields for posting a channel card.
      required:
      - reference
      properties:
        reference:
          $ref: '#/components/schemas/EntityReference'
          description: Canonical entity to attach to the channel message.
        content:
          type: string
          description: Optional Markdown fallback body. If omitted, the server derives a short
            label from the reference.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          default: card
          description: Rendering hint for the created channel message.
        type:
          type: string
          description: Optional dot-namespaced message type. If omitted, the server derives
            one from the entity type.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Optional free-form message metadata.
    ChannelInteractionRespondRequest:
      type: object
      additionalProperties: false
      description: Response payload submitted to an interaction from a channel card.
      required:
      - value
      properties:
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: Response value supplied by the responder.
        comment:
          type: string
          description: Optional human-readable comment to show in channel activity.
    ChannelInteractionActionResponse:
      type: object
      additionalProperties: false
      description: Result of a channel-scoped interaction operation.
      required:
      - interaction
      - message
      properties:
        interaction:
          $ref: '#/components/schemas/Interaction'
          description: Updated canonical interaction.
        message:
          $ref: '#/components/schemas/ChannelMessage'
          description: Channel activity message created for this operation.
    CreateChannelRequest:
      type: object
      additionalProperties: false
      description: Fields used to create a project channel or direct-message thread.
      required:
      - name
      - display_name
      - kind
      properties:
        name:
          type: string
          description: URL-safe handle, unique within the project. Immutable after creation
            — choose carefully.
        display_name:
          type: string
          description: Human-facing display name shown in the UI.
        topic:
          type: string
          description: Optional channel topic or description.
        kind:
          type: string
          enum:
          - dm
          - channel
          description: Channel kind, either `dm` or `channel`. Cannot be changed after creation.
        private:
          type: boolean
          default: false
          description: When true, the channel is invite-only.
        member_ids:
          type: array
          items:
            type: string
          description: Optional list of user or agent IDs to add as members at creation time.
            All receive the `member` role; the creator is added as `admin` separately.
        purpose:
          type: string
          enum:
          - general
          - resolve_interactions
          default: general
          description: Optional purpose for the channel.
        associated_interaction_ids:
          type: array
          items:
            type: string
          description: Existing same-project interaction IDs to link as the channel's purpose
            at creation time. Required when `purpose` is `resolve_interactions`.
        completion_behavior:
          allOf:
          - $ref: '#/components/schemas/ChannelCompletionBehavior'
          default: none
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateChannelRequest:
      type: object
      additionalProperties: false
      description: Mutable channel fields.
      properties:
        display_name:
          type: string
          description: Updated display name.
        topic:
          type: string
          description: Updated topic or description.
        private:
          type: boolean
          description: Toggle invite-only visibility.
        purpose:
          type: string
          enum:
          - general
          - resolve_interactions
          description: Channel purpose. `resolve_interactions` requires at least one purpose-linked
            interaction.
        completion_behavior:
          $ref: '#/components/schemas/ChannelCompletionBehavior'
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the user tag set on the channel. System tags
            (`mobius:*`) are preserved.
    AddChannelMemberRequest:
      type: object
      additionalProperties: false
      description: Member identity and role to add to a channel.
      required:
      - participant_id
      properties:
        participant_id:
          type: string
          description: User or agent ID to add to the channel.
        role:
          type: string
          enum:
          - member
          - admin
          default: member
          description: Role to assign the new member, either `member` or `admin`.
    AssociateChannelInteractionRequest:
      type: object
      additionalProperties: false
      required:
      - interaction_id
      properties:
        interaction_id:
          type: string
          description: Existing same-project interaction ID to associate.
        relation:
          type: string
          enum:
          - purpose
          - context
          - followup
          default: purpose
          description: Relation between the channel and interaction.
    ChannelInteractionLink:
      type: object
      additionalProperties: false
      required:
      - id
      - channel_id
      - interaction_id
      - relation
      - created_by_type
      - created_by_id
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this association.
        channel_id:
          type: string
          description: Channel ID.
        interaction_id:
          type: string
          description: Interaction ID.
        relation:
          type: string
          enum:
          - purpose
          - context
          - followup
          description: How the interaction is associated with the channel.
        created_by_type:
          type: string
          description: Actor type that created the association.
        created_by_id:
          type: string
          description: Actor ID that created the association.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the association was created.
    ChannelInteractionLinkListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChannelInteractionLink'
    SendChannelMessageRequest:
      type: object
      additionalProperties: false
      description: Fields used to post a new channel message. Sender attribution is determined
        entirely by the authenticated credential and cannot be overridden via this request
        body.
      required:
      - content
      properties:
        content:
          type: string
          description: Message body in Markdown.
        display:
          type: string
          enum:
          - message
          - notice
          - card
          default: message
          description: 'Rendering hint for the UI: `message`, `notice`, or `card`.'
        type:
          type: string
          default: user.message
          description: Dot-namespaced message type identifier.
        reply_to:
          type: string
          description: Parent message ID for threading (creates a reply).
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Free-form metadata to attach to the message.
        references:
          type: array
          description: Experimental typed entity links for card/chip rendering.
          items:
            $ref: '#/components/schemas/EntityReference'
    UpdateChannelMessageRequest:
      type: object
      additionalProperties: false
      description: Mutable fields for an existing channel message.
      properties:
        content:
          type: string
          description: Updated Markdown content. Sets `edited_at` on the message.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Replacement free-form metadata for the message.
        references:
          type: array
          description: Replacement typed entity links for card/chip rendering.
          items:
            $ref: '#/components/schemas/EntityReference'
        pinned:
          type: boolean
          description: Pin or unpin the message. Sets/clears `pinned_by`.
    MarkChannelMessagesReadRequest:
      type: object
      additionalProperties: false
      description: Body for `POST /v1/projects/{project}/channels/{id}/read`. When omitted,
        the read cursor advances to the channel's latest message.
      properties:
        up_to_message_id:
          type: string
          description: Message ID to advance the read cursor to. Must belong to this channel.
            Omit to advance to the channel's latest message.
    InteractionKind:
      type: string
      enum:
      - approval
      - review
      - input
      - request
      - vote
      - handoff
      description: |-
        Protocol kind of the interaction (PRD 077). Each value names a
        distinct multi-party coordination protocol:
        * `approval` — a decision protocol (yes/no, optionally yes/no/defer)
        * `review` — a judgment protocol that evaluates supplied material
        * `request` — a data-collection protocol with structured or
        free-form input
        * `vote` — a collective-choice protocol with ballot semantics
        (changeable until close, eligibility, quorum, anonymity,
        tie-break). Vote ballots use the dedicated `/vote` endpoint.
        * `handoff` — a work-completion protocol where ownership moves to
        another actor who submits completed output
        * `input` — *deprecated* alias of `request`; existing rows keep
        this value but new interactions should be created with
        `request`. The server normalises `input` to `request` on
        create.
    InteractionOrigin:
      type: string
      enum:
      - manual
      - workflow_step
      - job_scoped
      - system
      description: Server-derived origin of the interaction.
    InteractionSource:
      type: object
      additionalProperties: false
      required:
      - type
      - id
      description: Server-derived actor or system context that requested the interaction.
        Public create requests do not supply this field.
      properties:
        type:
          type: string
          enum:
          - user
          - agent
          - workflow
          - system
          - integration
        id:
          type: string
        display_name:
          type: string
    InteractionReference:
      type: object
      additionalProperties: false
      required:
      - kind
      description: Pointer to the work item, artifact, external ticket, or Mobius entity this
        interaction is about.
      properties:
        kind:
          type: string
          enum:
          - external_url
          - mobius_entity
        url:
          type: string
          format: uri
          description: Required when kind is `external_url`.
        entity_type:
          type: string
          description: Required when kind is `mobius_entity`.
        entity_id:
          type: string
          description: Required when kind is `mobius_entity`.
        project_id:
          type: string
          description: Optional project scope for Mobius entity references.
        relation:
          type: string
          description: Relationship such as `subject`, `evidence`, or `related`.
        label:
          type: string
          description: User-facing label for display.
    InteractionResponder:
      type: object
      required:
      - type
      - id
      additionalProperties: false
      description: Identifies who answered an interaction. Groups cannot themselves respond
        — only a user within a group — so `group` is not a valid responder type.
      properties:
        type:
          type: string
          enum:
          - user
          - agent
          description: 'Responder kind: a user or an agent.'
        id:
          type: string
          description: User ID for user; agent ID for agent.
    InteractionValue:
      description: Free-form JSON payload. Used both for responder-supplied values and for
        policy-derived values (e.g. `Interaction.outcome`, `ResolutionPolicy.proposal`); each
        consumer documents which.
      anyOf:
      - type: object
        additionalProperties: true
      - type: array
        items: {}
      - type: string
      - type: number
      - type: boolean
    InteractionResponse:
      type: object
      additionalProperties: false
      description: One participant's response to an interaction. Each respond call writes
        a new row with a unique `(interaction_id, responder_type, responder_id)` constraint
        — `responder_type` is part of the key so a user and an agent that share an ID string
        can both respond. The resolution-policy evaluator sees the full set when deciding
        whether to resolve; the response that triggered resolution is referenced from `Interaction.resolving_response_id`.
      required:
      - id
      - interaction_id
      - responder_type
      - responder_id
      - value
      - responded_at
      properties:
        id:
          type: string
          description: Unique identifier for this response.
        interaction_id:
          type: string
          description: ID of the interaction this response belongs to.
        responder_type:
          type: string
          enum:
          - user
          - agent
          description: Actor class behind this response. Asymmetric policies route on this;
            majority/threshold ignore it.
        responder_id:
          type: string
          description: User ID for user; agent ID for agent.
        value:
          $ref: '#/components/schemas/InteractionValue'
          description: JSON value supplied by this participant.
        comment:
          type: string
          nullable: true
          description: Optional free-text comment from this responder.
        responded_at:
          type: string
          format: date-time
          description: Timestamp when this response was submitted.
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          nullable: true
          description: Optional 0..1 confidence score attached to this response.
    InteractionSubmission:
      type: object
      additionalProperties: false
      required:
      - id
      - interaction_id
      - attempt
      - status
      - submitter
      - value
      - submitted_at
      description: One handoff submission attempt.
      properties:
        id:
          type: string
        interaction_id:
          type: string
        attempt:
          type: integer
          minimum: 1
        status:
          type: string
          enum:
          - pending_review
          - accepted
          - sent_back
        submitter:
          $ref: '#/components/schemas/InteractionResponder'
        value:
          $ref: '#/components/schemas/InteractionValue'
        comment:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
        reviewed_by:
          $ref: '#/components/schemas/InteractionResponder'
          nullable: true
        review_comment:
          type: string
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
    InteractionEvent:
      type: object
      additionalProperties: false
      required:
      - id
      - interaction_id
      - type
      - created_at
      description: Lifecycle timeline entry for an interaction.
      properties:
        id:
          type: string
        interaction_id:
          type: string
        type:
          type: string
          enum:
          - created
          - submitted
          - accepted
          - sent_back
          - responded
          - cancelled
          - claimed
          - released
          - expired
        actor:
          $ref: '#/components/schemas/InteractionResponder'
          nullable: true
        submission_id:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        data:
          type: object
          additionalProperties: true
          nullable: true
        created_at:
          type: string
          format: date-time
    ResolutionPolicy:
      type: object
      additionalProperties: false
      required:
      - type
      description: Declarative resolution rule attached to an Interaction. Determines how
        participant responses become a final outcome.
      properties:
        type:
          type: string
          enum:
          - first_valid_response
          - all_required
          - simple_majority
          - threshold
          - weighted_vote
          - speculative
          - asymmetric
          description: Resolution rule. `first_valid_response` resolves on the first response
            (Tier 1 default). `all_required` waits for every eligible participant. `simple_majority`
            and `threshold` are voting policies. `weighted_vote` weighs responses by `confidence`.
            `speculative` resolves to `proposal` when the veto window closes without a veto.
            `asymmetric` runs different sub-rules per actor class (e.g. agents propose, humans
            decide via majority).
        quorum:
          type: integer
          minimum: 0
          description: Minimum responses required before a majority/threshold can resolve.
        threshold:
          type: integer
          minimum: 1
          description: Vote count any option must reach to win under `threshold`.
        tie_break:
          type: string
          enum:
          - first
          - owner_decides
          nullable: true
          description: Behavior on a tied top vote count for `simple_majority`. Null or absent
            keeps the interaction open; `first` picks the earliest-arriving value; `owner_decides`
            waits for `owner_id` to break the tie.
        owner_id:
          type: string
          description: User/agent ID treated as authoritative when `tie_break` is `owner_decides`.
        weight_by:
          type: string
          enum:
          - confidence
          - equal
          description: Where `weighted_vote` reads weights from.
        min_confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Drop responses with confidence below this bar before weighting.
        proposal:
          $ref: '#/components/schemas/InteractionValue'
          description: 'Speculative policy: default outcome accepted automatically when the
            veto window closes without a veto. Configured on the policy, not supplied by responders.'
        veto_window_seconds:
          type: integer
          minimum: 0
          description: Window (in seconds, relative to creation time) during which a veto
            can be submitted. When the window passes the speculative interaction resolves
            to `proposal`. When zero `expires_at` is used.
        on_no_veto:
          type: string
          enum:
          - accept_proposal
          description: Currently only `accept_proposal` is supported.
        humans:
          $ref: '#/components/schemas/AsymmetricActorRule'
          description: 'Asymmetric policy: rule applied to user responders.'
        agents:
          $ref: '#/components/schemas/AsymmetricActorRule'
          description: 'Asymmetric policy: rule applied to agent responders.'
    AsymmetricActorRule:
      type: object
      additionalProperties: false
      required:
      - rule
      description: Per-actor-class rule under an asymmetric resolution policy. `propose` records
        responses for audit but ignores them for resolution. `decide` applies the optional
        `sub_policy` to that class's responses to drive resolution. `ignore` is reserved for
        future use.
      properties:
        rule:
          type: string
          enum:
          - propose
          - decide
          - ignore
          description: Role this actor class plays.
        sub_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          description: Sub-rule applied to this class's responses when `rule` is `decide`.
            When omitted, decide-class defaults to `first_valid_response` over the class's
            responses.
    ReviewPolicy:
      type: object
      additionalProperties: false
      required:
      - type
      description: Reviewability policy for an interaction artifact (PRD 077 §3.5). Carried
        as a template on `Interaction.submission_review_policy` (so new submissions inherit
        a snapshot) and as the per-submission snapshot on `InteractionSubmission.review_policy`.
      properties:
        type:
          type: string
          enum:
          - none
          - requester_acceptance_required
          description: '`none` completes a handoff when submitted. `requester_acceptance_required`
            moves submitted handoffs to `in_review` until an authorized reviewer accepts or
            sends back.'
        reviewers:
          type: array
          items:
            $ref: '#/components/schemas/InteractionTarget'
          description: Optional explicit reviewers. When omitted for `requester_acceptance_required`,
            the requester/source actor is the reviewer. Workflow, system, or integration-created
            handoffs should provide explicit user, agent, or group reviewers.
    RunConsumer:
      type: object
      additionalProperties: false
      required:
      - run_id
      - signal_name
      properties:
        run_id:
          type: string
        signal_name:
          type: string
    AgentToolConsumer:
      type: object
      additionalProperties: false
      required:
      - invocation_id
      - tool_call_id
      properties:
        invocation_id:
          type: string
        tool_call_id:
          type: string
    HttpSubscriberConsumer:
      type: object
      additionalProperties: false
      required:
      - callback_url
      properties:
        callback_url:
          type: string
          format: uri
          description: Absolute http(s) URL the server POSTs to when the interaction resolves.
            The body is a JSON object with the interaction id, kind, status, outcome value,
            comment, responder, and `resolved_by`. Delivery is best-effort in v1 (no durable
            outbox or retries).
        secret_ref:
          type: string
          description: 'Reference to a project secret used to sign deliveries with HMAC-SHA256
            over the raw callback request body (the exact bytes of the HTTP request body).
            Accepts `<name>` for the latest enabled version or `<name>:<version>` to pin a
            specific positive-integer version. The plaintext signing bytes are taken from
            the secret''s `signing_key`, `secret`, or `hmac_secret` key — or the only key
            if exactly one is set. The hex signature is forwarded as `X-Mobius-Signature:
            sha256=<hex>` alongside `X-Mobius-Secret-Ref`, `X-Mobius-Secret-Version`, and
            a unix `X-Mobius-Timestamp`. When `secret_ref` resolution fails the dispatch is
            skipped rather than sent unsigned.'
    Consumer:
      type: object
      additionalProperties: false
      required:
      - kind
      description: Polymorphic identifier of what is waiting on this interaction's resolution
        (PRD 077 §3.7). Replaces the previously special-cased `run_id` + `signal_name` pair.
        When `kind=run`, the legacy fields are also populated for compatibility. `http_subscriber`
        triggers a best-effort POST to `callback_url` when the interaction resolves; when
        `secret_ref` is set, the raw request body is signed with HMAC-SHA256 against the resolved
        project secret and the signed dispatch carries `X-Mobius-Signature`, `X-Mobius-Secret-Ref`,
        `X-Mobius-Secret-Version`, and `X-Mobius-Timestamp`. Verifiers should check all four
        headers.
      properties:
        kind:
          type: string
          enum:
          - run
          - agent_tool
          - http_subscriber
          - none
        run:
          $ref: '#/components/schemas/RunConsumer'
          nullable: true
        agent_tool:
          $ref: '#/components/schemas/AgentToolConsumer'
          nullable: true
        http_subscriber:
          $ref: '#/components/schemas/HttpSubscriberConsumer'
          nullable: true
    ChannelThreadDelivery:
      type: object
      additionalProperties: false
      required:
      - channel_id
      properties:
        channel_id:
          type: string
        parent_message_id:
          type: string
    EmailDelivery:
      type: object
      additionalProperties: false
      required:
      - to
      properties:
        to:
          type: array
          minItems: 1
          items:
            type: string
            format: email
    PageDelivery:
      type: object
      additionalProperties: false
      required:
      - policy_id
      properties:
        policy_id:
          type: string
    AgentQueueDelivery:
      type: object
      additionalProperties: false
      required:
      - queue
      properties:
        queue:
          type: string
    DeliveryChannel:
      type: object
      additionalProperties: false
      required:
      - kind
      description: A single delivery destination. `inbox_only` carries no payload; each other
        kind owns its variant. `page` is schema-only in v1 — the server rejects it at create
        until paging is implemented.
      properties:
        kind:
          type: string
          enum:
          - inbox_only
          - email
          - channel_thread
          - agent_queue
          - page
        channel_thread:
          $ref: '#/components/schemas/ChannelThreadDelivery'
          nullable: true
        email:
          $ref: '#/components/schemas/EmailDelivery'
          nullable: true
        page:
          $ref: '#/components/schemas/PageDelivery'
          nullable: true
        agent_queue:
          $ref: '#/components/schemas/AgentQueueDelivery'
          nullable: true
    Delivery:
      type: object
      additionalProperties: false
      required:
      - channels
      description: Optional per-interaction delivery override (PRD 077 §3.8). When absent,
        each participant is notified per their own `NotificationPreferences`. When set, channels
        are added to the participant's preferences (additive default) or replace them (exclusive
        — `override_participant_preferences=true`).
      properties:
        channels:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DeliveryChannel'
        override_participant_preferences:
          type: boolean
          description: 'When false (default), additive: deliver via the listed channels in
            addition to participant preferences. When true, exclusive: deliver *only* via
            the listed channels.'
    Interaction:
      type: object
      additionalProperties: false
      description: Human or agent interaction request and its current response state.
      required:
      - id
      - kind
      - status
      - origin
      - target
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this interaction.
        run_id:
          type: string
          nullable: true
          description: Originating workflow run when the interaction is run-backed.
        signal_name:
          type: string
          nullable: true
          description: Signal name used to resume the originating run when run-backed.
        kind:
          $ref: '#/components/schemas/InteractionKind'
          description: Protocol kind of the interaction (PRD 077). Replaces the v1 wire field
            `type`; the rename landed in the v-bump that also renamed `Interaction.review_policy`
            to `submission_review_policy`.
        status:
          type: string
          enum:
          - pending
          - in_review
          - completed
          - expired
          - cancelled
          description: 'Current status of the interaction: pending, in_review, completed,
            expired, or cancelled.'
        origin:
          $ref: '#/components/schemas/InteractionOrigin'
        source:
          $ref: '#/components/schemas/InteractionSource'
          nullable: true
        message:
          type: string
          nullable: true
          description: Human-readable message shown to the responder when supplied.
        subject:
          $ref: '#/components/schemas/InteractionReference'
          nullable: true
          description: Primary work item or artifact the interaction is about.
        references:
          type: array
          items:
            $ref: '#/components/schemas/InteractionReference'
          description: Supporting links and related entities.
        context:
          type: object
          additionalProperties: true
          nullable: true
          description: Additional key-value context surfaced in the UI alongside the message
            when supplied.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: Recipient of the interaction.
        responder:
          type: object
          additionalProperties: false
          nullable: true
          description: User or agent that completed the interaction; null until completion.
          $ref: '#/components/schemas/InteractionResponder'
        resolving_response_id:
          type: string
          nullable: true
          description: ID of the response that triggered resolution. Null while the interaction
            is pending, when the speculative `proposal` is auto-accepted with no response,
            on cancel, and on expiry. Look up the response in `responses` for the full payload.
        current_submission_id:
          type: string
          nullable: true
          description: Current handoff submission awaiting review.
        accepted_submission_id:
          type: string
          nullable: true
          description: Handoff submission accepted as the final outcome.
        responses:
          type: array
          items:
            $ref: '#/components/schemas/InteractionResponse'
          description: All participant responses recorded against this interaction in arrival
            order. Empty until the first response is submitted. The full set is what the resolution-policy
            evaluator runs against.
        submissions:
          type: array
          items:
            $ref: '#/components/schemas/InteractionSubmission'
          description: Handoff submission attempts, in arrival order.
        events:
          type: array
          items:
            $ref: '#/components/schemas/InteractionEvent'
          description: Interaction lifecycle timeline, in arrival order.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this interaction expires if not responded to.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the interaction received a terminal response.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this interaction was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this interaction was last updated.
        target_group_id:
          type: string
          nullable: true
          description: Resolved group ID (set when target.type = group)
        target_member_snapshot:
          type: array
          items:
            type: string
          nullable: true
          description: User IDs of group members at the time of creation; null for non-group
            targets.
        routing_policy_snapshot:
          type: string
          enum:
          - first_responder
          - all_members
          nullable: true
          description: 'Group routing policy captured at creation time: first_responder or
            all_members. Null for non-group targets.'
        require_all:
          type: boolean
          description: When true, all snapshotted members must respond before completion
        claimed_by:
          type: string
          nullable: true
          description: User ID of the member who claimed this interaction; null until claimed
            and only used for first_responder routing.
        claimed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when a first-responder member claimed this interaction.
        resolution_policy:
          $ref: '#/components/schemas/ResolutionPolicy'
          nullable: true
          description: Declarative resolution rule attached at creation time. Legacy inputs
            (`require_all` / `first_responder`) are synthesized into an equivalent policy
            at create time, so on a freshly-created Interaction this should always be present;
            nullability covers historical rows that pre-date the synthesis.
        submission_review_policy:
          $ref: '#/components/schemas/ReviewPolicy'
          nullable: true
          description: Template review policy applied to new submissions of this interaction
            (PRD 077 §3.5). Each submission carries its own `review_policy` snapshot taken
            at submit time; this field is the create-time intent that the snapshot is copied
            from.
        consumer:
          $ref: '#/components/schemas/Consumer'
          nullable: true
          description: Polymorphic identifier of what is waiting on this interaction's resolution
            (PRD 077 §3.7). Replaces the special-cased `run_id`/`signal_name` pair; the latter
            remain populated when `consumer.kind=run`.
        delivery:
          $ref: '#/components/schemas/Delivery'
          nullable: true
          description: Optional per-interaction delivery override (PRD 077 §3.8). When absent,
            the dispatcher uses each participant's NotificationPreferences.
        outcome:
          $ref: '#/components/schemas/InteractionValue'
          nullable: true
          description: 'Final outcome selected by the resolution policy (not responder-supplied).
            Shape depends on the policy: `simple_majority` returns the winning option; `all_required`
            returns the array of every response; `speculative` returns either the proposal
            or the vetoer''s value. Null while the interaction is still pending.'
        resolved_by:
          type: string
          nullable: true
          description: Short audit string identifying which policy rule fired (e.g. `simple_majority`,
            `speculative_no_veto`, `simple_majority_owner_decides`). Null until the interaction
            reaches a resolved state.
        cancel_reason:
          type: string
          nullable: true
          description: Reason recorded when the interaction was cancelled.
    AuditLogEntry:
      type: object
      additionalProperties: false
      description: Immutable record of a security- or configuration-relevant change. Use audit
        log entries to answer who changed a resource, when it happened, and which project
        or credential was involved.
      required:
      - id
      - action
      - resource_type
      - resource_id
      - created_at
      properties:
        id:
          type: string
          description: Unique audit log entry ID
        user_id:
          type: string
          description: ID of the user who performed the action, when a human user is attributable
        project_id:
          type: string
          description: Project ID when the audited resource is project-scoped
        actor_type:
          type: string
          description: Durable actor type that performed the action
        actor_id:
          type: string
          description: Durable actor ID that performed the action
        actor_name:
          type: string
          description: Display name of the actor (email for users, service account name for
            service accounts)
        credential_id:
          type: string
          description: Credential ID used for the request, when applicable
        credential_name:
          type: string
          description: Human-readable credential name or session label captured when the audit
            entry was written
        action:
          type: string
          enum:
          - create
          - update
          - delete
          - archive
          - restore
          description: 'Type of action performed: `create`, `update`, `delete`, `archive`,
            or `restore`.'
        resource_type:
          type: string
          description: Type of resource affected (e.g., job, channel, document)
        resource_id:
          type: string
          description: ID of the affected resource
        resource_name:
          type: string
          description: Human-readable name of the affected resource
        changes:
          type: object
          additionalProperties: true
          description: Object containing before/after changes for update actions
        ip_address:
          type: string
          description: IP address of the request
        user_agent:
          type: string
          description: User agent of the request
        created_at:
          type: string
          format: date-time
          description: Timestamp when the action was performed
    AuditLogListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        next_cursor:
          type: string
          description: Cursor for fetching next page of results
        has_more:
          type: boolean
          description: Whether more results are available
    WorkflowSpec:
      type: object
      required:
      - name
      oneOf:
      - required:
        - steps
      - required:
        - code
      description: |-
        Workflow definition shaped like `workflow.Options`.

        A workflow is **either** a spec-step DAG or a code workflow:

        * Spec-step workflows declare `steps: [...]` (with optional
        `start_at`). Each step is a worker-action, server-action,
        wait, join, or other declarative construct.
        * Code workflows declare `code: { handler, runtime?, queue? }`
        and no `steps`. The handler's runtime control flow replaces
        the step graph; durable sub-steps are executed via the SDK's
        `step.run` / `step.waitFor*` helpers and recorded against the
        run ledger.

        Exactly one of `steps` or `code` must be set; setting both, or neither, is rejected by the schema's `oneOf` constraint.

        Authoring rule for spec-step workflows: `action` is the canonical field for executable steps. When `action_kind` is omitted, `action` uses worker/job semantics. Use `action_kind: "server"` for Mobius-managed server actions such as platform integrations or custom HTTP-backed actions.
      additionalProperties: false
      properties:
        name:
          type: string
          description: Workflow name.
        description:
          type: string
          description: Optional description of the workflow's purpose.
        start_at:
          type: string
          description: 'Spec-step workflows: step name to start execution from. Defaults to
            the first step. Ignored for code workflows.'
        inputs:
          type: array
          description: Declared input parameters accepted by this workflow.
          items:
            $ref: '#/components/schemas/WorkflowInput'
        outputs:
          type: object
          description: Declared terminal contract. Compact values are expressions; long-form
            values may include value/schema/description.
          additionalProperties:
            $ref: '#/components/schemas/WorkflowOutput'
        steps:
          type: array
          description: Ordered list of steps that make up a spec-step workflow. Mutually exclusive
            with `code`.
          items:
            $ref: '#/components/schemas/WorkflowStep'
        code:
          $ref: '#/components/schemas/WorkflowCodeSpec'
          description: Configuration for a code workflow. Mutually exclusive with `steps`.
            The worker invokes the registered handler whose runtime control flow drives the
            run.
    WorkflowInput:
      type: object
      description: Declares one named input accepted by a workflow spec.
      required:
      - name
      - type
      additionalProperties: false
      properties:
        name:
          type: string
          description: Input parameter name referenced in step expressions.
        type:
          type: string
          description: Data type of the input (e.g. string, integer, boolean, object).
        description:
          type: string
          description: Human-readable description of this input parameter.
        default:
          description: Optional default value.
    WorkflowOutput:
      description: Declares one output value produced by a workflow spec.
      oneOf:
      - type: string
        description: Compact expression form, e.g. `${steps.summarize.result.text}`.
      - type: object
        required:
        - value
        additionalProperties: false
        properties:
          value:
            description: Expression or literal output value.
          schema:
            type: object
            additionalProperties: true
            description: Optional JSON Schema for this output.
          description:
            type: string
            description: Human-readable description of this output value.
    WorkflowStep:
      description: 'A workflow step. Exactly one step shape should be used. Step variants
        are identified by their distinctive required property (`action`, `type: set`, `join`,
        `wait_signal`, `wait_event`, `wait_until`, `sleep`, `pause`, or `interaction`). The
        current authored shape intentionally does not add a separate discriminator field,
        so existing workflow YAML stays compact. Code workflows do not use `WorkflowStep`;
        see `WorkflowSpec.code`.'
      oneOf:
      - $ref: '#/components/schemas/WorkflowExecutableStep'
      - $ref: '#/components/schemas/WorkflowSetStep'
      - $ref: '#/components/schemas/WorkflowJoinStep'
      - $ref: '#/components/schemas/WorkflowWaitSignalStep'
      - $ref: '#/components/schemas/WorkflowWaitEventStep'
      - $ref: '#/components/schemas/WorkflowWaitUntilStep'
      - $ref: '#/components/schemas/WorkflowSleepStep'
      - $ref: '#/components/schemas/WorkflowPauseStep'
      - $ref: '#/components/schemas/WorkflowInteractionStep'
    WorkflowStepLayout:
      type: object
      additionalProperties: false
      description: Optional presentation hint for the visual editor. Ignored by the execution
        engine; when absent, editors auto-lay out the step.
      properties:
        x:
          type: number
          description: Horizontal position of the step in the editor canvas.
        y:
          type: number
          description: Vertical position of the step in the editor canvas.
    WorkflowExecutableStep:
      type: object
      description: Executes a worker or server action and exposes its result at `steps.<name>.result`.
      additionalProperties: false
      required:
      - name
      - action
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated when more than one edge
            matches.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration that runs this step once per item.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        action:
          type: string
          description: 'Canonical executable-step field. When `action_kind` is omitted, the
            engine treats this as a worker action. Use `action_kind: server` for Mobius-managed
            server actions.'
        action_kind:
          $ref: '#/components/schemas/WorkflowActionKind'
          description: Whether `action` is handled by a worker or by a Mobius-managed server
            action.
        bind:
          type: object
          additionalProperties:
            type: string
          description: Optional writes to top-level `vars.*` keys, evaluated after the step
            completes. Targets must look like `vars.foo`.
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters passed to the action, supporting expression interpolation.
        retry:
          type: array
          description: Retry policies applied when the action fails.
          items:
            $ref: '#/components/schemas/WorkflowRetry'
        catch:
          type: array
          description: Error catch clauses that redirect execution on specific failures.
          items:
            $ref: '#/components/schemas/WorkflowCatch'
      example:
        name: summarize
        action: summarize-document
        parameters:
          doc_id: ${inputs.doc_id}
    WorkflowSetStep:
      type: object
      description: Binds one or more top-level vars and produces the bound object as this
        step's result.
      additionalProperties: false
      required:
      - name
      - type
      - vars
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        type:
          type: string
          enum:
          - set
        description:
          type: string
        next:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
        each:
          $ref: '#/components/schemas/WorkflowEach'
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
        vars:
          type: object
          minProperties: 1
          additionalProperties: true
          description: 'Bindings keyed by top-level vars key. `repo: ${steps.fetch.result}`
            writes `vars.repo`.'
    WorkflowJoinStep:
      type: object
      description: Waits for one or more parallel branches before continuing.
      additionalProperties: false
      required:
      - name
      - join
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the join completes.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated join evaluation.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        join:
          $ref: '#/components/schemas/WorkflowJoinConfig'
          description: Branches, count, and branch result mappings used by the join.
    WorkflowWaitSignalStep:
      type: object
      description: Suspends a branch until an external signal with the matching topic arrives.
      additionalProperties: false
      required:
      - name
      - wait_signal
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the signal arrives.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated signal waits.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        wait_signal:
          $ref: '#/components/schemas/WorkflowWaitSignalConfig'
          description: Signal topic, timeout, and storage behavior for this suspension.
    WorkflowWaitEventStep:
      type: object
      description: Suspends a branch until an integration event of the configured type is
        delivered to the project and (optionally) satisfies an `expr` predicate over its payload.
        Same operational model as `wait_signal` but matches against the event bus directly,
        without requiring a separate `signal_run` trigger.
      additionalProperties: false
      required:
      - name
      - wait_event
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the event arrives.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated event waits.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        wait_event:
          $ref: '#/components/schemas/WorkflowWaitEventConfig'
          description: Event type, condition, timeout, and storage behavior for this suspension.
    WorkflowWaitUntilStep:
      type: object
      description: Polls project or external state until a strict boolean condition evaluates
        true, parking the run durably between checks.
      additionalProperties: false
      required:
      - name
      - wait_until
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after the condition
            passes.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the condition passes.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated condition waits.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        wait_until:
          $ref: '#/components/schemas/WorkflowWaitUntilConfig'
          description: Poll/observable source, condition, timeout, and timeout routing.
    WorkflowSleepStep:
      type: object
      description: Suspends a branch for a fixed duration before continuing.
      additionalProperties: false
      required:
      - name
      - sleep
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the sleep completes.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated sleeps.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        sleep:
          $ref: '#/components/schemas/WorkflowSleepConfig'
          description: Duration to wait before the branch resumes.
    WorkflowPauseStep:
      type: object
      description: Suspends a branch until it is manually resumed.
      additionalProperties: false
      required:
      - name
      - pause
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the pause is resumed.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated pauses.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        pause:
          $ref: '#/components/schemas/WorkflowPauseConfig'
          description: Optional pause reason surfaced to operators.
    WorkflowInteractionStep:
      type: object
      description: Creates a human or agent interaction and resumes when the interaction completes.
      additionalProperties: false
      required:
      - name
      - interaction
      properties:
        name:
          type: string
          description: Unique step name within the workflow, used for routing and logging.
        description:
          type: string
          description: Optional human-readable description of what this step does.
        next:
          type: array
          description: Outbound edges controlling which step executes after this one.
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        edge_matching_strategy:
          $ref: '#/components/schemas/WorkflowEdgeMatchingStrategy'
          description: How outbound edge conditions are evaluated after the interaction completes.
        each:
          $ref: '#/components/schemas/WorkflowEach'
          description: Optional fan-out configuration for repeated interactions.
        layout:
          $ref: '#/components/schemas/WorkflowStepLayout'
          description: Optional visual-editor position hint; ignored by the execution engine.
        interaction:
          $ref: '#/components/schemas/WorkflowInteractionConfig'
          description: Interaction prompt, recipient, response schema, and timeout behavior.
    WorkflowCodeSpec:
      type: object
      description: |-
        Configuration for a code workflow. Sibling shape to `WorkflowSpec.steps`: a workflow with `code` set delegates its control flow to a user-authored handler running on a worker (TypeScript today, with other runtimes to follow). The handler invokes step.run(), step.sleep(), step.waitForSignal() etc. via the SDK; each call is durably checkpointed against the run ledger so the handler replays deterministically across yield/resume cycles.

        Code workflows do not use `steps`; the handler's runtime control flow is the graph.
      additionalProperties: false
      required:
      - handler
      properties:
        handler:
          type: string
          minLength: 1
          description: Stable identifier the worker SDK registered the handler under (typically
            equal to the workflow definition name). The server emits jobs whose `spec.code.handler`
            equals this value; the worker dispatches the job to the matching handler.
        runtime:
          type: string
          description: Opaque hint identifying the language/runtime that owns this handler
            ("typescript", "python", etc.). Used by the UI for display only; the engine does
            not interpret it.
        queue:
          type: string
          description: Optional worker queue the code-invoke job is dispatched to. When empty,
            the run-level queue is used.
    WorkflowActionKind:
      type: string
      enum:
      - worker
      - server
      description: 'Execution mode for `action` steps: `worker` creates claimable jobs for
        external workers, while `server` executes Mobius-managed actions such as integrations
        inside the service. Omit for the current default of `worker`.'
    WorkflowEdgeMatchingStrategy:
      type: string
      enum:
      - all
      - first
      description: 'Controls matching when multiple outbound edge conditions are true: `all`
        follows every matching edge in parallel, while `first` follows only the first matching
        edge in declaration order.'
    WorkflowEdge:
      type: object
      description: Directed transition from one workflow step to another.
      required:
      - step
      additionalProperties: false
      properties:
        step:
          type: string
          description: Name of the step to transition to.
        condition:
          type: string
          description: Expression that must evaluate to true for this edge to be followed.
        branch:
          type: string
          description: Branch name assigned to parallel execution started by this edge.
    WorkflowEach:
      type: object
      description: Fan-out configuration that repeats a step over a collection.
      required:
      - items
      additionalProperties: false
      properties:
        items:
          description: Expression or literal collection to iterate over.
        as:
          type: string
          description: Variable name bound to the current iteration element.
    WorkflowRetry:
      type: object
      description: Retry policy for a workflow step after a recoverable failure.
      additionalProperties: false
      properties:
        error_equals:
          type: array
          description: Error class names this policy applies to. Use `all` or `*` for a wildcard.
            Retries all errors when omitted.
          items:
            type: string
        max_retries:
          type: integer
          minimum: 0
          description: Maximum number of retry attempts. Zero disables retries.
        base_delay:
          type: string
          description: Go duration string.
        max_delay:
          type: string
          description: Go duration string.
        backoff_rate:
          type: number
          description: Exponential backoff multiplier applied to the delay after each attempt.
        jitter_strategy:
          type: string
          enum:
          - NONE
          - FULL
          description: 'Jitter strategy to apply to the computed delay: NONE or FULL.'
        timeout:
          type: string
          description: Go duration string.
    WorkflowCatch:
      type: object
      description: Error routing rule that transfers execution to another step.
      required:
      - error_equals
      - next
      additionalProperties: false
      properties:
        error_equals:
          type: array
          description: Error class names this catch clause handles. Use `all` or `*` for a
            wildcard.
          items:
            type: string
        next:
          type: string
          description: Step name to transition to when this clause is matched.
    WorkflowJoinConfig:
      type: object
      additionalProperties: false
      description: Waits for one or more parallel branches to complete before proceeding.
      properties:
        branches:
          type: array
          items:
            type: string
          description: Branch names to wait for. Defaults to all branches if omitted.
        count:
          type: integer
          minimum: 0
          description: Minimum number of branches that must complete. Defaults to all listed
            branches.
        result:
          type: object
          additionalProperties: true
          description: Explicit object this join produces. Expressions may read `branch.<branch>.<step>.result`.
    WorkflowWaitSignalConfig:
      type: object
      required:
      - topic
      - timeout
      additionalProperties: false
      description: Suspends the run until a signal with the matching topic arrives.
      properties:
        topic:
          type: string
          description: Signal topic to wait on. Must match the `name` field in POST /v1/projects/{project}/runs/{id}/signals.
        timeout:
          type: string
          description: Maximum wait duration as a Go duration string (e.g. "24h", "30m").
        on_timeout:
          type: string
          description: Step name to transition to if the timeout elapses without a signal.
            Fails the run if omitted.
    WorkflowWaitEventConfig:
      type: object
      required:
      - event_type
      - timeout
      additionalProperties: false
      description: 'Suspends the run until an integration event matching `event_type` (and
        `condition`, when provided) is delivered to the project. `event_type` is exact-matched
        by default. Set `match_mode: prefix` for descendant matching such as `github.pull_request`
        matching `.opened`, `.closed`, etc.'
      properties:
        event_type:
          type: string
          description: Integration event type to wait for, e.g. `github.pull_request.closed`
            or `stripe.invoice.paid`.
        match_mode:
          type: string
          enum:
          - exact
          - prefix
          description: Event type match mode. `exact` is the default. `prefix` requires a
            non-empty condition and matches descendants separated by `.`.
        condition:
          type: string
          description: Optional bare-form `expr` predicate over `{ event, meta, inputs, steps,
            vars, each, run }`. The event resumes the step only when the expression evaluates
            bool true. Empty means "any event of the matching type resumes". Predicate fields
            use bare `expr`; `${...}` templating is reserved for value-producing fields.
        timeout:
          type: string
          description: Maximum wait duration as a Go duration string (e.g. "24h", "30m").
        on_timeout:
          type: string
          description: Step name to transition to if the timeout elapses without a matching
            event. Fails the run if omitted.
    WorkflowWaitUntilConfig:
      type: object
      required:
      - condition
      - timeout
      additionalProperties: false
      description: Durable condition wait. Exactly one of `poll` or `observable` must be set.
        Poll waits evaluate direct checks; Observable waits read reusable project-scoped Observable
        state and park on change events.
      properties:
        poll:
          $ref: '#/components/schemas/WorkflowWaitUntilPollConfig'
        observable:
          type: string
          description: Identifier-safe Observable name or ID.
        condition:
          type: string
          description: Required bare-form `expr` predicate. Poll waits evaluate against `{
            result, inputs, steps, vars, each, run }`; Observable waits evaluate against `{
            state, observable, inputs, steps, vars, each, run }`. The expression must return
            bool true.
        timeout:
          type: string
          description: Maximum wait duration as a Go duration string (e.g. "10m", "1h").
        on_timeout:
          type: string
          description: Step name to transition to if the timeout elapses. Fails the run if
            omitted.
    WorkflowWaitUntilPollConfig:
      type: object
      required:
      - every
      - action
      additionalProperties: false
      properties:
        every:
          type: string
          description: Base poll interval as a Go duration string.
        action:
          type: string
          description: Mobius action invoked for each poll attempt.
        parameters:
          type: object
          additionalProperties: true
          description: Poll action parameters, evaluated once when the wait is entered.
        backoff:
          $ref: '#/components/schemas/WorkflowWaitUntilBackoffConfig'
    WorkflowWaitUntilBackoffConfig:
      type: object
      required:
      - multiplier
      - max_every
      additionalProperties: false
      properties:
        multiplier:
          type: number
          format: double
          description: Multiplier greater than 1 applied after each false/error attempt.
        max_every:
          type: string
          description: Maximum poll interval as a Go duration string.
        jitter:
          type: boolean
          description: Whether to jitter each computed interval.
    WorkflowSleepConfig:
      type: object
      description: Configuration for a sleep step.
      required:
      - duration
      additionalProperties: false
      properties:
        duration:
          type: string
          description: Go duration string.
    WorkflowPauseConfig:
      type: object
      description: Configuration for a manual pause step.
      additionalProperties: false
      properties:
        reason:
          type: string
          description: Optional human-readable reason displayed when the run is paused.
    WorkflowInteractionConfig:
      type: object
      description: Configuration for an interaction step that waits on a response.
      required:
      - type
      - message
      - target
      - timeout
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
          - approval
          - review
          - input
          description: 'Interaction kind: approval requires a yes/no decision, review requests
            acknowledgement, input collects free-form data.'
        message:
          type: string
          description: Prompt message shown to the interaction recipient.
        context:
          type: object
          additionalProperties: true
          description: Arbitrary key-value context passed alongside the interaction for rendering.
        spec:
          $ref: '#/components/schemas/InteractionSpec'
          description: Response controls and validation rules rendered to the recipient.
        timeout:
          type: string
          description: Go duration string.
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: User, group, or agent that should receive the interaction.
        require_all:
          type: boolean
          description: When true, all group members must respond before the interaction completes.
            Only meaningful when type is `group`.
        discussion:
          $ref: '#/components/schemas/WorkflowInteractionDiscussionConfig'
          description: Optional focused channel to create or reuse around this typed interaction.
    WorkflowInteractionDiscussionConfig:
      type: object
      additionalProperties: false
      required:
      - opening_message
      description: Creates or reuses a project channel for the surrounding discussion while
        the interaction remains the typed outcome that resumes the workflow.
      properties:
        channel_id:
          type: string
          description: Existing channel ID to reuse. If omitted, channel_name is used.
        channel_name:
          type: string
          description: Existing or new project channel name to use for the discussion.
        display_name:
          type: string
          description: Display name for a newly-created channel.
        topic:
          type: string
          description: Topic for a newly-created channel.
        member_ids:
          type: array
          items:
            type: string
          description: Additional user or agent IDs to invite to the channel.
        opening_message:
          type: string
          minLength: 1
          description: Opening brief posted into the channel before the workflow parks.
        completion_behavior:
          type: string
          enum:
          - none
          - mark_inactive
          - archive
          description: Behavior to apply when all purpose-linked interactions are terminal.
        private:
          type: boolean
          description: Whether a newly-created channel is private.
    WorkflowDefinitionSummary:
      type: object
      additionalProperties: true
      description: Workflow definition metadata without the executable `spec`. Returned by
        list endpoints; fetch a single definition via `getWorkflow` to get the full spec.
      required:
      - id
      - name
      - handle
      - latest_version
      - created_by
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this workflow definition.
        name:
          type: string
          description: Human-readable workflow name.
        handle:
          type: string
          description: URL-safe slug, unique within the project. Used to reference this workflow
            in triggers and tools.
        description:
          type: string
          description: Optional description of the workflow's purpose.
        latest_version:
          type: integer
          description: The current highest version number. Starts at 1 and increments with
            each spec update.
        published_as_tool:
          type: boolean
          description: When true, this workflow is exposed as a callable tool via /api/tools.
        created_by:
          type: string
          description: User ID of the org member who created this workflow definition.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this workflow. Inherited by runs at start
            time; see `WorkflowRun.tags`.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this workflow definition was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this workflow definition was last updated.
    WorkflowDefinition:
      description: Full workflow definition including the executable `spec`. Returned by `getWorkflow`,
        `createWorkflow`, and `updateWorkflow`.
      allOf:
      - $ref: '#/components/schemas/WorkflowDefinitionSummary'
      - type: object
        required:
        - spec
        properties:
          spec:
            $ref: '#/components/schemas/WorkflowSpec'
            description: Executable workflow spec for this definition.
    WorkflowDefinitionListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of workflow definition summaries.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/WorkflowDefinitionSummary'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    CreateWorkflowRequest:
      type: object
      additionalProperties: false
      description: Creates a saved workflow definition and its first immutable version.
      required:
      - name
      - spec
      properties:
        name:
          type: string
          description: Human-readable workflow name, unique within the project.
        handle:
          type: string
          description: URL-safe handle for this workflow, unique within the project. Auto-derived
            from name if omitted.
        description:
          type: string
          description: Optional description of the workflow's purpose.
        published_as_tool:
          type: boolean
          description: When true, expose this workflow as a callable tool via /api/tools.
        spec:
          $ref: '#/components/schemas/WorkflowSpec'
          description: Executable workflow spec to persist as version 1.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tag set.
    UpdateWorkflowRequest:
      type: object
      additionalProperties: false
      description: Updates workflow metadata and optionally creates a new immutable version
        when `spec` changes.
      properties:
        name:
          type: string
          description: Replacement human-readable workflow name.
        description:
          type: string
          description: Replacement description. Omit to leave unchanged.
        published_as_tool:
          type: boolean
          description: When true, expose this workflow as a callable tool via /api/tools.
        spec:
          $ref: '#/components/schemas/WorkflowSpec'
          description: Replacement executable workflow spec. Supplying this creates a new
            version.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: When supplied, replaces the workflow's tag set. Omit to leave tags
            unchanged.
    WorkflowVersionSummary:
      type: object
      additionalProperties: true
      description: Workflow version metadata without the executable `spec`. Returned by `listWorkflowVersions`.
      required:
      - id
      - version
      - created_by
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for this workflow version.
        version:
          type: integer
          description: Monotonically increasing version number. Starts at 1.
        created_by:
          type: string
          description: User ID of the org member who created this version.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this version was created.
    WorkflowVersion:
      description: Full workflow version including the executable `spec`.
      allOf:
      - $ref: '#/components/schemas/WorkflowVersionSummary'
      - type: object
        required:
        - spec
        properties:
          spec:
            $ref: '#/components/schemas/WorkflowSpec'
            description: Executable workflow spec captured for this immutable version.
    WorkflowVersionListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated list of immutable versions for one workflow definition. Version
        histories are expected to stay small enough to return in one response; fetch an individual
        version to retrieve its executable spec.
      properties:
        items:
          type: array
          description: The list of workflow versions, newest first.
          items:
            $ref: '#/components/schemas/WorkflowVersionSummary'
    WorkflowRunStatus:
      type: string
      enum:
      - active
      - completed
      - failed
      description: Public run lifecycle. Path-level fields explain why an active run is working,
        waiting, sleeping, retrying, paused, or blocked at a join.
    WorkflowRunPathState:
      type: string
      enum:
      - working
      - waiting
      - completed
      - failed
      description: Current state of one execution path.
    WorkflowRunWaitKind:
      type: string
      enum:
      - sleep
      - signal
      - interaction
      - pause
      - join
      - retry
      - wait_event
      - wait_until
      description: What a waiting path is blocked on.
    WorkflowRunWaitDetail:
      type: object
      additionalProperties: false
      required:
      - kind
      properties:
        kind:
          $ref: '#/components/schemas/WorkflowRunWaitKind'
        wake_at:
          type: string
          format: date-time
          description: Earliest time the runtime should inspect or resume this path.
        signal_name:
          type: string
          description: Signal name this path is waiting for.
        interaction_id:
          type: string
          description: Pending interaction linked to this wait.
        target:
          $ref: '#/components/schemas/InteractionTarget'
          description: Interaction target, when kind is `interaction`.
        reason:
          type: string
          description: Human-readable pause or wait reason.
        join_step:
          type: string
          description: Join step this path is waiting at.
        waiting_for_paths:
          type: array
          items:
            type: string
          description: Path IDs still required before a join can proceed.
        attempt:
          type: integer
          description: Retry attempt number for `retry` waits.
        max_attempts:
          type: integer
          description: Maximum attempts for `retry` waits.
        event_type:
          type: string
          description: Event type pattern this path is waiting for. Set when `kind` is `wait_event`.
        match_mode:
          type: string
          description: Event match mode for `wait_event`; empty means `exact`.
        condition:
          type: string
          description: Optional `expr` predicate the matching event or latest wait result
            must satisfy before resuming the path.
        source_kind:
          type: string
          description: Wait source kind for `wait_until` (`poll` or `observable`).
        observable_id:
          type: string
          description: Observable ID for `wait_until.observable` waits.
        observable:
          type: string
          description: Observable name for `wait_until.observable` waits.
        observed_version:
          type: integer
          format: int64
          description: Observable version observed before the path parked.
        poll_action:
          type: string
          description: Poll action name for `wait_until` waits.
        poll_parameters:
          type: object
          additionalProperties: true
          description: Frozen poll parameters for `wait_until` waits.
        attempt_count:
          type: integer
          description: Number of poll attempts recorded for a `wait_until` wait.
        current_interval:
          type: string
          description: Current poll interval for `wait_until`.
        deadline_at:
          type: string
          format: date-time
          description: Fixed timeout deadline for `wait_until`.
        last_result:
          description: Latest poll result preview for `wait_until`.
        last_error_type:
          type: string
          description: Latest poll error type for `wait_until`.
        last_error_message:
          type: string
          description: Latest poll error message for `wait_until`.
    WorkflowRunPath:
      type: object
      additionalProperties: false
      required:
      - path_id
      - state
      properties:
        path_id:
          type: string
          description: Stable execution path identifier, e.g. `main` or `main/each/0`.
        state:
          $ref: '#/components/schemas/WorkflowRunPathState'
        waiting_on:
          $ref: '#/components/schemas/WorkflowRunWaitDetail'
          description: Present when `state` is `waiting`.
        error_type:
          type: string
          description: Path-local failure type when state is `failed`.
        error_message:
          type: string
          description: Path-local failure message when state is `failed`.
    WorkflowRunPathCounts:
      type: object
      additionalProperties: false
      required:
      - total
      - active
      - working
      - waiting
      - completed
      - failed
      description: 'Current path counts. Invariants: `total = working + waiting + completed
        + failed`; `active = working + waiting`.'
      properties:
        total:
          type: integer
        active:
          type: integer
        working:
          type: integer
        waiting:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
    WorkflowRunWaitSummary:
      type: object
      additionalProperties: false
      required:
      - waiting_paths
      - kind_counts
      - next_wake_at
      - waiting_on_signal_names
      - interaction_ids
      description: Always-present aggregate of waiting paths.
      properties:
        waiting_paths:
          type: integer
        kind_counts:
          type: object
          additionalProperties:
            type: integer
          description: Count of waiting paths by `waiting_on.kind`.
        next_wake_at:
          type: string
          format: date-time
          nullable: true
          description: Earliest wake time among waiting paths, or null.
        waiting_on_signal_names:
          type: array
          items:
            type: string
        interaction_ids:
          type: array
          items:
            type: string
    WorkflowRunJobCounts:
      type: object
      additionalProperties: false
      required:
      - ready
      - scheduled
      - claimed
      description: Live work-pool summary for this run. Reflects the transient state of the
        worker job queue, not durable step progress — terminal jobs are swept on a TTL and
        stop contributing to these counts. Use `step_counts` for run-progress UI; use this
        field to answer "is anything claimable right now and is a worker holding it?". `ready`
        counts pending jobs whose `scheduled_at` has arrived and can be claimed now; `scheduled`
        counts pending jobs intentionally waiting for a future retry/backoff; `claimed` counts
        jobs currently held by workers.
      properties:
        ready:
          type: integer
        scheduled:
          type: integer
        claimed:
          type: integer
    WorkflowRunStepCounts:
      type: object
      additionalProperties: false
      required:
      - pending
      - running
      - completed
      - failed
      - skipped
      - cancelled
      description: Aggregate count of run-step rows for this run grouped by status. Counts
        every attempt of every step (one row per step x attempt x path), so it reflects durable
        progress rather than the live worker pool. Use this for run-progress UI; use `job_counts`
        for live claimability.
      properties:
        pending:
          type: integer
        running:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        cancelled:
          type: integer
    WorkflowRunError:
      type: object
      additionalProperties: false
      required:
      - error_type
      - error_message
      properties:
        path_id:
          type: string
        error_type:
          type: string
        error_message:
          type: string
    WorkflowRun:
      type: object
      description: Runtime record for one workflow execution.
      additionalProperties: true
      required:
      - id
      - workflow_name
      - status
      - path_counts
      - job_counts
      - step_counts
      - wait_summary
      - errors
      - attempt
      - ephemeral
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this run.
        queue:
          type: string
          description: Queue this run was enqueued on.
        parent_run_id:
          type: string
          description: ID of the parent run, when this is a child run spawned by a fan-out
            step.
        definition_id:
          type: string
          description: ID of the workflow definition this run was started from. Present only
            when `ephemeral` is false; omitted for ephemeral runs started from an inline spec.
        definition_version:
          type: integer
          description: Version number of the workflow definition this run was started from.
            Present only when `ephemeral` is false.
        ephemeral:
          type: boolean
          description: True when the run was started from an inline spec rather than a saved
            workflow definition. Derived server-side; always present on the response. When
            true, `definition_id` and `definition_version` are omitted.
        workflow_name:
          type: string
          description: Name of the workflow as recorded at run creation time.
        status:
          $ref: '#/components/schemas/WorkflowRunStatus'
          description: Public lifecycle for this run.
        path_counts:
          $ref: '#/components/schemas/WorkflowRunPathCounts'
          description: Current path counts derived from the run projection.
        job_counts:
          $ref: '#/components/schemas/WorkflowRunJobCounts'
          description: Live work-pool summary derived from the run projection. See `WorkflowRunJobCounts`.
        step_counts:
          $ref: '#/components/schemas/WorkflowRunStepCounts'
          description: Durable run-step counts grouped by status. See `WorkflowRunStepCounts`.
        wait_summary:
          $ref: '#/components/schemas/WorkflowRunWaitSummary'
          description: Always-present aggregate of waiting paths.
        errors:
          type: array
          description: Run-level errors that caused a failed lifecycle.
          items:
            $ref: '#/components/schemas/WorkflowRunError'
        attempt:
          type: integer
          description: Retry attempt number (1-based). Increments each time the run is retried.
        inputs:
          type: object
          additionalProperties: true
          description: Input values provided when the run was started.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Resource tags applied to this run. Inherited from the parent workflow
            at start time, with caller-supplied overrides merged on top. System tags (`mobius:*`)
            are read-only.
        error_message:
          type: string
          description: Error message from the most recent failure. Present when status is
            failed.
        actor_type:
          type: string
          description: Type of the actor that started this run (user, service_account, system).
        actor_id:
          type: string
          description: ID of the actor that started this run.
        source_type:
          type: string
          description: Type of source that requested this run (api, trigger, slack, fork,
            tool).
        source_id:
          type: string
          description: Identifier for the run source within its source type.
        source_label:
          type: string
          description: Human-readable label for the run source.
        external_id:
          type: string
          description: Caller-supplied logical correlation key for this run. Unique within
            the project; identifies a logical job across attempts. See the `external_id` description
            on `POST /runs` for the conflict semantics that govern duplicate values.
        cancel_requested_at:
          type: string
          format: date-time
          description: Timestamp when cancellation was requested.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this run was created.
        started_at:
          type: string
          format: date-time
          description: Timestamp when a worker first claimed this run.
        completed_at:
          type: string
          format: date-time
          description: Timestamp when this run reached a terminal state.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this run was last updated.
        wall_clock_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will fail this run with `error_type=run_timeout`
            if it has not reached a terminal state. Present only when `resolved_config` contains
            a `key="runs.timeouts.execution"` entry whose value resolves to a finite duration.
            Anchored to `created_at`.
        error_type:
          type: string
          enum:
          - run_timeout
          - run_cancelled
          - step_failed
          - run_failed
          - output_extraction_failed
          - output_validation_failed
          description: 'Typed run-level failure cause: `run_timeout`, `run_cancelled`, `step_failed`,
            `run_failed`, `output_extraction_failed`, or `output_validation_failed`. Its own
            vocabulary, not a superset of the job-level `error_type`. Present when `status=failed`.'
        resolved_config:
          $ref: '#/components/schemas/ResolvedConfig'
          description: Run-level cascade config frozen when the run was started.
        default_step_config:
          $ref: '#/components/schemas/ResolvedConfig'
          description: Default step-level cascade config inherited by each run step unless
            the step's own spec overrides it.
        forked_from:
          $ref: '#/components/schemas/RunForkLineage'
          description: Source run and step this run was forked from.
    RunForkLineage:
      type: object
      additionalProperties: false
      required:
      - run_id
      - step_id
      - path_id
      - step_name
      properties:
        run_id:
          type: string
        step_id:
          type: string
        path_id:
          type: string
        step_name:
          type: string
    RunForkRequest:
      type: object
      additionalProperties: false
      required:
      - from_step_id
      - external_id
      description: 'Fork creation request. Tags are inherited from the source run and then
        overlaid with request tags using the same tag inheritance rules as run creation: request
        values replace matching source keys, and an empty string removes the inherited key.
        `definition_version_id` changes only the post-fork execution version; it does not
        affect inherited history. When omitted, the fork uses the source run''s definition
        version.'
      properties:
        from_step_id:
          type: string
          description: Run-step identifier to fork from. Use the `id` returned by `RunStep`.
        external_id:
          type: string
          description: Logical external identifier for the new forked run. It must be unique
            within the project, just like other workflow-run `external_id` values.
        definition_version_id:
          type: string
          description: Optional target workflow definition version for post-fork execution.
            It must belong to the same workflow definition as the source run. Omit it to use
            the source run's original definition version. Inherited history remains tied to
            the source run.
        tags:
          description: Tags to overlay on the inherited source-run tags. Empty string values
            remove inherited keys.
          allOf:
          - $ref: '#/components/schemas/TagMap'
    RunStepSource:
      type: string
      enum:
      - executed
      - inherited
    RunStepKind:
      type: string
      enum:
      - worker_action
      - server_action
      - control
    RunStepStatus:
      type: string
      enum:
      - pending
      - running
      - completed
      - failed
      - skipped
      - cancelled
    RunStep:
      type: object
      description: Durable execution-history row for one step attempt on one workflow path.
        RunStep is the canonical source for run history; linked Job rows are transient worker-claim
        records and may be TTL-swept after terminal retention.
      additionalProperties: false
      required:
      - id
      - run_id
      - path_id
      - step_name
      - action
      - attempt
      - transition_seq
      - kind
      - source
      - status
      - parameters
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Stable run-step identifier. Use this value as `{step_id}` in `GET /runs/{id}/steps/{step_id}`
            and as `from_step_id` in `POST /runs/{id}/forks`.
        run_id:
          type: string
          description: Workflow run that owns this step row.
        path_id:
          type: string
          description: Workflow path identifier for branch/fanout execution.
        step_name:
          type: string
          description: Step name from the workflow definition.
        action:
          type: string
          description: Action identifier for executable steps; empty for control-only steps.
        attempt:
          type: integer
          description: Zero-based retry attempt for this step/path pair.
        transition_seq:
          type: integer
          format: int64
          description: Per-run monotonic transition order for projection and fork reconstruction.
        kind:
          description: 'Why this ledger row exists: worker-claimable action, synchronous server
            action, or Mobius control transition.'
          allOf:
          - $ref: '#/components/schemas/RunStepKind'
        source:
          description: Whether this row was executed in this run or inherited from a source
            run during fork creation.
          allOf:
          - $ref: '#/components/schemas/RunStepSource'
        status:
          allOf:
          - $ref: '#/components/schemas/RunStepStatus'
        reason:
          type: string
          description: Optional suppression reason, most commonly set when status is `skipped`.
        parameters:
          type: object
          description: Resolved parameters/input for this step attempt.
          additionalProperties: true
        bindings:
          type: array
          description: Vars written by this step, with the source expression used for each
            binding.
          items:
            $ref: '#/components/schemas/RunStepBinding'
        job_id:
          type: string
          description: Linked live worker job when one exists. Terminal jobs may be reaped
            while the RunStep remains.
        result_b64:
          type: string
          description: Base64-encoded serialized step result, when present.
        run_state_after_b64:
          type: string
          description: Base64-encoded serialized run state immediately after this step completed.
            Omitted unless requested with `include=run_state_after`.
        error_type:
          type: string
        error_message:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        source_run_id:
          type: string
          description: Originating run ID when this row was inherited or derived from another
            run.
        source_step_id:
          type: string
          description: Originating step ID when this row was inherited or derived from another
            run.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RunStepBinding:
      type: object
      additionalProperties: false
      required:
      - var
      - source
      properties:
        var:
          type: string
          description: Bound top-level vars path, e.g. `vars.repo`.
        source:
          type: string
          description: Source expression or literal used to produce the bound value.
    RunStepListResponse:
      type: object
      description: Paginated durable run-step history. Use this response for historical run
        inspection because linked job rows are live worker state and may be TTL-swept.
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RunStep'
        has_more:
          type: boolean
        next_cursor:
          type: string
    WorkflowRunListResponse:
      type: object
      description: Paginated list of workflow runs.
      additionalProperties: false
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/WorkflowRun'
        has_more:
          type: boolean
          description: True when more pages are available.
        next_cursor:
          type: string
          description: Opaque cursor for fetching the next page. Present only when has_more
            is true.
    WorkflowRunDetail:
      description: Detailed workflow run including its spec snapshot, terminal result, and
        the first page of run steps.
      allOf:
      - $ref: '#/components/schemas/WorkflowRun'
      - type: object
        required:
        - paths
        - steps
        properties:
          paths:
            type: array
            description: Current path-level execution projection for this run.
            items:
              $ref: '#/components/schemas/WorkflowRunPath'
          spec:
            $ref: '#/components/schemas/WorkflowSpec'
            description: Spec snapshot used to execute this run.
          result_b64:
            type: string
            description: Base64-encoded terminal result blob
          steps:
            type: array
            description: First page of durable run-step history, ordered by `transition_seq`
              ascending. Use this canonical history for execution inspection and fork planning,
              including after terminal job rows have been TTL-swept.
            items:
              $ref: '#/components/schemas/RunStep'
          steps_next_cursor:
            type: string
            description: Cursor for the next page of durable run-step history.
    StartSavedRunRequest:
      type: object
      additionalProperties: false
      required:
      - mode
      - definition_id
      description: 'Run a previously-created workflow definition. Selected by `mode: saved`
        on `POST /v1/projects/{project}/runs`. The run inherits the workflow definition''s
        tags at start time; see the `tags` field below for the override rules.'
      properties:
        mode:
          type: string
          enum:
          - saved
          description: Discriminator value — must be `saved`.
        definition_id:
          type: string
          description: ID of an existing workflow definition to run.
        queue:
          type: string
          description: Queue name to enqueue the run on. Defaults to "default".
        inputs:
          type: object
          additionalProperties: true
          description: Input values to pass to the workflow. Must conform to the workflow's
            declared input schema.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run for filtering and
            display.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Tags applied on top of the workflow definition's inherited tags. Caller
            keys override on conflict; an entry whose value is the empty string opts the inherited
            key out entirely (so the run does not carry it). Setting a tag value to "" is
            therefore reserved as the opt-out signal — use a placeholder value if you actually
            want a stored empty value.
        external_id:
          type: string
          description: Caller-supplied logical correlation key for this run. Unique within
            the project. If the same external_id is reused while the prior run is still active,
            the existing run is returned idempotently. Once the prior run is terminal (completed
            or failed), a duplicate POST returns 409 with code `external_id_conflict` and
            the `existing_run_id` and `status` carried in `details`. To launch a fresh attempt
            for the same logical job after a terminal run, use a new external_id (e.g. suffix
            with an attempt counter).
        config:
          $ref: '#/components/schemas/ConfigEntries'
          description: Run-level cascade config overrides applied when starting the run.
    StartInlineRunRequest:
      type: object
      additionalProperties: false
      required:
      - mode
      - spec
      description: 'Run an ephemeral workflow from an inline spec. Selected by `mode: inline`
        on `POST /v1/projects/{project}/runs`. No `WorkflowDefinition` is persisted; the spec
        is snapshotted onto the returned run.'
      properties:
        mode:
          type: string
          enum:
          - inline
          description: Discriminator value — must be `inline`.
        spec:
          $ref: '#/components/schemas/WorkflowSpec'
          description: Inline executable spec to snapshot onto the ephemeral run.
        queue:
          type: string
          description: Queue name to enqueue the run on. Defaults to "default".
        inputs:
          type: object
          additionalProperties: true
          description: Input values to pass to the workflow. Must conform to the workflow's
            declared input schema.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run for filtering and
            display.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Initial tags for this inline run. Inline runs have no parent workflow
            definition, so there is nothing to inherit from — every tag on the run comes from
            this map.
        external_id:
          type: string
          description: Caller-supplied logical correlation key for this run. Unique within
            the project. If the same external_id is reused while the prior run is still active,
            the existing run is returned idempotently. Once the prior run is terminal (completed
            or failed), a duplicate POST returns 409 with code `external_id_conflict` and
            the `existing_run_id` and `status` carried in `details`. To launch a fresh attempt
            for the same logical job after a terminal run, use a new external_id (e.g. suffix
            with an attempt counter).
        config:
          $ref: '#/components/schemas/ConfigEntries'
          description: Run-level cascade config overrides applied when starting the run.
    StartRunRequest:
      description: |-
        Request body for `POST /v1/projects/{project}/runs`. Discriminated by
        `mode`:
        - `saved` — body conforms to `StartSavedRunRequest`.
        - `inline` — body conforms to `StartInlineRunRequest`.
      oneOf:
      - $ref: '#/components/schemas/StartSavedRunRequest'
      - $ref: '#/components/schemas/StartInlineRunRequest'
      discriminator:
        propertyName: mode
        mapping:
          saved: '#/components/schemas/StartSavedRunRequest'
          inline: '#/components/schemas/StartInlineRunRequest'
    StartBoundRunRequest:
      type: object
      additionalProperties: false
      description: 'Request body for `POST /v1/projects/{project}/workflows/{id}/runs`. The
        definition to run is identified by the path parameter, so neither `mode` nor `definition_id`
        appear here. Inline specs are not allowed on this route — use `POST /v1/projects/{project}/runs`
        with `mode: inline` instead.'
      properties:
        queue:
          type: string
          description: Queue name to enqueue the run on. Defaults to "default".
        inputs:
          type: object
          additionalProperties: true
          description: Input values to pass to the workflow. Must conform to the workflow's
            declared input schema.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied string metadata attached to the run for filtering and
            display.
        tags:
          $ref: '#/components/schemas/TagMap'
          description: Tags applied on top of the bound workflow definition's inherited tags.
            Caller keys override on conflict; an entry whose value is the empty string opts
            the inherited key out entirely (so the run does not carry it). Setting a tag value
            to "" is therefore reserved as the opt-out signal — use a placeholder value if
            you actually want a stored empty value.
        external_id:
          type: string
          description: Caller-supplied logical correlation key for this run. Unique within
            the project. If the same external_id is reused while the prior run is still active,
            the existing run is returned idempotently. Once the prior run is terminal (completed
            or failed), a duplicate POST returns 409 with code `external_id_conflict` and
            the `existing_run_id` and `status` carried in `details`. To launch a fresh attempt
            for the same logical job after a terminal run, use a new external_id (e.g. suffix
            with an attempt counter).
        config:
          $ref: '#/components/schemas/ConfigEntries'
          description: Run-level cascade config overrides applied when starting the bound
            workflow.
    ConfigEntry:
      type: object
      description: One config override entry.
      required:
      - key
      - value
      additionalProperties: false
      properties:
        key:
          type: string
          description: Registered config key, for example `jobs.timeouts.execution` or `runs.timeouts.execution`.
        value:
          type: string
          description: Raw string value interpreted by the key parser.
    ConfigEntries:
      type: array
      items:
        $ref: '#/components/schemas/ConfigEntry'
      description: 'Flat config input used outside authored workflow YAML. Each entry addresses
        one registered key. Unknown keys are rejected at write time. Phase 1 ships: `jobs.timeouts.claim`,
        `jobs.timeouts.execution`, `jobs.timeouts.heartbeat`, and `runs.timeouts.execution`.'
    ResolvedConfig:
      type: array
      items:
        $ref: '#/components/schemas/ResolvedConfigEntry'
      description: Frozen config resolution in flat entry form. Keys unset at every layer
        are omitted. See PRD 035.
    ResolvedConfigEntry:
      type: object
      description: One config value after layer resolution.
      required:
      - key
      - value
      - source
      additionalProperties: false
      properties:
        key:
          type: string
          description: Registered config key that was resolved.
        value:
          type: string
          description: Resolved raw string value.
        source:
          type: string
          enum:
          - service
          - project
          - workflow
          - run
          - step
          description: 'Cascade layer that supplied the winning value: service, project, workflow,
            run, or step.'
    JobStatus:
      type: string
      enum:
      - pending
      - claimed
      - completed
      - failed
      description: |-
        Job lifecycle state:
        - `pending`   — created, not yet claimed by a worker.
        - `claimed`   — held under an active worker lease.
        - `completed` — terminal success.
        - `failed`    — terminal failure; may follow retries.
    Job:
      type: object
      additionalProperties: false
      required:
      - id
      - run_id
      - step_name
      - action
      - queue
      - status
      - attempt
      - max_attempts
      - scheduled_at
      - created_at
      - updated_at
      description: A claimable unit of work derived from a single workflow step execution.
      properties:
        id:
          type: string
          description: Unique identifier for this job.
        run_id:
          type: string
          description: The workflow run this job belongs to.
        parent_job_id:
          type: string
          description: Set when this job is a child of a fan-out (each) step.
        path_id:
          type: string
          description: Opaque identifier for the execution path within the run (used for fan-out
            deduplication).
        step_name:
          type: string
          description: Workflow step name this job was created for.
        action:
          type: string
          description: Action name the worker must execute to complete this job.
        queue:
          type: string
          description: Queue the job was placed in. Workers subscribe to queues to receive
            jobs.
        parameters:
          type: object
          additionalProperties: true
          description: Resolved input parameters to pass to the action.
        status:
          $ref: '#/components/schemas/JobStatus'
          description: Current job lifecycle state.
        claimed_by:
          type: string
          description: Worker ID that claimed this job.
        agent_id:
          type: string
          description: Agent ID the claiming worker is acting on behalf of.
        agent_session_id:
          type: string
          description: Agent session ID provided during the claim.
        claimed_at:
          type: string
          format: date-time
          description: Timestamp when this job was claimed by a worker.
        heartbeat_at:
          type: string
          format: date-time
          description: Timestamp of the most recent heartbeat. Used to detect stale claims.
        attempt:
          type: integer
          description: Current attempt number (1-based). Increments on each retry.
        max_attempts:
          type: integer
          description: Maximum number of attempts before the job is permanently failed.
        scheduled_at:
          type: string
          format: date-time
          description: Earliest time at which this job may be claimed.
        error_message:
          type: string
          description: Error detail from the most recent failed attempt.
        claim_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will fail this job with `error_type=claim_timeout`
            if no worker has claimed it. Present only when `resolved_config` contains `key="jobs.timeouts.claim"`
            whose value resolves to a finite duration. Re-stamped whenever the job returns
            to `pending`.
        liveness_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will either reset (retries remain) or
            fail this job with `error_type=liveness_timeout` if the worker has not heartbeated
            in time. Present only when `resolved_config` contains `key="jobs.timeouts.heartbeat"`
            whose value resolves to a finite duration and the job is claimed.
        execution_deadline_at:
          type: string
          format: date-time
          description: Deadline at which the reaper will fail this job with `error_type=execution_timeout`
            if it has not completed. Present only when `resolved_config` contains `key="jobs.timeouts.execution"`
            whose value resolves to a finite duration.
        error_type:
          type: string
          description: Failure cause. Server-produced timeout and cancellation failures use
            stable tokens such as `claim_timeout`, `liveness_timeout`, `execution_timeout`,
            `run_cancelled`, `run_timeout`, and `run_failed`; worker-reported failures may
            use caller-defined class names. Present when `status=failed`.
        resolved_config:
          $ref: '#/components/schemas/ResolvedConfig'
          description: Job-level cascade config resolved for this job.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this job was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this job was last updated.
    JobListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated list of jobs spawned by one workflow run. This is scoped to
        a single run for debugging and execution inspection rather than a project-wide search
        surface.
      properties:
        items:
          type: array
          description: The list of jobs for this run.
          items:
            $ref: '#/components/schemas/Job'
    SendRunSignalRequest:
      type: object
      description: Delivers an external signal to a workflow run.
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: Signal topic (e.g. "approval", "webhook").
        payload:
          type: object
          additionalProperties: true
          description: Arbitrary payload delivered to the waiting step when the signal is
            received.
    RunSignal:
      type: object
      description: Persisted external signal delivered to a workflow run.
      additionalProperties: false
      required:
      - id
      - run_id
      - name
      properties:
        id:
          type: string
          description: Unique identifier for this signal.
        run_id:
          type: string
          description: ID of the run this signal was delivered to.
        name:
          type: string
          description: Signal topic name matching the wait_signal step's topic.
    IntegrationEventSample:
      type: object
      required:
      - id
      - provider
      - event_type
      - name
      - payload
      properties:
        id:
          type: string
          description: Stable sample identifier, unique across providers.
        provider:
          type: string
          description: Provider name, e.g. `github`.
        event_type:
          type: string
          description: Dotted integration event type this sample fires.
        name:
          type: string
          description: Human-readable sample name.
        description:
          type: string
          description: What the sample is useful for testing.
        payload:
          type: object
          additionalProperties: true
          description: Canonical Mobius integration-event payload.
        meta:
          type: object
          additionalProperties: true
          description: Optional extra metadata merged into test-fire requests.
    IntegrationEventSamplesResponse:
      type: object
      required:
      - samples
      properties:
        samples:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationEventSample'
    IntegrationEventFireMode:
      type: string
      enum:
      - preview
      - deliver
      description: '`preview` evaluates matches without persistence; `deliver` persists a
        synthetic integration event and publishes it through normal delivery.'
    IntegrationEventFireRequest:
      type: object
      additionalProperties: false
      properties:
        mode:
          $ref: '#/components/schemas/IntegrationEventFireMode'
        sample_id:
          type: string
          description: Optional sample id to prefill provider, event_type, payload, and meta.
        provider:
          type: string
          description: Provider name. Defaults to the sample provider or the event_type prefix.
        event_type:
          type: string
          description: Dotted integration event type to fire. Required when sample_id is omitted.
        integration_id:
          type: string
          description: Optional integration id metadata. Defaults to `synthetic:<provider>`.
        dedup_key:
          type: string
          description: Optional dedup key for deliver mode. Defaults to the generated synthetic
            event id.
        payload:
          type: object
          additionalProperties: true
          description: Canonical event payload. When sample_id is set, this replaces the sample
            payload.
        meta:
          type: object
          additionalProperties: true
          description: Optional metadata overrides. Reserved event metadata is controlled
            by the top-level request fields.
    IntegrationEventFireEvent:
      type: object
      required:
      - provider
      - event_type
      - source
      - payload
      properties:
        id:
          type: string
          description: Persisted event id. Present in deliver mode.
        provider:
          type: string
        event_type:
          type: string
        integration_id:
          type: string
        source:
          type: string
          enum:
          - synthetic
        dedup_key:
          type: string
        payload:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
    IntegrationEventFireTriggerMatch:
      type: object
      required:
      - trigger_id
      - name
      - target_count
      properties:
        trigger_id:
          type: string
        name:
          type: string
        target_count:
          type: integer
        targets:
          type: array
          items:
            $ref: '#/components/schemas/TestFireTargetResult'
    IntegrationEventFireWaiterMatch:
      type: object
      required:
      - run_id
      - step_name
      - matches
      properties:
        run_id:
          type: string
        path_id:
          type: string
        step_name:
          type: string
        event_type:
          type: string
        match_mode:
          type: string
        condition:
          type: string
        matches:
          type: boolean
        reason:
          type: string
    IntegrationEventFireResponse:
      type: object
      required:
      - mode
      - event
      - triggers
      - waiters
      - delivered
      properties:
        mode:
          $ref: '#/components/schemas/IntegrationEventFireMode'
        sample_id:
          type: string
        event:
          $ref: '#/components/schemas/IntegrationEventFireEvent'
        triggers:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationEventFireTriggerMatch'
        waiters:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationEventFireWaiterMatch'
        delivered:
          type: boolean
          description: True when the event was persisted and published.
        deduped:
          type: boolean
          description: True when deliver mode reused an existing event row by dedup key.
    TestFireTargetStatus:
      type: string
      enum:
      - success
      - failed
      - skipped
      description: Per-target outcome of a test-fire dispatch. Distinct from `TriggerFireStatus`,
        which carries aggregate values like `partial_failure` that are only meaningful at
        the trigger level.
    TestFireTargetResult:
      type: object
      additionalProperties: false
      required:
      - target_id
      - kind
      - status
      - would_launch
      description: Per-target outcome of a test-fire. Mirrors TriggerFireTargetResult but
        exposes the resolved input mapping and would-launch decision so trigger authors can
        debug each layer in isolation.
      properties:
        target_id:
          type: string
          description: ID of the trigger target this result is for.
        kind:
          type: string
          enum:
          - launch_run
          - signal_run
          description: 'Effect kind of this target. Discriminates which resolved field is
            populated: `launch_run` populates `input_mapping_resolved`; `signal_run` populates
            `signal_payload_resolved`.'
        workflow_id:
          type: string
          description: Workflow definition the target points at. Present only for `launch_run`
            targets.
        enabled:
          type: boolean
          description: Whether the target is enabled. Disabled targets are skipped without
            resolution.
        status:
          $ref: '#/components/schemas/TestFireTargetStatus'
        input_mapping_resolved:
          type: object
          additionalProperties: true
          description: (launch_run only) Resolved input map handed to the workflow.
        signal_payload_resolved:
          type: object
          additionalProperties: true
          description: (signal_run only) Resolved signal payload that would be delivered to
            the matched run's `wait_signal` step.
        input_resolution_error:
          type: string
          description: Error encountered resolving the target's `input_mapping` for a `launch_run`
            target. `signal_run` targets report `signal_payload_mapping` failures via `signal_payload_resolution_error`
            instead, so clients can distinguish which resolution step failed without parsing
            the error string. Errors rendering the run-selector template (`run_selector.external_id_template`
            for `signal_run`, or the `external_id_template` for `launch_run`) surface in `launch_error`.
        signal_payload_resolution_error:
          type: string
          description: (signal_run only) Error encountered resolving `signal_payload_mapping`
            — the payload that would be delivered to the matched run's `wait_signal` step
            (and exposed under `signal_payload_resolved`). Reported separately from `input_resolution_error`
            so clients don't reuse launch-run-specific fields for signal failures.
        external_id_resolved:
          type: string
          description: Rendered value of `external_id_template` (launch_run) or `run_selector.external_id_template`
            (signal_run). Lets authors verify the two templates produce matching strings.
            Absent when the target has no template or rendering failed.
        would_launch:
          type: boolean
          description: True when the target would launch a run (`launch_run`) or signal an
            existing run (`signal_run`). False for disabled targets and targets whose condition
            evaluated to false.
        run_id:
          type: string
          description: ID of the launched (`launch_run`) or signaled (`signal_run`) run. Only
            set in execute mode.
        reason:
          type: string
          description: Why the target was skipped, when status is `skipped`. Empty for `success`
            and `failed` results.
        launch_error:
          type: string
          description: Error from the launcher (`launch_run`) or signal sender (`signal_run`)
            when execute mode failed to act on the target.
    ActionAnnotationsRequest:
      type: object
      additionalProperties: false
      description: Request hints that describe the safe-use properties of the action. Used
        by the engine and tooling to decide retry behavior, dry-run eligibility, etc. Unknown
        request properties are rejected.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    ActionAnnotationsResponse:
      type: object
      additionalProperties: true
      description: Response hints that describe the safe-use properties of the action. Response
        annotations are forward-compatible so the server can add response-only hints without
        breaking strict clients.
      properties:
        idempotent:
          type: boolean
          description: The action produces the same result when called with the same inputs;
            safe to retry automatically.
        destructive:
          type: boolean
          description: The action has irreversible side effects (deletion, financial transactions,
            etc.). Surfaced as a warning in UI.
        read_only:
          type: boolean
          description: The action has no side effects; safe to call in dry-run scenarios.
    CreateActionRequest:
      type: object
      additionalProperties: false
      description: Registers a project-owned HTTP action endpoint callable from workflow steps.
      required:
      - name
      - endpoint_url
      properties:
        name:
          type: string
          description: Project-scoped identifier used in workflow step definitions. Lowercase
            alphanumeric + hyphens, e.g. "send-email". Must be unique within the project.
            Cannot start with "mobius." (reserved prefix).
        title:
          type: string
          description: Human-readable display name shown in the UI and catalog.
        description:
          type: string
          description: Markdown-safe description of what the action does.
        endpoint_url:
          type: string
          format: uri
          description: HTTP/HTTPS URL Mobius will POST to when invoking the action.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsRequest'
          description: Safe-use hints used by execution and authoring tools.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key-value string tags for filtering and organization.
    UpdateActionRequest:
      type: object
      additionalProperties: false
      description: Updates action metadata, endpoint, schemas, or safe-use hints.
      properties:
        title:
          type: string
          description: Replacement display title.
        description:
          type: string
          description: Replacement Markdown description.
        endpoint_url:
          type: string
          format: uri
          description: Replacement endpoint URL.
        input_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for inputs. Replaces the existing schema.
        output_schema:
          type: object
          additionalProperties: true
          description: Replacement JSON Schema for outputs. Replaces the existing schema.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsRequest'
          nullable: true
          description: Pass null to clear all annotation flags.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Replacement tag map. Replaces the existing tags entirely.
    Action:
      type: object
      additionalProperties: false
      description: Project-owned HTTP action endpoint callable by workflow steps.
      required:
      - id
      - name
      - endpoint_kind
      - endpoint_url
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for this action.
        name:
          type: string
          description: Project-scoped stable identifier used in workflow step definitions.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          enum:
          - http
          - workflow
          description: Backing kind of this action. "http" for project-owned HTTP endpoints
            (the only kind creatable via POST /actions). "workflow" entries are read-only
            and mutated through the workflow surface.
        endpoint_url:
          type: string
          format: uri
          description: 'HTTP/HTTPS URL Mobius POSTs to when invoking this action. Populated
            for endpoint_kind: http only.'
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsResponse'
          description: Safe-use hints returned for this action.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key-value string tags.
        signing_secret:
          type: string
          description: Raw HMAC-SHA256 signing secret. Only populated on create and rotate
            responses; null on all other reads. Store this value securely on first receipt
            — it cannot be retrieved again.
        created_at:
          type: string
          format: date-time
          description: Timestamp when this action was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this action was last updated.
    ActionListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of project-owned actions.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/Action'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
    RotateSecretResult:
      type: object
      additionalProperties: false
      description: New signing secret returned after rotating an action secret.
      required:
      - signing_secret
      properties:
        signing_secret:
          type: string
          description: The new raw signing secret. Store it immediately — this is the only
            time it is returned.
    ActionCatalogEntry:
      type: object
      additionalProperties: false
      description: One built-in, integration, workflow-, or custom-backed action available
        to agents and workflow authors.
      required:
      - name
      - source
      - available
      - endpoint_kind
      - risk
      - annotations
      properties:
        name:
          type: string
          description: Canonical dotted action name (e.g. `mobius.channel.send_message`).
            Translated to the provider-safe form (`mobius_channel_send_message`) only at the
            LLM boundary.
        title:
          type: string
          description: Human-readable display title for the action.
        description:
          type: string
          description: Markdown description of what the action does.
        endpoint_kind:
          type: string
          enum:
          - builtin
          - http
          - workflow
          description: Backing kind. "builtin" for Mobius platform actions implemented in
            Go (no DB row), "http" for project-owned or integration HTTP endpoints, "workflow"
            for actions backed by a workflow definition published as a tool.
        workflow_handle:
          type: string
          description: Workflow handle for endpoint_kind=workflow entries. Absent otherwise.
        integration:
          type: string
          description: Integration slug this action belongs to (e.g. "slack"), if platform-provided.
        source:
          type: string
          enum:
          - platform
          - custom
          description: 'Origin of this action: "platform" for built-in or integration-backed
            actions provided by Mobius, "custom" for project-owned HTTP endpoints registered
            as actions. The `integration` field carries the provider slug for integration-backed
            platform actions.'
        available:
          type: boolean
          description: Whether this action can currently be invoked. False if the required
            integration is not connected, the action is a placeholder for a not-yet-implemented
            capability, or the caller lacks permission.
        risk:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
          description: Author-declared risk classification. Used by toolkit-author UIs to
            surface warnings and by audit views to prioritize attention.
        annotations:
          $ref: '#/components/schemas/ActionAnnotationsResponse'
          description: Safe-use hints returned for this catalog action. Always present; flags
            default to false.
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing expected input parameters.
        output_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the expected output shape.
        endpoint_url:
          type: string
          format: uri
          description: 'Endpoint URL (populated for endpoint_kind: http actions only).'
    ActionCatalogListResponse:
      type: object
      additionalProperties: false
      required:
      - items
      description: Unpaginated project action catalog. This endpoint returns the complete
        set of available project, platform, and workflow-backed actions so clients can build
        pickers without paging across a small catalog.
      properties:
        items:
          type: array
          description: The full list of catalog entries.
          items:
            $ref: '#/components/schemas/ActionCatalogEntry'
    ActionInvocationRequest:
      type: object
      additionalProperties: false
      description: Request body for user-driven action invocation.
      properties:
        input:
          type: object
          description: Input values matching the action's input_schema.
          additionalProperties: true
        timeout_seconds:
          type: integer
          description: How long (in seconds) to wait for synchronous completion. Default 30,
            max 120. If the run does not complete within this window the response is 202 with
            status active (workflow-backed only; HTTP-backed actions always complete inline).
          minimum: 1
          maximum: 120
        dry_run:
          type: boolean
          description: When true, validates the input but does not execute. Applies to read-only
            actions only.
    ActionInvocationResult:
      type: object
      additionalProperties: false
      description: Unified invocation result for any action kind. HTTP-backed actions always
        produce status "completed". Workflow-backed actions may produce status "active" when
        the run did not complete within `timeout_seconds`.
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - active
          - completed
          - failed
          description: Terminal or in-progress status of the invocation.
        run_id:
          type: string
          description: Workflow run ID. Present when a run was created (always for workflow-backed,
            never for HTTP-backed).
        output:
          type: object
          additionalProperties: true
          description: Action output. Present when status is "completed".
        error:
          type: string
          description: Error message. Present when status is "failed".
    ActionInvocationEntry:
      type: object
      additionalProperties: false
      description: Per-invocation telemetry record for one action execution.
      required:
      - id
      - action_name
      - source
      - status
      - retry_count
      - started_at
      - finished_at
      properties:
        id:
          type: string
          description: Unique identifier for this invocation record.
        run_id:
          type: string
          description: Workflow run that triggered this invocation, if run-backed.
        job_id:
          type: string
          description: Job that triggered this invocation, if job-backed.
        step_name:
          type: string
          description: Workflow step name that triggered this invocation.
        action_name:
          type: string
          description: Name of the action that was invoked.
        source:
          type: string
          description: Invocation source ("workflow", "direct", etc.).
        parameters:
          type: object
          additionalProperties: true
          description: Input parameters passed to the action.
        output_summary:
          type: object
          additionalProperties: true
          description: Truncated or summarized action output for audit purposes.
        status:
          type: string
          description: Terminal invocation status ("success", "failed", etc.).
        retry_count:
          type: integer
          description: Number of retry attempts before this terminal status was reached.
        started_at:
          type: string
          format: date-time
          description: Timestamp when this invocation started.
        finished_at:
          type: string
          format: date-time
          description: Timestamp when this invocation completed.
        error_type:
          type: string
          description: Machine-readable error classification when status is "failed".
        error_message:
          type: string
          description: Human-readable error detail when status is "failed".
    ActionInvocationListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of action invocation telemetry records.
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          description: The list of results for this page.
          items:
            $ref: '#/components/schemas/ActionInvocationEntry'
        next_cursor:
          type: string
          description: Opaque cursor to pass as `cursor` on the next request. Absent when
            `has_more` is false.
        has_more:
          type: boolean
          description: Whether additional pages are available.
